body:
  text: 四六法海卷七明王志堅編與吳質書魏文帝季重無恙途路雖局官守有限願言之懷良不可任足下所治僻左書問致簡益用增勞每念昔日南皮之遊誠不可忘既妙思六經逍遙百氏彈棊間設終以博奕髙談娛心哀箏順耳馳騁北場旅食南館浮甘瓜于清泉沈朱李于寒水白日既匿繼以朗月同乘並載以遊後園輿輪徐動參從無聲清風夜起悲笳微吟樂往哀來凄然傷懷余顧而言斯樂難常足下之徒咸以為然今果分别各在一方元瑜長逝化為異物每一念至何時可言方今㽔賔紀時景風扇物天氣和暖衆果具繁時駕而遊北遵河曲從者鳴笳以啓路文學托乘于後車節同時異物是人非我勞如何今遣騎到鄴故使枉道相過行矣自愛質字季重以才學博通為五官將及諸侯所禮愛質亦善處其兄弟之間若樓君卿之遊五侯也時質為元城令太子南在孟津小城與質書鍾伯敬云文帝書往往于沒緊要處口角低回具有情理又云參從無聲四字想見文士放遊之妙無富貴氣報龎惠恭書應瑒夫蕭艾之歌發於信宿子襟之思起於嗣音况實三載能不有懷雖萱草樹背臯蘇在側悒憤不逞秪以增毒朝隱之官賔不往來喬木之下曠無休息抱勞而巳足下剖符南面振威千里行人子羽朝夕相斷曾不枉咫尺之路問蓬室之舊過意賜書辭不半紙慰藉輕於繒縞譏望重於丘山是角弓之詩所以為刺也值鷺羽於苑丘騁駿足於株林發明月之輝光照妖人之窈窕斯亦所以眩耳目之觀聽亡聲命於知友者也瑒字德璉與王粲等號建安七子初為魏武掾屬終五官將文學弟璩亦以文章顯而不在七人之列與滿公琰書應璩璩白昨者不遺猥見照臨雖昔侯生納顧於夷門毛公受眷於逆旅無以過也外嘉郎君謙下之德內幸頑才見誠知己歡欣踴躍情有無量是以奔騁御僕宣命周求陽晝喻於詹何揚倩説於范武故使鮮魚出自潛淵芳旨發自幽巷繁爼綺錯羽爵飛騰牙曠髙徽義渠哀激當此之時仲孺不辭同産之服孟公不顧尚書之期徒恨宴樂始酣白日傾夕驪駒就駕意不宣展追惟耿介迄于明發適欲遣書會承來命知諸君子復有漳渠之會夫漳渠西有伯陽之館北有曠野之望髙樹翳朝雲文禽蔽緑水沙場夷敞清風肅穆是京臺之樂也得無流而不反乎適有事務須自經營不獲侍坐良增邑邑璩字休璉博學好屬丈文明之世歷官散騎常侍齊王即位遷侍中大將軍長史曹爽秉政為詩以諷復為侍中典著作滿炳字公琰為别部司馬公琰曾過璩明日璩欲遣書謝值公琰使人來召璩璩事不得往故為報與廣川長岑文瑜書應璩璩白頃者炎旱日更增甚沙礫銷鑠草木焦卷處涼臺而有鬱蒸之煩浴寒水而有灼爛之慘宇宙雖廣無隂以憩雲漢之詩何以過此土龍矯首於玄寺泥人鶴立於闕里修之歷旬靜無徵效明勸教之術非致雨之備也知恤下民躬自暴露拜起靈壇勤亦至矣昔夏禹之解陽旰殷湯之禱桑林言未發而水旋流辭未卒而澤滂沛今者雲重積而復散雨垂落而復收得無賢聖殊品優劣異姿割髮宜及膚翦爪宜侵肌乎周征殷而年豐衛伐邢而致雨善否之應甚於影響未可以為不然也想雅思所未及謹書起豫應璩白廣川縣旱祈雨不得璩作書戲之與侍郎曹長思書應璩璩白足下去後甚相思想叔田有無人之歌闉闍有匪存之思風人之作豈虗也哉王肅以宿德顯授何曾以後進見拔皆鷹揚虎視有萬里之望薄援助者不能追參於高妙復斂翼於故枝塊然獨處有離羣之志汲黯樂在郎署何武恥為宰相千載揆之知其有由也德非陳平門無結駟之迹學非揚雄堂無好事之客才劣仲舒無下帷之思家貧孟公無置酒之樂悲風起於閨闥紅塵蔽於几榻幸有袁生時步玉趾樵蘇不㸑清談而已有似周黨之過閔子夫皮朽者毛落川涸者魚逝春生者繁華秋榮者零悴自然之歎豈有恨哉聊與大弟陳其苦懷耳想還在近故不益言璩白答從兄安成王書陸景奉告清言溢目眷逮周委炎光巳盛願此勝宜仰承發止巳次新林引邁務殷無妨怡賞三湘奧區九嶷形勝浮洲動浪聞眠鷗之舊説安流洞浦憶採石之遺風昔景伯出蕃髙風振古叔英之部清約見稱兄政譽平宣威和兼濟加以夏石竒雲秋江迥月翰飛紙落理豐辭賦賞末興餘時希逮憶暌離方遠川途修曠炎涼方改願加珍朂緑宇可傳白雲終間心傷淚灑投筆無宣景字士仁抗之次子抗卒與兄晏弟玄機雲分領抗兵拜偏將軍中夏督澡身好學著書數十篇後為王濬軍所殺安成王不可考與諸葛恪書薛綜山越恃阻不賔歷世緩則首鼠急則狼顧皇帝赫然命將西征神䇿內授武師外震兵不染鍔甲不沾汗元惡既梟種黨歸義蕩滌山藪獻戎十萬野無遺冦邑罔殘姦既掃凶慝又充軍用藜蓧稂莠化為善草魑魅魍魎更成虎士雖實國家威靈之所加亦信元帥臨履之所致也雖詩美執訊易嘉折首周之方召漢之衛霍豈足以談功軼古人勳超前世主上歡然遙用歎息感四牡之遺典思飲至之舊章故遣中臺近官迎置犒賜以旌茂功以慰劬勞恪領丹陽太守招撫山賊期歲盡降其人恪自領萬人餘分給諸將孫權嘉其功遣尚書僕射薛綜勞軍綜先移恪書云云綜字敬文仕吳為太子少傅答伏義書阮籍承音覽旨有心翰迹夫九蒼之髙迅羽不能尋其巔四溟之深幽鱗不能測其底矧無毛分所能論哉且玄雲無定體應龍不常儀或朝濟夕卷翕忽代興或泥潛天飛晨降宵升舒體則八維不足以暢迹促節則無間足以從容是又瞽夫所不能瞻璅蟲所不能解也然則𢎞修淵邈者非近力所能究矣靈變神化者非局器所能察矣何吾子之區區而吾真之務求乎人力勢不能齊好尚舛異鸞鳳凌雲漢以舞翼鳩鵷悅蓬林以翺翔螭浮八濵以濯鱗鱉娛行潦而羣逝斯用情谷從其好以取樂焉據此非彼胡可齊乎夫人之立節也將舒網以籠世豈樽樽以入罔方開模以範俗何暇毀質以適檢若良運未協神機無準則騰精抗志邈世髙超蕩晴舉於玄區之表攄妙節於九垓之外而翺翔之乘景躍踸踔陵忽慌從容與道化同逌逍遙與日月並流交名虛以齊變及英祗以等化上乎無上下乎無下居乎無室出乎無門齊萬物之去留隨六氣之虛盈總玄網於太極撫天一於寥廓飄埃不能揚其波飛塵不能垢其潔徒寄形軀於斯域何精神之可察雖業無不聞略無不稱而明有所逮未可怪也觀吾子之趨欲衒傾城之金求百錢之售制造天之禮擬膚寸之檢勞玉躬以役物守臊穢以自畢沈牛迹之浥薄愠河漢之無根其陋可愧其事可悲亮規略之懸踰信大道之𢎞幽且局步於常衢無為思逺以自愁比連疹憒力喻不多阮籍白嗣宗嘗著大人先生傳略云世之所謂君子惟法是修惟禮是克手執圭璧足履繩墨行欲為目前檢立欲為無窮則少稱鄉黨長聞鄰國上欲圖三公下不失九州牧獨不見羣蝨之處褌中逃乎深縫匿乎壞絮自以為吉兆也行不敢離縫際動不敢出褌襠是以為得繩墨也然炎丘火流焦邑滅都群蝨處乎褌中而不能出也君子之處域中何異夫蝨之處褌中乎此書不出此意與嵇茂齊書呂安昔李叟入秦及關而嘆梁生適越登嶽長謡夫以嘉遁之舉猶懷戀恨况乎不得巳者哉惟别之後離羣獨遊背榮宴辭倫好經逈路涉沙漠鳴雞戒旦則飄爾晨征日薄西山則馬首靡託尋歷曲直則沈思紆結乘髙逺眺則山川悠隔或乃回飈狂厲白日寢光﨑嶇交錯陵隰相望徘徊九臯之內慷慨重阜之巔進無所依退無所據涉澤求蹊披榛覔路嘯咏溝渠良不可度斯亦行路之艱難然非吾心所懼也至若蘭茞傾頓桂林移植根萌末樹牙淺弦急常恐風波潛駭危機密發斯所以怵惕於長衢按轡而嘆息者也又北土之性難以託根投人夜光鮮不按劍今將植橘柚於玄朔蒂華藕於修陵表龍章於裸壤奏韶武於聾俗固難以取貴矣夫物不我貴則莫之與莫之與則傷之者至矣飄颻逺遊之士託身無人之鄉總轡遐路則有前言之艱懸鞍陋宇則有後慮之戒朝霞啓暉則身披於遄征太陽戢曜則情劬於夕惕肆目平隰則遼廓而無覩極聽修原則淹寂而無聞吁其悲矣心傷悴矣然後乃知步驟之士不足為貴也若乃顧影中原憤氣雲踊哀物悼世激情風烈龍睇大野虎嘯六合猛氣紛紜雄心四據思躡雲梯橫奮八極披艱掃穢蕩海夷嶽蹴崑崙使西倒踏泰山令東覆平滌九區恢廓宇宙斯亦吾人之鄙願也時不我與垂翼遠逝鋒距靡加翅翮摧屈自非知命誰能不憤悒者哉吾子植根芳苑擢秀清流布葉華崖飛藻雲肆俯據潛龍之淵仰蔭遊鳳之林榮曜昡其前艷色餌其後良儔交其左聲名馳其右翺翔倫黨之間弄姿帷房之裏從容顧盻綽有餘裕俯仰吟嘯自以為得志矣豈能與吾同大丈夫之憂樂者哉去矣嵇生永離隔矣煢煢飄寄臨沙漠矣悠悠三千路難涉矣携手之期邈無日矣思心彌結誰云釋矣無金玉爾音而有遐心身雖胡越意在斷金各敬爾儀敦履璞沈繁華流蕩君子弗欽臨書悢然知復何云吕安字仲悌嵇蕃字茂齊時太祖逐安于遠郡在路作書與嵇康紹以安父與康同誅懼時所疾故移此書于趙景真考其始末是安所作故以安為定答車茂安書陸雲雲白前書未報重得來況知賢甥石季甫當屈鄮令尊堂憂灼賢姊涕泣上下愁勞舉家慘戚何可爾耶輒為足下具説鄮縣土地之快非徒浮言華艷而巳皆有實徵也縣去郡治不出三日直東而出水陸並通西有大湖廣縱千頃北有名山南有林澤東臨巨海往往無涯汜船長驅一舉千里北接青徐東洞交廣海物惟錯不可稱名遏長川以為陂燔茂草以為田火耕水種不煩人力決泄任意髙下在心舉鈒成雲下鈒成雨既浸既潤隨時代序也官無逋滯之榖民無飢乏之慮衣食常充倉庫恆實榮辱既明禮節甚備為君甚簡為民亦易季冬之月牧既畢嚴霜隕而蒹葭萎林鳥祭而罻羅設因民所欲順時遊獵結罝繞堽密罔彌山放鷹走犬弓弩亂發鳥不得飛獸不得逸真光赫之觀盤戲之至樂也若乃斷遏海浦隔截曲隈隨潮進退采蚌捕魚鱣鮪赤尾蜛齒比目不可紀名鱠鰡鰒炙鰶鯸蒸石首臛􅀢絮真東海之俊味肴膳之至妙也及其蚌蛤之屬目所希見耳所不聞品類數百難可盡言也昔秦始皇至尊至貴前臨終南退燕阿房離宫别館隨意所居沈綸涇渭飲馬昆明四方竒麗天下珍玩無所不有猶以不如吳會也鄉東觀滄海遂御六軍南巡狩登稽嶽刻文石身在鄮縣三十餘日夫以帝王之尊不憚爾行季甫年少受命牧民武城之歌足以興化桑弧蓬矢丈夫之志經營四方古人所嘆何足憂乎且彼吏民恭謹篤慎敬愛官長鞭朴不施聲教風靡漢吳以來臨此縣者無不遷變尊夫人賢姊上下當為喜慶歌舞相送勿為慮也足下急啓喻寬慰真説此意吾不虛言也停及不一一陸雲白困學紀聞云車永茂安外甥石季甫見使為鄮令茂安與士龍書云昨全伯始有一將來具説此縣既有短狐之疾又有沙􅪔害人聞此消息倍益憂慮足下可具示土地之宜企望來報雲答書云云茂安又答云即日得報輒于母前伏讀三周舉家大小豁然忘愁足下此書足為典誥雖山海經異物志二京南都殆不復過也愚謂士龍之書筆勢縱放可以補四明郡乘之遺故詳著之與桓祕書習鑿齒吾以去五月三日來達襄陽觸目悲感略無歡情痛惻之事故非書言之所能具也每定省家舅從北門入西望隆中想卧龍之吟東眺白沙思鳳雛之聲北臨樊墟存鄧老之髙南眷城邑懷羊公之風縱目檀溪念崔徐之友肆睇魚梁追二德之逺未嘗不徘回移日惆悵極多撫乘躊躇慨爾而泣曰若乃魏武之所置酒孫堅之所隕斃裴杜之故居繁王之舊宅遺事猶存星列滿目瑣瑣常流碌碌凡士焉足以感其方寸哉夫芬芳起於椒蘭清響生乎琳琅命世而作佐者必垂可大之餘風髙尚而邁德者必有明勝之遺事若向八君子者千載猶使義想其為人况相去之不逺乎彼一時也此一時也焉知今日之才不如疇辰百年之後吾與足下不並為景行乎鑿齒字彥威襄陽人桓袐字穆子溫之弟初鑿齒與其舅羅崇羅友俱為州從事及遷別駕以坐越舅右屢經陳請溫後激怒既盛乃超拔二舅相繼為襄陽都督出鑿齒為滎陽太守溫弟祕有才氣素與相親善鑿齒罷郡歸與祕書其風期俊邁如此與王僧虔書檀圭五常之始文武為先文則經緯天地武則撥亂定國僕一門雖謝文通乃忝武達羣從姑叔三媾帝室祖兄二世糜軀奉國而致子侄餓死草壤去冬今春頻荷二勑既無中人屢見蹉奪經涉五朔踰歷四晦書牘十二接覲六七遂不荷潤反更曝鰓九流繩平自不宜獨苦一物蟬腹龜腸為日已久飢虎能嚇人遽與肉餓麟不噬誰為落毛去冬乞豫章丞為馬超所爭今春蒙勑南昌縣為史偃所奪二子勳蔭人才有何見勝若以貧富相奪則分受不如雖孤微百世國士姻媾位宦亦不後物尚書同堂妹為江夏王妃檀圭同堂姑為南譙王妃尚書婦是江夏王女檀圭祖姑嬪長沙景王尚書伯為江州檀圭祖亦為江州尚書從兄出身為後軍參軍檀圭父釋褐亦為中軍參軍僕於尚書人地本懸至於婚宦不肯殊絶今通塞雖異猶參氣類尚書何事乃爾見苦泰始之初八表同逆一門二世粉骨衛主殊勳異績巳不能叨常階舊途復見侵抑檀圭字伯玉道濟之孫也僧虔元徽中為吏部尚書圭訴僧虔求祿不得遺書云云僧虔乃用為安成郡丞評曰如此筆亦復文通亦復飢虎登大雷岸與妹書鮑照吾自發寒雨全行日少加秋潦浩汗山溪猥至渡沂無邊險徑遊曰棧石星飯結荷水宿旅客貧辛波路壯濶始以今日食時僅及大雷塗登千里日踰十晨嚴霜慘節悲風斷肌去親為客如何如何向因涉頓慿觀川陸遨神清渚流睇方曛東顧五洲之隔西眺九𣲖之分窺地門之絶景望天際之孤雲長圖大念隱心者久矣南則積山萬狀爭氣負髙含霞飲景參差代雄凌跨長隴前後相屬帶天有匝橫地無窮東則砥原逺隰亡端靡際寒蓬夕卷古樹雲平旋風四起思鳥群歸靜聽無聞極視不見北則陂池潛演湖脈通連苧蒿攸積菰蘆所繁栖波之鳥水化之蟲智吞愚強捕小號噪驚䀨紛牣其中西則回江永指長波天合滔滔何窮漫漫安竭創古迄今舳艫相接思盡波濤悲滿潭壑煙歸八表終為野塵而是注集長寫不測修靈浩蕩知其何故哉西南望廬山又特驚異基壓江湖峯與辰漢連接上常積雲霞雕錦縟若華夕曜巖澤氣通傳明散綵赫似絳天左右青靄表裏紫霄從嶺而上氣盡金光半山以下純為黛色信可以神居帝郊鎮控湘漢者也若潨洞所積溪壑所射鼓怒之所豗擊湧澓之所宕滌則上窮荻浦下至狶洲南薄燕瓜北極雷澱削長埤短可數百里其中騰波觸天髙浪灌日吞吐百川寫泄萬壑輕煙不流華鼎振涾弱草朱靡洪漣隴蹙散渙長驚電透箭疾穹溘崩聚坻飛嶺覆回沫冠山奔濤空谷砧石為之摧碎崎岸為之􅕖落仰視大火俯聽波聲愁魄脅息心驚慓矣至於繁化殊育詭質怪章則有江鵝海鴨魚鮫水虎之類豚首象鼻芒鬚針尾之族石蟹土蚌燕箕雀蛤之儔折甲曲牙逆鱗返舌之屬掩沙漲被草渚浴雨排風吹潦弄翮夕景欲沈曉霧將合孤鶴寒嘯遊鴻遠吟樵蘇一嘆舟子再泣誠足悲憂不可説也風吹雷飈夜戒前路下弦內外望達所屆寒暑難適汝專自慎夙夜戒護勿我為念恐欲知之聊書所覩臨塗草蹙辭意不周明逺妹名令暉有文才能詩見鐘嶸詩品明逺嘗答孝武云臣妹才自亞左芬臣才不及太沖耳大雷在舒州望江縣水經注所謂大雷口也晉有大雷戍陳置大雷郡庾亮報溫嶠書無過雷池一步報羊希書周朗羊生足下豈當適使人進哉何卿才之更茂也宅生結意可復佳耳屬華比采何更工耶視已反覆慰亦無已觀諸紙上方審卿復逢知已動以何術而能每降恩明豈不為足下欣耶然更憂卿不知死所處耳夫胸奴之不誅有日皇居之亡辱舊矣天下孰不憤心悲腸以忿胡人之患靡衣偷食以望國家之師自智士鉗口雄人蓄氣不得議圖邊之事者良淹歲紀今天子以炎軒之德冢輔以姬吕之賢故赫然發怒將以胸奴釁旗惻然動仁欲使餘氓被惠及取士之令朝發宰士暮登英豪調兵之詔夕行主公旦升雄俊延賢人者固非一日况復加此焉夫天下之士砥行磨名欲不辱其志氣選竒蓄異將進善於所天非但有建國之謀不及安民之論不與至反以孝潔生議於鄉曲忠烈起謗於君寀身不絓王臣之籙名不厠通人之班顛倒國門湮銷丘里者自數十年以往豈一人哉若吾身無他伎而出值明君變官望主嵗增恩價竟不能柔心飾帶取重左右校於向士則榮巳多料於今識則笑亦廣而足下方復廣吾以馳志之時求豫以安邉之術何足下不知言也若以賢未登則今之登賢如此以才應進則吾之非才若是豈可欲以殞海之鬐望鼓鰓於豎鱗之肆墜風之羽覬振翮於軒毳之間其不能俱陪渌水並負青天可無待於明見若乃闕竒謀深智之術無悅主狎俗之能亦不可復稍為卿説但觀以上國再毁之臣望府一逐之吏當復是天下才否此皆足下所親知吾雖疲冗亦嘗聽君子之餘論豈敢忘之凡士之置身有三耳一則雲户岫寢欒危桂榮秣芝浮霜剪松沈雪憐肌蓄髓寶氣愛魂非但土石侯卿腐鴆粱錦實乃佇意天后睨目羽人次則刳心掃智剖命驅生橫議於雲臺之下切辭於宣室之上衍主德而批民患進貞白而鴆姦猜委玉入而齊聲禮揭金出而烹勍冦使車軌一風甸道共德令功日濟而巳無迹道日富而君難名致諸侯斂手天子改觀其末則饜􅏁而出望旃而入結冕兩宫之下鼓袖六王之間俯眉脅肩言天下之道德瞋目扼腕陳縱橫於四海理有泰則止而進調覺忤則反而還間居違官交造頓罷捐慕遺憂夷毀銷譽呼吸以補其氣繕嚼以輔其生凡此三者皆志士仁人之所行非吾之所能也若吾幸病不及死役不至身蓬藜既滿方杜長者之轍榖稼是咨自絶世豪之顧塵生牀帷苔積階月又簷中山木時華月深池上海草歲榮日蔓且室間軒左幸有陳書十篋席隅與右頗得宿酒數壺按絃拭徽讐方校石時復陳局露初奠爵星晚歡然不覺是羲軒後也近春田三頃秋園五畦若此無災山裝可具候振飲之罷俟封勒之畢當敬觀邠酆肅尋伊鄗傍眺燕隴邪履遼衛瓜見我周之軫迹弔他賢之憂天當其少涉未休此欲但理實詭固物好交加或徴勢而笑其言或觀謀而害其意夫楊朱以此猶見嗤於梁人况才滅楊子之器物甚魏君之意者哉若如漢宗之言李廣此固許天下之有才又知天下之時非也豈若黨巷閭里之間忌見貞士之遭遇便謂是臧獲庸人之徒耳士固願呈心於其主露竒於所歸卿相末事也若廣者何用侯為至乃復有致謁於為亂之日被訕於害正之徒心竒而無由露事直而變為枉豈不痛哉豈不痛哉若足下可謂冠負日月籍踐淵海心支身首無不通照今復出入燕河交關姬衛整笏振豪巳議於帷筵之上提鞭鳴劍復呵於軍埸之間身超每深恩之所集心動必明主之所亮可不直議正身輔人君之過誤明目張膽謀軍家之得失操志勇之將薦俊止之士此乃足下之所以報也不爾便擐甲修戈徘徊左右衛君王之身當馬首之鏑關必固之壘交死進之戰使身分而主豫冦滅而兵全此亦報之次也如是則繫胸奴於北闕無日矣亡但默默窺寵而坐謂子有心敢書薄意朗字義利為江夏王義恭太尉參軍朝議遣義恭出鎮彭城為北討大統朗聞解職希為府主簿與朗書戲之勸令獻竒進䇿朗報書援引古義辭意倜儻孝武即位朗以上書忤旨大明中丁母憂每哭必慟其餘頗不依居喪常節帝使有司奏其居喪無禮傳送寧州於道殺之答竟陵王書劉虬虬四節卧病三時營灌暢餘隂於山澤託暮情於魚鳥寧非唐虞重恩周召宏施虬進不研機入玄無洙泗稷館之辨退不凝心出纍非冢間樹下之節遠澤既灑仁規先著謹收樵牧之嫌敬加軾蛙之義虬字靈預少抗節好學須得祿便隱宋泰始中仕至晉平王驃騎記室當陽令罷歸永明三年徴為通直郎不就竟陵王致書虬答云云精信釋氏衣粗布禮佛長齋以江陵西河州去人遠乃居之建武二年冬正晝有白雲徘徊簷户之間又有香氣磬聲其日卒為庾杲之與劉居士虬書任昉自别荆南迄將二紀杲之牽滯形有推遷物役丈人沒志外身超然獨善雖心懸咫尺而事阻山河悠悠白雲依然有道金涼佇運想恆納宜沖明在襟履候無爽體道為用蹈理則和杲之牽綴疲朽愧心巳多訪德則山林窅然觀道則風雲自逺歲暮之期指塗衡嶽神虛氣懋無待怡和江湖相望安事行李司徒竟陵王茂於神者言象所絶接乎士者遐邇所宗鐘石非禮樂之本纓褐豈朝野之謂想暗投之懷不以形體為阻一日通籍梁邸親奉話言夢想清塵為歲巳積以大人非羔雁所榮故息蒲幣之典勝寄冥運諒有風期之遲君王卜居郊郭縈帶川阜顯不絢功晦不標迹從容乎人野之間以窮二者之致且𢎞護為心廣孚真俗思聞繫表共剖衆妙皆式筵山阿虛館川涘實望賁然少酬側遲昔東平樂善旌君夫於東閣今王愛素致吾子於西山豈不盛歟百齡飄驟凝滯自物千載一朝為仁由已且凌雪戒塗非滅迹之郊鴻鐘在御豈銷聲之道巳標異人之迹故有同物之勞夫山水無情應之以會愛間在我觸目蕭條衡嶽何親鍾嶺何薄想𢎞思有在不俟繁言杲之字景行清貧自業食惟有韭葅瀹韭生韭雜菜任昉嘗戲曰誰謂庾郎貧食鮭嘗有二十七種嘗對魏使使問曰百姓那得家家題門帖賣宅答曰朝廷既欲掃蕩京洛尅復神州所以家家賣宅耳與陳伯之書邱遲遲頓首陳將軍足下無恙幸甚幸甚將軍勇冠三軍才為世出棄燕雀之小志慕鴻鵠以髙翔昔因機變化遭遇明主立功立事開國稱孤朱輪華轂擁旄萬里何其壯也如何一旦為奔亡之虜聞鳴鏑而股戰對穹廬以屈膝又何劣耶尋君去就之際非有他故直以不能內審諸已外受流言沈迷猖獗以至于此聖朝赦罪責功棄瑕録用推赤心于天下安反側于萬物此將軍之所知不假僕一二談也朱鮪涉血于友于張繡剚刃于愛子漢主不以為疑魏君待之若舊况將軍無昔人之罪而勳重於當世夫迷途知反往哲是與不遠而復先典攸髙主上屈法申恩吞舟是漏將軍松柏不翦親戚安居高臺未傾愛妾尚在悠悠爾心亦何可言今功臣名將雁行有序佩紫懷黃讚帷幄之謀乘軺建節奉疆埸之任並刑馬作誓傳之子孫將軍獨靦顔借命馳驅氈裘之長寧不哀哉夫以慕容超之強身送東市姚泓之盛面縛西都故知霜露所均不育異類姬漢舊邦無取雜種北虜僭盜中原多歷年所惡積禍盈理至燋爛況偽嬖昏狡自相夷戮部落携離酋豪猜二方當繫頸蠻邸懸首藁街而將軍魚遊於沸鼎之中燕巢於飛幕之上不亦惑乎暮春三月江南草長雜花生樹羣鶯亂飛見故國之旗鼓感生平於疇日撫弦登陴豈不愴悢所以亷公之思趙將吳子之泣西河人之情也將軍獨無情哉想早勵良規自求多福當今皇帝盛明天下安樂白環西獻楛矢東來夜郎滇池解辮請職朝鮮昌海蹶角受化惟北狄野心倔強沙塞之間欲延歲月之命耳中軍臨川殿下明德茂親總兹戎重弔民洛汭伐罪秦中若遂不改方思僕言聊布往懷君其詳之伯之故齊將也梁武起兵説降之建康平使鎮江州别駕鄧繕等恣行姦利武帝遣人代之伯之不奉詔繕勸伯之反兵敗遂降魏天監四年臨川王宏北侵命邱遲與之書伯之擁衆八千來降復用為平北將軍永新縣侯伯之不知書得文牒惟作大諾不知此書何以得解當是幕中有人然如此書正可使頑石點頭與尚書令王儉書張充吳國男子張充致書於琅琊王君侯侍者頃日路長愁霖韜晦涼暑未平想無虧攝充幸以漁釣之間鎌採之暇時復以卷軸自娛逍遙前史從橫萬古動默之路多端紛綸百年升降之徒不一故以圓行方止用之異也金剛水柔性之别也善御性者不違金石之質善為器者不易方圓之用所以北海挂簪帶之髙河南降璽言之貴充生平少偶不以利欲干懷三十六年差得以棲貧自淡介然之志峭聳霜崖確乎之情峰橫海岸彯纓天閣既謝廊廟之華綴組雲臺終慙衣冠之秀所以擯迹江臯徉狂隴畔者實由氣岸踈凝情塗狷隔獨師懷抱不見許於俗人孤秀神崖每邅回於斯世故君山直上蹙壓於當年叔陽敻舉􅀈􅀈乎千載充所以長羣魚鳥畢影松阿半頃之田足以輸稅五畝之宅樹以桑麻嘯歌於川澤之間諷詠於澠池之上泛濫於漁父之遊偃息於卜居之下如此而巳充何識焉若夫驚巖罩日壯海逢天竦石崩尋分危落仞桂蘭綺靡叢雜於山幽松柏森隂相繚於澗曲元卿於是乎不歸伯休亦以兹長往若乃飛竿釣渚濯足滄洲獨浪煙霞髙卧風月悠悠琴酒岫逺誰來灼灼文談空罷方寸不覺鬱然千里路阻江川每至西風何嘗不眷聊因疾隙略舉諸襟持此片言輕枉髙聽丈人歲路未強學優而仕道佐蒼生功橫海望入廟則協長倩之誠出議則抗仲子之節可謂盛德維時孤松獨秀者也素履未詳斯旅尚眇茂陵之彥望冠蓋而長懷霸山之氓佇衣車而聳歎得無惜乎若鴻裝撰御鶴駕軒空則岸不辭枯山被其潤竒禽異羽或巖際而逢迎弱霧輕煙乍林端而菴藹東都不足竒南山豈為貴充昆西之百姓岱表之一民蠶而衣耕且食不能事王侯覔知己造時人騁遊説蓬轉於屠博之間其歡甚矣丈人早遇承華中逢崇禮肆上之眷望溢於早辰鄉下之言謬延於造次然舉世皆謂充為狂充亦何能與諸君道之哉是以披聞見掃心胸述平生論語默所以通夢交魂推襟送抱者其惟丈人而已關山敻阻書罷莫因儻遇樵者妄塵執事充字延符緒之子少好逸遊緒嘗歸至吳逢充獵右臂鷹左牽狗遇緒船至放紲脫鞲拜于水次緒曰一身兩役無乃勞乎充跪曰充聞三十而立今充二十九矣請至來歲及明年便修改多所該通歷尚書殿中郎時尚書令王儉方聚親賔充縠巾葛帔至便求酒言論放逸及聞武帝欲以緒為尚書僕射儉執不可充愠與儉書云云儉以書示緒緒杖之百御史中丞到撝奏免官久之為司徒咨議參軍遷義興太守為政清靜梁臺建以為大司馬咨議參軍天監初為吏部尚書居選以平允稱遷國子祭酒登臺講説皇太子皆出聽出為吳郡太守下車恤貧老故舊莫不欣悅卒諡曰穆與荆州隱士劉虬書蕭子良玉燭登年金商在律炎涼始貿動靜惟安勤味道腴幸遵雅尚豈不樂哉僕誠幸甚百姓一心衆生不疾比屋可封將又何求但良書獨擁善談無析願言之子實痗我心所以不遠千里尺書道意自淳清既辨澆漓代襲隱顯之術參差默語之途紛互或飾智以警愚或激情以悟俗或穢巳以暗通或謬歌以明道屠羊駔馬未足磷其堅佯狂如愚豈能緇其白官楚蕃魏人外之氣逾邈入漢遊梁區中之韻彌少及權其輕重品其得失則淵懷洞賞寧或符之僕夙養間襟長慕出槩迹塵圭組心逸江湖未面自親聞風如舊而回駕之念徒軫式閭之禮無階固巳佇軸深𠂻傾筐遐路者矣君矯然獨逺確乎難拔素志與白雲同悠髙情與青松共爽宣習質文緇林枯而重䓲昭辨空有連河壅而復滔所謂忘言之人可論天人之際豈能鳳舉鶴翻有心儀萃髙踰愛海比䇿禪衢沾濠射之冥遊屈祗鷲之法侣闡三乘於窮子發二諦於困蒙有是因也何其暢歟今皇風具穆至道𢎞被四海不溢五嶽無塵膠序肇修經法敷廣人賤璣璜家習禮讓樵蘇必時郊林全鬱罿綱有節鱗羽偕翔至於層山絶澗環帶畿畎膏田沃野亘望無纒信可以招往隱淪栖集勝寄故文舉築室冶城之阿次宗植木西山之麓葛洪考槃於海岫釋逺肥遁於鍾幽每踐其遺蹤輒深九原之歎若髙步可遷復何懷乎四子昔宣尼之見伯雪師利之往維摩豈不知相忘之道哉諒有以也未敘之間為道自愛一二令凌琚之口具子良字靈英武帝第二子少有清尚禮才好士天下才學皆遊集焉嘗密啓請原除逋租寬刑恤役武帝不豫遺詔使子良輔太孫明帝知尚書事子良素仁厚不樂時務乃推明帝詔云事無大小與鸞參懷隆昌元年薨年三十五噫如子良者可謂有子臧之節矣與交友論隱書江淹淹者海濵窟穴弋釣為伍自度非竒力異才不足聞見於諸侯每承梁伯鸞卧於會稽之墅髙伯達坐於華隂之山心常慕之而未能及也嘗感子路之言不拜官而仕無青組紫紱龜紐虎符之志但欲史厯巫卜為世俗賤事耳而彯然十載竟不免衣食之敗何則性有所短不可韋弦者有五一則體本疲緩卧不肯起二則人間應修酷懶作書三則賔客相對口不能言四則性甚畏動事絶不行五則愚婞妄發輒被口語有五短而無一長豈可處人間耶知短而不可易者所謂輪椎分定也猶如雞鶩之有毛不能得鸞鳳之光彩矣況今年巳三十白髮雜生長夜輾轉亂憂非一以溘至之命如星殞天促光半路不攀長意徒自欺取筋駑髓冷殊多災恙心頑質堅偏好冥默既信神農服食之言久固天竺道士之説守清淨煉神丹心甚愛之行善業度一世意甚美之今但願拾薇藿誦詩書樂天理性斂骨折步不踐過失之地耳猶以妻孥未奪桃李須隂望在五畝之宅半頃之田鳥赴簷上水匝階下則請從此隱長謝故人若乃登峨眉度流沙飱金石讀仙經嘗聞其驗非今日之所言也誰謂難知青鳥明之貴布筆墨然亦焉足道哉文通自敘及此二書皆間退止足之語雖仕宦終身其素心微尚可想而知也晚節委蛇自食其報較之沈范何啻霄壤報袁叔明書江淹僕知之矣髙臯為别執手未期浮雲色曉悵然魂飛前辱贈書知命僕息心越地採藥稽山友人幸甚去歲迫名茂才冬盡不獲有報引領於邑情詎可及足下推僕者不一二談也僕聞狂士之行有三竊嘗志之其竒者則以紫天為宇環海為池裸身大笑被髮行歌其次則堅坐崩岸僵臥深窟朝餐松屑夜誦仙經其下則辭榮城市退耕巖谷塞徑絶賔杜牆不出然者皆羞為西山之餓夫東國之黜臣而況其鄉黨乎或有社稷之士入而忘歸則爭論南宫之前衛主於邪伏身北闕之下納君於治至乃一説之竒驚畏左右一劍之功震栗鄰國夫能者惟橫議漢庭怒髮燕路且猶不數而況於鄰里乎若僕之行止巳無可言矣材不肖文質無所直徒以結髮遊學備聞士大夫言曰在國忠處家孝取與亷交友義故拂衣於梁齊之館抗手於楚趙之門且十年矣容貌不能動人智謀不足自逺竟慙君子之恩卒離飢寒之禍近親不言左右莫教涼秋隂隂獨立間館輕塵入戶飛鳥無迹命保琴書而守妻子其可得哉故國史小官也而子常為之執戟下位也而子雲居之僕非有輕車驃騎之略交河雲險之功幸以盜竊文史之末因循卜祝之間故俯首求衣斂眉寄食耳若十口之𨽻去於飢寒從疾舊里斥歸故鄉箕坐髙視舉酒極望雖五侯交書羣公走幣僕亦在南山之南矣此可為智者道難與俗士言也方今仲秋風飛平原飄色水鳥立於孤洲蒼葭變於河曲寂然淵視憂心辭矣獨念賢明早世英華殂落僕亦何人以堪久長一旦松柏被地墳壟刺天何時復能銜杯酒者乎忽忽若狂願足下自愛也袁炳字叔明陳郡陽夏人歷國常侍員外郎府功曹臨湘令卒年二十八有傳在文通集與何胤書昭明太子園公道勝漢盈屈節春卿明經孝莊北面况乃義兼乎此而顧揆不肖哉但經途千里眇焉莫因何嘗不夢姑胥而鬱陶想具區而杼軸心往形留於茲有年載矣方今朱明受謝清風戒寒想攝養得宜與時休適耽精義味玄理息囂塵玩泉石激揚碩學誘接後進志與秋天競髙理與春泉爭溢樂可言乎樂可言乎豈與口厭芻豢耳聆絲竹之娛者同年語哉方今泰階端平天下無事修日養夕差得從容每鑽閲六經泛濫百氏研尋物理領略清言既以自慰且以自警而才性有限思力匪長熱疾憤其神風眩弊其體多慙過目釋卷便忘是以蒙求之懷於茲彌軫答湘東王求文集詩苑書昭明太子得疏知須詩苑英華及諸文製發函伸紙閲覽無輟雖事涉烏有義異擬倫而清新卓爾殊為佳作夫文典則纍野麗則傷浮能麗而不浮典而不野文質彬彬有君子之致吾嘗欲為之但恨未遒耳觀汝諸文殊與意會至於此書彌見其美遠兼邃古傍槩典墳學以聚益居焉可賞吾少好斯文迄茲無倦談經之暇斷務之餘陟龍樓而靜拱掩鶴關而髙卧與其飽食終日寧遊思於文林或日因陽春具物韶麗樹花發鶯鳴和春泉生暄風至陶嘉月而熙遊藉芳草而眺矚或朱炎受謝白藏紀時玉露夕流金風時扇悟秋士之心登髙而逺託或夏條可結倦於邑而屬詞冬雪千里覩紛霏而興咏密親離則手為心使昆弟宴則墨以硯露又愛賢之情與時而篤冀同市駿庶匪畏龍不追子晉而事似洛濵之遊多愧子桓而興同漳川之賞漾舟玄圃必集應阮之儔徐輪博望亦招龍淵之侣校核仁義源本山川旨酒盈罍嘉肴益俎曜靈既隱繼之以朗月髙舂既夕申之以清夜並命連篇在兹彌博又往年因暇搜採英華上下數十年間未易詳悉猶有遺恨而其書巳傳雖未為精核亦粗足諷覽集乃不工而並作多麗汝既須之皆遣送也某啓太子嘗使劉孝綽撰録文集為十卷隋經籍志云古今詩英華十九卷梁昭明太子撰與蕭臨川書梁簡文帝零雨送秋輕寒迎節江楓曉落林葉初黃登舟巳積殊足勞止解維金闕定在何日八區內侍厭直御史之廬九棘外府且息官曹之務應分竹南川剖符千里但黑水初旋未申十千之飲桂宫既啓復乖雙闕之宴文雅縱橫即事分阻清夜西園眇然未尅想征艫而結歎望桂席而霑襟若使𢎞農書疏脫還鄴下河南口占儻歸鄉里必遲青泥之封且覯朱明之詩白雲在天蒼波無極瞻之岐路眷慨良深愛護波潮敬朂光彩胡孝轅云書記洞詮云蕭子顯宗正卿為臨川內史子雲太府卿為臨川內史未定為何今考中大通二年帝以雍州刺史徴為揚州刺史三年立為皇太子子雲則以是年出為臨川內史故書云黑水初旋未申十千之飲桂宫既啓復乖雙闕之宴尚書黑水惟雍州漢書孝成皇帝元帝太子也初居桂宫若子顯則先子雲為臨川帝為太子時巳歷侍中國子祭酒矣答張纘謝示集書梁簡文帝綱好文章於今二十五載矣竊嘗論之日月參辰火龍黼黻尚且著於玄象章乎人事而况文辭可止詠歌可輟乎不為壯夫楊雄實小言破道非謂君子曹植亦小辨破言論之科刑罪在不赦至如春庭落景轉蕙承風秋雨且晴簷梧初下浮雲生野明月入樓時命親賔乍動嚴駕車渠屢酌鸚鵡驟傾伊昔三邊久留四戰胡霧連天征旗拂日時聞塢笛遙聽塞笳或鄉思悽然或雄心憤薄是以沈吟短翰補綴庸音寓目寫心因事而作答定襄侯餉卧簟書梁簡文帝筠篁多品篠簜雜名校色比竒獨此為貴自含蒼紫似久暴於柯亭乍舒黝素若屢沾於湖水三伏餘炎九折成用便可旅食南館髙卧北窗答南平嗣王餉舞簟書梁簡文帝濯龍之木文罽飾壇淮南之臺紫羅為薦未若五離九折出桃枝之翠筍綺爛霞舒制雲母之修竹南湘點淚喻此未竒東宫赤花擬之非妙答蕭子雲上飛白書屏風書梁簡文帝得所送飛白書縑屏風十牒冠六書而獨美超二篆而擅竒乍寫星區時圖鳥翅非觀觸石巳覺雲飛豈待金璫便覩蟬翼間諸衣帛前哲未巧懸彼帳中昔賢掩色答新渝侯和詩書梁簡文帝垂示三首風雲吐於行間珠玉生於字裏跨躡曹左含超潘陸雙鬢向光風流巳絶九梁插花步搖為古髙樓懷怨結眉表色長門下泣破粉成痕復有影裏細腰令與真類鏡中好面還將畫等此皆性情卓絶新致英竒故知吹簫入秦方識來鳳之巧鳴瑟向趙始覩駐雲之曲手持口誦喜荷交并也與湘東王論文書梁簡文帝吾輩亦無所遊賞止事披閲性既好文時復短詠雖是庸音不能閣筆有慙伎癢更同故態比見京師文體懦鈍殊常競學浮疏爭為闡緩玄冬修夜思所不得既殊比興正背風騷若夫六典三禮所施則有地吉凶嘉賔用之則有所未聞吟咏情性反擬內則之篇操筆寫志更摹酒誥之作遲遲春日翻學歸藏湛湛江水遂同大傳吾既拙於為文不敢輕有掎托但以當世之作歷方古之才人逺則楊馬曹王近則潘陸顔謝而觀其遣辭用心了不相似若以今文為是則古文為非若昔賢可稱則今體宜棄俱為盍各則未之敢許又時有效謝康樂裴鴻臚文者亦頗有惑焉何者謝客吐言天拔出於自然時有不拘是其糟粕裴氏乃是良史之才了無篇什之美是為學謝則不屇其精華但得其冗長師裴則蔑絶其所長惟得其所短謝故巧不可階裴亦質不宜慕故胸馳臆斷之侣好名忘實之類方分肉於仁獸逞郤步於邯鄲入鮑忘臭效尤致禍決羽謝生豈三千之可及伏膺裴氏懼兩唐之不傳故玉徽金銑反為拙目所嗤巴人下里更合郢中之聽陽春髙而不和妙聲絶而不尋竟不精討錙銖核量文質有異巧心終愧妍手是以握瑜懷玉之士瞻鄭邦而知退章甫翠履之人望蠻鄉而歎息詩既若此筆又如之徒以煙墨不言受其驅染紙札無情任其搖襞甚矣哉文之橫流一至於此至如近世謝朓沈約之詩任昉陸倕之筆斯實文章之冠冕述作之楷模張士簡之賦周升逸之辨亦成佳手難可復遇文章未墜必有英絶領袖之者非弟而誰每欲論之無可與語思言子建一共商榷辨茲清濁使如涇渭論兹月旦類彼汝南朱丹既定雌黃有别使夫懷鼠知慙濫竿自恥譬斯袁紹畏見子將同彼盜牛遙羞王烈相思不見我勞如何永明中王融謝朓沈約文章始用四聲以為新變至是庾徐父子轉拘聲韻彌為麗靡簡文論及之此依梁書本續文選依南史比此少數語古諺有云山川而能語葬師食無所肺腑而能語醫師色如土此書煙墨一聨實用此答齊國餉雙馬書梁元帝名重桂條形圖柳谷襄陽地穴近求未易滇池水裏逺訪猶難價匹龍媒聲齊驥子河精曜采似伏波之鑄銅震象飛文笑東瀛之刻玉加以控斯銀勒利此金銜鞍揭鏤衢光含兩月纒縈紫縷色麗雙絲方嗤晉后恆乘鄭國之駟更鄙曹君經餉蜀王之馬胡孝轅云齊興值梁季嵗元帝承制江陵稱臣於齊至承聖二年始講敵國交聘之禮與武陵王書梁元帝皇帝敬問假黃鉞太尉武陵王自九黎侵軼三苗冦擾天常喪亂獯醜憑陵虔劉象魏黍離王室朕枕戈東下泣血西浮殞愛子於二方無諸侯之八百身被屬甲手貫流矢俄而風樹之酷萬恨始纒霜露之悲百憂繼集叩心飲膽志不圖全直以宗社綴旒鯨鯢未剪嘗膽待旦龔行天討獨運四聰坐揮八柄雖復結壇待將褰帷納士拒赤壁之兵無謀於魯肅燒烏巢之米不妨於荀攸才智將殫金貝殆竭傍無寸助險阻備嘗遂得斬長狄於駒門挫蚩尤於楓木怨恥既雪天下無塵經營四方專資一力方與嶽牧同兹清靜隆暑炎赫弟比如何文武具僚當有勞弊今遣散騎常侍光州刺史鄭安忠指宣往懷又與武陵王書梁元帝甚苦大智季月煩暑流金鑠石聚蚊成雷封狐千里以兹玉體辛苦行陳乃眷西顧我勞如何自獯醜憑陵羯胡叛涣吾年為一日之長屬有平亂之功膺此樂推事歸當璧儻遣使乎良所遲也如曰不然於此投筆友于兄弟分形共氣兄肥弟瘦無復相見之期讓棗推梨長罷歡愈之日上林靜拱聞四鳥之哀鳴宣室披圖嗟萬始之長逝心乎愛矣書不盡言武陵王紀武帝第八子帝特愛之以為都督益州刺史曰天下方亂惟益州可免故以處汝帝崩紀稱帝於蜀元帝再與紀書又遣人喻意許其專制岷方紀報如家人禮巳而兵屢敗遣使論和元帝不許樊猛獲紀紀曰卿送我一見七官猛曰天子何由可見并其子殺之大智武陵小字也每覽蕭氏自相屠僇輒為酸鼻當時諸人若不著天子癖於胸中不失為長安布衣也答謝中書書陶𢎞景山川之美古來共談髙峯入雲清流見底兩岸石壁五色交暉青林翠竹四時俱備曉霧將歇猿鳥亂鳴夕日欲頽沈鱗競躍實是欲界之仙都自康樂以來未復有能與其竒者答虞仲書陶𢎞景棲六翮於荆枝望綺雲於青漢者有日於兹矣而春華來被草石開鮮辭動情端志交襟曲信知鄰德之談無虛往牘夫子雖迹躔朱閣而心期岱嶺豈但散髮乎髙岫似將飛霜於絶谷良為欽哉野人幸得託形崇阜息影長林每對月流歎臨風軫慨徒事纍可豁而髮容難待自非齊生死於一致者孰不心熱者乎舉世悠悠孰云同此儻遇知己相與共憂朅來虞公兹焉可邁何為栖栖空勞鼓缶逮及暇日有事還童不亦皎潔當年而無忸前修也與何胤論止殺書周顒丈人所以未極遐蹈惑在於不全菜耶挫折之升鼎俎網罟之興載册其來實逺誰敢干議觀聖人之設膳羞乃復為之品節蓋以茹毛飲血與生民共始縱而勿裁將無崖畔善為士者豈不以恕己為懷是各靜封疆罔相陵轢况乃變之大者莫過死生生之所重無過性命性命之於彼極切滋味之於我可賒而終身朝晡資之以永歲彼就怨酷莫能自伸我業長久吁哉可畏且區區微卵脆薄易矜歂彼弱麑顧步宜愍觀其飲啄飛沈使人憐悼况可甘心撲搋加復恣意吞嚼乃至野牧成羣間豢重圈量肉揣毛以俟支剝如土委地僉謂常理可為愴息事豈一途若云三世理誣則幸矣良快如使此道果然而受形未息一往一來生死常事雜報如家人天如客過客日少在家日多吾修信業未足常免則傷心之慘行亦自念丈人於血氣之類雖不身殘至於晨鳬夜鯉不能不取備屠門財貝之一經盜手猶為亷士所棄生性之一啓鸞刀寧復慈心所忍騶虞雖飢非自死之草不食聞其風豈不使人多愧恥顒字彥倫晉左光祿顗七世孫也解褐肥鄉成都二縣令仍為府主簿時宋明帝頗好玄理以顒有辭義引入殿內親近宿直元徽中詔為剡令有恩惠百姓思之泛涉百家長於佛理於鍾山西立隱舍休沐則歸之每賓友會問虛席晤語辭韻如流聽觀者忘倦清貧寡欲終日長蔬雖有妻子獨處山舍初何胤侈於味食必方丈後稍去其甚者猶食白魚鱔脯糖蟹顒遺書云云胤末年遂絶血味與何炯書王僧孺近别之後將隔暄寒思子為勞未能忘弭昔李叟入秦梁生適越猶懷悵恨且或吟謡况岐路之日將離嚴網辭無可憐罪有不測蓋畫地刻木昔人所悲叢棘既纍於何可聞所以握手戀戀離别珍重弟愛同鄒季淫淫承睫吾猶復抗手分背羞學婦人素鐘肇節金飈戒序起居無恙動靜履宜子雲筆札元瑜書記信用既然可樂為甚且使目明能袪首疾甚善甚善吾無昔人之才而有其病癲眩屢動消渴頻增委化任期故不復呼醫飲藥但恨一旦離大辱蹈明科去皎皎而非自汙抱鬱結而無誰告丁年蓄積與此銷亡徒竊髙價厚名橫叨公器人爵智能無所報筋力未之酬所以悲至撫膺泣盡而繼之以血顧惟不肖文質無所底蓋困於衣食迫於飢寒依隱易農所志不過鍾庾久為尺板斗食之吏以從皂衣黑綬之役非有竒才絶學雄略髙謨吐一言可以匡俗振民動一議可以固邦興國全璧歸趙飛矢救燕偃息藩魏甘卧安郢腦日逐髓月支擁十萬而橫行提五千而深入將能執圭裂壤功勒景鐘錦繡為衣朱丹被轂斯大丈夫之志非吾曹之所能及巳直以章句小才蟲篆末藝含吐緗縹之上翩躚樽俎之側委曲同之針縷繁碎譬之米鹽孰致顯榮何能至到加性疏澀拙於進取未嘗去來許史遨遊梁竇俯首脅肩先意承旨是以三葉靡遘不與運并十年未徙孰非能薄及除舊布新清晷方旦抱樂銜圖訟謳有主而猶限一吏於岑石隔千里於泉亭不得奉板中涓預衣裳之會提戈後徑厠龍豹之謀及其投劾歸來恩均舊隸升文石登玉陛一見而降顔色再覩而接話言非藉左右之容無勞羣公之助又非同席共研之夙逢笥餌巵酒之早識一旦陪武帳仰文陛備𥅆佚之柱下充嚴朱之席上入班九棘出專千里據操撮之雄官參人倫之顯職雖古之爵人不次取士無名未有踰景追風奔驟之若此者也蓋基薄牆髙途遙力躓傾蹶必然顛匐可俟竟以福過災生人指鬼瞰將均宥器有驗傾巵是以不能早從曲影遂乃取疑邪徑故司𨽻凛凛思得應弦譬縣厨之獸如離繳之鳥將充庖鼎以餌鷹鸇雖事異鑽皮文非刺骨猶復因兹舌杪成此筆端上可以投畀北方次可以論輸左校變為丹赭充彼舂薪幸聖主留善貸之德紆好生之施解網祝禽下車泣罪愍兹奊詬憐其觳觫加肉朽胔布葉枯株輟薪止火得不銷爛所謂還魂斗極追氣泰山止復除名為民幅巾家巷此五十年之後人君之賜焉木石感隂陽犬馬識厚薄員首方足孰不戴天而竊自有悲者蓋士無賢不肖入朝見嫉女無美惡入宫見妬家貧無苞苴可以事朋類惡其鄉原恥彼戚施何以從人何以徇物外無奔走之友內乏強近之親是以構市之徒隨相媒孽及一朝捐棄以快怨者之心呼悲可矣蓋先貴後賤古富今貧季倫所以發此哀音雍門所以和其悲曲又迫以嚴秋殺氣具物多悲長夜展轉百憂俱至况復霜銷草色風搖樹影寒蟲夕呌合輕重而同悲秋葉晚傷雜黃紫而俱墜蜘蛛絡幕熠耀爭飛故無車轍馬聲何聞鳴雞吠犬俯眉事妻子舉手謝賓遊方與飛走為鄰永用蓬蒿自沒愾其長息忽不覺生之為重素無一㕓之田而有數口之纍豈曰匏而不食方當長為傭保糊口寄身溘死溝渠以實螻蟻悲夫豈復得與二三士友抱接膝之歡履足差肩摛綺縠之清文談希微之道德惟吳馮之遇夏馥范彧之值孔嵩愍其留賃憐此行乞耳儻不以垢纍時存寸札則雖先犬馬猶松喬焉去矣何生髙樹芳烈裁書代面筆淚俱下僧孺東海郯人梁武帝嘗問以妾媵之數對曰臣室無傾視及在南徐州友人以妾寓之行還妾懷妊為王典籤所糾逮詣南司坐免官久之不調友人何炯猶為王府記室僧孺乃與炯書以見意炯胤之從弟父喪藉地腰腳虛腫醫勸服豬蹄湯炯以有肉味不肯服遂以毀卒答江琰書王僧孺猥惠嘉音用蠲疾首發函伸紙朗若披雲等嶰谷之清音比洞庭之髙曲辭則美矣而擬其非倫譬享海鳥以醇醪嘉膳棲林狖以崇楹曾栱茍非其實立有驚怖况復以一離斥棄賓實漼然豈復能使一笥可輕八厨斯引且登清漢乍棄黃汙望影折支爭塗再楫其或蹲林卧石籍卉班荆不過田畯野老漁父樵客酌醴焚枯嗚嗚相勞羮藜含糗果然滿腹寧有幡旗貴客車馬大賔獻書盡先賢之德作頌罄前皇之美豈不俯拾青紫坐享大夫况復咏髙梧而賦修竹背清淮而遊長苑留東閣以從容登石室而髙視豈與夫身沒名隕同年而共毀譽哉答劉之遴借類苑書劉峻九冬有隟三餘暇時多遊書圃代樹萱蘇若夫采亹亹於湘紈閲微言於殘竹嗢飫膏液咀嚼英華不知地之為輿天之為蓋靡測回塘莫辨輿馬烏足以言乎是用周流墳索詳觀圖牒搦管聨册纂兹英竒蛩蛩之謀止於善草周周之計利在銜翼故鳩集斯文蓋自綴其漏耳豈冀藏山之名播於士大夫哉初劉峻為安成王戶曹參軍使撰類苑一百二十卷武帝惡峻命學士撰華林類略以髙之之遴字思貞虬之子好屬文多學古體元帝嫉其才密送藥殺之乃自製志銘厚其賻贈與宋玉山元思書劉峻驅馬金張之館飛蓋許史之廬習匡鼎之説詩騁谷雲之雕篆賓徒波湧輿輪靡息當是時也樂可言哉然靜思夫君愀焉軫歎何則方鑿圓枘鉏鋙難從翔鳥遊魚蹉跎不狎是以賈生懷琬琰而挫翮馮子握璵璠而鎩羽天誕英逸獨擅民秀心貞筠箭德潤圭璋信人之水鏡一性之鎔範而荆南雄曲髙音鮮和河西名驥滅沒誰賞故若先生者進有三難退有三樂竊觀先生未能鴻翔鸞起騰霞躋漢將由囿空桑麻田無負郭俯眉翕肩以斯故爾今賢弟賓從抗鱗奮翼或衣繡江塘或鳴騶洛渚連騎方驅擊鐘乃食蕚跗若是吾子復何憂哉惟當纂兩仲之微迹襲二疏之風流生與漁父同嬉死葬要離墓側金石可碎聲華無寂斯道坦坦先生幸其朂與劉峻字孝標少與母兄俱被掠至魏與母並出家既而逺俗自課讀書魏孝文盡選物望江南人士有才學者咸見申擢峻兄弟不蒙選授齊永明中俱奔江南兄孝慶以應梁武歷官顯重峻獨所向坎壈梁武嘗與臣下䇿錦被事咸言巳盡試呼峻峻疏十餘事帝護前遂惡之乃著辨命論以寄懷晚居東陽紫巖山卒門人諡曰玄靖先生追答劉沼書劉峻劉侯既重有斯難值豫有天倫之戚竟未之致也尋而此君長逝化為異物緒言餘論蘊而莫傳或有自其家得而示余者余悲其音徽未沫而其人巳亡青簡尚新而宿草將列泫然不知涕之無從也雖隙駟不留尺波電謝而秋菊春蘭英華靡絶故存其梗槩更酬其旨若使墨翟之言無爽宣室之談有徴冀東平之樹望咸陽而西靡蓋山之泉聞絃歌而赴節但懸劍空壠有恨如何峻既著辨命論中山劉沼致書難之凡再反峻並為申析會沼卒不見峻後報者峻乃為書以序其事劉沼字明信博學善屬文終秣陵令北使還與永豐侯書劉潛足踐寒地身犯朔風暮宿客亭晨炊謁舍飄颻辛苦迄屇氊鄉雜種覃化頗慕中國兵傳李緒之法樓擬衛律所治而毳幕難淹酪漿易厭王程有限時及玉關射鹿胡奴乃共歸國刻龍漢節還持入塞馬銜苜蓿嘶疑故墟人獲蒲萄歸種舊里稚子出迎善鄰相勞倦握蟹螯亟覆蝦碗未改朱顔略多自醉用此終日亦以自娛周書蕭撝字智遐在梁封永豐侯南史武帝紀大同四年使兼散騎常侍劉孝儀聘於東魏答湘東王書劉孝綽伏承自辭皇邑爰至荆臺未勞刺舉且摛髙麗近雖預觀尺錦而不覩全玉昔臨淄詞賦悉與楊修未殫寶笥顧慙先哲渚宫舊俗朝衣多故李固之薦二邦徐珍之奏七邑威懷之道兼而有之當欲使金石流功恥用翰墨垂迹雖乖知二偶達聖心爰自退居素里却掃窮閈比楊倫之不出譬張摰之杜門昔趙卿窮愁肆言得失漢臣鬱志廣敘盛衰彼此一時擬非其匹竊以文豹何辜以文為罪由此而談又何容易故韜翰吮墨多歷寒暑既闕子幼南山之歌又微敬通渭水之賦無以自同獻笑少酬褒誘且才乖體物不擬作於玄根事殊宿諾寧貽懼於朱亥顧巳反躬載懷纍息但瞻言漢廣邈若天涯區區一心分宵九逝殿下降情白屋存問相尋食椹懷音矧伊人矣孝綽辭藻為後進所宗每作一篇朝成暮遍流聞河朔亭苑柱壁莫不題之然仗氣負才多所陵忽由此多忤於物前後五免嘗起為湘東王咨議參軍此其在府時作兄弟及羣從子姪一時有七十人並能屬文三妹亦並有才學為衡山侯與婦書何遜昔人遨遊洛汭會遇陽臺神女髣佛有如今别雖帳前微笑涉想猶存而幄裏餘香從風且歇掩屏為疾引領成勞鏡想分鸞琴悲别鶴心如膏火獨夜自煎思等流波終朝不息始知萋萋萱草忘憂之言不實團團輕扇合歡之用為虛路邇人遐音塵寂絶一日三秋不足為喻弗陳往翰寧寫款懷遲枉瓊瑶慰其杼柚遜字仲言天監中為尚書水部郎南平王偉薦之武帝與吳均俱進幸後稍失意帝曰吳均不均何遜不遜吾有朱異信則異矣自是希復得見卒南平王迎其柩而殯藏焉衡山侯恭南平王子也善解吏事所在見稱而性尚華侈尤好賔友酣宴終辰嘗謂元帝曰下官歷觀時人多有不好歡興乃仰眠床上看屋梁著書千秋萬嵗後誰傳此者豈如臨清風對朗月登山泛水肆意酣歌也按衡山不好文如此乃不免乞靈詞客以媚閨闥使閨闥具眼謂此書渾不似床頭捉刀人所為奈何與徐勉書伏挺昔士德懷顧戀興數日輔嗣思友情勞一旬故知深心所係貴賤一也况復恩隆世親義重知己道庇生人德𢎞覆蓋而朝野懸隔山川邈殊雖咳唾時沾而顔色不遘東山之歎豈云旋復西風可懷孰能無思加以靜居廓處顧影莫酬秋風四起園林易色涼野寂寞寒蟲吟叫懷抱不可直置情慮不能無託時因吟咏動輒盈篇楊生沈鬱且猶覆盎惠子五車彌多蹐駁一日聊呈小文不期過賞還逮隆渥纍牘兼翰紙縟字磨誦復無已徒恨許與過當有傷凖的昔子建不欲妄讚陳琳恐見嗤哂後代今之過奢餘論將不有纍清談挺竄迹草萊事絶聞見藉以謳謡得之輿牧仰承有事砭石仍成簡通娛腸悅耳稍從擯落宴處榮觀務在滌除綺羅絲竹二列頓遣方丈圓案三杯僅存故以道變區中情沖域外操彼絃誦賁兹觀損追留侯之却粒念韓卿之辭榮眷想東都屬懷南嶽鑽仰來貺有符下風雖云幸甚然則未喻雖復帝道康寧走馬行却由庚得所寅亮有歸悠悠之人展氏猶且攘袂浩浩白水寧叟方欲褰裳是知君子拯物義非徇已思與赤松子遊誰其克遂願驅之仁夀綏此多福雖則不言四時行矣然後黔首有庇薦紳靡奪白駒不在空谷屠羊豫蒙其賚豈不休哉豈不休哉昔杜真自閉深室林宗絶迹幽野難矣誠非所希井丹髙潔相如慢世尚復遊涉權門雍容鄉邑常此道為泰每竊慕之方念擁帚延思以陳侍者請至農隙無待邀求挺誠好屬文不會今世不能促節局步以應流俗事等昌菹謬被偏嗜是用不羞固陋無憚龍門昔敬通之賞景卿孟公之知仲蔚止乎通人猶稱盛美况在時宗彌為未易近以蒲槧勿用箋素多闕聊效東方獻書丞相須得善寫更請潤訶儻逢子侯比復削牘報伏挺書徐勉復覽來書纍牘兼翰事苞出處言兼語默辭義周悉意致深逺發函伸紙倍增憤歎卿雄州擢秀弱冠升朝穿綜百家佃漁六學觀眸表其韶慧視色見其英朗若魯國之名駒邁雲中之白鶴及占顯邑試吏腴壤將有武城絃歌桐鄉謡詠豈與卓魯斷斷同年而語耶方當見賞良能有加寵受飾兹簪帶置彼周行而欲遠慕卷舒用懷愚智既知益之為纍爰悟滿則辭多髙蹈風塵良所欽挹况以金商戒節素秋御序蕭條林野無人相樂偃卧墳籍遊浪儒玄物我兼忘寵辱誰滯誠乃歡羡用有殊同今逖聽傍求興懷寤宿白駒空谷幽人引領貧賤為恥鳥獸難羣故當捐此薜蘿出從鵷鷺無乖隱顯不亦休哉吾智乏佐時才慙濟世稟承朝則不敢荒寧力弱途遙愧心非一天下有道堯人何事得因疲病思從間逸若使車書混合尉候無警作樂制禮紀石封山然後乃返服衡門實為多幸但夙有風咳遘兹虛眩瘠類士安羸同長孺簿領沈廢臺閣未理娛耳爛腸因事而息非關欲追松子逺慕留侯若乃天假之年自當靖恭所職擬非倫匹良覺辭費覽復循環爽焉如失清塵獨逺白雲飄蕩依然何極猥降書札示之文翰覽復成誦流連縟紙昔仲宣才敏藉中郎而表譽正平穎悟賴北海以騰聲望古料今吾有慙德儻成卷帙力為稱首無令獨耀隨掌空使辭人扼腕式閭願見宜事掃門亦有來思赴其懸榻輕苔魚網別當以薦城闕之歎曷日無懷所遲萱蘇書不盡意伏挺字士標平昌安丘人為縣令罷還仍於東郊築室少有盛名又善處世不能久事隱靜時徐勉以疾假還宅挺致書以觀其意勉答之挺後復為南臺治書侍御史納賄被劾因出家後又還俗侯景之亂死焉挺初出家劉之遴為詩笑之曰可憐伏不鬬化為支道林及之遴遇景亂亦為僧以逃焉與施從事書吳均故鄣縣東三十五里有青山絶壁干天孤峰入漢緑嶂百重青川萬轉歸飛之鳥千翼競來企水之猿百臂相接秋露為霜春蘿被徑風雨如晦雞鳴不巳信足蕩纍頤物悟衷散賞與顧章書吳均僕去月謝病還覔薜蘿梅溪之西有石門山者森壁爭霞孤峰限日幽岫含雲深溪蓄翠蟬吟鶴唳水響猿啼英英相雜綿綿成韻既素重幽居遂葺宇其上幸富菊華偏饒竹實山谷所資於斯已辦仁智所樂豈徒語哉均字叔庠吳興故鄣人家世寒賤至均好學有俊才柳惲薦之臨川王王稱之於武帝召見賦詩奉朝請嘗撰齊春秋稱帝為齊明佐命帝惡其實録勑付省焚之後令作通史未成卒與朱元思書吳均風煙俱淨天山共色從流飄蕩任意東西自富陽至桐廬一百許里竒山異水天下獨絶水皆縹碧千丈見底遊魚細石直視無礙急湍甚箭猛浪若奔夾嶂髙山皆生寒樹負勢競上互相軒邈爭髙且指千百成峰泉水激石泠泠作響好鳥相鳴嚶嚶成韻蟬則千轉不窮猿則百叫無絶鳶飛戾天者望峰息心經綸世務者窺谷忘反橫柯上蔽在晝猶昏疏條交映有時見日使東魏值侯景亂與北齊尚書令求還書徐陵夫一言所感凝暉照於魯陽一志冥通飛泉涌於疏勒况復元首康哉股肱良哉鄰國相聞風教相期者也天道窮剝鍾亂本朝情計馳惶公私哽懼而骸骨之請徒淹歲寒顛沛之祈空盈卷軸是所不圖也非所仰望也執事不聞之乎昔分鼇命鳸之世觀河拜洛之年則有日烏流災風禽騁暴天傾西北地缺東南盛旱坼三川長波含五嶽我大梁應金圖而有亢纂玉鏡而猶屯何則聖人不能為時斯固窮通之恆理也至如荆州刺史湘東王機神之本無寄名言陶鑄之餘猶為堯舜雖復六代之舞陳於總章九州之歌登於司樂虞夔拊石晉曠調鐘未足頌此英聲無以宣其盛德者也若使郊禋楚翼寧非祀夏之君勘定艱難便是匡周之霸豈徒豳王徙雍期月為都姚帝遷河周年成邑方今越裳藐藐馴雉北飛肅眘茫茫風牛南偃吾君之子含識知歸而答旨云何所投身斯其未喻一也又晉熙等郡皆入貴朝去我潯陽經塗何幾主於鐺鐺曉漏的的宵烽隔溆浦而相聞臨髙臺而可望泉流寶碗遙憶湓城峰號香罏依然廬嶽日者鄱陽嗣王治兵滙派屯戌淪波朝夕箋書春秋方物吾無從以躡屩彼何路而齊鑣豈其然乎斯不然矣又近者邵陵王通和此國郢中上客雲聚魏都鄴下名卿風馳江浦豈盧龍之徑於彼新開銅駝之街於我長閉何彼途甚易非勞於五丁我路為難如登於九折地不私載何其爽歟而答旨云還路無從斯所未喻二也晉熙盧江義陽安陸皆云款附非復危邦計彼中途便當靜晏自斯以北桴鼓不鳴自此以南封疆未一如其境外脫殞輕軀幸非邊吏之羞何在匹夫之命又此段賓遊通無貨殖忝非韓起聘鄭私買玉環吳札過徐躬要寶劍由來宴錫凡厥囊裝行役淹留皆巳虛罄散有限之微財供無期之久客斯可知矣且據圖刎首愚者不為運斧全身庸流所鑒何則生輕一髮自重千鈞不以賈盜明矣骨肉不任充鼎俎皮毛不足入貨財盜有道焉吾無憂矣又公家遣使脫有資須本朝非隆平之時遊客豈皇華之勢輕裝獨宿非勞聚柝之儀微騎間行寧望輶軒之禮歸人將從私具驢騾緣道亭郵惟希蔬粟若曰留之無煩於執事遣之有費於官司或以顛沛為言或云資裝可懼固非通論皆是外篇斯所未喻三也又若以吾徒應還侯景侯景凶逆殲我國家天下含靈人懷憤厲既不獲投身社稷衛難乘輿四冢磔蚩尤千刀剸王莽安所謂俯首頓膝歸奉冦讐佩弭腰鞬為其皂𨽻日者通和方敦曩睦凶人狙詐遂駭狼心頗疑宋萬之誅彌懼荀罃之請所以奔蹄徑角專恣憑陵凡我行人遍膺讎憾政復葅筋醢骨抽舌探肝於彼凶情猶當未雪海內之所知也君侯之所具焉又聞本朝王公都人士女風行雨散東播西流京邑丘墟葌蓬蕭瑟偃師還望咸為草萊灞陵回首俱沾霜露此又君之所知也彼以何義爭免冦讎我以何親爭歸委質昔巨平貴將懸重於陸公叔向名流深知於鬷蔑吾雖不敏常慕前修不圖明庶有懷翻其以此量物昔魏氏將亡羣凶挺爭諸賢戮力想得其朋為葛榮之黨耶為邢杲之徒耶如曰不然斯所未喻四也假使吾徒還為凶黨侯景生於趙代家自幽恆居則台司行為連率山川形勢軍國彛章不勞請箸為籌便當屈指能算重以逋逃小醜羊豕同群身寓江臯家留河朔舂舂井井如鬼如神其不然乎抑又君之所知也且夫宫闈祕事並若雲霄英俊訏謨寧非帷幄或陽驚以定䇿或焚藁而奏書朝廷之士猶難參預羇旅之人何階耳目至於禮樂沿革刑政寬猛則謳歌已遠萬舞成風不知手之舞之足之蹈之也安在搖其牙齒為間諜者哉若謂復命西朝終奔東虜雖齊梁有隔尉候奚殊豈以河曲之難浮而曰江關之可濟河橋馬度寧非宋典之姦關路雞鳴皆曰田文之客何其通蔽乃爾相妨斯所未喻五也又兵交使在雖著前經儻同徇僕之尤追肆寒山之怒則凡諸元帥並釋縲囚爰及偏裨同無翦馘乃至鍾儀見赦朋笑遵途襄老蒙歸虞歌引路吾等張􅎶拭玉修好尋盟涉泗之與浮河郊勞至於贈賄公恩既被賓敬無違今者何愆翻蒙貶責若以此為言斯所未喻六也若曰妖氛永久喪亂悠然哀我奔波存其形魄固已銘兹厚德戴此洪恩譬渤澥而俱深方嵩華而猶重但山梁飲啄非有意於籠樊江海飛浮本無情於鐘鼓况吾等營魂巳謝餘息空留悲默為生何能支久是則雖蒙養護更天天年若以此為言斯所未喻七也若云逆豎殲夷當聽反命髙軒繼路飛蓋相隨未解其言何能善謔夫屯亨治亂豈有意於前期謝常侍今年五十有一吾今年四十有四介巳知命賓又杖鄉計彼后生肩隨而巳豈銀臺之要彼未從師金竈之方吾知其訣政恐南陽菊水竟不延齡東海桑田無由佇望若以此為言斯所未喻八也足下清襟勝託書囿文林凡自洪荒終乎幽厲如吾今日寧有其人爰至春秋微宜商略夫宗姬殄墜霸道昏凶或執政之多門或陪臣之涼德故臧孫有禮翻囚與國之賓鄭伯無愆空怒天王之使遷箕卿於兩館縶驥子於三年斯匪貪亂之風耶寧當今之髙例也至於雙崤且帝四海爭雄或搆趙而侵燕或連韓而謀魏身求盟於楚殿躬奪璧於秦庭輸寶鼎以託齊王馳安車而誘梁客其外膏脣販舌分路揚鑣無罪無辜如兄如弟逮乎中陽受命天下同規巡省諸華無聞幽辱及三方之霸也孫甘言以嫵媚曹屈詐以羈縻旍軫歲到於句吳冠蓋年馳於庸蜀則客嘲殊險賔戲巳深共盡遊談誰云猜忤若使搜求故實脫有前蹤恐是叔世之姦謀而非為邦之勝略也抑又聞之雲師火帝澆淳乃異其風龍躍麟驚王霸雖殊其道莫不崇君親以詔物敦敬養以治民預有邦司曾無隆替吾奉違溫凊仍屬亂離冦虜猖狂公私播越蕭軒靡御王舫誰持瞻望鄉關何心天地自非生憑廩竹源出空桑行路含情猶其相愍常謂擇官而仕非曰孝家擇事而趨非云忠國况乎欽承有道驂駕前王郎吏明經鴟鳶知禮巡方省化咸問髙年東序西膠皆尊耆耋吾以圭璋玉帛通聘來朝屬世道之屯期鍾生民之否運兼年纍載無申元直之祈銜泣吞聲長對公閭之怒情禮之訴將同逆鱗忠孝之言皆應齚舌是所不圖也非所仰望也且天倫之愛何得忘懷妻子之情誰能無纍夫以清河公主之貴餘姚書佐之家莫限髙卑皆被驅略自東南醜虜抄販飢民臺署郎官俱餒牆壁况吾生離死别多歷暄寒孀室嬰兒何可言念如得身還鄉土躬自推求猶冀提携俱免凶虐夫四聰不達華陽君所謂亂臣百姓無寃孫叔敖稱為良相足下髙才重譽參贊經綸非豹非貔聞詩聞禮而中朝大議曾未矜論清禁嘉謀安能相及諤諤非周舍容容類胡廣何其無諍臣哉嵗月如流半生何幾晨看旅鴈心赴江淮昏望牽牛情馳揚越朝千悲而掩泣夜萬緒而回腸不自知其為生不自知其為死也足下素挺詞鋒兼長理窟匡丞相解頤之説樂令君清耳之談向所咨疑誰能曉喻若鄙言為謬來旨必通分請灰釘甘從斧鑊何但規規默默齰舌低頭而巳哉若一理存焉猶希矜眷何必期令我等必死齊都足趙魏之黃塵加幽并之片骨遂使東平拱樹長懷向漢之悲西洛孤墳恆表思鄉之夢千祈以屢哽慟增深陵字孝穆太清二年以通直散騎常侍使魏侯景之亂陵父摛先在圍城陵不奉家信便蔬食布衣苦居哀恤會齊受魏禪梁元帝承制於江陵陵復通使於齊陵纍求復命不遣乃致書於僕射楊遵彥不報及魏平江陵齊送貞陽侯為梁嗣乃遣陵隨還祈請之書至數千言可謂嘔出心肝矣然無一語失體與王僧辨書徐陵昔者雲師火帝非無戰陳之風堯誓湯征咸用干戈之道至於搖山蕩海驅電乘雷殲厥凶渠無虧皇極若夏鍾夷羿周厄犬戎漢委珠囊秦亡寶鏡然則皆聞之矣未有膺龍圖以建國御鳳邸以承家二后欽明三靈交泰而天崩地坼妖冦橫行者也自古銅頭鐵額興暴皇年檮杌窮竒流災中國王彌石勒吞噬關河緑林青犢之群黑山白馬之衆校彼兵荒無聞前史八王故事曾未混淆九州春秋非云禍亂我皇受命中興光宅天下泰寧瑣瑣安敢執鞭建武栖栖何其扶轂抑又聞之陶唐既作天歸鳥喙之臣豐畢將興特挺鷹揚之佐明公量苞金鉉神表玉璜儷袞欽才平階佇德固以留連管樂惆悵風雲濡足維時投竿斯在去嵗凶徒不騁言次巴丘鼓聲聞一柱之臺烽火照三休之殿公則懸麾羽扇猶對投壺戎羯咸奔鯨鯢俱翦樓船萬軸還繫昆明胡馬千群皆輸長樂於是乎夏首西浮雲行電邁彭波東滙谷靜山空扼鵲尾而據王畿登牛頭而掃天闕漸臺偽帥仍傳首於帝京郿塢元凶咸刳腸於軍市青羌赤狄同畀豺狼胡服夷言咸為京觀公園林盡拜忠貫長沙神主咸安勳踰髙密重以秦宫既獲魯殿猶存闢緑草於應門開青槐於武庫長安五陵之族鄠杜六遷之民襁負而歸都廛斯滿鬻脂藏脯遊騎擊鐘故市新城飛甍華屋東管舊宅人識桑榆南頓荒田家分禾黍豈以鄉名榖熟邑號禾興而巳哉若夫卦起龍文書因鳥迹劬勞王室大拯生民自開闢以來未之有也雖十六才子明允篤誠八百諸侯專心同德中宗佐命俱畫丹青光武功臣皆懸星象棧道木閣田單之奉霸齊綰璽將兵周勃之扶強漢壤蟲之比黃鵠轍鮒之仰河宗未足云也孤子階緣多幸叨簉皇華鄉國屯危公私焦迫邳彤之切長亂心胸徐庶之祈終無開允既而屏居空館多歷嵗時釁犯幽祗躬當勦滅何圖釁咎災極蒼旻號慕煩寃肝腸屠殞酷痛奈何無狀奈何惟桑與梓翻若天涯杖柏栽松悠然長絶明明日月號叫無聞茫茫宇宙容身何所窮劇奈何自忝膺嘉聘仍屬亂離上下年尊偏嬰此酷昔人迎門請盜恆懷廢寢之憂當挽輿親猶有危途之懼况乎逆冦崩騰京師播越興居動止長隔山河溫凊饘􅓞誰經心眼程糜不繼原粟何資瞻望風雲朝夕嗚咽固乃遊魂巳謝非復全生餘息空留非為全死同氷魚之不絶似蟄燕之猶蘇良可哀也良可哀也自東都紹漢南亳興殷修好徵兵彌留星琯韓宣范武方駕連鑣蘇秦張儀朱輪華轂而孤子三危是擯四罪同科聽別馬而長號杖歸旍而永慟王稽反命既無託乘之恩椒舉相逢誰為班荆之位昔人違齊處魯時降徵求亡晉奔秦猶蒙招請問管寧於遼左追王朗於浙東並物譽時賢卿門公族懸須應務深挾情祈斯豈庸賤之儔耶非餘生之敢望也但預在輶軒誠為過誤圭璋特達通聘河陽貂珥雍容尋盟漳水差有黃門啓封非無青紙詔書郡將州司郊迎負弩鄉亭里候飾館陳兵豈是復介而奔齊寧當竊妻而逃晉已焉哉羌難得而言也漢之谷吉捐軀者幾人楚之申胥埋魂者何極孤子何所歎焉但頓伏苫廬徒延光晷夫以啁噍燕雀躑躅鳴號含識懷情未有其痛且夫曾耕雨雪猶尚悲歌蘇使幽囚無馳哽咽公履忠𢎞孝冠冕縉紳化感煙雲量標海嶽行縻仲月王政無塞分榖髙年仁風斯逺固以衣纓仰訓黎庶投懷今日憔惶彌布洪澤雖復孤骸不返方為漠北之塵營魄知歸終結江南之草答周處士𢎞讓書徐陵辱去年三月二十七日告仰披華翰甚慰翹結承歸來天目得肆間居差有弄玉之俱仙非無孟光之同隱優遊俯仰極素女之經文升降盈虛盡軒皇之圖藝雖復考盤在阿不為獨宿詎勞金液惟飲玉泉比夫煮石紛紜終年不爛燒丹辛苦至老方成及其得道冥真何勞逸之相懸也又承有方生亦在天目理當仰稟明師總斯祕要豈如張陵弟子自墜髙巖孫泰門人競投滄海何其樂乎聖朝虛心版築尚想丘園若彼能赴嘉招便當謹申髙命但其人往嵗亦望至京師觀此風神確乎難拔故以忘懷爵祿詎持犧牲之談髙視公卿獨騁蠟蛵之訓所恐有道三辟公車十徵若斯者終當不屈此既然矣請復詳言昔楚國兩龔同時紆組漢隂二老相携抱甕兄之幽貞若其鑿坯負石方同形影結綬彈冠無容越楚况乎糞土夔龍羶臊名器已所不欲非應及人忽承來音良以多感何則潁陽巢父不曾令薦許由商洛園公未聞求徵綺季斯所未喻髙懷而躊躇於矛楯也惟遲山阿近信更惠芳音如或誠言謹便聞奏第夙勞比劇不復多呈𢎞讓遺書薦方圓陵答之如此讀此書令人難以置對足令充隱之徒汗顔與李那書徐陵籍甚清徽常懷虛眷山川緬邈河渭象於經星顧望風流長安遠於朝日青葽戒節白露為霜君子惟宜福履多豫雍容廊廟獻納便蕃留使催書駐馬成檄車騎將軍賓客盈座丞相長史瞻對有勞脫惠箋繒慰其翹想吾棲遲茂陵之下卧病漳水之濱迫以崦嵫難為砭藥平生壯意竊愛篇章忽覿髙文載懷勞佇此後殷儀同至止王人授館用阻班荆常在公筵敬析名作獲殷公所借陪駕終南入重陽閣詩及荆州大乘寺宜陽石像碑四首鏗鏘並奏能驚趙鞅之魂輝煥相華時瞬安豐之眼山澤暗靄松竹參差若見三嵕之峰依然四皓之廟甘泉鹵簿盡在清文扶風輦路悉陳華簡昔魏武虛帳韓王故臺自古文人皆為詞賦未有登兹舊閣歎此幽宫標句清新發言哀斷豈止悲聞帝瑟泣望羊碑一詠歌梁之言便掩盈懷之淚至如披文相質意致縱橫才壯風雲義深淵海方今二乘斯悟同免化城六道知歸皆踰火宅宜陽之作特會幽襟所覩黃絹之詞彌懷白雲之頌但恨耆闍遠嶽擅特髙峰開士羅浮康公懸溜不獲銘兹雅頌耀彼幽巖循環省覽用忘飢渴握之不置恆如趙璧玩之不足同於玉枕京師長者好事才人爭造蓬門請觀髙製軒車滿路如看太學之碑街巷相填無異華隂之市但豐城兩劍尚不俱來韓子雙環必希皆見莫以好龍無别木鴈可嗤載望瓊瑶因乏行李金風巳徑玉質宜調書不盡言但聞爻繫徐陵頓首胡孝轅云那周人爵里無考周武帝遣治御正殷不害等使陳孝穆從不害見那重陽閣詩荆州宜陽碑文因與那書知書中殷儀同即不害以那答書稱殷御正又云按那失撰别集碑文不傳其重陽閣詩云銜悲向玉關垂淚上瑶臺舞閣懸新網歌梁積故埃紫庭生緑草丹墀生碧苔金扉晝常掩珠簾夜暗開方池含水思芳樹結風哀行雨歸將絶朝雲去不回獨有西陵上松聲薄暮來書所云一詠歌梁之言是也閣周明帝所建武成二年落成帝是年崩故詩云云殷使陳即其明年文苑英華誤作重適陽關詩詩紀因之復竄入隋代遂轉不可曉報尹義尚書徐陵别離二國雲雨十年目懸河陽追銅爵而無遠神遊漳水與金鳳而俱飛北使還辱去冬十月十一日告忽同言敘循環巧製欣慰良深河朔年芳雖當淹晚白溝凂凂春流巳清紫陌依依長楊稍合體中何如豈無鄉思弟三秦世胄六輔良家文武兼能志懷開逺谷永之筆無慚古人蓋延之功髙視前彥而淹留趙魏亟歷寒暄企望鄉關理多悲切聖朝欽明纂厯大拯生民戮巨海之奔鯨殲中原之封豕晉君之説長安遠於日邉揚雄有言交州在於天際則輸賝王府屈膝閶門川洞酋豪強梁溟海神兵一指率土咸康方當偃伯於靈臺韜戈於武庫變大風於五禮驅蒸民於昌辰物色英聲搜揚俊傑投竿負鼎馳步蒼龍巖穴丘園爭趨金馬而弟留河北義等周邵懷此殊才實可傷嗟吾崦嵫既暮容鬢皤然風氣彌留砭藥無補追惟疇昔共備行人室家安危賓禮升降懸壺代哭俱歷春冬移館於箕同兹辛苦鳴蜩抱樹亟見藏氷歸鴈銜蘆多經寒食靖言念此如何可忘握玩來書彌其承臉夫以臃腫之木得免因於不才觳觫之牛自保由其無用以余鄙陋未友龔生惟歎吾賢不同蘧瑗耳若推溝拯溺每切皇衷逸翮飄鱗見優機檻所以降尺一之書馳輶軒之使心期與國必遂還途寧謂親鄰更成難請言尋雅告所及縲囚便訪鴻臚幸無淹使聞諸司寇或有邊俘前嵗中流是維同惡燕禽望闕冀馬臨江裁頓雲羅自投天網京觀之冢宜彰武功周醜之門方申明罰而聖朝好生惡殺收雷寢電兵車所獲雖同長萬之來恩澤從容無異荀罃之禮方之於弟况擬非倫伊昔梁朝共奉嘉聘張兹大帛處彼髙閎庭奏歌鐘座延僑肸賓客之敘方於阼階田獵之禽同於君膳正以鄉關阻亂致爾拘留家國隆平義應旋反况復韓宣屢至宰孔頻還翻爾遲回豈云鄰睦弟遂鍾儀之操對此皇華髙厚之詩一何非類關徐亷樂之况三戰七擒之言此日借子之矛攻子之室彼之使客猶尚不還此於齊都豪門貴戚周行匪例事義相懸豈與大弟同年而語吾本自凡流以復衰老稍近東岱不奢擊壤之年惟欣堯俗若耶之復長保安卧時思之不棄忝亞宗卿非得侵官天扆但當今芃芃在詠濟濟盈朝才冠卿雲智同荀郭文辭富於江海髙論薄於雲霄趨走丹墀之門侍奉清規之內弟來款言至欲附所聞聨類非宜更其多惑若使良有猶希贈鯉之書郵驛方通復行飛鶬之信執筆澘然不知何向四六法海卷七
