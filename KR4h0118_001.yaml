body:
  text: 四六法海巻一明王志堅編與臧燾勑宋武帝頃學尚廢弛後進頽業衡門之内清風輟響良由戎車屢警禮樂中息浮夫近志情與事染豈可不敷崇墳籍敦厲風尚此境人士子姪如林眀發摉訪想聞令軌然荆玉含寳要俟開瑩幽蘭懐馨事資扇發獨習寡悟義著周典今經師不逺而赴業無聞非惟志學者鮮或是勸誘未至邪想復𢎞之燾為太學博士㕘右將軍何無忌軍事隨府轉鎮南將軍髙祖鎮京口與燾書釋名曰勑飾也漢制度曰帝之下書有四一曰䇿書二曰制書三曰詔書四曰誡勑緗素雜記謂唐以前帝王命令尚未稱勑謂千字文勑員外郎散騎常侍周興嗣次韻勑字乃梁字真謬説也梁武帝與謝朏勑沈約吾以菲徳屬當期運鑒與吾賢思隆治道而眀不逺燭所蔽者多實寄賢能匡其寡闇嘗謂山林之志上所宜𢎞激貪厲薄義等為政自居元首臨對百司雖復執文經武各脩厥職羣才競爽以致和美而鎮風靜俗變教論道自非箕潁高人莫膺兹寄是用虚心側席屬想清塵不得不屈兹獨往同此濡足便望釋蘿襲衮出野登朝必不以湯有慚徳武未盡善不降其身不屈其志使璧帛虚往蒲輪空歸傾首東路望兼立表羲軒邈矣古今殊事不獲總駕崆峒依風問道今方復引領雲臺虚已宣室紆賢之愧載結寢興朏字敬冲莊之子建武中與何𦙍並徴不至梁武初再徴又不至遣王果敦辟朏朏謀於𦙍𦙍紿曰興王之世安可久處朏遂出以此頗失衆望然朏初為吳興太守頗事聚斂至以雞卵賦人收雞數千使終身不出亦不得為髙隱也幸新豐及同州勑蘇頲勑虞之四朝且編區寓漢之三輔本同京師善於古者考於今發乎邇者應乎逺若順豫之事缺則紊於王制巡遊之典備則慮於人勞朕受命膺期勵精設教幸乾坤幽贊風雨咸若百物既阜三農已登同穎薦於宗廟雙穂生於郡國我無大桀實欣於歳取人有小康未果於時邁但左翊之地近入黄圖新豐之邑甫鄰青綺山川宫館咫尺相望欲過灞亭而渉􅀈經沙阜而臨渭見彼耆耋問其疾苦察長吏之政恤黎甿之寃盖所以展義陳詩觀風問俗始自畿甸化於天下宜以今月二十五日幸長春宫停五日緣頓所須並令所司支備一事以上不得干擾州縣發日唯量將飛騎萬騎行更不須别遣兵馬及妄有科喚朕此行之處不得進奉在路有稱寃苦州縣不能疏决者委御史金吾收狀為進各勉所職副朕意焉開元二年九月戊申上幸驪山温湯此九月十一日勑也中間猶有顧慮假托以後嵗嵗遊幸至於山頂千門紅塵一騎則無復此等想矣答王縉勑唐代宗勑卿之伯氏天下文宗位厯先朝名髙希代抗行周雅長揖楚詞調六氣於終篇正五音於逸韻泉飛藻思雲散襟情詩家者流時論歸美誦於人口久鬱文房歌以國風宜登樂府眎朝之後乙夜將觀石室所蔵殁而不朽栢梁之會今也則亡乃眷棣華克成編錄聲猷益茂歎息良深縉進表云臣兄文詞立身行之餘力常持堅正秉操孤貞縱居要劇不忘清淨又云曲承天鑒下訪遺文魂而有知荷寵光於幽穸没而不朽成大名於聖朝賜太和公主勑李徳裕勑姑逺嫁絶域二十餘年跋履險難備罹屯苦朕每念於此良用惘然恭惟太皇太后春秋已髙慈愛深厚比者望姑朝謁再敘悲歡倐已嵗暮寂無音耗想姑見舊國之城邑能不銷魂望漢將之旌麾必當流涕今朔風既至霰雪已零絶國蕭條固難久處旃墻罽幕何以禦冬肉飯酪漿且非適口朕撫臨萬宇子育羣生一物未安終食三歎况姑累年漂泊何日忘懐想姑髙眀必是懸鑒姑承宗廟之餘慶為王室之懿親先朝割愛降婚義寧家國謂囘鶻必能侮禦安靜塞垣使邊人子孫不見兵革射獵者不敢西向畏軒轅之臺今囘鶻所為甚不循理蕃渾是朕之人百姓牛羊亦國家所有因依漢地遂致蕃孳囘鶻託以私讎恣為侵掠每馬首南向姑得不畏髙祖太宗之威靈欲侵擾邊疆姑得不思太皇太后之慈愛為其國母足得指揮若囘鶻能不稟命則是棄絶姻好今日以後不得以姑為詞若恃我為親稟姑教令則須便自戢斂以繼舊歡想姑以朕此書喻彼將相令其知分更不徇非塞外祈寒且無絲纊朕每御裘服則思彼未授衣豈可囘鶻譸張遂忘親愛今寄冬衣若干具如别錄太和公主憲宗女也於武宗為姑開成末囘鶻為黠戛斯所破可汗兄弟嗢没斯等率其衆抵天徳塞下會昌中邊將欲擊之以求功李徳裕請嚴兵備之俟其攻犯城鎮然後以武力驅除又言囘鶻破亡公主未知所在若不遣使訪問則謂國家降主本非愛惜既負公主又傷虜情請遣舍人齎詔詣嗢没斯令達公主兼可卜嗢没斯逆順之情因遣使賜公主冬衣命徳裕為勑書徳裕用石雄為天徳都團練副使其後囘鶻侵振武雄破之於殺胡山迎公主以歸自囘鶻至塞上及黠戛斯入貢每有詔勑武宗多命徳裕草之徳裕請委翰林學士武宗曰學士不能盡人意須卿自為之大荒西經曰大荒之中有軒轅之臺射者不敢西嚮射軒轅之臺盖敬黄帝之神也書中語用此賜陕西西路沿邊經畧招討都部署司勑宋祁朕䘏軍旅之苦寵邊陲之良事從優寛情無憐愛至於常愆細過並許功除煩文苛法罕由吏議昨滕宗諒張亢並緣事任合給公用庫錢俾其宴享賔僚犒飫軍伍而乃用度無藝簿領失防陽托貿營潛有牟入攸司上言遣使即推如聞逮繫頗多鞫劾彌廣本其冗費寧足深誅已罷案窮悉令原貸其滕宗諒等止免一官量降差遣雖屈吾法期慰士心且夫盡用市租美推趙將来從我取誼表漢臣每慕前風大體尚慮諸道帥守便以兹事為懲或損狭餼牽或裁量藥餌茍存畏避謂免譏彈胡益至公亦非朕意但當循經費之式去自潤之私取仰於官均恵於衆由兹底績夫何間然安節坦懐母或疑憚宗諒字子京河南人元昊反除知涇州范仲淹薦以自代擢天章閣侍制徙知慶州御史梁監奏宗諒在涇費公錢十六萬貫遣中使撿視乃始至日以故事犒諸屬羗又間遺游士故人宗諒恐連逮因焚其籍仲淹時參知政事救之止降一官知虢州徙岳州稍還蘇州卒卒之日家無餘財勸農訪民所疾苦詔沈約門下執耜蹔蹇則如懸比室乗機或惰則無褐終年非怠非荒雖曰王道不稂不莠實寄民和頃嵗多稼無麥遺秉如積而三登之美未臻萬斯之基尚遠且風土異宜百民舛務刑章治緒未必同源妨本害政事非一揆冕旒屬念無忘夙興可嚴下州郡務兹耕殖相畝闢疇廣開地利深樹國本克阜民天又詢訪獄市博聽謡俗傷風損化各以條聞無使瘥瘼之苦載興比屋主者詳為科格稱朕意焉此隆昌元年正月詔也考其行事無乃大謬為治不在多言信夫天嘉六年脩前代墓詔陳宣帝梁室多故禍亂相尋兵甲紛紜十年不解不逞之徒虐流生氣無賴之屬暴及徂魂江左肇基王者攸宅金行水位之主木運火徳之君時更四代嵗逾二百若其經綸王業縉紳民望忠臣孝子何世無才而零落丘山變移陵谷咸皆翦伐莫不侵殘玉杯得於民間漆簡傳於世載無復五株之樹罕見千年之表自大祚光啓恭惟揖讓爰暨朕躬聿脩祖武雖復旂旗服色猶行杞宋之邦車馬巡遊眇瞻河雒之路故喬山之祀蘋藻弗虧驪山之墳松柏恒守唯戚藩舊壠士子故塋掩殣未周樵牧猶衆或親屬流𨽻負土無期子孫㝠滅手植何寄漢髙留連於無忌宋祖惆悵於子房丘墓生哀性靈共惻者也朕所以興言永日思慰幽泉維前代王侯自古忠烈墳冢被發絶無後者可檢行脩治墓中樹木勿得樵採庶幽顯咸暢稱朕意焉令百僚舉士詔陳後主旁求俊乂爰逮側微用道和羮是隆大厦上智中主咸由此術朕以寡薄嗣膺景祚思所以登顯髦彦式備周行但空勞宵夢屢勤史卜申旦凝慮丙夜損懐豈以食玉炊桂無因自達將懐寳迷邦咸思獨善應内外衆官可各薦一人以會彚征之㫖且取備小大之用其有負能仗氣擯壓當時著賔戲以自憐草客嘲以慰志人生一世逢遇誠難亦宜去此幽谷翔兹天路趨銅駞以觀國望金馬而来庭便當隨彼方圓飭之矩矱武徳二年春月甲子下詔唐髙祖釋典微妙淨業始於慈悲道教冲虚至徳去其殘暴况乎四時之禁毋伐麛卵三驅之禮不取順從盖欲敦崇仁恵蕃衍庶物立政經邦咸率斯道朕祗膺靈命撫遂羣生言念亭育無忘鑒昧殷帝去網庶踵前脩齊王捨牛實符本志自今每年正月五月九月十直日並不得行刑所在公私宜斷屠殺按此即佛典所謂年三長齋月六齋也唐時此三月中斷屠宰宴會故士大夫履任不用此月今此説尚行而斷殺廢矣貞觀年為戰陣處立寺詔唐太宗有隋失道九服沸騰朕親總元戎致兹眀罰誓牧登陑曽無寧歳其有桀犬嬰此湯羅衘鬚義憤終乎握節各徇所奉咸有可嘉日往月来逝川斯逺雖復項籍致命封樹紀於丘墳鮑信捐生丹青著於圖象猶恐九泉之下尚淪鼎鑊八難之間永纒氷炭愀然疚懐用忘興寢所以樹其福田濟其營魄可以建義以来交兵之處為義士兇徒殞身戎陣者各建寺刹招延勝侣望法鼔所振變炎火於青蓮清梵所聞易苦海於甘露所司足量定處所并立寺名支配僧徒及脩院宇具為事條以聞稱朕矜哀之意也仍命虞世南李百藥禇遂良顔師古岑文本許敬宗朱子奢等為碑銘紀功業洪武中召天下名僧為佛會於鍾山普薦陣亡將士上親赴㑹禮佛感雨花之瑞宋潛溪記述甚詳合此詔觀之命世真人未有不歸誠覺王者此必有内契於心者矣舉㢘吏詔宋太宗周聽治以六計㢘善居先漢辟士以四科清白為首朕均知有俊誕保受民惟前代廸厥官不肩好貨凡正人羞其行庶㡬成風嘗賜札以律貪復作銘而申訓曽是在位猶從匪彝鞭鞾不已而寵賂章簠簋不飾而節行缺退食鮮羔羊之操虐民多碩鼠之譏念激濁在於揚清而癉惡莫如彰善神爵奬朱邑之潔治盛循良開元旌王丘之㢘風移苛嬈一賢蒙擢百辟嚮方肆公道之天開閔頽波之瀾倒克正罔敢弗正既昭徳以塞違進良以率不良與勵精以更始咨爾承休之彦體余美俗之懐㢘欲得其真公選潔脩之士舉皆賢於已博詢操履之源内則如光祿之薦王嘉外則如河東之察王覇人之有猷有守具以實言予其懋賞懋官亦克用勸故兹詔示想宜知悉此篇舊本不著何朝按太宗嘗因孟昶儀石銘摘取四語詔刋諸石此云作銘申訓以此考之當是太宗時詔也宋公九錫文無名氏朕以寡昧仰纉洪基夷羿乗釁蕩覆王室越在南鄙遷於九江宗祀絶饗神人無位提挈羣凶寄命江浦則我祖宗之烈奄墜於地七百之祚翦焉既傾若渉巨海罔知攸濟天未絶晉誕育英輔振厥弛維再造區㝢興亡繼絶俾昏作眀元勲至徳朕實攸賴今將授公典䇿其敬聽朕命乃者桓𤣥肆僭滔天泯夏拔本塞源顛蹶六位庶僚俛眉四方莫恤公精貫朝日氣陵虹蜺奮其靈武大殱羣慝尅復皇邑奉歆神祗此公之大節始於勤王者也授律羣后順流長騖薄伐崢嶸獻㨗南郢大憝折首羣逆畢夷三光旋采舊物反正此又公之功也出藩入輔𢎞兹保弼阜財利用繁殖黎元編户嵗滋疆宇日啓導徳眀刑四境有截此又公之功也鮮卑負衆僭盜三齊介恃遐阻仍為邊害公蒐乗秣馬夐入逺疆衝櫓四臨萬雉俱潰拓土三千申威龍漠此又公之功也盧循祅㓙伺隙五嶺侵覆江豫矢及王城國議遷都之規家獻徙卜之計公乗輿南濟義形於色運竒攄畧英謨不世狡寇窮衂喪旗宵遁俾我畿甸拯於將墜此又公之功也追奔逐北揚旍江濆偏旅浮海指日遄至番禺之功俘級萬數左里之捷鳥散魚潰元㓙逺竄傳首萬里此又公之功也劉毅叛渙負釁西夏陵上罔主志肆姦暴公禦軌以刑消之不日罪人斯得荆衡寧晏此又公之功也譙縱怙亂寇竊一隅王化阻閡三巴淪溺公指命偏帥授以良圖陵波憑湍致届井絡僭豎伏鑕梁岷草偃此又公之功也馬休魯宗阻兵内侮驅率二方連旗稱亂公投袂星言研其上畧江津之師勢踰風電囘斾沔川實繁震懾二叛奔迸荆雍来蘇此又公之功也永嘉不競四夷擅華五都傾蕩山陵幽辱祖宗懐没世之憤遺甿有匪風之思公遠齊阿衡納隍之仁近同小白滅亡之恥鞠旅陳師赫然大號分命羣師北狥司兖許鄭風靡鞏洛載清百年榛穢一朝掃滌此又公之功也公有康宇内之勲重之以眀徳爰初發跡則竒謨冠古電擊彊祅則鋒無前對聿寧東畿大造黔首若乃草昧經綸化融於嵗計扶危靜亂道固於苞桑蠲削煩苛較若畫一淳風美化盈塞區㝢是以絶域獻琛遐夷納賮王畧所亘九服率從雖文命之東漸西被咎繇之邁于種徳何以尚兹朕聞先王之宰世也庸勳尊賢建侯胙土褒以寵章崇其徽物所以協輔皇室永隆藩屏故曲阜光啓遂荒徐宅營丘表海賜履有聞其在襄王亦賴匡霸又命晉文備物光賜惟公道冠前烈勲髙振古而殊典未飾朕甚懵焉今進授相國以徐州之彭城沛蘭陵下邳淮揚山陽廣陵兖州之髙平魯泰山十郡封公為宋公錫兹𤣥土苴以白茅爰定爾居用建冢社昔晉鄭啓藩入作卿士周召保傅出總二南内外之任公實兼之今命使持節兼太尉尚書左僕射晉寧縣五等男湛授相國印綬宋公璽紱使持節兼司空散騎常侍尚書陽遂鄉侯泰授宋公茅土金虎符第一至第五左竹使符第一至第十左相國位無不總禮絶朝班居常之名宜與事革其以相國總百揆去錄尚書之號上送所假節侍中貂蟬中外都督太傅太尉印綬豫章公印䇿進揚州刺史為牧領征西將軍司豫北徐雍四州刺史如故公紀綱禮度萬國是式乗介蹈方罔有遷志是用錫公大路戎路各一𤣥牡二駟公抑末敦本務農重積采繁實殷稼穡惟阜是用錫公衮冕之服赤舄副焉公閑邪納正移風改俗陶鈞品物如樂之和是用錫公軒縣之樂六佾之舞公宣美王化導揚休風華夷企踵逺人胥萃是用錫公朱户以居公官方任能網羅幽滯九臯辭野髦士盈朝是用錫公納陛以登公當軸處中率下以義式遏寇讎滌除苛慝是用錫公虎賁之士三百人公眀罰恤刑庶獄詳允放命干紀罔有攸縱是用錫公鈇鉞各一公龍驤鳯矯咫尺八紘括囊四海折衝無外是用錫公彤弓一彤矢百玈弓十玈矢千公温恭孝思致䖍禋祀忠肅之志儀刑四方是用錫公秬鬯一卣圭瓚副焉宋國置丞相以下一遵舊儀欽哉其秪服往命茂對天休簡恤庶邦敬敷顯徳以終我髙祖之嘉命宋初一切文翰皆謝晦任之此當是晦筆文頗髙亮從来選者皆不及兹從南史錄出冊文中所稱功業惟宋祖皆有實跡齊梁以後若有若無而已冊陳王九錫文徐陵大哉乾元資日月以貞觀至哉坤元憑山川以載物故惟天為大陟配者欽眀惟王建國翼輔者齊聖是以文武之佐磻溪藴其玉璜堯舜之臣榮河鏤其金版况乎體得一之鴻姿寧陽九之危厄拯横流之碣石撲燎火於崑岑驅馭於韋彭跨蹍於秦晉神功行而靡用聖道用而無名者乎今將授公典䇿其敬聽朕命日者昊天不弔鍾亂於我國家網漏吞舟彊胡内贔茫茫宇宙惵惵黎元方趾圓顱萬不遺一太清否亢橋山之痛已深大寳屯如平陽之禍相繼上宰膺運康救兆民鞠旅於滇池之南揚旌於桂嶺之北懸三光於己墜謐四海於羣飛屠猰㺄於中原斮鯨鯢於濛汜蕩寧上國光啓中興此則公之大造於皇家者也既而天未悔禍夷醜薦臻南夏崩騰西京蕩覆羣胡孔熾藉亂乗間推納藩枝盜假神器冢司昏撓旁引寇讎既見貶於桐宫方謀危於漢閣皇運已殆何殊贅旒中國揺然非徒如綫公赫然投袂匡救本朝復莒齊都平戎王室朕所以還膺寳厯重履宸居挹建武之風猷彰宣王之雅頌此又公之再造於皇家者也公應務之初登庸惟始三川五嶺莫不窺臨銀洞珠宫所在寧謐孫盧肇釁越貊為災番部阽危勢將淪殄公赤旗所指祅壘洞開白羽纔撝兇徒粉潰非其神武久喪南藩此又公之功也大同之末邊政不脩李賁狂迷竊我交愛敢稱大號驕恣甚於尉陀據有連州雄豪熾於梁碩公英譽雄算電掃風行馳御樓船直跨滄海新昌典徹備履艱難蘇厯嘉寧盡為京觀三山獠洞八角蠻陬逖矣水寓之鄉悠哉火山之國馬援之所不届陶璜之所未聞莫不懼我王靈爭朝邊候歸賝天府獻狀鴻臚此又公之功也自寇虜陵江宫闈幽辱公枕戈嘗膽提劒撫心氣涌青霄神飛紫闥而番禺連率本自諸夷言得其朋是懐同惡公仗此忠誠乘機勦定執沛令而釁鼓平新野而據鞍此又公之功也世道初艱方隅多難勳門桀黠作亂衡山兵切池隍衆兼夷獠公以國盜邊警知無不為䘏是同盟誅其醜類莫不魚驚鳥散面縛頭懸南土黔黎重保蘇息此又公之功也長驅嶺嶠夢想京畿緣道酋豪遞為榛梗路養渠率全據大都蓄聚逋逃方謀阻亂百樓不戰雲梯之所未窺萬弩齊張髙輣之所非敵公龍驤虎歩嘯吒風雲山靡堅城野無彊陣清祅氛於灨石滅沴氣於雩都此又公之功也遷仕㓙慝屯據大臯乞活類馬騰之軍流民多杜弢之衆推鋒轉鬬自北徂南頻嵗稽誅實惟勍虜公坐揮三畧遥制六竒義勇同心貔貅騁力雷奔電擊谷靜山空列郡無犬吠之驚叢祠罷狐鳴之盜此又公之功也王師討虜次届淪波兵乏兼儲士有饑色公囘麾蠡澤積穀巴丘億庾之詠斯豐壺漿之迎是衆軍民轉漕曽無砥柱之難艫舳相望如運敖倉之府犀渠貝胄顧蔑雷霆髙艦層樓仰捫霄漢故使三軍勇鋭百戰無前承此兵糧遂殄兇逆此又公之功也若夫英圖邁俗義旅如雲湓壘猜携用淹戎畧公志唯同奬師克在和鵠塞非虞鴻門是會若晉侯之誓白水如蕭王之推赤心屈禮交盟人祇感咽故能使舟師並路逺邇崩心此又公之功也姑熟襟要崤函阻憑寇虜據其關梁大盜負其扄鐍公五校裁撝三雄並奮左賢右角沙潰土崩木甲殪於中原氊裘赴於江水他他籍籍萬計千羣鄂坂之隘斯開夷庚之道無塞此又公之功也義軍大衆俱集帝京逆豎兇徒猶屯皇邑若夫表裏山河金湯嶮固疏龍首以抗殿翦華嶽以為城雜虜憑焉强兵自若公囘兹地軸抗此天羅曽不崇朝俾無遺噍軍容甚穆國政方脩物重覩於衣冠民還瞻於禮樂楚人滿道爭覩於葉公漢老銜悲俱歡於司𨽻此又公之功也内難初靖諸侯出關外郡傳烽鮮卑犯塞莫非沮渠當户中貴名王冀馬列於淮南胡笳動於徐北公舟師歩甲亘野横江殱厥羣羝遂殫封狶莫不絓木而止戎車靡遺遇濘而旋歸驂盡殪此又公之功也公克黜禍難劬勞皇室而孫甯之黨翻啓狄心伊洛之間咸為虜戍雖金陵佳氣石壘天嚴朝闇戎塵夜喧胡鼓公三籌既畫八陣斯張裁舉靈旗亦抽金僕咸俘醜類悉反髙墉異李廣之皆誅同龎元之盡赦此又公之功也任約叛渙梟聲不悛戎羯貪婪狼心無改穹廬氊幕抵北闕而為營烏孫天馬指東都而成陣公左甄右落箕張翼舒掃是攙搶驅其獫狁長狄之種埋於國門椎髻之酋烹於軍市投秦坑而盡沸噎濉水而不流此又公之功也一相居中自折彝鼎五湖小守妄懐同惡公夙駕兼道秉羽杖戈玉斧將揮金鉦且戒祅酋震懾遽請灰釘爇櫬以表其含𢎞焚書以安其反側此又公之功也賊龕兇横陵虐具區阻兵安忍憑災怙亂自古蟲言鳥跡渾沌洪荒凡或䖍劉未此殘酷公雖宗居汝潁世寓東南育聖誕賢之鄉含章挺生之地眷言桑梓公私憤切卓爾英猷承規奉算戮此大憝如烹小鮮此又公之功也亂離永久羣盜孔多浙左兇渠連兵搆逆豈止千兵五校白雀黄龍而已哉公以中軍無率選是親賢奸寇途窮漼然氷泮刑塘之所文命動其天威雷門之間句踐行其嚴戮英規聖跡異代同風此又公之功也同姓有扈頑兇不賔憑藉宗盟圖危社稷觀兵滙澤勢震京師驅率南蠻巳為東帝公論兵於廟堂之上决勝於罇俎之間寇賈樊滕浮江下瀨一朝翦撲無待甸師萬里澄清非勞新息此又公之功也豫章祅寇依憑山澤繕甲完聚多厯嵗時結從連横爰洎交廣吕嘉既獲吳濞已摐命我還師征其不恪連營盡拔偽黨斯擒曜聖武於匡山囘神旌於蠡派此又公之功也自八紘九野𤓰剖豆分竊帝偷王連州比縣公武靈已暢文徳又宣折簡馳書風猷斯逺至於蒼蒼浴日杳杳無雷北洎丈夫之鄉南踰女子之國莫不屈膝膜拜求吏款闗此又公之功也京師禍亂亟積寒暄雙闕低昂九門寥豁寧秦宫之可顧豈魯殿之猶存五都簪弁百僚卿士胡服縵纓咸為戎俗髙冠厚履希復華風宋微子麥穟之歌周大夫黍離之歎較於斯日未足為悲矣公求衣昧旦昃食髙舂興構宫闈具瞻遐邇郊庠宗稷之典六符十等之章還聞太史之風流重覩永平之遺事此又公之功也公有濟天下之勳重之以明徳凝神體道合徳符天用百姓以為心隨萬機而成務恥一物非唐虞之民歸含靈於仁夀之域上徳不徳無為以為夏長春生顯仁蔵用忠信為寳風雨弗愆仁惠為基牛羊勿踐功成治定樂奏咸雲安上治民禮兼文質物色丘園衣裾里巷朝多君子野無遺賢菽粟同水火之饒工商富猗頓之旅是以天無藴寳地有呈祥潏露卿雲朝團曉映山車澤馬服馭登閑既景煥於圖書方葳㽔於史牒髙勳踰於象緯積徳冠於嵩華固無得而稱者矣朕又聞之前王宰世茂賞尊賢式樹蕃長總征羣伯二南崇絶四履遐曠泱泱表海祚土維齊巖巖泰山俾侯於魯抑又勤王反鄭夹輔遷周召伯之命斯隆河陽之禮咸備况復經營宇宙寧唯斷鼇足之功𢎞濟蒼生非直鑿龍門之險而疇庸報徳寂爾無聞朕所以垂拱當宁載懐慚悸者也今授公相國以南豫州之陳留南丹陽宣城揚州之吳興東陽新安新寧南徐州之義興江州之鄱陽臨川十郡封公為陳公錫兹青土苴以白茅爰定爾邦用建冢社昔旦奭分陕俱為保師晉鄭諸侯咸作卿士兼其内外禮實攸宜今命使持節兼太尉王通授相國印綬陳公璽紱使持節兼司空王㻛授陳公茅土金獸符第一至第五左竹使符第一至第十相國秩踰三鉉任總百司位絶朝班禮由事革其以相國總百揆除録尚書之號上所假節侍中貂蟬中書監印章中外都督太傅印綬義興公印䇿其鎮衛大將軍揚州牧如故又加公九錫其敬聽後命以公禮為楨榦律等銜䇿四維皆舉八柄有章是用錫公大輅戎輅各一𤣥牡二駟以公賤寳崇榖疏爵待農室富京坁民知榮辱是用錫公袞冕之服赤舄副焉以公調理隂陽燮諧風雅三靈允降萬國同和是用錫公軒縣之樂六佾之舞以公宣導王猷𢎞闡風教光景所照鞮象必通是用錫公朱户以居以公抑揚清濁褒徳進賢髦士盈朝幽人虚谷是用錫公納陛以登以公嶷然廊廟為世鎔範折衝四表臨御八荒是用錫公虎賁之士三百人以公執兹眀罰期在刑措象恭無赦干紀必誅是用錫公斧鉞各一以公英猷逺量跨厲嵩溟混一車書括囊寰宇是用錫公彤弓一彤矢百盧弓十盧矢千以公天經地義貫徹幽明春露秋霜允恭粢盛是用錫公秬鬯一卣圭瓉副焉陳國置丞相以下一遵舊式往欽哉其恭循朕命克相皇天𢎞建邦家允興洪業以光我髙祖之休命奉天改元大赦文陸贄門下致理興化必在推誠忘已濟人不吝改過朕嗣守丕構君臨萬方失守宗祧越在草莽不念率徳誠莫追於既往永言思咎期有復於將来明徴厥初以示天下惟我烈祖邁徳庇人致俗化於和平拯生靈於塗炭重熙積慶垂二百年伊爾卿尹庶官洎億兆之衆代受亭育以迄於今功存於人澤垂於後肆予小子獲纉鴻業懼徳不嗣罔敢怠荒然以長於深宫之中暗於經國之務積習易溺居安忘危不知稼穡之艱難不察征戍之勞苦澤靡下究情不上通事既壅隔人懐疑阻猶昧省已遂用興戎徴師四方轉餉千里賦車籍馬逺近騷然行齎居送衆庶勞止或一日屢交鋒刄或連年不解甲胄祀奠乏主室家靡依生死流離怨氣凝結力役不息田莱多荒暴命峻於誅求疲甿空於杼軸轉死溝壑離去鄉閭邑里丘墟人煙斷絶天譴於上而朕不悟人怨於下而朕不知馴致亂階變興都邑賊臣乗釁肆逆滔天曽莫愧畏敢行凌逼萬品失序九廟震驚上辱於祖宗下負於黎庶痛心靦貌罪實在予永言愧悼若墜深谷賴天地降佑神人叶謀將相竭誠爪牙宣力屏逐大盜載張皇維將𢎞永圖必布新令朕晨興夕惕惟念前非乃者公卿百僚累抗章疏猥以徽號加於朕躬固辭不獲俯遂輿議昨因内省良用矍然體隂陽不測之謂神與天地合徳之謂聖顧惟淺昧非所宜當文者所以化成武者所以定亂今化之不被亂是用興豈可更徇羣情茍膺虚美重余不徳祇益懐慚自今以後中外所上書奏不得更稱聖神文武之號夫人情不常繫於時化天道既隱亂獄滋豐朕既不能𢎞徳導人又不能一法齊衆茍設密網以罪非辜為之父母實増愧悼今上元統厯獻嵗發生宜革紀年之號式敷宥過之澤與人更始以答天休可大赦天下改建中五年為興元元年自正月一日昧爽已前大辟罪已下罪無輕重咸赦除之李希烈田悦王武俊李納等有以忠勞任膺將相有以勲舊繼守藩維朕撫馭乖方信誠靡著致令疑懼不自保安兵興累年海内搔擾皆由上失其道民罹其災朕實不君人則何罪屈已𢎞物予何愛焉庶懐引領之誠以廣好生之徳其李希烈田悦王武俊李納及所管將士官吏等一切並與洗滌各復爵位待之如初仍即遣使分道宣諭朱滔雖與賊泚連坐路逺未必同謀朕方推至誠務欲𢎞貸如能效順亦與維新其河南河北諸軍兵馬並宜各於本道自固封疆勿相侵軼朱泚大為不道棄義蔑恩反易天常盜竊名器暴犯陵寢所不忍言獲罪祖宗朕不敢赦其應被朱泚脅從將士官吏百姓及諸色人等有遭其扇誘有廹以兇威茍能自新理可矜宥但官軍未到京城已前能去逆效順及散歸本道並從赦例原免一切不問天下左降官即與量移近處己量移者更與量移流人配𨽻及罰鎮效力并緣罪犯與諸使驅使兼别勑於諸州縣安置及罪人家口未許歸者一切放還應先有痕累禁錮反逆緣坐承前恩赦所不説者並宜洗雪亡官失爵放歸勿齒者量加收叙人之行義或未必兼構大厦者方集於羣材建竒功者不限於常檢茍在適用則無棄人况黜免之徒沈鬱頗久朝過夕用勿拘常例諸軍諸道赴奉天及進收京城將士等或百戰摧敵或萬里勤王扞固金城驅除大憝赴危難者其節著復社稷者其業崇我圖爾功特加彝典錫名疇賦永永無窮宜並賜名奉天定難功臣身有過犯遞減罪三等子孫有過遞減罪二等當户應有差科使役一切蠲免其功臣已後雖衰老疾患不任軍旅當分糧賜並宜全給身死之後十年仍迴給家口其有食實封者子孫相繼代代無絶其餘敘錄及功賞條件待收京日並准去年十月七日十一月十四日勑處分諸道諸軍將士等久勤扞禦累著功勲方鎮克寧惟爾之力其應在行營者並超三資與官仍賜勳五轉不離鎮者依資與官賜勲三轉其累加勲許迴授周親内外文武官三品已上賜爵一級四品已下各加一階仍並賜勲兩轉見危致命先哲攸貴掩骼埋胔禮經所先雖效用而或殊在惻隱而何間諸道兵士有死王事者各委所在州縣急遞送歸本管官為葬祭其有因戰陣殺戮及擒獲伏辜暴骨鄉原者並委所在逐近便收葬應緣流貶及犯罪未葬者並許其家各據本官品以禮收葬自頃軍旅所給賦役繁興吏因為姦人不堪命咨嗟怨苦道路無聊汔可小康與之休息其墊陌及税間架竹木茶漆㩁鐵等諸色名目悉宜停罷京畿之内屬此寇戎攻刼焚燒靡有寧室王師仰給人以重勞特宜減放今年夏税之半朕以兇醜犯闕遽用于征爰度近郊息駕兹邑供諸克辦師旅攸寧式當褒旌以志吾過其奉天宜昇為赤縣百姓並給復五年尚徳者教化之所先求賢者邦家之大本永言兹道夢想増懐而澆薄之風趨競不息幽棲之士寂寞無聞盖誠所未孚故求之不至天下有隱居行義才徳髙逺晦蹤丘園不求聞達者委所在長吏具名聞奏當備禮邀致諸色人中有賢良方正直言極諫及博通墳典達於教化并識洞韜畧堪任將帥者委常㕘官及所在長吏聞薦天下孤老鰥寡惸獨不能自活者並委州縣長吏量事優䘏其有年九十已上者刺史縣令就門存問義夫節婦孝子順孫旌表門閭終身勿事大兵之後内外耗竭貶食省用宜自朕躬朕當節乗輿之服飾絶宫室之華侈率已師儉為天下先諸貢獻自非供宗廟軍國之用一切並停應内外官有冗員及百司不給之資委中書門下即商議條件停減奏聞布澤行賞抑惟舊章今以餘孽未平帑蔵空竭有乖慶賜深愧于懐赦書有所未該者所司類例條件聞奏贄在奉天嘗為帝言今盜徧天下宜痛自咎悔以感人心昔成湯罪已以興楚昭王出奔以一言善復國陛下誠不吝改過以言謝天下使臣持筆無所忌庶叛者革心帝從之故奉天所下制書雖武人悍卒無不感動流涕後李抱真入朝為帝言陛下在奉天山南時赦令至山東士卒聞者皆感泣思奮臣是時知賊不足平議者謂興元戡難功雖爪牙宣力盖贄有助焉授韋嗣立黄門侍郎制唐中宗絳衣近侍秩亞貂蟬青𤨏崇班職參鴛鷺實神化之有寄信賢才之攸重通議大夫韋嗣立忠規奕葉孝緒蟬聨家匡𤣥鷰之朝人輔彤雲之代芝蘭並秀見謝砌之階庭麒麟齊驅有劉山之昆季入光振鷺譽滿三臺出據憑熊聲流十部近者命兹鸞渚已擢雁行纔出芸扄奄歸蒿里永言荆樹坐折連枝眷彼恒山空餘一鳥俾遷榮於皂盖宜襲寵於黄樞韋嗣立字廷構思謙之子與兄承慶異母母遇承慶嚴每笞輒解衣求代母感悟遂均愛中宗時拜兵部尚書同中書門下三品嗣立與韋后疎屬帝特詔附屬籍營别第驪山鸚鵡谷帝臨幸因封為逍遥公韋后敗寧王為救免開元中卒諡曰孝睿宗受禪制蘇頲門下天下神器非上聖無以運其機域中大業非元良無以固其本欽若靈命寅奉神宗屈已順人用安四海承祧主鬯實貞萬國頃者家臻大憫在疚惟憂梟獍滿衢豺狼塞路武職戎政必任兇族國要時權咸升逆黨社稷之守但望苞桑忠義之懐誰期艾棘階禍稔惡伺隙乗間煩言碎辭所不勝述皇太子隆基正氣凝姿端命毓徳自家刑國英徽日甚移孝為忠雄謨電發北軍馳入掃攙搶於紫微南宫反正開日月於黄道平亂寧國翼戴朕躬一旅不勞功逾復禹七徳咸舉事邈興周聲應吹銅望當歸璧令司空讀冊侍中授璽實由立義豈曰尚親承華肇開元嗣以建方流樂風之緒宜申洊靁之澤朕爰初踐極喜氣呈祥天人叶心象緯昭貺官名有紀年號用憑可大赦天下蘇頲字廷碩瓌之子𤣥宗平内難書詔填委頲時為中書舍人獨在太極後閤口所占授功狀百緒輕重無所差書史白曰丐公徐之不然手腕脱矣自景龍後與張説以文章顯時號燕許大手筆封衡陽郡王成義為申王等制蘇頲門下古者帝王受命以臨萬國子弟建封用尊五等其所由来尚矣尚書右衛大將軍衡陽郡王成義等敦詩執禮本仁祖義名教之樂得自㡬深温良之容發於忠孝晨趨魏闕則望掩軒霞夕賦曹園則思含澄景朕秖奉厯數旁稽載籍克輔王室所謂通邑大都俾為唐藩故能帶河礪嶽分膺往命咨爾眷歟可依前件仍各實封一千户餘並如故主者施行成義睿宗第二子垂拱三年封恒王俄改衡陽睿宗立進王申避昭成太后諡改名撝開元八年薨冊贈太子諡恵莊授韋博淄青節度使制沈詢門下乃眷營丘表於東海富强號千乗之國繁雜聚四方之人假上將之威權壯中軍之垣翰將疇閫寄必在信臣具官某文苑騰芳儒林擢秀襟靈曠逺風度詳閑周通爰表於器能强濟式彰於事任早以重價踐遷清途諫垣流謇諤之名通邑擅神明之譽頃自移曹九棘緩歩八磚冲澹安身巻舒惟道應兹圖任允叶僉諧懿彼全齊實為右壤禹貢别九州之盛海濱綜五都之雄昔周命太師漢封韓信啓土用申於帶礪分茅克懋於藩維選任之隆古今攸重於戲平仲盡規之節夷吾當路之方經堂阜而徽猷可循指牛山而忠讜如在餘波未泯遺愛斯存禮節既洽於里閭風謡尚傳於故老為政之暇無忘諮詢盛鐵馬於師壇指金貂於騎省祇膺成命勉服寵光韋博字大業武宗時為主客郎中時詔毁佛祠悉浮屠𨽻主客博言令太暴宜近中後出為平盧節度使沈詢字成之既濟之孫㑹昌初第進士累遷中書舍人昭義節度使英華誤作珣今改正崔龜從拜相制崔璵門下丹青神化寅亮天工將寄陶鈞必歸才望故漢中大業魏邴克賛其謨謀開元盛時姚宋同匡其治理嘗覽前代緬懐斯人寤寐以求夢卜終叶適當舉衆不讓知賢户部尚書判度支崔龜從道峻嵩華志凌煙霄氣包元精識邁前哲巖廊符瑞禮樂英華𢎞通多鑒物之明堅直抱佐時之術而學窮源委詞涌波濤吐論素勵於公忠理躬不踰於信厚烈火方熾珪璋更寒飛霜已嚴竹柏猶翠自出入劇職徊翔清途經厯五年恭勤一貫粉署潔賜衣之操掖垣髙白鳯之文澄清宣威節制持重既位延舊徳再掌地圖任切良材柄専國用閭閻不困帑蔵有餘邦賦程均節之能軍食表供胥之效我有好爵本邀茂勲况乎國楨宜在人傑是用命汝同心弼予升於鼎司執此政柄吉甫徳全於文武彦囘望著於台衡既諧具瞻實允元輔於戲惟木從繩載懐藥石之誡惟風偃草冀流霖雨之功與其順美以昭忠不若盡規而輔徳與其嚴刑而就理不若齊禮以安人佇聞嘉言共底交泰無令伊傅獨美典墳可户部尚書同中書門下平章事崔龜從字𤣥告明於禮家沿革為太常博士定敬宗廟室祝詞皇帝不可云孝弟九宫皆列星不容為大祠大中四年以中書侍郎同中書門下平章事再嵗罷為宣武節度使數徙鎮卒崔璵為栁公綽所取士見公綽傳授歸登右散騎常侍制白居易近侍之列騎省為貴厯代迄今選任頗重必詢望實而後命之工部侍郎歸登朴忠沈厚心無適莫介圭不飾止水無波澹然自居以致名稱抱此素行厯踐清貫掌議左掖貳職冬官嵗時滋深體貌益茂可以備顧問應對之選列言語侍從之臣冠貂附蟬立之於右訪諸時論僉以為然可守右散騎常侍登字冲之貞元初為右拾遺熊執易論裴延齡登曰雷霆之下安忍使君獨當自是同列切諫每聨署具奏憲宗初遷散騎常侍入謝上問政所先登知帝果斷勸順納諫爭内外傳為讜言加裴度幽鎮兩道招討使制元稹門下夫以區區秦伯而猶念晉國曰其君是惡其人何罪况朕均養億兆為之君親燕人冀人皆為乳哺而育之者安忍以豺狼驅脅之故絶其飛走盡致網羅止行犯命之誅是用開其一面晉國公裴度昔者區域之中蜂蟻巢聚蔡有逆孽齊有狡童厥初圖征疑議滿埜不懼不惑挺然披攘茍無司南允罔能濟佑我憲考為唐神宗實賴股肱運用心力肆朕小子蒙受景靈冀服於前燕平於後而撫馭失理盤牙復生求思弭寧中夕有得國老尚在夫何患焉是用亟宣懇惻之誠就加招撫之命於戲頃者師道元濟乗累代襲授之資籍山東結連之勢以丞相布畫於千里之外使諸將持重於四封之中而猶劉悟裂虵豕之驅李佑潰鯨鯢之腹盖逆順之情異而忠孝之道明也况彼幽鎮無名暴征以丞相近觀其宜以諸將齊奮其力斧鑕之刑坐廹椒蘭之氣外薫誰不自愛其生焉能與亂同死度宜開懐緩帶以待其歸可依前守司空兼門下侍郎同中書門下平章事河東節度使充幽鎮兩道招撫使餘如故通鑑云穆宗之初即位也兩河畧定蕭俛段文昌以為漸宜銷兵請密詔天下有兵處每嵗百人之中限八人逃死上可其奏軍士落籍者皆聚為盜及朱克融王庭湊作亂一呼而亡卒皆集詔徴諸道兵討之諸道兵少皆臨時召募烏合之衆又諸節度皆有監軍主將不得専號令小勝則飛驛奏捷不勝則脅主將以罪委之悉擇軍中驍勇以自衛遣羸懦就戰故每戰多敗又用兵舉動皆自禁中授以方畧朝令夕改不知所從中使道路如織故雖以諸道十五萬之衆裴度元臣宿望烏重𦙍李光顔皆當時名將討幽鎮萬餘之衆屯守餘年竟無成功崔植杜元預為相皆無逺畧史憲誠既逼殺田布朝廷不能討遂并克融庭湊以節授之由是再失河朔終唐之世不能復取授劉悟檢校司空幽州節度使制元稹門下朕聞將星明則英豪用靈旗指則妖祲消勁草可以受疾風盤根然後見利器茍非處劇何以用長况幽并少年燕趙奇士居常以紫騮自騁失意則白刃相仇將領斯難是先才傑昭義軍節度副大使知節度事澤潞滋邢洛等州觀察制置使金紫光祿大夫檢校尚書左僕射兼潞州大都督府長史御史大夫上柱國彭城郡王食邑三百户劉悟天與忠誠人推敬讓藴孟賁之勇不以力聞避㢘頗之强使之心服是以居危邦而智免臨大節而功髙嘗見委於先朝屢作藩於右地朕以遼陽巨鎮自我底寧姑欲撫之以仁然後示之以禮而守臣嬰疾幕吏擅權撓政行私虧恩剝下過為捶楚妄作威稜不均饗士之羊但養乗軒之鶴致兹撓變職此之由不有將材孰懲兒戲敷求朕志深謂汝諧是用拔竒式冀宣力帖以亞相寵之上公俾光十乗之行以壯三軍之氣可檢校司空兼幽州大都督長史御史大夫充幽州契丹兩番經畧盧龍等使散官勲封如故悟正臣之孫初為李師道牙將師道被討使將兵屯曹悟以其衆入鄆殺師道即拜義成節度使封彭城郡王徙昭義朱克融亂移守盧龍不得入治邢州寳厯初巫者言師道以兵来悟懼嘔血卒授田布魏博節度使制元稹門下經曰父母之仇不同天雖及匹士而猶寢苫枕干以期必報是以子胥不殉伍奢之死卒能發既蔵之墓鞭不義之屍取貴春秋名垂萬古而况於身備將壇父死人手家仇國恥併在一門當懐嘗膽之心豈俟絶奬之禮金革無避其在兹乎前四鎮北庭行軍兼涇原節度使檢校左散騎常侍御史大夫田布咨爾先臣惟國元老首自河朔来朝帝庭而又東取青齊北討燕趙提挈義旅勤勞王家冒白刃而不疑推赤心而自信屬冀方求師余所重難輟自大名付兹巨鎮而中台暗折上將妖侵蟊賊潛寘於腹心豺狼勃興於肘腋人神憤痛朝野驚嗟深軫予懐誓擒元惡以爾布詩書并習忠孝兩全常用魏師克征淮孽素行恩信共著勲庸豈無奮檄之圖為報寇讎之黨且魏之諸將由爾父而崇髙魏之三軍蒙爾父之仁愛昔既同其美利今豈忘其深寃爾其淬礪勇夫敬恭義士一飯之飽必同於士卒一毫之費必用於戈矛非算畫不萌於心非軍旅勿言於口居則席藁寒則抱氷以喪禮處之若哀心感者必有為横身刎頸感智捐軀下報營魄旁清醜類於戲至誠可託稔惡難逃矧彼㓙殘去將安往墨縗在體𤣥纛在前揚劒執金無忘哀敬可起復寧遠將軍缺右金吾衛大將軍員外同正員檢校工部尚書兼魏州大都督府長史御史大夫充魏博等州節度觀察處置等使勲賜如故主者施行田布字敦禮魏博節度使𢎞正之子父子性忠孝常欲變山東承襲舊風穆宗初王承元以成徳請帥帝用𢎞正𢎞正以新與鎮人戰取魏兵二千自衛度支崔倰吝其稟沮之衛卒歸軍亂被殺公卿議以魏人徳𢎞正乃拜布魏博節度使布泣辭不聽與妻子賔客决曰吾不還矣河朔三鎮舊連衡桀驁自私而魏牙將史憲誠隂蓄異志欲因間以揺衆會詔分布軍合李光顔救深州衆遂潰欲强布行河朔舊事布知衆且亂為書謝帝因自殺授元晦諫議大夫制李徳裕昔汲黯薄淮陽守願出入禁闥補過拾遺則諫諍之任實資諒直我求其比今得正人吏部郎中元晦往在内庭嘗感先顧奮發忠懇不私形骸伏俯青蒲至於雪涕數共工之罪不蔽堯聰辨垣平之詐益彰文徳近因旌别邪正宰弼上言以魯公蔵罟莫如置革於左右漢后輯檻孰若列游於公卿是用命爾登於文陛其副我寵擢不替初心勿沽小名以枉大節勉服官業期於有終可諫議大夫除吕蒙正中書侍郎兼户部尚書平章事制李沆天道無私日月星辰助其照皇王不宰股肱輔弼代其工所以端拱守成垂衣制理求建丕平之景運遐追三代之令猷其有業茂經綸才推謹厚參大政而已淹星嵗秉至公而無捨寅昏宜頒出綍之殊恩俾正持衡之重柄爰擇剛日特降命書推忠佐理功臣朝散大夫給事中參知政事柱國東平郡開國男吕蒙正四氣均和五行鍾秀有濟時之畧輔之以温恭挺命世之才守之以循默爰覩舜旌之進善遂指魏闕以来儀臨軒覩敏贍之能射䇿見縱横之畧暨兹登用益著謨明公忠推社稷之臣凝重見廟堂之器缺兹大體久鬱具瞻屢宣作礪之功克懋秉鈞之績别錫褒功之美號仍陞馭貴之崇階勲籍増榮井田加賦預烈侯之峻爵同大利之計書顧優恩之在兹諒名器之無假於戲雲從龍而風從虎今也其時啓乃心而沃朕心必求諸道爾宜周旋庶政佐佑眇躬緩兹宵旰之憂翊我隆平之運同底於道豈不美歟除文彦博平章軍國重事制鄧潤甫缺傳道之教訓先王所以廸厥官老成重以典刑天下所以資其智廼睠舊徳時謂元勲謀合祖宗之心缺載鼎彝之器申攽贊䇿播告外朝河東節度管内觀察處置等使守太師開府儀同三司太原尹致仕上柱國潞國公文彦博惇大而清明方嚴而信厚出則秉乎旄鉞入則總我鈞衡文武兼備其才夷險能致其力畢公之弼四世三紀於兹傅説之總百官萬邦其乂爵隆無富溢之累名遂有身退之榮神明相其夀康人心想其風采是用還之論道倚以經邦以帝者之師臣謀議廟堂之上以天下之大老制馭夷狄之情庶㡬有為底於極治陪敦多井申衍真封於戲吕望惟賢起佐文王之治周公已老留為孺子之師矧我耆英無愧前哲往宣一徳用格多盤兩京詔令遐哉邈矣唐宋以来始襲用駢麗然自有王言之體若褒美太過下類箋啓則人臣何以當之是編所存必擇其有體裁者恵卿責授建寧軍節度副使本州安置不得簽書公事制蘇軾元兇在位民不奠居司寇失刑士有異論稍正滔天之罪永為垂世之規具官吕恵卿以斗筲之才挟穿窬之智諂事宰輔同升廟堂樂禍而貪功好兵而喜殺以聚斂為仁義以法律為詩書首建青苖次行助役均輸之政自同商賈手實之禍下及雞豚茍可蠧國以害民率皆攘臂而稱首先皇帝求賢若不及從善如轉圜始以帝堯之心姑試伯鯀終然孔子之聖不信宰予發其宿奸讁之輔郡尚疑改過稍畀重權復陳罔上之言繼有碭山之貶反覆教戒惡心不悛躁輕矯誣徳音猶在始與知已共為欺君喜則摩足以相歡怒則反目以相噬連起大獄發其私書黨與交攻㡬半天下姦贓狼籍横彼江東至其復用之年始倡西戎之隙妄出新意變亂舊章力引狂生之謀馴至永洛之禍興言及此流涕何追迨予踐祚之初始發安邊之詔假我號令成汝詐謀不圖渙汗之文止為欵賊之具迷國不道從古罕聞尚寛兩觀之誅薄示三危之竄國有常典朕不敢私曲洧舊聞云恵卿之謫也劉貢甫當草制引疾而出東坡一揮而就不日傳都下紙為之貴紹聖牽復知江寧府所作謝表句句論辨惟至發其私書則云自省於巳莫知其端又自叙云顧惟妄論何禆當日之朝廷徒使煩言有黷在天之君父觀此一言使其得志必殺二蘇無疑矣盖當時論列多出子由而謫詞則東坡當筆也宣徳郎劉錫永父元年一百四嵗可承事郎制蘇軾勑劉元年尚齒教民三代之義咨爾百年之故老乃吾六世之遺民自非吉人莫享上夀張蒼事秦柱下而至漢孝景思邈生隋開皇而及唐永淳古有其人乃今親見何愛一命慰其子孫可賜太師文彦博乞致仕不許制蘇軾勑彦博論道則忘年卿不可以年既髙而為請稱徳則鄙力卿不可以力不足而為辭斷之於中義有不易豈以屢請之故而廢將成之功體君至懐以慰公議又省表具之卿之求去盖數矣言不為不切而朕終莫之從朕之留卿亦至矣禮不為不盡而卿終莫之亮君臣之際情不相喻朕甚疑之夫樂丘園而厭軒冕亦古人之一節而非聖賢之髙致尊耆老以重朝廷盖天下之大計而非冲人之私欲與其使朕屈公議以從卿曷若卿少貶其私意以殉天下乎賜宰相吕公著乞退不允制蘇軾用賢之功必要之久逺日計不足嵗計有餘朕之用卿期於百姓之既富卿之自信亦豈一日而成功常暘之災天以警朕夙夜祇懼與卿同之朕若歸過於股肱何以答天戒卿若釋政而安逸何以塞民言各思其憂少安厥位又夫以才御物才有盡而物無窮以道應物道無窮而物有盡凡今之患所乏非才以卿篤於愛君必能建長久之䇿澹然無我可以寄枉直之權二年於兹百度惟正事既就緒民亦小康至於微疾之屢攻此亦髙年之常理卿其良食自輔為國少安譬如止水之在槃豈復勞心於鑑物心且不勞而况於力乎丞相阿珠贈諡制閻復邊外開邊四達弗庭之域將門出將三持分閫之權緬思百戰之勞宜用九原之賁故光禄大夫中書左丞相兼都元帥贈開府儀同三司太尉追封并國公諡武宣阿珠英才間世勇畧邁倫當先皇大理之征佐廼父雲南之役靖蠻荒而平交趾拔襄漢而下江南鳶瘴揮戈萬里若衽席之上龍驤飛渡三吳歸掌握之中賛成混一之圖式副元勲之號按禮寺易名之典加王章異等之恩於戲青史屢書諒騰芳之有永黄河如帶尚流慶於無窮可加贈推誠宣力保大功臣太尉開府儀同三司上柱國追封河南郡王諡武定阿珠烏蘭氏烏蘭哈達子也憲宗時從父征西南夷所向摧陷平大理降交趾無不在世祖即位自宿衛拜征南都元帥拔樊城襄守吕文煥遂降帝議伐宋久不决阿珠曰臣久在行間見宋兵弱於往昔失今不取時不再来詔益兵十萬與丞相巴延同伐宋及宋平阿珠控制之力為多閻復字子靖山東髙唐人官翰林學士承㫖諡文康有靜軒集左丞許衡贈官制姚燧天非繼聖學之墜緒則不生命世之大才國欲與王道以比隆肆用為烝民之多覺何物故之已久尚人思之未忘故資善大夫中書左丞集賢大學士兼國子祭酒教領太史院事許衡玉裕而金相準平而繩直出處則惟義所在言動亦以禮自持休休焉有容屬屬乎其敬人能𢎞道惟朝聞夕死之是期我欲至仁匪晝誦夜思而不得行己似秋霜烈日化人如時雨和風来席下之摳衣滿户外者列屨達簡在帝心者率多丞弼窮固守師説者不失善良鶴鳴九臯而聲聞於髙鳯翔千仞必徳輝乃下爰立相以堯君舜民之志所告上皆伊訓説命之言丹扆斥姦少不避雷霆之缺擊青臺治厯本於䇲日月而送迎繇理窮而智益明隨任使而職斯舉今既亡矣誰其嗣之於虖在爾身有垂没世之名於朕心有失同時之恨雖成廟納書以命諡固已振木鐸之髙風而功臣胙土則未加用申錫密章於下地光靈如在寵數其承可贈正學垂憲佐運功臣太傅開府儀同三司追封魏國公仍諡文正公卒後大徳二年贈司徒諡文正此至大二年加贈制也皇慶二年始從祀孔子廟廷丞相達哩台追封淇陽王制姚燧出入帷幄在人十能而己則千訏謨廟堂為相一年而疾居半竟邦家之殄瘁宜王禮以追崇故開府儀同三司中書右丞相監脩國史太保太子太師知樞密院徽政使中政使宣徽使左都威衛指揮使達哩台維昔開國之遺苗乃今太師之元嗣由爾世胄為我親臣事世祖至今也凡三朝職食官而久者非一日灼其㢘明而忠亮與夫恭遜而温文眷兹中書出庶政之原居以右相絶百僚之席使加中政機總六軍善調䕶而長宫師缺纂脩以成國史如此重責皆所裕為一徳可以寛鄙夫片言奚止簡繁務思過榮之可懼視倖利以不貪同綰銀艾者十人爾先辭免其太尉均受錫田以萬畝爾獨還致於司空觀父子之並相一門求聖賢與尚友千古改為改作緇衣何賴乎武桓拜後拜前赤舄未慚於周魯方歌功於清廟倐委魄於𤣥閭豈意少者没而老者存益信神難明而理難測憐乃公獨傷於漠北誓爾後均胓乎淇陽嗚呼何但上下床盡餘子可束之髙閣如失左右手慨正人不作於下泉咨爾靈明歆朕休命可特贈封諡為懐忠昭徳佐治功臣開府儀同三司太師上柱國淇陽恵穆王姚燧字端甫樞之從子也三嵗而孤育於樞樞隱居蘇門謂燧蒙暗督之甚急楊奐馳書止之曰燧令器也長日自成何以急為二十四試習為文人謂有作者風三十八始為秦王府文學至元二十四年為翰林學士厯官至翰林學士承㫖知制誥兼脩國史卒年七十六燧之學有得於許衡為文閎肆該洽三十年間名臣世勳顯行碩徳皆燧所書每来謁文必其行業可嘉然後許可詞無溢美髙麗潘陽王求燧詩文不與奉㫖乃與之王贈謝幣帛金玉名畫五十筐燧即時分散諸屬官及史胥侍從止留金銀為翰林公用器皿人問之曰彼小國惟以貨利為重吾能輕之使知大朝不以是為意然頗恃才輕趙孟頫元明善輩君子以是少之有牧菴集翰林承㫖姚樞贈諡制王構昔有先正蚤事聖皇惟夙夜單厥心而終始典於學如伯益之贊夏禹暨尹躬之佐成湯行乎仁義之塗任其社稷之重計於廟堂之上明夫事幾之先盖精神志意之相孚故啓沃都俞之靡間制難拘於一例恩特侈於屢書故翰林學士承㫖中奉大夫詳定禮儀使贈榮禄大夫少師文獻公姚樞以淵識𢎞謨為國蓍蔡以清彝素檢為時楷儀曉萬事安異同式羣工壹統畧周旋必禮温温維徳之恭敷納以言蹇蹇匪躬之故止殺允符於宸慮宣澤丕應於天功以故終和且平近者親逺者附不賞而勸大臣法小臣㢘國家之表裏可觀風俗之樞機隨轉績己成而弗有身愈退而彌尊顧當時耆夀其誰歟致今日隆平者公也正事正言正道親傳文祖之燕謀有徳有功有能首被先朝之鴻訓肆朕纂成之始於公簡注之深槐序延登衣仍袞黼棠隂未徙胙廼龜蒙因諡以正其名崇章以介其祉於戲得天下賢材斯足矣方圖政教之新有朝廷大議則就之慨想儀刑之舊往欽兹命以永其傳可加贈嘉猷程世舊學功臣太師開府儀同三司追封魯國公仍諡文獻姚樞字公茂栁城人初得程朱之書以授許衡衡盡室依之已而事世祖於潜邸贊决大計為多尤諄諄於不嗜殺人又請禁宋鞭背黥面等濫刑年七十八卒王構字肯堂東平人文章典雅厯事三朝朝廷大典冊多出其手尤喜薦引寒士終翰林學士諡文肅平章李庭贈諡制張士觀混一之期有開於真主恢攘之寄允賴於忠臣其器博則用廼周其才全則效斯著顧奏捷獨多於羣帥而疇庸豈限於彝章故榮祿大夫平章政事議樞密院事提調諸衛屯田事兼後衛親軍都指揮使李庭宣力襄樊威振嶺海甫師干之厯試俄斧鉞之升崇劒敵萬人縱横制變衝當一面出入如神納之牛腹而獲生載賈登陴之勇蔽以馬韉而捷騖疇爭執訊之能其韜鈐動合於昔賢故聲烈特聞於今日至於扈聖祖東除僭孽所向無前翼先朝西奠遐陬其猶克壯决䇿於未然而䇿無遺者審㡬之先見而㡬則灼然緬懐熊豹之姿忍聽鼓鼙之奏生也加封之弗逮名焉節恵以為宜於戲黼冕桓圭昭其文昭其度玉符麟節傳之子傳之孫精爽如存寵光無斁可特贈推忠翊衛功臣儀同三司太保上柱國追封益國公諡武毅李庭小字勞山本金人後改李氏至元六年以材武𨽻軍籍從代宋又與色埒黙戰從征塔布岱金剛努皆力戰有功或中砲矢氣垂絶剖水牛腹納其中乃甦又嘗征日本船壊抱船板抵㟁收餘衆由髙麗還制中牛腹句正用實事平章博果宻贈諡制盧亘朕凝命穆清式觀天造將啓靖邦之嘉運必生名世之大賢挺出類拔萃之資行尊主庇民之學使之君臣同徳夙夜盡心協贊機衡融景化於瞬息之頃深謀廊廟致太平於期月之間禮樂以之而興隆隂陽由之而順序昔聞其語今見其人故昭文館大學士榮祿大夫平章軍國重事行御史中丞博果宻明允篤誠温文㢘讓研精聖道得先儒淵秘之傳藻勵忠規承世皇簡注之渥薦膺器使徧厯清華殫物洽聞而守以正經徳廸慮而不近名屬熙朝更化之初開明堂垂拱而治升居台鉉俾磬訏謨一澄苛弊之源大洗姦諛之迹事至立斷言為天下之公知無不為才實王者之佐攬羣材而並進理萬變而不疑𢎞沃聖衷誕孚辰告翊先帝履尊之際輟元臣分陕之行再入秉鈞遽聞辭疾彌綸軍國閔勞機務之煩提挈憲綱坐見朝廷之肅儵號隆福之僊馭旋驚梁壊而山摧寧不百年遂亡一鑑備觀規摹之盛可謂社稷之臣肆予撫軍言還懐兹懿徳當宁而歎恨不同時圖髙密於雲臺丹青罔既詠裴度於丘禱柱石徒哀是用寵以帝傅之崇賜以周公之履庸起具臣之勸允為儒者之光繄爾英靈歆兹明命可特贈純誠佐理功臣開府儀同三司太傅上柱國追封魯國公諡文貞博果宻世為喀喇部大人世祖竒之命師事王恂許衡厯世祖成宗朝為親臣其學先躬行而後文秇居則靜默及帝前論事吐詞洪暢引義正大以天下之重自任知無不言卒年四十六隆祐太后布告天下手書汪藻比以敵國興師都城失守祲纒宫闕既二帝之蒙塵誣及宗祊謂三靈之改卜衆恐中原之無統姑令舊弼以臨朝雖義形於色而以死為辭然事廹於危而非權莫濟内以拯黔首將亡之命外以紆鄰國見逼之威遂成九廟之安坐免一城之酷乃以衰癃之質起於閒廢之中迎置宫闈進加位號舉欽聖以還之典成靖康欲復之心永言運數之屯坐視邦家之覆撫躬獨在流涕何從緬惟藝祖之開基實自髙穹之眷命厯年二百人不知兵傳序九君世無失徳雖舉族有北轅之釁而敷天同左袒之心乃眷賢王越居近服已狥羣情之請俾膺神器之歸繇康邸之舊藩嗣宋朝之大統漢家之厄十世宜光武之中興獻公之子九人唯重耳之尚在兹為天意夫豈人謀尚期中外之協心同定安危之至計庶臻小愒同底丕平用敷告於多方其深明於吾意隆祐太后哲宗孟皇后也初劉婕妤有寵怨后章惇誣宣仁后有廢立計以后逮事宣仁又欲隂附劉以固寵遂與中官郝隨因后母禱祠事搆獄廢后詔下之日天為隂翳帝亦旋悔之徽宗時后所居瑶華宫火徙延寧宫又火乃出居私第金人入汴六宫有位號者皆北遷后獨以廢存張邦昌僭位迎入禁中后遣人迎康王尋降書播告天下髙宗即位尊為元祐太后旋以后祖諱改為隆祐后嘗為髙宗言宣仁之誣皆奸人為之帝為更脩兩朝實錄而惇等情狀益著云汪藻字彦章饒州徳興人徽宗時為著作佐郎忤王黼出通判宣州凡八年欽宗即位召為屯田員外髙宗踐祚試中書舍人黄潜善惡之免為集英殿脩撰明年召復進兵部侍郎兼翰林學士紹興三年出知湖州厯撫徽宣三州奪職居永州卒秦檜死復職官二子藻通顯三十年無屋廬以居博極羣書老不釋巻所為制詞人多傳誦建炎三年十一月三日徳音汪藻門下禦敵者莫如自治動民者當以至誠朕自纉丕圖即罹多故昧綏懐之逺畧貽播越之深憂雖眷我中原漢祚必期於再復而廹於强敵商人㡬至於五遷兹緣仗衛之行尤厯江山之阻老弱扶攜於道路饑疲蒙犯於風霜經從或苦於繹騷程頓不無於煩費所幸天人協相川陸無虞倣治古之時巡即奥區而安處言念連年之紛擾坐令率土之流離鄉閭遭焚刼之烖財力困供輸之役肆夙宵而軫慮如氷炭之交懐嗟汝何辜由吾不徳故每畏天而警戒誓専克己以焦勞欲睦鄰休戰則卑辭屈體以請和欲省費恤民則貶食損衣而從儉茍可坐銷於氛祲殆將無愛於髮膚然邊陲嵗駭而師徒不免於屢興餽餉日滋而征斂未遑於全復惟八世祖宗之澤豈汝能忘顧一時社稷之憂非予獲已止俟寇攘之息首圖蠲省之宜况昨来蒙蔽之俗成致今日凌夷之禍亟雖朕意勤求於民瘼而人情終壅於上聞主威非恃於萬鈞堂下自遥於千里既真偽有難憑之患則邇遐銜無告之寃已勑輔臣相與虚懐而聽納亦令在位各須忘勢以咨詢直言者勿遣危疑忠告者靡拘微隱所期爾衆咸體朕懐尚慮四民興失職之嗟百姓有奪時之怨科須苛急人心難俟於小康犴獄蕃滋邦法有稽於末減乃用迎長之節特頒在宥之恩於戲王者宅中夫豈甘心於逺狩皇天助順其將悔禍於交侵唯我二三之臣與夫億兆之衆亟攘外侮協濟中興是年三月有苗傅劉正彦之亂四月帝復大位發杭州至建康八月壬寅發建康十月癸未至杭州此制在其時所謂兹緣仗衛之行尤厯江山之阻者也國家艱難之際得一詔令足以悚動人心所關係不小唐之陸贄宋之汪藻皆其選也霸府禁奢令梁武帝夫在上化下草偃風從世之澆淳恒由此作自永元失徳書契未紀窮㓙極悖焉可勝言既而旋室外構傾宫内積竒技異服殫所未見上慢下暴淫侈競馳國命朝權政移近習販官鬻爵賄貨公行並甲第康衢漸臺廣室長袖低昂等和戎之賜珍羞百品同伐氷之家愚人因之浸以成俗驕豔競爽夸麗相髙至乃市井之家貂狐在御工商之子緹繡是襲日入之次夜分未反昧爽之朝期之清旦聖明肇運厲精惟始雖曰纉戎殆同創革且淫費之後繼以興師巨橋鹿臺洞罄不一孤忝荷大寵務在澄清思所以仰述皇朝大帛之㫖俯厲微躬鹿裘之義解而更張斵雕為樸自非可以奉粢盛脩黻冕習禮樂之容繕甲兵之備此外衆費一皆禁絶御府中署量宜罷省掖庭備御妾之數大饗絶鄭衛之音其中有可以率先卿士准的甿庶菲食薄衣請自孤始加羣才並軌九官咸事若能人務退食競存約已移風易俗庶期月有成昔毛玠在朝士大夫不敢靡衣偷食魏武歎曰孤之法不如毛尚書孤雖徳謝往賢任重先達實望多士得其此心外可詳為條格梁武功業僅僅與齊陳比肩其躬行節儉愛養小民江左諸君皆不如也此令實其致治之本而文之舂容典雅亦稱之與劉孝儀令梁簡文帝賢從中庶奄至殞逝痛可言乎其孝友淳深立身貞固内含玉潤外表瀾清美譽嘉聲流於士友言行相符始終如一文史該富琬琰為心辭章博贍𤣥黄成采既以鳴謙表性又以難進自居未嘗造請公卿締交榮利是以新沓莫之舉杜武弗之知自阮放之官野王之職栖遲門下已踰五載同僚已陟後進多升而怡然清靜不以少多為念確爾之志亦何易得西河觀寳東江獨步書籍所載必不是過吾昔在漢南連翩書記及忝朱方從容坐首良辰美景清風月夜鷁舟乍動朱鷺徐鳴未嘗一日而不追隨一時而不會遇酒闌耳熱言志賦詩校覆忠賢𣙜揚文史益者三友此實其人及𢎞道下邑未申善政而能使民結去思野多馴雉此亦威鳯一羽足以驗其五徳比在春坊載獲申晤博望無通寳之務司成多節文之科所願故人時相嫓偶而此子溘然實可嗟痛惟與善人此為虚説天之報施豈若此乎想卿痛悼之誠亦當何已往矣奈何投筆惻愴吾昨欲為誌銘并為撰集吾之劣薄其生也不能揄揚吹歔使得騁其才用今者為銘為集何益既往故為痛惜之情不能已已耳劉遵字孝陵彭城安上里人有學行工文為晉安王宣恵雲麾二府記室王轉南徐州治中後為雍州復引為安北諮議㕘軍帶卬縣令及王立為皇太子仍除中庶子遵自隨藩及在東宫偏蒙寵遇大同元年卒太子深悼惜之與遵從兄陽羨令孝儀令與湘東王令梁簡文帝威明昨宵奄復殂化甚可痛傷其風韻遒上神采標映千里絶迹百尺無枝文辯縱横才學優贍跌宕之情彌逺濠梁之氣特多斯實俊民也一爾過隟永歸長夜金刀掩芒長淮絶涸去嵗冬中已傷劉子今兹寒孟復悼王生俱往之傷信非虚説王規字威明簡文為晉安王規為長史王立為太子仍為太子中庶子卒太子出臨哭與湘東王令胡袁轅云劉子謂中庶子遵也規大同二年卒遵先一年卒尺牘清裁世説新語以簡文為昭明書記洞詮以遵為孝綽俱誤宣徳皇后令任昉宣徳皇后敬問具位夫功在不賞故庸勲之典盖闕施侔造物則謝徳之徒已寡要不得不强為之名使荃宰有寄公實天生徳齊聖廣淵不改參辰而九星仰止不易日月而二儀貞觀在昔晦明隱鱗戢翼博通羣籍而讓齒乎一巻之師劒氣陵雲而屈迹於萬夫之下辯析天口而似不能言文擅雕龍而成輒削藁爰在弱冠首應弓旌客遊梁朝則聲華籍甚薦名宰府則延譽自髙隆昌季年勤王始著建武惟新締構斯在功隆賞薄嘉庸莫疇一馬之田介山之志愈厲六百之秩大樹之號斯存乃擁旄司部代馬不敢南牧推轂樊鄧胡塵罕嘗夕起惟彼狡童窮㓙極虐衣冠泯絶禮樂崩喪既而鞠旅誓衆言謀王室白羽一麾黄鳥抵定甲既鱗下車亦瓦裂致天之界拱揖羣后豐功厚利無得而稱是以祥光總至休氣四塞五老游河飛星入昴而地狭乎四履勢卑乎九伯帝有惡焉輶軒萃止今遣某位某甲等率兹百辟人致其誠庶匪席之㫖不逺而復建平王聘隱逸教江淹府州國紀綱夫媯夏已没大道不行雖周恵之富猶有魚潭之士漢教之隆亦見棲山之夫迹絶雲氣意負青天皆待絳螭驤首翠虬来儀是以遺風獨扇百代餘烈激厲後生斯乃王教之助古人之意焉吾税駕舊楚憇乗汀潭挹於陵之操想漢隂之髙而山川遐久流風無沫養志數人並未徴采善操將棄良用慨然宜速詳舊禮各遣纁招庶暢此幽襟以旌蓬蓽宋建平王景素文帝第七子宏之子也位南徐州刺史加都督好文章書籍招集才異之士時廢帝不道内外皆屬意景素而楊運長等深忌之元徽四年或告景素臺城已潰景素即舉兵為臺軍所破斬之為東海餉諸葛處士教謝朓昔長孫東組降龍丘之節文舉北輜髙通徳之稱所以激貪立懦式揚風範處士諸葛璩髙風所漸結轍前脩豈懐珠披褐韜玉待價將幽貞獨往不事王侯者邪聞事親有啜菽之窶就養寡蒸梨之給豈得獨享萬鍾而忘兹五秉可餉穀百斛齊明帝輔政用脁為晉安王鎮北諮議南東海太守行南徐州事永嘉郡教丘遲貴郡控帶山海利兼水陸實東南之沃壤一都之巨會而曝背拘牛屢空於畎畝績麻治絲無聞於窐巷其有耕灌不脩桑榆靡樹遨遊鄽里酣酺卒嵗越伍乖鄰流宕忘返才異相如而四壁獨立髙慚仲蔚而三徑没人雖謝文翁之正俗庶㡬龔遂之移風丘遲字希範烏程人靈鞠之子也在齊以秀才累遷殿中郎武帝平建鄴引為驃騎主簿時勸進梁王及殊禮皆遲文也及踐阼遷中書侍郎後出為永嘉太守在郡不稱職為有司所糾帝愛其才寢其奏遲辭采麗逸鍾嶸評其詩點綴映媚似落花依草其見稱識如此豫章王拜後赦教陸倕夫議獄緩死著在令圖疑罪惟輕聞諸雅誥是以虞經惻隱流涕冬决鍾意垂仁哀矜寒送吾以虚薄夙頒寵章光宅襟險奄有全粤非有沛獻矜嚴空紆青組東平智思徒舉赤帷思所以仰述皇猷導揚𢎞澤遵彼下車譬兹解網按倕齊梁間人本傳不載為豫章官屬齊豫章王嶷嘗為南蠻校尉荆湘二州刺史都督八州帝因其病為之大赦疑此時作也倕事别見為荆州刺史下教蕭秀夫鶉火之禽不匿影於丹山昭華之寳乍耀采於藍田是江漢有濯纓之歌空谷著来思之詠𢎞風闡道靡不由兹處士河東韓懐明南平韓望南郡庾承先河東郭麻並脱落風塵髙蹈其事兩韓之孝友純深庾郭之形骸枯槁或橡飯菁羮惟日不足或葭墻艾席樂在其中昔伯武貞堅就仕河内史雲孤邵屈志陳留豈曰塲苗實惟攻玉可加引辟並遣喻意既同魏侯致禮之請庶無辟疆三緘之歎梁安成王秀字彦達梁武庶弟也性仁恕喜怒不形於色厯刺三州皆有善政與建安王皆重士世以二安方之四豪卒諡曰康王僧孺陸倕劉孝綽裴子野各製文欲擇用之而咸稱實錄遂並建四碑永眀九年䇿秀才五問王融問秀才髙第眀經朕聞神靈文思之君聰眀聖徳之后體道而不居見善如不及是以崆峒有順風之請華封致乗雲之拜或揚旌求士或設簴待賢用能敷化一時餘烈千古朕夤奉天命恭惟永圖審聽髙居載懐祇懼雖言事必史而象闕未箴寤寐嘉猷延佇忠實子大夫選名升學利用賓王懋陳三道之要以光四科之首鹽梅之和屬有望焉又問昔周宣惰千畝之禮虢公納諫漢文缺三推之義賈生置言良以食惟民天農為政本金湯非粟而不守水旱有待而無遷朕式照前經實兹稼穡祥正而青旗肅事土膏而朱絃戒典將使杏花菖葉耕穫不愆清甽泠風述遵無廢而釋耒佩牛相沿莫反兼貧擅富浸以為俗若爰井開制懼驚擾愚民瀉鹵可腴恐無史白興廢之術矢陳厥謀又問議獄緩死大易深規敬法恤刑虞書茂典自氓俗澆弛法令滋彰胏石少不寃之民棘林多夜哭之鬼朕所以明發動容昃食興慮傷秋荼之密網惻夏日之嚴威永念畫冠緬追刑厝徒以百鍰輕科反行季葉四支重罰爰創前古訪游禽於絶澗作霸秦基歌雞鳴於闕下稱仁漢牘二途如爽即用兼通昌言所安朕將親覽又問聚人曰財次政曰貨泉流表其不匱貿遷通其有亡既龜貝積寢緡􅀈専用世代兹多銷漏參倍下貧無兼辰之業中産闕洊嵗之貲惟瘼䘏隱無捨矜歎上帝溥臨賜朕寳命卭斜之谷開而出銅且有後命事兹鎔範充都内之金紹圜府之職但赤仄深巧學之患榆荚難輕重之權開塞所宜悉心以對又問治厯明時昭遷革之運改憲勑法審刑徳之原分命顯於唐官文條炳於鄒説及嵎夷廢職昧谷虧方漢秉素祇之徴魏稱黄星之驗紛爭空軫疑論無歸朕獲纂洪基思𢎞至道庶令日月休徴風雨玉燭克明之㫖弗逺欽若之義復還於子大夫何如哉其驪翰改色寅丑殊建别白書之融字元長僧達之子躁於名利自恃人地三十内望為公輔齊武帝疾融以太孫不徳欲矯詔立竟陵王子良西昌侯鸞奉鬱林即位鬱林怨融即位十餘日收融下獄賜死年二十七袁彖嘗言齊氏㣲弱已數年若不立長君無以鎮安四海王融雖為身計實安社稷恨其不能斷事以至於此永眀十一年䇿秀才五問王融問秀才朕秉籙御天握樞臨極五辰空撫九叙未歌至於思政明臺訪道宣室若墜之惻每勤如傷之念相軫故恤貧緩賦省徭慎獄幸四境無虞三秋式稔而多黍多稌不興兩穂之謡無褐無衣必盈七月之歎豈布政未優將罷民難業登爾於朝是屬宏議罔弗同心以匡厥辟又問惟王建國惟典命官上協星象下符川嶽必待天爵具脩人紀咸事然後沿才授職揆務分司是以五正置於朱宣下民不忒九工開於黄序庶績其凝周官三百漢位兼倍厯兹以降游惰實繁若閒冗畢棄則横議無已冕笏不澄則坐談彌積何則可脩善詳其對又問昔者賢牧分陕良守共治下邑必樹其風一鄉可以為績至有旦撫鳴琴日置醇酒文而無害嚴而不殘故能出人於阽危之域躋俗於仁夀之地是以賈誼有言下之有惡吏之罪也頃深汰珪符玅簡銅墨而春雉未馴秋螟不散入在朕前湊其智畧出連城守闕爾無聞豈薪槱之道未𢎞為網羅之目尚簡悉意正辭無侵執事又問朕聞上智利民不述於禮大賢彊國罔圖惟舊豈非療饑不期於鼎食拯溺無待於規行是以三王異道而共昌五霸殊風而並烈今農戰不脩文儒是競棄本狥末厥弊滋多昔宋臣以禮樂為殘賊漢主比文章於鄭衛豈欲非聖無法將以既道而權今欲専士女於耕桑習鄉閭以弓騎五都復而事庠序四民富而歸文學其道奚若爾無面從又問自晉氏不綱闗河蕩析宋人失馭淮汴崩離朕思念舊民永言攸濟故選將開邊勞来安集加以納欵通和布徳脩禮歌皇華而遣使賦膏雨而懐賔所以闗洛動南望之懐獯夷遽北歸之念夫危葉畏風驚禽易落無待干戈聊用辭辯片言而求三輔一説而定五州斯路何階人誰或可進謀誦志以沃朕心四六法海巻一
