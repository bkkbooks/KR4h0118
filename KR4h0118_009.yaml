body:
  text: 四六法海卷九明王志堅撰兵部奏姚州破逆賊諾沒弄楊虔栁露布駱賓王尚書兵部臣聞北辰列象六合奉天子之尊南面乘乾一統成聖人之業是知衣裳所會義有輯於殊鄰霜露所均誠兼育於異類故塗山萬國誅後至者防風丹浦一戎緩前禽者就日然則陳弧矢以威天下法雷霆而震域中四時行焉天道不能去殺五兵備矣皇業所以勝殘雖事切救焚茍順時而濟物恩深祝網不獲已而用兵伏惟皇帝陛下登翠媯以握圖憲紫微而正象玄功不宰混太始以凝神至道無名佇華胥而得夢闡文教以清中夏崇武功以制九夷環海十洲通波太液之水鄧林萬里交影甘泉之樹反衝穿胸之域襲冠帶以來王竒肱儋耳之酋奉正朔而請吏逆賊蒙儉和舍等浮竹遺胤沉水餘苗邑殊禮樂之鄉人習貪殘之性日者皇明廣燭帝道遐融頗亦削左袵而被朝衣解椎髻而升華冕而豺狼有性梟獍難馴遂敢亂我天常變九隆而背誕負其地險攜七部以稽誅搔動邊疆冦攘州縣是用三門授律長驅無戰之師五月渡瀘深入不毛之地去月二十一日軍次三朏崑崙鎮前後捕得生口知守捉山羌傍山連結十部蠻首徒五萬衆此山即南郡中之巨防也岡巒千里西通大荒之郊溪谷萬重南極炎洲之境聳喬林而插月陰兔有假道之標拔崇巖以隱天陽烏無回翼之地峰危束馬路絶懸車賊據臨岱之形乘建瓴之利徵風召雨蝟起蜂飛驅雜種以挺妖封狐千里肆沉黎而作孽雄虺九頭臣以為制敵以權柔逺者理或存於德教伐叛以義決勝者不必在於干戈於是廣布朝恩恭宣帝德申之以安撫曉之以存亡信重蠻陬無負黃龍之約賞隆漢爵不踰白馬之盟地接冉駝詞屢殫於喻蜀俗通槃瓠聲不輟於吠堯臣遣左三軍子總管寧逺將軍前守右驍騎萬安府長史折衝都尉上柱國劉會基率檢校果毅驍騎尉井陘縣開國男劉玄暕等銜枚逺襲卷甲前驅偃危斾而設潛兵疑從天落乘間道而掩不備似出地中又遣右三軍子總管明威將軍行右武衛翊府中郎將上柱國髙奴弗率左武衛天水府折衝都尉張仁樣等涉南山之南衝其要害之路又遣左一軍子總管前右金吾衛翊府左郎將上柱國孫仁感率衛尉府右果毅都尉王文雅等陵北山之北絶其飛走之途賊首領楊虔栁諾沒弄諾覽斯等振螳螂之力拒轍當輪肆蚊蚋之羣彌山滿谷劉會基髙奴弗孫仁感等並忠勤克著智略逺聞識明君之重恩輕生有地提太阿之雄劍視死無時彎弧而凶黨土崩舉刃而妖徒瓦解雖危苕沸鼎未窮梟首之誅救死扶傷猶致析骸之請二十二日臣遣副總管兼安撫副使定逺將軍前左驍騎翊府中郎將令狐智通率右武衛良將壯府左果毅都尉韓惠德等擁貔豹之雄順天機而左轉遣管內安撫副使朝議大夫使持節守銀州刺史上柱國宜春縣開國李大志率前左武衛靜初府右果毅都尉上柱國陳𢎞義等驅象犀之卒乘地軸以右回又遣行軍司馬朝散大夫守巂州都督府長史上柱國梁待璧率守右金吾衛宜昌府果毅都尉閻文成等總投石拔距之材蹈中權而拊其背又遣前守右威衛龍西府果毅都尉康留買等騰躍鐵噴金之騎犯前茅而扼其喉臣等率守左衛清官府左果毅許懷秀等橫玉弩以髙臨縱金鉦而直進玄雲結陳影密西郊赤蓳揮鋒氣衝南斗揚煙塵而匝地白日為之晝昏積氛祲以稽天蒼冥為之晦色兵交刃接鳥散魚驚自卯及申追奔逐北斬首千餘級轉戰三千里激流膏而為泉似變萇𢎞之血委亂骸而擠壑若沉鱉令之尸既而照盡髙舂雲昏乙夜賊乃收集餘衆保據重巖臣度彼遊魂慮其宵遁使三軍齊進四面合圍二十三日乘魚爛之危啓蛇形之陳揚麾誓衆仗節訓兵一鼓先登賞必懸於芳餌九攻失律罪無救於嚴誅五部材雄三河俠少或生居燕地尤工即墨之圍或家本秦人早習昆明之戰叱吒則江山搖蕩慷慨則林壑飛騰舉鵬翼以揚威耀羣渠而賈勇澄氛廓祲回夏景以潰春氷滅迹掃塵若霜風之卷秋籜戰踰百里時歷三期前後生擒四千餘人斬首五千餘級諾沒弄楊虔栁等殞死行陳懸首旌門蒙儉和舍等委衆奔馳脫身挺險雖復刑以止殺丁壯咸伏於誅夷禮不重傷班白必存於寬宥昔魏成伐蜀徒聞蒟醬之竒漢使開卭才通卭杖之利豈若膺紫泥而弔伐指丹徼以臨戎一戰而孟獲巳擒再舉而哀牢授首斯顯皇威逺暢廟略遐宣奉玄德以配天徒知帝力掩黃輿而闢地豈曰臣功無任慶快之誠謹遣某奉露布以聞軍資器械别簿條上姚州在昆明之弄棟川武德四年安撫大使李英以此川人多姓姚故置姚州麟德中置都護府按賓王露布二篇考之髙宗時皆無影響兵部奏姚州破賊設蒙儉等露布駱賓王臣聞七緯經天星墟分張翼之野八紘紀地炎洲限建木之鄉曲距大秦雜金莖而孕氣南通交址枕銅柱以為鄰俗帶白狼人習貪殘之性河淪赤虺川多風雨之妖水積炎氛山涵毒霧竹浮三節肇興外域之源木化九隆頗為中國之患年將千祀代歷百王鄭純之化不追孟獲之風猶扇故三年疲衆徒聞定笸之譏五月出師未息渡瀘之役然則大人拯物上聖乘期法乾坤以握樞體剛柔而建極知仁義不能禁暴設刑網以勝殘知揖讓不可濟時用干戈而靖亂伏惟皇帝陛下神摛載玉出地軸以登皇道契書繩掩天綋而踐帝玄雲入戶纂靈慶於丹陵蒼籙升壇薦禎圖於翠渚垂衣裳以朝萬國崇玉帛而禮百神昭儉防奢露臺惜中人之産宣風布政明堂法上帝之官致羣生於太和登品物於仁壽四神踐雪五老飛星君囿祥麟樂班文於先卉女牀鳴鳳韻歸昌於帝梧四隩同文五風異色配林萬里才疏苑囿之基層城九重未浚池隍之域合璧照臨之地候月歸琛大爐覆載之所占風納賮蠢兹夷貊敢亂天常橫赤熛以疏疆背朱提而設險石林萬仞巖邑千重望秦阜以相傾崤陵失四塞之阻對梁山而錯峙劒門成一簣之峰自謂絶壤幽荒中外足以迷聲教憑深負固江山可以逃靈誅殊不知玉弩垂芒涵水無九嬰之沴瑤階舞戚洞庭有三苖之墟臣等謬以散材忝専分閫白招乘候順秋帝以揚旌絳節臨邊通夜郎而解辮自營開巂穴斾轉卭山峻岐折坂之危盡亡襟帶滇池漏江之固曽失藩籬唯逆賊設蒙儉等未革狼心仍懷豖突陸梁放命旅拒偷安地接祠雞竟無心於改旦山多神鹿終未息於擇音臣以大帝宣威有征無戰明王杖鉞先德後刑𢎞聖澤於中孚緩天誅於大造庶南薰解慍仰雲闕以翔魂東律和音扣轅門而頓顙祝禽疏網徒開三面之恩毒虺挻妖愈肆九頭之暴乃鳩集餘衆蟻結凶徒儋耳椎髻之渠千里霧合鑿齒雕題之孽一呼雲屯疊石菌以開營拒巖椒而峻壘崇巒切漢若登藏寶之山絶壑憑霄似瞰封泥之谷去前月十七日連營布陳據險揚兵東西三十餘里馬步二十餘萬聚蚊蚋而成響聲若雷霆縱蛇豖以為羣氣稽宇宙臣遣中郎將令狐智通等擁拔山超海之師當其步陳遣銀州刺史李大志等驅躍景騰雲之騎乘其馬軍遣巂州都督府長史行軍司馬梁待璧等領徑卒二千絶其飛走之路遣臨源府果毅馬仁靜等勒精兵九百斷其潛伏之軍臣率行軍長史韓餘等負霜威而直指掃雲陳以長驅庶令斬馘七擒將士挾雷公之怒伏尸百里蠻夷識天子之尊於是三略訓兵五申誓衆先登陷敵唯標大樹之功後拒亂行必致曲梁之罰楚人三户蜀郡五丁氣擁玄雲精貫白日喑嗚則乾坤搖蕩呼吸則海嶽沸騰列旗影以雲舒似長虹之東指橫劔鋒而電轉疑大火之西流刃接兵交洞胸達臆自辰踰午魚爛土崩沸殘息於層峰更切守陴之哭積玄顱於重阜殆成京觀之封唯賊帥夸干未悟傾巢之兆敢懷拒轍之心猶率馬軍平川轉鬬驚塵亂起六合為之寢光殺氣相稽四溟為之變色副總管李大志忠惟徇國義則忘軀臨危而貞節愈明制敵而機謀獨逺丹誠自守雖九死其如歸白刃交前豈三軍之可奪投袂則妖徒霧廓搴旗而逆黨氷摧於是乘利追奔因機深入困獸猶鬬似化廩君之魂窮鳥尚飛如驚杜宇之魄斬甲卒七千餘級獲裝馬五千餘匹僵尸蔽地臨赤坂而非遙流血灑途視丹徼而不遠首領和舍等並計窮力屈面縳軍門寬其萬死之誅𢎞以再生之路唯蒙儉脫身挺險委命窮山顧巢穴以靡依延晷漏其何幾况妖徒革面荒外非復他人部落離心舟中皆為敵國瞻言梟首指日可期凡所歸降隨事招撫與之更始復其故業首丘懷戀疑臨舊國之墟安堵知歸似入新豐之市然後班師遁水振旅禺山建鴻業於武功暢玄猷於文教庶荒陬襲中邦之禮邊疆息外冦之虞華人祝堯兆皇基於千載夷歌頌漢美王澤於三章宜與夫天帝前星廣賜秦公之册坤元益地遙聞王母之圖蓋示有云曽何足紀斯並玄謀廣運妙略遐覃一戰而荒景肅清再鼓而邊隅底定豈臣等提干擐甲克全百勝之功杖節揚麾能通九變之策謁藁街而獻捷大帝成規聞杕杜以勞還小臣何力不勝慶快之至謹遣行軍司馬朝散大夫守巂州都督府長史上柱國梁待璧奉露布以聞軍資器械别簿條上雲谷雜記云隋禮儀志後魏每攻戰克捷欲天下知聞乃書帛揭於竿上名為露布其後相因施行按袁虎倚馬為桓溫作北伐露布賈洪為馬超作伐曹操露布前此巳有之豈書帛揭竿實自魏始耶為河南郡王武懿宗平冀州賊契丹等露布張説氣祲薄宵戎狄謀夏則武庫兵動中國有弧矢之威文昌將飛邊城用金革之事蓋以式遏姦暴大庇黎人震蠻蕩夷明罰耀武者也伏惟天䇿金輪神聖皇帝陛下仁覆有截化行無外皇圗未臣之黨帝載不庭之俗罔不依被聲教浸潤雍熙望雲向風密邇遐裔而契丹凶醜奴𨽻餘苗非冒頓之雄族異單于之貴種徒以錯居逺郡漸化平時田牧混於四氓貿遷通於三市戍人解甲邊馬垂轡禽獸飽而忘恩蜂蠆養而恣毒敢孤亭育自絶生成乃狼心干紀鴟誼竊發虐我邊吏覆我鎮軍大棘殘於夷落孤竹淪於荒虛陛下震赫斯之怒授決勝之符天地合謀鬼神助伐六狄舉國百蠻整衆運欃槍而掃除從列缺而焚蕩臣飲氷受斧指日揚麾雖謝河間之學竊慕任城之勇誓將首冒鋒刃躬先士卒上假神兵之威下定鬼方之罪凶醜狂悖素無大志因乘便利扇動姦回去嵗嘗師疑一軍之盡化今春輕敵見三帥之不歸蟻聚實繁豺狼益厲結山戎以四冦連島夷而深入臣乃廣開形勢大振軍聲移告郡邑金湯固守傳檄諸軍猗角相應清邊道大總管建安郡王攸宜杖鉞薊門作鎮燕國當要害之地挫犬羊之羣髙壘深溝臥舊營而不動山蛇雲鳥陳死地而無疑總管沙吒忠義王伯禮安道買等兵臨易水使接桑河犀渠衝壯士之髮雕騎識將軍之箭四面當敵九拒乘城御史大夫婁師德總管髙再牟薛思行扞敵中山折衝分侮訓厲鷹揚之士輯穆震驚之師其餘部散校分離綱别緒兵車星布巡太行而綴碣石介馬雲羅挾衡漳而連海浦山川積雨盡消胡騎之塵草木長風咸有王師之氣清邊士馬稍南驅而擁蹙神兵甲卒漸北逐以威臨但合圍而持重未輕挑而即戰重以藩臣默啜統率氊裘控弦逾於萬騎帶甲彌於千里長驅松漠掩集栁城巢穴是空胎卵皆覆於時賊衆兵馬屯逼幽州聞其塞外之敗懼有舟中之敵勢力外窘心服內乖建安郡王攸宜蓄鋭淵停乘機電發援桴作氣則山嶽動搖書箭一飛則酋渠相滅兵才接刃元凶授首舂喉蔽野京觀起於中州積甲成山組練收於外府雖本根斯拔巳蕩滌於一隅而餘蔓所滋尚聨延於數刻賊師何阿小等頑凶是極奢儈為資授其署置肆行驅掠幽陵之下不知首惡之巳擒兩河之間仍謂遊魂之可恃士女遭其逼脅軍城被其屠陷以殺戮為事户積虔劉之悲以劫奪為心家盈剝割之痛鹿城縣令李懷