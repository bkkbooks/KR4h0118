敵刑惟勿喜誅有可哀徵則之勇冠一方竟就伏波之戮吕嘉之威行五嶺終摧下瀨之師嗟此陋微自貽擒滅勉成良畫速致殊勳雖荒徼之地固不勞於有征而升平之年將自比而何事書之竹帛實謂揚名事須移牒鄰管以成犄角讀姚州露布二篇如入五都之市令人目不給賞然一再讀意味亦只如此子厚此牒未嘗不麗未嘗不艷然却不必如此矜炫此其塵垢粃粳猶將陶鑄王駱也裴行立為桂管觀察使黃家洞叛討平之豪士賦序陸機夫立德之基有常而建功之路不一何則循心以為量者存乎我因物以成務者繫乎彼存夫我者隆殺止乎其域繫乎物者豐約唯所遭遇落葉俟微飈以隕而風之力蓋寡孟嘗遭雍門以泣而琴之感以末何者欲隕之葉無所假烈風將墜之泣不足繁哀響也是故茍時啓於天理盡於民庸夫可以濟聖賢之功斗筲可以定烈士之業言遇時也故曰才不半古而功巳倍之蓋得之於時勢歷觀古今徼一時之功而居伊周之位者有矣夫我之自我智士猶嬰其纍物之相物昆蟲皆有此情夫以自我之量而挾非常之勳神氣暉其顧盼萬物隨其俯仰心玩居常之安耳飽從諛之説豈識乎功在身外任出才表哉且好榮惡辱有生之所大期忌盈害上鬼神猶且不免人主操其常柄天下服其大節故曰天可讐乎而時有袨服荷戟立乎廟門之下援旌誓衆奮於阡陌之上况乎代主制命自下裁物者哉廣樹恩不足以敵怨勤興利不足以補害故曰代大匠斫者必傷其手且夫政由寧氏忠臣所為慷慨祭則寡人人主所不久堪是以君奭怏怏不悅公旦之舉髙平師師側目博陸之勢而成王不遣嫌吝於懷宣帝若負芒刺於背非其然與嗟乎光於四表德莫富焉王曰叔父親莫昵焉登帝天位功莫厚焉守節沒齒忠莫至焉而傾側顛沛僅而自全則伊生抱明允以嬰戮文子懷忠敬而齒劒固其所也因斯以言夫以篤聖穆親如彼之懿大德至忠如此之盛尚不能取信於人主之懷止謗於衆多之口過此以往惡覩其可安危之理斷可識矣又况乎叨大名以冒道家之忌運短才而易聖哲所難者哉身危由於勢過而不知去勢以求安禍積起於寵盛而不知辭寵以招福見百姓之謀巳則申宫警守以崇不畜之威懼萬民之不服則嚴刑峻制以賈傷心之怨然後威窮乎震主而怨行乎上下衆心日陊危機將發而偃仰瞪盱謂足以夸世笑古人之未工忘巳事之巳拙知曩勳之可矜暗成敗之有會是以事窮運盡必於顛仆風起塵合而禍至常酷也聖人忌功名之過巳惡寵祿之踰量蓋為此也夫惡欲之大端賢愚所共有而遊子徇髙位於生前志士思垂名於身後受生之分唯此而巳夫蓋世之業名莫大焉震主之勢位莫盛焉率意無違欲莫順焉借使伊人頗覽天道知盡不可益盈難久持超然自引髙揖而退則巍巍之盛仰邈前賢洋洋之風俯冠來籍而大欲不乏於身至樂無愆乎舊節彌效而德彌廣身愈逸而名愈劭此之不為彼之必昧然後河海之迹堙為窮流一簣之釁積成山嶽名編凶頑之條身厭荼毒之痛豈不謬哉故聊賦焉庶使百世少有寤云齊王冏矜功自伐受爵不讓機惡之作豪士賦以刺焉冏不之悟而竟以敗陸文定公云陸士衡豪士賦序云身危由於勢過而不知去勢以求安禍積起於寵盛而不知辭寵以招福石季倫金谷澗詩序云感性命之不永懼凋落之無期二人者考其終所及秪自道也王文憲集序任昉公諱儉字仲寶琅邪臨沂人也其先自秦至宋國史家諜詳焉晉中興以來六世名德為海內冠冕古語云仁人之利天道運行故呂虔歸其佩刀郭璞誓以淮水若離翦之止殺吉駿之誠感蓋有助焉公之生也誕受命世體三千之茂典踐得二之庶幾信乃昴宿垂芒德星降祉有一於此蔚為帝師況乃淵角殊祥山庭異表望衢罕窺其術觀海莫際其瀾宏覽載籍博遊才義若乃金版玉匱之書海上名山之旨沉鬱淡雅之思離堅合異之談莫不總制清衷遞為心極斯固通人之所包非虛明之絶境不可窮者其唯神用者乎然檢鏡所歸人倫異表雲屋天構匠者何工自函洛不守憲章中輟賀生達禮之宗蔡公儒林之亞闕典未補大備兹日至若齒危髮秃之老含經味道之生莫不北面人宗自同資敬性託夷逺少屏塵雜自非可以𢎞奬風流增益標勝未嘗留心也期嵗而孤叔父司空簡穆公早所器異年始志學家門禮訓皆折衷於公孝友之性豈伊橋梓夷雅之體無待韋弦汝郁之幼挺淳至黃琬之早標聰察曽何足尚年六嵗襲封豫寧侯拜日家人以公尚幼弗之先告既襲圭組對揚王命因便感咽若不自勝初宋明帝居藩與公母武康公主素不協及即位有詔毁發舊塋投棄棺柩公以死固請誓不遵奉表啓酸切義感人神太宗聞而悲之遂無以奪也初拜祕書郎遷太子舍人以選尚公主拜駙馬都尉元徽初遷祕書丞於是采公曽之中經刋𢎞度之四部依劉歆七略更撰七志蓋嘗賦詩云稷契匡虞夏伊吕翼商周自是始有應務之迹生民屬心矣時司徒袁粲有髙世之度脫落風塵見公弱齡便望風推服歎曰衣冠禮樂盡在是矣時粲位亞台司公年始弱冠年勢不侔公與之抗禮因贈粲詩要以嵗暮之期申以止足之戒粲答詩云老夫亦何寄之子照清襟服闋拜司徒右長史出為義興太守風化之美奏課為最還除給事黃門侍郎旬日遷尚書吏部郎參選昔毛珍之公清李重之識會兼之者公也俄遷侍中以愍侯始終之職固辭不拜補太尉右長史時聖武定業肇基王命寤寐風雲實資人傑是以宸居膺列宿之表圖緯著王佐之符俄遷左長史齊臺既建以公為尚書右僕射領吏部時年二十八宋末艱虞百王澆季禮紊舊宗樂傾恆軌自朝章國紀典儀備物奏議符策文辭表記素意所不蓄前古所未行皆取定俄頃神無滯用太祖受命以佐命之功封南昌縣開國公食邑二千戶建元二年遷尚書左僕射領選如故自營郃分司盧欽兼掌譽望所歸允集兹日尋表解選詔加侍中又授太子詹事侍中僕射如故固辭侍中改授散騎常侍餘如故太祖崩遺詔以公為侍中尚書令鎮國將軍永明元年進號衛將軍二年以本官領丹陽令六輔殊風五方異俗公不謀聲訓而楚夏移情故能使解劒拜仇歸田息訟前郡尹溫太真劉真長或功銘鼎彞或德標素尚臭味風雲千載無爽親加弔祭表薦孤遺遠協神期用彰世祀時簡穆公薨以撫養之恩特深恆慕表求解職有詔不許國學初興華夷慕義經師人表允兹望實復官領國子祭酒三年解丹陽尹領太子少傅餘悉如故挂服捐駒前良取則臥轍棄子後豫胥怨皇太子夙挺天姿俯同人範師友之義穆若金蘭又領本州大中正頃之解職四年以本號開府儀同三司餘悉如故謙光愈遠大典未申六年又申前命七年固辭選任帝所重違詔加中書監猶參掌選事長輿追專車之恨公曽甘鳳池之失夫奔競之徒有自來矣以難知之性協易失之情必使無訟事深𢎞誘公提衡惟允一紀於兹拔竒取異興微繼絶望側階而容賢候景風而式典春秋三十有八七年五月三日薨於建康官舍皇朝軫慟儲鉉傷情有識銜悲行路掩泣豈直舂者不相工女寢機而巳哉故痛深衣冠悲纒教義豈非功深砥礪道邁舟航沒世遺愛古之益友追贈太尉侍中中書監如故給節加羽葆鼓吹增班劒六十人諡曰文憲禮也公在物斯厚居身以約玩好絶於耳目布素表於造次室無姬薑門多長者立言必雅未嘗顯其所長持論從容未嘗言人所短𢎞長風流許與氣類雖單門後進必加善誘朂以丹霄之價𢎞以青冥之期公銓品人倫各盡其用居厚者不矜其多處薄者不怨其少窮涯而反盈量知歸皇朝以治定制禮功成作樂思我民譽緝熙帝圖雖張曹爭論於漢朝荀摯競爽於晉世無以仰模淵旨取則後昆每荒服請罪遠夷慕義宣威授指實寄宏略理積則神無忤往事感則悅情斯來無是巳之心事隔於容諂罕愛憎之情理絶於毁譽造理常若可干臨事每不可奪約巳不以廉物𢎞量不以容非攻乎異端歸之正義公生自華宗世務簡隔至於軍國逺圗刑政大典既道在廊廟則理擅民宗若乃明練庶務鑒達治體懸然天得不謀成心求之載籍翰牘所未紀訊之遺老耳目所不接至若文案自環主者百數皆深文為吏積習成姧畜筆削之刑懷輕重之意公乘理照物動必研幾當時嗟服若有神道豈非希世之俊民瑚璉之宏器昉行無異操才無異能得奉名節迄將一紀一言之譽東陵侔於西山一盼之榮鄭璞踰於周寶士感知巳懷此何極出入禮闈朝夕舊館瞻棟宇而興慕撫身名而悼恩公自幼及長述作不倦固以理窮言行事該軍國豈直雕章縟采而巳哉若乃統體必善綴賞無地雖楚趙羣才漢魏衆作曽何足云昉嘗以筆札見知思以薄技效德是用綴緝遺文永貽世範為如干卷所撰古今集記今書七志為一家之言不列於集集録如左南史儉本傳薨時年四十八此序年三十八按儉父僧綽為元凶劭所害時方期嵗明年為孝建元年計至齊武帝永明七年正三十八史所書謬也明帝欲毁儉母墓為元凶巫蠱事也僧綽本傳尚東陽公主而儉傳及此文皆作武康巫蠱事中絶無武康名考之齊書南史並同不知何故聞見寡昧不足通知姑記於此以問之識古者陶淵明集序梁昭明太子夫自衒自媒者士女之醜行不忮不求者明達之用心是以聖人韜光賢人遁世其故何也含德之至莫踰於道親巳之切無重於身故道存而身安道亡而身害處百齡之內居一世之中倐忽比之白駒寄寓謂之逆旅宜乎與大塊而盈虛隨中和而任放豈能戚戚勞於憂畏汲汲役於人間齊謳趙女之娛八珍九鼎之食結駟連騎之榮侈袂執圭之貴樂既樂矣憂亦隨之何倚伏之難量亦慶弔之相及智者賢人居之甚履薄氷愚夫貪士競之若泄尾閭玉之在山以見珍而終破蘭之生谷雖無人而自芳故莊周垂釣於濠伯成躬耕於野或貨海東之藥草或紡江南之落毛譬彼鵷雛豈競鳶鴟之肉猶斯雜縣寧勞文仲之牲至於子常寧喜之倫蘇秦衛鞅之匹死之而不疑甘之而不悔主父偃言生不食五鼎死則五鼎烹卒如其言豈不痛哉又楚子觀周受折於孫滿霍侯驂乘禍起於負芒叨餮之徒其流甚衆唐堯四海之主而有汾陽之心子晉天下之儲而有洛濱之志輕之若脫屣視之若鴻毛而況於他人乎是以至人達士因以晦迹或懷釐而謁帝或被褐而負薪鼓枻清潭棄機漢曲情不在於衆事寄衆事以忘情者也有疑陶淵明詩篇篇有酒吾觀其意不在酒亦寄酒為迹者也其文章不羣辭彩精拔跌宕昭彰獨超衆類抑揚爽朗莫之與京橫素波而傍流干青雲而直上語時事則指而可想論懷抱則曠而且真加以貞志不休安道苦節不以躬耕為恥不以無財為病自非大賢篤志與道汙隆孰能如此乎余素愛其文不能釋手尚想其德恨不同時故加搜校粗為區目白璧微瑕惟在間情一賦揚雄所謂勸百而諷一者卒無諷諫何足搖其筆端惜哉亡是可也并粗點定其傳編之於録嘗謂有能觀淵明之文者馳競之情遣鄙吝之意袪貪夫可以亷懦夫可以立豈止仁義可蹈抑乃爵祿可辭不必傍遊泰華遠求柱史此亦有助於風教也昭明太子集序劉孝綽臣竊觀大易重明之象著焉抑又聞之匕鬯之義存焉故書有孟侯之名記表元良之德歷選前古以洎夏周可得而稱啓誦而巳雖徹聖挺賢光乎二代髙文精義閴爾無聞漢之顯宗晉之肅祖昔自春宫益好儒術或專經止於區易或持論窮於貞假子桓雖摛藻銅省集講肅成事在藩儲理非皇二未有正位少陽多才多藝者也粵我大梁之二十一載盛德備乎東朝若乃有縱自天惟睿作聖顯仁立孝行於四海如圭如璋不因琢磨之義為臣為子寧待觀喻之言惟性道難聞而文章可見故俯同志學用晦生知以絃誦之餘辰總鄒魯之儒墨遍綈緗於七閣彈竹素於九流地居上嗣實副元首皇帝垂拱巖廊委咸庶績時非從守事或監撫雖一日二日攝覽萬幾猶臨書幌而不休對欹案而忘怠況復迄納侍講討論經紀去聖滋遠愈生穿鑿枝分葉散殊路偆馳靈臺辟雍之疑禋宗祭社之繆明章申老之議通顔理王之説量核然否剖析同異察言抗論窮理盡微於時淹中稷下之生金華石渠之士莫不過衢樽而挹多少見斗極而曉西東與夫盡春卿之道贊仲尼之宅非賈誼於蘇林問蕭何於棗據區區前史不亦恧歟加以學貫總持辨同無硋五時密教見猶鏡象一乘妙旨觀若掌珠及在布金之園處如龍之衆開示有空顯揚權實是以遍動六地普雨四華豈直得解纓須提舍鉢瓶沙騰曇言德梵志依風而巳哉若夫天文以爛然為美人文以煥乎為貴是以隆儒雅之大成遊雕蟲之小道握牘持筆思若有神曽不斯須風飛雷起至於宴遊西園祖道清洛三百載賦該極連篇七言致擬見諸文學博奕興詠並命從遊書令視草銘非潤色七窮煒燁之説表極逺大之才皆喻不備體詞不掩義因宜適變曲盡文情竊以屬文之體鮮能周備長卿徒善既纍為遲少孺雖疾俳優而巳子淵淫靡若女工之蠧子雲侈靡異詩人之則孔璋詞賦曹祖勸其修今伯喈答贈摯虞知其頗古孟堅之頌尚有似贊之譏士衡之碑猶聞類賦之貶深乎文者兼而善之能使典而不野逺而不放麗而不淫約而不儉獨擅衆美斯文在斯假使王朗報箋卞蘭獻頌猶不足以揄揚著述稱贊才章況在庸才曽何倣佛然承華肇建濫齒時髦居陪出從逝將一紀譬彼登山徒仰峻極同夫觀海莫際波瀾但職官書記預聞盛藻歌詠不足敢忘編次謹為一帙十卷第目如左日升松茂與天地而偕長壯思英詞隨嵗月而增廣如其後録以俟賢臣玉臺新詠集序徐陵陵雲概日由余之所未窺千門萬户張衡之所曽賦周玉璧臺之上漢帝金屋之中玉樹以珊瑚作枝珠簾以玳瑁為柙其中有麗人焉其人也五陵豪族充選掖庭四姓良家馳名永巷亦有潁川新市河間觀津大家嬌娥曽名巧笑楚王宫內無不推其細腰衛國家人俱言訝其纎手閲詩明禮非直東鄰之自媒婉約風流無異西施之被教弟兄協律自小學歌少長河陽由來能舞琵琶新曲無待石崇箜篌雜引非因曹植傳鼓瑟於楊家得吹簫於秦女以至寵聞長樂陳后知而不平畫出天山閼氏覽而遙妬且如東鄰巧笑唯侍寢於更衣西子微顰將橫陳於甲帳陪遊馺婆騁纎腰於結風長樂鴛鴦奏新聲於度曲粧明蟬之薄鬢照墜馬之垂鬟反插金蓮橫抽寶樹南都石黛最發雙蛾北地燕支偏開兩靨亦有嶺上仙童分丸魏帝腰中寶鳳授歷軒轅金星與婺女爭華麝月共姮娥競爽驚鸞冶袖時飄韓椽之香飛燕長裾宜結陳王之佩雖非圖畫入甘泉而不分言異神仙戲陽臺而無别真可謂傾國傾城無對無雙者也加以天情開朗逸思雕華妙解文章尤工詩賦琉璃研匣終日隨身翡翠筆牀無時離手清文滿篋非唯芍藥之花新製連篇寧止葡萄之樹九日登髙時有緣情之作萬年公主非無纍德之辭其佳麗也如彼其才情也如此既而椒宫宛轉柘館陰岑絳劒晨嚴銅鋪晝淨三星未夕不事懷衾五日猶賖誰能理曲優遊少託寂寞多間厭長樂之疏鐘勞宫中之緩箭輕身無力怯南宫之搗衣生長深宫笑扶風之織錦雖復投壺玉女為歡盡於百嬌爭博齊姬心賞窮於六齒無怡神於暇景唯屬意於新詩可得代彼萱蘇微蠲愁疾但往世名篇當今巧製分諸麟閣散在鴻都不務連章無由披覽於是然脂暝寫弄筆晨書選録艷歌凡為十卷曽無參於雅頌亦靡濫於風人涇渭之間若斯而巳也麗以金繩裝之寶軸三臺妙札亦龍伸蠖屈之書五色花箋皆河北膠東之紙髙按鉛粉仍定魯魚之文辟惡生香聊防羽陵之蠧雲飛六甲髙禪玉函鴻烈仙方長推丹枕至如青牛帳裏餘曲既終朱鳥窗前新粧巳竟方當開兹縹帙散此緗編永對玩於書帷長循環於纎手如鄧學春秋儒者之功難習竇傳却老金丹之術不成固勝西蜀豪家託情窮於魯殿東臺甲館流詠止於洞簫孌彼諸姬聊同棄日猗與彤管麗矣香奩隋經籍志玉臺新詠十卷徐陵撰起古詩古樂府盡梁代佛祖統紀載陵嘗聽智者講經因立五願一臨終正念二不墮三塗三人中托生四童真出家五不墮流俗之僧唐貞觀中生縉雲朱家年十六將納婦路逢梵僧謂曰少年何意欲違昔誓因示其宿因少年聞已不復還家即往天台國清寺投章安法師咨受心要證法華三昧按孝穆於生死自在乃爾作此一序不慮犯綺語戒耶因而推求之如宋之韓魏公范文正張忠定司馬溫公王荆公皆鐵心石腸人而皆有艷詞乃知彭澤間情不足為瑕也詩品序鍾嶸氣之動物物之感人故搖蕩性情形諸舞詠照燭三才暉麗萬有靈祗待之以致饗幽微藉之以昭告動天地感鬼神莫近於詩昔南風之辭卿雲之頌厥義敻矣夏歌曰鬱陶乎豫心楚謠曰名余曰正則雖詩體未全然是五言之濫觴也逮漢李陵始著五言之目矣古詩眇邈人代難詳推其文體固是炎漢之製非衰周之倡也自王揚枚馬之徒詞賦競爽而吟詠靡聞從李都尉迄班媫妤將百年間有婦人焉一人而巳詩人之風頓巳缺喪東京二百載中惟有班固詠史質木無文降及建安曹公父子篤好斯文平原兄弟鬱為文棟劉楨王粲為其羽翼次有攀龍託鳳自致於屬車者蓋將百計彬彬之盛大備於時矣爾後陵遲衰微迄於有晉太康中三張二陸兩潘一左勃爾復興踵武前王風流未沫亦文章之中興也永嘉時貴黃老稍尚虛談於時篇什理過其辭淡乎寡味爰及江表微波尚傳孫綽許詢桓庾諸公詩皆平典似道德論建安風力盡矣先是郭景純用雋上之才創變其體劉越石仗清剛之氣贊成厥美然彼衆我寡未能動俗逮義熙中謝益壽斐然繼作元嘉中有謝靈運才髙辭盛富豔難蹤固巳含跨劉郭陵轢潘左故知陳思為建安之傑公幹仲宣為輔陸機為太康之英安仁景陽為輔謝客為元嘉之雄顔延年為輔斯皆五言之冠冕文詞之命世也夫四言文約意廣取效風騷便可多得每苦文繁而意少故世罕習焉五言居文詞之要是衆作之有滋味者也故云會於流俗豈不以指事造形窮情寫物最為詳切者耶故詩有六義焉一曰興二曰比三曰賦文巳盡而意有餘興也因物喻志比也直書其事寓言寫物賦也𢎞斯三義酌而用之幹之以風力潤之以丹彩使味之者無極聞之者動心是詩之至也若專用比興則患在意深意深則詞躓若但用賦體則患在意浮意浮則文散嬉成流移文無止泊有蕪漫之纍矣若乃春風春鳥秋月秋蟬夏雲暑雨冬月祁寒斯四候之感諸詩者也嘉會寄詩以親離羣託詩以怨至於楚臣去境漢妾辭宫或骨橫朔野或魂逐飛蓬或負戈外戍或殺氣雄邊塞客衣單孀閨淚盡文士有解珮出朝一去忘返女有揚蛾入寵再盼傾國凡斯種種感蕩心靈非陳詩何以展其義非長歌何以釋其情故曰詩可以羣可以怨使窮賤易安幽居靡悶莫尚於詩矣故詞人作者罔不愛好今之士俗斯風熾矣才能勝衣甫就小學必甘心而馳騖焉於是庸音雜體各為家法至於膏腴子弟恥文不逮終朝點綴分夜呻吟獨觀謂為警䇿衆覩終淪平鈍次有輕蕩之徒笑曹劉為古拙謂鮑昭羲皇上人謝朓今古獨步而師鮑昭終不及日中市朝滿學謝朓劣得黃鳥度青枝徒自棄於髙聽無涉於文流矣嶸觀王公縉紳之士每博論之餘何嘗不以詩為口實隨其嗜欲商確不同淄澠並泛朱紫相奪喧議競起準的無依近彭城劉士章俊賞之士疾其淆亂欲為當世詩品口陳標榜其文未遂嶸感而作焉昔九品論人七略裁士校以賓實誠多未值至若詩之為技較爾可知以類推之殆均博奕方今皇帝資生知之上才體沈鬱之幽思文麗日月學究天人昔在貴遊已為稱首況八紘既掩風靡雲蒸抱玉者聫肩握珠者接武固以睨漢魏而不過吞晉宋於胸中諒非農歌轅議敢致流别嶸之今録庶周旋於閭里均之於談笑耳嶸字仲偉潁川長社人天監中衡陽王引為朔寧記室專掌文翰嘗品古今五言詩論其優劣各為詩評駙馬都尉喬君集序盧照鄰昔文王既沒道不在於兹乎尼父克生禮盡歸於是矣其後荀卿孟子服儒者之褒衣屈平宋玉弄詞人之柔翰禮樂之道巳顛墜於斯文雅頌之風猶綿聨於季葉痛乎王澤既竭諸侯為麋鹿之場帝圖伊梗天下作豺狼之國秦人一滅舊章大愚黔首羣書赴火化崑嶽之髙煙儒士投坑變蓬萊之巨壑樂沈於海河間王初眷眷於古篇禮適諸夷齊叔孫區區於綿蕝安國討論科斗五典叶從史遷祖述獲麟八書爰創衣冠禮樂重聞三代之風玉帛謳歌無墜六經之業鬱其興詠大雅於是為羣自此迄今年逾千祀聖門論賦相如為入室之雄闕里裁詩公幹即升堂之客陸平原龍驚學海浮天泉以安流鮑參軍鶴翥文場代黃金之平埒臨曲臺之上路面通衢之小苑蓮紅水碧堪釣叟之淹留桂白山青宜王孫之攀折香車貴士不掩龍關縫掖書生時通驛騎坐蘭徑敞松扉北牖動而清風來南軒幽而白雲起欣然命駕弔曲江之隑淵興盡而歸聆伊川之笙吹三朝慶謁趨劒履於南宫五日歸休聞歌鍾於北里雍容車騎屢動雕章嘯傲煙霞仍涵寶思奢不敗德笑金谷之羅紈儉不邀名悲蘭陵之芻布榮期三樂君實四之平子四愁我無一矣君教訓子弟不讀非聖之書撫愛家僮常恐名奴之辱婚嫁已畢欲就金丹輪蓋非榮猶思道樹明霞曉挹終登不死之庭甘露秋團儻踐無生之岸凡所著述多以適意為宗雅愛清靈不以繁詞為貴足以傳諸好事貽厥孫謀故撰而存之凡為若干卷云爾照鄰字升之范陽人為鄧王府典籖王愛重比之相如調新都尉病去官餌方士丹父喪號嘔丹出由是疾益甚乃去具茨山下買園數十畝疏潁水周舍復預為墓偃卧其中自以當髙宗時尚吏巳獨儒武后尚法巳獨黃老后封嵩山屢聘賢士巳巳廢著五悲文以自明病既久與親屬訣自沈潁水按喬君無可考唐公主列傳髙祖女廬江公主下嫁同州刺史喬師望藝文志有喬備集不知誰是洛州張司馬集序張説夫言者志之所之文者物之相雜然則心不可藴故發揮以形容辭不可陋故錯綜以潤色萬象鼓舞入有名之地五音繁雜出無聲之境非窮神體妙其孰能與乎洛州司馬張公名希元中山人也族髙辰象氣壯河山神作銅鈎天開金印孝友內植禮樂外滋勵行閨庭鄉人謂之曽子飛名都邑諸儒號曰聖童下帷覃思穿牀嗜古蓬山藝觀之書羣玉懸金之記魯宫藏篆汲冡遺編無不日覽萬言暗識三篋博學吞九流之要處盈若虛雄辨敵四海之鋒退藏於密漢王問䇿知帝者之師楚子聞名實諸侯之選故得雄飛白簡鷹揚丹筆卷襜帷於天郡設鈎距於皇州若乃抗埋輪之章執驚馬之議旌賢有通德之教疾惡存署背之文繼軌前途遇物成興理關刑政咸歸故事之臺義涉針規盡入名臣之奏加以許與氣類交遊豪傑仕遘夷險身更否泰昔嘗攝戎幽易謫居卭巂亭皋漫漫興去國之悲旗鼓洶洶助從軍之樂時復江鶯遷樹隴鴈出雲夢上京之臺沼想故山之風月發言而宫商應搖筆而綺繡飛逸勢標起寄情新拔靈仙變化星漢昭回感激精微混韶武於金奏天然壯麗綷雲霞於玉樓當代名流翕然崇尚自大夫之頌成室太史之賦京都魏則十龍儒雅晉則三陽藻綴張載字孟陽弟協字景陽亢字季陽並有才藻屬綴英華誤作楊朝分南北運迄周隋文人才子重世間出豈止柟榴體物陳琳得以示人鷦鷯寄辭阮籍稱其王佐故以開國籍鱗次乎史傳之首入文場羽儀乎天下之半公增繁榮葉桂林之一枝彌廣源流荆江之九泒宗門多士斯為盛典且如承家舊德之基賓王歷官之序玉琯銅渾之數黃公玄女之符落猿殪兕之巧顧鵲回鸞之妙詳諸别傳可略言焉某室邇蘭芬族聨棣蕚荷千里之嘉奬接四友之良遊謹撰令引式題前集七子賦詩期取類於鄭志一家垂範庶齊衡於孔藂來日新文請諸君子起儀鳳之後景龍以前凡若干卷列之如目張司馬無可考唐藝文志亦無此書名乃知當世巋然巨帙不轉盼間化為泠風即名人之序不過木蘭之櫝而巳上官昭容集序張説臣聞七聲無主律呂綜其和五彩無章黼黻交其麗是知氣有噎鬱非巧辭莫之通形有萬變非工文莫之寫先王以是繼天地究人神聞寂寞鑒幽昧文之時義大矣哉上官昭容者故中庸侍郎儀之孫也明淑挺生才華絶代敏識聰聽探微鏡理開卷海納宛若前聞搖筆雲蜚如同宿搆初沛國夫人之方娠也夢巨人俾之大稱曰以是稱量天下既而昭容生彌月夫人弄之曰稱量天下豈在子乎孩遂啞啞應之曰是生而能言蓋為靈也越在襁褓入於掖庭天實啓之故毁家而資國運將興也故成德而受任自則天久視之後中宗景龍之際十數年間六合清謐內峻圖書之府外闢修文之館摉英獵俊野無遺才右職以精學為先大臣以無文為恥每豫遊宫觀行幸河山白雲起而帝歌翠華飛而臣賦雅頌之盛與三代同風豈惟聖后之好文亦云奧主之協贊者也古者有女史記功書過復有女尚書決事宫閣昭容兩朝專美一日萬機顧問不遺應接如響雖漢稱班媛晉譽左嬪文章之道不殊輔佐之功則異迹祕九天之上身沒重泉之下嘉彼令範代罕得聞庶幾後學嗚呼何仰然則大君挺四海之圖懸百靈之命喜則九圍挾纊怒則千里流血靜則黔黎乂安動則蒼氓罷弊入耳之語諒其難乎貴而勢大者疑賤而禮絶者隔近而言輕者忽逺而章忠者忤惟窈窕柔曼誘掖善心妄味九德之衢傾情六藝之圃故登崑巡海之意寢剪胡刈越之威息璿臺珍服之態消從禽嗜樂之端廢獨使溫柔之教漸於生人風雅之聲流於來葉非夫玄黃育粹貞明助思衆妙抉識羣靈挾志誕異人之資授興王之瑞其孰能臻斯懿乎鎮國太平公主道髙帝妹才重天人昔嘗共遊東壁同宴北渚倐來忽往物在人亡憫雕琯之殘言悲素扇之空曲上聞天子求椒掖之故事有命史臣敘蘭臺之新集凡若干卷列之如左昭容名婉兒儀之孫儀坐死與母配掖庭韶警工文武后命掌詔命嘗有罪當誅后惜其才而黥之中宗即位大被信任進拜昭容昭容通武三思詔書推右武氏節愍太子舉兵叩肅章門索婉兒太子敗乃免婉兒勸帝引大臣名儒數賜宴賦詩婉兒常代帝后諸主衆篇並作而采麗益新又差第羣臣所賦退而心服是時內職皆聽出外婉兒至營外宅與崔湜亂遂引知政事玄宗誅韋庶人斬於闕下有集二十卷按昭容不祥之人也此文下語有斟酌可味神龍歷序李嶠昔者龍負河圖八卦列明時之象龜呈洛字九疇開叶紀之文青巖啓而六甲飛黃壤堙而五行缺故知乾策逺坤符靈祕法效用常邀乎聖期研幾測深必貫於神道皇軒於是乎合而不死帝皥於是乎推而致福自重黎並命叔仲分官理八節而調四時部三元而齊七政權衡度律在虞夏而兼修正朔陰陽及殷周而備舉既而王風版蕩戰國縱橫瞽史忘三家之言疇人失二官之業履端闕而歸餘壞攝提差而孟陬殄廢時亂日非直羲和湎淫亡甲喪子豈唯商辛暴虐漢興草創肇謀紀綱而方士異詞天官橫議張蒼從甲乙之術未叶變通鄧平用丁丑之元旋聞疏闊當塗圯隔典午陵遲戎狄升僭偽之壇宇縣乏神祗之主三辰九野壓柝景而分躔二象七衡孰當期而合度建元髙而不競沿木火而無譏興百代之闕文復千齡之大統匪我昌運疇能離此國家草昧區夏權輿品物萬方同會獄訟之往河南五緯運謀神靈之入東井然玄圭受命紫籙登樞回玉斗而察璇璣把珠囊而膺歷數勤於水土大禹之平滌山川禮乎方圓高辛之迎送日月應天神龍皇帝大橫纂極元良繼體乃神乃聖三王接袂而扶轂允武允文五伯連衡而擁篲於是乎東明捧日西掖占風南震雄王之㕓北清驕子之落粟同水火人類胥庭犴圄徒施干戈不用上庠講道而宣化比屋耕田而鑿井功成理定之業協律登歌疇德瑞聖之符陳郊謁廟萬官咸事百度巳康猶且存省闕遺徵求典故以為欽為歷象哲后之恭天事神敬授人時明君之勸農闢土自麟德創紀四十餘年雖斗憲未移而渾儀漸變蔡伯喈所謂術無恆是洛下閎所謂歷後當差昔太初肇規使易髙皇之制元和新造旋移孝武之法因時通變厥有前聞爰命典司更從刋正金紫光祿大夫行祕書監駙馬都尉上柱國楊慎交鍾鼎貴遊山河寶氣赤泉疏社軒裳接於五公朱輪贈言翰墨連於七子資玉環之舊德擁金埓之新慶簫吹鳳管朝升鳷鵲之樓漸疑閲龍章暮下麒麟之閣臨西山典籍之府總東壁文章之事九源百氏之説盡入胸襟六家三統之書咸歸掌握永言董率實佇詳明左散騎常侍兼修國史上柱國陳留縣開國公栁沖望重簪纓才高瑚璉家風推其直道帝範籍其謨明吐白鳳而草玄言垂紫貂而步黃閣參司國典時望允諧副掌天書朝寄斯在鎮國大將軍右驍衛將軍知太史局事迦行志中散大夫守禮部侍郎上騎都尉嚴善思正議大夫行太史令上護軍傅志忠等或禮閣兵鈐以賢才而入用或天門地理緣道術而見知皆學富偃韋藝超甘石窮神盡智之妙暗落銅丸測逺窮髙之方懸裁玉表朝請大夫行太史局令瞿曇悉達朝請郎行司歷徐保文承議郎行司歷南宫説等或善分天部或工言算法稽長短之效無煩於驗讖被圖察休咎之徵非假於登臺上庫凡此衆哲各承朝委悉達等則專司課務據核其真志忠等則監共討論用禆其闕雖異禮而各術並用心而合契於是精研六位遍考十端立東西之定儀採南北之遺事會數於天九地十起元於子二丑三追日暮之行按星分之度以推四時之發生以步三元之盈縮然後分至啓閉無愆於玉衡弦望躔離必應於銅史才窺幽室巳見飛灰雜候清臺仍看合璧追論古法師驗前章八十一寸為日分徒言精密六百八年為嵗紀終非允當歷祀之所紕繆異端之所穿鑿莫不裁之繩準格以銓衡究天道之精微開日官之軌憲容成再出不能添黍纍之功壽王重生無以議分毫之失豈比夫時乖兩閏始載鄒人之語亥有二首方聞絳老之年序臨安寧嵗次強圉皇帝撫天下之三載也珍圖改御寶歷初調授以丹鳳之官頒以玄鳥之署候耕耘之節非藉杏花亶昏夕之期詎須蓂葉參幽明而制術邁古今而垂範玉儀既正金鏡逾明知聖祉之無疆識懷生之永大元符允合可以觀天地之心能事畢甄可以為帝王之式盛矣美矣無得而稱紀次勒成名曰大唐神龍歷云爾地志圖序吕溫廣陵李該博達士也學無不通尤好地理患其書多門歷世浸廣文詞浩蕩學者疲老由是以獨見之明法先聖之制黜諸子之序記述仲尼之職方會源流考同異務該暢從體要倬然勒成一家之説猶懼其奧未足以昭啓後生乃裂素為方儀據書而畫隨方面以區别擬形容而訓解命之曰地志圖觀其粉散百川黛凝羣山元氣剖判成乎筆端任土之毛有生之類大鈞變化不出其意然後列以城郭羅乎陬落內自五侯九伯外洎要荒蠻貊禹迹之所窮漢驛之所通五色相宣萬邦錯峙毫釐之差而下正乎封略方寸之界而上當乎分野乾象坤勢炳焉可觀與夫聚米擬其端倪畫地陳乎梗槩固不可同年而語詳略也每虛室燕居薄帷晴褰普天之下盡在屋壁户納四海窗籠八極名山大川隨顧奔走殊方絶域舉意而到髙視華裔坐橫古今觀帝王之疆理見宇宙之寥廓出遐入幽曽不崇朝與夫役形神於嵗月窮轍迹於區外又不可並軌而論勞逸也且夫刪百代之弊綜羣言之首繁而不亂疏而不漏才識以潤之丹青以炳之使嗜學之徒未披文而見義不由尸而觀奧斯訓道之明也窮地而述舉世而載事極鴻纎理通皎脈混一家之文軌張大國之襟帶核人物之虛實總山川之要會表皇威之有截明王道之無外斯乃功用之大也見蒼梧塗山則思舜禹恤民之艱覩窮邊大漠則悟秦漢勞師之弊覽齊墟晉壤則見桓文勤王之霸觀洞庭荆門則知苖蜀恃險之敗王者於是明乎得失諸侯於是鑒於興替斯又懲勸之逺也然則本之所以廣學流申之足以贊鴻業垂之可以示後世豈徒由近觀逺以智自樂為室中之一物哉而時無知音道不虛行舉地成圖聞天無路此志士儒林所以為之歎息也某久從君遊辱命序述庶明作者之意俾好事君子知其所以然唐書藝文志無此書名唐丞相太尉衛國公李德裕會昌一品制集序鄭亞綸紼之興載籍之始先王發號施令明罰勑法蓋本於此也唐虞之盛二典存焉夏殷之隆厥有訓誥自胤征甘誓乃有誓命之書皆三代之文一王之法也虞夏之際代祀綿逺其代工掌制之名氏莫得而知至於成湯太甲則有仲虺伊尹為之訓誥髙宗得傅説則有説命之篇周公召公相成王則有洛誥酒誥周官顧命秦始皇帝并一區宇丞相李斯實掌其言漢興當秦焚書之後侍從之臣皆不習文史蕭曹之輩又乏儒墨之用每封功臣建子弟其辭多天子為之縱委於執翰者亦非彰灼知名之士武帝使司馬相如視草率皆文章之流以相如非將相器也厥後寖微寖長下於魏晉亦代有其人我髙祖革隋文物大備在貞觀中則顔公師古岑公文本興焉在天后時則李公嶠崔公融出焉燕許角立於玄宗之朝常楊繼美於代宗之世洎憲宗皇帝英武啓運雄圖赫張中興之業高映前古其時則先太師忠公翺翔內署有密勿贊佐之績平吳定蜀實惟其功及登樞衡作霖雨尊王室卑諸侯圖蔡料齊外定內理顯王言於典誥彰帝範於圖籍紀在徽册播於無窮特進太子少保分司東都衛公長慶中事惠皇為翰林學士訓誥之業彰於傳聞昭肅皇帝統握乾符寤寐良弼詔自淮海復升台庭盡付玄機允厭神度每彤墀奏罷别承天眷帝亦講伊訓説命之旨定元首股肱之契以太平之制度上古之文教咸屬於公焉會先太后懿號未立帝明發有永懷之痛公述沙麓神井之瑞贊繞樞懷日之慶懋遵聖緒光慰孝思於是承命有宣懿祔廟之制及武宗郊昊天拜清廟文物胥備朝廷有禮華夷述職河朔修貢乃顯神休薦徽號奉揚一德以示萬方於是撰仁聖文武至神大孝之册封域無虞天子翛然有求玄之思乃範貞金模聖表隆凖日角燭於宫庭中外臣寮咸欲以頌山河而褒日月也公於是有聖容之讚天街之北獯鬻攸居因飢憑陵怙衆強禦嚴之以刁斗而勃爾無懼申之以文告又腆然不率天子震怒旋命征之公獨運沈機上資宸斷萬里勝負決於帷中雷霆既震犬羊遂潰疣贅披抉腥羶解離遁其名王復我貴主公於是有討北狄之詔天寶末薊門為首亂之地瘡痏榛棘襲世未平至是漁陽帥仲武掃除妖孽臧獲仇讎奉揚威神乃底康靖仍願勒石於盧龍之塞以敘聖功飛章上聞帝用允若公秪應明命舒展格言呼嘯神祗吐納嵩華當晝而文星現不寐而白鳳來成諸侯不朽之勳尊元后無私之化公於是有幽州紀聖功之碑洛帥劉從諫死其子因關河之險恃甲兵之衆請爵爭地屢聞王庭中外疑迷牙撓天聽帝將耀神武公纍獻忠謀且言曰重耳在喪不聞利父雄渠受戮祗以拒君况明皇舊宫天井內地跨連河北脅倚山東豈可行有匪人坐為汙俗若是可忍孰不可容沃心無疑躡足乃定又曰上黨居天下之脊當河朔之喉今漳水雄兵常山徑卒是為脣齒實懼因依不若乘於未萌制其將動帝俞其奏乃妙選使臣以勞諭之嚴立刑賞以勸戒之魏侯鎮侯戮力從命絶壼關之右臂收泜水之上遊獲兹渠魁在此成算又轅門叛將橫水餘凶竊上相之旌旗盜晉陽之管鑰帝怒斯赫人心愈疑咸以師老於郊梟巢尚固議罷兵者蚊聚請宥過者雷同公又揚笏而言曰彼地則義師帥分宗室是玄祖勤商之邑后稷造周之邦瓜瓞具存堂構斯在茍虧䇿畫不襲仇讎則是奬彌牟逐主之風長冒頓射親之俗詩稱築室於道書謂疑謀勿成由是洞啓宸衷大破羣議運籌制勝舉無遺䇿防微慮逺必契神機授鉞之臣服膺承命謝安之圍棋尚劫曹參之飲酒方酣果有軍書繼聞我捷砥磨周鉞水淬鄭刀萬里來袁紹之頭顱二塜葬蚩尤之肩髀歡聲雖震於朝市喜氣不見於形容何其纂立功勳鎮定風俗若是之重也公於是有伐上黨之制平晉陽之勑宗英可汙獻琛輸賮越自絶域通於本朝文畢伯士之胤呼韓鹿蠡之師或執玉而朝靈囿或解辮而拜甘泉並垂於册書光彼明命公於是有諭回鶻之命五慰堅昆之書四文章等於訓傳機事出於神明固將偃仰邳石之符傲睨鬼籍之録聞之者可以祛聾瞶得之者可以弼邦國每牙管既拔芝泥將熟嘗於前席親授筆札公亦分隂可就落簡如飛時有急宣關於密畫內庭外制皆不與聞或勢切疾雷機難終日宣室未召武帳莫開公則手疏封章達於旒袞當乙夜觀書之際未嘗不稱美再三此又豈可與賦洞簫而諷於後庭聞子虛而嗟不同世者論功較德耶嵗在乙丑羣公常伯以天子之道貫於神祗一年而風雨攸序災沴不作二年殱醜虜興北伐之詩四年誅狡童詠東征之歌而又伐摩尼之風壞浮圖之俗偃兵返朴四海胥定思欲增鴻名光下武公乃觀東序之圖按西崑之牒鋪敘名實藻縟文采類於上帝為唐神宗公於是纂章天成功神德明道之册文號位既畢華夷會同方將命禮官召儒者訪匡衡后土之儀採公玉明堂之圖考肆覲之禮於梁生叩封禪之書於犬子盡皇王之盛事極臣子之殊功而軒鼎將成禹書就掩然猶進先嘗之藥獻髙手之醫藏周旦請代之書追漢宣易名之美作於大誥祈於昊天始終一朝紹續九德其攻伐也既如彼其制作也又如此故合武宗一朝册命典誥奏議碑讚軍機羽檄凡兩帙二十卷輒署曰會昌一品制集紀年追聖德也書位旌官業也嵗在丁卯亞自左掖出為桂林九月公書至自洛以典誥制命示於幽鄙且使為序以集成書尋玄珠不究於倪域聽希聲莫窮於髙下承命震惴幾移朝夕援筆而復止者三四伏念江陸修蕩辭讓不及因齋潔以敘焉夫全功難持大名難兼日赫於晝而乏清媚月皎於夜而無溫煦冬之為候也則雪霜飄暴凍入肌髮夏之為用也則金流石鑠火走膚脈如陽春高秋者稀焉南則瘴風毒虺之為厲也北則獯戎黠虜之為患也如雒邑咸秦者幾焉雕鷲不傳之以馳騁驊騮不授之以騫翥如應龍者鮮焉仲尼聖賢之宗也位止於司寇師􅖫道德之祖也官不過柱史如姬旦者幾焉是以保衡傅説佐佑殷宗召公畢公寅亮周室咸著大訓克為元龜書契以來未之多有李斯以刻石紀號之文勝而不在休明之運又何足數哉周勃霍光雖有勳伐而不知儒術枚皋嚴忌善為文筆而不至巖廟自是巳降其類實繁惟君藴開物致君之才居元弼上公之位建靖難平戎之業垂經天緯地之文粹於厥躬慶是全德蓋四序之陽春九州之咸雒品彚之應龍人倫之姬旦後之學者其景之文苑英華載衛公集序凡二其一即是篇其一為李商隱代滎陽公作中間十同七八但首尾迥異今一品集及文粹皆用此篇當是商隱代作後或經亞改定耳二作相較此篇似為有體故録之李公集有與鄭中丞書所謂公書至自洛者是也今此序全本其意又玄集序韋莊謝玄暉文集盈編止誦澄江之句曹子建詩名冠古唯吟清夜之篇是知美稼千箱兩岐奚少繁絃九變大濩殊稀入華林而珠樹非多閲衆籟而紫簫唯一所以擷芳林下拾翠巖邊沙之汰之始辨辟寒之寶載雕載琢方成瑚璉之珍故知頷下採珠難求十斛管中窺豹但取一斑自國朝大手名人以至今之作者或百篇之內時紀一章或全集之中微徵數首但掇其清詞麗句録在西齋莫窮其巨派洪瀾任歸東海總其記得者才子一百五十人誦得者名詩三百首長樂暇日陋巷窮時聊撼膝以書紳匪攢心而就簡蓋詩中鼓吹名下笙簧擊鳬氏之鐘霜清日觀淬雷公之劒影動星津雲間分合璧之光海上運摩天之翅奪造化而雷雲湧起役鬼神而風雨奔馳但思其食馬留肝徒云染指豈慮其烹魚去乙或至傷鱗自慚乎鼴腸易盈非嗜其熊蹯獨美然則律者既採繁者是除何知黑白之鵝強識淄澠之水左太沖十年三賦未必無瑕劉穆之一日百函焉能盡麗是知班張屈宋亦有蕪辭沈謝應劉猶多纍句雖遺研可惜而備載斯難亦由執斧伐山止求嘉木挈瓶赴海但汲井泉等同於風月煙花各是其樝梨橘柚昔姚合所撰極玄集一卷傳於當代巳盡精微今更採其玄者勒成又玄集三卷記方流而目眩閲麗水而神疲魚兔難存筌蹄是棄所以金盤飲露唯採沆瀣之精花界食珍但享醍醐之味非獨資於短見亦可貽於後昆採實去華俟諸來者光化三年七月二日前左補闕韋莊述莊字端巳杜陵人見素之後疏曠不拘小節李詢為西川宣諭和協使辟為判官以中原多故潛欲依王建建辟為掌書記尋召為起居舍人建表留之後為建偽平章事又玄集凡一百五十人詩三百章三月三日曲水詩序顔延之夫方䇿既載皇王之迹已殊鐘石畢陳舞詠之情不一雖淵流遂往詳略異聞然其宅天衷立民極莫不崇尚其道神明其位拓世貽統固萬葉而為量者也有宋函夏帝圖𢎞逺髙祖以聖武定鼎規同造物皇上以睿文承歷景屬宸居隆周之卜既永宗漢之兆在焉正體育德於少陽王宰宣哲於元輔晷緯昭應山瀆效靈五方雜遝四隩來暨選賢建戚則擇之於茂典施命發號必酌之於故實太豫協樂上庠肆教章程明密品式周備國容視令而動軍政象物而具針闕記言校文講藝之官采遺於內輶車朱軒懷荒振逺之使論德於外赬莖素毳并柯共穗之瑞史不絶書棧山航海踰沙軼漠之貢府無虛月烈燧千城通驛萬里穹居之君內首稟朔卉服之酋回面受吏是以異人慕嚮俊民間出警蹕清夷表裏悅穆將徙縣中宇張樂岱郊增類帝之宫飭禮神之館塗歌邑誦以望屬車之塵者久矣日躔胃維月軌青陸皇祗發生之始后王布和之辰思對上靈之心以惠庶萌之願加以二王于邁出餞戒告有詔掌故爰命司歷獻洛飲之禮具上巳之儀南除輦道北清禁林左關巖隥右梁潮源略亭臯跨芝㕓苑太液懷曽山松石峻峗蔥翠陰煙遊泳之所攢萃翔驟之所往還於是離宫設衛别殿周徼旌門洞立筵帷接丫閲水環階引池分席春官聫事蒼靈奉塗然後升祕駕胤緹騎搖玉鑾發流吹天動神移淵旋雲被以降於行所禮也既而帝暉臨幄百司定列鳳蓋俄軫紅旗委斾肴簌芬籍觴醳泛浮妍歌妙舞之容銜鈕樹羽之器三奏四上之調六莖九成之曲競氣繁聲合變爭節龍文飾轡青翰侍御華裔殷至觀聽騖集揚袂風山舉袖陰澤靚裝藻野袨服縟川故以殷賑外區煥衍都內者矣上膺萬壽下禔百福布筵稟和闔堂依德情盤景遽歡洽日斜金駕總駟聖儀載佇悵釣臺之未臨慨豐宫之不縣方且排鳳闕以髙遊開爵園而廣晏並命在位展詩發志則夫誦美有章陳信無愧者歟延之字延年與謝靈運以詞采齊名而遲速懸絶文帝嘗敕擬樂府北上篇延之受詔便成靈運久之乃就延之嘗問鮑照巳與靈運優劣照曰謝五言如初發芙蓉自然可愛君詩若鋪錦列繡亦雕繢滿眼三月三日曲水詩序王融臣聞出豫為象鈞天之樂張焉時乘既位御氣之駕翔焉是以得一奉宸逍遙襄城之域體元則大悵望姑射之阿然窅渺寂寥其獨適者也至如夏后兩龍載驅璿臺之上穆滿八駿如舞瑤水之陰亦有饗云固不與萬民共也我大齊之握機創歷誕命建家接禮二宫考庸太室幽明獻期雷風通饗昭華之珍既徙延喜之玉攸歸革宋受天保生萬國度邑靜鹿丘之歎遷鼎息太坰之慚紹清和於帝猷聨顯懿於王表駿發開其逺祥定爾固其洪業皇帝體膺上聖運鍾下武冠五行之秀氣邁三代之英風昭章雲漢暉麗日月牢籠天地彈壓山川設聖理以景俗敷文化以柔逺澤普汜而無私法含𢎞而不殺猶且具明廢寢昃略忘餐念負重於春氷懷御奔於秋駕可謂巍巍弗與蕩蕩難名垂靈圖而非泰涉孟門其何險儲后睿哲在躬妙善居質內積和順外發英華斧藻至德琢磨令範言炳丹青道潤金璧出龍樓而問豎入虎闈而齒胄愛敬盡於一人光耀究於四海若族茂麟趾宗固磐石跨蹍昌姬韜軼炎漢元宰比肩於尚父中鉉繼踵乎周南分陜流勿翦之歡來仕允克施之譽莫不如圭如璋令問令望朱茀斯皇室家君王者也本枝之盛如此稽古之政如彼用能免羣生於湯火納百姓於休和草萊樂業守屏稱事引鏡皆明目臨池無洗耳沈冥之怨既缺薖軸之疾已消興廉舉孝嵗時於外府署行議年日夕於中甸協律總章之司序倫正俗崇文成均之職導德齊禮挈壺宣夜辨氣朔於靈臺書笏珥彤紀言事於仙室褰帷斷裳危冠空履之吏彯搖武猛扛鼎揭旗之士勤恤民隱糾逖王慝射集隼於髙墉繳大風於長隧不仁者逺惟道斯行讒莠蔑聞攘爭掩息稀鳴桴於砥路鞠茂草於圓扉耆年闕市井之遊稚子豐車馬之好宫鄰昭泰荒景清夷侮食來王左言入侍離身反踵之君髽首貫胸之長屈膝厥角請受纓縻文鉞碧砮之琛竒幹善芳之賦紈牛露犬之玩乘黃兹白之駟盈衍儲邸充仞郊虞匭牘相尋鞮譯無曠一尉候於西東合車書於南北暢轂埋轔轔之轍緌旌卷悠悠之斾四方無拂五戎不距偃革辭軒銷金罷刃天瑞降地符升澤馬來器車出紫脫華朱英秀佞枝植歷草孳雲潤星暉風揚月至江海呈象龜龍載文方握河沈璧封山紀石邁三五而不追踐八九之遙迹功既成矣世既貞矣信可以優遊暇豫作樂崇德者歟於時青鳥司開條風發嵗粵上斯已惟暮之春同律克和樹草自落褉飲之日在兹風舞之情咸蕩去肅表乎時訓行慶動於天矚載懷平圃乃眷芳林芳林園者福地奧區之湊丹陵若水之舊殷殷均乎姚澤膴膴尚於周原狹豐邑之未宏陋譙居之猶褊求中和而經處揆景緯以裁基飛觀神行虛簷雲構離房乍設層樓間起負朝陽而抗殿跨靈沼而浮榮鏡文虹於綺疏浸蘭泉於玉砌幽幽叢薄秩秩斯干曲拂邅回潺湲徑復新蓱泛沚華桐發岫雜夭采於柔荑亂嚶聲於綿羽禁軒承幸清宫俟宴緹帷宿置帟幕宵懸既而滅宿澄霞登光辨色戒道執殳展軨效駕徐鑾警節明鐘暢音七萃連鑣九斿齊軌建旗拂霓揚葭振木魚甲煙聚貝胄星羅重英曲瑵之飾絶景追風之騎昭灼甄部駔駿函列虎視龍超雷駭電逝轟轟隱隱紛紛軫軫羌難得而稱計爾乃回輿駐罕嶽鎮淵渟晬容有穆賓儀式序授几肆筵因流波而成次蕙肴芳醴任激水而推移葆佾陳階金匏在席戚奏翹舞籥動邠詩召鳴鳥於弇州追伶倫於嶰谷發參差於王子傳妙靡於帝江正歌有闋羽觴無算上陳景福之賜下獻南山之壽信凱燕之在藻知和樂於食蘋桑榆之陰不居草露之滋方渥有詔曰今日嘉會咸可賦詩凡四十有五人其辭云爾融嘗為主客接虜使房景髙宋辨景髙問云在北聞主客曲水詩序勝延年實願一見融示之後日辨謂融曰昔觀相如封禪以知漢武之德今覽王生詩序用見齊主之盛融曰皇家盛明豈直比蹤漢武更慚鄙製無以遠匹相如三月三日華林園馬射賦序庾信臣聞堯以仲春之月刻玉而遊河舜以甲子之朝披圖而巡洛夏后瑤臺之上或御二龍周王玄圃之前猶驂八駿我大周之創業也南正司天北正司地平九黎之亂定三危之罪雲紀御官鳥司從職皇王有秉歷之符玄圭有成功之瑞豈直天地合德日月光華而巳哉皇帝以上聖之姿膺下武之運通乾象之靈啓神明之德夷典秩宗見之三禮夔為樂正聞之九成克巳備於禮容威風總於戎政加以卑宮菲食皂帳綈衣百姓為心四海為念西郊不雨即動皇情東作未登彌回天眷兵草無會非有待於丹烏宫觀不移故無勞於白燕銀甕金船山車澤馬豈止竹葦兩草共垂甘露青赤二氣同為景星雕題鑿齒識海水而來王烏戈黃皮驗東風而受吏於時玄鳥司歷蒼龍御行羔獻氷開桐華萍合皇帝幸於華林之園玉衡正而泰階平閶闔開而勾陳轉千乘雷動萬騎雲屯落花與芝蓋同飛楊栁共春旗一色乃命羣臣陳大射之禮雖行袚褉之飲即用春搜之儀止立行宫裁舒帳殿陛無玉甃既異河間之碑户不金鋪殊非許昌之賦洞庭既張承雲乃奏騶虞九節貍首七章正飾五彩之雲壺寧百福之酒唐弓九合冬幹春膠夏箭三成青莖赤羽於是選朱汗之馬校黃金之埓紅陽飛鵲紫燕晨風唐成公之驌驦海西侯之千里莫不飲羽銜竿吟猿落雁鐘鼓震地埃塵漲天酒以罍行肴由鼎進彩則錦市俱移錢則銅山合徙太史聽鼓而論功司馬張旃而賞獲上則雲布雨施下則山藏海納實天下之至樂景福之歡欣者也既若木將低金波欲上天顧惟穆賓歌惟醉雖復暫離北闕聊晏西城即同酆水之朝更是岐山之會小臣不舉奉詔為文以管窺天以蠡酌海盛德形容豈陳梗概捫虱新話云王勃滕王閣序落霞與孤鶩齊飛秋水共長天一色當時無賢愚皆以為驚絶然余觀庾信馬射序巳云落花與芝蓋同飛楊栁共春旗一色則知王勃之語巳有來處及觀歐陽集古録隋德州長壽寺舍利碑亦云浮雲共嶺松張蓋明月與巖桂分叢則又淺陋與初造語者逺甚螢火賦序駱賓王余猥以明時久遭幽縶見一葉之巳落知四運之將終悽然客之為心乎悲哉秋之為氣也光陰無幾時事如何大塊是勞生之機小智非周身之防嗟乎綈袍匪舊白首如新誰明公冶之非孰辨臧倉之訴是用中宵而作達旦不瞑覩兹流螢之自明哀此覆盆之難照夫類同而心異者龍蹲歸而宋樹伐質殊而聲合者魚形出而吳石鳴茍有會於精靈夫何患於異類況乘時而變合氣而生雖造化之不殊亦昆蟲之一物應節不愆信也與物不競仁也避日不明義也臨危不懼勇也事有沿情而動興因物而多懷感而賦之聊以自廣云爾龍蹲謂孔子春秋演孔圖孔子坐如蹲龍立如牽羊吳得石鼓或教刻桐木為魚形扣之鼓乃鳴在獄詠蟬詩序駱賓王余禁所禁垣西是法廳事也有古槐數株焉雖生意可知同殷仲文之古樹聽訟斯在即周召伯之甘棠每至夕照低陰秋蟬疏引發聲幽息有切常聞豈人心異於曩時將蟲響悲於前聽嗟乎聲以動容德以象賢故潔其身也稟君子達人之髙行蛻其皮也有仙都羽化之靈姿候時而來順陰陽之數應節為變審藏用之機有目斯開不以道昏而昧其視有翼自薄不以俗厚而易其真吟喬樹之微風韻資天縱飲髙秋之墜露清畏人知僕失路艱虞遭時徽纆不哀傷而自怨未搖落而先衰聞蟪蛄之流聲悟平反之巳奏見螳螂之抱影怯危機之未安感而綴詩貽諸知已庶情沿物應哀弱羽之飄零道寄人知憫餘聲之寂寞非謂文墨取代幽憂云爾是編槩未及詩賦此二序乃耦語之雋者謹以昭明豪士例入選賓王繫獄史書不載而集中屢見談友夏批清畏人知句云用來説蟬妙絶此語極具眼大率古人成句皆然正用則板矣七日綿州泛舟詩序盧照鄰諸公迹寓市朝心遊江海訪竒交於千里惜良辰於寸陰常恐辜負琴書荒涼山水於是脫屣人事鳴棹川隅言追挂犢之才用卜牽牛之賞邊生經笥送炎氣以擢纓郝氏書囊臨秋光而曝背似遇緱山之客還疑星漢之遊願駐景於髙天想乘霓於縮地繁絲亂響涼酹時斟戲翔羽於平沙釣潛鯉於曲浦乘流則逝不覺忘歸咸可賦詩探韻成作登祕書署閣詩序楊炯若夫麒麟鳳凰之署三臺四部之經周王羣玉之山漢帝蓬萊之室觀星文而考南北大象入於璣衡披帝册而質龍神負圖出於河洛司先王之載籍掌制書之典謨劉向沈研揚雄寂寞之士於兹翰墨馬融該博傅毅文章之才此焉遊處莫不出言斯善有道則尊黼黻其德行圭璋其事業心同匪石達人千載之交手握靈珠文士一都之會陶泓寡務紬素多間命蘭芷之君子坐藝香之祕閣徒觀其重欄四絶閣道三休紅梁修柱金鋪玉磶平看日月唐都之物候可知坐望山川裴秀之輿圖在即虹霓為之回帶寒暑由其隔闊豈直崑崙十二瀛海千尋西州有百尺之樓東國有千秋之觀於時五行金王八月秋分風生閶闔之門日在中衡之道煙雲悽慘白露下而四郊空林野蒼茫青天髙而九州迥登山臨水無非宋玉之詞髙閣連雲有似安仁之興列芳饌命雕觴扼腕抵掌劇談戲笑假使神仙可得自蔑松喬富貴在天終輕許史登髙作賦羣公陳力於大夫聞善若驚下走自強於玄晏輕為序引綴在辭章炯華陰人舉神童授挍書郎遷詹事司直坐從弟神讓與徐敬業亂出為梓州司法參軍遷盈川令張説以針贈行戒其苛至官果以嚴酷稱卒於任遊雲門寺詩序梁肅上德與汗漫為友無江海而間其次則仁智相從有山水為樂故合志同方賢者有柴桑之隱遊道同趣吾徒為雲門之會其造適一也先會一日沙門釋去喧命我友相與探玉笥上會稽然後泝若耶過鳳林而南意欲脫人世之羈鞅窮林泉之遐奧於是捨舟清瀾反䇿間原遞杳靄而歷嶇􅋂入深翠以泛回環遂至於雲門觀其羣山疊秀秦望拔起五峰巉巉列壑沈沈上摩碧落旁湧金界其下則百泉會流蓄為澄潭涵虛鏡徹鳴瀨玉漱泠泠之聲與地籟唱和不待笙磬而五音迭作眺聽之不足則凝思宴息恍焉疑諸天樓觀列在咫尺庭衢之中别有日月既而動步真境坐聆法音合漆園一指之論詣淨名無住之本萬纍如洗百骸坐空視松喬為弱喪輕世界於棗葉蓋道由境深理自外奬故也昔之逺公紀廬山謝客題石門道流勝賞今古一貫曷可不賦貽雲山羞乃各為詩以志斯會同乎道者有隴西李公受髙陽齊霞舉約會未至亦請同賦此篇用廣天遊衍之致云肅字敬之一字寬中建中初中文詞清麗科擢太子挍書郎蕭復重其才授右拾遺修史以母老不赴杜佑辟淮南掌書記召為監察御史轉右補闕翰林學士皇太子諸王侍讀卒年四十一崔恭序其集謂公之習尚敦古風閲傳記硜硜然以此導引於人以為其常米鹽細碎未嘗挂口故鮮通人事晚春崔中丞林亭會集詩序梁肅德充則體和道勝則境靜抑常理也前左馮翊崔公意遺富貴迹叶幽曠與浩氣為徒故不導引而壽以善門為事故無江海而間春池始平芳草如織乃啓虛館延羣賢鳴琴濁酒以侑談笑搴英玩華以賞景物修竹滿嶴以環合紫藤垂地以縈結地有滄洲之趣鳥無城郭之音信上智之髙居人間之方外者也於時衆君子飽公之和惜日不足顧相謂曰夫養正在我敘位在時今朝廷虛老更之席以待園綺公實舊德行將論道不暇焉可晦而息乎蓋詩可以興可以羣盍歌詠之以志斯會且用祝公以君子萬年受兹介福焉爾題致仕武賓客嵩山舊隱詩序顧雲賓客諱攸緒則天皇后從姪也天授中封安平郡王遷殿中監出為揚州大督府長史聖歷中棄官隱居嵩山避榮寵也想其始來捫危選勝駕逈裁基鈿走伊波控隱士飲牛之渚螺排緱嶠對仙人駕鶴之峰移紫府之全模寫清都之勝槩王桃植砌董杏栽壇帳合蘿髙床平石古飛流界練貫幽響於風湍曙景張屏挂清光於露壑時或春花發盡秋雨晴初虛籟調風斜窗印月吞露華兮漱煙液而樂天和吟酒賦兮唱吟歌焉知帝力及龍圖去呂龜鼎還劉中宗皇帝方欲訪道崑巖鳴鸞茨岫遙飛鶴版親授蒲軒扣蓬藋之荒扉逺徵枚乘掃皋夔之右席強走嚴陵莫不黃屋翹襟髙霞疊夢由是輕鷗出浦明月離雲才拜宸階旋登甲觀以公嘗棲洞府不喜塵機雖當挂珮垂紳愈若投羅觸罟及飛章上闕雪泣辭天帳祖席於青門轄仙裝於紫陌乃知飛霜匝野氷雀留不死之蠶烈日熒溟珠岸有不枯之草故能振清風於戚里飛逸駕於雲逵宜乎與祿産分鑣夷齊結轍比夫吞腥咽腐懷祿偷安者不亦優乎今則八桂森闕五芝零落立松崖而盡日不見王孫掃石壁以題詩别招逋客豈無來哲能紹玄蹤聊剖短章用旌髙烈時睿文英武明德至仁廣孝皇帝御宇十二嵗也龍集辛卯律中林鍾十二月丙寅題攸緒生平有二快事武氏以威福奔走天下天下豪傑不為所餌則為所除攸緒於此時盤桓龍門少室間冬蔽茅椒夏居石室不獨不受官爵即賜與器物皆置不用此一快也中宗復辟忘大仇縱孽后天下豪傑又靡然從其豢養乃召攸緒議行問道禮詔見日山陂葛巾不名不拜攸緒冠帶伏入舍人贊就位竟趨常班再拜此二快也常恨唐之子孫不肖不能盡殺武氏噫如攸緒者豈可殺乎四六法海卷九
