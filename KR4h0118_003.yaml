body:
  text: 四六法海卷三明王志堅編謝書上考表李雍臣某言伏奉今月日聖恩鑒以薄能光賜上考御詞激物睿奬動時戴天不勝局地無所中謝臣聞荷再造者遍於有情勸庶工者盡於有位莫不宣其力竭乃誠欣赴前儔恥居後殿者蓋以萬數則區區揚化眇眇納忠自化彭蠡之魚更是海濱之雁伏惟陛下太和布氣巨壑流津宇宙開明既照纎草山河鮮潤每納昆蟲豈臣凋枯復霑雨露天漢之上遙記嚴平宣室之中興言賈誼摧羽插翼忽飛翥於雲霄暴鰓捷鰭重遊泳於溟渤豈有循吏得預詞林鼷鼠軒墀鶢鶋鐘鼓徒驚奬飾益用慚惶況乎政術空虛褒述纍積文髙日月辰象法之不逮德厚嵩華羣嶽朝之莫階雖郭隗濫觴明主有所蓄意然邵信敦本微臣不敢負人慶忭則深憂懼亦切無所報國空以誓心金州刺史滕王元嬰不法髙宗自書下上考以愧之玄宗亦賜李雍上考當時天子自做考功司吏治安得不飭謝入朝表李雍臣雍言伏奉七月十五日恩敕許臣會計京師者止水一杯忽聞朝海枯查八月更得浮天中謝臣以幽遐必察者日月之照明憔悴皆霑者雨露之恩廣伏惟陛下天德隂騭神功獨斷咸造吹萬容至於工養報通三大及於小豈臣微物得預洪爐在昔全生已承曲記斯今上計再荷特恩戴盆之心仰天有望出籠之鳥飛空可期方將蹈舞闕庭慚戴咫尺葉公宿願一覩真龍岐下遺氓欣逢聖主無任雍字泰和揚州江都人善之子天后時為左拾遺宋璟劾張昌宗后不應雍立階下大言曰璟所陳社稷大計陛下當聽或讓曰子位卑一忤旨禍且不測雍曰不如此名亦不傳其後在中宗朝忤武氏貶在玄宗朝一忤岑羲貶再忤姚崇貶三忤張説貶四忤李林甫杖死死時年七十矣詳其生平亦慷慨謇諤之士也今讀二表何熱中乃爾又有謝敕封表云求西山之藥願補聖躬殊可發笑蓋不如此名亦不傳一語亦可窺其微矣子美八哀詩咏雍云豐屋珊瑚鈎麒麟織成罽紫騮隨劍几義取無虛嵗分宅脫驂間感激懷未濟衆歸賙給美擺落多藏穢詳此詩蓋多取多與人也其聲名之髙皆以此為薛使君謝婺州刺史表王維臣某言伏奉今月日制除臣某官拜命若驚稽首無地臣聞洪波退流必蕩其溷穢慶雲所潤不遺於荆棘伏惟陛下孝悌之至通於神明馨香之德格於天地故指旗而黑祲旋靜揮戈而白日再中豈臣蟲臂鼠肝所能談天述聖臣之本末強欲自陳擢髮數罪臣戮餘也剖心自明天知之矣臣素書生少為文吏折衝禦侮幾何不亡奉法守文一日之長當賊逼溫洛兵接河潼拜臣陜州催臣上道驅馬才至長圍已合未暇施力旋復陷城戟枝義頭刀環築口身關木索縛就虎狼臣實驚狂自恨駑怯脫身雖則無計剚刃有何不可而折節凶頑偷生厠溷縱齒盤水之劒未消臣惡空題墓門之石豈解臣悲今於抱釁之中寄以分憂之重且天兵討賊曽無汗馬之勞天命興王得返屠羊之肆免其釁鼓之戮仍開祝網之恩臣縱粉骨糜軀不報萬分之一況褰帷露冕是去嵗之縲囚洗垢滌瑕為聖朝之嶽牧臣欲殺身滅愧刎首謝恩生無益於一毛死何異於腐鼠謹當閉閣以思政酌泉以勵心親畢力於平人無煩八部誓不負於明主非畏四知用釋愆誅敢求課最安祿山反維為所得以藥下利陽瘖祿山迎置洛陽迫之以官祿山大宴凝碧池悉召梨園諸工合樂維聞賦詩痛悼賊平皆下獄或以詩聞行在弟縉請削官贖維罪肅宗亦自憐之下遷太子中允此表蓋為當時同罪者所作為畫人謝賜表王維臣某言臣猥以賤伎得備衆工誤點屏風乏成蠅之巧偶持團扇無事牸之能徒以職官不敢二事顧惟時論有慚三絶伏惟皇帝陛下撥亂反正受命中興俯協龜圖傍觀鳥迹卦因成畫畫始生書知微知彰惟聖體聖臣奉詔旨命寫功臣運偶鳳翔之初無非鷹揚之士燕頷猿臂裂眥奮髯髮衝鶡冠力舉龍鼎骨風猛毅眸子分明皆就筆端别生身外傳神寫照雖非巧心審象求形或皆暗識妍媸無枉敢顧黃金取舍惟精時平白粉且如日磾下泣知其孝思于禁懷慚愧此忠節乃無聲之針頌亦何賤於丹青宣父之似皋繇元子之類越石不待或人之説無煩故妓之言此又一奇誠為可尚臣得舐筆麟閣繼踵虎頭頻蒙奬教之恩益用精誠自勵勤以補拙雖未飛仙感而遂通實因聖訓況賜衣服纍問官資中使相望屢加宣慰微臣戰灼無答恩私摩詰有詩云宿世謬詞客前身應畫師并此表真足為畫家長價為曹將軍謝寫真表王維臣某言天幸微臣身逢大聖得為列卒以備戎行於臣一生已為萬足況建旗為將裂組受官蒙推食之恩辱賜衣之寵匹夫之勇雖不顧身長䇿無聞未能盡敵仰慚介胄俯愧櫜鞬加以弓不重於六鈞箭不穿於七札詎中雀目誠慙猿臂似劉琨而恨小非關羽之絶倫何以厠迹虎臣儀形麟閣伏惟皇帝陛下昭格天地懸超七十二家微臣託附風雲不如二十八將而蒙乖聖旨特命圖工畫植戟之黃鬚圖石稜之紫色才如過隙顧侯已得其神不待臨淄鄒子自知其醜豈可藏之祕府以示後人將謂飛龍之時無俟貔貅之士寵過其效力不稱恩願死藝於伏􅌢誓役身於鳴轂無任感激欣戴之至曹將軍名史傳無考乃知當時宣力之臣圖形內府者不獨凌煙諸公也宋世人主於臣下尤厚唐介畫像不似出內本賜其家見梁適而知其肖父當時名臣圖像主上蓋時常展玩矣為郭子儀讓華州奉天請立生祠建碑第三表失名臣聞人臣事君稟命而已若君有非常之略則臣成佐命之勳象彼四時運行實因於上帝配諸百谷廣大在宗於滄溟頃陛下監國撫軍則再安宗社及龍飛踐祚又克清夷狄所有成績莫非雄圖臣雖在行何力之有今奉天華州耆夀請為臣建碑立祠且陛下聖功已書簡䇿微臣薄效何足褒稱耆夀之徒昧於事體謬請刋紀殊乖名實昨已再表懇辭冀達誠慊陛下未察令斷來章奉詔兢惶若墜泉谷況今畿內百姓日益凋殘糧無半菽室如懸磬以不急之務擾至疲之人竊顧心顏益增靦懼又比來耆夀陳狀是官吏指麾恐以臣備位台司妄為希附縱有勤請或由矯飾所恃聖造特遂愚衷區區之誠敢以死請無任懇迫之至于再三言不動天未蒙允納夙夜兢懼不遑寧止臣非有馬援南征之績竇憲北伐之功安敢飾詞以陳謙讓但以兵革不息十年於兹天下之人未獲其所臣幸備相位尚負憂責頃嵗之克復京都去冬之攘却夷醜所有微效皆稟聖謀然未能使干戈盡銷郊甸罷警北有亡命之虜西有無厭之戎公卿大夫未免旰食臣幸而獲宥其榮已多豈可竊功僥名以圖不朽其若千古何昔漢為霍去病理第辭以胸奴未滅無以家為況今殘孽尚存而敢播美金石雖臣才不逮古竊慕古人之至所望再效駑蹇逺斥凶渠三虜之首既縣四海之波自定從此偃伯可以息人然後亦未為晚臣以誠願實在於斯伏乞聖恩特遂勤請無任惶怖迫切之至功如郭尚父消受一碑一祠不得耶一段撝謙之衷可照千古耆夀之徒昧于事體備位台司妄為希附此老可謂眼中有鏡矣此表三篇載修文御覽前篇為李嶠作此概作前人當是偶誤今闕之李採訪賀收西京表常衮臣聞夏厯其昌羿何逃罪漢維既振莽亦伏誅伏惟皇帝陛下恢正皇綱光膺帝業日月照其明略雷霆發其英斷拯橫流而方割撲燎火之已焚頃者胡羯亂常崤函失守暴殄天物憑陵帝京上皇興避狄之仁陛下有蒙塵之難賴宸衷果決睿算昭宣憤陵寢之樵蘇悲黎元之塗炭必將嘗膽誓使然臍不有殷憂何以啓中興之盛業不有患難何以彰撥亂之英哲步自郇邠至於朔漠撫巡城邑招致甲兵誥命俯臨三讓而登九五師徒走集一呼而踰百萬設壇拜將虛左迎師臨朝有怵惕之容率土下哀痛之詔六軍之號令既肅萬人之賞罰且明湯火不辭矢石何懼及清秋戒節太白方髙爰整軍容順乎殺氣龔行天罰掃彼妖氛千里貔武之營百里龍蛇之陳沸若雲海聚如雪山壘揭終峯塹回渭水闞軍聲而丘陵簸蕩煬兵氣而天地晦冥蠢兹凶徒猶敢旅拒鼓譟白刃來聚犬羊之羣旗靡黃塵旋就鯨鯢之戮渠魁不漏噍類無遺枝梧者面縛中軍顛背者頭懸後殿敗符融於肥水自可慙功破王邑於昆陽未云快意遂封尸於京觀旋振旅於王城啓闢千門掃除九陌祓羶腥於宮闕洗毒螫於閭閻耆艾歡迎久思周德衣冠雨泣還覩漢儀謳吟變噢咻之聲氣象回嚴凝之慘廓丹霄以瞻羽衛肅黃道而復鑾輿正寶位於北辰道光主鬯迎上皇於西蜀歡展奉親永惟宗社之靈實荷乾坤之慶臣忝陪宗室喜萬恆情無任踴躍歡忭之至謹奉表陳賀以聞常衮京兆人代宗時拜門下侍郎同中書門下平章事衮性狷潔懲元載敗窒賣官之路然一切以公議格之非文詞者皆擯不用時謂之濌伯以其濌濌無賢不肖之辨云德宗即位貶潮州刺史建中初起為福建觀察使閩之文學衮實倡之李晟收復京師于公異作露布略云逆賊朱泚委身凶德假翮姦徒熒惑我生民僣賊我神器聚為起穢之物腥彼宮闈散作旬始之妖孛于躔次末云臣已肅清宮禁祗謁寢園鐘簴不移廟貌如故德宗覽之泣下今摘其警語附此中書門下賀雪表常衮臣聞聖人昭事以奉時乾道下濟以成物伏惟皇帝陛下勤勞庶政憂濟萬邦念生靈之未康慮兵食之不足恭默寅畏齋於穆清減膳撤樂以祈玄造天人合應雨雪呈祥在登臺視朔之辰飄灑盈尺俯獻歲發生之節飛舞驚春太素混成浩然萬里甲子之瑞載表於昌期春秋所書亦先於農事重隂益固應水澤腹堅之時積潤潛通迎土膏脈起之候靈貺斯在豐年可知佇登來牟不暇祈榖侍臣相慶野老同歡臣謬奉中樞獲覩嘉慶無任忭躍之至謹奉表陳賀以聞進異馬駒表令狐楚臣某言得當道征馬使穆林狀稱欣州定襄縣王進封村界去五月十二日夜孶生馬羣內異駒一匹白騧文馬畫圖送到者臣謹差虞辛峻専往考驗并母取到太原府而毛色變換與青騧色駝頭跌額紅鼻肉駿尾上茸毛額帶星及旋肋骨左右各十八枝四蹄青兩眼黑續得穆林狀稱當生之夜羣馬皆嘶靈質炳然休徴備矣中謝臣聞馬之精也自天而降馬之功也行地無疆是以武藉其威文榮其德謹按馬經云肋數十六者行千里伏惟陛下握負圖之瑞總服皂之靈異物殊祥蔚然叢集臣觀前件駒靈表挺特雄姿逸異頸昂昻而鳳顧尾宛宛以蛇蟠信坤元之利貞誠太乙之玄貺自將到府便麗於宮每飲以清池牧於芳草則彌日翹立驅之不前及長風時來微雨新霽輒驤首奔騁追之莫及臣某恆親省視専遣柔馴倘駿骨峰生奇毛日就獲登華廏既備屬車逺齊飛之名上奉應龍之馭天下大慶微臣至願見今養飼至秋中即専進獻伏惟陛下兼愛好奇想其風彩今謹圖畫隨表上進令狐楚字殼士其為文於箋奏制令尤善每一篇成人皆傳諷素與皇甫鎛善其得學士進平章皆鎛薦之又嘗謀逐裴度天下共疾之及甘露之變以王涯賈餗寃草詔指其罪不切為仇士良等所怨不得再相將卒令門人代為奏言以甘露事誅遣者衆請霽威普見昭雪蓋瑕瑜互見云詩文中形容良馬不乏若生馬駒則未有如此篇之得情得景者也為羽林李景略將軍進射雁歌表令狐楚臣某言臣伏惟皇帝陛下某月日臨御某殿射飛雁一隻應弦而落歡動宮闈武暢環衛中謝臣家世為將揚聲朔野弧矢之事少嘗習焉每張侯為鵠注鏃而釋期於必中十不一二今則禽飛於青冥之際箭發於倐忽之間一聲劈雲雙翼墜地此皆神授審固靈扶端直以成陛下神武之威也臣才質無取蒙恩深厚脫劍免胄之餘輒思撰射雁歌一章隨此上獻帝不敢繼抗隨列風雅姑以抒下情宣上德附於文武之末而登歌焉無任歡忭怔營之至為汝南公賀元日御正殿受朝賀表李商隱上正三辰下臨萬國事雖舉舊命則維新臣聞聖祖垂訓王者處域中之尊公羊紀時春者為一嵗之始載稽故實抑有典章近嵗以來此禮多闕或事因惜費或時屬告休伏惟陛下道被無垠政敷有紀全被發生之德無非欣合之仁蒼旻降符黃輿告瑞石碑既見文作太平銀甕旋臻字成萬嵗而又憂勤不輟克責方深精誠旁照於八紘懇惻上通於九廟仙厨撤味獸館休畋遂使化妖宿為夀星變小戎為餓殍慶由聖感令屬神行爰在新正式修闕典彤庭列位丹陛陳儀凝旒而天啓其門服衮而日升於觀巽風發越兌澤滂沱左右賢臣駿奔多士國無便佞擢靈草而不搖朝絶姦邪儼神羊而莫動禮成而退物有其容況以光耀瑤圖丹青玉版輝前映後邁五登三臣竊訪碩儒逺徴舊典帝堯華封之祝惟止匹夫神禹塗山之儀且非元會然猶堯有多憂之戒禹存後至之誅在和平而尚乖孰歡呼之可致豈與兹日而得同年臣方守河潼正分符竹不獲躬陳玉帛首率梯航況又嘗以藝文叨居禁密雖逺離天上猶近關西忭賀空深就望無所心馳紫闕非夢寐而不通魂繞皇闈羡歸飛而莫及商隱字義山懷州河內人或言英公裔孫也令狐楚帥河陽使與諸子遊楚本工章奏商隱受其學文益工楚徙天平宣武皆表署巡官嵗具資裝使隨計開成二年髙鍇知貢舉雅善令狐綯綯薦之擢進士第王茂元鎮河陽表掌書記得侍御史茂元善李德裕以故牛黨共嗤謫之茂元卒更依桂管觀察使鄭亞為判官亞亦德裕所善也會綯當國以為忘家恩放利茍合謝不與通久之補太學博士栁仲郢節度劍南辟判官檢校工部員外郎府罷客滎陽卒商隱為文繁縟時溫庭筠段成式俱用是相夸號三十六體為滎陽公賀老人星見表李商隱聖惟合德神實效祥必垂有爛之文以表無疆之祚臣聞玄象示人昊穹凝命曜為經而宿為紀則曰常名斗挹酒而牛服箱或標虛稱未若候時而出有道則彰居五福之先在三辰之列伏惟陛下昭明老契遊泳莊寰屆是中秋呈兹上瑞況見於午位又屬寅時仰考玄符乃有深意自南耀彩將𢎞解愠之風近曉流光欲助無私之日皇心載裕靈鑒孔昭凡居率土之濱皆慶後天之夀臣誤蒙重寄實逺清光送玄燕於梁間傷時自切望白榆於天上厥路無由為滎陽公賀幽州破奚冦表李商隱臣某言臣得本道進奏官某狀報某月日幽州節度使張仲武奏破奚北部落及諸山奚天聲逺疊廟略遐宣白虜獲於寧臺赤夷俘於燕路中賀臣竊窺舊史逖聽前朝有天子憂邊清宵輟寐將軍出塞白首言歸至乃或勝或奔一彼一此竟至塞郊之柝那停絶漠之烽猶欲敘烈旗常告功祧廟用其暫勝謂曰難能況幽朔巨都全燕重地薦臻奚冦猾亂華人田讓之獲鮮卑莫能深入祭肜之軍遼水惟遣相攻近嵗以來為患滋甚走單于偵邏之路懷駒支漏泄之姦張仲武重感國恩習知邊事同三師而肄楚侔五餌以間戎乘其嚻惰之時俄得剪除之便燕犀密挂冀馬潛羈超距投石者動過千羣戟手科頭者略踰萬計坎三鼓而河流自却聲六校而屋瓦皆飛自使梟懼喪林忙迷穴無舟掬指有地僵尸未驚紫陌之烏前軍已蹙不唳淮山之鶴後隊仍窮遂分袁尚之頭顱仍裂蚩尤之肩髀穹廬落燼同甲揚灰山積雲屯大收其車乘角羸耳濕盡獲其牛羊栁水載澄桑河無事此皆皇帝陛下功格上玄運膺下武授兹成奠於彼當仁震肅九圍歡呼萬國昔艱難云始胡塵首起於盧龍今開泰有期漢將先清於涿鹿人謀允若靈貺昭然固已上慶祖宗下光編䇿籙圖洪範競三古之殊猷玉檢金泥有百神之靈笈臣雖當防遏不介邊陲空增氣於懦夫實叨榮於下將日圍千里天蓋九重奉一月之捷書惟知忭蹈獻萬年之夀酒尚隔班行念風水於遐藩寄夢寐於宣室無任望闕結戀之至大中初張仲武破奚北部及山奚俘獲雜畜不資為滎陽公桂州謝上表李商隱臣某奉違禁掖祇役遐陬雖懸就日之誠懼曠宣風之寄柔轡載揚于永路輕船利濟於大川中謝臣某系承儒訓生屬昌期初挂辨髦即親筐篋嘉樹無忘於封殖青氊不落於冦偷再擢詞科一登册府徂遷嵗律浮泛軍裝忽彯華英俄列通籍極望郎於南省備給事於左曹中間帖掌臺綱分修國史旋值孽童拒詔狂虜亂華副中憲以急宣佐威城而遙護督晉氏遷延之役絶戎人偵邏之姦敢伐善以攘羭固盡誠於養棟伏惟陛下武推時夏文號欽明方將虔奉紫泥恭拜青瑣豈意遽分専席叨賜再麾首南服以稱藩控西原而遏冦褰帷廉部猶恐墜於斯文橫槊令軍實致憂於不武雖期竭力終懼敗官況俗雜華夷地兼縣道文身椎髻漸尉他南越之餘叩鼓鳴鐘傳士燮交州之態網疏則魚漏繩急則麏驚欲經緯以合宜顧韋弦而匪易伏願陛下務修儉德廣扇廉風捐翠投珠不勤異物驅犀逐象用示深仁始於問俗之時使獲稱君之美亦當求規水薤取戒脂膏冀少息於羣黎庶免拘於司𨽻三梁路阻九嶠山遙浮江遇楚澤之萍望國隔番禺之桂遐思白鳥率飈音於周囿之中逺羡仙蓂永固本於堯階之上鄭亞字子佐滎陽人爽邁有文舉進士賢良方正書判拔萃三中其科李德裕髙其才及守浙西辟署幕府擢監察御史李回任中丞薦知雜事拜給事中德裕罷相出為桂管觀察使坐吳湘獄不能直寃貶循州刺史卒為濮陽公陳許謝上表李商隱揄揚皇化宣布睿慈連營咸鼓於巽風闔境均霑於兌澤某材謝漢飛義慚燕使獻書求試學劍邀勳大舸千艘早竊樓船之任勝兵萬數晚兼車騎之名雖任在啓門而時當柔逺珠崖銅柱祗務廉平麻壘艾亭莫能恢服旋屬陛下荆枝叶慶棣萼傳輝臣得先巾墨車入拜丹陛蘭臺假號棘署參榮奉漢后之園陵獲終送往掌周王之廩庾方切事居不謂遽董戎旃還持武節賜國既髙於七命承家又慶於重侯維彼璧田實聫鼎邑古之近甸今也雄藩想像汝南星聚而先賢未逺經過潁上水濁而強族皆除况在昔年常鄰多壘載瞻軍額深見士心貴忠孝之兩全則忠可移孝正文武之二道則武可輔文咨謀將領之能必重英豪之選豈虞拔擢乃出孱微謹當阜俗而必致人和貞師而不為兒戲使流庸自占驍悍知方任棠水薤之規臣當可服黃霸米鹽之政臣亦不遺粗勤報效之資用贖叨餮之責奉違軒鏡幾落堯蓂比園葵以自傾晝惟向日羡海槎之不繫秋則經天感激而淚血霑衣兢憂而汗雨浹背王茂元鄜坊節度使栖曜之子也德宗時上書自薦擢太子贊善吕元膺留守陳都署防禦判官淄青留邸卒謀亂元膺率兵圍之士無敢先者茂元取一人斬之衆乃進亂卒出奔纍遷嶺南節度使封濮陽郡侯召為將作監領陳許節度使又徙河陽討劉稹也李德裕以茂元兵寡詔王宰以陳許兵援之會病卒諡曰威為濮陽公陳情表李商隱臣聞事君以忠者所宜效死食君之祿者亦戒妨賢茍非內慊私誠外憂官謗則安肯固辭武節強委侯圭拒七命賜國之榮捨萬里封侯之䇿必知不可安敢無言中謝臣因緣代業遭逢聖時竊常有志四方不掃一室奉隋武之家事無愧陳辭慕鄧傅之門風不傷清議屬者每憂不試深恥因媒自薦之書朝投象魏殊常之澤暮降藝香其後契濶星霜羇離戎旅從軍王粲徒感所知掌檄陳琳亦常交辟吕元膺東周保釐之日李師古太平泮涣之時潛入其徒盈於留邸臣此時尚持白簡猶著青袍元膺知臣傳劍論兵本於仁信佩鞬插羽亦識孤虛俾以發姦假之捕盜幸無容忍以及焚巢旋帶銀章俄分竹使隼旟楚峽出以分憂熊軾鄖城忽然通貴豈意復踰五嶺更授再麾中間叨相青宮忝司緹騎才通閨籍又處藩條越井朝臺備經艱險貪泉湞水益勵平生是甘馬革之言常懼武皮之誚及聖造逺流南極許拱北辰黃犢留官胡牀挂柱如生羽翼若出嬰羅誓以歸彼冗員處之散地俄以朝那失守昆壤須人一去闕庭五罹寒燠處京畿五百里之內控番冦數十州之多提鼓燒烽增埤濬洫雖國家逺追上䇿不事交爭然蛇豕難防犬羊易縱茍罷嚴撤警則負約渝盟臣自受命以來為日斯久未嘗一日不修戰格未嘗一日不數軍儲使士有鬬心人無虛額使之偵候咸亦聞知尚未能率勵驍雄揣摩鋒鏑逺收麻壘直取艾亭成天朝經武之威畢微臣報主之分可書竹帛不辱旗常蓋以久處炎荒備薰瘴毒內搖心力外耗筋骸雖馬援據鞍尚能矍鑠而班超攬鏡不覺蕭衰恐無以早就大功久當重任自思已熟求退為宜伏惟皇帝陛下道冠百王功髙三代照臨若日覆露如天況今國不乏人時稱多士有才略在臣之右齒髮少臣之年俾代處是邦遞臨斯位以之責效誰曰不然俾前達後生皆無蔽滯由中及外得以交相成陛下適時之方減微臣固寵之責臣不勝祈恩懇迫之至代僕射濮陽公遺表李商隱臣某言臣聞螻蟻知雨雖通感於玄天蒲栁望秋必凋華於厚夜況臣攝生寡要將命無方寒暑頓侵精神坐竭竈乏傳薪之火餘焰幾何隙無留影之駒殘光即盡叩心戀闕忍死封章呌白日而不回望青天而永訣中謝臣雖忝望族本實將家自先臣出揔郊圻遇任大國靜無師旅被服元化翺翔盛時遂與季弟參元俱以詞場受貢久而不調因以上書自薦求通干時願試藝香作吏始筮仕於德宗瑞節臨戎復分憂於陛下雖性分有限而忠誠不移固無韓彭為將之能實慕趙竇散財之義兩踰嶺嶠四建牙旗約已潔身絶甘分少良田五頃慮莫及於子孫厚祿萬鍾惠頗霑於賓客恭承詔命以守藩條而掌事者徒以元和中呂元膺留守東都李師古潛謀洛邑託以郡邸入之甲兵臣當時為元膺賓僚值師古竊發藍衫不脫竹簡仍持因為麾兵虜其朋帥遂以將材相許戎統見期頡頏遐途纂修舊服光隂荏苒遷授頻仍昨者分領許昌兼臨河內當上黨阻兵之始是孽童拒詔之初臣方將奮勵疲駑指揮精鋭所冀解鞍赤狄息駕晉城大攘蜂蠆之羣以雪人神之憤自前月某日後軍聲大振賊勢稍衰人一其心士百其勇燕頷有相曽無定逺之期馬革裹尸實負伏波之願而精神靡著素心見違援枹之意方堅就木之期俄及忽自今月某日疾生腹藏弊及筋骸藥劑之攻擊愈深神祇之禱祠無益固已騰名鬼籙收氣人寰復燃無望於死灰更起難同於仆樹然臣素窺長者曽慕達人省於變化之端粗識死生之理豈其有貪富貴敢冀延長但以未報國恩未誅賊黨視胄長免對弓莫彎思犬馬以自悲悼鐘漏之先迫志有所在傷如之何撫節而乏淚以流伏􅌢而無血可衉中謝其行營三軍已舉牒差某官某河陽留務差某官某懷州留務差某官某訖並皆授之方略各有司存至於旬日必無逗撓臣又伏思任司農大卿之日授忠武統帥之時紫殿承恩彤庭入對躬瞻堯日親沐舜風獲覩陛下神武之姿獲聞陛下憂勤之旨即北蕃小冦東土微妖亦何足煩陛下之甲兵汙陛下之鈇鑕伏望時推明略光闡睿圖內則收德裕讓夷紳絃之嘉謨外則任彥佐允達宰沔之威力廓清華夏昭薦祖宗然後瘞玉勒成鏤金垂烈臣雖百死復何恨焉臣精爽已虧言辭失次氣無復續蒙以纊而莫勝口不能言飯用貝而何益故園千里明君萬年永將覆載之恩長入幽冥之路殘魂不昧雖溫序之思歸枯骨有知遇杜回而必抗回望聖代哀號不能無任荒惙攀戀之至王茂元卒於河陽軍中此表處置諸事甚悉計商隱必在幕中及讀其祭外舅司徒之文云屬纊之夕不得聞啓手之言祖庭之時不得在執紼之列此不可曉為裴相公讓官表韓愈臣度言伏奉今日制書以臣為朝議大夫守中書侍郎同中書門下平章事承命驚惶魂爽飛越俯仰天地若無所容中謝臣少涉經史粗知古今天與朴忠性惟愚直知事君以道無憚殺身慕當官而行不求利己人以為拙臣行不疑元和之初始拜御史旋以論事過切為宰臣所非移官府廷因佐戎幕陛下恕臣之罪憐臣之心拔居侍從之中遂掌絲綸之重受恩益大顧己益輕茍耳目所聞知心力所逮及少關政理輒以陳聞於禆益無涓埃之微而讒謗有丘山之積陛下知其孤立賞其微誠獨斷不謀奬待踰量臣誠見陛下具文武之德有神聖之姿啓中興之宏圖當太平之昌厯勤身以儉與物無私威怒如雷霆容覆如天地實羣臣盡節之日才智效能之時聖君難逢重德宜報苦心焦思以日繼夜茍利於國知無不為徒欲竭愚未免妄作陛下不加罪責更極寵光既領臺綱又毗邦憲聖君所厚凶逆所讎闕於防虞幾至踣斃恩私曲被性命獲全忝纍祖先玷塵班列未知所措祗自內慙豈意陛下擢臣於傷殘之餘委臣以燮和之任忘其陋汙使佐聖明此雖成湯舉伊尹於庖厨髙宗登傅説於版築周文用呂尚於屠釣齊桓起寧戚於飯牛雪恥蒙光去辱居貴以今凖古擬議非倫陛下有四君之明行四君之事微臣無四子之美獲四子之榮豈可叨居以彰非據今干戈未盡戢夷狄未盡賓麟鳳龜龍未盡遊郊藪草木魚鱉未盡被雍熙當大有為之時得非常人之佐然後能上宣聖德以代天工如臣等類實不克堪伏願轉選周行旁及巖穴天生聖主必有賢臣得而授之乃可致理乞回所授以叶羣情無任懇欵之至度字中立河東聞喜人歷監察御史論權嬖鯁切出為河南功曹參軍武元衡帥西川表掌書記召為起居舍人元和六年以司封員外郎知制誥進中書舍人御史中丞王師討蔡以度視行營諸軍還奏攻取䇿進兼刑部侍郎王承宗李師道謀緩蔡兵乃使盜刺宰相元衡又擊傷度議者欲罷度安二鎮帝怒曰若罷之是賊計適行度亦以王室陵遲常忿愧無死所自行營歸知賊曲折帝益信仗及病創一再旬分衛兵護第存候踵路疾愈拜中書侍郎同中書門下平章事存此以備一體為王京兆賀雨表栁宗元天且不違神必有據密雲與綸言繼發時雨將天澤並流中賀伏惟皇帝陛下憂切蒸黎慮深稼穡思彼未兆防於無形滲漉每出於湛恩變化亦隨於廣運宸衷暫惕已矯御天之龍聖謨既宣遂洽漏泉之澤霮䨴周布霏微四施黍稷盡成公私皆及野夫鼓舞知帝力之玄通官吏歡呼見天心之默喻臣某牧人京邑動仰皇靈渥澤徒加涓滴無助退之表啓不盡作耦語只是將平日文略加整齊而已至子厚則神理膚澤色色精工不惟唐人技倆至此而極即蘇王一脈亦隱隱逗漏一班矣為王京兆賀雨第三表栁宗元伏惟皇帝陛下言為神化動合天心未成旱暵之虞已積憂勤之慮衆靈受職薈蔚且躋於南山百榖仰榮滂霈遂沾於東作睿謨朝降膏澤夕周知天人之已交識隂陽之不測然則周王徒勤於方社殷帝虛美於桑林豈若無災而早圖未禱而先應化超前聖道貫重玄遍野同歡傾都相慶代永州韋刺史謝上表栁宗元受命若驚臨職彌懼中謝臣以無能纍更事任神州赤縣實所備嘗過量逾涯每深兢惕不謂聖恩推澤濫駕朱輪祿秩徒增詎施乳哺之惠服命虛受寧興襦袴之謠況此州地極三湘俗參百越左袵居椎髻之半可墾乃石田之餘曠牧守於再秋彌驕獷俗代征賦於三郡重困疲人分災本出於一時積弊遂逾於十稔撫安未易知法出而姦生子育誠難懼力勞而功寡夙夜憂切不敢遑寧謹當宣布天慈奉揚神化以日繫月儻或有成少禆愷悌之風因答生成之造臣無任感恩隕越之至子厚深於吏治每於文字中露一二語為武中丞謝賜櫻桃表栁宗元天眷特深時珍薦降寵驚里巷恩溢圎方中謝伏以含桃之羞時令攸貴況今採因御苑分自天厨使發九霄集繁星而積耀味調六氣承湛露而不晞盈眥而外被恩光適口而中含渥澤顧慙素食彌切自公豈圖君子所先遂厭小人之腹摩詰退之皆有賜櫻桃詩蓋唐時有此制為裴中丞賀破東平表栁宗元臣某言日月得進奏官狀報逆賊李師道以某月日克就梟戮率土臣子慶忭無涯臣聞負恩干紀者鬼得而誅犯順窮凶者天奪其魄不有妖孽曷彰聖功伏惟陛下先天不違與神合契掩周宣中興之業陋漢光再造之勳靈旗四臨氛沴皆散凡在臣庶盡覩升平伏以師道席父祖以作威苞海嶽而専祿恃東秦十二之險誘臨淄三七之兵竊據一方嵗踰五紀朝宗之地曠若外區封祀之山隔成異域纍聖垂德曽未悛心餘黨滔天果聞折首遂使云亭有主知玉牒之將封遼海無虞見石砮之已至此皆陛下神籌獨得廟略無遺授任推盡力之誠縱捨有感心之化金石可貫龜筮必從克成不戰之功遂洽無為之理臣謬司戎旅逺守方隅愧無橫草之功坐見覆盂之泰忭蹈歡慶倍萬恆情代宗時李正已為平盧節度使雄據東方子納自稱齊王後師道嗣為其將劉悟所殺為武中丞謝賜新茶表栁宗元臣某言中使竇某至奉宣聖旨賜臣新茶一斤者天眷忽臨時珍俯及捧戴驚抃以喜以惶臣以無能謬司邦憲大明首出得親仰於雲霄渥澤遂行忽先霑於草木況兹靈味成自遐方照臨而甲拆惟新煦嫗而芬芳可襲調六氣而成美扶萬夀以效珍豈可賤微膺此殊錫銜恩敢同於嘗酒滌慮方切於飲氷撫事循涯隕越無地代武中丞謝新茶表劉禹錫臣某言中使竇國晏奉宣聖旨賜臣新茶一斤猥降王人光臨私室恭承慶賜跪啓緘封中謝伏以方隅入貢採擷至珍自逺貢來以新為貴捧而觀妙飲以滌煩顧蘭露而慙芳豈柘漿而齊味既榮凡口倍切丹心臣無任武元衡傳云德宗未擢御史中丞順宗立王叔文使人誘以為黨拒不納俄為山陵儀仗使劉禹錫求為判官元衡不與叔文滋不悅數日改太子右庶子憲宗立復拜中丞今按劉栁集皆有代武中丞謝表正是時作以後劉栁之謫元衡下石最力劉有靖共佳人怨二章栁有古東門行皆為元衡死於賊作也夢得有賦茶歌云山僧後簷茶數叢春來映竹抽新茸宛然為客振衣起自傍芳叢摘鷹觜斯須炒成滿室香便酌砌下金沙水驟雨松聲入鼎來白雲滿碗花徘徊悠揚噴鼻宿酲散清峭徹骨煩襟開陽崖隂嶺各殊氣未若竹下莓苔地炎帝雖嘗未解煎桐君有籙那知味新芽連拳半未舒自摘至煎俄頃餘木蘭霑露香微似瑤草臨波色不如僧言靈味宜幽寂采采翹英為嘉客不辭緘封寄郡齋甎井銅爐損標格何况蒙山顧渚春白泥赤印走風塵欲知花乳清泠味須是眠雲跂石人此詩所云斯須炒成及自摘至煎俄頃餘即表中以新為貴之意唐人論茶已如此至宋而有藏賜茶至七年殆不可曉代百寮進農書表吕溫臣某等言臣等伏準故事每年二月一日以農務方興令百寮具則天大聖皇后所刪定兆人本業記奉進者中謝臣聞不愛牲玉祈榖於圜丘可以致誠未足以勸農躬秉耒耜籍田於千畝可以示勸未足以教人必也殷天地之和順隂陽之理利其器用精厥法式行之而不倦動之而不勞四海靡而風行百姓迷其日用𢎞我政本實惟農書伏惟睿聖文武皇帝陛下德茂生成道光慈儉捐金而寶榖菲食而粒人考堯典以授時稽禹貢而任土潔粢盛而大事在祀銷劍戟而盡力為農豐年屢薦於郊歌嘉瑞繼書於國史而不自滿假惟懷永圖每至獻嵗載陽仲春初吉俯察土膏之候仰觀晨正之祥經始嵗功導揚生德徴有司之舊典奉先后之遺文深居穆清親覽奧妙匪崇朝而盡更田畝不出户而遍洽人情見捽草坯土之艱知寒耕熱耘之苦宸心感念甽畝昭蘇一歎而時雨先飛三復而春雷自起臣等業慙學稼祿過代耕親承務本之風日奉在勤之訓三時不害觀玉燭於氤氲九扈孔修賀生靈於富庶謹繕寫前件書凡二十篇共成三卷謹詣東上閣門奉表陳獻以聞溫渭之子字叔和一字化光藻翰精富一時流輩推尚性險躁譎詭而好利與竇羣羊士諤相昵羣為御史中丞薦溫知雜事士諤為御史宰相李吉甫持之溫等怨會吉甫病夜召術士宿於第即捕士掠訊且奏吉甫隂事憲宗駭異既詰辨皆妄將悉誅羣等吉甫救之乃貶溫道州刺史徙衡州皆有善政卒年四十為田神玉謝茶表韓翃臣某言中使至伏奉手詔兼賜臣茶一千五百串令臣分給將士以下聖慈曲被戴荷無階中謝臣智謝理戎功慙蕩冦前恩未報厚賜仍加念以炎蒸恤其暴露榮分紫笋寵降朱宮味足蠲邪助其正直香堪愈病沃以勤勞飲德相歡撫心是荷前朝饗士往典犒軍皆是循常非聞特達顧惟荷幸忽被殊私吳主禮賢方聞置茗晉臣愛客才有分茶豈如澤被三軍仁加十乘以欣以忭感戴無階神玉神功之弟神功卒神玉代為汴宋節度留後韓翃字君平建中初知制誥時有兩韓翃御批其詩以授歐陽公集古録跋云茶之見前史自魏晉以來有之此表所引用是也雲谷雜記引晏子春秋有茗菜字王褒僮約有武陽買茶語則魏晉以前事也野客叢書謂周禮荼檟之荼即茶則六經中事也賀平黨項表杜牧上天有震耀殺戮王者有攻討誅夷是以不暫費者不久寧不一勞者不永逸伏以自古處夷狄於中華未有不為患者春秋時長狄攻魯北戎病齊破衛陵燕侵秦撓晉西漢趙充國納先零於內地東朝馬文泉置當煎於三輔自後熾大侵亂關中戰爭十年騷擾四海凌逼京邑發掘園陵段熲不生終不能滅後至曹公因胸奴衰弱分為五部處在汾晉散而居之元海傑然首亂華夏中原喪沒凡數百年國朝貞觀之初突厥破滅太宗惑彥博之利口忽文貞之成算處其降衆置於河南不數十年果殘燕趙興師命將輸榖饋財天下騷然始能殄滅是知古今夷狄處在中土未有不為亂者伏以黨羌雜種本在河外生西北之徑俗稟天地之戾氣為西戎所蹙舉種來降國家納之置於內地爰受冠帶兼伏征徭角觡既成抵觸是務天寶至德之際北燕偏重中原一掀大厯建中之時逆胡餘波巨盜再起黨羌因此亦恣猖狂兔伏烏飛為戎虜之耳目狼心梟響作郊畿之殘賊比以回鶻未殄吐蕃正強且須羈縻未可重撅於是邊疆日駭種類嵗繁每至徑弓折膠重馬免乳以魁健之質張忿鷙之凶劫饋谷以焚舟殺軺車而閉道衆虺盤結羣羊吽牙依據深山出沒險徑近在宇下遊於彀中艱難已來不能剷削伏惟聖敬文思和武光孝皇帝皇天縱聖赫日資明威極風霆謀先造化潛運睿算獨決神機箕宿禡牙狼星斂角戊日禱馬太白揚眉按鎖而邊事無遺聚米而山形盡見披其要地搗以奇兵獸窮搏人鹿急走險囊封赤白雜沓繼來雉走檄書逺近同至蘇辛李蔡傅鄭甘陳十萬齊呼四面同入行軍猶枕席之上敗虜於阻險之中或以利戈舂喉或以長矛挾脅僵尸積疊千山之草木盡腥霆電轟喧萬里之威靈大震詩曰不弔昊天亂靡有定此言中國不振蠻夷入伐下人號天以告亂也復曰宣王薄伐小雅中興是知武功不成文德不洽臯陶無遺之戒史佚非類之言若不殄除何為家國自此兵為農器革作軒車泥紫金於常山沈殘戎於青海天覆盡得禹畫無遺統華夏為一家用夷狄為四守萬物由道百度皆貞逺超三代之風使無一人之虐臣僻左小郡一作守非朴􅈪散材空過流年徒生聖代尚能為詩見志作歌極情上詠神功庶垂後代不獲稱慶闕庭無任踴躍屏營之至大中中黨項久未平議遣大臣鎮撫以白敏中充招討使用裴度故事擇廷臣為將佐敏中軍寧州史元破黨項九千餘帳于三交谷黨項平牧字牧之佑之孫為殿中侍御史內供奉歷黃池睦三州刺史入為司勳員外郎常兼史職改吏部乞為湖州刺史以考功郎知制誥遷中書舍人卒史館王相公進和詩表錢珝臣聞在心為志發言為詩志通而若啓源流詩作而自合律呂伏惟陛下道惟恭默稟在文思永圖欲漸於無為睿覽且明於多暇因臨丹壑遂躡金繩喜物象之澄清假咏歌而怡曠聲傳天籟韻合霜鐘篇殊黃竹之名辭掩白雲之美臣等逢時竊位敢並韋平應詔屬詞文非顔謝徒偶昭融之運獲聞雅正之音傾聽不知愧延陵之季子試吹必濫比南郭之先生但思忝列輔臣安敢首違聖旨輒同擊壤仰荷貫珠誠懷鄭衛之慚但感宮商之説星辰自轉難參旭日之光􅀢鼓空鳴莫續春雷之響珝起之曽孫徽之孫字瑞文善文詞宰相王摶薦知制誥進中書舍人摶得罪珝貶撫州司馬有舟中集二十卷謝賜衣表楊億解衣之賜猥及於下臣挾纊之仁更均于列校光生郡邸喜動轅門伏以皇帝陛下誕膺元符恭臨大寶惠務先於逮下志惟在於愛人鳥獸氄毛俯及嚴凝之候衣裳在笥爰推錫豫之恩在涣汗之所霑雖容光而必照如臣者任叨符竹地僻甌吳奉漢昭之六條方深祗畏分齊官之三服忽荷頒宣纂組極於纎華純綿加於麗密璽書下降切窺雲漢之文驛騎來臨更重皇華之命但曳婁而增惕實被服以難勝矧于戎行亦膺天寵干城雖久皆無汗馬之勞守土何功獨懼濡鵜之刺仰瞻宸極惟誓糜捐駕幸河北起居表楊億毳幕稽誅鑾輿順動羽衛方離於象魏天威已震於龍荒慰編氓徯后之心增壯士平戎之氣臣聞涿鹿之野軒皇所以親征單于之臺漢帝因之耀武用殱夷於凶醜遂底定於邊陲五材並陳蓋去兵之未可六龍時邁因犯順以必誅矧朔漠妖氛腥膻雜類敢因膠折之候輒為鳥舉之謀固已命將出師擒俘獻馘雖奪名王之帳未焚老上之庭是用親御戎車躬行天討勞軍細栁之壁巡狩常山之陽師人多寒感恩而皆同挾纊胸奴未滅受命而孰不忘家行當肅靜邊垣削平夷落梟冒頓之首收督亢之圖使遼陽八州之民得聞聲教榆關千里之地盡入提封蛇豕之穴悉降干戈之事永戢然後登臨瀚海刻石以銘功陟降云亭泥金而典禮逺追八九之迹永垂億萬之年臣忝守方州莫參法從空勵請纓之志慙無扈蹕之勞惟聆三捷之音逺同百獸之舞楊億字大年建州浦城人真宗以咸平二年十二月幸澶州是時億出守處州黃州謝上表王禹稱乍離近侍猶忝専城循省尤違彌深感泣伏以黃州地連雲夢城倚大江唐時版籍二萬家稅錢三萬貫今人戶不滿一萬稅錢止及六千雖久樂升平尚未臻富庶永言養活亦藉循良如臣庸愚曷副憂寄謹當勤求人瘼遵奉詔條窒塞嚚訟之民束縛僉猾之吏敢言課最庶免曠遺況當求理之朝必為無言之政伏念臣叨司帝誥又歷周星既不曽上殿求見天顔又不曽拜章論列時事入直則閉閣待制退朝則杜門讀書雖每日起居實經年抱疾不敢求假恐煩醫官自後忝與史臣同修實録晝夜不捨寢食殆忘已盡建隆四年見成一十七卷雖然未經進御自謂小有可觀忽坐流言不容絶筆夫讒謗之口聖賢難逃周公為鴟梟之詩仲尼有桓魋之歎蓋行髙于人則人所忌名出于衆則衆所排自古及今鮮不如此伏望皇帝陛下雷霆霽怒日月回光鑒曽參之殺人稍寬投杼察顏回之盜飯或出如簧未令君子之道消惟賴聖人之在上況臣孤貧無援文雅修身不省附離權臣祇是遭逢先帝但以心無茍合性昧隨時出一言不愧於神明議一事必歸於正直愠于羣小誠有謗詞謀及卿士豈無公論以至兩朝掌誥四任詞臣紫垣最忝於舊人白首不離於郎署以微臣之行已遇陛下之至公久當辨明未敢伸理今則上國千里長淮一隅雖云守土之榮未免謫居之歎霜摧風敗芝蘭之性終香日逺天髙葵藿之心未死仰望旒扆不勝涕洟禹稱字元之濟州巨野人詞學敏贍遇事敢言為文多涉規諷不為流俗所容太宗時為左司諫知制誥妖尼道安誣訟徐鉉當反坐詔勿治禹稱疏論其罪貶商州團練副使召為禮部員外郎再知制誥孝章皇后崩遷梓宮於故公主第羣臣不成服禹稱言后嘗母儀天下當用舊禮罷為工部郎中知滁州真宗即位召還復知制誥預修太祖實録宰相張齊賢李沆不協意禹稱議論輕重其間出知黃州嘗作三黜賦以見志會境內妖異日官言守土者當其咎上惜之命徙蘄州至郡未踰月卒進兩制三館牡丹詩歌表晏殊臣準傳宣劄子奉聖旨令兩制三館賦後苑諸殿亭牡丹歌詩者化合天人祥開卉木協風靈雨散為膏壤之滋共蒂并柯布在密青之囿畫品難形於卓異瑞圖不盡於芳妍乃詔儒臣各摛華藻匪太平之特盛豈榮遇之及兹昔者虞舜膺期有臯陶之賡載周宣繼業聞吉甫之誦章蓋默相以謨猷不専工於詞翰逮於漢室尤好藝文别館離宮多命從臣之制作倡優鄭衛已無前古之針規中葉以還其風未泯永平神雀之頌孝明稱美者五人正元重九之篇德宗考第於三等並垂編簡式著熙隆洪惟聖運之會昌可繼重華之輝耀然于衆製未復前修思諷諭者隱其誠而靡宣局聲律者艷其言而罕實不足以上禆睿覽下達民情效明良喜起之音續雅頌清微之範姑用登髙而能賦庶幾博奕之猶賢罔協精求豈任多愧臣首當庸濫實玷恩華興寤以思靦惶無極其兩制章得象等三館康孝基等歌詩一百四十首謹隨狀進以聞論衡云永平中神雀羣集詔上神雀頌百官上頌文比瓦石惟班固賈逵傅毅楊終侯諷五頌金玉孝明覽焉貞元四年九月詔羣臣晏曲江上為詩羣臣皆和帝自第之以劉太真李紓為上鮑防于邵次之張濛為下與擇者四十一人惟李泌李晟馬燧無所差次晏公事具續編歐公集中杭州蒙恩奬諭謝表張詠臣某言今月十五日進奏院遞到詔書一道為本州百姓滕超等舉留臣蒙恩特賜奬諭者臣叨任藩宣曽無政績忽因民欲俯降天書光寵異常惶駭失據中謝臣聞舜稱善人即不仁者逺漢求良吏即守道者前所以極治體之大中致生民於康樂也恭惟皇帝陛下遵漢之道行舜之心興一事未嘗不恭儉為先命一官未嘗不惠愛為寄故得朝風寬簡世態淳和史官但紀其時雍野老不知於帝力臣叨塵有位獲預頒條雖志在推忠莫著分憂之效而心期濟衆未知為政之方徒以浙右近年民間小歉既蒙明敕與蠲之於賦租復降異恩又賑之以口粟此皆皇猷所被民事重蘇靜言所因於臣何有顧惟下俚不識大端譽臣之長掩君之惠敢于雙闕留舉微臣蓋遇皇帝陛下道在包荒恩從奬善既不責民之僣冒亦不究臣之曠遺便枉璽書曲形慰勞人百皆喜臣獨未遑且以江舛諸州杭為巨鎮臣之到任已踰二年未能使民絶忿爭未能使吏知廉恥蒿萊之有所不盡闢獄訟之有所未盡空自謂孤奉舜稱略無善行謬榮漢選不見良能是以臣受寵載驚靦顔增愧也得不更思體國益用竭誠求古人化俗之方副明主愛民之旨望禆萬一少報生成詠字復之濮之鄄城人咸平二年以工部侍郎知杭州事嵗將滿杭人詣闕請留有詔褒美升州又謝傳宣撫問表張詠臣某言三月日入內內侍髙品趙履信到傳宣伏蒙聖慈重疊撫問臣者國有常典郡實分符何守吏之瑣材勞聖君之重顧逺傳中旨下慰殘軀恩既有加喜亦難盡中謝竊念臣幼而嗜學家本無書閲市尋師久嘗涉歷䇿名委質始遇遭逢自謂不蠶而衣不耕而食徒憑官勢坐庇宗親故檢身每切於勵精承命不辭於艱險以至懲姦析滯廢寢忘餐靜辦公家一欲酬君之寵祿緝綏黎庶一欲答民之恭承是致過冒寒溫有乖調護盛年抱疾向老便衰一昨西蜀替歸中樞𨽻職信班行之絶迹覺聖眷之異倫其如癖氣傍攻少納大官之膳頭瘡下瀝有慙清蹕之塵所以臣喜偶昌期而悲逢薄祜也遂陳丹悃求蒞偏州感動皇情俯從臣願付金陵之重地委江介之諸軍無廢攝生僅同卧治未期報政忽復遷官信使才回中貴又至瘡痍之末既沐軫憂飲食之間亦令順適下安孤迹傍駭羣情臣竊覽遺編遐觀往哲有才大而君不用忠盡而君不知者多矣若臣寒素起家清朝見任功末著而賞厚誠未立而信深者幸也蓋遇皇帝陛下以至聖之能守可大之業明以御下則邪正畢見其心仁以安人則高卑各遂其性是以臣粗推愚欵盛荷殊知豈不使四海之中九流之內壯夫激節列位快心有以頌陛下禮士之風逺逾列聖賞微臣飭身之末無愧前賢臣之叨塵自難言喻但期強飯一冀分憂庶敦有卒之誠少報不名之德景德三年公自蜀召還掌三班院兼判登聞檢院瘍生於腦不能巾櫛乞郡知升州大中祥符元年東封恩轉尚書左丞三年春秩滿遷工部尚書再任所謂未期報政忽復遷官者也賀南郊大赦表宋祁帝儀訖饗朝涣推慈飛驛疾傳庶邦叢慶竊以天郊之重國制有常凡萬乘躬行必三嵗間往不煩不怠由列聖而持循以妥以虔合諸神而對越睿圖纍盛縟典勤修恭惟陛下纂大合華執中布度抵金璧之美珍率儉示人收霜電之嚴光措刑於下克勵明德格於皇穹交薰太和冒我羣品顧懷時憶瑞應日來亟修上儀若祇舊典戒期百執領詔九州曳雲鳳之徜徉服翠虯之泮奐殊庭一獻諸祜遍躋遂自陽靈之宫往會天元之旦羽旄四合垓陛參登上璧左琮之華合袪而信祝祖蕝宗題之次更侑而迪嘗拜嘉胙於席垂列欽柴於雲表靈心合答熙典備成然後邃坐中天之闈普肆隨風之澤改頒大號崇冠初元昭神之祥祈命維永賞功赦罪責己逮瘝咸與維新牖民衷而遷善聿懷多福道帝祉於綿區盛際有光彛倫咸賴臣嚮官舊吏殫見往朝或不愛牲玉為恭殊非明薦或所過租賦為復蓋出重勞語昔罕全訂今絶擬所恨清塵在望自苦周南之留紫槖仍持不與甘泉之從第班恩諭均浹歡悰祁字子京安州安陸人與兄庠皆以文學顯而祁尤能文善議論然清約莊重不及庠論者以祁不至公輔亦以此云卒諡景文東軒華録云宋子京知成都府帶唐書於本任刋修每宴罷盥潄畢開寢門垂簾然二椽燭媵婢夾侍和墨伸紙逺近觀者皆知尚書修唐書矣望之若神仙焉多內寵後庭曳羅綺者甚衆嘗宴於錦江偶微寒命取半臂諸婢各送一枚凡十餘枚子京視之茫然恐有厚薄之嫌竟不敢服忍冷而歸謝直集賢院表夏竦北門禁省給青簡以試言東觀直廬降紫泥而命職莫逭候人之刺彌彰遇主之榮竊以承明設待詔之官實漢朝之芳潤麗正啓修書之院乃唐氏之英華濬圖書之淵敞龍鳳之宇自非弓裘繼世章句名家通授羲畀姒之靈篇嫻書笏珥彤之故事則何以繼成康之美頌考宣武之懿文陪法從於甘泉奉宸遊於屬玉況當聖日允屬簡求如臣者學不傳經文非近史青青子佩雖見刺於勞心翹翹錯薪亦濫期於刈楚筮仕勝衣之嵗薦名象日之畿方博帶以觀光遽墨衰而沿牒尋遇國家誕敷尺詔增廣六科方棲枳以徒勞遂上封而自薦始較文於鼇苑旋試可於鼎司亟趍文石之墀遂忝延英之問擊轅度曲敢望於九成縈帶分墉俄登於百雉升象河之屬吏佐分虎之方州爰受代於瓜時遂歸朝於幄坐典陳陳之粟閲山委之丘區從九九之車總絲棼之案牘暨還衡睢壤舍爵太宮既諧引籍於金閨將佐于藩於熊軾又慮沈迷簿領廢墮簡編負公朝振舉之科辜聖主詳延之意遂殺青而奏技果出綍以推恩禁林俾試於雕蟲書殿遽令於抱槧閲上帝之册府目眩星辰登道家之蓬山足踐雲氣奉長者之餘論與先生而並行分直石渠地接嚴更之守縱觀金匱門連著作之廷載惟螻蟻之軀莫報乾坤之賜恭惟皇帝陛下事寢廟以至孝奉靈祗而克誠流鴻藻於絶垠鑠景炎於往號以文明而行健體柔克以居髙縱觀唐漢之大猷備舉黃虞之故實睿藻和而六筒韻天章麗而五佐飛恢崇務廣於斯文奬擢不遺於小道遂使至孤之士獲塵非次之恩東陵遽擬於西山羔裘遂登於狐腋歌衛風而合雅鬻齊紫而雜良誠當潔節於素絲敢不盟心於白水益三思而出話彌九復以窮經永氷淵惕厲之心奉日月照臨之鑒庶逭素餐之謗仰酬明主之知愧懼所深兢惶不已竦以父死事録為丹陽主簿舉賢良方正擢光祿寺丞通判台州召直集賢院為國史編修官自慶厯聖德詩出而英公遂為罪魁不知英公亦何可盡沒韓公嘗令任福自懷逺城趨得勝寨據險置伏要其歸又移檄申約茍違節度雖有功必斬福竟為賊誘沒于好水川朝論歸咎於韓英公使人收散兵得韓檄於福衣帶間言罪不在韓故但奪一官噫英公此事不亦賢乎大率一時之是非患在不公千古之是非患在不博既不公又不博而豪傑含寃終不可雪矣謝知制誥表歐陽修伏以王者尊居萬民之上而誠意能與下通奄有四海之大而惠澤得以遍及者得非號令誥詔發揮而已哉然其為言也質而不文則不足以行逺而昭聖謀麗而不典則不足以示後而為世法居是職者古難其人乃以愚臣而當此選伏惟皇帝陛下茂仁聖之姿荷祖宗之業日謹一日曾未少懈而自羌戎負固邊鄙用師勤儉率先於聖躬焦勞常見於玉色雖有憂民之志而億姓未蘇雖有欲治之心而羣臣未副故每進一善則未嘗不欲勸天下之能每官一賢則未始不欲盡人材之用雖以爵祿而砥礪尚須訓誡之丁寧尤假能言以諭至意可稱是者不大用歟伏念臣雖以儒術進身本無辭藝可取徒值嚮者時文之弊偶能獨守好古之勤志欲去於雕華文反成於朴鄙本懼不適當世之用敢期自結聖主之知陛下奬之特深用之太過此臣所以懇讓三四至於辭窮而天意不回寵命難止尚慮頑然之未喻更加使者以臨門恩出非常理難屢瀆及俯而受命伏讀訓辭則有必能復古之言然後益知所責之重夙夜惶惑未知所措伏況文字之職厠于侍從之班在於周行是為超擢不徒揮翰以為效自當死節以報恩惟所使之期於盡瘁宋興且百年文章體裁猶仍五季餘習鎪刻駢偶淟涊弗振栁開穆修蘇舜欽志欲變古而力弗逮自歐公出以古文倡而王介甫蘇子瞻曽子固起而和之宋文日趨於古歐公之詩力矯楊劉西崑之弊専重氣格不免失於率易而四六一體實自創為一家至二蘇而縱橫曲折盡四六之變然皆本之歐公慶厯三年公知諫院論事切直人視之如仇帝獨奬其敢言遂知制誥故事必試而後命帝知公詔特除之謝復龍圖閣直學士表歐陽修恩還舊職事雪前誣感極心驚涕隨言出臣伏見前世材賢之士身結主知勛德之臣功施王室然尚或一遭謗毁欲辨亡由少忤要權其禍不測顧如臣者何足道哉臣材不逮於中人功亡益於當世用之未見有效去之亡足可思矧罔極之讒交興而並進易危之迹何恃而不顛而聖心不忘恩意特至辨罔欺於曖昧沮仇嫉於衆多雖暫居譴謫之中而屢被升遷之渥今又特蒙甄録牽復寵名以臣之愚豈比前人而獨異推其所幸蓋由聖主之親逢謂宜如何可以論報再念臣稟生孤拙本乏藝能徒因學古之勤粗識事君之節茍臨危效命尚當不顧以奮身況為善亡傷何憚竭忠而報國誓期盡瘁少答髙明公以慶厯四年除龍圗閣直學士五年以孤甥張事落職知滁州八年徙知揚州皇祐元年移潁州是年復龍圖閣直學士所謂屢被升遷之渥也南京留守謝上表歐陽修守宮鑰之謹嚴敢忘夙夜布政條之纎悉上副憂勤寄任非堪兢營並集伏念臣賦材庸薄稟數奇屯毁譽交興兩嘗過實寵榮踰分動輒招尤念報效之未伸敢不竭忠而盡瘁因風波之可畏則思逺去以深藏逮此六年外更三守學偷安而杜口負素志以愧心朽質易衰已凋零於齒髮良時難得尚希慕於功名豈謂皇慈未捐舊物擢從支郡委以名都惟此别京舊當孔道簿領少勤於職事厨傳取悅於路人茍循俗吏之所為雖能免過非有古人之大節未足報君謝宣召入翰林表歐陽修使車入里君命在門閭巷驚傳豈識朝廷之故事縉紳竦歎以為儒者之至榮在臣之愚何以堪此竊以文章之任自古非輕待遇寵榮至有私人之目詢謀獻納因加內相之名恩既異於常倫人愈難於稱職伏念臣器非宏逺識匪該明學不通古今之宜材不適方圓之用久叨塵於侍從曾莫著於勞能而自出守外藩近遭家禍茍存餘喘復齒周行風波流落者十年天日再瞻於雙闕進退之際已蕭颯於霜毛慰勞有加賜憫憐於玉色形神若此志意可知身已分於早衰心敢萌於希進加之羇危之迹仇嫉交攻進退動繫於羣言議論多煩於睿聽雖覆載之造每賜保全而孤蹇偷安常思引去伏蒙皇帝陛下俯憐舊物曲軫宸慈因內署之闕員俾備官而承乏臣敢不勉尋舊學益勵前修感遺簪未棄之仁竭駑馬已疲之力庶伸薄效少答鴻恩公以皇祐四年丁母夫人憂五年歸葬吉州正和元年赴闕是年詔公修唐書遂有此擢乞罷政事表歐陽修臣聞士之行已所重者始終之不渝臣之事君所難者進退而合理茍亡大過善退其身昔之為臣全此者少臣頃侍先帝屢陳斯言今之懇誠蓋迫於此伏念臣識不足以通今古材不足以語經綸達逢盛際之休明早自諸生而拔擢方其與儒學文章之選居言語侍從之流每蒙過奬於羣公常愧虛名之浮實既晚叨於重任益可謂於得時何嘗敢傷一士之賢豈不樂得天下之譽而動皆臣忌毁必臣歸人之愛憎不應遽異臣之本末亦豈頓殊蓋以處非所宜用過其量惟是要權之地不勝指目之多周防所以履危而簡疏自任委曲所以從衆而拙直難移宜其舉足則蹈禍之機以身為斂怨之府復盤桓而不去遂謗議以交興讒説震驚輿情共憤皇明洞照聖斷不疑孤臣獲雪於至寃四海共欣於新政至於賴天地保全之力脫風波險陷之危使臣散髮林丘幅巾衡巷以此沒地猶為幸民況乎擁蓋垂襜其榮可喜撫民求瘼所寄非輕茍可效於勤勞亦寧分於內外伏惟皇帝陛下曲回天造俯察愚衷許臣解劇繁處之間僻物還其分庶獲遂於安全心匪亡知豈敢忘於報效治平四年正月神宗初即位公轉尚書左丞是年有蔣之奇之誣公力求去亳州謝上表歐陽修二政非才雖獲奉身而退分符善地猶懷竊祿之慙祗荷寵靈惟知戰懼伏念臣章句腐儒之學也豈足經邦斗筲小器之量也寧堪大用而叨塵二府首尾八年荷三朝之誤知罄一心而盡瘁若乃樞機宜慎而見事輒言陷穽當前而橫身不避竊尋前載未有能全怨出仇家搆為死禍造謗於下者初若含沙之射影但期隂以中人宣言於廷者遂肆鳴梟之惡音孰不聞而掩耳賴聖人之在上廓日月之至明悉究罔誣遂投讒賊再念臣性實甚愚而疏於接物事多輕信而待以至誠如彼匪人失於泛愛平居握手惟期道義之交延譽當朝常丐齒牙之論而未乾薦禰之墨已彎射羿之弓知士其難世必以臣為戒常情共惡人將不食其餘而臣與遊既昧於擇賢在滿不思於將覆自貽禍釁幾至顛躋上煩睿聖之保全得完名節於終始洎懇辭於重任尤深惻於皇慈雖避寵辭隆僅能去位而清資顯秩愈更叨榮莫逃徼幸之譏實負心顔之靦斯蓋伏遇皇帝陛下乾坤大度堯舜至仁察臣自取於怨仇本由孤直憫臣力難於勉強蓋迫衰殘既獲免於非辜仍曲從於私欲遂同萬物俾無失所之嗟未盡餘生敢忘必報之效帝將追崇濮王公引喪服記以為為人後者為其父母降服三年為期而不沒父母之名以見服可降而名不可沒也若本生之親改稱皇伯歷考前世皆無典據進封大國則禮無加爵之道於是御史等詆公爭論不已皆被逐惟蔣之奇與公合公薦為御史衆目為姦邪之奇患之公婦弟薛宗孺有憾於公誣公以帷薄事連其長子婦吳御史中丞彭思永以語之奇之奇即劾公神宗即位詔詰所從來之奇言得之思永思永力抵以為風聞上以其詞窮降思永知黃州之奇監道州酒手詔慰公公亦求退罷知亳州此表所指蓋謂之奇也事在治平四年亳州乞致仕第二表歐陽修臣近貢封章乞還官政伏奉詔答未賜允俞退自省循奚勝殞越臣聞神功不宰而萬物得以曲成者惟各從其欲天鑒孔昭而一言可以感動者在能致其誠敢傾虔至之心再黷髙明之聽伏念臣本以一介之賤叨塵二府之聫知直道以事君每師心而自信然而既乏捐軀之效又亡先覺之明用之已過其分而曽不自量毁者不堪其辱而莫知引去幸賴乾坤之再造得逃陷阱之危機仍許避於要權俾退安於晚節今乃苦於衰病莫自支持顧難冒於寵榮始欲收於骸骨敢期聖念過軫天慈謂雖迫於桑榆未忍棄於草莽竊以古今之制沿襲不同蓋由兩漢而來雖處三公之貴每上還於印綬多自駕於車轅朝去朝廷暮歸田里一辭髙爵遂列編民豈如至治之朝深篤愛賢之意每示隆恩之典以勸知止之人故雖有還政之名而仍享終身之祿固已不類昔時之士亡殊居位之榮然則在臣素心雖竊退休之志迹臣所乞尚虞僥幸之譏伏望皇帝陛下惻以深仁矜其至懇俾解方州之任遂歸環堵之居固將優遊垂盡之年涵泳太平之樂惟辛勤白首迄無一善之稱孤負明時莫報三朝之德此為慚恨何可勝陳謝賜漢書表歐陽修俯躬承命拭目生輝竊以右文興化乃致治之所先著録藏書須太平而大備惟漢室上繼三代之統而班史自成一家之書文或舛訛蓋其傳之已久詔加刋定俾後學之亡疑一新方册之文增煥祕書之府而奏篇之始方經衡石之程賜本之榮惟及鈞樞之近敢期孤外特與恩頒此蓋伏遇皇帝陛下曲軫睿慈俯矜舊物謂其嘗與臣鄰之列不忍遽遺憐其自喜文字之間俾之娛老然臣兩目昏眊雖嗟執卷之已艱什襲珍藏但誓傳家而永寶熙寧二年公知青州內侍王延慶便道傳宣撫問仍賜香藥一銀合遞賜新校定前漢書以公嘗預刋定也謝擅止散青苗錢放罪表歐陽修有罪必誅是為彛典原情以恕特出深仁聞命驚慙省躬涕泗伏念臣以一介之微賤荷三聖之奬知寵祿既豐初無報效筋骸已憊尚此遲徊曲蒙大度之并容誤委一方之寄任職當撫俗責在分憂方兹旰昃之勞心豈敢因循而避事昨遇國家新建官司而主計大商財利以均通分命出使之車交馳於郡縣悉發舊藏之鏹取息於農氓而臣方久苦於昏衰初莫詳其利害既已大喧於物議始知不便於人情亦嘗略陳衆弊之三冀補萬分之一屬再當於班給顧已逼於會期雖具奏陳乃先擅止據兹専輒合被譴呵豈謂伏蒙皇帝陛下深軫睿慈俯矜朴拙免從吏議特貸刑章夫何草木之微曲被乾坤之施臣敢不益思祗畏更勵操修戒小人之遂非希君子之改過冀圖薄效少答鴻私初王安石未知名友人曽鞏攜其文以示公公為延譽又嘗薦為諌官已而知其須祿養言於朝用為羣牧判官及守青州以請止青苗錢不合力求致仕馮京請留之安石曰修附麗韓琦如此人在一郡則壞一郡在朝廷則壞朝廷留之安用熙寧四年以太子少師致仕按安石不足言公此表亦甚於唾罵矣謝致仕表歐陽修愚誠懇至曲軫於皇慈寵命優殊特加於常品本期得謝更此叨榮中謝伏念臣猥以庸近之材早遘休明之運不通之學既泥古以難施無用之文復虛言而少實是以三朝被遇四紀服勞蒙德重於丘山論報亡於毫髮而年齡晚暮疾病尫殘輒希知止於前人不待及期而後請自陳悃愊屢至黷煩既久歷於嵗時始曲蒙於開可仍超加於異數非止賜於殘骸道愧師儒乃忝春官之峻秩身居畎畝而兼書殿之清名至於頭垂兩鬢之霜毛腰束九環之金帶雖異負薪之里何殊衣錦之歸使閭巷咨嗟共識聖君之念舊縉紳感悅皆希後福之有終豈惟愚臣獨受大賜此蓋伏遇皇帝陛下無私覆物博愛推仁以其夙幸遭逢密契風雲之感會曽經服御不忘簪履之賤微致此便蕃萃於衰朽雖伏櫪之馬悲鳴難戀於君軒而曳尾之龜涵養末離於靈沼餘生易畢鴻造難酬東坡見此表至伏櫪之馬一聨大以為妙云古人致仕表未有能到此者元厚之致仕表云蹌蹌退舞敢忘舜帝之笙鏞翯翯歸飛亦在文王之靈沼又表云冥鴻雖逺正依天宇之髙華微藿雖傾尚遡日華之明潤皆本歐公語謝加學士表劉敞常人之情得所求而喜智者之慮過其任而憂今邊備雖嚴帥責差易學者雖衆儒選實難豈有貪就應聲之求忽忘非分之任怔忪失據欣懼兼懷固欲辭榮末獲承命伏念臣猥以薄技起於諸生內之無子産潤色之才外之無山甫將明之用久典訓誥薦臨藩垣七年於兹微效不立猶以陪外廷之末聞長者之風間蒙分章平議臣之奏時引大體正宗廟之儀茍圖納忠非敢忤物然而讒人飾詞以巧詆法吏挾怨以中傷當是之時幾無以免聖心先覺公議尚存浸潤之譖不行震驚之衆為止風波可畏天幸實多內私自憐懼久得罪輒丐千里之守庶警一麾之行不謂皇帝陛下生成曲全覆露無已進預金華之講增重儒林之光委以西州適其素願望非所及幸不可涯夫匹夫一飯之恩庸士然諾之信猶能捐生出死成功立名況臣連數十城之封兼四千石之重於以宣明威信撫養細民盡其愚忠庶光闕以此圖報敢為虛言敞字原甫嘉祐中以議論忤衆求外拜翰林侍讀學士知永興軍賀熙寧十年南郊禮畢大赦表曾鞏人之所歸者莫如德天之所享者在於誠其惟聖王克有全美伏惟皇帝陛下聰明稽古承繼祖宗慈惠愛人撫臨邦國有遍覆并容之大度有防微慎獨之小心不從遊畋不近聲色無紛華盛麗之好無便僻側媚之私嵗時吉蠲以承七廟左右順適以奉兩宮其功施於人效見於事則宅仁由義縉紳之徒成材於學校超距踏鞠熊羆之旅養勇於營屯甌窶汙邪之收充於倉廩關石和鈞之利阜於市㕓家有樂豫之聲人無愁怨之色協氣所召休應自殊鈎陳太微星緯咸若崑崙渤澥波濤不驚近則金石之音鳥獸欣躍逺則干羽之舞蠻夷駿奔象齒旅於闕庭龍媒納於間廏是謂六府三事皆可以歌四海九州罔不率俾蓋巍巍而特起非瑣瑣之能窺前世議泰山之封謀梁父之禪者度崇比大疇克登兹陛下抑而不圖謙以自牧以謂先后創業垂統其功莫得而名上帝隤祉發祥其德無可以稱思所以報一本於心故寅畏嚴恭積之有素而齋明薰祓進而益虔在於物者不取其煩盡諸已者必求其實是以蕭光之烈奏於宗祊柴燎之蒸焜於郊兆幽隱昭答神靈顧懷無疆惟休方寖昌於萬世不敢専享故敷錫於羣元稽參典彛定著赦令弛張從理同異稱情蠲罪眚而棄瑕疵録勞能而縱逋負顯晦咸暨洪纎不遺萬國之歡既交於沖漠一人之慶遂及於跂蠕孚於上下之間極乎帝王之盛臣被學最舊蒙恩寖深莫侍甘泉之祠獨歎周南之滯第從臣之嘉頌未效薄材望屬車之清塵但馳逺思昌黎上尊號表云析木天街星宿清潤北嶽醫閭鬼神受職此篇警語分明從彼脫胎乃知摹倣之功古大家亦不免百寮賀復熙河路表王安石奮張天兵開斥王土旌旃所指燕及氐羌樓櫓相望誕彌河隴中賀竊以三年鬼方之伐髙宗所以濟時六月玁狁之征宣王所以復古政由人舉道與世升伏惟皇帝陛下溫恭而文睿知以武講周唐之百度拔方虎於一言我陵我阿既飾鷹揚之旅實墉實壑遂平鳥竄之戎用夏變夷以今凖古是基新命厥邁往圖臣等均被明恩具膺榮祿接千嵗之統適遭會於斯時上萬年之觴敢愆忘於故事熙河之役本王韶鑿空開邊安石違衆議用之既奏功帝以安石主議解所服玉帶賜之韶進樞密副使然熙河雖名一路實無租入軍食仰給他道韶未幾若病狂狀既病疽洞見五臟蓋多殺報云曲洧舊聞云元祐二年令穆衍相度措置熙河蘭會路經制財用司事所取到元豐中最近年分五州軍實費三百六十八萬三千四百八十二貫今隨事相度裁減一百八十九萬七千二百餘貫用兵與結好其利害相懸如此除雱中允崇政殿説書謝表王安石恩驟加於私室多所超踰事或纍於公朝誠難昧冒仰煩睿訓曲喻至懷永惟眷奬之殊實重兢慙之至中謝伏念臣首叨召節得侍詞林隨被贊書使陪經幄稍更嵗月莫補涓埃竊觀上智之日躋內訟淺聞而知困況如賤息厥有童心尚迷鑽仰之方豈稱招延之禮恕已量主非敢以私而自嫌為官擇人顧雖成命而宜改輒布可辭之義上干難犯之威伏蒙皇帝陛下屈體優容垂情寵答謂大人照臨之道廣當養以蒙意小夫誦説之智専遽忘其賤褒稱備厚訓飭加嚴揣實未安寄顏有恧重念自古君臣之相與未有如臣父子之所遭蓋當用儒之時尤難講藝之職典謨方御實參備於討論誥誓未終已繼叨於奬擢獲世官於閭巷嗣家學於朝廷自非忘軀何以報國知人而官以哲既已誤於明揚委質而教之忠誓永肩於素守雱字元澤舉進士調旌德尉氣豪不能作小官乃與父謀曰執政子雖不可與事而經筵可處安石欲上知而自用乃以雱所作䇿及注道德經鏤板鬻於市遂達於上鄧綰曽布又薦之召見除太子中允崇政殿説書安石更張政事雱實導之呂惠卿既與安石有隙雱諷鄧綰彈惠卿與知華亭縣張若濟為姦利屬門下客呂嘉門練亨甫共議取鄧綰所列惠卿事雜他書下制獄安石不知也惠卿以狀聞又發安石私書曰無使上知者安石知其情咎雱雱憤恚疽發背死既死安石恍見其荷鐵枷如重囚乃捨宅為寺除平章事監修國史謝表王安石揚於大廷寵以髙位歸之翊戴之重諉之宰制之平聖心方慎於旁求小已知難於上稱中謝臣聞人君代天而理物人臣資父以事君然而君臣之大義有方非若父子之至恩無間須倡而後和則誠意每患於難通不入而後量則忠力或嫌於自獻惟成湯之聽伊尹與傅説之遇髙宗皆以疏逺而相求何其親厚之獨至蓋所趨非由於二道故所為若出於一身夫豈於越夷貉之異心是謂元首股肱之同體二臣既以此獲展事君之義兩君亦以此得成理物之功茍非其人孰與於此臣受材單寡逢運休明初涉獵於藝文稍扳緣於祿仕曩塵近侍積愧空餐悲遽隔於庭闈分長依於丘壠俄值纂承之慶繼叨徴召之榮責以論經尚少知於訓詁使之與政曾莫助於猷為矧以拙直而見知遂為姦回之所忌伏遇皇帝陛下納之以天地之量照之以日月之明數加奬勵之恩每辨讒誣之巧重遭卜相申勑備官終遜避之無繇更兢慙於非據伏惟皇帝陛下樂古訓之獲而忘其勢惡邪辭之害而斷以心勿二於任賢務本以除惡使萬邦有共惟帝臣之志萬姓有一哉王心之言則進無求名之私退有補過之善臣之願也天實臨之手詔令視事謝表王安石臣某言伏蒙宣示言者所奏輒具劄子乞博延公議改用賢人伏奉詔奬勵令視事如故者謗議升聞已賴舜聰之豁達懇誠上訴更煩周誥之丁寧竊以作威者主之權待察者臣之禮蓋雖蒙非常之厚遇亦將避可畏之煩言臣志尚非髙才能無異舊惟所學之迂闊難以趨時因欲自屏於寬間庶幾求志惟聖人之時不可失而君子之義必有行故當陛下即政之初輒慕昔賢際可之仕越從鄉郡歸直禁林或因勸講而賜留或以論思而請對愚忠偶合即知素願之獲申睿聖日躋更懼淺聞之難副重叨殊奬忝秉洪鈞所宜引分以固辭乃敢冒恩而輕就實恃明主知臣之有素故以孤身許國而無疑人習玩於久安吏循緣於積弊窽言不忌詖行無慚論善俗之方始欲徐徐而變革思愛日之義又將汲汲於施為以物役已則神志有交戰之勞以道徇衆則事功無必成之望恐上辜於眷屬誠竊幸於退藏猶貪仰附於末光亦冀粗成於薄效比聞獨斷謂合僉言但輸承命之忠遂觸招權之毁因請避衆賢之路庶以厭異議之人伏蒙皇帝陛下敦大兼容清明旁燭賜之神翰諭以至懷君臣之時嘗千載而難值天地之造豈一身之可酬敢不自忘形迹之嫌庶協神明之運荆公之受彈射身無完膚矣近王公宗沐有云余觀宋之創國其君厚於養士而體勢不立其臣安於豢養而志氣靡漫北有嵗幣民不勝困兵威不振朝夕恬熙大臣以遲鈍雍容為德度臺諫以議論攻擊為盡職後生習以為常於國事之孔急者視為無可奈何略不料理荆公特起得君惻然以軍事財賦為念務將整理彼遲鈍雍容者相視以為詫異老成一言後生黨與紛然起矣宜荆公之無成也靖康之禍自徽宗淫昏而移其責於公朱子尤深非之於全書中引其妻奢侈逐姑之過尤為過情此一段與從來論者大異雖未為至當然亦非孟浪語也以與荆公此表相發故存之於此除平章事昭文館大學士謝表王安石臣某言伏奉制命特授臣同中書門下平章事昭文館大學士兼譯經潤文使加食邑一千户食實封四百戶仍改賜推忠協謀同德佐理功臣尋具表陳免蒙降批答不允仍斷來章者承流宣化方虞失職之誅經體贊元更誤選賢之舉中謝臣竊惟人物之會通常寡實以君臣之遇合至難自非同聲氣之求孰能偕功名之享伏惟皇帝陛下天縱大聖人與成能乘百年久安之機飾千嵗積壞之蠱士誠服矣而持祿養交之習未殄民允懷矣而樂事勸功之志未純近或長厄而仁義之澤未流逺或虛憍而道德之威未立宜選於衆舉格於皇天之材使暨乃僚纘迪我髙后之事冀勝所任以濟斯時而臣蚤見知於隱約之中久獨立於傾搖之上勳庸弗效恩禮更加託備外藩俯鄰期嵗遂叨詔奬還冠宰司自視羇單所懷蹇淺方古耕築則有其陋為世聘求則無其賢然以投老之軀而遭難值之運茍貪嵗月趨就涓埃且上之施既光則下之報宜厚與之戮力仰承睿知之臨罔不同心俯賴忠良之協誓殫疏拙圖稱休明遷入東府賜御筵謝表王安石恩厚不資誠優賢之務稱頑冥無似欲報國而知難中謝臣等過以凡材並膺殊選久壅賢路上孤聖時伏惟皇帝陛下謀德在容求仁以恕謂大臣方宣勞於王室則上主當加恤其私家發使禁闈之中視圖魏闕之下取材置臬一皆斷於睿謀成事告功初不煩於宰旅重紆衡蓋周視庭除申以中人喻之良月使及日辰之吉即於堂寢之安輟車府之傍牽載其帑重移饔官之烹割侑以鼓歌歡更逮於邇臣寵已加於小已隂陽或謬未知燮理之方風雨其除徒賴帡幪之賜差弟安上傳旨令授敕命不須辭免謝表王安石江海衰殘雲天悠逺恩言狎至感涕交流中謝伏念臣積荷知憐初無報稱豈圖賤質上簡聖心數遣中人間因外使喻以眷懷之至意慰其憂苦之餘生惠焉既久而彌加告矣雖頑而未捨乃至召見同産馳賜十行之書使營私門就捐一路之寄訪逮纎悉矜及隱微追千載之遭逢殆無前比顧百身之糜殞安可仰酬惟當祗聖訓之鴻私豈敢固愚衷之小諒重念無傷於國體乃為不負於天慈欲以里居之安而尸官廩之厚固已犯明義而纍食功之食況復干隆名而長昧利之風至於詞窮雖兢慙於屢黷可以理奪終冀幸於矜從賀生皇子表王安石宮闈嗣慶寰海交欣凡逮戴天惟均擊壤中賀臣聞螽斯之言衆子是為王者之時華封之祝多男亦曰聖人之事恭惟皇帝陛下紹祖休顯憲天昭明致文武之憂勤成堯舜之仁孝宅師無競管簟之寢既安傳類有祥弓韣之祠屢應詒謀方永錫羡用光臣託備藩維叨承睿奬不顯亦世家實與於榮懷於萬斯年心敢忘於慶賴賀生皇子表王安石燕禖饗德方儲錫羡之祥羆夢生賢克協會昌之運與在照臨之廣敷同慶賴之深竊以思齊神罔時惆假樂民之攸塈天所保佑厥惟太姒之多男國之榮懷亦曰成王之衆子恭惟皇帝陛下令德光乎洛誦康功茂乎岐昌鴻休無疆景命有僕蓋芣苡之薄言采采衆皆先成則螽斯之宜爾振振宗強孰禦臣久叨眷遇適阻進趨親值本支百世之盛時敢忘夀考萬年之善祝賀南郊禮畢肆赦表王安石精意上昭神靈底豫茂恩旁暢夷夏接和中賀臣聞道以饗帝為難禮以配天為至有秩斯祜惟四表之歡心胡臭亶時匪九州之美味自古在昔若聖與仁厥遭昌辰乃覩熙事恭惟皇帝陛下邁種三德敷奏九功率籲奉璋之衆髦肇稱奠璧之新禮廟籩致孝郊血告幽誠既格於穹旻福遂均於品庶振憂矜寡原宥眚災第五玉以褒封善人是富發三錢而慶賜賤者不虛天其居歆人以鼓舞臣夙叨寵奬親值休成雖無與於駿奔實不勝於竊抃代王魯公乞致仕表王安石臣某言愚臣之在暮年禮當求去聖主之於舊物恩不忍捐顧在禮之可言敢緣恩而茍止中謝伏念臣起身疵賤逢世休嘉年除嵗遷遂塵於非望夙興夜寐常愧於無勞惟是寵榮殊非所欲矧知固陋豈敢為髙徒以嵗路之向窮不勝人言之甚衆爭前而冒寵則辱之在後者或多蓋衆以擅榮則患之及身也常酷是亦有傷於國體豈惟無補於臣身此臣所以迫切於歸誠而倣徨於受命也況陛下接三后之烈享百年之平勢盈則非易以持法久則當通其變此誠致慎於安危之際而責難於將相之時雖臣膂力之方剛亦宜知止豈此餘生之無幾尚可妨賢伏望天慈俯循人欲上以終愛人之德下以免纍國之誅則膂力既愆雖負捐軀之素志餘忠未訖猶知請祝於明時王德用超之子知軍中情偽善以恩撫下名聞四夷面黑頸以下白晳皆呼為黑王相公至和元年為樞密使封魯公求去至六七乃聽猶詔五日一朝會子孫一人扶掖卒諡武恭賜厯日謝表王安石臣伏以清臺課厯肇明一嵗之宜列郡仰成欽布四時之事窺文切抃拜賜為榮恭惟皇帝陛下躬包厯數政順璣衡齊日月之照臨體乾坤之闔闢考觀新度逺存堯象之明推步大端猶得夏時之正盡俯仰察觀之理槩裁成輔相之宜嵗事備存詔文偕下先天誕告間無杪忽之差率土逢占驗若節符之合臣敢不恭承睿旨順考時行贊聖神化育之功極天人和同之效奉而行政期不戾於隂陽推以治人庶克躋於富夀謝朱炎傳聖旨令視事表王安石使指遄臻訓詞俯逮敢圖衰疾尚誤眷存伏念臣曲荷搜揚久孤付屬有能必獻未嘗擇事而辭難亡力可陳乃始籲天而求佚然方焦思有為之日以此懷恩未報之身茍營燕安豈免慙悸伏蒙皇帝陛下人惟求舊義不忘遐乃因乘詔賦命之臣更喻推轂授方之意踦履亡用誠弗忍於棄捐朽株匪材尚奚勝於器使永惟奬勵徒誓糜捐乞退第三表王安石聖恩所及有隆天重地之施私義未安有深淵薄氷之懼竊惟成湯髙宗之世有若伊尹傅説之臣其道則格於帝而亡疑其政則加乎民而有變后惟時乂相亦有終逮乎中世之陵夷非復古人之髣佛忠或不足以取信而事事至於自明義或不足以勝姦而人人與之為敵以此乘權而久處孰能持祿以少安此臣之慮危於居寵之時而昧死有均勞之乞況於抱病浸以瘝官伏惟陛下道與日躋德侔乾覆哀一夫之失所樂萬物之皆昌矧夫眷遇之優既已勤劬之久宜蒙善貸使獲曲全賜其疲賤之身假以安間之地則敝車無用猶可具於勞薪棄席未忘或再施於華幄四六法海卷三
