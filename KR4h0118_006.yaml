body:
  text: 四六法海卷六明王志堅編上河東公啓李商隱商隱啓兩日前於張評事處伏覩手筆兼評事傳指意於樂籍中賜一人以備紉補某悼傷已來光隂未幾梧桐半死才有述哀靈光猶存且兼多病眷言息𦙍不暇提携或小於叔夜之男或幼於伯喈之女檢庾信荀娘之啓常有酸辛詠陶潛通子之詩每嗟漂泊所賴因依德宇馳驟府庭方思效命旌旄不敢載懷鄉土錦茵象榻石館金臺入則陪奉光塵出則揣摩鉛鈍兼之早歲志在𤣥門及到此都更敦夙契自安衰薄微得端倪至於南國妖姬叢臺妙妓雖有涉於篇什實不接於風流況張懿仙本自無雙曾來獨立既從上將又託英僚汲縣勒銘方依崔瑗漢庭曵履猶憶鄭崇寧復河裏飛星雲間墜月窺西家之宋玉恨東舍之王昌誠出恩私非所宜稱伏惟克從至願賜寢前言使國人盡保展禽酒肆不疑阮籍則恩優之理何以加焉干冒尊嚴伏用惶灼謹啓樊南集中以爵里稱惟安平汝南不可考其餘稱彭陽公者令狐楚也稱濮陽公者王茂元也稱滎陽公者鄭亞也稱河東公者柳仲郢也近品外録謂河東公為楚甚誤按商隱初從楚受其學楚卒時商隱為作遺表已而在茂元幕妻以女令狐氏以為負家恩絶之則商隱之婚于王在楚亡後眀矣商隱作祭外舅司徒公文云昔公愛女今愚病妻則商隱妻後茂元而殁又眀矣今此啓乃喪耦以後則正仲郢幕中事去楚不亦逺乎又篇中有臨卭巴西仲郢為劒南東川節度故有此語考楚生平未嘗仕蜀也聊為辨正于此獻河東公啓李商隱商隱啓伏奉手筆猥賜奏署某少而孱懦長則艱屯有志為文無資就學雖雜賦八首或庶於馬遷而讀書五車逺慙於惠子契濶湖嶺凄凉路岐罕遇心知多逢皮相昔魯人以仲尼為佞淮隂以韓信為怯聖哲且猶如此尋常安能免乎是以艮背却行氷心自處羅含蘭菊仲蔚蓬蒿見芳草則怨王孫之不歸撫髙松則歎大夫之虛位不可終否屬於髙明伏惟尚書春日同和秋霜共冽叔子則九代清德稚春則七葉素儒君子立言永為周禮正人得位長作歲星今者初涉將壇始敷賔席射江奧壤潼水名都俗擅繁華地多材雋指巴西則民皆譙秀訪臨卭則客有相如舉纎繳以下冥鴻執定鏡而求西子唯所指命便為丹青若某者又安可炫露短材叨塵記室鹽車欵段徒逢伯樂而鳴土鼓迂疏恐致文侯之卧承命知忝撫懷自驚終無喻蜀之能但誓依劉之願為栁圭謝京兆公啓李商隱某啓散兵馬使陳朗至伏奉榮示兼奉公牒伏䝉召署攝成都府參軍充安撫巡官者師襄鼓缶或近玩人和氏搜珉能無驚物跪受髙命莫知所裁某藏豹不堅雕龍未巧徒承庭訓遂厠人曹比衛家之一兒天懸鵬鷃望鄴中之七子風逸馬牛已忝决科敢思筮仕伏惟相公以仁義禮智信為基搆用溫良恭儉讓為藩籬堯時則業貫䕫龍殷代則道符尹說入秉文教出曜兵權揮神鋒而劒合隂陽述雅誥而筆開造化況天有井絡地稱坤維控三巴百濮之雄帶南詔西山之險人稱奧府帝謂殊藩固己廣集豪英用資參佐玳簪珠履緑水紅蓮成籍籍於淮山致憧憧於燕路若某者徒將慕藺何足望回又安敢拂其塵埃加以冠履伏思相公直以大人頃居班列獲奉恩私羅照乘於驪淵覬歸昌於鳯穴未見其可處之不疑曾不念木朽石頑雕鐫莫就榆暝豆重性分難移古人所以有以榮為憂受恩如敵斯言之作圭也有焉今月六日辰時輒奉辟書具聞辰省仰承嚴㫖便定行期而又內奮弟兄外誘交友傅翼類虎生角如麟事誠實於顯榮勢莫知其報效尚須旬日方拜旌旄唯當洗心為齊延頸以望持千尋之建木想像瓌姿周萬頃之澄波比量曠度戴恩揣已授集作投命依仁神之聽之百生如一謹啓圭仲郢之子京兆公者杜悰也商隱又有為河東公謝京兆公辟召男圭啓然則河東公豈令狐楚乎上尚書范陽公啓李商隱某啓仰䝉仁恩俯賜手筆將虛右席以召下材承命恐惶不知所措某幸承舊族早預儒林鄴下詞人夙䝉推與洛陽才子濫被交遊而時亨命屯道泰身否成名踰於一紀旅官過於十年恩舊凋零路岐悽愴薦禰衡之表空出人間嘲楊子之書僅盈天下去年逺從桂海來返玉京無文通半頃之田乏元亮數間之屋隘傭蝸舍危託燕巢春畹將遊則蕙蘭絶徑秋庭欲掃則霜露沾衣勉調天宮獲升甸壤歸惟却掃出則卑趨仰燕路以長懷望梁園而結慮尚書道光士範德冠民宗愷悌之化既流鎮靖之功方懋竊思上國投技東都及門唯交抵掌之談遂辱知心之契載惟浮泛頻陟光隂豈期咫尺之書終訪蓬蒿之宅感義增氣懷仁識歸便當焚遊趙之簦毁入秦之屩束書投筆仰副嘉招謁謝未閒下情無任感戀之至謹啓上崔相公啓李商隱某聞石苞羈賤早遇何曾魏武尊髙猥知徐晃其後咸成間氣訖立鴻勳簡册增輝樽彞動彩則道惟熙載皆資甄藻之時德邁賡歌必用搜羅之道是以皇綱克序茂範咸凝某荆氏凡材雕陵散質謬傳清白實守幽貞矍圃彎弓何能中鵠􅉌門用賦尋恥雕蟲常患荒蕪殊非挺拔依劉薦禰素乏梯航慕呂攀稽全無等級分甘終老莫有良期既而竊仰洪鈞來窺皎鏡墳壚下土敢望頒形甕盎頑姿寧希鑒貌豈謂不遺孤拙曲假生成拔於泥滓之中致在烟霄之上遂使龍門奮發不作窮鱗鶯谷翩翻終陪逸翰此則在三恩重吹萬功深空乘變律之機未得捐軀之兆豈可猶希鼓鑄更露情誠伏念良馬嘶風非甘伏皂饑鷹刷羽終恥棲籠誠知豢養之恩頗有飛翔之志而又專門有暇曾習政經門户無營因窺吏事既辨張湯之鼠深知子産之魚書劒倣徨年光倐忽徒思效用無以為資儻䝉再扇薰風仍宣厚澤庶使晏嬰精鑒獲脫於在途鬷蔑微班得升於收器才聞謦咳便是扶搖上宰相啓李商隱某聞日麗于天洪纎必及月離于畢枯槁皆蘇斯則推拔無私彰於大信茍關於宰匠咸仰以生成其或潤接西郊流金未已光承北陸豐蔀猶深則亦分作窮人甘為棄物歲華超越京洛風塵忽爾號咷固非阮籍泫然沾灑不為楊朱略忘靦冒之辜惟以哀矜為主伏念三餘簡墮六尺伶俜臨濟輝華昔懸陳榻洛陽羈旅今造膺門已驚於自葉流根敢望於裒多益寡但以謝家故墅事屬臨川陸氏先疇名遷好畤同氣雖均於昭泰連枝或纍於榮枯是以更就洪鈞來呈瑣質雖戴逵之弟志尚無聞而何準之兄恩輝已遍豈宜茍希河潤更望餘波投驥尾以容身執豚蹄而望歲然則迹同袁子質異山郎梓柱雲楣獨居蝸舍綺襦紈袴已卧牛衣若乃清旦問安長筵稱夀貂璫畢集少長俱來膏沐之餘則飛蓬作鬢銀簧之末則青草為袍莫不顧影苞羞填膺茹歎儻或王庭辨貴許厠九疑京縣坐曹令懸五色校於同列未越彞章則衛館孤遺常聞出涕山陽舊曲不獨傷心誓將居必在勤行惟鞭後潛知寄託所望於江州必效忠貞得酬於吏部無任惶懼之至上令狐相公啓溫庭筠某聞丘眀作傳必受宣尼王隱著書先依庾亮或情優國士或義重門人咸托光隂方成志業抑又聞棄茵微物尚軫晉君懷刷小姿每干齊相豈繫效珍之飾蓋牽求舊之情某邴第持囊嬰車執轡旁徴義故最厯星霜三千子之聲塵預聞詩禮十七年之鉛槧尚委泥沙敢言蠻國參軍才得荆州從事自頃潘床無鏡校府紹弓戴經稱女子十年留于外族嵇氏則男兒八歲保在故人藐是流離自然飄蕩呌非獨鶴欲近商陵嘯類斷猿況鄰巴峽光隂詎幾天道如何豈知蕞陋之姿獨隔休明之運今者野氏辭任宣武求才儻令孫盛緹油無慙素尚蔡雍編録獲偶貞期微回謦咳之榮便在陶鈞之列庭筠字飛卿彥博裔孫也少敏悟工為詞章與李商隱齊名號曰溫李恃其才敏多為鄰鋪假手又好譏毁時事朝士惡之廢弃終身或云宣宗好作小詞令狐綯假其修撰密進之誡令勿泄而遽言于人遂與絶上鹽鐵侍郎啓溫庭筠某聞珠履三千猶憐墜屨金叉十二不替遺簪茍興求舊之懷不顧窮奢之飾亦有河南撰刺徴彼通家虢略移書期於倒屣志亦求於義合理難俟於言筌某菅蒯凡姿邾滕陋族釋耕耘於下邑觀禮樂於中都然素勵顓䝉常耽比興未逢仁祖誰知風月之情因夢惠連或得池塘之句莫不𡨕搜刻骨默想勞神未嫌彭澤之車不歎萊蕪之甑其或嚴霜墜葉孤月離雲片席飄然方思獨往空亭悄爾不廢間吟强將麋鹿之情欲學鴛鴦之性遂使幽蘭九畹傷謡詠之情多丹桂一枝竟攀援之路斷豈直牛衣有淚蝸舍無煙此生而分作窮人他日而惟稱餓𨽻頃者萍蓬旅寄江海羈遊達姓字於李膺獻篇章於沈約特䝉俯開嚴重不陋幽遐至於逺泛仙舟髙張妓席識桓溫之酒味見羊祜之襟情既而哲匠司文至公當柄猶困龍門之浪不逢鶯谷之春今日俯及陶鎔將裁品物輒申丹慊更竊清音儻一顧之榮將回於咳唾則陸沉之質庶望於騫翔永言進退之途使決榮枯之分如翩翻賀燕巢幕何依觳觫齊牛釁鍾將逺茍難窺于數仞則永墜于重泉空持擁篲之情不識呌閽之路謝所知賚集賢墨啓溫庭筠某啓即日門幹至奉披榮示垂賚集賢墨一挺竹山竒製上蔡輕煙色掩緇帷香含漆簡雅復三臺故物貴重相傳五兩新膠乾輕入用猶怨於潛曠逺建業尫羸韋曜名方即求雞木傅𤣥佳致别染龜名恩加於蘭署郎官禮備於松櫺介婦汲妻衡弟所未窺觀廣記漢儀何嘗著列況又𤣥洲上苑青瑣西垣讐字猶新疑籖尚整帳中女史每襲清香架上仙人常持縹帙得於華近辱在庸虛豈知夜鶴頻驚殊慙志業秋蛇屢綰不稱精研唯憂􅂒物虛投蠟槃空設晉陵雖壤正握銅兵王詔徒深唯磨正硯捧受榮佩不任下情李義山嘗曰近得一聨句云逺比趙公三十六年宰輔未得偶句溫曰何不云近同郭令二十四考中書宣宗嘗賦詩上句有金步搖未能對求進士對之庭筠續以玉條脫宣宗賞之又藥名有白頭翁溫以蒼耳子為對投刑部趙郎中啓顧雲某啓某聞弱水渺瀰匪風輪而不濟丹丘懸邈微羽駕而何之苟非𤣥化之功寧造長生之境其有本無靈氣復異仙材徒勤九轉之功未識三清之路侍立於葛洪陂上願附龍鱗徘徊於緱氏山前思隨鶴馭敢傾丹赤盡寄箋毫扣德操之鼓鐘冀聞音響仰劉琨之山海庶覿髙深或覬憫憐少加披省某勾吳寒族鄒魯庸儒偶效殺青因思拾紫捨獨繭文竿之樂預橫經染翰之游一别楚山四凋秦葉進惟角觸退則羈棲望化羽之期烏頭詎白困龍門之險魚尾將頳近者輒以荒蕪上干裁鑒實慙小道不副至公或自朋游竊聆風㫖潘江陸海曲借品流繡段金聲仍加緣飾今則將臨筆陳漸逼掄材既乏先容惟憂㸃額絃哀柱促風徑葉危輒寫丹誠仰塵清鑒儻䝉特分餘潤微假末光朽枿生荑寒灰發焰才沾慰薦便是輝華酬恩豈止於捐軀效德願同於異類回眸顧印庶竊比龜靈四代五公請先于雀報雲字垂象池州人嘗與羅隱同謁髙駢雲為人雅重而隱性傲睨駢留雲而逺隱師度之亂退居霅州杜門著書後以修實録加虞部郎中辭宣武鄭尚書啓羅隱某聞鄭司農之東去絳紗感深吾道謝記室之西辭朱邸戀切所知雖定名之分則殊而懷德之心不異其有栖羸樂廄養病醫門海燕辭巢即摧萍影林烏繞樹忽軫蓬心又安得下棄席於詩人感崩波於行客某也風塵下物天地中材光逸門寒無因自進揚雄口吃徒欲解嘲屬者尚書置驛恩寬敦風志大孔文舉之于元禮自忝登門徐孺子之謁陳蕃俄䝉下榻淹延館宇荏苒春秋稻粱有異於他人觴豆時陪於上客那言此際遽愴離聲背重德於邱山揖紅塵於道路緬懷今日杳不勝情加以貢部傷心名場落羽獸因鬭困羊以多亡前瞻既倦於吹虀內顧徒悲於求劒昔也來慚賦雪謬稱梁苑之游今則去類乞師已抱秦庭之哭倚征輪而悵望指斷鞭以夷猶尚書倘或仙客壺中旁均日月山公啓裏别借篇題無令一葉先秋遂對滿堂垂泣捨此丹須九轉桃指千年天也如何時乎不再羅隱字昭諫錢塘人在科場恃才傲物尤為公卿所惡六舉不第時有羅尊師者勸其罷舉東歸霸國以求用遂歸錢塘時錢鏐方得兩浙使典軍中檄嘗言杭州羅城宜內向竒中至今吳越間言羅隱秀才能前知云投禮部鄭貟外啓羅隱某啓某前月十八日輒以所薦惡文上干嚴重尋嬰疾劣遂曠門牆伏以皎鏡無私雖容屢照醫門多病應倦施功忍隨翔鳥之姿更望不龜之術某滄州捨釣紫陌迷塵徒欲信書不能知命道薄而魚腮易曝計疏而鳬脛難加所以寧戚叩歌不惟長夜魏舒對策近至中年丹霄無獨上之期雙鬢有相輕之色而貟外芝田養秀桂苑摛華口裏雌黃旋成典故座中薤白早避風流敢因誘善之初仰冀噓枯之便儻一掬華隂之土聊拭蘇文則數升涇水之泥永依清濟謹啓謝江都鄭長官啓羅隱長官鏤筆才清探驪價重因循世態放蕩宦游劇談以雞肋況時偶對以馬曹當職而自黃塵北犯翠輦南巡張椽投簪雖離齊邸陶公染翰本慟晉朝於半郊半郭之中有一詠一觴之趣為謀甚逸所得何多芳草逺山才供掇拾晴陽媚景别受指撝登臨則光祿寒山悲歎則雍丘明月憑何徑隧達此津涯某海曲迷聲壽陵忘步蛇虛畫足鵠不中心將風霜委地之姿值兵革滔天之日正平刺滅屢窘輿臺叔夜燈殘頻逢鬼魅梁苑之舊遊永已鄴都之作者寂然豈謂長官獨好斯文仍留散地牙絃久絶秦缶增慚那言吾道陵遲猶見騷人風骨牽牛不暇希驥莫從輒敢效彼蠅頭騰於魚網保持所切已髙黃絹之名傳寫可知旋長烏孫之價謝屯田全郎中啓羅隱某啓某揣摩不至蹇剝無圖爰自畫虎貽譏掇蜩逞技轗軻於風塵之際流離於灰琯之間雖瀝膽隳肝竟將誰訴而煎皮熬髮終不自醫已甘與物沉浮隨波上下今月某日見某官伏知郎中玉壺委鑑金口開談驅雲于道士梁間校籍于真官筆下欲使餘杭美酒必醉蔡經崑嶠仙桃先霑曼倩承吉兆而心神駭越對嘉音而涕淚縱橫某散拙非才牽纒失計通衢十二惟弊黑貂故里三千但勞黃耳欲索身而莫可將問路而愈迷若非郎中暖律旁吹和風外扇擢之于枯荄之側致之于芳英之中則蝶舞鶯啼空緘永恨春來秋去便過此生謹啓劒門寄上路相公啓胡曾某啓某蓽户庸人荷衣賤子道慙墨妙業愧筆精效枚叟之文章雖憐七發感潘生之歲月已歎二毛失路腸回迷邦足刖蟻棲培塿蛙伏潢汙自笑柴愚誰憐參魯尚思逐鹿未分牽羊將趨渙汗之程詎學邯鄲之步但以材非逈出性乏孤標雖勤側管之窺終類正牆之視有心吐鳯無夢懷蛟不痊曹操之頭虛刺蘇秦之股誠宜世棄敢望時來方嗟碌碌之生忽忝戔戔之幸朽林委地永甘夫子之捐枯骨凝塵豈料昭王之市遍身德澤滿目恩輝詎止負嵩仍兼戴華既䝉蜀顧敢望秦留即遂面走鹿頭背馳鶉首如升青昊似入𤣥都不知劒閣之艱豈覺刀州之逺伏惟相公神資重器天縱偉才邦國金城朝廷玉燭文髙庾月詞峻謝山才見紫髯便居黃閣陶鈞百辟啓沃一人議平吳皓之時雖云推局報破秦堅之日不廢圍碁故能早執化權久司政柄今則暫辭龍闕來鎮龜城將軍之細栁雖新丞相之鹽梅仍舊不煩壯士自伏雄圖揚麾而氛祲晨銷按節而妖星夜落劉焉原野昔為纍卵之鄉杜宇山河今作覆盆之地曾實慙孤陋叨沐招延鄭驛將窮燕臺漸近那能倚馬妄竊攀龍仰天上之程途已親台席指人間之岐路尚感客星披霧非遙并塵在即路巖魏州冠氏人懿宗咸通初自屯田貟外郎入翰林為學士以兵部侍郎同中書門下平章事年三十六八歲進至尚書左僕射罷為劒南西川節度使徙荆南節度使貶新州刺使免官流儋州詔賜死籍其家巖為相通賄遺奢肆不法時謂其黨為牛頭阿旁又謂破其親吏邊咸家可佐軍興云唐詩紀事載髙駢鎮蜀曾有遺檄南蠻之事今按曾爵里無可考止有二啓見英華皆干謁諸侯作免奉使啓夏竦比膺使指往奉歡盟選授至艱道塗差近況多侑幣實濟空拳然念頃歲先人沒于行陳春初母氏始棄遺孤義不戴天難下單于之拜哀深陟屺忍聞禁佅之音車府露章槐庭泣血王姬等館接仇之禮既嫌曾子回車勝母之游遂輟荷兩宮之大庇戴三事之昌言退安四壁之貧如獲萬金之賜某官力持名教素奬孤寒屬商利于摘山闕言心于奏記何圖驛置先墜書筠俯哀蹈義之心不辱資忠之訓永惟佩服何但銘藏夏竦字子喬江州德安人父承皓太平興國初上平晉䇿補右侍𨽻大名府契丹內冦承皓力戰死之贈崇儀使録竦為潤州丹陽縣主簿所謂先人沒于行陳蓋指此按竦此啓孝思藹然然史稱竦丁母憂潛至京師依中人張懷德宰相王欽若為助起復知制誥翰林學士又何其先後矛盾也王公四六話云四六有伐山語伐材語伐材語者如已成之柱桷略加繩削而已伐山語者則搜山開荒自我取之伐材謂熟事也伐山謂生事也生事必對熟事熟事必對生事皆生則傷于奧澀皆熟則無工如夏英公免奉使啓頃歲先人云云不拜單于用鄭衆事而公羊謂夷樂曰禁佅此生事對熟事格也謝相府啓蘇洵朝廷之士進而不知休山林之士退而不知反二者交譏于世學者莫獲其中洵幼而讀書固有意干從官壯而不仕豈為異以矯人上之則有制策誘之于前下之則有進士驅之于後常以措意晚而自慙蓋人未之知而自衒以求用世未之信而有望于效官仰而就之良亦難矣以為欲求于無辱莫若退聽之自然有田一㕓足以為養行年五十復將何為不意貧賤之姓名偶自徹聞于朝野向承再命以就試固以大異其本心且不試而審觀其才則上之人猶未信其可用未信而有求子上則洵之意以為近于强人遂以再辭亦既獲命以匹夫之賤而必行其私意豈王命之寵而敢望其曲加昨承詔恩被以休寵退而自顧愧其無勞此蓋昭文相公左右元君舒慘百辟德澤所暢威刑所加不暘而熙不寒而栗顧惟無似或謂可收不忍棄之于庶人亦使與列于一命上以慰夫天下賢俊之望下以解其終身饑寒之憂仰惟此恩孰謂為報昔者孟子不願召見而孔子不辭小官大欲正其所由得之之名是以謹其所以取之之故蓋孟子不為矯孔子不為卑茍窮其心則各有說雖自知其不肖常願附其下風區區之心惟所裁擇嘉祐間公與二子軾轍至京翰林學士歐陽修上其書二十二篇韓琦見其書善之奏于朝召試舍人院辭疾不至遂除祕書省校書郎此啓在此時昭文相公者文潞公也歐公試筆云往時作四六者多用古人語及廣引故事以衒博學而不思述事不暢近時文章變體如蘇氏父子以四六述敘委曲精盡不減古人自學者變格為文逮今三十年始得斯人不惟遲久而後獲實恐此後未有能繼者爾謝知制誥啓王安石據非其稱慙甚於榮切以通㑹朝之籍於禁中出誥命之書於天下自昔必求乎良士方今尤謂之美官非夫能道先王之言及通當世之務文章足以潤色知術足以討論一有誤居必乖衆論某素出貧賤偶遭盛明讀書雖勤未免是古之纍更事雖久終無適時之才製作淹遲而不工思慮短淺而不敏有此一物自足窮於多士之時兼是四端豈宜辱於邇臣之列此蓋伏遇某官以忠純翼戴以寬大甄收謂其引分而無求儻或負能而有待因加奬借使得超踰蓋大公之賜所加唯至誠之報為稱敢不內盡致身之德庶以上同許國之心漁隱叢話云荆公詩草深留翠碧花逺沒黃鸝人只知翠碧黃鸝為精切不知是四色也又以武丘對文鷁殺青對生白苦吟對甘飲飛瓊對弄玉帶眼對琴心皆最精切賀韓魏公啓王安石伏審判府司徒侍中寵辭上宰歸榮故鄉兼兩鎮之節麾備三公之典䇿貴極富溢而無亢滿之纍名遂身退而有褒加之崇在於親瞻孰不慶羡伏惟某官受天間氣為世元龜誠節表於當時德望冠乎近代典司密命總攬中權毁譽幾至於萬端夷險常持於一意故四海以公之用捨一時為國之安危越執鴻樞遂躋元輔以人才未用為大恥以國本不建為深憂言衆人之所未嘗任大臣之所不敢及臻變故果有成功英宗以哀疚荒迷慈聖以謙冲退託內揆百官之衆外當萬事之微國無危疑人以靜一周勃霍光之於漢能定策而終以致疑姚崇宋璟之於唐善致理而未嘗遭變記在舊史號為元功未有獨運廟堂再安社稷弼亮三世敉寧四方崛然在諸公之先煥乎如今日之懿若夫進退之當於義出處之適其時以彼相方又為特美安石久叨庇賴實預甄收職在近臣欲致盡規之義世當大有更懷下比之嫌用自絶於髙閎非敢忘於舊德逖聞新命竊仰遐風瞻望門闌不勝鄉往之至謝應中制科啓蘇軾臨軒策士方搜絶異之才隨問獻言誤占久虛之等忽從佐縣擢與評刑內自顧於無堪凜不知其所措恭惟制治之要惟有取人之難用法者畏有司之不公故捨其平生而論其一日通變者恐人材之未盡故詳於採聽而略於臨時兹二者之相形顧兩全而未有一之於考試而奄之於倉卒所以為無私也然而才行之迹無由而深知委之於察舉而要之於久長所以為無失也然而請屬之風或因而滋長此隋唐進士之所以為有弊魏晉中正之所以為多姦惟是賢良茂異之科兼用考試察舉之法每中年輒下明詔使兩制各舉所聞在家者能孝而恭在官者能亷而慎臨之以患難而能不變邀之以寵利而能不回既已得其行已之大方然後責其當世之要用學博者又須守約而後取文麗者或以用寡而見尤特於萬人之中求其百全之美凡與中書之召命已為天下之選人而又有不可測知之論以觀其默識之能無所不問之策以考其博通之實至於此而不去則其人之可知然猶使御史得以求其疵諫官得以考其素一陷清議輒為廢人是以始由察舉而無請謁公行之私終用考試而無倉卒不審之患蓋其取人也如此之密則夫不肖者安得而容軾才不逮人少而自信治經獨傳於家學為文不願於世知特以饑寒之憂出求斗升之祿不謂諸公之過聽使與羣豪而竝游始不自量欲行其志遂竊俊良之舉不知才力之微論事迂闊而不能動人讀書疏略而無以應敵取之甚愧得之益慚此蓋伏遇某官以堯舜之道輔吾君以伊周之業為己任恐一夫不獲自盡以為廟堂之憂思天下所以太平必用芻蕘之說亟收末學以輔大猷然志卑處髙德薄寵厚厯觀前輩由此為致君之資敢以微軀自今為許國之始過此以往未知所裁石林燕語云故事制科分五等二等皆虛惟以下三等取人然中選者亦皆第四等獨吳正肅公嘗入第三等後未有繼者嘉祐中蘇氏兄弟始皆入三等已而子由以太直為胡武平所駁復降為四等設科以來止吳正肅與子瞻入第三等而已故子瞻謝啓云誤占久虛之等鍾云敘事議論寓於四六之中不難於圓而難於緊登州謝兩府啓蘇軾迂愚之守沒齒不移廢逐之餘歸田已幸豈謂承宣之寄忽為枯朽之榮眷此東州下臨北徼俗習齊魯之厚迹皆秦漢之陳賔出日於麗譙山川炳耀傳夕烽於海嶠鼓角清間顧靜樂之難名笑妄庸之濫據此蓋伏遇某官股肱元聖師保萬民才全而德不刑任重而道愈逺謂使功不如使過而觀過足以知仁特借齒牙曲成羽翼軾敢不服勤簿領祗畏簡書策蹇磨鉛少答非常之遇息黥補劓漸收無用之身過此以還未知所指謝中書舍人啓蘇軾起於貶所未及期年擢置周行遽參法從省躬無有被寵若驚竊惟人材進退之間實為風俗隆替之漸必欲致治在於積賢雖一薛居州齊言不能移楚而用范武子晉盜可使奔秦崔琰進而亷儉成風楊綰用而淫侈改度誠國是之先定雖民散而可收拔茅茹者以彚而征附馬棧者必先其直用舍既見好惡自明人知所趨勢有必至今朝廷方講當世之務力追前代之隆雖改定法令足以便事而未足以安民寬弛賦役足以安民而未足以成俗是以登進耆老搜求雋良將使士知向方民亦有恥如軾者山林下士軒冕棄材少而學文本聲律雕蟲之技出而從仕有狂狷嬰鱗之愚溝中不願於青黃爨下無心於宮徴誤䝉收拾已出優恩荐履禁嚴殊非素望此蓋伏遇某官德配前哲望隆本朝名重圭璋上助廟堂之用言為蓍蔡下同卿士之謀餘論所加虛名增重知丹心之尚在憐白首之無歸特借寵光以寬衰病任隆才下恩重報輕直道而行恐非所以安愚不肖之分充位而已又不足以解卿大夫之憂蚤夜以思進退惟谷恐懼戰越不知所裁謝賈朝奉啓蘇軾自蜀徂京幾四千里携孥去國蓋二十年側聞松楸已中梁柱過而下馬空瞻董相之陵酹以隻雞誰副橋公之約宦游歲晚坐念涕流未報不資之恩敢懷盍歸之意常恐樵牧不禁行有雍門之悲雨露既濡空引太行之望豈謂通判某官政先慈孝義篤友朋首隆學校之師儒次訪里閭之耆舊自嗟來暮不聞拔薤之規尚意神交特致生芻之奠父老感歎桑梓光華深衣練冠莫克垂洟於墓道昔襦今袴尚能鼓舞於民謡仰佩之深力占難盡賀歐陽少師致仕啓蘇軾伏審抗章得謝釋位言還天眷雖隆莫奪己行之志士流太息共髙難繼之風凡在庇庥共增慶慰伏以懷安天下之公患去就君子之所難世靡不知人更相笑而道不勝欲私於為身君臣之恩係縻之於前妻子之計推荷之於後至於山林之士猶有降志於垂老而況廟堂之舊欲使辭祿於當年有其言而無其心有其心而無其決愚智共蔽古今一塗是以用舍行藏仲尼獨許於顔子存亡進退周易不及於賢人自非智足以周知仁足以自愛道足以忘物之得喪志足以一氣之盛衰則孰能見幾禍福之先脫屣塵垢之外常恐兹世不見其人伏惟致政觀文少師全德難名巨材不器事業三朝之望文章百世之師功存社稷而人不知躬履艱難而節乃見縱使耄期篤老猶當就見質疑而乃力辭於未及之年退託以不能而止大勇若怯大智如愚至貴無軒冕而榮至仁不導引而壽較其所得孰與昔多軾受知最深聞道有自雖外為天下惜老成之去而私喜眀哲得保身之全伏暑向闌台候何似伏冀為時自重少慰輿情無限曲折以排偶出之勢如疊浪機如貫珠可謂前無古人後無來者賀楊龍圖啓蘇軾伏審新改直職擢司諫垣傳聞邇遐竦動觀聽咸謂國家之巨福乃用諫諍之真才必能深言以補大化方今朝廷之上號為無諱而太平之美終不能全臺諫之列歲不乏人而衆弊之原猶或未去豈聽之者徒能容而不能用言之者但為名而不為功歷觀古人之效忠皆因當世而用智不務過直期於必行右尹子革因墳典而道祈招之詩左師觸龍語饘粥而及長安之質徒盡拳拳之意不求赫赫之名此仁人及物之休功忠臣愛君之至分伏自頃歲所更幾人席未暖而輒遷踵相躡而繼去然一身之譏固足以免矣而積歲之病當使誰去之恐習慣以為常遂因循而不振雖在僻陋顧常隱憂以為必得朴忠憂國之人而又加以辨智得君之術言苟獲用國其庶幾伏惟諫院龍圖才雄於世而常若不勝節過於人而未嘗自異素練邊事深知兵驕頃持銓衡實識官冗必將舉大禮而不論小事務實效而不為虛名軾最䝉深知愧無少補方傾耳以聽願續書諫苑之篇若有待而言或能著爭臣之論阻以在外無由至門踴躍之懷實倍倫等賀時宰啓蘇軾伏審光膺考慎峻陟宰司孚號揚廷士識上心之所尚置郵傳命人知聖澤之將流靡不欣愈至於鼓舞恭以某官直方以大廣博而良進以正而正邦異乎求以求政貫六經百子之學煥三代兩漢之詞昴稟自殊偉蕭侯之八尺斗南莫競凜梁公之一人加以絶識見微曠度舉逺清心省事則法可使復結繩之約强本節用則貨可使若流泉之長材無不可範而成也譬泥之在鈞俗無不可易而善也猶風之靡草是皆隨試而有效安見為事而無功蓋神考貽謀己完具而可按故成王纘要宜纎悉以勿加此大雅兼持而不移矧清衷圖任之愈篤豈繄疏逖所獨詠歌惟民罔知合語則聖凡有照令率先惠慈固已遐邇爭傳室家胥慶顧此民逢此日之何幸謂吾相勸吾君以愛人歡聲格于九天乖氣消於萬彚在昔小國如彼景公損己一言退星三舍又况以禹湯大信之誥有䕫契同寅之言蠢爾憑生猶知助順赫然在上豈不降康某愚有赤心老無佞舌輒忘犯分顧欲輸誠然有難言是在精智蓋無交則莫與茍好謀則必成不惡而嚴匪怒伊教終成大賴豈曰自私伏念某遭時休明賦命衰薄蚤粗䝉於遴選比久幸於退藏天雨何私笑流行之木偶滄溟不改歎自蕩之波臣重以頃歲周旋竊嘗撰屨末塗流落無復掃門尚賴補息劓黥雕杇糞朽出蔀見日去盆望天悵末力之將殫愧眀恩之莫報乃利用安身之何有儻奉法循理之可為民社非輕猶承宣而惴惴天淵靡外亦戾躍以欣欣亳州上李中書啓鼂補之夙被採收久知幸㑹訏俞地重敢復恃於門牆奔走位卑自宜疏於竿牘載寢興而念此終震疊而怛然蓋以十年之遇未酬一切之儀又闕坐恐魚鳥池林莫還遂令階庭踵武長掃飄零自力企慕更勤恭惟邇來調燮燕閒神明勞相伏以某官贊天化育為士宗師學隘囷倉曠山川之受納文非纂繡耿經緯之昭回既剛毅以有容亦柔嘉而維則此老氏嘗稱君子之盛德抑仲尼所謂善人之為邦加以遵正考父之益恭兼萬石君之至慎良法美政世但見於持循密議逺圖中已殫於裨補要使禮刑達而內敘兵食足而外賓副上主求舊之心終先朝用儒之效此大雅意寧衆人知而補之幸逢休眀偶脫泥滓亦欲憤發自見毫毛孤植難伸良辰不與平生狂狷之尚中年期待之私一事莫諧三歎何補獨竊比漢臣之自誦忘本則難豈徒如魏虜之感恩必報而去第以賦分薄而造物不能厚稟資拙而匠石無由工開籠鵠失而始驚捩手羮空而自笑迷途未反壯日已賒惟激烈之素懷則蕭條而長在每羞王密謁楊震之意猶鄙谷永謝王鳯之詞使愚無似有宣光不比之稱則賢我公乃獻子可賀之舉然而志闊事忤才疏效遲下若戰國公子之市名當時羣豪之赴義猶可蒯緱彈鋏預三千客而有魚或能左手捧槃招十九人而俱㰱此自不果他復何言第依庇存姑逭疵悔念虛死不如立節而止謗莫若自修鶴鳴逺而終聞蘭生幽而亦佩誠足動金石則有不誠無不動信可行蠻貊則有不信無不行奔踶可馴千里要煩於良御鉛刀且弊一割更繄於善操重惟左右以主張吾道之公有識拔後輩之譽取人以恕得士多賢彚茹而升簪履皆在醫門容疾富績仁鄰寧其中棄之乎既己辱收之矣用此自信獨無介然若唐兩生奏記當路至願為燎供席蒸芝效祥顧有義焉何至是也更望日崇令問益被眷圖早正台衡大庇倫品不惟一士獨荷至私方届寒凉尚賒侍省伏乞為上自壽副人所瞻賀教授陳履常啓鼂補之擢領掾曹歸臨鄉校與從游之良舊私慰喜以居多竊惟國之求才病取捨之膠於法士之涉世患進退之失其中設科舉爵位以誘人假誦數詞章以干祿須其出試則鄉黨自好者恥夫屢獻不以禮際則山林長往者豈其肯來故上安於有司之區區糊名以為公而士惑於古人之皇皇載質以為辱莫聞覽德之鳯率多食餌之魚恭以某官行獨而通志潔而降不落落以如玉矧泛泛其若鳬窮無立錐術可濟國至於博覽之學絶出之文要其平生固曰餘事尚不屑去安有求聞聲自籍於諸公章數騰於當寧拔起閭里朋類之榮收還妻孥親黨所喜未促公車之詔聊從泮水之行庶觀成山必自纍土辭尊及富任何往而非安有為與行志苟存而皆可貽箋良幸修慶獨稽傾詠之誠倍於儕等答賀李祥改宣德啓鼂補之延對宸廷改榮京秩從游兹舊慰喜良多恭以宣德懿行不羣令儀可度粵從幼學夙有俊聲下帷未省窺園持竿寧悟流麥其精如此故資之深珠玉藴含山川輝媚自當名世豈獨傳家補之氣合相求心均莫逆絣䌟洸之何取橛株枸之自留臨水送將牛羊方下望風懷想鴻雁欲來庶幾逢聲子之班荆且復過孟公而投轄未遑馳慶先辱流音尚阻盍簪惟期彊飯賀呂相公啓秦觀伏審光膺宸命顯正台司凡在生成舉同忭蹈竊以媧皇補天之際髙宗夢帝之初未就泥金正資陶鑄不調琴瑟方賴更張是謂大有為之時必得非常人之佐恭惟中書僕射相公纍朝元老名世大儒力足以扶持顛危風足以興起貪懦青天白日奴𨽻亦知其眀璞玉渾金鑒識莫名其器既天資之篤實加地胄以髙華四世五公勳在王室一門萬石寵冠廷臣宗族謂之小許公夷狄以為真漢相果從人望爰享天心方思左轄之嚴遽踐鸞臺之峻獻可替否而思矯激之過解紛挫鋭而有調和之能必欲成仁之始終非特潔身之去就繇是端人坌集異黨寖微寬大之澤四覃苛刻之風一變名既得功而竝立位當與德而俱崇明詔始班吉士交慶太公入國固知天下之父歸伊尹得君益見聖人之任重某猥緣幸㑹叨被題評昔陪北海之樽有同夢寐今望平津之館如隔雲天但欣衆正之路開始信太平之塞責願稽故事就封富民之侯請與諸生復上得賢之頌此啓稱頌幾於諛矣然以投申公直是受得起謝館職啓秦觀法同博士閲五載而遷官例比編書通三年而改秩寵靈既逮愧懼實深伏念觀族系單微器能淺陋少時好賦僅成童子之雕蟲中歲窮經未究古人之糟粕始榮名於進士俄充賦於直言濫居方物之前叨被傳車之召文章末技固非道義之尊箕斗虛名秪取謗傷之速亟從引避幾至顛躋褒未就於袞華惡已成於瘡痏三期之內王尊乍佞而乍賢七年之中魯田一與而一奪但以偏親重老生計屢空聊復靦顔以居未能投劾而去日期沙汰分絶進升豈期積日以纍勞輒亦逢年而遇合束緼還婦雖䝉假借之私懲羮吹虀尚慮譴訶之及竊觀前史具見鄙悰西蜀中郎孔眀呼為學士東海釣客建封任以校書雖為將相之品題實匪朝廷之選用夫何寡陋遽有遭逢此蓋伏遇某官道欲濟時仁能錫類始憐貧女稍分秦璧之光終念波臣為激越江之水矧兹竒蹇亦與甄收敢不以古人行己之方為國士報君之義千金弊帚聊依翰墨以自娛一割鉛刀或冀事功之可立秦觀字少游一字太虛揚州髙郵人元祐初以蘇軾薦除太學博士祕書省正字兼國史院編修官紹聖初坐黨籍出通判杭州再貶監處州酒稅以謁告寫佛書削秩徙郴州編管橫州又徙雷州徽宗立復宣德郎放還至藤州卒潤州謝執政啓張耒伏以文章為學者餘事故先王不以經世富貴非人力所制故君子以為在天而況修辭蹇淺未涉作者之流趨世濶迂每在衆人之後則其投閒置散㚄後跋前在所當然夫復何恨伏念耒羈孤一介憔悴餘生困箠楚者十年逭饑寒於斗祿仕已成於漫浪意何有於功名始誤置於成均復進升於儒館佐東觀之論著頗見舊聞紀先帝之事功遂游藏室擢升右史密侍清光雖儒學之至榮豈草茅之素望而疾病侵耗心力衰疲分敢自安義當引去駑馬自竭驥厯塊而已超神山在前風引舟而忽逺尚叨便郡獲養殘軀靜循此恩蓋有所自兹蓋伏遇某官曲成萬類器使庶工直鎛䝉鏐廢者未嘗遽疾大杗小桷施之各以其宜致此枵虛未即捐棄獄訟希簡職事不廢乎詩書山林幽深形骸頗為之清快庶餘齡之可養幸沉痼之有瘳仰報至恩將必有在張耒字文潛淮隂人幼穎異十七時作函關賦遊學於陳學官蘇轍愛之因得從轍遊弱冠第進士厯起居舍人紹聖初請郡以直龍圖閣知潤州坐黨籍徙宣州謫監黃州酒稅徙復州徽宗立召為太常少卿甫數月復出知潁州汝州崇寧初復坐黨籍落職主管明道宫初耒在潁聞蘇軾訃為舉哀行服言者以為罪貶房州别駕安置於黃五年得自便居陳州時二蘇黃鼂輩相繼殁耒獨存士人就學者衆日載酒殽飲食之久於投閒家益貧郡守翟汝文欲為買公田謝不取晚監南嶽廟主管崇福宫卒年六十一永興提刑謝到任啓李昭玘委轡下車勤吏民之趨走據案涉筆擁文墨之紛紜將何補於事功徒有慚於面目伏念昭玘迂疏末學鄙野孤生賦才不長聞道最晚棲遲日月僅成九轉之功蹭蹬風塵未䝉一顧之價再預充庭之貢謾為入格之遊敢意斐文偶塵精鑒初乏青錢之作宜置下陳誤經黃絹之評遽超數等叨從祿仕擢備儒官詎能握管以窺天良愧奔蜂之化蝎屬大明之繼照延舊德以亮功博收人才盛集册府開閣之始豈乏異能備員者誰乃出下客人共榮於入彀時皆謂之登瀛正始諸賢濫陪武步石渠祕籍頓發見聞惟知反己以自求敢覬因人而幸進謂有昭昭之明者必有冥冥之志無赫赫之熱者亦無凛凜之寒欲寡過而未能恐修名之不立以愚自信曷嘗稱博而毁丹與世何尤不暇去嬰而歸蚡安有本同而末異奚先嘗病而後瘳處冲季孟之間僅知所立甘臨南北之部適幸兩忘能不能各自其人得不得必尸諸命洋然迎餌詎為宓氏之魚兀若畏人反類羊公之鶴歎源泉之有本驚蒲柳之先衰一傳未終恍已迷其姓氏井文屢過幾不辨其偏旁但縻廩粟以偷安何罪書魚之成蠧久玷外庭之列聊從别乘之行逮及更書復還舊直竟無他異莫追終賈之才名必有可觀竊預趙張之政事舍丹鉛之㸃勘視鞭朴之喧囂精神僅及於目前智慮或遺於意表蠅紛訴牒驅即復來雁集吏行守之不置間關畏罪黽勉赴功入水必濡每憂揭厲遇風知退冀免摧頽雖殫十駕之勞蔑有尺寸之補間以私門艱窘多事侵陵祿未逮於孤窮歲已驚於遲暮田無附郭久負陶潜之歸盜不過門素多張禹之愛屢申愚懇願守方州猥霑造物之私特假詳刑之任地占河關之勝道連雍陜之雄小民尚氣而喜爭巨猾瀕山而為盜素稱劇部尤藉長才自非水鏡無疵權衡不撓則何以吏知守法人不稱寃顧煩暗之無堪適選掄之誤及此蓋某官元功播物一德亮天見逺業於有為期太平之可致論事必同於善使人樂盡其才引傴僂以升髙徒煩假手削輪囷而成器幾誤揮斤敢不慎守官針勉思民事不近名而邀福無倚法以作威概以中平得之安靜少圖裨報上副陶成美廕方休曾未虞於巨臂不才自養終願託於長年過此以還未知所措昭玘字成季濟南人少與鼂補之齊名為蘇軾所知擢進士第歷祕閣校理通判潞州入為祕書丞提㸃永興京東西刑獄坐元祐黨奪官徽宗立召為右司員外郎遷太常少卿出知滄州崇寧初罷主管鴻慶宮遂入黨籍居閒十五年自號樂靜先生寓意法書圖畫貯於十囊命曰燕游十友為之序以為與今之人友寧與十者友久益有味也初校試髙密得侯䝉䝉執政使人致己意惟求祕閣法帖而已賀李丞相啓汪藻躬被策書進居丞弼精忠貫日正二儀傾側之中凛氣橫秋揮萬騎笑談之頃國須賢立天為時生恭惟某官厚德鎮浮英林經逺得文武弛張之樞要獨運胸中明古今治亂之淵源不專紙上爰自踐揚之始每勤獻納之忠老成尚有於典刑天下想聞其風采昨屬殊鄰之擾上貽當寧之憂夕烽既徹於甘泉清蹕將遊於汾水唯公夙夜與國存亡挺身六品之卑抗議九重之邃留家誓死鑱血書詞銷大變於胚貽轉危機於呼吸洎干戈之息戰援桴鼓以登陴義動三軍人皆奮死氣吞異類虜輒請盟身雖九隕而一生國則崇朝而再造既名髙而衆媢乃讒就而身危士訟公寃亟舉幡而集闕下帝從民望令免胄以見國人薦經難危益見竒偉方主上清明於今日實邦家希闊之昌期欲衆賢同建於事功非雅望孰為於師表將萬世維持之是賴何一時康濟之足言某久托在閒欣聞盛事雖無緣旅進旅退陪賓客之後塵豈不能大書特書續山林之野史鶴林玉露載汪此啓又李遷謫汪草制詞曰朋姦罔上有虞必去於歡兜欺世盜名孔子先誅於正卯或問之汪云我前啓自直一翰林學士而彼不我用安得不詆之按汪公賢者未必有此語制詞云云當是矢在弦上耳賀大諫李寶學啓楊萬里丕揚褒詔峻陟隆名昔抗論諫垣綽有古靜臣之烈今升華奎閣亟聯真學士之班帝思孤節之無朋人羡精忠之有報竊以當國論是非之未定見人才邪正之不同君子志在憂時豈憚盡言之觸禍小人心乎趨利第思阿意以徼榮孰知天理之好還殆匪人情之可料導諛者未必獲福咎徒塞於兩儀守正者未必罹殃名自流於百世若昔可考於今益明方孽臣盜據於朝權欲私室久顓於國柄罔知勝算運籌策於幄中輕出躁謀動干戈於邦內顧衆口同然而和附豈本心若是之顛冥秪緣富貴之念深遑恤生靈之禍慘惟公逺慮為上極陳雖懷魏證之忠戒征遼水竟坐汲生之戅絀守淮陽越既漏師浸成誤國恢謀馬邑莫逃首事之誅鯀殛羽山旋正朋姦之典凡曩出矢言之爭皆令䝉徽數之加眷一佞而一忠果孰得而孰失載睹恩綸之布咸新公道之亨恭惟某官秉姿松篁為世蓍蔡立朝二紀幾嘗閲於嶮夷報國一心曾弗移於燥溼衆方駒促公獨鳯鳴惟知效獻替於當時何意被寵榮於後日逮此忠謀之既驗凛乎節槩之愈光恩命狎臨輿情知勸某竦瞻殊渥深激懦衷喜聖朝有賞諫之風不慚於古庶天下增敢言之氣其自於今萬里字廷秀吉州吉水人少見張浚勉以正心誠意之學乃名其室曰誠齊按翰苑新書多刻此公諸啓中有上史彌逺者二人本不同時此編輯之誤此篇語氣必韓托胄敗後作誠齊先托胄而卒不應有此既無他本考正姑存舊名而識所疑於後回丞相謝致仕啓周必大連章請老優詔閔勞執玉帛於新班位隆亞傅易茅封於舊鎮地統故鄉仍祕殿之大名極宗工之異數縉紳創見夷夏樂聞恭惟某官德博而裕於才器閎而沖於用以奧學雄文冠多士以忠言直節居大僚為善未嘗近名而聲譽之歸不可遏事君未嘗枉道而爵祿之至不可辭周旋鈞樞弼亮神聖謀斷兼乎房杜都俞踵乎臯䕫粵去廟堂屢臨藩屏力方剛而抗疏欲追六一之髙風年甫及而掛冠迄遂祈公之雅志優游里第涵泳天真二疏賓客之相娛萬石子孫之甚謹謙備六爻之吉悔吝不生夀居五福之先康强未艾在前輩或難於盡善惟哲人獨享其全功然而尚父之佐武王潞公之師元祐皆來歸之既老豈得謝之可居公固無心上猶有望某敬懷知喜已聽傳家顧希驥以未能思執鞭而甚切仰勤榮問徒激懦衷寒力方凝燕超多助冀益調於鼎食永丕聳於民瞻賀工部劉尚書啓黃疇若恩綸拜寵起部升華帝曰疇若垂哉擢典汝工之職漢廷誰如卿者遂升常伯之班朝登偉人士載嘉頌恭惟某官天球不琢玉井無波學有淵源倒彭蠡三江之勢事無盤錯倚豐城雙劍之鋒早登名躔休有華問處憲府抨彈之地得勉益尊立延英諫議之班如尊乃勇懋展經綸之業見謂通明之才信湖山之炳靈有槐鼎之相繼爰膺眷命申畀彝章出納居喉舌之司技巧陋元成之世聖人作百工之事政少藉於研思文昌峻八座之躔行即參於鬷假某落南寢久竊芘居多兹聞君子之得輿輒效小夫之貢牘蟠木為萬乘之器必資根柢之容祥金躍大冶之爐敢作莫邪之想疇若字伯庸隆興豐城人長於政事所在有聲而治蜀之績尤偉終煥章閣學士有竹坡集賀湯侍御啓任盡言伏審光奉明綸榮躋橫榻國朝更西都三府之制故御史不除大夫端公居南司五院之中與獨坐迭為憲長自昔雖稱於雄劇比歲或乖於選掄汚我霜臺賴公雪恥輒陳管見少助風聞靖言有宋之姦臣無若亡秦之巨蠧十九載輔國而專政亘古無之二百年列聖之貽謀掃地盡矣若乃糊名而較藝亦復肆志而任私敢以五尺之童連冠兩科之士老牛䑛犢愛子誰無野鳥為鸞欺君實甚公攘名器報微時簞食之恩峻立刑誅鉗當世縉紳之口一時謫籍半坐流言父子至於相持道路無復偶語每除言路必預經筵蓋緣乳臭之雛實預金華之講受其頤㫖應若影從忠臣不用而用臣不忠實事不聞而聞事不實逮政府樞庭之有闕必諫官御史而後除所以復鷹犬之報而搏吠已憎疏鴛鷺之班而孤危主勢私竊富貴之勢利豈止於子孫而為臣仰奪造化之爐錘至不容人主之除吏方當寧之意未罪魏其而在位之臣專阿王氏致學官之獻佞假題目以文姦引前代興王之詩為其孫就試之讖旋從外幕擢至中樞冀招致於妖言啓包藏之異意忠憤扼腕智識寒心上愧漢臣既乏朱雲之請劍下慚唐室未聞林甫之斫棺坐令存沒之姦備極寵榮之典正緣和議常贊睿謀故聖主念功務曲全於體貌然憲臺議罪當明正於典刑賞當功所以示朝廷之至恩罰當罪所以貽臣子之大戒政若偏廢國將若何敢為上言莫如君重恭惟侍御氣剛而志烈學老而才雄自親擢於中宸即大符於民望明目張膽士林日誦於讜言造膝沃言天下咸受其隂賜雖直道盡更其覆轍而宏綱獨漏於吞舟惟九重之委任寖隆故四海之責望尤備願言彈擊無置渠魁矧今日新除有替人之故事韋仁約自稱鵰鶚才固絶倫張文紀不問狐狸惡惟誅首縱黃壤之已隔在白簡以難逃使六合之間忠義之心如日九泉之下邪佞之骨常寒庶幾紹興湯御史之名不在慶厯唐子方之下其他世俗之諂語諒非方正之樂聞側聽褒遷别當修致桯史云秦檜秉權寖久植黨牢不可破髙皇淵默雷聲首更大化懲言路壅蔽之弊召湯元樞鵬舉為侍御史時任盡言以啓賀之湯袖以白上天顔為回故一時公議大明姦諛膽落盡言其助也任字元受仕不大顯賀葉樞密啓陸游恭審顯膺明詔進二鴻樞道大材全固視功名為餘事任隆位重蓋倚精神之折衝衆志交孚太平可冀伏聞今昔有不移之形勢華夷有一定之土疆故彼不可越燕薊而南侵猶我不能跨遼碣而北守堯舜尚無冠帶百蠻之理天地元限山河兩戒之分又況以本朝積纍而當荒陋崛起之生蕃以陛下神武而討衰弱僅存之小敵重以軍民之憤切加之廟祏之威靈當一震於雷霆宜坐消於氛祲夫何玩冦久使逋誅九聖故都視同棄屣兩河近地進若登天莫宣方叔之壯猷更類棘門之兒戲坐殫民力孰奮士心上方撫髀而喟然公宜出身而任此恭惟某官負沈雄邁往之略躬英發絶人之姿撫卷慨慷夙有四方之大志立朝開濟晚收九牧之重名果副簡求肆當柄任以元龍湖海之氣參子房帷幄之籌北斗以南一人誰其倫擬長安之西萬里行矣清夷某識面莫先託身最早側聽延登之渥自悲淪落之餘雖意氣摧藏非復鵰鶚離風塵之望然饑寒蹙迫猶懷駑馬戀棧豆之思敢敬布於微誠覬少回於曩眷上王宣撫啓陸游薄命邅回阻竝遊於簪履丹誠精確猶結戀於門牆敢辭蹈萬死於不測之途所冀眀寸心於受知之地伏念某稟資凡陋承學空疏雖肝膽輪囷常慕昔賢之大節乃齒牙零落猶為天下之窮人撫劒悲歌臨書浩歎每感歲時之易失不知涕泗之橫流昨屬元臣暫臨西鄙獲厠油幕衆賢之後實輕玉關萬里之行奮厲欲前駑馬方思於十駕羇窮未憖沉舟又閲於千帆傷弱植之易搖悼鴻鈞之難報心危欲折髮白無餘如輸勞效命之有期顧隕首穴胸而何憾兹從剡曲來次䕫關雖未覘於光躔已少紓於志願此蓋伏遇某官應期降命生德自天器宇魁閎鍾太行黃河溫厚之氣文章巨麗有慶厯嘉祐太平之風取人不棄於小材論事每全於大體念茲虛薄奚足矜憐然遭遇異知業已被扆前之薦使走趨逺郡豈不為門下之羞儻回曩昔之恩俾叨分寸之進窮子見父可量悲喜之懷白骨成人盡出生全之賜過此以往未知所裁游謫䕫州王炎宣撫川陜辟為幹辦公事與趙都大啓陸游洊被臺移攝陪幕辨方剡章而俟報輒懷檄以徑前迫於竒窮作此頑鈍冒世俗之所憫笑賴門下以為依歸伏念某下愚無知大惑不解罪宜永斥缺朝蹟者十年身困逺游車轍幾環於萬里比官巴峽旋客塞垣歲月不知其再周形影相顧而自悼支離病骨無毁而亦消羇旅危魂雖招而未返念惸惸之安往復挈挈以此來豈忘慚羞實恃矜惻老馬已甘於伏櫪敢望長途窮猿方切於投林況依茂䕃斯蓋伏遇某官資函英達學藴淵源早奪竒謀蓋處囊而立見晚更劇任真游刃以無前寶儲直中禁之嚴玉節寄西陲之重曲憐狂簡自致漂流每假借於餘談為經營其一飽致兹小憩盡出大恩某敢不痛洗昨非姑休疲役柖陵笠澤雖賒故國之歸期錦江草堂聊竊老師之補處答勾簡州啓陸游近被臺移來陪幕辨以海內孤寒之迹假天涯獨冷之官但虞譏訶誰肯慰藉忽奉華箋之況豈勝末路之榮伏念某性資冥頑問學衰廢留落殊方者纍歲竒窮舉世而一人雖夢寐思歸類澤國春生之雁而巾瓶無定如雲堂旦過之僧比叨閫屬之招實過野人之分方剡章而待報忽捧檄以徑前久矣倦遊幸兹小憩此蓋伏遇某官風猷凝粹志節清真念倀倀浪迹之安歸假亹亹餘談而借助遂容萍梗暫息道途惟此意之甚恩實衰俗之創見而某自侵晚景久歇壯心理剡曲之歸舟方從此日卜浣花之絶境敢效先賢謝䕫路監司列薦啓陸游意象纍然揣分已安於下吏寵光異甚交章遽上於公車莫測何由但知難稱伏念某久嬰瞀病見謂散材偶從諸老先生之遊粗得前言往行之略可咨今事少年誤竊於虛名刀洗陳言晚節方慚於大學一來楚峽再閲王春惟體重於藩方故職均於曹掾占名惟謹幸逃有蟹之嘲竊祿甚微屢起無魚之歎豈期僉議驟及孤蹤遂令枯槁之餘漸有敷榮之望此蓋伏遇某官器函魁磊議極崇谹雖持秋霜夏日之嚴每廓滄海洪河之量大呼相和或容醉吏之狂重聽何傷曲恕聾丞之老雖深知其無用亦並採而不遺某敢不强恕求仁質直好義庶幾夙夜或免小人之歸猶有鬼神尚圖國士之報此謝薦之始也但薦法謝法俱不同耳只莫測何由四字便是古人髙處范石湖帥蜀務觀為參議官以文字交不拘禮法人譏其頽放因自號放翁此啓略見放意楊用修云宋初置監州分知州之權有錢昆者性嗜蟹常求外補曰但得有蟹無監州處則可歸田録捫虱新話載其事東坡詩曰欲問君王乞符竹只憂無蟹有監州昆去坡不逺即用其事為詩良愛其語也知嚴州謝王丞相啓陸游故里浮沉竊玉局再期之祿公朝抆拭付桐江千里之民瓜戍非遙竹符甚寵感淪病骨愧溢衰顔伏念某元祐黨家紹興朝士池魚瀺灂本思自放於江湖社櫟支離久已難施於斤斧繇治生之素拙因從宦以忘歸頃自吳中久留劒外顧彼衣冠之所萃頗以文字而相從方深去國之悲敢有擇交之意流偶殊於涇渭風自隔於馬牛睚眦見憎本出一朝之忿排擠盡力幾如九世之讎藐是羈孤孰為别白縱免投荒之大罰亦宜置散以終身且定逺未歸惟望玉關之生入輕車已老猶護北平之盛秋豈有朝為閭閻廢斥之人暮竊畿輔承宣之寄兹蓋某官學窮窔奧勳塞堪輿南山巖巖冠公師之重任赤舄几几同宗社之閎休念人材之實難悼士氣之不振埏陶至廣收拾無遺方與物以皆春憫向隅之獨泣燮和輿論闊略彝章起安國於徒中較恩未大還管寧於海外為力尚輕而某少非列於通才晚徒專於朴學棄雞肋而猶惜雖仰戴於深仁續鳬脛則自悲恐難逃於薄命除校書謝丞相啓真德秀上翰林主人之對謬貢芻言陪瀛洲學士之班遽陳華選拜恩寵甚拊已􅋏然切以聖朝重英俊之儲册府萃圖書之富匪特養以資望蓋將充乃見聞使旁搜博覽優游文史之清庶潛省默觀磨礱器質之美觀作人之有道殆與天之同功故菁莪既盛於一時而豐芑尚遺於數世大者光明魁壘足以翼邦家小者靖重端方可以善風俗深嗟流弊寖異前觀育才之意視以具文庇職其間指為借徑至有身居儒館心别騖於髙華名在書林手弗親於讎校鄙習相仍而莫悟清途沿是以反輕力回此風政在今日不有魁竒之彥孰堪采擇之公如某者冥頑不靈孤苦自奮蚤服師資之訓粗知學問之方連歲科名似未忘於進取平生志願端不在於輕肥偶玷班行坐糜廪祿瞽宗殷學無補斯文博士秦官何裨末議雖本為貧而漫仕未嘗枉道以求伸胡然誤恩陟是清貫念昔脫身於場屋益思鋭意於簡編然家無鄴侯插架之藏徒日發董子下帷之憤今將徜徉東觀凌厲西崑閲河圖寶訓人間希有之珍窺金匱石室歷代不傳之祕刋訂訛謬含咀英華庶幾因文字以窺聖賢之用心夫豈假梯媒以為富貴之張本昔楊雄之居天祿蓋二三世而不徙官而韋述之在集賢亦四十年而後卒業故能發揮大典焜耀方來此前修之所已行而小子之所願學迄成微志有賴洪私幸遇某官直道不回孤忠自許抵排羣枉已去虞朝之四凶汲引衆髦當思孟氏之三樂至於不佞亦在兼收且令身逺於塵埃得以神交於篇牘期待過矣銘感何如某敢不淬磨新功尋繹舊業丹鉛事㸃勘可勿殫是正之勞金石無磷緇尚克守初終之節回孫榜眼啓真德秀壁水蜚英夙髙士望玉階上對果亞掄魁新六館之榮觀壯七閩之盛事恭惟某官清標絶俗徑氣橫秋學探精微期欲造聖人之奧身居窮約常懷憂天下之心飭躬允蹈於規繩抗志弗渝於金石比承清問獨罄丹衷鋪陳主德隆替之由力辨國論是非之正雖明白峭直不為媚俗之言而溫厚深醇自得告君之體衆共稱其卓偉公特出於緒餘夫既都儒者之至榮要必慕古人之盛節昔仁皇帝旁搜於多士若韓魏公擢在於一人顧科第之相同不知其幾而勳名之有爛獨到於今願恢他日之逺圖罔俾前修之專美某濫陪較藝欽誦奏篇以直言取人蓋當寧留心之方切得名士報國在有司何力之足云猥先枉駕之臨申賁長箋之貺念友直友諒既素辱於心期不以頌以規其敢忘於古誼江東賑濟無罪可待謝丞相啓真德秀巧語上聞方抗章而自列隆恩下逮況赦過以不誅捧詔凌兢拊躬感惕某本慚通敏徒抱闊疏入侍軒墀每見玉色憂民之切出乘使簿復觀璽書恤下之頻誓竭駑材秪承德意屬江左竝罹於旱暵而桐川尤慘於雕殘䝉賑贍之特優懼奉行之弗稱夙宵一念民饑奚啻於已饑經畫百為王事殆同於家事所冀推仁恩而均被靡遑顧文法以自營頃當原隰驅馳之時備睹田野焦熬之實欲糴則人苦青蚨之寡欲濟則官無紅粟之儲抑立視其死與既有負求芻之託苟利專之可也又難逃矯制之刑與其失職以偷安寧若殞身而任責勉效便宜之舉亟䝉問可之音顧小臣敢越於拘攣見盛世素行於寬大是乃彰朝廷之美何至干堂陛之嚴以王命而賙民囏本其所職貪天功而為己力焉有此心豈虞止棘之讒乃出剖符之守情狀深藏而叵測有愧先知語言妄發以不倫本無足辨荷天日照臨之赫免風波淪陷之危兹蓋伏遇某官以至公而秉化鈞以深仁而培邦本謂羣臣之善亦王之善齊人嘗有格言而衆職之功乃相之功柳子誠為確論凡悉力以裨荒政乃盡忠以報公朝肯令譛訴之得行馴致是非之易位特加全護俾逭譴訶某敢不仰佩洪私益堅素守德秀為江東轉運副使旱蝗廣德太平為甚德秀與留守憲司分所部大講荒政而自領廣德太平親至廣德與太守魏峴以便宜發廩使教授林庠賑給先是都司胡槻薛極誚德秀迂儒至是政譽日聞因倡言旱傷本輕監司賑贍太過使峴劾庠以撼德秀德秀上章自明朝廷悟與峴祠授庠幹官賀鄭丞相啓魏了翁出命九重登庸二府崇甘盤之舊學著調鼎之新功方兹地節新政之年赫然天章責治之意丕平所感端命維休竊觀易道之微無如時義之大玩理於㑹通之分沈幾於變化之神方處時之未然寧藏器以有待故乾在下則潛龍勿用屯其膏則乘馬班如或需於沙或需於泥或賁其須或賁其趾或且安於坎坎或退守於謙謙脫事㑹之方來豈幾微之可失故坤之三以時而發復之四惟道是從解既得中著有往夙吉之戒益雖居下實利用大作之時井而汔至有羸瓶之凶豫而勿疑為盍簮之得嘗原天地之運化以驗古今之屈伸何示人之昭昭而聽我之藐藐蓋狃於前失者暗大體而安於小成者乏逺圖敢因師友之舊聞仰贊朝廷之先務竊惟仁哲親政之始實踵章宣稱制之餘皆靜觀者十年而奮發於一日然而或以更張為一代之興辟或以踵誤生百年之厲階乃知聽斷之初實係安危之判矧一二日萬幾之遝至乃四十年大柄之倒持士習於放利皇恤其他俗忲於積威不知有上典章浸泯廉恥蔑聞不及今解絃而速更將自後噬臍而無及擬效涓塵之報敢修固陋之辭且三省有造令出令之殊自王蔡擅朝以後重在都司而三省之屬不能制其可否二府有同班合班之異自秦韓專國以來惡人異已而二府之事未嘗更相是非尚書特奉命之司胡為有先勾之筆都堂為聚議之所何者開略入之端臺諫耳目之官但見書名於紙尾給舍喉舌之寄未聞駁正於詞頭於是有韓盧俱斃之嘲有時被五伯之謗又其甚者請終言之翰苑受命於禁中掖垣代言於閣下今或先數旬而呈藁斷無楊大年因三壤而求歸或後纍月而草詞亦非劉原父以九制而被遇凡曰論思之彥例䝉獻納之譏目善類為好名指直言為歸過於是禁廷宣召經幄留身二史直前百官輪對帥守監司之陛奏臣民庶士之匭封例曰具文習成結舌火既燃而强寢疾已劇而忌醫彼躬處休莫肯念亂河北列二十四郡獨無忠臣雲南喪數十萬師反以捷告奚暇為事君安社稷之慮大抵皆全軀保妻子之臣幸積曀之劃劙值大明之臨照剝之無咎一陽久處於五隂之間剛長乃窮一隂宜决於五陽之末於皇盛舉久屬通儒恭惟某官精誠足以慮微訏謨足以經逺有嘉謀而告於內尚周臣良顯之風持衆美以效之君得唐相彌縫之用雖光塵之外合而冰蘗之獨持自建學於中興既閲年之九十豈無大科異等由此而致通顯亦有文人才士隨世以就功名然而章章乎正大之名卓卓乎廉隅之行揆之親見敻若前聞是膺一德之求絶出羣臣之右當軸處中曾幾何日拔姦扶善已若而人子儀徹樂黎幹滅騶莫匪精忠之觀感承宗削地韓𢎞討賊咸欽處分之得宜某尚陳狂瞽之言仰贊盛明之政公卿幸得遭遇不勝王陽長䇿之憂經制有所持循切陳賈傅太息之請以是知我罪我惟公進之退之了翁字華父卭州蒲江人理宗立了翁以議濟王事忤史彌逺黜外彌逺死鄭清之代相始召用正人真魏等然終不盡其用此啓即上清之作也按宋事至此已不可為了翁猶上章論十弊大㫖與此啓同此實賢者心事也當時惟崔與之終身不出賀范左相啓劉克莊斷自宸衷付之魁柄惟辟作威作福方親攬於大權有臣同德同心爰超居於端揆識者相慶翕然同詞於惟華宗厥有名宰忠宣當元祐之世不主一偏覺民在建炎之初有功再造惜也經綸之日淺甚哉遇合之際難孰如我公自結明主十載雷聲之淵默一朝地闢而天開國其庶幾政將焉往恭惟某官稟元化之精粹蹈聖人之中庸貴處廟堂臞如山澤其秉心誠實故君子咸附其蓄德深厚故小人不疑屬者諸公欲手版下新亭之拜時惟元老獨舉扇障武昌之塵然後太阿之柄還然後九鼎之勢重十全無遺慮矣一變猶反手然斯謀斯猷惟君陳之告我朕夢朕卜以汝說而賚豫必能容折檻之人必不罪舉播之士必開密網必革副封必斥絶𢎞羊張湯必追還陽城陸贄魯安得削隱然儒無敵之功吳未可圖良以彼有人之故綿基圖於箕翼紀勛績於旗常某流落十年侵尋六袠福建子是惡既不可以逃鄉江西社盛行又無從而入派分為農而沒世忽逢知己之秉鈞敢云茅拔而彚征不覺籟鳴而機動希文得政豈無守道之獻詩司馬當朝不待器之之通問賀魏右史啓危稹恩渙席前班髙柱下祕書不是監昔有是言右史用名流實聯法從除音誕布歡頌沸騰某官北斗天樞西川石筍等五誥三盤而上文可同規自八索九丘以來書皆有用不隨時而俱靡自與道以偕行幾年嗟蜀道之難一旦覺長安之近龍墀入覲蔚為華國之儒雞舌含香快吐濟時之略惟斯文之未墜知上眷之益隆禮樂司存冠九卿之妙選蓬萊身到總三館之清流才與地以雙清命自天而三錫屈司記注以闡才猷振乃嘉聲厥有故實論事闓切逺追唐相之遺風致主厲精佇見漢臣之治行某自慙末學無補明時每聞閎譏之軒昻但覺懦衷之警策適觀峻擢益倍歡悰玉立雙螭已喜端人之得路符分半虎更祈厚德之包藏稹字逢吉撫州臨川人嘗知漳州為義冢葬無主旅櫬二千三百有竒又嘗以通書徐僑罷宫僑紫陽門人也賀史丞相除太傅啓李劉師臣巽命帝傅升班七十從心公亦何心於極品二千同德獨髙崇德之紹勳叶朱衣介幘之祥增黃耳玉鉉之重竊以傅者傅之德義不惟其官惟其人臣哉臣作股肱罕有是父有是子若西京厚王陵之寵及東都旌卓茂之年雖加衡紞以鞶纓俱匪箕裘之鼎鼐於皇孝廟舊學越倫當淳熙丙午之夀上皇以正月戊子而進亞父今專槐之正位有喬木之世臣父子一家兩兩齊三台之色君臣千載重重聚四紀之間賁然緑綈之新復此青氊之舊恭惟某官清和而任直大以方禹以功臯以謨遹全絶德絳之果霍之勇難擬修能無敵知儒者之真可久見賢人之德一柱障黃河之決兩手洗白日之光三登二十七年萬機幾於百變內除狗鼠旋安鴻雁之居外殄狼貙顯築鯨鯢之觀風震雨凌而棟梁自若火炎水潤而鼎實各調蓋享天心非要人爵陶侃之指紋貫徹猶三遜以滋髙丁固之松夢留連甘十年之不調上念慈闈之訓日思元老之功無官酬公維師尚父猶堅謙抑力反渙揚姑隆絶席之班式舉戴輿之典虹明帶玉龜顧印金備衮冕之上儀增衣冠之盛事改容而禮論道以經平淮用八千兵更酬謝傅蒼生之志辭齊封三萬户㑹尋留侯黃石之盟某久纍播鈞遐瞻巖石聳聽上公之一命阻陪潭府之羣才斐然成章是以有慶乘雪邊之節傳無因拜夀杖之尊窺缺上之階符願長輔化樞之運史彌逺字同叔浩之子紹定五年拜太傅初彌逺誅韓托胄相寧宗十有七年寧宗崩廢濟王立理宗又獨相九年擅權用事專任僉壬理宗德其立已雖臺諫言其姦惡弗恤也濟王不得其死識者羣起而論之彌逺用李知孝梁成大等為鷹犬一時君子貶斥殆盡其拜太傅去死無幾而此啓猶極其諂諛如此賀史丞相除少師啓李劉巽避公槐升魁師棘萬世策定盍徑躋萬石之班三台色齊乃退位三孤之長寸心如此千載無之恭惟某官厚大而裕和端凝而洪毅周拜乎前魯拜乎後邁韋平父子之榮陟格於帝尹格於天續堯舜君民之業自開禧之末一麾九日相嘉定之治十有七年於我如浮雲心本游於淡泊用汝作霖雨身爰佩於安危既難挽鼎湖之龍乃力洗咸池之日周勃之誅呂迎代尚觀望於軍情霍光之擁昭立宣幾動搖於庭議未有獨運於掌上不煩執事之顔行為天下得人與生民立極導憑几之命而晏然仍几輔垂簾之政而遄己徹簾三邊絶赤白之囊萬國布黃朱之乘風雷屏息日月重光宜神聖建道德之師見輔弼為社稷之寶比播維垣之命允孚巖石之瞻乃執撝謙力回成渙弗敢基命定命正倚弼諧若曰父師少師何拘等級姑冠班於洪化即顓面以經邦坤載物而承天蓋得下裳之吉鼎以木而巽火實存上鉉之虛九重尊李泌以先生四海戴子儀為尚父黃河如帶山如礪豈惟難拒於公圭青櫺有洞石有窗恐合紹開於王社某夙勤壞冶自抵簡書泥塗久隔於朝紳夢寐尚隨於賀臆輒憑魚繭之素恭布燕雀之私亮天地而弼一人諒益基無窮之聞理隂陽而遂萬物尚祈澤不獲之夫賀洪郎中除察院啓李劉親擢郎潛進司臺察十年去國安泉石之膏肓一札起家任朝廷之耳目公無欣戚邦有榮懷恭惟某官行守宫庭道探壼奧養以剛大獨扛百斛之龍文出其緒餘連中八科之麟角惟其守專而退勇是以任重而進難社下之肉既均尋拜護軍之曲逆治中之足未展願令乘障於隂平儀粉省以歸班對皂囊而論事回天有力方將批徑尺之鱗偃月生疑已不容立仗之馬曾令考功一出息之頃遂見拾遺九鑽火之明星既坼於中台席遂前於半夜甫登表著徑拜裏行獬豸觸邪難置豺狼而不問鷹隼始擊尤關龍象之共觀聳聞破頭已定落膽刋九山滌九川陂九澤通地氣以上騰闢四門明四目達四聰發天光而下濟此真御史矣豈憂胸奴哉鑄金鼎以圖姧不難調鼎察玉衡而齊正然後保衡某一寒曹冰六暑戌雪將返閭閻而㬥日喜聞臺閣之生風鵰鶚之在秋天倘或寬於西擊烏鵲之繞夜月願姑聽其南飛上趙茶馬啓李劉訪火井於臨卭偶逃水厄望星槎於仙漢行拜月缺慰江湖渴夢之深瞻原濕華鑣之沃伏念某地寒而根淺年邁而骨髙斟酌胸中固缺可人之風味局促轅下粗知範我之馳驅與其包裹供權幸之鑽不若蹭蹬任風塵之老況乏揮毫之百斛固應病顙之十年懶問蓬萊羣仙之司遂叱卭徠九折之馭其甘如薺豈必衆嘗言刈其蔞願為君御恭惟某官雲龍氣局天驥風標架屋桃源三碗澆五千之卷乘軺僰道一雄將十萬之雌却笑前丁後蔡之籠加安得超范軒欒之繳繞加臭味而厚賓客漫令策兔褐之功畫骨相而遺毛皮諒必察驪黃之外如某者不持圭璧未洗袴袍特窘城南晏食之謀遂入冀北暮取之數味已輸於第一價敢望於倍三草茶無賴空有名敢妄希於前祓塞馬未必不為福或可備於走趨通篇用茶馬語作對遂開後人影略假借法門然科場表不能不用此體姑存此篇以見所自賀給事鄒帥啓王邁緑底藉綸紅牙易閫煩公護太子久焉思羽翼之功借君重淮陽示以歸禁闥之漸湘靈起舞嶽后前驅恭惟某官道傳亞聖大賢之心文續先秦古書之脉虎榜首登鳯池身到固地位之宜然鼇頭寵重鶴髮恩深尤人生之鮮儷付科名於餘事守節誼之大間方鼠穴權門趨者成市而螭坳真筆屹然如山及調更化之絃時方多事獨衛出疆之璧義不辭難入還班行進掌封駁誰不批勑鮮有如何郯之力爭因此結知故每見殷浩而輒喜居中未久丐外即行國事日新比貞觀初年而何若君子一去覺貞元朝士之無多心戀闕以常丹髮憂邊而漸白惟有甘棠之蔽芾逺到海頭最宜叢桂之婆娑久留春腳歡聲無地可著最課為天簡知太史夜占喜長沙之星見行人朝發趨衡嶽之雲開寶閣升大學士之班輕車奉太夫人之養衆皆爭先而稱賀僕知大用之有階蓋當夷夏消長之交未決和戰依違之策春秋復讎之義大乃素學之欲行英俊在朝則本强正善類之所屬有以中書何無冦公為問者當以吾國即相司馬而答之初立本竒更好黃花之晚節倘來不計直垂汗竹之芳名伏念某讀書不多合世更寡比奉槐楓之對空意盡言不知草茅之疏轉喉觸諱甘輸三籌而不悔僅忝一命以進身冬已及於瓜期夏方趨於蓮幕始仕曰筮或曰即初而覘終事長必忠安敢以順而為正竦聞元帥來鎮此方幸以鄰壤之諸生得為油幢之末吏雖素於左右本無介紹然見之方冊不昧半生況進士題名既接鳯雛之武而小人有母敢希燕喜之榮倘推老吾老幼吾幼之心當無中不中才不才之間曲憐臭味俾托帡幪待我不以衆人倘少垂於冀盻因主可以信客竊自激於懦衷邁字貫之興化仙遊人理宗時輪對言君不可欺天臣不可欺君厚權臣而薄同氣為欺天之著帝為改容言者以他事劾去改通判漳州此啓是時作也賀林直院啓王邁楓陛疏榮槐㕔進直絲綸獨掌更無他學士之除簪紱一新咸賀老先生之遇繼有是詔居然即真切以詞命之出於禁林輕重實關於國體矧當多事屢驚夜響之鈴縧豈比平時卧看日移於磚影慰撫河北則大手筆可無於德裕調發關西則凡號令宜付之遜能起詔草若湧泉惟陸相始當於機務發德音如時雨必韋公乃福於生人求如在昔之前修庶可當上之遴選舉世所望非公其誰恭惟某官學力與天相融聲名無地可著筆有活法珠走於盤而不出於盤派接古文冰生於水而尤寒於水凡名山大川之偉觀與浮屠老子之靚居皆藻飾以雄詞盡膾炙於衆口帝謂琳琅散落至煩雷電之取將孰如琬琰編摩要與日星而爭耀乃攽天㫖寵畀冰銜吏部二百年之文已歸中禁瀛洲十八士之選皆避一頭比者演西鄙之恩言下中原之捷布脫略駢儷表裏詩書孤鳯凰倐爾一鳴頓驚衆聽飛龍馬為之增氣矧在班行佇看正閣老之名旋即陪台司之位某李蹊晚出蓮幕逺遊自聞渙號之攽實倍等倫之喜乘槎無便遙瞻仙嶺之浮鼇賀厦有心願附玉堂之喜鵲回史督相啓方嶽邊城分梱曾微赤羽之勞書殿通班忽峻紫宸之寵無因至此何德以堪豈有方辭大常伯之除而乃驟躋真學士之冠已控陳於免牘滋愧負於賀言伏念某本乏修能誤膺重寄敵敢窺邊而凌中夏端繇護塞之非人嫠不恤緯而憂宗周竊憤臨淮之多壘使當扆莫安於丙枕趣兵符亟下於庚牌如有老熊當道之威安得佛貍窺江之事興言及是厥咎安歸顧雖肆戮其鯨鯢抑已大驚於鴻雁慨煙火萬里之氣象幾不聊生撫山河兩戒之輿圖可為痛哭思欲自拘於司敗孰云荐被於贊書躐登麟趾之華愈重狐冰之懼兹遇某官潤澤以霖雨之手包涵於雲夢之胸以其介圭入覲於王自任天下之重得諸傅巖爰立作相每歎人材之難微如腹背之毛亦玷齒牙之論然端殿所以昭異數而大梱所以重中權顧惟何人敢當兹選某抗章之懇得請為期人欲天必從之諒無勤於再命波及君之餘也覬乃贊於一辭是謂玉成敢忘環報謝江樞密啓文天祥領祠宮之香火敢望彈冠掌册苑之丹鉛誤䝉推轂薦非由於識面事真可以語人頂踵銜私額手奏記切以觀逺臣以所主孟子以言進退之間遇大賢而相知韓公以為遭逢之盛蓋受恩非天下之所少而知已得君子之為難乃若初無左右之先容獨受門牆之隆遇以古道之相與尤人生之至榮伏念某才不逾人學未聞道雖家庭疇昔之教動欲行其本心然山林朴野之資知無補於當世執經而後承恩以來念景行在四海之達尊而科第非終身之能事頗欲自拔於常人之類庶幾無負於上帝之衷頃趨闕下之時適際江干之警主憂臣辱念我生之不時外阻內訌繄禍至之無日因撫躬而思奮遂投匭而獻言當時破腦而刳心何啻焦頭而爛額有倉卒等死之慮無毫髮近名之心六太息之陳豈曰賈生少年之過三十字之獻幸寬郇模東市之誅逮時事之既平滋人言之無據小體者戚其失措好事者髙其得名痛癢無知者以文采為賢操挾不正者以譁競為意匪躬之故俱莫諒于初心尚口乃窮嘆難行于直道既奉詞而竊祿專閉門而讀書未可與俗人言姑盡吾分內事不謂見知于長者遂勤延譽于諸公承明之廬著作之庭未嘗夢想寂寞之濱寬間之野遽沐寵光非華衮有一字之褒何弊帚增千金之重雖深慚於負乘然幸出於鈞陶永堅乃心欲報之德兹蓋伏遇某官清朝碩輔昭代真儒胸中括石渠東觀之藏海內仰天球河圖之瑞眷惟世道深屬我公整頓乾坤共屹江流之柱獻納日月入旋斗極之樞非徒耀不世之功名將有意太平之禮樂凡今小往大來之㑹多出前推後挽之功遂使疏庸例叨拔擢某敢不力持素節勉企前修稱彥博于都堂幸借郇公之譽薦仲淹于館職敢忘元獻之知謝閻學士啓袁桷東觀英游久欽諸老南州俚士獨守陳編念相望之逈然知無因而至爾何期銓鑒俾預薦揚惟清切之司存實作成於俊乂王言之制曰七史官之長有三風動四方必訓詞之溫雅詔垂萬世在書法之簡嚴維班馬之良不能繼獲麟之筆而燕許之體難以推倚馬之才藝不兩能物無全美筆則筆削則削非曲學之可為見所見聞所聞恐直情而難致古有斗米而作傳近多千金以致詞好惡成一己之私褒貶失當時之實掩長卷以竊歎抱遺經而自娛故魏收以輕薄寡才咸稱穢史王通雖隱淪不仕獨著元經方今偉績無前太平有象大禮略封禪之記純誠汰郊丘之儀聲教萬邦文質二代追皇猷創業之永傳丕基嗣服之初必屬鴻文以揚駿德彰施作繪極妙巧於羣工雜比成音合天和於衆耳拔犀之選非易聚毛之長亦難如桷者學不逮人志徒師古獻漢家三雍之頌庶或可能續周書王㑹之篇良非所任揆小材之雕鏤幸大冶之作成忘其顓䝉倍以踊躍兹蓋伏遇某官儒林冠冕文藪準繩桃李不言以成衆芳之春松柏後雕而貫四時之氣官僚慎簡載籍肇新爭名於朝難後來之居上修身以道匪平進以依流深虞同升之譏上辱大賢之舉幸相知於氣味迄無假於聲容桷敢不益勵討論上酬奬拔求識李雍之面當已有期效彈貢禹之冠不幾於贅因風輸感執筆寫情歲律云更神休所届庸致茵憑之禱密調鼎鼐之和袁桷字伯長慶元人為麗澤書院山長大德初閻復等薦為翰林國史院檢閲官四六法海卷六
