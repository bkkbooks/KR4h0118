body:
  text: 四六法海巻十一明王志堅編頭陀寺碑文王中葢聞挹朝夕之池者無以測其淺深仰蒼蒼之色者不足知其逺近況視聽之外若存若亡心行之表不生不滅者哉是以掩室摩竭用啟息言之津杜口毘邪以通得意之路然語彞倫者必求宗於九疇談陰陽者亦研幾於六位是故三才既辨識妙物之功萬象已陳悟太極之致言之不可以己其在兹乎然爻繫所筌窮於此域則稱謂所絶形乎彼岸矣彼岸者引之於有則髙謝四流推之於無則俯𢎞六度名言不得其性相隨迎不見其終始不可以學地知不可以意生及其涅盤之藴也夫幽谷無私有至斯響洪鐘虚受無來不應況法身圓對規矩㝠立一音稱物宫商潛運是以如來利見迦維託生王室憑五衍之軾拯溺逝川開八正之門大庇交喪於是𤣥闗幽鍵感而遂通遥源濬波酌而不竭行不捨之檀而施洽羣有唱無縁之慈而澤周萬物演勿照之明而鑒窮沙界導亡機之權而功濟塵刼時義逺矣能事畢矣然後拂衣雙樹脱履金沙惟恍惟惚不皦不昧莫繫於去來復歸於無物因斯而談則棲遑大千無為之寂不撓焚燎堅林不盡之靈無歇大矣哉正法既没象教陵夷穿鑿異端者以違方為得一順非辯偽者比微言於目論於是馬鳴幽讚龍樹虚求並振頽綱俱維絶紐蔭法雲於真際則火宅晨涼曜慧日於康衢則重昏夜曉故能使三十七品有樽俎之師九十六種無藩籬之固既而方廣東被教肄南移周魯二莊親昭夜景之鑒漢晉兩明並勒丹青之飾然後遺文間出列刹相望澄什結轍於山西林逺肩隨乎江左矣頭陀寺者沙門釋慧宗之所立也南則大川浩汗雲霞之所沃蕩北則層峰削成日月之所迴薄西眺城邑百雉紆餘東望平􅆏千里超忽信楚都之勝地也宗法師行潔珪璧擁錫來游以為宅生者縁業空則縁廢存軀者惑理勝則惑亡遂欲捨百齡於中身殉肌膚於猛鷙班荆蔭松者久之宋大明五年始立方丈茅茨以庇經象後軍長史江夏内史㑹稽孔府君諱覬為之薙草開林置經行之室安西將軍郢州刺史江安伯濟陽蔡使君諱興宗復為崇基表刹立禪誦之堂焉以法師景行大迦葉故以頭陀為稱首後有僧勤法師貞節苦心求仁養志纂脩堂宇未就而没髙軌難追藏舟易逺僧徒閴其無人榱椽毁而莫構可為長太息矣惟齊繼五帝洪名紐三王絶業祖武宗文之德昭升嚴配格天光表之功𢎞啟興復是以惟新舊物康濟多難步中雅頌驟合韶濩炎區九譯沙場一候粤在於建武焉乃詔西中郎將郢州刺史江夏王觀政藩維樹風江漢擇方城之令典酌龜蒙之故實政肅刑清於是乎在寧逺將軍長史江夏内史行事彭城劉府君諱諠智刄所遊日新月故道勝之韻虚往實歸以此寺業廢於已安功墜於幾立慨深覆簣悲同棄井因百姓之有餘閒天下之無事庀徒揆日各有司存於是民以悦來工以心競亘丘被陵因髙就逺層軒延袤上出雲霓飛閣逶迤下臨無地夕露為珠網朝霞為丹艧九衢之草千計四照之化萬品崖谷共清風泉相渙金姿實相永藉閒安息心了義終焉遊集法師釋曇珍業行淳脩理懷淵逺今屈知寺任永奉神居夫民勞事功既鏤文於鐘鼎言時稱代亦樹碑於宗廟世彌積而功宣身逾逺而名劭敢寓言於雕篆庶髣髴乎衆妙辭曰質判𤣥黄氣分清濁涉器千名含靈萬族淳源上𣲖澆風下黷愛流成海情塵為岳皇矣能仁撫期命世乃睠中土聿來迦衛奄有大千遂荒三界殷鑒四門幽求六嵗亦既成德妙盡無為帝獻方石天開渌池祥河輟水寳樹低枝通莊九折安步三危川靜波澄龍翔雲起耆山廣運給園多士金粟來儀文殊戾止應乾動寂順民終始法本不然今則無滅象正雖䦨希夷未缺於昭有齊式揚洪烈釋網更維𤣥津重枻惟此名區禪慧攸託倚據崇巖臨睨通壑溝池湘漢堆阜衡霍膴膴亭􅆏幽幽林薄媚茲邦后法流是挹氣茂三明情超六入眷言靈宇載懷興葺丹刻翬飛輪奐離立象設既闢睟容已安桂深冬燠松疎夏寒神足游息靈心往還勝幡西振貞石南刋梵語頭陀此云精進大迦葉于諸弟子中頭陀第一王巾字簡棲説文通釋以為王屮作空門文字須曾於宗教留心始得簡栖生平不詳於史傳觀其所作雖不可謂門外漢然亦僅入門而已自來以文字作佛事者唐有王摩詰梁敬之栁子厚宋有蘇氏兄弟黄魯直若王子安輩隔靴搔癢而已齊故安陸昭王碑文沈約公諱緬字景業南蘭陵人也稷􅆻身佐唐虞有大功於天地商武姬文所以膺圖受籙蕭曹扶翼漢祖滅秦項以寧亂魏氏時乘於前皇齊握符於後靈源與積石爭流神基與極天比峻祖宣皇帝雄材盛烈名葢當時考景皇帝含道居貞巻懷前代公含辰象之秀德體河岳之上靈氣藴風雲身負日月立行可模置言成範英華外發清明内昭天經地義之德因心必盡簡久逺大之方率由斯至挹其源者游泳而莫測懐其道者日用而不知昭昭若三辰之麗於天滔滔猶四瀆之紀於地六幽允洽一德無爽萬物仰之而彌髙千里不言而斯應若夫彈冠出仕之日登庸蒞事之年軍麾命服之序監督方部之數斯固國史之所詳今可得畧也水德方衰天命未改太祖龍躍俟時作鎮淮泗如仁夕愓之志中夜九迴龕世拯亂之情獨用懷抱深圖宻慮衆莫能窺公陪奉朝夕從容左右葢同王子洛濵之嵗實惟辟疆内侍之年起予聖懷發言中㫖始以文學游梁俄而入掌綸誥蘭桂有芬清暉自逺帝出於震日衣青光方軌茅社俾侯安陸受瑞析珪遂荒雲野式掌儲命帝難其人公以宗室羽儀允膺嘉選恊隆三善仰敷四德博望之苑載暉龍樓之門以峻獻替帷扆實掌喉脣奉待漏之書銜如絲之㫖前暉後光非止恒授公以宻戚上賢俄而奉職出納惟允劍璽增華伊昔帝唐九官咸事熊豹臨戭納言是司自此迄今其任無爽爰自近侍式贊權衡而皇情眷眷慮深求瘼姑蘇奥壤任切闗河都㑹殷負提封百萬全趙之袨服叢臺方此為劣臨淄之揮汗成雨曾何足稱乃鴻騫舊吳作守東楚𢎞義讓以朂君子振平惠以字小人撫同上德綏用中典疑獄得情而弗喜宿訟兩讓而同歸雖春申之大啟封疆鄧攸之緝熈氓庶不能尚也夏首藩要任重推轂衿帶中流地殷江漢南接衡巫風雲之路千里西通鄾鄧水陸之塗三七是惟形勝閫外莫先建麾作牧明德攸在乃暴以秋陽威以夏日澤無不漸螻蟻之穴靡遺明無不察容光之微必照由近而被逺自己而及物惠與八風俱翔德與五材並運逺無不懷邇無不肅邑居不聞夜吠之犬牧人不覩晨飲之羊譽表六條功最萬里還居近侍兼饗戎秩候府寄隆儲端任顯東西兩晉茲選特難羊琇願言而匪獲謝琰功髙而後至升降二宫令績斯俟禁旅尊嚴主器彌固禹穴神􅆏地埒分陜江左以來常逓斯任東渚鉅海南望秦稽淵藪胥萃雚蒲攸在貨殖之民千金比屋郛㙻之内雲幄萬家刑政繁舛舊難詳一南山羣盜未足云多渤海亂繩方斯易理公下車敷化風動神行誠恕既孚鉤距靡用不待赭汙之權而姦渠必翦無假里端之籍而惡子咸誅被以哀矜孚以信順南陽葦杖未足比其仁潁川時雨無以豐其澤公攬轡升車牧州典郡感達民祇非待期月老安少懷塗歌里詠莫不歡若親戚芬若椒蘭麾斾每反行悲道泣攀車卧轍之戀爭塗忘逺去思一借之情愈久彌結方城漢池南顧莫重北指崤潼平塗不過七百西接嶢武闗路曾不盈千蠻陬夷徼重山萬里小則俘民略畜大則攻城剽邑晉宋迄今有切民患烽鼔相望嵗時不息椎埋穿掘之黨阡陌成羣傲法侮吏之人曾莫禁禦累藩咸受其弊歴政所不能裁加以戎羯窺窬伺我邊隙北風未起馬首便以南向塞草未衰嚴城於焉早閉永明八載疆場大駭天子乃心北眷聽朝不怡揚斾漢南非公莫可於是驅馬原隰巻甲遄征威令首塗仁風載路軌躅清晏車徒不擾牛酒日至壺漿塞陌失義犬羊其來久矣徴賦嚴切唯利是求首鼠疆界災蠧彌廣公扇以㢘風孚以誠德盡任棠置水之情𢎞郭伋待期之信金如粟而弗覩馬如羊而靡入雛雉必懷豚魚不爽由是傾巢舉落望德如歸椎䯻髽首日拜門闗卉服滿塗夷歌成韻禮義既敷威刑具舉強民獷俗反志遷情風塵不起囹圄寂寞富商野次宿秉停菑蝝蝗弗起豺虎逺跡北狄懼威闗塞謐靜偵諜不敢東窺駝馬不敢南牧方欲振策燕趙席巻秦代陪龍駕於伊洛侍紫葢於咸陽而遘疾彌留歘焉大漸耕夫釋耒桑婦下機參請門衢並走羣望維永明九年夏五月三十日辛酉薨春秋三十有七城府颯然庶僚如霣男女老幼大臨街衢接響傳聲不踰時而達於四境夷羣戎落幽逺必至望城拊膺震動郛邑並求入奉靈襯藩司抑而弗許雖鄧訓致劈面之哀羊公深罷市之慕對而為言逺有慚德神駕東還號送踰境奉觴奠以望靈仰蒼天而自訴震響成雷盈塗咽水公臨危審正載貽話言楚囊之情惟幾而彌固衛魚之心身亡而意結二宫軫慟遐邇同哀贈侍中領衛將軍給鼓吹一部諡曰昭侯時皇上納麓在辰登庸伊始允副朝端兼掌屯衛聞凶哀震感絶移時因遘沈疴緜留氣序世祖日夜憂懷備盡寛譬勉膳禁哭中使相望上雖外順皇㫖内殷私痛獨居不御酒肉坐卧泣涕霑衣若此移年癯瘠改貌天倫之愛振古莫儔及俯膺天眷入纂絶業分命懿親台牧並建對繁弱以流涕望曲阜而含悲改贈司徒因諡為郡王禮也惟公少而英明長而𢎞潤風標秀舉清暉映世學徧書部特善𤣥言鞶帨之麗篆籀之則窮六義於懷抱究八體於毫端奕思之微秋儲無以競巧舊註言王之奕雖秋之儲精無以競其巧王伯原云儲當亦是善奕人取暌之妙流睇未足稱竒至公以奉上鳴謙以接下撫僚庶盡盛德之容交士林忘公侯之貴虚懷博納幽闗洞開宴語談笑情瀾不竭譽滿天下德冠生民葢百代之儀表千年之領袖曾不憖留梁摧奄及豈唯僑終蹇謝興謡輟相而已哉凡我僚舊均哀共戚怨天德之無厚痛棠陰之不留思所以克播遺塵敝之穹壤乃刋石圖徽寄情銘頌其辭曰天命𤣥鳥降而生商是開金運祚始玉筐三仁去國五曜入房亦白其馬侯服周王本枝𣲖别因菜命氏涉徐而東義均梁徙自茲以降懷青拖紫崇基巖巖長瀾濔濔惟聖造物龍飛天步載鼎載革有除有布髙皇赫矣仰膺乾顧景皇蒸哉實啟洪祚喬嶽峻峙命世興賢應期誕德絶後光前幾以成務覺在民先位非大寳爵乃上天爰始濯纓清猷濬發升降文陛逶迤魏闕惠露霑吳仁風扇越涉夏踰漢政成期月用簡必從日新為盛在上哀矜臨下莊敬草木不天昆蟲得性我有芳蘭民胥攸詠羣夷蠢蠢巖别嶂分傾山盡落其從如雲挈妻荷子負戴成羣迴首請吏曾何足云昔聞天道仁罔不遂彼蒼如何興山止簣四牡方馳六龍頓轡斯民曷仰邦國殄悴齊隕晏平行哭致禮趙徂昌國列邦揮涕況我君斯皇之介弟哀感徒庶慟興雲陛階毁留攅川汎歸軸競羞野奠爭攀去轂遵渚號追臨波望哭無絶終古惟蘭與菊塗由帝渚朱軒靡駕東首塋園即宫長夜逝川無待黄金難化鐘石徒刋芳猷永謝南史緬傳甚略并歴官亦多不載然大意皆同桐栢山金庭館碑銘沈約夫生靈為貴有識斯同道夭云及終天莫反故仙學之秘上聖攸尊啟玉笈之幽文貽金壇之妙訣駐景濛谷還光上枝吐吸烟霞變煉丹液出没無方升降自已下栖洞室上賔羣帝覩靈岳之驟啟見滄波之屢竭望𤣥洲而駿驅指蓬山而永騖芝葢三重駕螭龍之蜿蜒雲車萬乘載旗斾之逶迤此葢栖靈五嶽未暨夫三清者也若夫上𤣥奥逺言象斯絶金簡玉字之書𤣥霜綘雪之寳俗士所不能窺學徒不敢輕慕且禁誓嚴重志業艱劬自非天裏上才未易可擬自惟凡劣識鑒鮮方徒抱出俗之願而無致逺之力卑尚幽栖屏棄情累留愛巖壑託分魚鳥塗愈逺而靡倦年既老而不衰髙宗明皇帝以上聖之德結宗𤣥之念忘其菲薄曲賜提引末自夏汭固乞還山權憩汝南縣境固非息心之地聖主纉歴復蒙縶維永泰元年方遂初願遂逺出天台定居茲嶺所憩之山實惟桐栢實靈聖之下都五縣之餘地仰出星河上參倒景髙崖萬㳫邃澗千迴因髙建壇憑巖考室飾降神之宇置朝禮之地桐栢所在厥號金庭事昺靈圖因以名館聖上曲降幽情留信彌宻置道士十人用祈嘉祉約以不才首膺斯任永棄人羣竄景窮麓結懇志於𤣥都望霜容於雲路仰宣國靈介茲景福延吉祥於清廟納萬夀於神躬又願道無不懷澤無不至幽荒屈膝戎貊稽顙息鼔輟烽守在海外因此自勉兼遂微誠日久勤劬自強不已翹心屬念晚卧晨興餐正陽於停午念孔神於中夜將三芝而延佇飛九丹而晏息乘鳬輕舉留舄忘歸以茲丹􅍁表之𤣥極無曰在上日鑒非逺銘石靈館以旌厥心其辭曰道無不在若存若亡於惟上學理妙羣方用之日損言則非常儵焉靈化羽衣霓裳九重嶢屼三山璀璨日為車馬芝成宫觀虹旌拂月龍輈漸漢萬春方華千齡始旦伊余菲薄竊慕隠淪尋師講道結友問津東採震澤西遊漢濵依稀靈眷髣髴幽人帝明紹歴惟皇纂位屬心鼎湖脱屣神器降命凡底仰祈靈秘瞻彼髙山興言覆簣啟基桐柏厥號金庭喬峰迥峭擘漢分星臨雲置墠駕岳開欞􅤝塗蹇産林麓蔥青誰謂應逺神道微宻慶集宫闈祥流罕畢其久如地其恒如日夀同南山與天無卒更生變煉外示無功少君飛轉宻與神通因資假力輕舉騰空庶憑嘉誘永濟微躬唐人天台山桐柏觀頌云天台也桐柏也代謂之天台真謂之桐柏此兩者同體而異名又云桐柏山髙萬八千丈周旋八百里其山八重四面如一中有洞天即右弼王王子晉之所處也是之謂不死之鄉養真之境故立觀有初強名桐栢焉耳古觀荒廢故老相傳云葛仙翁始居此地而後有道之士往往因之壇址五六厥迹猶在司空徐州刺史侯安都德政碑徐陵巖巖天柱大矣周山之峰桓桓地軸壯哉崑崙之阜三光懸而不墜九土鎮以無疆承乾合德之君則天體元之后所以並咨四鎮咸建五臣業配蒼祗功成㝢縣至于流名雅頌著美風詩年代悠然寂寥無紀其能繼茲歌詠者司空侯使君乎自文昭武穆祚土開家濮水盛其衣簪滎波分其緒秩仁義之道夷門美于大梁儒雅之風司徒重于強漢自通人許劭託命于江湖髙士袁忠寄身于交越俱違建安之難獨處衡山之陽祖天資秀傑世載雄豪卓富擬于公侯班佃必于旌鼔父光禄大夫邑里開通德之門州鄉無抗禮之客自茫茫禹迹赫赫宗周家滅驪戎國亡夷羿我髙祖武皇帝迎河圖于浪泊括地象于炎州南興涿鹿之師北問共工之罪天生宰輔堯年致白虎之祥神賜英賢殷帝感蒼龍之傑公亦觀時佇聖嘯咤風雲跪開黄石之書髙詠𤣥池之野沈吟梁甫自比管仲之才惆悵莘郊久負伊生之歎自羯虜侵華羣蠻縱軼後􅆏桂部之地四戰五達之郊郡境賢豪將謀禦難長者僉論推公主盟義士雄民星羅霧集公既膺五聘方啟六韜率是驍徒仍開嶺嶠自大討瀟湘同茲樊酈下軍違命上策不宣敗我王師受拘勍盜大陳格於文祖咸秩具神率土依風羣靈稟朔公亦忠為令德天纂之謀吳帳斯開衛門無擁雖復季孫還魯隨武濟河國慶民歡相儔匪若即授使持節開府儀同三司丹陽尹昔光武不尤於馮異穆公深禮於孟明終報王官之師遂舉咸陽之地斯乃聖主之宏略而名臣之逺圖者焉皇帝以陶唐啟國致玉版于河宗顓頊承家佐金天于江水經綸草昧定鼎之業居多締構權輿斷鼇之功相半固以英聲馳于海外信義感于寰中主器攸歸當璧斯在公于是抗表長信清宫未央從億兆以同心引公卿而定䇿馳輕軒于軨轕奉待駕于中都七廟之基于焉永固萬邦之本由此克寧乃復進司空公南徐州刺史于是鎮之以清靜安之以惠和望杏敦耕瞻蒲勸穡室歌千耦家喜萬鍾陌上成陰桑中可詠春鶊始囀必具籠筐秋蟀載吟競鳴機杼或肅拜靈祀躬瞻舞雩去駕擁於風塵還旌阻於飄沐京坁嵗積非勞楚堰之泉倉廩年豐無用秦渠之水雖復東過小縣夏雨逐其輕輪南渡滄江秋濤弭其張葢固不得同年而語矣若夫聽採民訟昏曉必通召引軒櫺躬親辨決立受符於前案無留詣於後曹接務髙城之中非異甘棠之下欣欣美俗濟濟都塵以賈琮郭賀之風行建武永平之化於是州民散騎常侍王瑒等拜表宫闕請揚茲美化樹彼髙碑民欲天從允彰絲誥銘曰鬱鬱三象茫茫九州綿天慘沴浹地䖍劉赫矣髙祖爰清國讐元勲佐命力牧風侯亦既旋歸拜家有暉宫亭蠡浦奮翅髙飛電巻勍冦風行國威文身被髪作貢來綏我皇纂武攀號東序謁渭同周迎門惟吕流矢為暴攙搶斯舉喋喋蒼黎危危刀俎自我徂征妖氛克平爰驅大彘實翦長鯨北震巢浦南俘灌城青羌巻介赤狄迴兵蹈舞難踰歌謡靡宣曰我黎庶俱祈上𤣥山移兩越海變三田公為上相復倍斯年安都始興曲江人從陳武帝平侯景擒王僧辯有功與周文育討王琳同被獲賄守者得還帝不罪武帝崩議奉文帝又為殺衡陽王昌進爵清逺郡公後以驕恣賜死按安都武夫未必有善政此文殆曲筆耳頌德政而及其被獲後人決無此事矣隠居貞白先生陶君碑蕭綸夫夜光結緑非胠篋之恒珍逸羽翔鱗豈園池之近玩寧期心於逺大葢不知其所以然也是以潁陽髙蹈洗耳於唐朝漢陰貞栖滅迹於周代盛德風流有自來矣應期而曜質者其在茲乎先生名𢎞景字通明本冀州平陽人也其先自帝堯陶唐氏之後𦙍堯治冀州平陽故因居止龍馬見五色之符欽明表八彩之瑞光宅於天下允釐於庶職洪源夐逺系緒綿長漢興陶舍為髙祖右司馬子青翟位至丞相後至漢末南渡始居丹陽七世祖濬仕吳為鎮南將軍荆州刺史祖降宋南中郎參軍事父貞寳司徒建安王國侍郎並立履清約博涉文史先生含元精之和氣蓄陵飈之雅姿兼宣七善總脩九德行仁蹈義嶽峙淵渟牆仭無以覩清濁不能測道風與星漢同髙勝氣與烟霞共逺六嵗便解書能屬文七嵗讀孝經毛詩論語數萬言曼倩幼習典墳公幹少誦詩賦方之於古彼有多慙是以岐嶷流聲黄中著稱有鄉人得葛洪神仙傳見淮南八公諸仙事乃歎曰讀此書便使人有凌雲之氣於是寢興諷誦晨夜不輟年二十七為宜都王侍讀總知管記事牓道求賢焚林招士朝難其選是曰得人阮瑀之書記不足扶衡孫楚之才辭何以捧轂齊代好治宫室方脩苑囿青溪舊觀更就起築仍奏表上頌辭事兼美邁彼樂職之篇踰乎景福之製帝省覽久之益以為善除奉朝請恪居官次夙夜惟寅春朝秋請是棫樸者也先生本不希榮常欲辭退乃與親友書曰疇昔之意不願處人間年登四十志畢山藪今三十六矣時不我借知幾其神乎無為自苦明年遂拜表解職抽簪東都之外解組北山之陽同稷丘之栖真慕留侯之却粒便具舟檝永言東邁朝廷錫問時賢餞别祖以二疎招茲四皓超然輕舉異世同符爾乃杖䇿孤征游踐山嶽既而到于句容登於茅嶺以此地神仙之宫府靈異之栖託往不能返遂卜居焉先生曰夫子云隠居以求其志行義以達其道吾聞其語未見其人我今義通無復其一請同求志之業故自稱隠居亦猶穉川之抱朴士安之𤣥晏倚巖栖隠依林遁跡交柯結宇剗徑為門懸崖對溜悲吟灌木深壑絶峭組織煙霞枕石潄流水禽無撓採藥耦耕野獸不亂逍遥閒曠放浪陵山㗳然若喪確乎難拔屬齊末道消天命既否水鬬榖洛地震由辰先生靜思㝠數預識微兆於是近逺書問悉皆杜絶昔乃聞之夏甫今則見之先生我大梁休運應期受天明命三辰開朗四海寧謐先生奉表稱慶於是信問復通天監以來常有勅㫖供給藥餌不乏嵗時渥澤湛恩莫之與比先生七年暫游南嶽茲山也譬閬風之地軸若崑陵之天鎮八桂傍臨九純間設樹有琅玕草生車騎遺世獨往是用忘歸一十年有勅遣左右司徒惠明徴還先生茅山别給廨宇軒后之降精天老漢帝之致禮河宗況於茲日弗能尚也養志山阿多歴年所攝生既善㝠祥亦降猛獸不據魑魅莫逢庭無荆棘逺同闕里階吐神泉逕動闕於是羽人徘徊仙客上下鸞鳯游集芝英豐潤大造佛像爰及冩經起塔招僧備諸供養自誓道塲受菩薩法夢登七地又得嘉名具以啟聞蒙勅許可葛𤣥之夢見開士朱鸞之逺望尊儀何以擬茲通感疋此徴應以大同三年嵗次丙辰三月壬寅朔日癸丑告别年化春秋八十有一天子嗟惜儲皇軫悼有詔稱譽追贈中散大夫諡曰貞白先生禮也以其月十四日窆于丹陽郡句容縣雷平山若軒轅之塟衣冠如王喬之藏劍舄化於兹日可得偶焉先生器宇凝深思識精贍含章貞吉不脩㢘隅年將中夀匪踰於矩眉目疏朗儀貌鮮潔實亡勸沮多行德惠恡惜光景愛好墳籍篤志勵節白首彌至若乃淮南鴻寳之訣隴西地動之儀太乙遁甲之書九章歴象之術幼女銀鈎之敏允南風角之妙太倉素問之方中散琴操之法咸悉捜求莫不精詣爰及卞射荀棊蘇卜管筮一見便曉皆不用心張華之博物馬鈞之巧思劉向之知微葛洪之養性兼此數賢一人而已門人桓法闓等慕遥風於緱氏繪遺像於橋陽勒𤣥碑而相質騰絳霄之流芳乃為銘曰留舄表化棄劍凝神徘徊紫氣照耀丹鱗厥跡猶在餘風可遵誰其嗣此淵哉淑人髙行邁種盛德日新朗猶懸鏡鬱似貞筠身以𢎞道行不違仁昔游纓綬頡頏縉紳厭乎匡救勞彼問津亦既解組乃襲山巾逺尋丘壑髙蹈風塵情無緬世隠不隔真結宇依巖貞棲茂草水玉留年華精却老乃有令問兼斯夀考泉過危庭峰臨窈洞露凝蘭階雲生桂棟日斜欄席花落窻甕尚平未反王孫不旋海桑交易陵谷貿遷豐碑有樹遺烈無騫梁邵陵王綸字世調武帝第六子少聰潁博學善屬文尤工尺牘坐事再削爵土後得復封拜郢州刺史為西魏所攻見殺有集六巻陜州𢎞農郡五張寺經藏碑庾信葢聞如來說法萬萬恒沙菩薩轉輪生生世界豈直優波提舍祇夜脩多而已哉是以熈連禪河質多羅樹七處八㑹三清四説皮紙骨筆木葉山花象負之所未勝龍藏之所不盡雖復銀函東度金㲲南翻秦景遥傳竺蘭私記譬猶得海水之一珠不下崐山之片玉若夫法雲深藏師子雷音梵志往生聲聞説戒雪山羅漢之論鷲嶺菩提之法本無極際何可勝言𢎞農五張寺者南陽張元髙寓居此地昔者千金之族見徙五陵大姓之民移家六郡葢其流也元髙五子負荷遺訓離經辨志並是成名入室生光咸能顯德加以尊承慧業敬受法門兄弟同居共捨為寺伽藍肇建即以五張為名是知城居趙信仍名趙信之城殿入蕭何即號蕭何之殿加以象馬無恡衣裘是捨春園栁路變入禪林蠶月桑津迴成定水平與雖盛豈可獨擅二龍扶風最良不得專稱五馬寺主三藏大法師法映邑主洛州刺史張隆等財法行檀身心罄竭兼化鄉邑道俗數千敬造一功德輪見成三百餘部琅笈雲書金繩玉檢削蒸粟之簡裝酸棗之珠並入香城咸封禪閣坐堂伏檻羌非湘水之神緑房紫的足擬恭王之殿髙掌西望長河北臨鼎氣常浮爐烟咸起户牖寥廓吹萬龍門之風梁棟崢嶸落實河源之樹僧徒雲集不逺燉煌之城學侣相奔更合華陰之市兩陜昔分實基王化二陵今阻翻馳羽檄虞公屈産交亂風塵召伯甘棠凋零霜露雖復兼能共治未遣渡河之獸烽柝是警實擾移闗之民是以法王御世天人論道汲引四流周圓五怖故能調伏怨憎消除結縛法水津梁得無砥柱之難香山轍迹非復終南之險天子命我試守此邦墨突未黔孔席無暖纔臨都尉之境即有樓船之役既而南風不競北道言旋幕府既開邦君且止鄉俗耆老依然此别屬兹法事須余制文聊以課虚為銘云爾舍衛之國祇桓之園三明極地八㑹窮源連河競説勝辨爭論波提東度秪夜南翻非空即色離相無言達人止是獨悟重昏身雖繫馬心避騰猿禪棲却月義殿翔鵾迴風香葢反露珠幡西臨砥柱東背轘轅河鳴陽硤山嚮漢書響嚮通用蘇門翔禽歌囀流澗絃喧度河餘獸移闗舊村昔為畿服今成塞垣城疑廣武地似樓煩爟烽並照象馬單奔無鍾襲莒有雨圍原不資十方誰釋三怨風傾地柱火及天元銀鈎永固金牒長存封君馬首方事南蕃言從楊僕請謝劉昆周上柱國齊王憲神道碑庾信昔者軒皇受姓十有四人周室先封十有五國自爾承基纂胄保姓受氏雖復千年一聖終是百世同宗故知昔之東京既稱炎漢再受今之周厯即是酆都中興公諱憲字毘賀突恒州武川人也晉太康之世據有黄龍魏孝昌之初奄荒𤣥菟太祖以百二諸侯三分天下函谷先登鴻溝大定功業如此人臣以終公含章天挺命世誕生降太一之神下文昌之宿珠角擅竒山庭表德儀範清冷風神軒舉聳動廊廟光華城闕未逾齠齓已議論天下事人或曰是謂若木一枝旁蔭數國長河一直自然千里風飈欲逺光景將昇後魏二年封涪城縣開國公時年五嵗也虹蜺滿野是廢當途之髙鸑鷟鳴岐實始維新之命國家光宅受圖欽明秉厯大風初巻長沙始封周元年進爵安城郡公倉邑二千戸仍授使持節驃騎大將軍開府儀同三司開府同於馬駿秩擬六卿驃騎等於劉蒼位髙三事宗子維城彼多慙色武成二年授使持節大將軍都督益夀寧等二十四州諸軍事益州刺史改封齊國公食邑萬户公時年十有六王武子以上將開府未滿立年荀中郎為十州都督才踰弱冠方之於公已為老矣加復營丘負海齊桓公受脤之城岷山導江漢武帝求仙之地自非名陵孤竹聲振沉黎豈得南至穆陵西登積石幸無白虎之患寧待黄龍之盟卭筰畏威微盧仰德生為立廟刻石頌功成都有文翁之祀非謂生前漢陽有諸葛之碑止論身後比之今日豈可同年而語哉保定四年與大司馬蜀國公圍金墉城師臨洛浦則廣武營奔兵上邙山則河橋路斷八川風俗五方名利鐵市銅街風飛塵起天和元年徴還行雍牧公以日月之明威神其政漆沮既從荆岐即乂少陽用事路不喘牛仲秋以殷民無驚水二年拜大司馬仍理小冢宰營室殿軍器太監天官以邦國為基是司六典夏官以兵戈為主專謀七德是以器械填委既包吳漢之功宫殿崢嶸彌狀蕭何之法時以白露涼風務閑農隙督兵三萬出自宜陽拔伏龍之城平姚襄之壘馬陵削樹魏將路窮平陰聽烏齊師其遁天子冢弟禮絶羣公仁義所往事資道德建德元年進爵為王仍拜大冢宰姬旦封於曲阜不廢居中劉交國於彭陽無妨常從豈直周召二南並居師傅晉鄭兩國俱為卿士而已哉匈奴突於武川爟火通於灞上公述職巡御治兵朔方馬邑星飛龍城月動撓留犂出漢書匈奴傳一作滿桃非之酒經略不前失烟支之山下馬而去東隣逆命反道敗德囚箕子於塞庫羈文王於玉門天子將有孟津之師召公獨議公報以誕應天命克成厥勲昔者秦昭起師於蜀直問張儀晉武用兵於吳惟謀羊祜於是中軍無帥僉曰有歸五年拜上柱國元戎東討給王鐵騎二萬先襲太原斗建麾兵天離轉戰虎嘯風騰雲飛電掩林胡棗栗詎得充饑晉陽荻蒿何能拒防又加王精兵六萬長圍晉州然後六軍星陳萬騎雷動中權始及前茅已戰自爾即為前鋒横行入鄴觀彼車絓槐本馬驚旋濘積甲髙昆陽之城尸封塞富平之水莫不如彼建瓴同斯破竹一朝指揮六合大定是用光昭下武翼亮中都足以攄祖宗之宿憤解生民之怨讐方當待彼石閭部斯玉鼔經緯天地光華日月既而赤烏夾日黄熊入寢實沉無祀桑林不祭宣政元年六月二十八日薨春秋三十有四季友之亡魯可知矣齊喪子雅姜其危哉公器宇淹曠風神透逺璣鏡照臨山河容納置鐏待酌懸鍾聽叩聲動天下光照四隣武皇帝以介弟懿親特垂愛友而宻謀竒䇿加禮敬焉常謂左右曰孔子云自吾有囘門人日親其齊王之謂也用之作宰則萬方恊和用之撫軍則四表懾伏豈直皋繇為士國無不仁隨㑹為卿民無羣盜愛翫書籍敦崇禮樂管絃入耳則溪谷俱調文雅沿心則烟霞並韻養由百發落鴈吟猨應奉五行綈緗縹帙雍容舉止抑揚談論當世以為楷模搢紳以為軌範則少有壯志頗校兵書𤣥水降靈榖城授䇿飛風長栁月角星眉莫不吟誦在心撰成於手所著兵法凡有五巻六韜九法不用吳起舊書三令五申無勞孫武先誡可謂有忠孝焉有壯武焉不自驕務謙光下物宋人獻玉不貪為寳百成子髙守仁為富不謂以信致欺為善非樂天年不享嗚呼哀哉以某年月日塟于石安縣洪瀆川之里原隰悽愴埋於盛德幾年丘陵揺落藴於良才永矣乃為銘曰悠哉朔方逖矣窮陰山連鳥道地盡龜林重黎業大伯翳功深胄其積德必有君臨太祖撥亂喪君有君功迴地軸策動天文猶臨赤水尚復黄雲諸侯八百天下三分公之挺生實惟天假翠微神降文昌星下照于四國充于兩社舟檝江河棟梁華夏水涌詞鋒風飛文雅純深之性地極天經忠貞之道事感百靈君親惟一臣子惟寧忠泉出井孝笋生庭乃宰天官為國之輔是居上將為天之柱乃聖乃神惟文惟武策髙開闢威移雲雨九宫神略三術謨明天離轉陣月德迴兵黎陽水駭官渡山驚冀州既載東原底平溟海欲運弱木將危中峰岳斷半海鵬垂鳯沉丹穴龍亡黑陂臨淄廢市東武山移千齡萬古英聲在斯憲為宣帝所忌誣以逆殺之其子俱被誅此文皆諱之不知此文作于何年其云季友之亡魯可知矣齊喪子雅姜其危哉疑隋初時語也北史云憲死時年四十此云三十四周大將軍司馬裔碑庾信公諱裔字遵𦙍河内温人也昔顓頊之命始則南正司天重黎之後又以羲和掌厯夏陽適晉得隨㑹而同奔東海避秦與毛公而俱隠其後金行受命玉笥南遷帝系極於輿圖中朝至於江表曾祖楚之晉太傅録尚書揚州牧㑹稽文孝王之次子元顯之幼弟也元顯見害之後桓𤣥簒逆之初爰自齠齓客身屠釣河内道左抱劍長號代郡城前慟悲靈祭江淮志節之士汝潁風塵之客感激一言咸多依附既而雲生伏龜星出鯨魚太白經天蚩尤映野公乃收合餘燼泣血登陴臨武牢之闗據成􅆏之坂擁衆萬家歸於魏室魏明元皇帝遥授平南大將軍荆州刺史襲封瑯琊郡王尚河内公主命王承制從賔國之儀於時宋兵憑陵旗鼓侵逼虎牢不封金墉無援魏太武皇帝授王使持節侍中安南大將軍開府儀同三司給前後部鼔吹元戎啟行志雪寃恥登壇慷慨三軍掩泣黄河漕粟已出石門仕馬連旗將臨野坂既而雲中柝起代郡烽燃反斾南轅途窮北略贈征西大將軍都督梁益秦寧荆兖青豫郢洛十州諸軍事揚州牧司徒諡貞王祖金龍封瑯琊鎮西大將軍儀同三司吏部尚書贈司空諡康王父悦鎮南將軍豫州刺史漁陽莊侯以荆河刺舉時值亂離釁起蕭牆遂終非命公遺腹載誕流離冦逆複璧襁負深山擁樹程嬰之匿趙武從役家臣王成之藏李燮為傭酒市遭太夫人憂苫草墳塋以終灰燧形骸毁瘠逾於喪禮年十有五始幹家事楹前鑿柱即取遺書石上開松仍求故劍出身司徒府參軍除中堅將軍員外散騎常侍值魏室多難所在蜂起孟津以北無復封畿嵩山以南即為鋒鏑公建議脩武立柵温城函谷西封河橋北斷長亭籍馬並入武城百里租車咸輸温縣太祖文帝締構闗都經綸夷阻招攜以禮懷逺以德馬文淵之擇主去隴坁而歸身竇周公之入朝在河西而奉詔大統七年蒙授平東將軍北徐州刺史十年河内故義四千餘家願立忠誠須公衣錦乃授使持節領河内太守加前將軍懷州拓境兩鎮奔波栁泉轉戰三城授首十三年太祖召山東諸立義之將能率衆入闗者有加重賞公率先而至領户千室即以為封固辭不受其菽粟之賜或以指囷馬牛之賞將同量谷朝廷以華陽西極漢水東流數孟達之奔兵恠劉封之失䇿魏前元年移鎮漢中除白馬城主領華陽郡守昔稱導漾今聞上瀦烟沉火井雨歇雲門其年授大都督加散騎常侍柱國蜀國公開金牛之道通牧馬之闗公巻甲北塞懸車束馬遂得䇿預葭萌勲參綿竹封龍門縣開國子蒲州刺史仍領新州尋授使持節車騎大將軍儀同三司大中正隆周授圖天保大定以公才望仍為舊臣遂乃義深追逺恩隆繼絶即改封瑯琊縣公邑五百户仍遷驃騎大將軍開府儀同三司都督巴州諸軍事巴州刺史武成二年被勅赴援信州魚復道阻屢却岑彭荆門水急幾沈吳漢公乃月峽先登瞿唐直上天子以公操履忠勤儀刑亮直乃徴為大御伯尋轉大御正邑一千一百戶樞機近侍出納絲言所謂多識舊章殿中無雙者矣四年大軍東討公所領義衆先守枳闗授都督懷州諸軍事懷州刺史偃師張幕河陽牧馬雖接戰於富平已連營於官渡五年詔追還拜始州刺史更討信州賊山彰尋寳渝恃險峽路五尺絙釣纔通縣水三門橋飛齊渡既而風行草偃谷靜山空前後平十一城獲九千餘口馬歸平樂金輸水衡天和二年除信州刺史都督信州諸軍事朝發白帝暮宿江陵氣振巴丘之兵威警建平之戍五年遷潼州刺史益州柱國公降帝子之重鎮天井之星延閣擬於叢臺岷山方於代郡公仰稟雄謨參謀逺略故得身預舞陽之功位極長平之寵六年授使持節大將軍大都督西寧州諸軍事西寧州刺史方欲闗沬若徼牂牁見夜郎之候習昆彌之戰而飛鳶墮水馬援去而無歸金馬騁光王褒行而不反嗚呼哀哉七年正月十日薨春秋六十有五詔贈使持節大將軍懷邵汾晉州諸軍事懷州刺史夫人襄城公主魏獻帝之曾孫趙穆王之季女王姬肅恭褕翟禮典四教兢莊三星令淑有光隆慮之賢足表平陽之盛生則從夫以秩死則同穴以禮建德元年八月十二日合塟於武功三畤原大夫墓樹以柏諸侯墳髙於雉吁嗟滕公來居此里詔諡定公禮也公資忠履孝藴義懷仁直幹千尋澄波萬頃逢蒙射法力牧兵書星晨髙下之占風雨逢迎之氣故得師出以律天幸將軍者也至如官曹案牘未常煩壅戎馬交馳不妨餘裕足使四岳彌峻三台更明在朝四十一年身經一百餘戰凡任四郡歴八州未嘗以貨殖經懷去如始至渭南千畝之竹更懼盈滿池陽二頃之田常思止足身殁之日家無餘財素車白馬狹室﨑嶇黄腸𤣥甲堦庭仄陋有詔冬官為營寢室朱邑祭酹無所漢后是以賜金陳表妻子露立吳王為之開館嗚呼哀哉世子侃孝家忠國揚名顯親是以勒此豐碑懼從陵谷植之松柏不忍凋枯銘曰欽若厯象平秩寅賔少梁奔華地入咸秦族夷興馬書窮獲麟玉鏡云始金行乃構象浦通闗龍沙開候上糝石起河陽水鬭五馬南浮三星東宿太傳作牧奄有江沲司徒避亂承制荆河南勞推轂猶思枕戈龍禖被野蒼兕凌波莊侯季年禍機相接誕公遺嗣﨑嶇懷挾山竄趙武家藏李燮伍員道阻燕丹路遥南奔楚塞北避秦橋水流登隴寒風度遼有功都護則重嫖姚懷書上馬習禮從戎陣圖六甲兵占八風藏松寳劍射栁琱弓推誠賈復屈節㢘公八翼頻飛六條亟秉勇此仁義行茲寛猛持印山開沈黎盜靜取甲無丘均田不井懋功賜爵上將賞官軍中受詔塞外登壇方屠參合更鏖􅆏蘭渝川毒水􅈎道災氛地亡都尉灘悲使君谷寒無日山空足雲北風吹旐秋霖泣軍遣奠雙設銘旌兩布泌水同墳平陽合墓悲哀嗣子攀號靡訴慟甚風枝悲深霜露自此何世從斯幾年麒麟欲鬬華表中燃地形樓起松心葢圓茫茫丘壠代代英賢胡孝轅云曾祖楚之贈征西大將軍北史作征南四年大軍東討此保定四年也當脱保定二字天保二年除信州刺史周無天保年號當是天和之誤益州緜竹縣武都山淨惠寺碑王勃原夫帝機寥廓雲雷驅妙有之功正氣洪荒清濁構乾元之象融而為川瀆結而為山岳五城韜海接崑閬於大都八洞藏雲冠瀛州於巨闕造化之所偃薄靈谷之所啟處極緹油而縱觀詠頌寧殫出宇宙而髙尋風烟罕測是知玉巵無當遐荒非視聽之津金牓所存城闕盡江湖之致何必九蚪齊鶩直訪銀宫八駿長驅遥臨石室武都山惠淨寺者梁大清年中之所建也名山列岳之舊仙都福地之凑黄龍負匣著寳籍於經山紫鳯銜書蔭榮光於并絡須彌山頂仍開梵帝之宫如意山中即有經行之地爾其盤基跨險列嶂凴霄日月之所竄伏烟霞之所枕倚飛泉瀑溜蕩滌崩崖緑樹𤣥藤網羅丘壑飛塵作氣被萬吹於中巖帝琰司寒宅千霜於北谷丹梯碧洞杳㝠林岫之間桂廡松楹寂寞風塵之表是稱英鎮實瞰崇岡閭閻當四㑹之街城邑辨三分之地綿磎錦瀆下侵重巒玉阜銅陵旁分絶磴山川絡繹崩騰宇宙之心原隰縱横隠軫亭􅆏之勢頃以黄旗夜徙紫葢晨傾九服失圖三靈在疚姦臣躍馬據折坂而吟雲壯士聞雞擁陽闗而嘯雨岷峨失險化為鋒鏑之場江漢横流非復朝宗之國墠宇由其覆没法衆是以凋淪國家奄有帝圖削平天舋紫宸反照皇階即敘萬國順百靈朝幽顯再立華戎一揆燭龍韜景避堯日於幽都雲鵬斂翼候虞風於晏海以為軒階具美功窮望䘲之臺漢道兼𢎞力盡祈年之觀爰經寳地大啟祥宫撫香象而髙視鳴法螺而再唱龍坦淨土連帝道而重光鶴苑崇基脱皇居而首出況乎山積舊壤下鎮偏隅天帝遺墟上千躔次王舍城之宫闕白玉猶存給孤獨之園林黄金尚在法物由其大備盛德所以相尋株兵奉天藏之圖泉女獻山祇之籍離亭合榭因岸谷之髙低疊觀連房執岡巒之曲直丹崖反照畫拱相臨緑嶂斜烟雕簾閒出豐隆曉震次複霤而悽皇列缺晨奔望崇軒而愕眙千香寳樹自起風烟九乳仙鍾獨鳴霜雪銀龕佛影遥承鴈塔之花石壁經文下映龍宫之業虹生北澗即掛新幡鳯下東岑還栖舊刹若乃尋曲􅔍歴崇隈周行數里直上千仭蒼松蓄吹臨絶逕而疏寒黛篠防烟繞迴疆而結蔭春巖橘柚影入山堂秋壑芙蓉光浮水殿亦有山童採葛入丹竇而忘歸野老紆花向青溪而不返山神獻果送出菴園天女持花來遊淨國實杳㝠之秘訣託幽深之逸境豈直淮南桂樹暫得仙家江左桃源終迷故老而已爰有寛闍梨者俗姓楊氏其先華陰人也因官徙地家於緜竹山分太華水帶長汾州岳㑹同風雲感召𤣥經素論侍郎居八俊之英緑綬黄軒大尉列三台之首法師玉函降彩金瓶探色振八解之遥源踐三明之廣路靈機入證窮象載於初髫妙諦因心釋羊車於弱冠三千法界由廣位而出無明十二因縁自普濟而登彼岸𢎞宣誓願大拯沉黎揮覺劍而破邪山揚智燈而照昏室彌綸所被白馬盡於禺同權漸所開黄牛至于嶓冢䖍誠樂土憩影茲峰迺以貞觀九年於寺西院立七佛堂一僧舍星毫動牖月面分堦彩鳯御旒神龍負塔飛烟湧坐龕龕忉刹之天杳霧成臺樹樹菩提之果朝散大夫行縣令清河張楚親承妙業俯刋貞琰林宗有道伯喈無愧法師夙機少晤應變多竒玉山中斷瓊林下雜支道林之好事語黙方融釋惠逺之髙居風埃遂隔洎乎坐忘遺照返寂歸真城肆䬃然若空山黯而無色豈直巖枝泣血磵户摧梁而已哉縣令劉照彭城人也自碭山杖劍綰鳯厯於雲臺春郊授鉞嗣龍圖於白水玉壘三分之胄下雜公門金陵一霸之基旁參帝緒翠緌丹紱歴今古而先鳴人傑地靈冠山川而得雋君膺岳瀆之秀挺風雲之㑹昆溪劍鍔直照胸於疑楚澤珪璋潛周履行魯恭明德方昇漢輔之階潘岳能文且職河陽之縣仁徽可被闔境仰其風猷威德所加百城疊其霜彩尚迺康莊妙域光開不捨之壇舟檝愛河昭暢無生之業痛鷲林之殄瘁悲象教之榛蕪爰命緝興式光泉藪武蹊龍澗近分廬岳之圖金闕瑶臺更討瀛洲之記銘曰武都仙鎮靈墟粤域邑動香城山開淨國澗流百道峰雲五色谷暗藤斜山髙樹逼千楣鶴列萬拱星懸分林構趾接磴開㕓臨階竹樹遶棟風烟龕前惟石塔下秋泉緑崖疏逕青岑拒室霧道相縈烟房互出葉濃磎淨花深嶂宻鳥度難尋猨驚易失簷分石竇地絡金沙丹丘抗月碧洞棲霞松開野路桂列仙家仙鑪栢葉寳座蓮花砌因巖曲橋隨峰返果出天厨香來仙苑玉鑄疑啟曙金鐺照晚谷思鍾張山悲鐸逺閭閻踐勝銅墨髙情聲飛别邑望動專城懸金道肆刻石山楹千載之後于嗟令名益州德陽縣善寂寺碑王勃若夫玉繩髙曜分寳厯於皇階金牓洞開導璸暉於帝幄雖復蒼梧北望湖亞疑盈舜后之歌緑荇西浮江漢積文妃之頌未有激揚煩蔭栖妙果於香城揮發葢纒樹㝠基於淨域則紫房丹室猶居燬室之間朱紱瑶筐未出塵籠之際我國家鳯翔元氣駕黄幄而層飛龍躍太虚絶蒼根而止傃文皇帝以八才御厯光昇代野之榮文德后以十亂乘時恭贊塗山之業握仁王之寳鏡日月重光驅梵帝之金輪雷霆靜䘲湼槃甘露承眷而宵流般若靈音雜祥以晝引蛟臺蜃閣俄交震旦之墟月面星毫坐照毘邪之國善寂者葢舊寺之餘趾梁武帝之所建也爾其碧鷄仙宇分絶障於金堤石兔遥源控長江於玉峽封畿四㑹龍垌舍衛之壇里閈三分鹿野徑行之地泊蒼鵝上擊銅馬交馳祇園興版蕩之悲沙界積淪胥之痛火炎崑岳髙臺與鴈塔俱平水浸天街曲岸與㺅池共盡山川隠嶙空傳鷲嶺之基灌莽蕭條非復鶯林之樹武德伊始君子道亨正皇極而撫寰中登太階而臨天下函闗雲物更逢真聖之期井絡星辰重集㑹昌之運雖開基撥亂獄訟知歸而繼絶興亡經綸未暇先皇帝統業貞觀仰疑宸奉文物於三天布聲名於十地參羅上下充槖籥於襟懷八部神祇薦圖書於掌握皇寳降地花昇含生無昏墊之虞法衆有來蘇之望俄而往疑庭搆癘椒房穆卜六宫震恐三靈愕􅇇馳瑶展幣有聲於羣宗碧劑𤣥針無徴於衆術帝迺降監迴慮屏璧與珠追勝迹於靈闗事良縁於福地爰紆聖綍重啟禪宫峙璇刹於將傾鎮一作領銀繩於已絶絲綸既洽棟宇行周坤德用寧陰儀載朗於是林衡授矩周官詮揆日之工梓匠揮斤荆客練成風之巧重楹畫拱坐出天霄複樹文閨俛臨電宇顯慶中縣令蕭君道𢎞理鈎繩於日用憑藻繢於天成仙官之妙匠可尋盧舍之神模不墜琱落鶴翥洩珠網於星津綉桷蚪伸吐璿璫於月徑緑房丹鎖彩綴晴霞紫閣青疏光含薄霧春風瓊樹香飄席上之蘭秋水銀塘影數軒中之芰晨光轉卉翻寳宇之龍花溽露低枝蕩真文於貝葉天童潤色黄珉碧玉之壇海聖彌縫師子龍王之㑹建靈幢於厚夜珠飾年深懸法鼔于迷津規模嵗逺時又於佛堂東壁畫二聖僧丹青未畢大啟神光隣玉塵之崇輝發金龕之實相朱軒夕朗似遊明月之宫紺宇晨融若對流霞之闕由是岷英蜀秀攀講序以雲趨帶鷰裙鸞仰齋庭而霧合貪機大阻淨施旁流綺羅分解珮之因軒葢得捐金之所靈妃翳日捨翠幄於香筵仙客停雲落霓裳於寳地自非沖姿宻契景應潛周豈能照義祉於氤氲動𤣥機於肸蠁者也爰有上座𢎞一節並沉研符隠括仁棠凝妙律於神珠肅靈椒於寳印大昊奉檝截若海而横流風伯扶輪歴邪山而效駕騰燭龍於惠炬俯鏡重昏奏鳴鳯於天歌下清羣籟摩珍在握遥臨七寳之宫正覺為心俯闢三乘之路湛衢罇於忍地品藻雞園推水砥於言河扶持象化縣令宇文某河南人也帝隋尚書之元孫皇唐侍中之令子爾其虹旗萬里御六氣而鵬飜霜㦸千羣擁三州而鶚視帝葉皇枝之重對越乾坤金縢石匱之功光華宇宙公上流提慶中和毓祉見鍾鼎於南鄰奉軒寰於北闕雲姿月步下瑶澤而追風雪羽霞臨歴珠田而矯霧芳蘭公子即以地業髙人幽桂王孫即以琴樽待物敘徽猷於禮樂則俎豆縱横談賞契於林泉則烟霞咫尺自裁聲百里揆化雙川收武城之故事擇中牟之令典仁風易狎候丹籜於春晍惠化難經佇青鸞於曉墜疑山巨源之逺量嘯傲行藏謝太傅之髙風從容語黙縣丞王敬衣簪舊族孝友名家白虹緘抵鵲之光紫電蓄衝牛之氣七年髙秀拂曾漢以非遥六月雄圖繫長波而未逺鄉堅等少承榮緒中區勝族門稱東别之標地接西隅之嚮嚴君平之履道盛德家傳秦子整之談天風流代襲咸以為妙圖真諦事出於無名翠琰𤣥碑道凝於不朽弇州北跨猶疏騄驥之名文石東區尚勒元龜之頌況乎玉衣流慶事屬於仙幃金屋延祥福纒於梵宇爰求勝筆載記芳謡下官弱植少徒薄游多暇薜蘿人事空餘江海之心筆札神交尚有淵雲之氣相如謝病訪詩酒於臨卭丘也棲遲聽絃歌於單父羣公以道之存矣思傳記德之書下官以文在茲乎願展當仁之筆其詞曰蜀蒞疑東漸岷山西積月峽星橋勝金孕碧肸蠁靈兆丘墟梵迹鴈塔推基闕肅肅黄運英英文母配乾垂慶儀坤握矩寵照香城仁沾淨土爰光大壯聿求多祚青牛福地白鶴禪林重扃霧敞複殿雲深龕雕翠玉刹樹黄金龜鏡夕照鳯鐸晨吟蕙樓彌堅化臺出沒棟列長虹窻栖明月果脣周暎蓮眸閒發雨霽猴池烟生龍窟肅穆禪衆優游令宰方駕康衢連舟性海鷲岳增飾鷄林潤彩藻繪相尋丹青盡在我今懷矣窮路何長疑承風詠德展義陳詞百年心事千載風期東西南北栖遑幾時唐恒州刺史建昌公王公神道碑楊烱王氏之先代為佐命秦之霸也則王離滅楚國而三將連衡漢之興也則王陵誅項籍而五侯同拜南陽定命應圖䜟而作司空西晉聿興合謌謡而濟天下昔者伊尹伊陟但保乂於商朝太公桓公唯夾輔於周室蕭何之後居食禄而無聞鄧禹之孫在當塗而不嗣未有夏殷三統金木五遷冊命重光軒裳代襲則我瑯琊之郡有冠葢之里乎建昌之縣有公侯之子乎公諱義童字元稚其先瑯琊臨沂人也永嘉之末徙於江外皇運之始遷於五陵今為雍州萬年人也祖僧興齊㑹稽令梁安郡守南安縣開國侯禄位千石珪符五等營室迴於羽儀山河入於盟誓父方賖梁正閣主簿伏波將軍梁安郡守隋上儀同三司以惠和之性有文武之才伏波將軍從征等於馬援儀同三司開府均於鄧隲家餘積慶郡不乏賢代臨本州則元賔之父喜形於色繼為本守則張翕之子迎者如雲自齊國遜位於梁庭及隋人内禪於皇室夏禹之鼎寳命集於周朝御龍之家世禄歸於范氏公台階茂緒昴宿精靈五百嵗之賢才一千里之皇佐忠規武節學府詞林元方閨門敬其有德少游鄉里稱其善人實惟清廟之器是曰皇家之寳韻諧金石奏虞庭之八音德合珪璋列塗山之萬國黄河一曲之水莫測其源赤城千丈之巖未階其峻羣童忽聚綴帛而引旛旗父老相呼授履而傳兵法隋授左勲衛率非其好也漢東離拆海内風塵天子溺於膠船諸侯問於金鼎能扶天下之危者必據天下之安能除天下之憂者必享天下之樂我髙祖神堯皇帝就之如日望之如雲發三河之雷霆平四時之厯象武王之仗黄鉞一月臨於孟津髙帝之執朱旗五星㑹於東井公瞻烏于屋射隼於墉陳平則間行而去楚酈生則長揖而歸漢奉符繫組觀軹道之降王偃武脩文見山陽之散馬初拜車騎將軍稍遷右屯衛將軍録有功也考於周典崇德報功稽於春秋策勲舍爵車騎萬隊備涼土之羌戎衛軍千兵掌京師之屯禁于時天下初定邊方未輯二十八舍尚有吳越之妖氛一十三州猶積東南之殺氣武德四年詔公為江南道招尉使鼓瑟而送受命而行乘使者之輶車掌行人之旌節陸賈至於南海先責尉佗隨何入於九江即徴黥布詔除泉州都督封建昌縣男食邑三百户斗牛星象舜禹精靈境接東甌地隣南越言其寳利則瑇瑁珠璣叙其風俗則丹雞白犬公門容駟馬位列三刀防薏苡之譏嫌絶簡書之流謗豈直廣州清節酌貪泉於石門合浦神君返明珠於漲海貞觀三年詔除散騎常侍行果州刺史授期天帝肇跡人皇南充國之舊都西巖渠之古邑岡巒紛糾天彭雙闕而作門珠貝浮沉巴水三迴而成字公入參師友出居方伯金蟬右貂朱旗曲葢纔臨蜀郡即聞來暮之謌初踐益州已聽中和之樂七年詔遷銀青光禄大夫行恒州刺史西街畢昴北岳恒山天開太一之官地列并州之鎮境分靈夀魏將樂羊之所封邑對行唐趙王惠文之所築公政成朞月風行萬里鄧晨一郡漢帝稱為主人李廣數年匈奴號為飛將行嘗計日郭伋不負於童兒郡異中平王觀無私於任子既導德而齊禮亦勝殘而去殺三禾在殿將拜鄭𢎞兩鴈隨車坐悲虞國享年若干以十五年冬十一月二十五日薨於洛陽之清化里公家傳將相世有忠貞屬離亂之𢎞多值風雷之草昧河宗兩日負鼎而謁成湯渭水七年垂釣而逢西伯將軍再命刺史三遷仲暠欒巴牧人之良翰龎參虞詡將帥之宏規立事於當年揚名於後代兄國卬榖州刺史弟國稀仁州刺史荆枝擢秀棣萼生光何止平輿之二龍是為賈家之三虎唐虞之際四岳分居趙魏之間八男為郡公雖勲參締搆位總班條金友玉昆良田廣宅而能吐食下士倒屣迎賔無笑客之美人有拜賔之童𨽻策名委質善始令終生當封侯克成丈夫之志死而可作無忘事君之道越十六年二月二日塟于伊闕縣之萬安山詔賜雜物百段給儀仗往還禮也亭連長樂城枕髙都守闕塞者汝寛適伊川者辛有北瞻洛汭尚想元凱之境東望邢山依然國僑之基夫人楊翟縣君河南禇氏即太常卿楊翟康侯亮之女中書令河南郡公遂良之妹也宋公子之流派褚先生之苗裔𢎞夫人之禮傳淑女之詩有文在手歸於魯國有鳯和鳴適於陳氏邑之石窌縣以封丘夫尊於朝妻貴於室仙人暫别初悲寡鶴之聲寳劍纔分終合雙龍之氣以某年月日薨於某所越某年月日袝建昌公之舊兆長子師本太穆神皇后挽襲即建昌公歴韓王府祭酒岐州司士參軍定州安喜縣令譽聞州里學富丘山以卿子而為郎以象賢而開國朝遊楚澤暮宿燕宫東臨石柱雍為積髙之地右㑹長星唐是中山之邑出遊隣國不以陪臣見朝上謁邦君不以屬官相待洛陽朝覲適見雙鳬東都暮田行悲駟馬以年月日終於某所越某年月日即陪塟於先兆次子師表左千牛備身遷尚輦直長歴許州臨頴博州堂巴滄州樂陵緜州萬安果州西充五縣令能傳祖業克嗣家聲有言偃之文章兼仲由之政事晨陪紫極繞鈎陳之六星旦奉黄麾屯玉車之千乘至若繁昌土宇魏文帝之墠壇堂邑隄封漢陳嬰之侯國河分九道渤海東臨江派五津崑崙北指莫不愛人以禮為政以德鍾離意之禁暴不用尺刀公孫述之有神能持五縣次子師𤣥嶲州都督府臺徴縣丞次子師楚夔州都督府雲安縣令芝蘭有秀羔鴈成行滇北數十尹莫大卭都之縣邑東七百里唯有巫山之峽言其縣職黄龍入於闕門叙其宰人鸞鳥翔於學舍咸能生盡其孝喪盡其哀積粟萬鍾思負米而何得榱題三尺泣吾親而不見卜其宅兆麟鳯匝其岡巒陳其簠簋春秋變其霜露思傳舊德式建豐碑戴安道作頌於鄭𤣥蔡伯喈披文於郭泰魏武王讀而稱妙非所望焉夏侯堪見而陋之固其宜也銘曰厥初兮后稷導生人兮知稼穡降及文王精翼日兮衣青光平東遷兮郟鄏晉上賔兮帝鄉秦三將兮繼代漢五侯兮克昌比琅山兮峻極等淮水兮靈長惟祖考兮鼎盛佩金璋兮疊映彼山川兮降靈生玉樹兮青青成張良兮昴宿乘傅説兮箕星出忠兮入孝武緯兮文經陳嘉謨兮制千里摛藻思兮掞天庭有隋兮喪亂土崩兮瓦散皇運兮權與人神兮攸贊值笙鏞兮變響屬天地兮貞觀河兩日兮事殷井五星兮歸漢帶長劍兮暐曄擁幡旌兮照爛周命兮惟新雲雷兮尚屯控東南兮荒景負江海兮未賔陳禮樂兮命使動輶車兮轔轔用虵符兮澤國頒武節兮山人專一方兮革面重九譯兮稱臣天垂兮星紀地連兮交趾山草樹兮潛移蜃樓臺兮鬱起遷合浦兮太守為廣州兮刺史臨漲海兮明珠飲石門兮貪水偘沖天兮八翼代出身兮萬里全蜀兮奥區枕卭笮兮倚巴渝有靈臺兮古跡有充國兮舊都豐貂兮左珥介士兮前驅濬三刀兮持節昌兩日兮剖符降鳴鳩兮大夏騁神馬兮長衢畢昴兮分野蘭堂兮四下漢皇帝兮國都耿將軍兮壇社若恒山兮詔鄧猶朔方兮命賈李北平兮漢飛郭并州兮竹馬瞻太階兮坐躡惜天年兮不假伊天姓兮潁川有美人兮嬋媛桂生兮因地女嫁兮因天見乘龍兮奕奕覩飛鳯兮翩翩知蘧瑗兮有禮笑虞丘兮未賢始銜悲兮晝哭終共盡兮千年卜龜謀兮習吉陳㫖酒兮嘉栗車徒儼兮在門旌斾紛兮竟術循洛橋兮南渡從國門兮右出樹蕭蕭兮有風雲慘慘兮無日指丘陵兮一閉與天地兮相畢悲孝子兮純深孰憂思兮可任訴髙天兮泣血蹐厚地兮崩心樹碑兮神道無媿兮詞林歴陽之都兮水没圓嶠之海兮山沉俾外孫兮幼婦生白玉兮黄金唐故中書令梁國公姚文貞公神道碑銘張説叙曰八柱承天髙明之位定四時成嵗亭育之功存畫為九州禹也堯享鴻名播時百榖棄也舜稱至德由此言之知人則哲非賢罔乂致君堯舜何代無人有唐元宰曰梁文貞公者位為帝之四輔才為國之六翮言為代之軌物行為人之師表葢維嶽降神應時閒出者也公諱崇字元之姚姓有虞之後逺自吳興近徙于陜今家洛陽焉烈考長沙文獻公樹勲王室建旟嶲府公紈綺而孤克廣前業激昻成學榮問日流武庫則矛㦸森然文房則禮樂盡在弱冠補孝敬挽郎又制舉高第歴佐濮鄭並有聲華入為司刑丞天授之際獄吏峻宻公持法無頗全活者衆進夏官員外郎郎中侍郎朝廷曰能遂掌軍國遷鳯閣侍郎監脩國史兼相王府長史始則天人讓王承置醴之顧終以飛龍利見延驂乘之恩自時厥後恒當大任凡三處兵部尚書三入中書令一為禮部尚書左庶子又肅政大夫總靈武軍兵馬又司僕卿知隴右監牧出典亳宋常越許申徐潞楊同十郡景雲初以藩邸舊僚封梁國公食賦百室公性仁恕行簡易虚懷汎愛而涇渭不雜真率徑盡而應變無窮常推是心以御於物故所蒞必甿庶風偃驁狠化從言不勵而教成政不威而事理去思覩頌來暮聞歌既登邦政卒乘輯睦及在宗伯神人允諧今之中書是為理本謀事兼於百揆綸道總於三台公執國之鈞金玉王度大渾順序休徴來臻懋德格天名遂身遜拜開府儀同三司崇其秩逸其志也初太夫人在堂公受職西掖頗限扄禁求侍晨昏優詔既許尋令還職公固請以泣制曰家有令弟足慰母心國有棟臣安可蹔闕其後剖符江表敦諭起復衰麻外墨欒棘内毁變禮中權誠識所貴神龍之首預聞興復疇其井賦累讓而停夫以革故鼎新大來小往得喪而不形於色進退而不失其正者鮮矣君子曰忠不忘親仁也哀不違事義也讓功辭邑禮也濟代全名智也仁以長人義以和下禮以安上智以周身宜其光輔四帝軒冕三紀池臺琴筑優游暮齒傳爵土於祚𦙍保禄位於終始矣享年七十有一開元九年九月寢疾薨于東都慈惠里皇上悼焉國人慕焉撫牀輟舂曾未云比制贈揚州大都督諡曰文貞禮也十年二月塟於萬安山之南原在疾也王人賜膳御醫視藥于薨也中使弔臨羽儀哀送君臣之義厚莫重焉子异子奕思綴遺美以寘罔極有詔掌文之官叙事盛德之老銘功將以寵宗臣揚英烈帝乃灑恩仙翰鏤澤豐䂥日月臨照於佳城烟雲變態於神道寳其文字别為羣玉之山禁其樵蘇即表三司之墓銘曰源深自虞派别從吳避地魯陜居家洛都神明逺契嶽瀆冥符翊聖斯偶生賢不孤仁將勇濟孝與忠俱學刄攢植文鋒迅驅纔安卑位即騁長途惟實惟有若虚若無再三軍國一二訏謨戎柄尤重王綸最樞兼司任切久政榮殊黼藻彌煥丹青靡渝以寛容物以鑑分區外或形放中恒禮拘箴雖誡口諍亦忘軀但覩渾璞誰詳瑾瑜伊皋尺寸管樂錙銖名正身遂言誠願孚方辭漢禄更辱齊組既積而散窮歡盡娱川歸東極日去西晡上惻旒扆旁悲路衢藍田美玉荔浦明珠載廣休慶爰𢎞典謨豐碑迺立盛業其鋪帝念頻軫仙毫特紆鐫金刻石鳯篆龍圖七耀光動三泉澤濡銓能叙事理鬱詞敷求舊銘實慙殫恧蕪緬思雲霧尚想江湖有道之德其何以踰延陵之墓空此嗚呼存殁終始遐哉邈乎小説載姚崇與張説有隙崇病戒諸子吾没後張必來弔汝具陳吾生平服玩張若不顧汝家族無類矣若顧當録致之仍以神道碑為請既獲其文登時録進先礱石以待至便鐫刻崇卒悉如其言不數日文成敘致該詳時謂極筆數日果遣使取本欲加刪改姚氏諸子引視碑仍告以奏御使者復命張悔恨曰死姚崇能筭生張說吾今日方知才之不及逺矣按姚崇以開元九年九月丁未卒于東都時張説在并州九月癸亥說進兵部尚書同中書門下三品時帝在長安説亦應至長安明年二月帝至東都則崇已塟矣未塟以前説無由赴弔既塟而弔去崇死已半年説在帝左右已三四月不應久不脩隙至碑文既成而後悔之也唐書通鑑俱不取此極有見冠軍大將軍郭知運神道碑張説四敘平分清秋之氣勁五方異俗崆峒之人武故隴上多豪山西出將其有雲龍感召星象特生金鼔登壇隠如敵國麾幢指塞自比長城得之於太原公矣公諱知運字逢時其先太原著姓今則晉昌人也本乎文武之弟是為虢叔虢或云郭因而氏焉自燕昭尊隗以築宫漢祖封亭以列國其侯于陽曲宅彼太原舊矣亭之𤣥孫友從太原徙隴西昭帝分隴西置平郭氏又為郡之右族友之昆孫武威太守憲憲之猶子散騎常侍芝其有名迹見於魏晉則晉昌諸宗散騎之後也爾乃一門連譽時人號曰三儒四海名齊天下謂之八顧光禄派分於馮翊廷尉世茂於潁川孝則天錫釡金忠則帝章冕服仁則猛獸不害信則童兒不欺豈但介休見有道之碑洛陽聞立德之傳而已曾祖欽𤓰州大黄府統軍上柱國祖才朝議郎𤓰州常樂縣令上柱國父師朝散大夫上柱國贈伊州刺史磧鹵之地戎馬生郊業戰鬬而𢎞勲仕州縣而為達啟莫京之繇福不在於其身積無聲之善慶必流於後嗣公太白之精雷泉之靈膺家之禎為國而生身長七尺力能扛鼎猿臂虎口虬鬚鶚瞬射穿九札劍敵萬人子卿路逢遥識將軍之相唐舉一見足辨封侯之骨解褐以善戰授昭武校尉秦州三度府左果毅以販狄北庭加游擊將軍沙州龍勒府折衝兼右金吾郎將瀚海軍副使尋改朝散大夫伊州長史伊吾副使以軍累破虜即授其州刺史進當軍經略使朝廷以未愜前除且有後命遷本衛中郎將仍舊為州軍使黙啜之冦北庭也公奔命解圍軍聲大振加雲麾將軍右府衛將軍封介休縣開國公食邑二千户開元二年吐蕃入隴右掠垌牧公兵以竒勝冦不復蹤積甲山齊而有餘牧馬谷量而未盡歸功廟筭朝議多之授羽林將軍持節隴西諸州節度大使兼鄯州都督河源軍使鎮西陲信國之藩屏坐北洛亦王之爪牙故入奉期門而出寄分閫於是料敵無備閒其師老潛軍一舉大俘九曲鎖甲文劒僰馬㹈牛既獻戎捷遂頒朝賜乃兼鴻臚卿攝御史中丞改封太原郡開國公加前食邑三千户執憲總軍典屬乘障增爵益邑遇厚恩深俄而六州羣胡相率大叛命公統隴右之騎濟河曲之師鋒鏑爭先玉石俱碎拜左武衛大將軍授一子官賜金銀器百事雜綵千段班師臨洮遘茲虐疾嗟呼匈奴未滅宿志不申生也有涯死而猶視開元九年十月二十二日薨於軍舍春秋五十有五蕃夷邊鎮血面椎心悲慘風雲號慟山谷豈非良將視人如子人亦視猶父乎皇帝閔焉詔贈京州都督米粟五百石錦帛五百段命都水使者張景佚備物護塟遵朝典也惟公氣猛而性和量寛而精鋭沉謀可以掩蓍蔡雄斷可以奪鬼神故常糟粕韜鈴芻狗風角然其樹恩結信立威用武烜赫如風濤震蕩如雷雨戰必克攻必取每有奏謁帝特稱歎孝文之得魏尚虜不足憂太祖之見郭嘉知成吾事前後錫錦衣寳帶文馬素女爛其盈門長鳴在廐感知己之主陳必死之力皇情西顧則九羌舋鼔詔書北伐則六狄焚旗上成聖君之𤣥鑒下効武臣之素節其竟也如此夫為人子立廟致敬祖考來格不亦孝乎為人臣恢疆禦侮以勞定國不亦忠乎若然者歸義方於先人揚令名於後代可也嗣子英傑起復定逺將軍左領軍衛翊府中郎將借紫服金章河西節度副大使英竒朝散大夫前尚輦奉御英恊游擊將軍前京兆勵行府右果毅都尉英彦朝議郎前左衛胄曹參軍等咸善居喪而過哀或從王事而奪禮則知辛賢父子繼位將軍祭彤兄弟並參戎律去本不戀達也而新是謀權也嘉此武功創其宅兆以十月七月塟我公太原夫人燉煌索氏袝焉禮也皇上念功以惜逝厚終以遇存有詔詞人為其碑誌介士送塟即封征虜之墳單于入朝當祭度遼之墓銘曰洸洸將軍雄略冠羣平西征北震戎懾獯亭障卧鼔屯田饋軍㐲此白刄致彼青雲郭侯讌喜既多受祉𤣥牡黼衣清廟蠲祀鼎食金奏炮鼈繪鯉既來不庭有嚴天子流沙博望羽林飛騎河曲迴兵臨洮舊防手握金節魂沉玉帳千里送喪三軍悽愴詔塟禮崇恩碑義豐生為神將死為鬼雄身世一滅榮華萬空祁連之墓長旌武功唐書本傳知運二子英傑英乂此文有三子而無乂歐公集古録亦疑此碑為燕公奉紹撰定不誤或即竒彦改名耳英乂代宗時貴幸為父請諡初議曰威為崔厦所駁改曰恭而唐書作諡威恐史書亦未可盡信撥川郡王神道碑張説珠玉無逺而登輦輅之飾寳也松秳無幽而入殿堂之搆材也物貴其用人亦如之撥川王論弓仁者源出於疋末城吐蕃賛普之王族也曾祖賛祖尊父陵代相蕃國號為東贊戎言謂宰曰論因而氏焉公有由余之深識日磾之先見陋偏荒之韋毳慕上國之衣冠聖厯二年以所統吐渾七千帳歸於我是嵗吐蕃大下公勒兵境上縱諜招之其吐渾以論家世恩又曰仁人東矣從之者七千人朝家大勲授左玉鈴衛將軍封酒泉郡開國公食邑二千戸國語曰犬戎樹敦國語作惇守終純固今其俗獷而輕死其法折而不撓故前代無降人中國無童僕自公之拔身向化首變華風澤潞之閒始見我州矣若夫河南胡苑坰牧所利每嵗冰合虜騎是虞中軍必謀於元老亞將固選於時傑神龍三年以為朔方軍前鋒遊奕使景雲二年換右驍衛將軍開元五年兼歸德州都督使皆如故八年遷本衛大將軍改朔方節度副大使公之理兵也堅三甲利五刄偶拳勇齊足力信賞罰分甘苦六轡如手千夫一心接獯獫猶蚊蚋卧沙塞猶袵席荐居露食垂二十年雨畢而成師冰泮而休卒寒氣入於肌骨夜霜入於鬚鬢人不堪其勤公不改其節韓公之建三城也公洗兵諾真之水刷馬草心之山以為外斥而叛徒安堵鄭卿之和黙啜也公授館李陵之臺致饗光禄之塞以為内侯而賔至如歸九姓之亂單于也公四月度磧過白檉林收火拔部帳納多真種落彌川滿野懷惠忘亡漠南諸軍韙其計也降户之叛河曲也公千騎奮擊萬虜奔走戡剪略定師旅方旋而延陁􅎤跌復相嘯聚上軍敗於青岡嶺元帥没於赤栁澗公越自新堡奔命冦塲贏糧之徒不滿五百兇醜四合衆寡萬倍公殺牛為壘噉虜為餉決命再宿衝潰重圍連兵躡踵千里轉戰全薛公於河外反知運於冦手朔方諸軍壯其戰矣研磨之奔也邀于黒山口覆其精鋭布思之背也追至紅桃帳掩其輜重乳洎之㑹刜蘭池之狂胡木盤之役縲右渠之逋冦凡前後大戰數十小戰數百筭無遺策兵有全聲是以六狄逃遁三垂乂寧聲暴露於天下業光華於世載信皇威之所加亦武臣之力也故錦衣寳玉允答戎功甲第良田丕承王命語其智効未甚優寵黄頭黒齒比價齊名積戰多瘡累勞生疹恩命尚藥馳往診之晉竪己深秦醫無及十一年四月十五日薨于位享年六十有六制贈為撥川王稱故國本其志也太常議諡曰忠由舊典昭其行也長子雲忠襲官封繼事業次子舊久特拜郎將十二年四月詔塟於京城之南懷逺人也大常鼔吹介士龍旂虎帳貂裘封犛殉馬吉凶之義舉夷夏之物備長安令總徒以護事鴻臚卿序賔以觀禮哀榮之道著矣君臣之義厚矣有命國史立碑表墓吾嘗同寮敢陳遺烈銘曰黄河接天青海殊壤舉世安裕拔俗誰敢倬哉論侯利有攸往奮飛横絶摶空直上以衆欵塞因敵立勲吐渾萬户吟嘯成羣精感天地氣合風雲既封酒泉乃位將軍朔方陰塞直彼獯虜帝命先鋒闞為虓虎山北加電漢南擊鼓數年之間耀國威武我有師旅將軍鞠之我有邊甿將軍育之栁澗亡師一劔復之蘭池叛胡三戰覆之武節方壯朝露不待王爵送終宿恩未改時來世往人亡物在銘勲諡忠以告四海自古中國威德行于四夷惟唐為盛漢與三代皆不及究其所以雖非一術而推誠番將實其大端如史所載阿史􅄼社爾契苾何力黒齒常之論弓仁及弓仁之孫惟貞其人才皆中國所罕即如此文所稱卧沙塞猶袵席夜霜入于鬚鬂中國之人還堪此否此實有志攘夷者所當知至于林甫將番一段公案因駕御失宜不可因噎廢食也六祖能禪師碑銘王維無有可捨是達有源無空可住是知空本離寂非動乘化用常在百法而無得周萬物而不殆鼔栧海師不知菩提之行散花天女能變聲聞之身則知法本不生因心起見見無可取法則常如世之至人有證於此得無漏不盡漏度有為非無為者其惟我曹溪禪師乎禪師俗姓盧氏某郡某縣人也名是虚假不生族姓之家法無中邊不居華夏之地善習表於兒戲利根發於童心不私其身臭味於耕桑之侣茍適其道羶行於蠻貊之鄉年若干事黄梅忍大師願竭其力即安於井臼素刳其心獲悟於稊稗每大師登座學衆盈庭中有三乘之根共聽一音之法禪師黙然受教曽不起予退省其私逈超無我其有猶懐渇鹿之想尚求飛鳥之跡香飯未消弊衣仍覆皆曰升堂入室測海窺天謂得黄帝之珠堪授法王之印大師心知獨得謙而不鳴天何言哉聖與仁豈敢子曰賜也吾與汝不如臨終遂宻授以祖師袈裟謂之曰物忌獨賢人惡出已予且死矣汝其行乎禪師遂懐寳迷邦銷聲異域衆生為淨土雜居止於編人世事是度門混農商於勞侣如此積十六載南海有印宗法師講涅槃經禪師聽於座下因問大義質以真乘既不能酬翻從請益乃歎曰化身菩薩在此色身肉眼凡夫願開惠眼遂領徒屬盡詣禪居奉為挂衣親自削髪於是大興法雨普灑客塵乃教人以忍曰忍者無生方得無我始於成初發心以為教首至於定無所入惠無所依大身過於十方本覺超於三世根塵不滅非色滅空行願無成即凡成聖舉足下足長在道場是心是情同歸性海商人告倦自息化城窮子無疑直開寳藏其有不植德本難入頓門妄繫空花之狂曾非惠日之咎常歎曰七寳布施等恒河沙億刼脩行盡大地墨不如無為之運無礙之慈𢎞濟四生大庇三有既而道德遍覆名聲普聞泉館卉服之人去聖歴刼塗身穿耳之國航海窮年皆願拭目於龍象之姿忘身於鯨鯢之口駢立於户外趺坐於床前林是旃檀更無雜樹花惟薝蔔不嗅餘香皆以實歸多離妄執九重延想萬里馳誠思布髪以奉迎願乂手而作禮則天太后孝和皇帝並勅書勸諭徴赴京城禪師子牟之心敢忘鳯闕逺公之足不過虎溪固以此辭竟不奉詔遂送百衲袈裟及錢帛等供養天王厚禮獻玉衣於幻人女后宿因施金錢於化佛尚德貴物異代同符至某載月日忽謂門人曰吾將行矣俄而異香滿室白虹屬地飯食訖而敷坐沐洛畢而更衣彈指不留水流燈焰全身永謝薪盡火滅山崩川竭鳥哭猿啼諸人唱言人無眼目列郡慟哭世且空虚某月日遷神於曹溪安坐於某所擇吉祥之地不待青烏變功德之林皆成白鶴嗚呼大師至性淳一天姿貞素百福成相衆妙㑹心經行晏息皆在正受談笑語言曾無戲論故能五天重跡百越稽首脩蛇雄虺毒螫之氣銷跳殳彎弓猜悍之風變畋漁悉罷蠱酖知非多絶羶腥効桑門之食悉弃罟網襲稻田之衣永惟浮圖之法實助皇王之化弟子曰神㑹遇師於晚景聞道於中年廣量出於凡心利智踰於宿學雖末後供樂最上乘先師所明有類獻珠之顧世人未識猶多抱玉之悲謂余知道以頌見託偈曰五藴本空六塵非有終生倒計不知正受蓮花承足楊枝生肘曷離身心孰為休咎至人達觀與佛齊功無心捨有何處依空不著三界徒勞八風以兹利智遂與宗通愍彼偏方不聞正法俯同惡類將興善業教忍斷嗔脩慈捨獵世界一花祖宗六葉大開寳藏明示衣珠本源常在妄轍遂殊過動不動離俱不俱吾道如是道豈在吾道遍四生常依六趣有漏聖智無義章句六十二種一百八喻悉無所得應如是住舊唐書本傳云維兄弟俱奉佛居常蔬食不衣文綵得宋之問藍田别墅在輞口輞水周于舍下別漲竹洲花塢與道友裴迪浮舟往來彈琹賦詩嘯咏終日在京師日飯十數名僧以𤣥談為樂齋中無所有惟茶鐺藥臼經案繩床而己退朝之後焚香獨坐以禪誦為事妻亡不再娶三十年孤居一室屏絶塵累臨終與親故書多敦厲奉佛脩心之㫖捨筆而絶按公著作如與魏居士書胡居士諸詩及此碑皆見地超絶宜其去來自在乃爾非鸚鵡禪所可髣髴也此碑實不減子厚作以四六叙事至執役槽厰混跡獵夫一一皆冩出豈非化工手唐故特進贈開府儀同三司揚州大都督南府君睢陽廟碑栁宗元急病讓夷義之先臧文仲曰賢者急病讓夷夷平也圖國忘死貞之大利合而動乃市賈之相求恩加而感則報施之常道睢陽所以不階王命横絶凶威超千祀而挺生奮百代而特立者也時惟南公天與拳勇神資機智藝窮百中豪出千人不遇興詞鬱尨眉之都尉數竒見惜挫猨臂之將軍天寳末冦劇憑陵隳突河華天旋虧斗極之位地圮積狐狸之穴親賢在庭子駿陳謩以佐命元老用武夷甫委師而勸進惟公與南陽張公巡髙陽許公逺義氣懸合訏謀大同誓鳩武旅以遏横潰裂裳而千里來應左袒而一呼皆至柱厲不知而死難狼瞫見黜而奔師忠謀朗然萬夫齊力公以推讓且專奮擊為馬軍兵馬使出戰則羣校同強入守而百雉齊固初據雍丘謂非要害將保江淮之臣庶通南北之奏復拔我義類扼于睢陽前後捕斬要遮凶氣連沮漢兵已絶守疏勒而彌堅虜騎雖強頓盱眙而不進賊徒乃棄疾于我悉衆合圍技雖窮于九攻志益專于三板偪陽懸布之勁汧城鑿穴之竒息意牽牛羞鄭師之大臨甘心易子鄙宋臣之病告諸侯環顧而莫救國命阻絶而無歸以有盡之疲人敵無己之强冦公乃躍馬潰圍馳出萬衆抵賀蘭進明乞師進明乃張樂侑食以好聘待之公曰敝邑父子相食而君辱以燕禮獨何心歟乃自噬其指曰噉此足矣遂慟哭而返即死孤城首碎秦庭終懵無衣之賦身離楚野徒傷帶劍之辭至德三年十月城陷遇害無傅燮之歎息有周苛之慷慨聞義能徙果其初心烈士抗詞痛臧洪之同日直臣致憤惜蔡恭于累旬朝廷加贈特進揚州大都督定功為第一等與張氏許氏並立廟睢陽嵗時致祭男在襁褓皆受顯秩賜之土田塟刻鮑信之形陵圖龎德之狀納官其子見勾踐之心羽林字孤知孝武之志舉門闗于周典徴印綬于漢儀王猷以光寵錫斯備於戲睢陽之事不唯以能死為勇善守為功所以出竒以恥敵立慬以怒冦慬音謹勇也立慬出列子俾其專力于東南而去備于西北力專則堅城必陷備去則天討可行是故即城陷之辰為尅敵之日世徒知力保于江淮而不知功靖乎醜虜論者或未之思歟公諱霽雲字某范陽人有子曰承嗣七嵗為婺州别駕賜緋魚袋歴施涪二州服忠思孝無替負荷懼祠宇久逺德音不形願斵堅石假辭紀美惟公信以許其友剛以固其志仁以殘其肌勇以振其氣忠以摧其敵烈以死其事出乎内者合于貞行乎外者貫于義是其所以奮百代而超千祀者矣其志不亦宜乎廟貌斯存碑表攸託洛陽城下思鄉之夢儻來麒麟閣中即圖之詞可繼銘曰貞以圖國義惟急病臨難忘身見危致命漢寵死事周崇死政烈烈南公忠出其性控扼地利奮揚兵柄東護吴楚西臨周鄭婪婪羣凶害氣彌盛長蛇封豕踊躍不定屹彼睢陽制其要領横潰不流疾風斯勁梯衝外舞缶穴中偵鈐馬非艱析骸猶競浩浩烈士不聞濟師兵食殱焉守逾三時公奮其勇單車載馳投軀無告噬指而歸力窮就執猶抗其辭圭璧可碎堅貞不虧冦力東盡兇威西恧恧女六切孤城既拔渠魁受戮雷霆之誅由我而速巢穴之固由我而覆江漢淮湖羣生咸育倬焉勲烈孰與齊躅天子震悼陟是元功旌褒有加命秩斯崇位尊九牧禮視三公建兹祠宇式是形容牲牢伊碩黍稷伊豐䖍䖍孝嗣望慕無窮刋碑河滸萬古英風柱厲叔事莒敖公自以為不知已去居海上及公有難乃往死之曰以醜後世之人主不知其臣者晉襄公縛秦囚使萊駒以戈斬之囚呼萊駒失戈狼瞫取戈斬囚遂以為右箕之役先軫黜之狼瞫怒及彭衙既陳以其屬馳秦師死焉此二事用于霽雲碑是子厚微意徐師川詩開元天寳中衮衮見諸公不聞張與許名在臺省中亦子厚指也三受降城碑銘吕温夏后氏遏洪水駈龍蛇能禦大菑以活黔首周文王城朔方逐獫狁能捍大患以安中區若非髙岸峻防重門擊柝雖有盛德曷觀成功然則持璿璣而弛張萬象昊穹之妙用扼勝勢以擒縱八極王者之宏圖道雖無外權則有備變化消息存乎其人三受降城皇唐之勝勢者也昔秦不量力北築長城右扼臨洮左馳碣石生人盡去不足乘障兩漢之後頽為荒丘退居河滸歴代莫進矯亡秦之弊則可矣盡中國之利則未然唐興因循未暇經啟有拂雲祠者在河之北地形雄坦控扼樞㑹虜伏其下以窺域中禱神觀兵然後入冦甲不及擐突如其來鯨一躍而吞舟虎數步而擇肉塞草落而邊甿懼河冰堅而羽檄走爰自受命至于中興國無寜嵗景龍二年黙啜強暴瀆鄰構怨掃境西伐漢南空虚朔方大總管韓國公張仁愿躡機而謀請築三城奪據其地跨大河以北嚮制胡馬之南牧中宗詔許横議不撓於是留及𤓰之戍斬姦命之卒六旬雷動三城岳立以拂雲祠為中城東西相去各四百里過朝那而北闢斥候迭望幾二千所損費億計減兵萬人分形以據同力而守東極于海西窮于天納陰山於寸眸拳大漢於一掌驚塵飛而烽火燿孤鴈起而刁斗鳴涉河而南門用晏閑韓公猶以為未也方將建大斾提金鼓馳神笇鞠虎旅看旄頭明滅與太白進退小則貢琛賮受厥角定保塞一隅之安大則倒狼居竭瀚海空苦塞萬里之野犬略方運元勲不集天其未使我唐無北顧之憂乎厥後賢愚迭任工拙異勢剛者黷武柔者敗律城隳險固冦得凌軼或駈馬飲河而去或控弦劘壘而旋吾知韓公不瞑目於地下矣今天子誕敷文徳茂育羣生戢兵和親北狄右袵然而軍志有受降如敵大易有安不忘危崇墉言言其可弛柝亦宜鎮以元老授之廟勝俾述舊職而恢遺功外勤撫綏内謹經略使其來不敢仰視去不敢反顧永讋猛氣無生禍心聳威馴恩禽息荒外安固萬代術何加焉敢勒銘城隅庻復隍而光烈不昧銘曰韓侯受命志在朔易北方之強制以全策亘漢横塞掲茲雄壁如三鬬龍躍出大澤並分襟帶各閉風雷俯視陰山仰看昭回一夫登陴萬里洞開日晏秋盡纎塵不來時惟韓侯方運神妙觀釁則動乃誅乃弔廓乎窮荒盡日所照天乎未贊不䇿清廟我聖耀德罷扃北門優而柔之用息元元曷若皃守推亡固存于襄于夷永裕後昆三受降城皆在黄河北岸今河套之北也中城南直朔方安北都護府在焉東城在勝州之北西城在豐城之北此唐史註也宋初曰中城南直朔方西城南直靈武東城南直榆闗宋白曰東城本漢雲中郡地中城本漢五原郡地西城本漢臨河縣地三説微有不同如宋白所考則東受降當與大同相近去黄河逺矣或者漢雲中郡地廣西接榆闗非止大同府境也大抵漢築朔方守在河南唐築三城守在河北今河南已為虜巢矣況河北乎右榖山筆麈故太子少保贈尚書左僕射京兆韋府君神道碑吕温山之大者匿峰巒含氣象積髙無倪而不見其險孕粹有物而不知其神此其所以為大也德之全者毁圭方黜皎厲靈機宻運而智不驚愚遐標特立而迹無變俗此其所以為全也然則太山髙而可陟全徳近而難知我求其倫見之於少師公矣公諱某字某京兆杜陵人其先帝堯光宅讓徳儲慶建國命氏列于夏商相胄卿族繁于漢魏代濟不殞煥焉盛門大王父諱某皇朝主客郎中萊濟商三州刺史王父諱某倉部郎中太原少尹贈秘書監烈考諱某檢校都官郎中嶺南節度行軍司馬贈同州刺史或以瑚璉之器纔施郡政或以巖廊之姿僅及戎佐與時俱息從道而汚屈不試於當年啟莫京於身後公生而岐嶷弱而老成渾粹不散清明虚映朱絃遺音而宫商自韻大圭不琢而符彩溢發邈矣天爵爛乎人文鼓鍾之聲日逺卿典之譽來逼釋褐太子正字與仲弟正卿以賢良偕徴策入異等冥鴻雙舉當代榮之授髙陵主簿遷監察御史改殿中内供奉東都留守判官即拜東臺殿中侍御史參畫惟允持繩不囘河洛之間風聲尚在德宗躬決庶政本於尚書責成曹郎綜練材實薦出方伯時超貳卿二十年間斯為極選公由是前後遷刑部吏部員外郎吏部郎中奏議推美彌綸成績南宫之故事存焉于時戡復日近勲勤者衆都市惰游盡垂金組邦畿豪奪半賜丹書輕禽逸於疎網悍馬駭於柔轡上思懲抑必假良能公由是前後歴奉天長安二縣令仁護鰥惸智鈐豪右輿人之遺詠在焉望由實濟任以望重選曹未幾遷給事中既居駁正之司不撓當官之論屬東南嵗歉俾乂惟難出為常州刺史天寳之後中原釋耒輦越而衣漕吳而食一隅重困五紀于兹公臨之清貞結以忠恕固存惠寡務嗇勤分一法以去其侵漁多方以備其災患以逸道而使繕完允濟以與道而取賦入先期聲聞天朝考績連最轉蘇州刺史二境之閒百里而近靈源自出殊派其清膏澤所霑異壤同潤下車朞月報政如初加秩賜金借留累嵗無何彭沛䘮師兵驕地偪安危所繫朝論難之乃以公檢校秘書監兼御史中丞賜紫金魚袋充徐泗節度行軍司馬重其威望將委旄鉞而未命程伯徐方之軌既同不見賈生宣室之徴遽至擢吏部侍郎倫品甄明通簡節適勢有探湯之熱我以靜濯衆有鼔簧之喧我以心聽馴致其美闇然日彰不求無失職之人人自以為不失職矣輟拜京兆尹德刑交脩寛猛相濟匪設鈎距物無遁情匪曜鋒鋩機無滯斷浩穰之理不肅而成不求無不欺之吏吏自以為不能欺矣俄改太子賔客辭劇就閑圖南之勢一息選德求舊居東之命惟重遷檢校工部尚書兼御史大夫充東都留守東都畿汝州都防禦使自盜起幽陵兵屯諸夏涉淮而北軍國異容分陜以東古今殊寄公講信脩睦外張保釐之政完備訓戎内寓折衝之令矛㦸不露德耀藹然遐邇頓首以承風強暴革心而知懼今上嗣統就加檢校吏部尚書方入諧僉屬毘贊大化不幸嬰疾表求退頤優詔除太子少保冀其休復將有後命神祇竟昧藥禱無真以元和元年三月十二日薨於東都履信里之私第享年六十有四寵贈尚書左僕射輤車西歸制使賻弔太常褒議諡曰某公哀榮備矣夫人河東裴氏侍中耀卿之孫給事中􅆏之女德門鍾美淑問充塞蕣華早落蓍兆叶期即以是年五月二十一日合塟于萬年縣髙平鄉少陵原禮也公孝悌天至行有餘力仁義性德匪俟服膺不飾表以近明每縱心而中矩清虚簡淡而應物不倦通曠夷易而及門無雜不尚意氣而然諾篤志不好臧否而鑒識超倫與故相國齊江西映穆宣州贊贊弟侍御史員為文章道義之友可以視其所親矣今吏部郎中扶風竇羣抗迹毗陵退身進道公三揖郡榻之上一振天墀之下不數嵗閒蔚為重器可以視其所舉矣分正東郊開府辟土則有今右司郎中燉煌段平仲倉部員外郎安定皇甫鎛禮部員外郎清河張賈京兆尹韋嗣隴西李景儉中山衞中行平陽路隨皆羣彦之秀出一時之髙選可以觀其所任矣加以志尚幽逺冥捜好古所居第必有松石之致退公暇日常以圖籍自娱一字愜心金玉不顧片言同趣布褐無閒亹亹然若見道之所存陶陶然不知嵗之云晏於戲䇿名從事四十餘年朋友罕聞得䘮之言家人莫見喜愠之色坦懐以處推分而行無怨於人人亦無怨無猜於物物亦無猜履信順以優游保福禄而終始其名教之大雅者歟有九子長曰元貿前常州義興縣尉次曰榖前邠州司倉次曰璋鄉貢進士能脩詞立誠克家致美茂揚風訓休有令問其次某某等皆殊資異識登於童齒慶善之餘也以某獲窺牆仭見託篆述究賢人之業信而無媿申孝子之志直而不文其詞曰利建于商介圭作寳爰立于漢緇衣改造克昌厥亂奕世載考亞尹擅名郎中懷道莫躋貴仕莫享難老藴靈儲休以啟少保不顯少保其德愔愔有綽遐姿曠哉靈襟顯仁山立藏用淵沉煦如冬陽藹若春陰白圭三復克保明心黄鍾九變莫匪和音靜專動直謙進柔克冝踐公輔以楨王國促路頓軌中天墜翼少陵右原拱樹寒色窮壤可弊唯名不失金石垂之以慰罔極碑文不著韋名考竇羣傳云蘇州刺史韋夏卿薦之不召後夏卿入為京兆尹復言之德宗入為左拾遺合之此碑其為夏卿無疑但竇羣皇甫鎛非佳士化光為羣所厚故稱之非公論也靈機宻運二語世豈有斯人其惟聖人乎幽州紀聖功碑銘李德裕幽州盧龍軍帥檢校左僕射張公仲武往年脩獻捷之禮今嵗有銘勲之請二者君子韙之豈不以諸矦有四夷之功獻其戎捷春秋舊典也宗周納肅慎之貢銘於楛矢天子令德也斯可以為元侯表可以為後代法聖上嘉其動而中禮乃命宰臣採其元功傳於惇史臣德裕敢颺言曰夫兵者所以除暴害也愛人則惡其為害禁暴則惡其為亂雖叡智不殺化之以神至德允懷招之以禮然書有猾夏之戒傳有脩刑之訓虞舜四罪乃成大功文王一怒以至無侮非德教之助歟仁聖文武章天成功神德明道大孝皇帝熈我文典煥乎光明極象外之微臻於至道鼔天下之動致於中和慮必鉤深退而藏宻故能神幾獨照成未兆之謀威光逺震制不羈之虜當其時也烽燧迭警羽書狎至人心大揺羣師沮氣皇帝以軒后之威神漢髙之大略光武之雄斷魏祖之機權合而用之以定王業此議臣所以不敢望於清光也倬哉天地應而品物生君臣應而功業成故龍躍而雲從鶴鳴而子和方叔伐獫狁蠻荆來威安逺擊車師西域震服宜有良將殿于朔邊張公禮悦戰器書成傳癖張仲孝友子孺塞泉流落不耦光景未耀明主雅聞竒志持印而拜將軍遥推赤心築壇而命元帥拔自雄武授之薊門果能精誠奮發䇿慮偪臆千里獻籌一心憂國則知龍顔善將任人傑而不疑日角好謀歎敵國而強意迴鶻者本北狄之裔也或曰獯狁或曰山戎五帝所不能臣三王所不能制前史載之悉矣暨薛延陀之敗也酋帥吐迷度率衆欵塞太宗幸靈武納降立迴鶻部落置瀚海都督因我封殖遂雄北方肅宗之戡内難也葉護以射鵰之士親扈戎旌亦由羌髳率師以翼周北貊梟騎以助漢既滅大憝乃疇厥功特拜葉護司空嵗贈繒二萬匹厥後飾宗女以配之立宫室以居之其在京師也滛祠雲構甲第棊布棟宇輪奐衣冠縞素交利者風偃挾邪者景附其翎侯貴種則被我文繢帶我金犀悦和音厭珍膳蝎蠧上國百有餘年既而桀驁無親天命不祐僭侈極欲神道惡盈本國荐饑畜産耗半黠戞斯因利乘便遂焚龍庭墟落蕭條陰燐青熒今之烏介可汗亡逃失國竊號沙漠非我策命自為假王其來也羡漫陰山睥睨髙闕𤣥塞之下氛霧蔽天質貴主以前驅依大國而求援或丐我米􅖲救其饑人或邀我甲兵復其故地外雖柔服内有桀心因行人致辭徴呼韓故亊願居光禄塞急保受降城其下有二部曰赤心宰相那頡啜特勒赤心者天性忿鷙戎馬尤盛初與名王嗢没斯首謀内附俄而負力怙氣潛圖厲階為嗢没斯所紿誘以俱謁可汗戮於帳下其衆大潰東逼漁陽上乃賜公璽書授以方略公以室韋悍亟之兵近我邊鄙俾其偵邏且禦内侵尋以徴役不供為虜所敗由是介馬數萬連亘幽陵伏精甲於松樠布穹廬於磧鹵散若飛鳥止如長雲火燎于原不可嚮邇公激義氣以虹貫發精誠而右開竒計兵權宻授髦儁乃命介弟仲至與禆將游奉寰王如清左敵萬李君慶張自榮高守素李志操率鋭兵三萬建斾而前介冑雪照戈矛林植命以義殉壯由師直聲隆隆而未洩欲逐逐而不食戢以聽命嚴而有威公曰險道傾仄且馳且射胡兵所以無敵也致之平原勒以方陣我師可以逞志也於是據于莽平環以武剛首尾虵伸左右翼張輕騎既合竒鋒横騖如摧枯株如搏畜兔攝讋者弗取陸梁者皆仆虜矦王貴人計以千數然後盡羅服聽悉數系纍谷靜山空靡有孑遺橐駞駃騠風澤而散旃檀羅幕布野畢收馬牛幾至於谷量虜血殆同於川決徑路寳刀祭天金人竒貨珍器不可殫論乃命從事李周曈馳傳上奏又命牙門將國從玘繼獻戎俘皇帝受而勞之羣臣畢賀昔長平七徑驃騎六舉竇憲合氐羌之衆陳湯檻城郭之兵或生靈減耗士馬痡傷邀功救罪矯命專征然猶告類上帝薦功清廟顧視二漢不其恧歟以公威動蠻貊功在漏刻因命公為東面招撫迴鶻使先是奚契丹皆有虜使監護其國責以嵗遺且為漢諜自迴鶻嘯聚靡不鴟張公命禆將石公緒等諭意兩部戮迴鶻八百人雖介子討罪於龜兹班超行誅於鄯善未足儔也迴鶻又遣宣門將軍等四十七人詭辭結歡潛伺邊隙公宻賂其下盡得陰謀且欲馳入五原大敺雜虜公逗留其使緩彼師期竟得人病馬瘏縮衂而退挫鋭解紛繄公善計今烏介自絶皇澤莫敢近邊并丁令以圖安依康居而求活盡死餘種屈意黑車寄託逺遁流離饑凍黒車亦倚其威重迫脇諸戎造謀籍兵解仇交質自謂約賷深入漢將取而未期渡幕輕留王師往而非利公以壯猷逺御長計羈縻不媮避嫌之便終盡致敵之術將時動而得儁豈嵗數而勝微矧乎明主仗將帥為爪牙視戎狄為鼠彘方獵猛敵不翫細娱非周宣無以成召虎之勲非漢宣無以聽營平之計朂哉上將光我中興公前後受降三萬人特勒二人可汗泲一人都督外宰相四人其他禆王騎將不可備載王褒以日遂歸德稱為人瑞班固以稽落蕩冦大振天聲孰若天子神武百蠻震慴乘其蹙困臨以兵鋒刈單于之旗納休屠之附非萬里之伐無三年之勤巍乎成功輝焯後代宜刻金石以揚鴻休銘曰大和之初赤氣宵興開成之末彤雲暮凝異鳥南來胡滅之徴北夷飈掃厥國土崩逼迫遷徙震我邊鄙長蛇云穴奔鯨失水上郡薊門兵連千里曾不畏天猶為驕子丐我邊榖邀我王師假我一城建彼幡旗歸計強漢郅支嫚辭狼顧朔野伏莽見羸鴈門之北羌戎雜處濈濈羣羊茫茫大鹵縱其梟騎驚我牧圉暴若犲狼疾如風雨皇赫斯怒羽檄徴兵謀而泉黙斷乃雷聲沈機變化動若神明沙漠之北虜無隠情漁陽突騎燕歌壯氣﨣﨣元戎眈眈虎視金鼓誓衆干旄蔽地爰命介弟屬之大事翩翩飛將董我三軍稟兄之制代帥之勤威畧火烈胡馬星分戈迴白日劔薄浮雲天街之北旄頭已落絶轡之野蚩尤未縛俾我元侯恢𢎞逺略取彼單于係之徽索陰山寢烽亭徼櫜弓萬里昆夷九譯而通蠻夷既同天子之功儒臣篆美刋石垂鴻平淮西碑于諸將相皆稱官稱名葢歸功主上自合如此此文以紀聖為題而篇中稱仲武為公非體也豈至此而藩鎮之勢愈重耶困學紀聞云唐五代之際以文紀事者多用故事而作史者因而舛謬囘鶻烏介可汗走保黑車子族李徳裕碑文云烏介并丁令以圖安依康居而求活所謂康居用漢書郅支事也而舊史云烏介依康居求活北漢鄭珙卒于契丹王保衡晉陽見聞録虜俗雖不飲酒如韋曜者亦加灌注韋曜即吴孫皓時韋昭也而路振九國志云髙祖鎮河東命韋曜北使曜不能飲酒虜人強之此殆類癡人説夢也按此一段讀四六文者不可不知附録于此周故大將軍豳國公墓銘庾信公諱廣字乾歸邵惠公之元孫豳孝公之長子若木拂日長虵委天龍圖幕河之光神鼎連雲之氣六辯搆字五運徴祥是以維嶽降神自天生德凝脂㸃漆日角珠庭為子則名髙五都為臣則光照千里華葢中天之峰未階其峻虞淵浴日之水不盡其源嵗在琱車年方竹馬月中桂樹切問能訓石上木生懸思即悟年十一孝公薨㷀㷀在疚孺慕過禮泉驚孝水竹動寒林三行克宣八翼斯舉大周建國宗子維城設壝封人分司典命開國天水郡公食邑二千户元年授使持節驃騎大將軍開府儀同三司其年四月授都督秦州刺史孝公久牧汧隴遺愛在人今茲見撫我君之子豈獨司𨽻之臺鮑宣累葉丞相之府韋賢重代二年拜大將軍方衛青之張幕冊重元勲譬韓信之登壇榮髙獨拜武成元年遷都督興梁等十九州諸軍事梁州刺史嶓冢導漾乃濟漢之東流蔡蒙旅平實華陽之西極其年九月改封蔡國公食邑萬户地接韓城闗隣楚鄣戶封八縣恩深冦恂之功邑啟萬家事極曹參之賞保定元年授小司冦犴户苔生囹闗籥動載酒屬車幸無寃氣觀囚軍府或聽鳴琴二年轉守蒲城都督潼闗等六防諸軍事其年閏月遷都督秦渭等十二州諸軍事秦州刺史公亟牧冀城頻藩隴坻豪傑斂手貪殘解印加以上谷精兵漁陽噪鼓北臨髙栁南望長榆匈奴下馬之山貴相藏酒之谷莫不逺慕威聲遥承風化二年奉詔向甘州迎皇后有文書手仲子之歸紀裂繻來卿為君逆自非名髙絶國威被和鄰豈得稱族而行尊君之命四年授柱國大將軍昭陽以功髙見用項梁以名將當官以今方之彼有慙德天和三年授都督陜虞等八州甘防諸軍事陜州刺史屈産垂棘既有滅虢之兵王官羈馬非無絶秦之路公以正正鼔旗閑閑車軌服叛威邊筭無遺䇿但以中外久勞積斯災疾山川則並走羣望賔客則諸矦在門是以請謁承明言歸湯沐方詢夏郊之祀或辯桑林之崇更除秦州刺史仍襲父爵豳國公分流之嶺未登晚塞之城空望太夫人以公羸瘠悲泣相守胸氣交衝奄捐館舍公頓伏苫寢水漿不入雖王人勸奪瘡鉅愈増母死於子子死於親慈孝之道一朝總集大漸之辰春秋二十有九四闗罷市三軍行哭言尋聽訟猶見寒棠還顧空營唯餘衰栁諡贈某官禮也六年六月歸塟於秦州之某原𤣥甲啟路追軫驃騎之功龍旂贈行深悼東平之逺公亮直惟忠温恭惟孝居之仁義飾以禮樂風神機警聰叡精明有仭於宫牆無形於喜愠金版玉䇿之記枕籍忘疲蘭葉芝花之圖膏映必舉碣石秋雲昭陽落月思風含臆言泉流吻翩翩書記則阮瑀陳琳荏荏風流則王濛謝尚語其百發弓絶於猿吟論其百中劒深於鴈陣枚乘之望梁苑不憚棄官樂毅之求燕路無辭千里至如應變將略雷電立成帷帳謀猷孫吳闇合有品藻人理之志有清平天下之心鵬路忽摧龍津逐壅嗚呼哀哉大宰早茂三荆長辭萬始撫養遺孤連枝同氣馬援之誡兄子義存謹飭王況之事世叔情深愛敬同德比義此之謂乎乃為銘曰御乾從紀乘離作聖白環讓徳𤣥珪受命平一地紐増輝天鏡傍廕數國前臨七政地屬先登時逢下武玉璜撥亂金縢光輔衛晉承家邢茅胙土波分建木派流𤣥滬景命寅敘徽猷淵塞忠有令圖孝為全德山節蒞政桓珪守國瀚海將臨燕山行勒平樂髙晏金華説經論儒璧水親禮明庭相風待賦承露須銘乘舟向日䇿馬隨星德舉克明能賢允淑上將授脤元戎推轂趙失東漁胡亡南牧箭下遼城泥封函谷衮衣頻露丹襜亟巻約法情推繁辭理遣盜烏懸察疑蛇立辯人共官園家同野繭薾雲推景轉風落仭星裂中台山傾左鎮夏楹舍爵殷階啟殯縿幕躐行明旍庭引秦川直望隴水分飛山河滿目容衛靈歸陵圖石馬車畫衮衣小山揺落長林變衰悽愴原隰荒涼宅兆樹宻人稀山多路少十里松城千年華表夜臺方寂窮泉無曉周書豳國公廣大祖長兄顥之孫周大將軍懷德公吳明徹墓誌庾信公諱明徹字通昭兖州秦郡人也西都列國長沙王功被山河東京貴臣大司空名髙霄漢豈直西河有守智足抗秦建平有城威能動晉而己也祖尚南譙太守父樹右軍將軍抗拒淮沂平夷濟漯代為名將見於斯矣公志氣縱横風情倜儻圮橋取履早見兵書竹林逢援偏知劒術故得勇爵登朝材官入選起家東宫直後除左軍葛瞻始嗣兵戈仍遭蜀滅陸機纔論功業即值吴亡公之在梁未為達也自梁受終齊卿得政禮樂征伐咸歸舜後是以威加四海徳教諸矦蕭索烟雲光華日月公以明略佐時雄圖贊務鱗翼更張風飈遂逺冠軍矦之用兵未必師古武安君之養士能得人心擬於其倫公之謂矣為左衛將軍尋遷鎮軍丹陽尹北軍中候總政六師河南京尹冠冕百郡文武是寄公無愧焉瀟湘之役憑陵島嶼風船火艦周瑜有赤壁之兵葢舳襜艫魏齊有横江之戰仍為平南將軍開府儀同三司都督湘衡桂武四州刺史遂得左廣迴扃轔車反暢長沙楚鐵更入兵欄洞浦藏犀還輸甲庫雖復戎歌屢凱軍幕猶張淮南望廷尉之囚合淝稱將軍之冦莫不失穴驚巢沉水陷火為使持節侍中司空車騎大將軍都督南北兖青譙五州諸軍事南兖州刺史南平郡開國公食邑八千戶鼔吹一部中台在𤣥武之宫上將列文昌之宿髙蟬臨鬢吟鷺陪軒平陽之邑萬家臨菑之馬千駟坐則玉案推食行則中分麾下生平若此功業是焉既而金精氣壯師出有名石鼓聲髙兵交可逺故得艫舳所臨葢於淮泗旌旗所襲奄有龜蒙魏將已奔猶書馬陵之樹齊師其遁空望平陰之烏俄而南仲出車方叔蒞止暢轂文茵鈎膺鞗革遂以天道在北南風不競昔者禆將失律衛將軍於是待罪中軍爭濟荀桓子於焉受戮心之憂矣胡以事君宣政元年届於東都之亭有詔釋其鸞鑣蠲其釁社始𢎞就館之禮即受登壇之䇿拜持節大將軍懷德郡開國公邑二千戶歸平津之館時聞櫪馬之嘶舍廣城之傳裁見諸侯之客亷頗眷戀寜聞更用之期李廣盤桓無復前驅之望霸陵醉尉侵辱可知東陵故侯生平已矣大象二年七月二十八日氣疾增暴奄然賔館春秋七十七即以其年八月十九日寄瘞於京兆萬年縣之東郊詔贈某官諡某禮也江東八千子弟從項籍而不歸海島五百軍人為田横而俱死焉嗚呼哀哉毛脩之埋於塞表流落不存陸平原敗於河橋死生慙恨反公孫之柩方且未期歸連尹之尸竟知何日遊魂羇旅足傷温序之心𤣥夜思歸終有蘇韶之夢遂使廣平之里永滯寃魂汝南之亭長聞夜哭嗚呼哀哉乃為銘曰九河宅上三江貢職彼美中邦君之封殖負才矜智乘危恃力浮磬戢鱗孤桐垂翼五兵早竭一鼔前衰移營減竈空幕禽飛羊皮詎贖畫馬何追荀罃永去隨㑹無歸存没俄頃光陰愴悽岳裂中台星空上將眷言妻子悠然亭障魂或可招喪何可望壯志沉淪雄圖埋没西隴足抵黄塵碎骨何處池臺誰家風月墳􅎬羇逺營魂流寓霸㟁無封平陵不樹壯士之隴將軍之墓何代何年還成武庫陳書大建九年司空吳明徹破周將梁士彦衆數萬于吕梁十年北討衆軍敗績于吕梁明徹及將卒己下並為周軍所獲又南史明徹窮蹙就執周封懷德郡公位大將軍以夏搆疾卒于長安後故吏盜其柩歸周趙國公夫人紇豆陵氏墓誌銘庾信夫人諱含生本姓竇扶風平陵人魏其朝議列侯則莫能抗禮安豐奉圖功臣則咸推上席外戚列傳既聞建武之書仲山古鼎或表單于之獻祖略少保建昌郡公父熾柱國大將軍大宗伯鄧國公孟津大誓常預同德之臣咸陽違約克贊先登之主並得位入六府功參八柄夫人有文在手有象應圖榮曜夙彰徽華早茂肅恭以禮受教於公宫言容以德有聞於師氏及乎進賢君子内主邯鄲琴瑟在堂輜軿是服長久於節不無秋菊之銘履端於始或有椒花之頌豈止莊姬掩笑楚相知慙定姜問兆齊兵不入武成二年冊拜趙國公夫人漢王聞立義之婦邑以延鄉齊侯見有禮之妻封之石窌異代同榮差無慙德柱國殿下居若木之一枝在天潢之别派揚旌玉壘驅傳銅陵南通向日之民東被無雷之國夫人從政月峽贊德雲門錦濯江波還臨織室山明石鏡即對粧樓既而玉律頻移金爐不變胡香四兩嗟西域之使稀靈草一枝恨瓊田之路絶天和五年四月二十二日薨於成都之錦城春秋二十孫子荆之傷逝怨起秋風潘安仁之悼亡悲深長簟況復仙臺永别無復簫聲傅母長歸唯留琴曲七年二月日歸塟於長安之洪瀆原詔贈趙國夫人禮也雲雨去來既留連於楚后光陰離合實惆悵於陳王銘曰河西斗絶觀津孤起章武賢臣安豐賢仕木樓千仭金山萬里紹慶邢姨基昌宋子施衿趙北待姆秦南絃綖禮數榆狄騑驂義超江氾仁流葛覃玉筐迎鷰金籠助蠶敬愛純深端莊淑問有光國史無形喜愠舉案外恭停機下訓馨馥於蘭年華於舜風雨消散神靈離絶婺女還星姮娥歸月左楹夕奠髙堂朝發空揚淩波更無迴雲下平曰隰髙平曰原西臨火井北望塞門猶垂雉服尚駕魚軒平原忽矣天道何言山迴地市路没滕城松悲鶴去草亂螢生新雲別起舊月孤明賢墳永式節隴常貞周書趙王招初封趙國公竇熾其先仕魏賜姓紇豆陵氏周儀同松滋公拓跋競夫人尉遲氏墓誌銘庾信夫人諱某河南洛陽人也祖父太師柱國公魏室喪亂經綸夷阻周朝建國匡翊揖讓圖諜帝系即有内外之親分裂山河仍為舅甥之國夫人容範端莊儀型淑令六義觀德南風有夫人之詩八卦成形東方有少女之位姆傅習言公宫教業箴管線纊佩帨􅉅蘭年十有二出適儀同拓跋競衣其翟服既得宗婦之儀乘其魚軒還從列國之禮標梅三實無闕其時夭桃九華能脩其政某年某月册拜迴洛縣君母金明公主魏文帝長女春則帝女採桑秋則王姬築館夫人出入主家遨遊戚里濯龍園苑長門宫殿既而膏腴美疢華茂傷年沉痼牀帷蒸離寒暑三世之術無乏於醫門百草之本徒窮於藥性建德三年五月七日亡春秋三十昔西河女子值九節之菖蒲東海婦人得三山之芝草無由再遇悲矣如何即以其年十月十五日塟於京兆之北陵原龜筮告辰丘陵啟奠西臨織女之廟南望湘妃之墳嗚呼哀哉乃為銘曰父曰帝師母曰王姬車服不繫江漢無思是生令淑觀禮敦詩聲超宋子德茂邢姨繼世盛德思賢克舉奠鴈迎門濡蘋實俎奉盥如事移茵即序春氷浴蠶秋機秉杼帝鄉近親帝城近臣濯龍親戚平陽主人金波迴月玉樹臨春弄玉鳯皇昌容紫草自此千年無人得道舜華榮曜飄零何早渭水北原平陵故園纔通谷口即望寒門吁嗟此地去矣歸魂孟冬十月長松九年親賔掩淚悽愴何言周書尉遲逈尚魏文帝女金明公主夫人逈之女了無意味之題冩得燦花相似真化工手也唐故邢國公李宻墓誌銘魏徴觀夫天造草昧之初有聖經綸之始原鹿逐而猶走瞻烏飛而未定必有異人間出命世挺生負問鼎之雄圖鬱拔山之壯氣控御英傑鞭撻區㝢志逸風飈勢傾海岳或一丸請封函谷或八千以割鴻溝夏殷資以興亡楚漢由其輕重懋功隳乎既立竒䇿敗于垂成仰龍門以摧鱗望天池而墜翼求之前載豈代有其人者哉公諱宻字𤣥邃隴西成紀人自種德降祉𢎞道垂風導碧海之長瀾竦閬峰之遥構家傳餘慶明哲繼軌諭文德則弼諧舜禹語武功則經綸秦漢其餘令望且公且侯垂翠緌拖鳴玉者葢亦耆舊未得盡傳良史莫能詳載矣曾祖弼周大師八柱國衛公祖曜周太保魏公父寛隋上柱國大將軍涼州總管蒲山郡公並匡周之美吕望愧其嘉謀平吳之功杜預慙其逺略公渥洼龍種丹穴鳯鶵降列象之𤣥精稟成形之秀氣雲生五色一日千里起家左親衛府東宫千牛備身趨馳武帳暉映廊廡出入龍樓光生道路隋文帝精華已竭義不斷恩始開凌長之源將致覆宗之禍公見機而作謝病言歸優游經史晦明藏用風塵靡雜賔友簡通交必一時之俊談必霸王之略尚書令景武公楊素崖岸峻峙天資宏亮壁立千仭直上萬尋嗣闗西之孔子追陜東之姬旦深謀逺鑒獨步當時公年甫弱冠時人未許景武一見風神稱其傑出乃命諸子從而友焉並結以始終之期申以死生之分暨有隋二世肆虐黔首三象霧塞五岳塵飛妖灾所臻匪唯血落星隕怨讟所動寜止石言鬼哭轍迹遍于天下徭戍窮于海外寃魂塞宇宙白骨蔽原野墳壟發掘城郭丘墟萬里蕭條人煙斷絶公與楚公叶契共拯横流未息溟海之波幾及昆岡之火亡自道中竄身草澤奮臂大呼羣雄嚮起豹變梁楚鳯翔鞏洛據敖庾而塞轘轅登太行而臨白馬九服諸侯四方豪傑或跨州連郡或稱帝圖王合從締交爭亡秦族者莫不驅兹青犢背彼黒山擊長轂以雷奔望髙旗而電集不期而㑹者以百千數遂大開幕府肇啟霸圖敷七德以宣威掩八紘而取俊鱗羽畢萃草澤無遺于是發人文以化之播仁義以乘之應時機以鼔之總羣䇿以決之九野風馳六合雷駭彈壓趙燕振驚江漢世充甚昆陽之敗煬帝同望夷之禍化及師殱于黎陽建德稽顙于河朔七國之地四為我有五都之所三在域中胡騎千羣長㦸百萬飲馬則河洛可竭作氣則嵩華自飛近無不懷逺無不肅聲溢寰宇威懾華夷屬人神乏主以天下為已任荒裔佇來蘇之望遺黎有息肩之所雖實下民伊賴然非上帝所臨壯志展于人謀雄圖屈于天命始先鳴于大樹終垂趐于羣孽乃眷西顧舉兹東夏載驅周道來謁承明帝曰念功降兹休命上柱國邢國公拜光禄卿公雖威未振主自為謀葢當世舊部先附多出其右故吏後來或居其上懷漁陽之憤憤恥從吳耿後列同淮陰之怏怏羞與絳灌為伍負其智勇頗不自安俄屬元帥秦王經營瀍洛亦親承祕策率卒先行既出鷄鳴之闗方次休牛之塞詔命施號更盡嘉謀公想雲夢之偽遊慮青衣之詐反心辭魏闕之下志在江湖之上慕范蠡之髙蹈追赤松之逺遊熊耳峰危羊腸徑險降吳不可歸蜀無路短兵既接修途已窮陰陵失道詎展拔山之力騅馬不逝徒切虞兮之歌臨陣喪元時年三十有七故吏上柱國黎陽總管曹國公徐世勣等表請收塟有詔許焉體質貞明機神警悟五行一覽半面十年雅善書劒尤精文史輕一夫之勇學萬人之敵至于三令五申之法七縱七擒之功出天入地之竒拔幟擁沙之䇿莫不動如神化應變無窮負縱横之才遇風雲之㑹望紫氣以驤首凌扶揺而振翮總不召之衆問獨夫之罪從我如流三分將二遂有囊括四海之志併吞六合之心既而神器有歸朝宗天闕率以從義之旅為勤王之師更名重自疑功髙是懼將逺遊以逃難飜途窮而及禍惜乎髙鳥未盡良弓遽折敵國猶梗謀臣已喪天子過細柳以興嗟聞鼔鼙而軫慮雅重事人之節方申詔塟之禮粤以武德二年某月日塟于黎陽山西南五里之平原禮也故吏徐世勣等或同嬰世網共涉難艱感意氣于一言託風雲于千載所恨並發唐代不列元凱之功俱為漢臣獨漏山河之誓是以慟深欒布悲甚向雄慮陵谷之推移勒斯銘于泉戶庶使神遊楚國無慙項羽之臣魂往齊都不愧田横之冢乃為銘曰如馬唐臣猶龍周史𢎞道百世邁徳千祀帶地深源極天峻峙玉種逾潤蘭芳不己成形騰氣成象降精餘慶鍾美惟公挺生少表竒智早擅英聲符采發越志略縱横隋道方衰始開陵長覩兹兆亂緬然長想閉闗晦跡招弓莫往盤桓利居不嬰世網運居道消時逢改卜朱旗爰止素靈己哭野戰羣龍馳走原鹿競窺周鼎爭亡秦族時遭蠖屈運偶鳯翔劬勞百戰經營四方振蕩六合牢籠八荒始開楚霸終基漢皇羣雄並起莫恢王度聖人既作皇天乃顧爰自東夏言遵西路來擬竇融寵逾英布爵窮五等位登九棘帷幄參謀髙衢騁力海運方逺圖南未極縱壑擢鱗摩天墜翼熊耳失路新安殞身長男喪楚少女留秦驚魂靡託反塟何因列樹松檟唯餘故人魏鄭公本傳云徴字𤣥成隋亂詭為道士武陽郡丞元寳藏舉兵應李宻以徴典書檄宻得書稱善既聞徴所為召之徴進十策不能用後從宻來京師久之未知名自請安輯山東乃擢秘書丞時李勣尚為宻守徴與之書勣遂定歸計竇建德陷黎陽獲徴拜起居舍人建徳敗與裴矩走入闗隱太子引為洗馬按此則鄭公不獨嘗事宻且嘗事建德矣而後人斤斤責其一節于隠太子不亦迂乎鄭公文筆不減徐庾而不以文字名唐故中散大夫檢校國子祭酒兼安南都䕶御史中丞充安南本管經略招討處置等使上柱國武城縣開國男食邑三百戶張公墓誌銘栁宗元漢光中興馬援雄絶域之志晉武一統陶璜布殊俗之恩理隨德成功與時並今皇帝載新景命丕冒海隅時惟公祗復厥績交趾之理續于前人公諱某字某某郡人也曾祖彦師朝散大夫尚書駕部郎中祖瑾懷州武德縣令考清朝議郎試大理寺丞贈右贊善大夫咸有懿美積為餘慶公以忠肅循其中以文術昭于外推經㫖以飾吏事本法理以平人心始命蘄州蘄春主簿句㑹敏給厥聲顯揚仍以左領軍衞兵曹為安南經略巡官申固扞衛有聞彰徹轉金吾衞判官三歴御史績用𢎞大揚于天庭加檢校尚書禮部員外郎換山南東道節度判官復轉郎中為安南副都䕶賜紫金魚袋充經略副使遷檢校太子右庶子兼安南都䕶御史中丞充本管經略招討處置等使公自為吏習於海邦凡其比較勤勞利澤長久去之則夷䝤稱亂復至而冦攘順化及受命專征得陳嘉謩誓拔禍本納於夷軌乃命一其貢奉平其斂施牧人盡區處之方制國備刑體之法道阻而通百貨地偏而具五人儲偫委積師旅無庚癸之呼繕完板幹控帶兼戊己之位文單環王怙力背義公於是陸聨長轂海合艨艟再舉而克殄其徒廓地數圻以歸於我理烏蠻酋帥負險蔑德公於是外申皇威旁達明信一動而悉朝其長取州二十以被於華風易皮弁以冠帶化奸宄為誠敬皆用周禮率由漢儀公患浮海之役可濟可覆而無所恃乃刳連烏以闢坦途鬼工來并人力罕用沃日之大束成通溝靡霄之阻硩為髙岸而終古蒙利硩音昔毁也又丑列切公患疆場之制一彼一此而不可常乃復銅柱為正制鼓鑄既施精堅是立固圉之下明若白黑易野之守險逾丘陵而萬世無虞竒琛良貨溢于王府殊俗異類盈于藁街優詔累旌其忠良太史嗣書其功烈就加國子祭酒封武城男食邑三百戶凡再策勲至上柱國三增秩至中散大夫某年月薨于位年若干天子震悼傷辭有加明年其孤某官與宗人號奉裳帷率其家老咨於叔父延唐令某卜宅于潭州某原塟用某月某日人謀皆從龜兆襲吉乃刻茲石著公之閥以志於丘竁以告於幽明銘曰周限荆衡秦開百粤交州之治炎劉是設德大來服道消自絶伏波南征漢威載烈宛陵北附晉政爰發我唐流澤光於有截皇帝中興武城授鉞肅肅武城惟夫之哲更歴毘贊顯揚彰徹既受休命秉兹峻節度其謀猷守以亷潔厚農薄征匪貊匪桀通商平貨有來胥悦踐山跨海堅其鶴列鶴列陳兵也見列子制器足兵潰茲蟻結烏蠻屈服文單剪滅柔逺開疆㑹朝天闕銅柱乃復環山以硩海無遘迕冦罔踰越琛賮之獻周于窮髪帝嘉成德載旌茂閥增秩策勲土封斯裂位厄元侯年虧大耋邦人號呼夷裔悽咽卜塟長沙連岡啟穴書銘薦辭德音罔缺長聨實創自栁公惟其筆妙故偉曄動人後人效之易入惡道吴王李煜墓誌銘徐鉉盛德百世善繼者所以主其祀聖人無外善守者不能固其存葢運厯之所推亦古今之一貫其有享蕃錫之寵保克終之美殊恩餙瓖懿範流先傳之金石斯不誣矣王諱煜字重光隴西人也昔庭堅贊九德伯陽恢至道皇天眷祐錫祚于唐祖文宗武世有顯德載祀三百龜玉淪胥宗子維城蕃衍萬國江淮之地獨奉長安故我顯祖用膺推戴焜耀之烈載光舊吴二世承基克廣其業皇宋將啟𤣥貺冥符有周開先太祖歴試威德所及寰宇將同故我舊邦祗畏天命貶大號以稟朔獻地圖而請吏故德義動元后風行域中恩禮有加綏懷不世魯用天王之禮自越常鈞􅈶存紀侯之國曾何足貴王以世嫡嗣服以古道馭民欽若彛倫率循先志奉烝嘗恭色養必以孝賔大臣事耆老必以禮居處服御必以節言動施舍必以仁至於荷全濟之恩謹藩國之度勤脩九貢府無虚月祗奉百役知無不為十五年間天眷彌渥然而果於自信怠於周防西隣起釁南箕構禍投杼致慈親之惑乞火無里婦之辭始營因壘之師終後塗山之㑹太祖至仁之舉大賚為懷録勤王之前効恢焚謗之廣度位以上將爵為通侯待遇如初寵錫斯厚今上宣猷大麓敷惠萬方每侍論思常存開釋及飛天在運麗澤推恩擢進上公之封仍加掌武之秩侍從親禮勉諭優容方將度越等彛登崇名數嗚呼閲川無捨景命不融太平興國三年秋七月八日遘疾薨于京師里第享年四十有二皇上撫几興悼投𤓰軫悲痛生之不逮俾殁而加飾特詔輟朝三日贈太師追封吴王命中使涖塟凡喪祭所須皆從官給即其年冬十月日塟于河南府某縣某鄉某里禮也夫人鄭國夫人周氏勲舊之族是生邦媛肅雍之美流詠國風才實女師言成閫則子左千牛衛大將軍某襟神俊茂識度淹通孝悌自表於天資才略靡由於師訓日出之學未易可量惟王天骨秀穎神氣清粹言動有則容止可觀精究六經旁綜百氏常以為周孔之道不可暫離經國化民發號施令造次於是始終不渝酷好文辭多所述作一游一豫必頌宣尼載笑載言不忘經義洞曉音律精别雅鄭窮先王制作之意審風俗淳薄之原為文論之以續樂記所著文集三十巻雜説百篇味其文知其道矣至於弧矢之善筆札之工天縱多能必造精絶本以惻懚之性仍好竺乾之教草木不殺禽魚咸遂賞人之善常若不及掩人之過唯恐其聞以至法不勝姦威不克愛以厭兵之俗當用武之世孔明罕應變之略不成近功偃土躬仁義之行終於亡國道有所在復何媿歟嗚呼哀哉二室南峙三川東注瞻上陽之宫闕望北邙之雲樹旁寂寂兮逈野下冥冥兮長暮寄不朽於金石庶有傳於竹素其銘曰天鑑九德錫我唐祚緜緜𤓰瓞茫茫商土裔孫有慶舊物重覩開國承家疆吴跨楚喪亂孔棘我恤疇依聖人既作我知所歸終日靡俟先天不違惟藩惟輔永言固之道或汚隆時有險易蠅止于棘虎遊於市明明大君寛仁以濟嘉爾前哲釋茲後至亦覯亦見乃矦乃公沐浴𤣥澤徊翔景風如松之茂如山之崇奈何不淑運極化窮舊國疏封新阡啟室人惎之謀卜云其吉龍章驥德蘭言玉質邈爾何往此焉終畢儼青葢兮裶裶驅素虬兮遲遲即隧路兮徒返望君門兮永辭庶九原之可作與緱嶺兮相期垂斯文於億載將樂石兮無虧東軒筆記云吳王李煜薨太宗詔侍臣撰神道碑有與徐鉉爭名者曰知吳王事莫若徐鉉太宗詔鉉撰碑鉉泣請曰臣舊事李煜陛下容臣存故主之義乃敢奉詔太宗許之鉉為碑但推言歴數有盡天下有歸而已其警句云東隣遘禍南箕扇疑投杼致慈親之惑乞火無里婦之談始勞因壘之師終後塗山之㑹太宗覽讀稱善東隣謂錢俶也按此記載鉉文字句與文鑑不同又以誌為碑不知何故然西隣作東隣似有理袁清容集引用亦作東隣言指錢氏鉉字鼎臣揚州廣陵人四六法海巻十一
