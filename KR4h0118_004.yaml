body:
  text: 四六法海卷四明王志堅編進資治通鑑表司馬光先奉勑編集歷代君臣事迹又奉聖旨賜名資治通鑑今已了畢者伏念臣性識愚魯學術荒疏凡百事為皆出人下獨於前史粗嘗盡心自幼至老嗜之不厭每患遷固以來文字繁多自布衣之士讀之不遍況於人主日有萬幾何暇周覽臣嘗不自揆欲刪削冗長舉撮機要取關國家興衰繫生民休戚善可為法惡可為戒者為編年一書使先後有倫精粗不雜私家力薄無由可成伏遇英宗皇帝資睿智之性敷文明之治思歷覽古事用恢張大猷爰詔下臣俾之編集臣夙昔所願一朝獲伸踊躍奉承惟懼不稱先帝仍命自選辟官屬於崇文院置局許借龍圖天章閣三館袐閣書籍賜以御府筆墨繒帛及御前錢以供果餌以內臣為承受眷遇之榮近臣莫及不幸書未進御先帝違棄羣臣陛下紹膺大統欽承先志寵以冠序錫之嘉名每開經筵嘗令進讀臣雖頑愚荷兩朝知待如此其厚隕身喪元未足報塞茍智力所及豈敢有違會差知永興軍以衰疾不任治劇乞就冗官陛下俯從所欲曲賜容養差判南京留司御史臺及提舉嵩山崇福宫前後六任乃聽以書局自隨給之祿秩不責職業臣既無他事得以研精極慮窮竭所有日力不足繼之以夜遍閲舊史旁採小説簡牘盈積浩如煙海抉擲幽隱校計毫釐上起戰國下終五代凡一千三百六十二年修成二百九十四卷又略舉事目年經國緯以備檢尋為目録三十卷又參考羣書評其同異俾歸一途為考異三十卷合三百五十四卷自治平開局逮今始成歲月淹久其間抵牾不敢自保負罪之重固無所逃重念兹違離闕廷十有五年雖身處於外區區之心朝夕寤寐何嘗不在陛下左右顧以駑蹇無施而可是以專事鉛槧用酬大恩庶竭涓塵少禆海嶽臣今筋力癯瘁目視昏近齒牙無幾神識衰耗目前所為旋踵遺忘臣之精力盡於此書伏望陛下寬其妄作之誅察其願忠之意以清間之宴時賜省覽鑒前世之興衰考當今之得失嘉善矜惡取是捨非足以懋稽古之盛德躋無前之至治俾四海羣生咸蒙其福則臣雖委骨九泉志願永畢矣謹奉表陳進以聞公常患歷代史煩人主不能遍覽依左氏傳體為編年一書曰通志約戰國至秦為八卷以進英宗恱之命續其書至是神宗為賜名製序俾日進讀書成賜勑奬諭及銀絹對衣腰帶鞍馬公之為是書也分屬諸人漢則劉攽三國迄於南北朝則劉恕唐則范祖禹然猶經十九年而後成蓋重難如此公自言修通鑑成惟王勝之借一讀他人讀未盡一紙已欠伸思睡則士大夫於此書猶不能盡讀而況於正史乎又況於人主乎此表實范祖禹淳父作見四六話永興謝上表司馬光荷恩至重任責尤深巡撫吏民敷宣詔令臣識慮暗淺規為闊疏唯知愚忠屢貢狂直奉事三世操守一心間以齒髮浸衰疹疾交集曽靡論思之效久汙侍從之班既無補於本朝祈自髙於散地不圖睿澤更委名都雖要重之權自知不稱而煩劇之地難以固辭受命以還措躬無所朅來就道甫爾到官維此咸秦昔為畿甸山川清美土地膏腴論其平時誠為樂土在於今日適值凶年經夏亢陽苖青乾而不秀涉秋淫雨穗黑腐而無收廩食一空家乏蓋藏之粟襁負相屬道有流離之人老弱懷溝壑之憂姧猾蓄萑蒲之志正宜安靜不可動搖譬之烹魚勿煩擾則免於糜爛如彼種木任生植則自然繁滋謹當策勵疲駑雕磨朽鈍智力所及勤瘁無辭雖復失位危身終不病民負國庶幾小補用答大恩神宗初公與王安石議法不合求去以端明殿學士知永興軍奏乞致仕表呂誨臣輒罄愚誠上干宸慈伏况微臣本無宿疾偶值醫者用術乖方殊不知脈候有虛實隂陽有逆順診察有標本治療有先後妄投湯藥率任情意差之指下禍延四肢寖成風痺遂難行步非秪憚炙盩之苦又將虞心腹之變勢已及此為之奈何雖然一身之微固未足恤其如九族之托良以為憂是思逃祿以偷生不俟引年而還政顧惟素志幾負明時力既不足誠豈得已況恃睿監夙謀孤忠進非左右之容退知榮辱之分與之全節示以曲成臣不避再煩天聽欲乞致仕仍不願改官早賜開可臣無任籲天懇激之至誨字獻可開封人端之孫以論王安石出知鄧州改知河南旋提舉崇福宫以疾表求致仕蓋以身喻朝政也誨三居言責皆以彈奏大臣去一時推其鯁直謝就差知興元府表文同便私之請輒昧死以上聞從欲之仁遽推恩而下及臣何為者幸至此哉舉千里之大而使之撫綏顧一介之輕而敢不勤瘁望過心悸感深涕流中謝臣誤緣科名竊簉館閣是正訛謬學問淺而未精講磨本元才識短而多泥居中無補請外尤頻嚮蒙朝廷俾守仁夀當奉行條詔之始固勿憚簿書之勞踰年於兹庶事頗集殆將滿歲當趣還朝因念骨肉衆多道途緬邈加有為纍之婚嫁殊無可仰之耕桑何所買琅琊之田徒爾索長安之米以再求僻郡少緩私門豈謂伏遇皇帝陛下照以天光函之海量俯矜愚妄特逭誅夷亟下武都之書使紆南鄭之紱矧兹善地實曰鄰鄉川陸寬平魚稻豐美顧惟多士有願往而不能豈爾賤臣或陳請而遂得被恩若此圖報用何止俟交官即赴新治誓盡么髍之一節庶酬汪濊之萬分但竭愚衷敢誣天鑒同字與可詳見東坡集讀此表想見當時君臣真如家人父子徐州賀河平表蘇軾聖謨獨運天眷莫違庶邦子來民罔告病萬杵雷動役不逾時遂消東北莫大之憂然後麥禾可得而食人亡後患喜得再生伏以大河為災歷世所病禹治兖州之野十有三載乃同漢築宣房之宫二十餘年而定未有收狂瀾於既潰復故道於將堙俯仰而成神速若此恭惟皇帝陛下至仁博施神智亡方逹四聰以來衆言廣大孝以安宗廟水當潤下河不溢流屬歲久之亡虞故患生於所忽方其決也本吏失其防而非天意及其復也蓋天助有德而非人功振古所無溥天同慶維豐沛之大澤實汴泗之所鍾伊昔橫流凜孤城之若塊逮兹平定蔚秋稼以如雲害既廣則利多憂獨深而喜倍雖官守有限不獲趨外庭以稱觴而民意所同亦能抒下情而作頌熙寧十年軾知徐州七月十七日河決曹村泛溢滙城下城將敗軾詣武衛營呼卒長為盡力卒長曰太守猶不避塗潦吾儕小人當效命遂築東南長堤雨日夜不止城不沈者三版請於朝增築故城為木岸以虞水再至十月五日水退城以全降勑奬諭湖州謝上表蘇軾風俗阜安在東南號為無事山水清逺本朝廷所以優賢顧惟何人亦與兹選中謝伏念臣性資頑鄙名迹堙微議論闊疏文學淺陋凡人必有一得而臣獨無寸長荷先帝之誤恩擢置三館蒙陛下之過聽付以兩州非不欲痛自激昻少酬恩造而才分所局有過無功法令具存雖勤何補罪固多矣臣猶知之夫何越次之名邦更許借資而顯受顧惟無狀豈不知恩此蓋伏遇皇帝陛下天覆羣生海涵萬族用人不求其備嘉善而矜不能知其愚不適時難以追陪新進察其老不生事或能牧養小民而臣頃在錢塘樂其風土魚鳥之性既自得於江湖吳越之人亦安臣之教令敢不奉法勤職息訟平刑上以廣朝廷之仁下以慰父老之望元豐二年公自徐州移知湖州李定舒亶何正言托公謝表及所為詩為謗訕逮赴臺獄煆鍊久之不決神宗獨憐之以黃州團練副使安置洪景盧云劉夢得代竇羣容州表有察臣前任事實恕臣本性朴愚之句後東坡多用兩臣字兩其字作對然須要審度君臣之間情意厚薄乃為合宜近年後生不識事體至有碌碌常流乍得一壘亦輒云知臣察臣真可笑也按此體歐公亦時用之到黃州謝表蘇軾狂愚冒犯固有常刑仁聖矜憐特從輕典赦其必死許以自新祗服訓辭惟知感涕中謝伏念臣早緣科第誤忝縉紳親逢睿哲之興遂有功名之意亦嘗召對便殿考其所學之言試守三州觀其所行之實而臣用意過當日趨於迷賦命衰窮天奪其魄叛違義理辜負恩私茫如醉夢之中不知言語之出雖至仁屢赦而衆議不容案罪責情固宜伏斧鑕於兩觀推恩屈法猶當禦魑魅於三危豈謂尚玷散員更叨善地投畀麏鼯之野保全樗櫟之生臣雖至愚豈不知幸此蓋伏遇皇帝陛下德刑並用善惡兼容欲使法行而知恩是用小懲而大誡天地能覆載之而不能容之於度外父母能生育之而不能出之於死中伏惟此恩何以為報惟當蔬食沒齒杜門思愆深悟積年之非永為多士之戒貪戀聖世不敢殺身庶幾餘生未為棄物若獲盡力鞭箠之下必將捐軀矢石之間指天誓心有死無易謝量移汝州表蘇軾稍從內遷示不終棄罪已甘於萬死恩實出於再生祗服訓辭惟知感涕中謝伏念臣向者名過其實食浮於人兄弟並竊於賢科衣冠或以為盛事旋從册府出領郡符既無片善可紀於絲毫而以重罪當膏於斧鉞雖蒙恩貸有愧平生隻影自憐命寄江湖之上驚魂未定夢遊縲絏之中憔悴非人猖狂失志妻孥之所竊笑親友至於絶交疾病連年人皆相傳為已死飢寒併日臣亦自厭其餘生豈謂草芥之賤微尚煩朝廷之紀録開其恫悔許以甄收此蓋伏遇皇帝陛下湯德日新堯仁天覆建原廟以安祖考正六宫而修典刑百廢具興多士爰集彈冠結綬共欣千載之逢掩面向隅不忍一夫之泣故推涓滴以及焦枯顧惟效死之無門殺身何益更欲呼天而自列尚口乃窮徒有此心期於異日乞常州居住表蘇軾臣軾言臣聞聖人之行法也如雷霆之震草木威怒雖甚而歸於欲其生人主之罪人也如父母之譴子孫鞭撻雖嚴而不忍致之死臣漂流棄物枯稿餘生泣血書詞呼天請命願回日月之照一明葵藿之心此言朝聞夕死無憾中謝臣昔者嘗對便殿親聞德音似蒙聖知不在人後而狂狷妄發上負恩私既有司皆以為可誅雖明主不得而獨赦一從吏議坐廢五年積憂薰心驚齒髮之皆變抱恨刻骨傷皮肉之僅存近者蒙恩量移汝州伏讀訓詞有人材實難弗忍終棄之語豈獨知免於縲絏亦將有望於桑榆但未死亡終見天日豈敢復以遲暮為歎更生僥覬之心但以祿廩久空衣食不繼纍重道逺不免舟行自離黃州風濤驚恐舉家重病一子喪亡今雖已至泗州而資用罄竭去汝尚逺難於陸行無屋可居無田可食二十餘口不知所歸飢寒之憂近在朝夕與其強顔忍恥干求於衆人不若歸命投誠控告於君父臣有薄田在常州宜興縣粗給饘粥欲望聖慈許於常州居住又恐罪戾至重未可聽從便安輒敘微勞庶蒙恩貸臣先任徐州日以河水浸城幾至淪陷臣日夜守捍偶獲安全曽蒙朝廷降勑奬諭又嘗選用沂州百姓程棐令購捕凶黨致獲謀反妖賊李鐸郭進等一十七人亦蒙聖恩保明放罪皆臣子之常分無涓埃之可言冒昧自陳出於窮迫庶幾因緣僥幸功過相除稍出羈囚得從所便垂念臣受性剛褊賦命奇窮既獲罪於天又無助於下怨仇交積罪惡橫生羣言或起於愛憎孤忠遂陷於疑似中雖無愧不敢自明向非人主獨賜保全則臣之微生豈有今日伏惟皇帝陛下聖神天縱文武生知得天下之英才已全三樂躋斯民於仁壽不棄一夫勃然中興可謂盡善而臣抱百年之永歎悼一飽之無時貧病交攻死生莫保雖鳧雁飛集何足計於江湖而犬馬蓋帷猶有求於君父敢祈仁聖少賜矜憐臣見一面前去至南京以來聽候朝旨干冒天威公由黃州移汝州未到上此表朝奏入夕報可時元豐八年也謝宣召入院表蘇軾詔語春溫再命而僂使華天降一節以趨在故事以嘗聞豈平生之敢望省循非稱愧汗交深竊以視草之官自唐為盛雖職親事祕號為北門學士之榮而祿薄地寒至有京兆椽曹之請豈如聖代一振儒風非徒好爵之縻兼享大烹之養玉堂賜篆仰淳化之彌文寶帶重金佩元豐之新渥既厚其禮愈難其人而臣以空疏冗散之材衰病流離之後生還萬里坐閲三遷不緣左右之容躐處賢豪之上此蓋伏遇皇帝陛下生資文武天祚聖神雖亮隂不言尚隱髙宗之德而訪落求助已啓成王之心首擇輔臣次求法從知人材之難得采虛名而用臣敢不益勵初心力圖後效才不逮古雖慙內相之名志常在民庶免私人之誚謝兼侍讀表蘇軾叨承新命祗服訓詞薄技已窮舊恩未替中謝伏念臣志大而才短論迂而性剛以自用不回之心處衆人必爭之地不早退縮安能保全是以三年翰墨之林屢遭飛語再歲江湖之上粗免煩言豈此身愚智之殊蓋所居間劇之致臣之自處何者為宜而況講讀之司帷幄最近分章摘句則何以報非常之知因事獻言又必貽前日之患雖仰恃天日之照實常負氷淵之虞恭惟皇帝陛下大德庇民小心順帝雖天覆地載以聖不可知為神而日就月將以學而不厭為智曲收舊物以廣多聞臣敢不職思其憂本無分於中外欲報之德誓不易於死生杭州謝上表蘇軾入奉禁嚴出膺方面皆人臣之殊選在儒者以尤榮中謝伏念臣受寵逾涯積憂成疾既思退就於安養又欲少逃於滿盈仰荷至仁曲從微願江山故國所至如歸父老遺民與臣相問知朝廷輟近侍為太守蓋聖主視天下如一家鞭朴未施爭訟幾絶臣之厚幸豈易名言此蓋伏遇太皇太后陛下天地之仁賢愚兼取日月之照邪正自分每包函其蠢迂欲保全其終始兄弟孤立嘗親奉於德音死生不移更誓堅於晚節元祐四年公以論事為當軸所恨恐不見容纍章請郡除龍圖閣學士知杭州未行諫官言前相蔡確知安州作詩借郝處俊事譏太皇太后議遷之嶺南公密疏若薄確之罪則於皇帝孝治為不足若深罪確則於太皇太后仁政為小纍謂宜皇帝置獄逮治太皇太后出手詔赦之宣仁心善公言而不能用公出郊用前執政恩例遣內侍賜龍茶銀合慰勞甚厚謝賜對衣金帶馬表蘇軾漢官三服已分密麗之珍唐監八坊復下權奇之駿拜嘉甚寵省已何功伏念臣受材迂疏賦命寒蹇幼師季路止服縕袍長慕少遊欲乘下澤目眩重金之耀神驚四牡之良俯仰自維周章失次此蓋伏遇皇帝陛下憂勤黎庶寤寐俊賢故損廄車之儲以廣英雄之彀致兹孱陋亦被寵光臣敢不求稱於衷益鞭其後薄德盛服當戒維鵜之篇強力安邦庶幾有駜之頌四六話云子瞻幼年見歐陽公謝對衣金帶表而誦之老蘇曰汝可擬作一聨曰匪伊垂之而帶有餘非敢後也而馬不進至為潁川因有此賜用為謝表後為兵部尚書又作謝衣帶表略云物生有待天地無窮草木何知冒慶雲之渥采魚蝦至陋借滄海之榮光雖若可觀終非其有四六至此涵造化妙旨矣潁州到任謝表蘇軾攴郡責輕未即滿盈於小器豐年事簡非徒飽暖於一家覽几席之溪湖雜簿書於魚鳥平生所樂臨老獲從中謝伏以汝潁為州邦畿稱首土風備於東北人物推於古今賓主俱賢蓋宗資范孟博之舊治文獻相續有晏殊歐陽修之遺風顧臣何人亦與兹選此蓋伏遇皇帝陛下丕承六聖總攬羣英生知仁孝之全學識文武之大謂臣簮履之舊物嘗沗帷幄之近臣奉事七年崎嶇一節意其忠義許國故暫召還察其老病畏人復許補外置之安地養此散材更少勉於桑榆誓不忘於畎畝元祐六年公自杭召還為吏部尚書未至以弟轍除右丞欲與兄同備侍從不聽公在翰林數月復以讒請外乃以龍圖閣學士出知潁州謝駕幸太學表蘇軾輦回原廟既崇廣孝之風幄次儒宫復示右文之化禮行一日風動四方中謝臣聞五學之臨三代所共蓋天子不敢自聖而盛德必有逹尊在漢永平始舉是禮雖臨雍拜老有先王之規而正坐自講非人主之事豈如允哲退託不能奠爵伏興意默通於先聖橫經問難言各盡於諸儒恭惟皇帝陛下文武憲邦聰明齊聖大度同符於藝祖至仁追配於昭陵爰舉舊章以興盛節臣早塵法從久侍經幃永矣馳誠想聞合語於東序斐然作頌行觀獻馘於西戎謝賜歷日表蘇軾迎日推策雖曰百王之常後天奉時惟我二后之德伏讀詔旨灼知聖心中謝伏以嗣歲將興舊章畢舉三朝受海內之圖籍七月陳王業之艱難冬有祁寒知民言之可畏陽居大夏識天道之至仁故於頒朔之初更下布新之詔恭惟太皇太后陛下視民如子以國為家振廩勸分人自忘於艱歲消兵去殺天必報之豐年臣敢不省事清心貴農時之不奪思患預備期歲計之有餘庶竭微誠少禆洪造謝失覺察妖賊放罪表蘇軾盜發所臨守臣固當重責罪疑則赦聖主所以廣恩自驚廢逐之餘猶在愍憐之數伏念臣早蒙殊遇擢領大邦上不能以道化民逹忠孝於所部下不能以刑齊物消姦宄於未萌致使妄庸敢圖僣逆原其不職夫豈勝誅況兹溝瀆之中重遇雷霆之譴無官可削撫已知危至於捕斬羣盜之功乃是鄰近一夫之力靖言其始偶出於臣雖為國督姦常懷此志而因人成事豈足言勞勉自列於涓埃庶少寬於斧鉞豈謂蕩然之澤許以勿推收驚魄於散亡假餘生之晷刻退思所自為幸何多此蓋伏遇皇帝陛下舞虞舜之干示人不殺祝成湯之網與物求生其間用刑本不得已稍有可赦無不從寬務在考實而原情何嘗記過而忘善益悟向時之所坐皆是微臣之自貽感愧終身論報無地布衣蔬食或未死於飢寒石心木腸誓不忘於忠義到惠州謝表蘇軾仁聖曲全本欲畀之民社羣言交擊必將致之死亡尚荷寬恩止投荒服中謝伏念臣性資褊淺學術荒唐但信不移之愚遂成難赦之咎迹其狂妄久合誅夷方尚口乃窮之時蓋擢髮莫數其罪豈謂天幸得存此生此蓋伏遇皇帝陛下以大有為之資行不忍人之政湯網開其三面舜干舞於兩階念臣奉事有年少加憐愍知臣老死無日不足誅鋤明降德音許全餘息故使豗尵之馬猶獲蓋帷觳觫之牛得違刀几臣敢不服膺嚴訓託命至仁洗心自新沒齒無怨但以瘴癘之地魑魅為鄰衰疾交攻無復首丘之望精誠未泯空餘結草之忠紹聖初御史論公掌內外制日所作詞命以為譏斥先朝遂以本官知英州未到再貶寧逺軍節度副使惠州安置到昌化軍謝表蘇軾並鬼門而東騖浮瘴海以南遷生無還期死有餘責中謝伏念臣頃緣際會偶竊寵榮曾無毫髮之能而有丘山之罪宜三黜而未已跨萬里以獨來恩重命輕咎深責淺此蓋伏遇皇帝陛下堯文炳煥湯德寬仁赫日月之照臨廓天地之覆育譬之蠕動稍賜矜憐俾就窮途以安餘齒而臣孤老無託瘴癘交攻子孫慟哭於江邊已為死别魑魅逢迎於海上寧許生還念報德之何時悼此心之永已俯伏流涕不知所云紹聖四年公謫授瓊州别駕昌化軍安置遂寄家於惠州獨與幼子過渡海蘇公諸表言遷謫處淚與聲下然到底忠鯁無一乞憐語可謂百折不回者矣洪景盧因論昌黎潮州表而軒輕二公實為確論謝除中書舍人表蘇轍越從左史擢領西垣口出命書身參法從深念山林之迹本無富貴之心聞命若驚固辭不獲中謝伏念臣生本西蜀家世寒儒學以父兄為師貧無公卿之助私有求於祿養輒自力於文詞慨然東遊無以上逹際會仁祖訪求直言策語猖狂恃聖神之不諱考官怪怒惡悴直之非宜孰知牾俗之言特被愛君之詔感激恩遇遂忘死生莫酬國士之知適有私門之禍未填溝壑重迫飢寒時於道途望見神考一封朝奏夕聞召對之音衆口交攻終致南遷之患生雖不遇嘗辱顧於二宗時不見容勢殆濱於九死厄窮自致黽勉何言敢云衰病之餘復被寵光之幸此蓋伏遇太皇太后陛下母慈均覆坤德無私欲以任姒之明躬行堯舜之道肆求多士以遺成王耆老畢會於朝廷耕築不遺於林莽遂令拔擢猥及空疏馮唐已衰猶願雲中之往貢禹雖老未忘封事之勤譬如木之在山生則荷恩而死無所怨水之於地行則潤下而止不敢辭臣之事君義亦如此欲報之意非言所殫公應制科時仁宗春秋髙公慮或倦於勤因極言得失而於禁廷之事尤切對入考官胡宿以為不遜請黜之仁宗曰以直言召人而棄之天下其謂我何宰相不得已置之下等除商州軍事推官以養親不赴服闋除河南推官張文定知淮陽辟為學官授齊州掌書記改著作佐郎復從文定簽書南京判官坐兄軾以詩得罪謫監筠州酒稅五年不得調移知績溪縣哲宗立以祕書省校書郎召遷右正言二年遷中書舍人賀擒鬼章表蘇轍天網雖寬久而必獲神理助順叛者自亡曽是偏師之出疆遂聞元惡之授首諸戎震疊西鄙肅清中賀伏惟太皇太后陛下天覆四方坤載萬物好生之德發於自然柔逺之功覃於無外昆蟲草木咸知此心天地鬼神隂相其業顧西蕃之遺種孤纍聖之鴻私頃在熙寧之間誘陷思立之衆置而不問猶覬知恩爵秩兼隆賜豫不絶而乃潛結西夏攻圍南川焚蕩傷夷動以萬計發掘驅虜不可數知築據臨洮傲睨天討當寧太息念疆場之無辜諸將激昻知背誕之不赦兵刃既接凶黨奔亡臨衝未施壁壘自破老羌奪氣白首就擒即聽檻車之行以正藁街之戮乃者拓跋小醜慿恃解仇之謀猖狂大言隂蓄窺邊之計唇亡則齒知難久臂解則肩不自持料其破膽之餘􅍁塞無日信矣得天之助本於愛物之誠臣等鎮撫無功黽勉備位幸依干羽之化庶覩兵革之藏欣戴之心倍萬倫等蘇長公論鬼章事與范忠宣相左畢竟范議為優次公未嘗附會一語其見髙於長公謝除龍圖閣學士御史中丞表蘇轍視草禁中既極儒臣之選專席朝右復膺忠告之求兼延閣之寵名增南司之榮觀退循淺拙徒積兢危中謝伏以仁聖在宥五年於今恭儉無為四方稱治然而矯枉之過苛吏適去而寬弛相尋革故之難敝事雖除而條綱尚紊民貧未可經逺吏窳難於責功是謂守成之難宜有厲精之實幸臺綱之一舉措國是於無疑如臣才力之微強勉何及此蓋伏遇太皇太后陛下德惟主善政貴日新閔風俗之惰偷審詞説之忠佞知逆耳之利行察遜志之多非是以度越俊賢收掇微賤然臣迂愚之實砥礪莫加顚沛之餘衰罷日甚言之無補昔已效於諫垣文不適時比復陳於翰苑恩深莫塞才短奚為惟有事君之小心每欲終身於直道折而不屈蓋蓬蒿之自然晦而猶鳴亦雞鵠之常性志效捐軀之報未知授命之晨拜伏在廷俯仰增愧元祐五年公使契丹還有此除分司南京到筠州謝表蘇轍愚守一心漫無趨避歲更三黜始悟愆尤中謝伏念臣家傳朴學仕偶聖時本無意於功名徒自勤於翰墨因時乏使亟塵言事之班竊食無功復預聞政之列才經九歲遍歷要途人心忌其超遷天意惡其盈滿捫心自省事猶可追任意直前罪所從出惟暗故不明利害惟拙故不達幾微以至罪積如山命輕若髮薦經彈擊雖九死以猶輕黜守幽遐纍千里而為近今兹責分留務棄置陋邦不親吏民許追思其過咎稍霑祿秩俾粗免於飢寒人微固無可言恩深繼之以泣自違天日分委泥塗朝無為言恩出獨斷此蓋伏遇皇帝陛下法天廣覆配地兼容雖雷霆之震驚與雪霜之嚴冽未始絶物之命要在厚民之生故兹賤微猶得陳述臣之自取本復何言顧惟兄弟二人迭相須為性命江嶺異域恐遂隔於存亡況復墳墓闊疏父子離散若臣家之憂患實今世之孤窮靜言思之誰可告者惟有自投於君父庶幾有冀於生全泣血書詞叩閽仰訴生有捐軀之日死存結草之誠雷州謝表蘇轍謫居江外已閲三年再斥海濱通行萬里罪名既重威命猶寬中謝伏念臣性本朴愚老益頑鄙連年驟進不知盈滿之為災臨出妄言未悟顚危之已至命微如髮釁積成山比者水陸奔馳霧雨蒸濕血肉星散皮骨僅存身錮陋邦地窮南服夷言莫辨海氣常昏出有踐蛇茹蠱之憂處有陽淫隂伏之病艱虞所迫性命豈常念咎之餘待盡而已伏惟皇帝陛下仁齊堯舜政述祖宗日月之明無幽不燭天地之施有生共霑憐臣草木之微念臣犬馬之舊未忍視其殞斃猶復許以生全臣雖棄捐尚識恩造知殺身之何補但沒齒以無言紹聖初哲宗起李清臣為中書舍人鄧潤甫為尚書左丞二人久在外不得志稍復言熙豐事以激怒哲宗會廷試進士清臣撰策題即為邪説公疏諫哲宗覽奏以為引漢武方先朝不恱落職知汝州居數月元豐諸臣皆會於朝再責分司南京筠州居住三年又責化州别駕雷州安置代李諌議謝免罪表蘇轍傾者昧於周防自貽謗讟聰明坐照善惡俄分中謝伏念臣幼服官針惟知勤瘁老膺朝寄但守朴忠訖無他長以報殊遇力小任重常自知其不任勢薄地寒果大招於浮議煩言初起卒莫自明孤迹多危已甘永棄賴聖神之不惑察誣罔之無根不勞辨明自獲昭洗此蓋伏遇皇帝陛下天鑒在上物無遁形坤厚兼容人獲安處知拙直之多怨憐衰朽之易摧不見瑕疵曲全終始感幸之切涕泗交流重念臣昔事先朝雖更煩使衰門無振起之望沒齒絶榮華之心自蒙選揄遂歷華近初無左右之助惟恃日月之明入領要權出分重鎮况復弟昆之菲薄並叨侍從之清華蒙國厚恩如臣有幾未能消於謗口實有纍於知人每自省循謂宜廢黜尚竊方州之寄益明眷奬之深敢不勉勵疲駑要粉身而後已訓勑子弟期纍世以無忘過此以還未知所措代陳州張公安道謝批答表蘇轍老病既至昏耄及之恩澤未移撫存若此感幸雖切啓處未寧中謝伏惟皇帝陛下覆育萬物體乾坤之不遺容養羣臣猶父母之曲盡始終愛怛左右保全雖或迂疏無用之才加以羸老難任之日猶未忍棄俾獲偷安德厚恩隆感深涕隕然念臣結髮從宦出身事君遭遇聖明有犬馬自效之志酣豢爵祿無山林獨往之心矯世求名既非所願要君自鬻尤不忍為誠以病勢侵凌理難勉強伏自去歲初涖宛丘風熱交攻面目幾廢四陳誠請未賜允從貪冒寵光朋友之所譏笑隳弛條教吏民之所厭憎逮此干聞出於窘迫豈可復貪榮命不畏多言而況南都有先臣之敝廬留臺固遺老之清職在臣不為遂廢於國亦謂無嫌病而得間斯人情之至願退之以禮知主眷之愈隆天髙聽卑得請乃已張文定知陳州公兩為其屬奏草多公代筆代張安道乞致仕第二表蘇轍老而求退豈以為名病而得間本其至願飛章自乞誠意未孚特蒙賜書勉以就職中謝臣聞引年去位事君之舊章懷祿忘歸人臣之深戒自昔不得謝者在禮雖或許之然皆廟堂注意之臣疆場折衝之任邦家倚以為重神人賴以為安留之者既自有詞居之者誠亦無愧是以禮存權制人絶間言未聞退處間官坐糜厚祿竊此異數晏然偷安伏念臣早事三朝晚遭興運首被揀拔與聞幾微貪戀聖明豈有窮已徒以寵祿盈滿懼速顚隮筋力衰罷理難勉強幸緣舊典敢固自陳伏惟皇帝陛下量極乾坤德隆父母因至誠之勤請杜無名之誤恩念臣平生粗守亷隅恥於僥幸使臣今日得安分限即是恩私區區寸誠得請乃已代張安道乞致仕第三表蘇轍誠發於中一言可信恩加望外再請未從顧惟衰朽之年久竊尊榮之寄雖蒙異眷敢以自安中謝臣聞事君之禮少壯不敢不勉行已之義老病不可不歸壯而不勉則失忠老而不歸則忘恥今臣心力衰退手足支離謝事之期已逾三歲祈天之請蓋又纍年況復同列之間比多得請而去獨臣言辭淺陋未足以回天勢力孤單中無與為地茍遂盤桓顧寵俯仰懷慙志不克伸沒有遺恨伏惟皇帝陛下至誠樂善多士克生元首股肱自足名世奔走先後未嘗乏人豈臣去留足為輕重徒以遺簮可念遂忘朽弊之難堪老馬尚存不知驅馳之弗逮致之顚覆之地恐非愛惜之宜故寵臣以尊名不若使臣得全亷恥之為貴厚臣以重祿不若使臣得守分限之為安凡厥保全之餘斯皆聖明之賜力陳危懇尚冀必從代司馬丞相進稽古録表黃庭堅竊以九州四海一日萬幾將察知民物之性情蓋布在文武之方策雖歷年多而舉其大要則用力少而見夫全功恭以皇帝陛下富有春秋弭寧方夏念始終典於學於緝熙單厥心延登老成親近勸講發論語章句探經萟之同歸誦寶訓丁寧憲祖宗之不易本有如是實惟濫觴惟稽古堯舜之舊章惟信史春秋之成法髙山可仰覆轍在前其興亡在知人其成敗在立政或當艱難之運而不能師用賢智或有惻隱之意而無以照知忠邪載籍之編患乎太漫鑒觀之主力不遐遑敢用芟夷略存體要由三晉開國迄於顯德之末造臣既具之於歷年圖自六合為宋接乎熙寧之始元臣又著之於百官表若乃威烈丁丑而上伏羲書契以來對越神人可用龜鏡悉從論纂皆有依憑總而成書為稽古録二十卷因仍書局繕寫奏篇兹冒昧以上陳助聰明之逺覽恭惟太皇太后陛下定九鼎以守天下之公器乘六龍以御古今之正權思齊之功啓佑聖學過物之濟燕及宗祧至於法弊於涼而改為官非其人而變置御戎之策中下措國之勢安危據舊以鑒新去彼而取此陶成萬化柬在兩宫七廟垂無疆之休微臣與不朽之業越州謝上表元絳易帥嶠南方深危懼分符浙右特荷保全仰服恩章惟知感涕伏念臣習知忠誼竊慕功名歷事三朝行將四紀向自北垂之漕就更南越之麾蒙臨遣以丁寧敢遑安而留滯載驅長陸甫及半塗忽聞羽檄之音謂有龍編之警橫水明光之甲得自虛聲雲中赤白之囊倡為危事邊萌擾動朝聽震驚況在守臣敢愆奔命風馳南海已久見於吏民日逺長安蓋未聞於章奏仰煩宵旰咨及臣鄰謂護塞之急人且擇才而代戍驅車萬里虛出玉關之門乘駟一麾幸至會稽之邸尚兼方面彌畏人言此蓋伏遇皇帝陛下法道曲全等天丕冒以臣更事綿久備歷四方之勤知臣立朝最孤逈無一介之助渙然休命付畀價藩臣敢不訓旅以嚴安民以靜庶希樂易之治仰補熙隆之時銜賜不資論生為補王公四六話云元厚之久作藩郡後聞儂智高餘黨冦二廣移知廣州而所傳乃妄改知越州謝表云云用李德裕獻替記伐劉稹李石令中人石元貫奏橫水明光之甲曵地何由取他德裕曰從伊十五里精兵必須破却此賊後所傳果妄知亳州謝上表劉攽齒髮衰暮藩鎮會繁據非所安榮以為懼昔者聖門高弟方六七十則所願為漢世諸儒至二千石謂之宦逹蓋量力審已雖小邦實曰才難逢辰慕君在有道不容徼幸此所以前哲言志區區其若彼後賢受祿振振焉在兹況如愚臣本緣末學粵塵仕路不棄昌時暨沗分符遂更三郡曹為近輔非復自檜之譏魯并泰山仍有變齊之舊至於渦譙名壤淮楚近郊猶龍之所誕生真聖是焉臨幸大朝景亳無武湯之上儀迎年執期格帝鴻之純貺民俗既富官守維嚴豈伊戇愚猥叨寄任邈逾涯分高視曩先密焉自思仍有餘寵獸鞶換舊僅踰期月之淹隼斾越疆才倍宿舂之費此蓋伏遇皇帝陛下聖神妙算睿智極深廓久照於容光溥太和於播物流形品彚默化陶鈞致是小材預膺榮遇謹當布宣詔旨盡瘁官針為身愚謀雖冀不殆於知止報國本願尚謝餘生於自然誓殞百身勿渝一志知襄州謝上表劉攽脫身謫籍緤組近藩仰荷恩華不勝感懼臣早者濫承人乏出假使車材非所長力不自料黽勉歲月孤負選掄是所謂斗筲之才何暇論繩墨之外然惟利術至廣巧者有餘果聞係踵之後人略取析毫之上第涇以渭濁故常畏於後生李代桃殭竊自悲於薄命遽辱黜幽之典實由既往之愆浮舟江湖托身瘴癘無復自新之望長懷永棄之憂不謂明詔發中湛恩逮下俾復乘軒之寵仍加分虎之榮情同更生感惟出涕此蓋伏遇皇帝陛下離明廣照乾度并容紹庭之初方勤心於陟降思皇之際亦代匱於細微以是孱愚得從甄敘謹當勉求民瘼恪佩官針犬馬之心以勞力故能有養桑榆之景雖已者尚冀無渝攽字貢父敞之弟也熙寧中嘗為京東轉運使後吳居厚代之能奉行新法致財賦乃追坐攽廢弛監衡州鹽倉哲宗初起知襄州表中涇渭桃李等句蓋指此定州謝上表吕公著尸榮右府無裨廟算之竒假守中山復當閫制之重戴恩為懼虔命以行遄屆郡封恪宣條詔伏念臣降才謭薄植性懦愚學術不足以稽五謀之疑識慮不足以籌千里之勝特以百年舊族荷纍聖不資之恩一介微軀辱主上非常之遇夤緣寵渥更踐清華晚收疏外之孤蹤擢贊微幾之要務奉天光而咫尺被聖誨之丁寧謂臣世服近僚有均休共戚之義察臣傍無厚援絶背公死黨之嫌曲示優容俾思報效顧駑駘之難強嗟蒲柳之易衰久預枋司積有妨賢之畏洊祈麾寄更圖陳力之方伏遇皇帝陛下體虛靜以儲神極高明而盡下俯矜素悃特霈俞音惟定武之奧區據朔陲之重地尚叨付委靡即棄捐仍進敘於文階且兼華於祕殿併將厚意增賁舊臣況臣夙侍軒墀實司樞管凡治軍經武之要洎守塞禦戎之宜日炙睿謀備觀宸斷逮兹臨遣得以遵承謹當細大必躬夙宵彌勵進不敢希功而生事退不敢弛備以曠官期不玷於誤知庶少酬於鴻施公著字晦叔夷簡之子元豐五年以同知樞密院事出知定州衡州鹽倉謝上表劉摯議令獻言知典刑之無赦原心觀過荷仁聖之有容貸其餘生處以善地伏念臣稟生艱拙遭世盛明學不能窮理而知幾材不足趣時而適變晞名塗以旅進濫文館之末遊和鉛何功索米逾歲間承人乏偶攝椽於中堂旋誤聖知使備員於憲府仍職書林之舊就行御史之中始自愚臣前無故事方陛下繼承於五聖而國朝平治者百年力勤肯穫之田大解不調之瑟搜拔羣材而審以器使變化百度而曠然日新臣於此時職在言路誓殫忠義敢避勢權寧以孤暌訐切咈衆而危身不忍從容唱和負恩而速進狂愚自信裨益無方故宿官之日幾何而瞽言之罪非一至於均民而弛役因之率戶而出泉雖慮始樂成者愚人之不知然損下益上者先王之大戒輒條十害冀補萬分議臣見譏以為敗謀而亂化清衷獨見知其有責而盡言不徇以誅止容其去褫臺閣之二職置瀟湘之一涯有祿食使之存全有職事可以報效銜恩載幸揣分增憂此蓋伏遇皇帝陛下察臣孤忠全國大體不惜骩一夫之法庶幾留衆正之門謹當上體恩仁期於必報下堅節義死而不渝摯字莘老熙寧中為監察御史裏行以論新法安石欲竄之嶺外神宗不聽謫監衡州鹽倉先是倉吏與綱兵姦利相市鹽中雜以偽惡摯悉意檢視弊減十七父老目為學士鹽南京謝上表曽肇以儒懦而辭將符以親嫌而避邊要頗識事君之義敢干留令之誅仰賴聖明俯矜誠請既逃罪戾仍獲便安伏念臣無所取材粗知嚮道雖險阻艱難備嘗之矣而造次顚沛必於是焉以平生寡偶而少徒故臨事易危而多畏昨祈外補聊避煩言未容墨突之黔遽改并門之帥且節制方面號為儒者之榮率先戎行正是人臣之分便當即路詎敢懷私但以任非所長力有不逮矧兄弟之孤立擅將相於一時中懼滿盈外虞讒間再瀝籲天之懇終蒙易地之優維陳宋之奧區首東南之甸服周流二國俯仰十期何幸衰年復尋故步望千門之宫闕識三后之衣冠合抱干雲或異時之拱把峩冠束帶多前日之佩觽所愧薄材曽微惠政下孤民望上誤國恩此蓋伏遇皇帝陛下舜智兼容堯仁遍覆初無心於豫奪皆因物之短長是致孤生與叨平施無輕民事方竭力於兹辰茍利公家誓捐軀於異日肇字子開鞏布之弟也元祐中嘗出知應天府徽宗初為翰林學士布拜相引故事避禁職拜龍圗閣學士出知陳州歷太原應天府揚定二州賀上傳國寶表曽肇受命之符為時而出自天之祐維聖是承方拜貺於大庭遽均恩於率土官師動色海宇蒙休臣聞夫國璽之有去來猶周鼎之有輕重好治而惡亂舍昏而即明頃自有唐之衰荐更五代之季伏而不發殆且百年忽爾自歸將傳萬世所以表祖宗積纍之慶告社稷靈長之休在聖與仁宜昌而夀恭惟皇帝陛下沉潛迪哲剛健好生參天地以成能垂子孫而作則果有神物是貽皇家固將配甘露以紀元豈止擬芝房而度曲臣職專守土志切慕君講稱壽之儀阻陪下列奏升中之頌故侯方來元符元年正月咸陽民段義得玉印一紐上之詔翰林學士承旨蔡京等辨驗五月朔御大慶殿受天授傳國受命寶行朝會禮班德音於天下減罪囚一等徒以下釋之以段義為右班殿直賜絹二百匹六月朔改元謝諫議大夫表張舜民方安謫籍忽對鋒車入瞻八彩之秀毫進與七人之上列竊聞明主臨政而願治先王為官而擇人號曰梓材取其器使若夫諫爭之任政惟侍從之人地密而選清秩卑而望重其所以起居言動則與史官相表裏其所以彈訶風察則與臺憲同戚休始則專弼人主之違今乃泛論天下之事乃者藥石不進鳬雁僅存仗馬一鳴茅茹不已豈謂大明之東出廓然睍雪之曰消鼓之以惠風潤之以膏澤東窮海嶠北浹江湘脫禁錮者何翅二千人計水陸則不止一萬里死者傷嗟之不及生者扶匐以來歸昔居輔弼之崇謀謨帝所終作蠻夷之鬼棄擲道傍古先未之或聞畢竟不知其罪敢望桑榆之晚景獲依日月之末光招魂於楚水之涯拭目於雲臺之表手托西日口誦離騷齒髮摧頽謾索太倉之米衣裳顚倒驚聞長樂之鐘此乃伏遇皇帝陛下上當天心下厭人望見機不俟終日從諫甚於轉圜變通得之神宗寬大類乎仁祖豈止芻蕘之被賞將令泉壤以銜恩率是以行為國何有敢不激昻暮氣緝理空文乘白馬而伏青蒲試圖來效餓西山而蹈東海期免後艱張舜民字藝叟邠州人元豐中有事西夏環慶帥髙遵裕辟掌機宜文字王師無功有得舜民軍中詩上聞者坐謗訕謫監彬州酒稅元祐中以司馬光薦歷祕書少監元符中罷職徽宗立擢諫議大夫坐元祐黨安置商州舜民嘗有詩曰一夜蛙聲不暫停近如相和逺如爭信知不為官私事應恨疏螢徹夜明譏當時持論各有所主也謝賜恤刑詔表李清臣徒孥頌繫交手傳歡氓𨽻聞音相趨動色雷風鼓舞律吕和平屬在守臣惟知虔命切惟歷代之為政莫若本朝之恤刑承平幾百四十年覆養方二三萬里德如天地日月恩及草木蟲魚尚慮府縣狴牢官曹卒吏誦司空城旦為業習柱後惠文之風喜作煩苛私行慘刻或致孤窮無告疾痛不聊是頒詔教之丁寧申諭州邦之長守使之網羅寬大櫺檻疏通日與涼酏時視藥物比周王之扇暍殆又過之雖夏后之泣辜亦止如是此蓋恭遇太皇太后陛下睿慈燕裕仁治醇醲尊居九重之深周念四海之逺謂聖世不專以刑為天下王者常欲以恩結民心仰寧八室之光靈垂慶億年之統祚臣敢不奉行上意秪率外臣李清臣字邦直魏人韓魏公聞其名以兄之子妻之嘗草魏公行狀神宗見之曰良史才也召為國史編修官歷官通顯起身窮約能以儉自持然志在利祿一意欲取宰相紹聖初廷試進士發策首為紹述之論國是遂變然與章惇曽布不協率為所陷竟不如願以死宋時制度如此宜其深得民心今郡邑長吏不可不三復斯篇建寧軍節度使謝表吕惠卿備嚴近之選而抵非常之愆當清明之朝而罹甚重之譴孽乃自作咎將誰歸伏念臣起自諸生暗於大道持􅍁啓之聞而欲輕於事變信呻吟之得而希挂於功名分既過逾理宜顚越矧先帝有為之始乃羣臣效願之時輒先要津以閡賢路雖預討論者三四事而參幾務者一二年凡是蠧國害民之由實臣懵學誤朝之致豈亦下流之所處更令衆惡以皆歸偶失當時士師之刑難逃今日司直之論尚蒙善貸未置嚴誅特從四裔之遷以正三凶之比衰疲逺謫人皆知其難堪親愛生離聞者為之太息伏惟皇帝陛下天仁自得聖孝光充撫弓劒之遺藏每加悽愴顧廟堂之舊物寧不盡傷特罪悔之至深猶典刑之為屈龍鱗鳳翼已絶望於攀援蟲臂鼠肝一冥心於造化涕逐言出莫知所從語語伏案可謂姦人之雄尚書省謝車駕臨幸表林希天臺肇建具崇喉舌之司帝車下臨增重陛簾之寄非常之舉視古無倫恭惟皇帝陛下天縱多能日新盛德剗除衆弊裁制萬微考先王之董治官立尚書以政為本紀綱條理見微旨於新書創作規模别牧司於著位蓋慮之積年而成於兹日聞諸前世而驗於方今忽紆清蹕之傳罙聳鴻都之觀且北辰居極外環象斗之宫而黃道所經旁及積星之位瞻威顏於咫尺被法語之丁寧勑以在公退而交警分曹帥屬燦然周典之文望輦拜恩陋彼漢郎之歎矧復宗藩旅進禁從相趨凡獲侍於宸逰皆預窺於聖作歡聲載溢慶榮遇於一時信史備書流美談於萬世臣等叨膺重任久負明恩顧懷備位之慙第劇逢辰之幸敢忘策勵期稱寵臨希字子中紹聖初章惇嘗曰司馬光作相用蘇軾掌制所以能鼓動天下安得斯人而用之或薦希用為中書舍人許以執政希亦久不得志自司馬光呂公著以下數十人之制皆極醜詆至以老姦當國隂斥宣仁讀者忿歎希一旦草制罷擲筆曰敗了名節矣已又怨惇而與曽布比罷知亳州駕幸尚書省必神宗時事本紀不載謝賜春衣表鼂補之勾萌畢發慶賜可行土牛久飾於送寒豳籥未歌於迎暑乃眷造庭之願爰開在笥之良肆有等差均於覆被恭惟皇帝陛下宜人布政育物為功卉皮自適於隂陽氄毨同和於天地既陶無外之化亦霑咸若之恩織篚亂流豈惟加五百里之逺女工同燎故復半三十日之收矧是具僚與之同體適及風雩之後大頒帑帛之珍君賜足榮不歎無衣之七王章有分庶逃終褫之三誓各糜捐以圖報稱補之字旡咎濟州巨野人逈之族孫也十七從父官杭州作七述謁通判蘇軾軾先欲有所賦歎曰吾可以閣筆矣舉進士試開封及禮部别院皆第一元祐中以薦除祕書省正字章惇當國出知齊州坐實録失實降通判應天府又貶監處信二州酒稅徽宗初召還黨論起出知河中府大觀末出黨籍起知連州改泗州卒免右僕射表韓忠彥申寵命以自天榮非意及措微躬而無地愧與憂并仰冒眷衷歷陳危懇切以君臣同體取象於元首股肱上下交孚相視如腹心手足所以代天工而理物故能熙帝載以奮庸自昔御臨尤艱考愼惟德業之兼茂乃邦家之有光伏念臣學無他長材止近用不為詭隨以徇衆但知直道以事君遭遇聖時未隳素業贊陪機政惟任孤忠墻髙每懼於疾顚綆短固難於深汲更冒非常之寵深虞可畏之言矧今蠧萌未消國是雖一事有可否必分年號而得行臣無忠邪槩指朋類而皆廢西方師老而財匱斗米至於千錢北道河潰而民流十室幾於九去大霈更新而猶多禁錮宿逋雖減而尚困追償方欣大有為之時乃用不世出之士豈兹綿薄能副詳延伏望皇帝陛下奮獨斷之明廣僉諧之訪旁求不間於庶位圖任況多於舊人采擢微才收還成命譽歸明主名器不輕以假人謗息愚臣負乘免聞於致冦忠彥琦之子元祐中知樞密院事哲宗親政更用大臣言者爭言垂簾時事忠彥言昔仁宗始政當時亦多譏斥章獻時事仁宗惡其近薄下詔戒飭陛下能法仁宗則善矣出知定州徽宗立拜尚書左僕射封儀國公與曽布不協出知大名府又以復廢后為罪再降大中大夫懷州居住代范忠宣公遺表李之儀臣聞生則有涯難逃定數死之將至願畢餘忠輒留垂盡之期仰瀆蓋髙之聽中謝伏念臣賦性拙直稟生艱危忠義雖得之家傳利害率同於人欲未始茍作以干譽不敢患失以營私蓋嘗先天下而憂期不負聖人之學此先臣所以教子而微臣資以事君粵自治平擢為御史繼逢神考進列諫垣荏苒五十二年首尾四十六任分符擁節持槖守邊晚叨宥密之求再席鈞衡之寄遇事輒發曽不顧身因時有為止欲及物固知盈滿之當戒弗思禍釁之隂乘萬里風濤僅脫江魚之葬四年瘴癘幾從山鬼之遊忽遭睿聖之臨朝首圖纖介之舊物復官易地遣使宣恩而臣目已不明無復仰瞻於舜日身猶可免或能親奉於堯言豈事理之能諧果神明之見嗇未獲九重之入覲卒然四體之不隨空慙田畝之還上負乾坤之造猶且強親藥石貪戀歲時儻粗釋於沉迷或稍紆於報效今則膏肓已逼氣息僅存泉路非遙聖時永隔恐叩閽之靡及雖結草以何為是以假漏偷生刳心瀝懇庶皇慈之俯鑒亮愚意之無他臣若不言死有餘恨伏望皇帝陛下清心寡欲約已便民達孝道於精微擴仁心於廣逺深絶朋黨之論詳察邪正之歸搜抉幽隱以盡人材屏斥竒巧以厚風俗愛惜生靈而無輕議邊事包容狂直而無易逐言官若宣仁之誣謗未明致保佑之憂勤不顯本權臣務快其私忿非泰陵實謂之當然以至未究流人之往愆悉以聖恩而特敘尚使存殁猶汚瑕疵又安得未解疆場之嚴幾空帑藏之積有城必守得地難耕凡此數端願留聖念無令後患常軫淵衷臣所重者陛下上聖之資臣所愛者宗社無疆之業茍斯言之可采則雖死而猶生淚盡詞窮形留神逝范忠宣公傳云疾革以宣仁后誣謗未明為恨呼諸子口占遺表命門生李之儀次第之其略云云凡八事建忠靖國改元之旦受家人賀明日熟寐而卒李之儀傳云坐為范純仁遺表編管太平蘇文忠公集賜右僕射范純仁辭免不允批答云吾聞之乃烈考曰君子先天下之憂而憂後天下之樂而樂雖聖人復起不易斯言卿將書之紳銘之盤盂以為一言而可以終身行之者歟則今兹爰立之命乃所以委重投艱而已又何辭乎與此表皆用文正語謝復官表鄒浩萬里投荒豈生還之敢望九重獨斷俄意外以蒙恩感激哀憐縱橫涕淚伏念臣最為固陋全昧幾微有言輒至於妄陳雖死不足以塞責上賴聖人之救物特寬司冦之嚴刑但復竄於遐方姑使省其往咎惟昭潭之可畏與新州而不殊形影自隨朝夕難保昏昏瘴霧信為提耳之師兀兀愁居因得致身之道惟忠惟孝無古無今命雖甚於垂絲心已期於結草不謂僅存之瘦骨忽還將絶之驚魂既獲免於拘攣遂亟諧於定省名蠲罪籍品復文階在抆拭之非常皆覬覦之莫及此蓋伏遇皇帝陛下道彌天覆德盛春生千齡光御於丕圖萬物率由於和氣紹隆先烈坐撫太平曲回進日之明旁燭戴盆之下謂裕陵長肓賜之第而除教官謂哲宗保全矜其愚而屈常法召從五嶺之表端遇六龍之飛擢於不次之中曽是惟新之數肆令甄敘俯及孤危臣敢不因險阻艱難之備嘗念身體髮膚之再造益堅夙志遙瞻北極之尊長與老親共祝南山之壽精誠所貫髙厚必知鄒浩字至完常州晉陵人哲宗時為右正言時章惇獨相威虐震赫浩所言每觸其忌已而立劉賢妃為后浩極諫惇詆其狂妄削官爵羈管新州徽宗立召還復為右正言賀進築表唐庚臣某言準進奏院報四月初七日涇原路合熙河環慶秦鳳路人馬出寨狀天都山進築西安州天都臨羌寨了當至五月初九日分屯訖者四路雲屯如入無人之境三城鼎峙坐收不戰之功華夏歡騰蠻夷震懾中賀臣竊以要荒之叛服係乎制馭之是非有蠢西羌久羈天討當元豐之願治將議剪除逮元祐之偷安務從姑息養成其惡以迄於今屬神聖之嗣興起師徒而進築逺攻近取日削月侵城堙漸逼其腹心刁斗相聞於巢穴天都形勝既歸掌握之中靈武勢孤自有唇亡之懼積年之冦指日可平恭惟皇帝陛下仁勇兼資德刑相濟震文王之一怒所以安民體成誦之四征終於成德神武不殺上兵伐謀故能旬月之間大復祖宗之地不疾而速惟斷乃成臣猥以空疏誤蒙委寄振衣踴躍欣聞三捷之音拜手歡呼阻上萬年之壽唐庚字子西具瀾編中子西詩最工於屬對今撮其警句於此如云手香柑熟後髮脫草枯時精力看書覺情懷舉盞知翻泥逢暗笋汲井得飛梅竹根收白疊木杪得黃封雲隂哭鳩婦池溢走魚苖十年駒局促萬事燕差池七言如云就使真能去窮鬼自量無以致錢神此去只堪犀首飲向來都是虎頭癡至今無奈曽孫稼幾度虛占少女風謝賜柑表失名聘禮既陳祝帝齡於紫闕恩華固異賜仙實於公郵方厥包未貢之期捧兹德維馨之賜天香滿袖染湘水之清寒雲液盈盤挹洞庭之餘潤梓里豈遑於遺母楓庭切願於獻君感德滋深喻言罔既崇寧三年大遼賀生辰使至賜柑有此謝表謝講和赦表嶽飛武勝定國軍節度使開府儀同三司湖北京西宣撫使兼營田大使臣嶽飛上表言今月十二日準進奏院遞到赦書一道臣已即恭率統制領將佐官屬等望闕宣讀訖觀時制變仰聖哲之宏規善勝不爭實帝王之廟算念此艱難之久姑從和好之宜睿澤誕敷輿情胥恱中謝竊以婁敬獻言於漢帝魏絳發策於晉公皆盟墨未乾顧口血猶在俄驅南牧之馬旋興北伐之師蓋出言不衷要盟無信莫守金石之約難充溪壑之求圖暫安而解倒垂猶之可也顧長慮而尊中國豈其然乎恭惟皇帝陛下大德有容神武不殺體乾之健行巽之權務和衆以安民乃講信而修睦已漸還於境土想喜見於威儀臣幸遇明時獲觀盛事身居將閫功無補於涓埃口誦詔書心有慙於軍旅尚作聰明而過慮徒懷猶豫而致疑謂無事而請和者謀恐卑辭而益幣者進臣願定謀於全勝期收地於兩河唾手燕雲終欲復讎而報國誓心天地當令稽顙以稱藩持此議論豈能一日安於高宗之朝哉蓋公不滅敵檜且滅公天固定之公亦自知之矣不能學張俊輩偷取冨貴於臣敵之世也謝除禮部尚書兼翰林院學士表周必大宗伯綴文昌之坐已高曵履之班翰林依華蓋之星向玷演綸之直當聖王謹持於公器獨遇臣常愧於私人臣竊考自古豪英之才旋觀當今文學之士或抑厭草茅之下或陸沉州縣之中瞻城南尺五之天致身無路想玉階方寸之地通籍幾人況乎出入禁嚴周旋侍從論思獻納日邇清光衣被服乘歲叨徽數向匪負一時之望安能符衆論之公如臣者學不足以知方才不足以應務家壁四立甘為窮陋之民君門九重敢起躋攀之念而臣親逢聖作首奉詔除簡知特厚於儒臣奬擢遍更於華貫官益崇而效寡祿愈富而報微左降固宜右遷何有恐拜便蕃之命疊加優異之恩帥屬春官光二卿之舊次摛文禁苑添四命之新榮煥寶帶以章身飾繡韉而華駿正使實兼數品尚虞稱塞之難矧伊初乏寸長何意超踰之甚周章就列俯仰懷慚此蓋伏遇皇帝陛下道協舜華志恢禹迹明明在上雖洞照於羣情浩浩其天每包涵於萬類寧稍捐於爵秩恐或棄於菲葑遂致凡才亦塵顯仕臣敢不悉其思慮稱是寵褒號令文章期助漢家之制討論潤色勉希鄭國之賢茍逭素餐豈酬玄造必大字子充廬陵人孝宗朝兩入翰林幾六年制命溫雅周盡事情為一時詞臣之冠福建到任謝表陸遊咸造在廷甫遂朝宗之願奉使有指遽叨臨遣之榮大造難名餘生曷報中謝伏念臣么然薄命起自窮閻偶以元祐之黨家獲與紹興之朝士真人有作景運方開適當寧歎息人才之實難顧一時豪傑號召而未至首蒙引對面錫殊科遭逢稀闊之知聳動邇遐之聽豈期蹇薄旋困沉綿卒繄全度之恩俾獲退藏之分侵尋半世轉徙兩川三為别乘之行再沗專城之寄五十之年已過非復壯心八千之路來歸恍如昨夢敷陳淺拙應對參差惟遣黜之是宜豈超遷之敢望此蓋伏遇皇帝陛下道兼倫制澤被堪輿念臣流落有年尚未除於狂態憐臣馳驅無地空竊抱於愚忠顧雖末路之孤蹤猶玷外臺之高選臣謹當力思守道深戒瘝官禮樂逺有光華既大踰於素望靖共好是正直庶少答於鴻私遊以漏言出通判夔州本傳但云後纍遷江西常平提舉不言為福建何官江西到任謝表陸遊疏恩趣召靡待一人之言改命遣行猶備四方之使丹衷欲敘雪涕先傾中謝伏念臣稟資迂愚立身羇藐偶竊犁鉏之餘暇妄窺述作之淵源纍然自力於簡編老之將至過矣見稱於流輩轉而上聞頃入對於燕朝實親承於睿奬然而異恩賜第弗由場屋之選掄特旨造廷非出公卿之論薦已分亟投於間散豈期重纍於生成此蓋伏遇皇帝陛下立賢無方用人唯已一洗拘攣之積弊廣收魁傑之遺才施及妄庸亦蒙省録甫停追詔還畀使旜凡曰自結於上知皆俾無蹈於後宫海嶽之內纖塵墜露何所用之父母之愛幼子童孫蔑以加此驅馳入境感懼填膺重念臣朴學守株孤身弔影素乏蚍蝣蟻子之助孰為輪囷蟠木之容愴餘日之安歸抱微誠而永歎方天子建中和之極用告成功雖太史近卜祝之間亦思自效尚憑長育不遂棄捐所願預草漢家檢玉之文闕遽同堯民擊壤之作刳肝自訴伏鑕何辭疾痛闕仰而呼天誓靡求於世俗齋戒沭浴可以事帝冀終望於清光皆俾無蹈於後宫一本作諂此句不可解嚴州到任謝表陸遊穿延和之細仗面咫尺天佩新定之左符秩二千石叨塵過分感懼交懷中謝臣聞明主恩深書生命薄唐帝之知李白一官不及於生前漢皇之念相如遺稿徒求於身後況如臣輩莫望昔人猥緣一技之卑嘗綴百僚之末雖簮笏久違於昕謁乃姓名猶在於淵衷乘傳來歸兩奉召還之旨懷章欲上亟蒙趣對之榮親降玊音俯憐雪鬢勞其久别蓋寵嘉近侍之所宜勉以屬文實臨遣守臣之未有兹蓋伏遇皇帝陛下睿謨冠古英斷如神肆筆成書千載獨高於聖學刺經作制諸儒絶企於清光以臣夙被化於明時憐臣未廢書於晚歲將激昻其素志故闊略於往愆臣敢不戴使愚使過之恩念有社有民之寄憩棠隂而聽訟期無墜於家聲及瓜戍而代歸尚少酬於君賜遊本傳云過闕陛辭上諭曰嚴陵山水勝處職事之暇可以賦詩自適表中勉以屬文云云蓋指此丞相率文武百僚賀壽皇正旦表陸遊道妙渾成太極著兩儀之本天端更始三朝受萬國之歸慶集有邦歡騰率土中賀恭惟至尊壽皇聖帝陛下濬哲稽古清明在躬握乾符闡坤珍難名蕩蕩之德系唐統接漢緒誕受丕丕之基以海宇之富而蹈巢由高世之風以父子之親而行堯舜曠代之事逮此獻歲發春之日實繄考圖數貢之時史册增華搢紳太息臣等幸承睿奬獲覩昌期鵷行畢集於大庭共喜威顔之近龍袞恪趨於小次更知榮養之尊進大學衍義表真德秀汗竹雖厪何補聖經之奧食芹欲獻誤蒙天語之溫以十年纂集之勤欣一旦遭逢之幸中謝惟大學設八條之教為人君立萬世之程首以格物致知示窮理乃正心之本推之齊家治國見修已為及物之原曽子之傳獨得其宗程氏以來大明厥旨逮師儒之繼出有章句之昭垂臣少所服膺晚而知趣謂淵源逺矣實東魯教人之徽音而綱目燦然乃南面臨民之要道曩叨侍從論思之列適當姦諛蒙蔽之時念將開廣於聰明惟有發揮於經術使吾君之心炳如白日於天下之理洞若秋毫雖共鯀雜進於虞朝豈魑魅能逃於禹鼎不量菲薄欲效編摩遽罹三至之讒徒結九重之戀既投間而置散因極意於研精畎畝不忘君每惓惓於報上藩牆皆置筆幾兀兀以窮年首剟聖賢性命道德之言旁采古今治亂安危之迹必提其要皆聚此書凡諸老先生之講明粗加該括於君子小人之情狀尤極形容載瞻海嶽之崇深期效涓埃之裨補兹蓋恭遇皇帝陛下乾旋坤轉日就月將於緝熙殫厥心基命遹隆於成后念終始典於學遜志克邁於商宗方將切磋琢磨而篤於自修定靜安慮而進於能得事欲明於本末理期貫於精粗適稡成編冒塵清燕止其所止願益加止善之功新以又新更推作新民之化理宗即位德秀屢進鯁言彌逺謀撼之給事中王墍始駁德秀所主濟王贈典侍御史莫澤等交章劾之落職罷祠彌逺死上親政召為戶部尚書乃以衍義進上欣然嘉納權戶書謝表真德秀十連竊寵愧藩閫之罔功一札遄歸叨地官之晉長班躐陪於踐斗懼深重於履氷伏念臣素守朴忠濫膺迪簡曩被初元之召首躋邇服之榮自退屛於山林浸逖違於軒陛憂時之髮益白恨去國之十年戀闕之心如丹敢忘君於一飯間蒙起發再玷承流皂蓋分符氊復還於舊物青冥授鉞繡行沗於故鄉曽坐席之未溫忽賜環之已及方躬覽宏開於公道而彚征畢萃於羣賢敢圖孤迹之漂流亦辱清朝之記録且民部周司徒之任豈惟稽戶口之版圖顧尚書古納言之官蓋實專喉舌之樞要誤拜演綸之渥冒升曵履之華退省駑疲曷勝蚊負兹蓋恭遇皇帝陛下乾剛天健畜德日新親庶政以勵精大明黜陟臨百官而昭德洞别忠邪念臣嘗參紫槖之聯知臣精厲素絲之節趣還近綴俾侍清光臣敢不期稱隆私勉堅初志生財有道雖慙源流本末之知事君非欺願竭獻納論思之效江東漕到任謝表真德秀兩螭夾侍久點近班四牡載馳叨分劇郡假中祕隆儒之寵為外臺將指之光望過所期感深以惕伏念臣才非適用幸有逢辰屬漢廷更化之初首唐室登瀛之選金鑾夜直承密命者六期玉陛晨趨對清光於再稔凡吮墨濡毫之士皆振纓峩辨其間吏責既稀所願優遊於邇列主恩未報寧忘眷戀於本朝其如親闈喜懼之年當謹人子凊溫之職輒援公輔辭翰林之請庶幾潘嶽奉板輿之歡分太守之符日需成命出少府之節遽冒殊恩懷章而過里門閲宿而臨封部敬卜中和之節重宣寬大之書軺傳初馳旄倪爭覩謂朝廷所以輟柱下之史蓋聖主將以惠江右之民因博采於風謠頗究知其疾苦以垂罄之家而困追需之目以屢歉之歲而多流徙之人官無定證之簿書里有難平之徭役文移星火不勝胥史之誅求牒訴邱山半為賦租之繁重興言及此勿救可乎輒殫朝夕之咨諏兼課公私之緩急賦難遽省盍漸損賦外之征民未易蘇當先去民間之蠧切自量其綿薄恐終負於選掄伏遇陛下洪造曲成大明溥照念臣志存將母俾獲便於旨甘知臣學本愛人欲稍觀其政事肆加邃職仍畀重權臣敢不以阜俗為阜財之方以恱民為恱親之本灌輸所仰愧無鞭策之能撙節是先敬佩玉音之訓真德秀字希元建之浦城人寧宗嘉定中為起居舍人數言事不諱時史彌逺用事方以爵祿縻天下士德秀慨然謂劉爚曰吾徒須急引去使廟堂知世亦有不肯為從官之人遂力請去出為祕閣修撰江東轉運副使以奉祠再除知泉州到任謝表真德秀奉祠居里每勤北極之瞻進職守藩復沗南州之寄甫臨舊服恪布寬條臣聞天道至仁風霆無竟日之怒聖君大度山林鮮終棄之才韓安國起於徒中柳宗元用於貶所皆為長史蓋值明時微臣乏漢唐二子之能陛下守祖宗萬年之法昨者金華之入侍溫然玉色之下詢曷嘗因諌以罪人自愧格君之無術方抨彈交上獨亮狄山之愚逮渥宥一頒盡洗元城之玷何嗇於議罰而樂於用恩庸見九重之本心不忍一眚而棄物既班次對又秩殊廷沒齒飯疏夫亦奚憾建牙作屛則匪所期敢圖朱幡皂蓋之華仍蒞紫帽清源之境念昔先帝付臣此州玩愒三年不聞善最侵尋半世復見遺民屬當公私凋弊之餘不勝上下煎熬之急七邑而二為煨燼十室而九乏蓋藏禁旅雲屯軍餉每難於宿飽宗藩日茂俸緡半出於鑿空自省迂疏苦為經理幸遇陛下道心淵靜德性昭融不以諛恱為愛君故略臣疇昔批鱗之譴不以聚斂為體國故取臣平時求牧之長畀以舊封責其來效臣昔猶將父今獨擕孥祿弗逮於養親志惟專於報上拊摩瘡痏冀邦人生意之復還培溉本根為聖朝元氣之一助寧宗時德秀嘗以右文殿修撰知泉州有惠政理宗即位歷禮部侍郎直學士院屢進鯁言上虛心開納彌逺益憚之諷臺諌以德秀論濟王贈典劾之落職罷祠紹定五年進徽猷閣再知泉州迎者塞路深村百歲老人亦扶杖而出城中歡聲動地謝宣召入學士院備顧問表真德秀來從南服未宣民叛之勞召置北扉猥被宸綸之寵光生里巷榮動簮紳切觀列聖之用人惟待詞臣而加禮蓋於言語文章之外責其論思獻納之忠或雖忤旨而暫間終必棄瑕而復用修除翰院在環滁出守之餘軾侍禁庭亦赤壁歸來之際加歲月則其文老涉變患則其慮長乃登邃嚴以備顧問如臣者才華弗競戅拙自將掌先皇帝內制者六年每慚越爼逮陛下初元之再命竟許循牆以驅馳州縣之頻且放廢山林之久見聞寖少藝業益荒結茅屋於雲邊以甘終老瞻玉堂於天上若隔前生敢云白首之重來誤辱清衷之親簡獲玷久虛之選幾成三入之榮恭遇陛下肆筆成文解絃更化志孚羣聽欲下山東之書念在邊陲或訪河西之事必有端良之彥以充供奉之班奚取臣愚俾承人乏臣敢不益堅晚節思答隆知賜宫錦而嘉草詔之能雖非敢望即金鏡而摘任賢之要知所自新彌遠既死上始親政以顯謨閣侍制知福州召為戶部尚書改翰林學士知制誥德秀在理宗朝凡再入學士院詳此表語意蓋福州以後事也除刑部尚書謝表方嶽祈父王之爪牙久負臨邊之寄尚書國之喉舌遽塵司憲之班懇避無從叨踰已甚臣切以班固志刑法兼存兵甲之繕修臯陶作士師曰惟冦賦之姦宄蓋二者相為於表裏而四夷正賴於鞭笞乃咨分梱之臣興聞司臬之事繄此責則重矣非其人而謂何伏念臣受國厚恩遭時多事當其南牧既不能折遐衝以寢虜謀戒爾西征復不能殲羣醜以敵王愾烏幕雖云宵遁祠狐尚復晝嘷奚有微勞肆兹懋渥此蓋恭遇皇帝以并包立皇極以懲勸興人心謂賞僣及淫固難私於八柄然功疑惟重顧何憂於一官遂令孤外之蹤亦玷文昌之選臣敢不相為嘗膽獨有捐軀突厥通不習文已莫辭於憲部馬伏波雖已老誓當死於邊城賀耕籍表失名青壇祗祓嚴萬乘以尊臨黛耜爰興舉三推而躬勸歡傳華旦風動綿區竊以籍乃借民周雅述載芟之訓冕而從事戴經垂秉耒之辭不惟敦龎淳固於是乎成抑亦醴酪粢盛由此而出考之往牒具有明文故孝武頒詔於東郊章帝親巡於懷縣豈止一時之稱美實為十古之流光挺上聖之中興修縟儀而肇舉凡居涵覆孰不欣愈恭惟陛下大德時乘多能天縱盡挽雲間之河漢洗空天下之干戈南北交通書文混一肆念黎元之衆未知稼穡之艱爰擇元辰用勤終畝丕顯先農之祀於昭重榖之誠千耦其耘佇慶康功之即萬邦無懌永歌嗣歲之興臣叨守偏方幸觀盛事書頒一札已聞天語之叮嚀麥秀兩岐願繼前賢之倣佛賀河清表失名后祗秩祀適陳母事之儀坎德開先時薦河清之瑞表非常之景貺昭至感之精通凡在見聞孰不欣忭伏惟陛下誕揚基命欽率玄謨得虞帝之執中體成湯之秉哲人文煥而允穆聖風衍而普和名山既升集四靈而為畜萬物咸賴顧行葦而不傷恬淡宅中雍容垂拱天鑒丕德啓真籙以合符民戴上庥奄神區而望幸講求茂實俯詢僉同增修鄧上之宮佇發襄城之駕威儀浸盛兼商輅以齊驅福應駢臻豈漢鼎而專美惟域中四大地得一以攸寧天生五材水潤下而為利稽九河之既導冠四瀆以稱尊抱睢壤以縈回合汾源而奔注舟師振楫幾汨於涇泥川后靜波俄澄於江練連銀漢而共色侔浪井以成文三門緩激箭之流百丈見纖鱗之戲蕩邪却穢挹之無遜於甘泉薦潔明馨用之可資於玄酒實千年之慶會同萬世以延鴻臣等將事嚴祠獲觀丕應顧縉紳之士已拜於封章止旬浹之間又窺於列奏願示在庭之著作式昭希代之殊祥賀平宋表孟祺臣巴延等言國家之業大一統海嶽必明主之歸帝王之兵出萬全蠻夷敢天威之抗始干戈之爰及迄文軌之會同區宇一清普天均慶欽惟皇帝陛下道光五葉統接千齡梯航日出之邦冠帶月支之國際丹崖而述職奄瀚海以為家獨此宋邦弗遵聲教謂江湖可以保逆命舟楫可以敵王師連兵負固踰四十年背德食言難一二計當聖主飛渡江南之日遣行人乞為城下之盟逮凱奏之言還輒姦謀之復肆拘囚我信使忘乾坤再造之恩招納我叛臣盜漣海二城之地我是以有六載襄陽之討彼居然無一介行李之來禍既出於自求怒致聞於斯赫臣肅將禁旅恭行天誅爰從襄漢之上流復出武昌之故渡藩屏一空於江表烽煙直接於錢塘尚無度德量力之心乃有殺使毀書之事屬廟謨之親稟謂根本之宜先乃命阿嘍罕取道於獨松董文炳進師於海渚臣與阿珠安塔哈等沗司中閫直指偽都掎角之勢既成水陸之師並進常州一破列郡傳檄而悉平臨安為期諸將連營而畢會彼極窮蹙迭出哀鳴始則為稱姪納幣之祈次則有稱藩奉璽之請顧甘言何益於實事率鋭旅直抵其近郊召來用事之大臣放散思歸之衛士堀強心在四郊之橫草都無飛走計窮一片之降幡始竪其宋國主率諸大臣已於二月初六日望闕拜伏歸附訖所有倉廩府庫封籍待命外臣奉揚寬大撫戢吏民九衢之市肆不移一代之繁華如故兹惟睿算卓冠前王視萬里為目前運天下於掌上致令臣等獲對明時歌七德以告成深切龍庭之想上萬年而為壽更陳虎拜之詞孟祺字德卿符離人巴延伐宋為行省咨議遷郎中巴延雅信之每詣闕政無大小祺並裁決之宋平巴延奏祺前後功多晉嘉興路總管佩虎符行未久解官歸卒諡文襄徽欽入金大受挫辱有昏德重昏之封蒙古於瀛國不聞有此藝祖仁厚太宗鍥薄之報也天道好還夫豈欺我進授時厯經厯議表楊桓協時正日國政之大端章往考來厯書之明驗一或失應衆所共瞻豈天運之靡常始人為之未密昔稱作者初匪一家其始也莫不精微未幾則旋聞踈闊蓋由年拘積算日括周分不知窺測以考真率多傅會以求合必欲行於永久豈容失之毫釐幸當纍洽之辰共仰同文之治事加詳核法貴變通欽惟憲天述道仁文義武大光孝皇帝陛下政順隂陽德齊穹壤燭消息盈虛之理得裁成輔相之宜爰命文臣若稽乾象晝則考求實晷夜則揆度中星察氣朔之後先定躔離之朓朒精思密索討本窮原革前人茍簡之規成盛代不刋之典其為要旨具載成書所有授時歷經三卷立成二卷轉神注式一十三卷厯議三卷已繕寫成二十一册隨表上進干冒天威不勝惶懼震越之至楊桓字武子兖州人幼警悟讀論語書寢章慨然立志由是終身未嘗晝寢由教授召為太史院校書郎奉勑撰儀表銘歷日序文詞典雅進實録表王惲典謨述堯舜之功令名顯著方册布文武之政義問宣昭粵自漢隋及夫唐宋咸有信史以貽後來況大業豐功震今耀古惟深善述首議丕揚洪惟世祖皇帝仁孝英明睿謀果斷爰從潛邸有志斯民植根幹而佐理皇綱聘耆德而講明治道始平大理再駕長江過化存神有征無戰逮其龍飛灤水鼎定上都革弊政以維新擴同仁而一視規模宏遠朝野清明內則肇建宗祧創設臺省修舉政令登崇俊良外則整治師徒申嚴邊將布揚威德柔服蠻羌加以聖無不通明靡不燭守之以勤儉朴素養之以慈惠雍和收攬權綱綜核名實賞罰公而不濫號令出以惟行萬彚連茹羣飛入彀削平下土統正中邦慕義嚮風聲教實朔南之暨梯山航海職貢無遐邇之殊方且開學校而勸農桑考制度而興禮樂國號體乾坤之統書畫煥奎璧之文罄所有而酬戰功不待計而救民乏聽言擇善明德緩刑斂福錫民遇災知懼得洪範惟皇之理過周宣修政之勤以致時和歲豐民安吏職蓋帝德克周於廣運故至公均被以無方可謂文致太平武定亂略繼一祖四宗之志兼三皇五帝之功開天立極者三十五年立經陳紀者二萬餘事以謙讓弗遑於備紀故纂修未至於成書欽遇皇帝陛下寅紹詒謀厲精圖治亟覽觀於成憲思遹駿於先聲深詔下臣俾為實録宅心宗祏凝孝美墻開館局而增置官僚勑羣司而大紬圖籍編摩既富搜訪加詳采托於時政之編參取於起居之注張皇初稿增未見於罕聞承奉綸音俾蠲繁而就簡俯殫管見仰體宸衷盡略虛文一存實事其饗會征伐文物典章粲焉列三代之英蔚爾開萬世之業與夫才德孝亷之士忠良姦佞之臣版圖生齒之繁財賦畜牧之盛僅依條據粗致無遺今具所修成世祖皇帝實録二百一十卷事目五十四卷聖訓六卷凡二百七十卷謹繕寫為二百七十帙用黃綾夾復封全隨表上進臣等沗備台司幸膺盛典顧惟載筆才何有於三長勉進蕪辭慮庶幾於一得冒瀆聖聽不勝驚惶王惲字仲謀衛州汲縣人元貞元年以翰林學士纂修世祖實録因集聖訓六卷上之卒諡文定經筵官進職謝恩表虞集聖作稽古知崇效天開筵肆講於前經當寧屢煩於明詔垂憲萬世一新經緯之文有臣十人並拜便蕃之賜獨興睿斷創始明時伏惟昔者明王不以天縱而自聖本之先哲式資道揆以開人故伏羲則畫於河圖神禹錫疇於洪範凡將圖治愼在求聞蓋帝王傳授之精布乎方册而古今治亂之迹可以鑑觀爰咨博洽之材用廣聰明之識然守職業者特見諸政事之著惟事啓沃者先端其心術之微故兹曠典之行實重真儒之寄必經業可以發聖賢之蘊必器能可以相禮樂之成必養德之全素蒙孚信必至誠之積可致感通茍非其人不稱兹選而臣等性本固陋學尤迂疏守其師説之遺僅不忘其章句及轉國人之譯粗可逹其性情所謂材有限而道無窮心欲言而口不逮猶重昔人之歎況乎臣等之愚是故設醴上尊敷氊廣厦既極詢咨於纍歲蔑聞補報之微功敢謂能自得師坐而進道更錫官聯之重俾專誦説之司雖竊恩榮愈增憂責兹蓋伏遇皇帝陛下以乾坤之德為德以堯舜之心為心無一念不在於民生無一事不遵於祖憲遐方畢服猶虞水旱之為災羣賢在朝尚恐俊良之攸伏必合二帝三王之至盛以登四方萬國之太平下收瑣末於芻蕘禆益涓埃於山海臣等敢不力循古訓各盡微衷非先王之法不敢言冀必由於正路雖末世之事不敢避庶有戒於前車尚勸九歌用稱萬壽虞集字伯生允文五世孫父汲僑居崇仁已而避兵嶺外少從母楊氏口授論語孟子左傳歐蘇文通其大義泰定初遷祕書少監自是歲嘗行經筵之制取經史用國語漢文兩進讀集為反覆古今名物之辨以通之晉翰林直學士帝方嚮用文學集承顧問必委曲盡言或隨事規諫出不語人諫或不入歸家悒悒不樂家人見其然不敢問也衆患其知遇日隆相與摘其文詞為譏訕天子察其有自故不能中傷卒年七十七世稱邵庵先生四六法海卷四
