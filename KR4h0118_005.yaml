body:
  text: 四六法海卷五明王志堅編為晉安王謝南兗州章沈約臣以萊孱幼無秀業依天宅照藉海憑瀾王爵早加藩麾夙樹進不能間詩西楚好禮北河退無以振采六條宣風萬里懷慚起懼載溢心顔而皇明輝燭照被彌逺遂乃徙斾淮區遷金濟服朱驂出邸青組臨方瞻惟徴寵俯仰亡厝此等文本無大異但以秀潤勝人後人雖極力求勝而不可得故存之為陳六宫謝章江總恭膺禮命愧集丹縷之顔拜奉曲私愁縈翬羽之色魯宫夜火伯媛匪驚楚榭奔濤貞薑何懼豈期日月騰影風雲瀉潤遂復位崇九御聲髙六列象服增華丹軿耀采何以弼佐王風克柔隂化兢惶並集追想流荇之詩荷據相并遂失鳴環之節上陸宣公奏議劄子蘇軾竊謂人臣之納忠譬如醫者之用藥藥雖進於醫手方多傳於古人若巳經效於世間不必皆從於巳出伏見唐宰相陸贄才本王佐學為帝師論深切於事情言不離於道德智若子房而文則過辨如賈誼而術不疏上以格君心之非下以通天下之志但其不幸仕不遇時德宗以苛刻為能而贄諫之以忠厚德宗以猜疑為術而贄勸之以推誠德宗好用兵而贄以消兵為先德宗好聚財而贄以散財為急至於用人聽言之法治邊馭將之方罪巳以收人心改過以應天道去小人以除民患惜名器以待有功如此之流未易悉數可謂進苦口之藥石針害身之膏肓使德宗盡用其言則正觀可得而復臣等每退自西閣即私相告言以陛下聖明必喜贄議論但使聖賢之相契即如臣主之同時昔馮唐論頗牧之賢則漢文為之太息魏相條鼂董之對則孝宣以致中興若陛下能自得師莫若近取諸贄夫六經三史諸子百家非無可觀皆足為治但聖言幽逺末學支離譬如山海之崇深難以一二而推擇如贄之論開卷了然聚古今之精英實治亂之龜鑑臣等欲取其奏議稍加校正繕寫進呈願陛下置之坐隅如見贄面反復熟讀如聞贄言必能發聖性之髙明成治功於嵗月文忠斯舉即孔明為後主寫申韓意蓋起懦莫如厲療昏莫如晰乃古人因病用藥之意而孰知膏肓之不可起何也可為長歎中和日謝恩賜尺狀白居易右今日奉宣賜臣等紅牙銀寸尺各一者伏以中和屆節慶賜申恩當晝夜平分之時頒度量合同之令况以紅牙為尺白銀為寸美而有度煥以相宣逮下明忖度之心為上表裁成之德慶澤所及歡心畢同臣等塵忝日深寵賜嵗至雖恩光下濟咫尺之顔不違而尸素內慚分寸之功未效捧受愧畏倍萬恆情謹具奏聞謹奏吕頌令狐楚各有謝賜春衣牙尺表蓋唐時制度如此為濮陽公涇源謝冬衣狀李商隱恩極解衣榮加降璽戴山未重負日非暄臣謬領藩垣適當戎狄唯憑廟算粗展軍威絶塞獵回幸無警急髙烽火過但報平安直以地勢多隂川形稍背三伏常聞於屏箑九秋尋訝於垂繒代馬暫嘶隴山無葉燕鴻未過涇水先氷是以每降王臣仍迂御筆緘封垂露寵錫禦冬非玉女裁成即仙人織出徒驚在笥莫覩因針始顧孱微深懼不勝冠帶旋蒙被服便如能執干戈遍逮軍前歷霑麾下逹喜氣而陳根復秀動歡聲而蟄户潛開華楚成行曳婁塞路其山南宣歙三道大將等雖久居炎燠不慣嚴凝亦既更衣皆忘易地賈餘勇而例思盡敵感鴻私而咸願殺身各限征行不獲陳謝為中丞榮陽公謝借飛龍馬送至府界狀李商隱右中使某奉宣恩旨以臣赴任特借飛龍馬一匹并鞭轡等送至京兆府界者臣謬奉恩榮出叨亷間豈期蹇步深軫皇慈特命內臣俾騰上駟梁懸蜀鐙几覆吳鞍每多曳練之疑不假著鞭之力倐踰秦甸將復周間照地回光瞻天送影長亭欲别未期東道而來雙闕儻嘶願附北風之思無任感恩戀闕言涕屏營之至古者中丞出都上以一騎假之便為特恩今一介小人盜用偽符洋洋乘輿甚至以八人舁之此何為者也為南承嗣上中書門下乞兩河效用狀栁宗元伏以越敗夫差多會稽納官之子趙摧栗腹即長平死事之孤何者義烈之餘色氣猛厲上將效於國用下欲濟其家聲所以憤激悽愴常思致命者也某先父死難睢陽事存簡册纍降優詔榮及子孫爰自襁褓超升品秩肉食廩給未嘗暫停頃守涪州屬蜀西遘逆將至死命以盡夙心寢戈嘗膽志願未究會刀筆之吏置以深文首級之差今復誰辨薏苡之謗不能自明猶賴舊勳謫居樂土食人力之粟守無事之官拳拳血誠無所陳露伏見明制興師討伐恆冀蔑爾小醜尚欲逋誅某材非古人志慕前烈願得身當一隊效死戎行竭平生之忠懇申幽明之寃痛撫劔心往發言涕零嘗聞漢法有奮擊胸奴者諸侯不得擁遏又况丞相總軍國之重定廊廟之謀固當𢎞奬無所棄捐伏乞哀憫收撫以成其心承嗣歷涪州刺史劉闢叛以無備謫永州越語句踐栖於會稽乃令於三軍曰孤子寡婦疾疹貧病者納官其子官仕也仕其子而教之廩以食之也代人進瓷器狀栁宗元藝精埏埴制合規模稟至德之陶蒸自無苦窳合太和以融結克保堅貞且無瓦釡之鳴是稱土鉶之德器慙瑚璉貢異砮丹既尚質而為先亦當無而有用負暄雜録云陶冶自舜時便有三代迄於秦漢所謂甓器是也末俗尚靡不貴金玉而貴銅瓷遂有祕色窑器世言錢氏有國日越州燒進不得臣庶用故云祕色陸龜蒙詩九秋風露越窑開奪得千峯翠色來如向中宵盛沆瀣共嵇中散鬬遺杯乃知唐世巳有非始於錢氏按子厚此狀可以補負暄之遺故録之奏彈曹景宗任昉御史中丞臣任昉稽首言臣聞將軍死綏咫步無却顧望避敵逗撓有刑至乃趙母深識乞不為坐魏主著令抵罪巳輕是知敗軍之將身死家戮爰自古昔明罰在斯臣昉頓首頓首死罪死罪竊尋獯獫侵軼暫擾疆陲王師薄伐所向風靡是以徐淮獻捷河兖凱歸東關無一戰之勞途中罕千金之費而司部懸隔斜臨冦境故使狡虜憑陵淹移嵗月故司州刺史蔡道恭率勵義勇奮不顧命全城守死自冬徂秋猶轉戰無窮亟摧醜虜方之居延則陵降而恭守比之踈勒則耿存而蔡亡若使郢部救兵微接聲援則單于之首久懸北闕豈直受降可築涉安啓土而巳哉實繇郢州刺史景宗受命致討不時言邁故使蝟結蟻聚水草有依方復按甲盤桓緩救資敵遂令孤城窮守力屈凶威雖然猶應固守三關更謀進取而退師延頸自貽虧衄疆場侵駭職是之繇不有嚴刑誅賞安置景宗即主臣謹按使持節都督郢司二州諸軍事左將軍郢州刺史湘西縣開國侯臣景宗擢自行間遘兹多幸指縱非擬獲獸何勤賞茂通侯榮髙列將負擔裁弛鐘鼎遽列和戎莫效二八已陳自頂至踵功歸造化潤草塗原豈獲自己且道恭云逝城守纍旬景宗之存一朝棄甲生曹死蔡優劣如是惟此人斯有靦面目昔漢光命將坐知千里魏武置法案以從事故能出必以力錙銖無爽伏惟聖武英挺略不世出料敵制變萬里無差奉而行之實𢎞廟算惟此庸固理絶言提自逆胡縱逸久患諸夏聖朝乃顧將一車書慜彼司氓致辱非所早朝永歎載懷矜惻致兹虧喪何所逃罪宜正刑書肅明典憲臣謹以劾請以見事免景宗所居官下太常削爵土收付廷尉法獄治罪其軍佐職僚偏裨將帥絓諸應及咎者别攝治書侍御史隨遣續奏臣謹奉白簡以聞景宗字子震新野人梁武為雍州刺史景宗深自結附及起兵率五服內子弟三百人從軍城平封湘西縣侯天監二年為任昉所奏帝以功臣不問後又以功進爵為公修竹彈甘蕉文沈約渭川長兼淇園貞幹臣修竹稽首臣聞芟荑蕰崇農夫之善法無使滋蔓剪惡之良圖未有蠧苖害稼不加窮伐者也切尋蘇臺前甘蕉一叢宿漸雲露荏苒嵗月擢本盈尋垂蔭含丈階緣寵渥銓衡百卉而與奪乖爽髙下在心每叨天功以為己力風聞籍聽非復一塗猶謂愛憎異説所以挂乎嚴網今月某日有臺西階澤蘭萱草到園同訴自稱雖慙杞梓頗異蒿蓬陽景所臨繇來無隔今月某日巫岫斂雲秦樓開照乾光𢎞普罔幽不矚而甘蕉攢莖布影獨見鄣蔽雖處臺隅遂同幽谷臣謂偏辭難信敢察以情登攝甘蕉左近杜若江蘺依源辨覆兩草各處異列同欵既有證據羌非風聞切尋甘蕉出自藥草本無芬馥之香柯條之任非有松柏後凋之心蓋闕葵藿傾陽之識憑藉慶會稽絶倫等而得人之譽靡即稱平之聲寂寞遂使言樹之草忘憂之用莫施無絶之芳當門之弊斯在妨賢敗政孰過於此而不除戮憲章安用請以見事徙根翦葉斥出臺外庶懲彼將來謝此衆屈任昉有彈劉整范縝文沈約有彈王源文皆先攝左右及媒人等到臺辨問明確而後以白簡從事蓋當時政體如此或云風聞言事起於武后朝此語信然此與鱔表皆近俳然實毛頴之嚆矢也拜中軍記室辭隨王箋謝朓朓聞潢汙之水願朝宗而每竭駑蹇之乘希沃若而中疲何則臯壤搖落對之惆悵岐路東西或以鳴邑况乃服義徒擁歸志莫從邈若墜雨翩似秋蒂朓實庸流行能無算屬天地休明山川受納裒采一介抽揚小善故得捨耒場圃奉筆免園東亂三江西浮七澤契濶戎旃從容宴語長裾日曵後乘載脂榮立府廷恩加顔色沐髮晞陽未測涯涘撫臆論報早誓肌骨不悟滄溟未運波臣自蕩渤澥方春旅翮先謝清切藩房寂寞舊蓽輕舟反溯弔影獨留白雲在天龍門不見去德滋永思德滋深惟待清江可望候歸艎于春渚朱邸方開效蓬心于秋實如其簮屨或存衽席無改雖復身填溝壑猶望妻子知歸攬涕告辭悲來橫集朓為隨王子隆鎮西功曹轉文學子隆好詞賦朓尤被賞長史王秀之以朓年少相動欲以啓聞朓知之因事求還箋辭子隆云云時荆州信去倚待朓執筆便成文無點易為司徒趙國公謝皇太子寄詩箋許敬宗無忌惶恐白內使榮陽夫人至蒙寄歎别五韻并垂示擬古一首蹤開玉札炫目澄心行諷金聲式歌且抃竊惟化成天下實繫以導洪源體物緣情自風騷而綿列代莫不咸相祖述罕見生知伏惟殿下摛絢紹天含章挺睿溫文表裕藻清漢於離暉麗則凝華縟春宫於博望乃以監守餘暇俯貺清篇覽夜月之流光降無私於逺客想懸旌之未卷察翹心於征斾加又作依依垂栁益愴邊城欎欎中園偏傷逺塞殊私所被文旨兼深詞運理而參神氣凌雲而含粹五章間發若啓榮光之圖六律相宣如覿奏金之字無忌幸從神武愧乏王粲之才忝降斯文益深吳質之戀無任感荷慶躍之至於是扣寂求音繼震方之逸響披肝見意吐爝火之微光髙麗之役長孫無忌從征太子監國定州敬宗典機劇岑文本卒帝驛召敬宗以本官檢挍中書侍郎掌誥令此箋是時作也求自試啓王融臣聞春庚秋蟀集候相悲露木風榮臨年共悅夫惟動植且或有心况在生靈而能無感臣自奉望宫闕沐浴恩私拔迹庸虛參名盛列纓劍紫復趨步丹墀嵗時歸來誇榮邑里然無勤而官昔賢曽識不任而祿有識必譏臣所用慷慨憤悶不遑自安誠以深恩鮮報聖主難逢蒲栁先秋光隂不待貪及明時展悉愚效以酬陛下不世之仁若微誠獲信短才見序文武吏法惟所施用夫君道含𢎞臣術無隱翁歸乃居中自見充國曰莫若老臣竊景前修敢蹈輕節以冒不媒之鄙式罄奉公之誠抑又唐堯在上不參二八管夷吾恥之臣亦恥之願陛下裁覽融以父宦不達弱年便欲紹興家業啓齊武帝求自試謝髙祖啓袁昻恩降絶望之辰慶集寒心之日熖灰非喻荑枯未擬摳衣聚足顛狽不勝臣遍厯三墳備詳六典巡挍賞罰之科調檢生死之律莫不嚴五辟於明君之朝峻三章於聖人之世是以塗山始會致防風之誅酆邑方構有崇侯之伐未有緩憲於斫戮之人賖刑於酎罪之族出萬死入一生如臣者也推恩及罪在臣實大披心瀝血敢乞言之臣東國賤人學行何取既殊鳴鴈直木故無結綬彈冠徒藉羽儀易農就仕往年濫職守秩東隅仰屬龔行風驅電掩當其時也負鼎圖者日至執玉帛者相望獨在愚臣頓昏大義殉鴻毛之輕忘同德之重但三吳險薄五湖交通屢起田儋之變每懼殷通之禍空慕君魚保境遂失師涓抱器後至者斬臣甘斯戮明刑殉衆誰曰不然幸約法之𢎞承解網之宥猶當降等薪粲遂乃頓開鉗赭斂骨吹魂還編黔庶濯疵蕩穢入楚逰陳天波既洗雲油遽沐古人有言非死之難處死之難臣之所荷曠古不書臣之所死未知何地昻字千里顗之子齊末為吳興太守梁武起兵州郡望風皆降昻獨拒境建康平帝使李元履喻之敕曰袁昻道素之門世有忠節勿以兵威陵辱元履至昻亦不請降開門徹備而巳及至以為臨川王參軍昻啓謝云云帝答曰朕遺射鈎卿無自外謝隨王賜紫梨啓謝朓味出靈關之隂旨珍玉津之澨豈徒真定歸美大谷慙滋將恐帝臺妙棠安期靈棗不得孤擅玉盤獨甘仙席雖秦君傳器漢后推餐望古可儔於今何答謝隨王賜左傳啓謝朓昭晰殺青近發中汗恩勸挾册慈朂下帷朓未睹山笥早懵河籍業謝專門説非章句庶得既困而學括羽瑩其蒙心家藏賜書籯金遺其貽厥披覽神勝吟諷知厚謝勑賚地圖啓梁昭明太子漢氏輿地形兹未擬晉代方丈比此非妙匹之長樂唯畫古賢儔之未央止圖將帥未有洞該八藪混觀六合域中天外指掌可求地角河源戶庭不出豈問千秋自識烏丸之地脫逢壯武方著博物之書謝勑賚貂坐褥席啓梁簡文帝東瀛美毳不著馬彪之儀北朔文茵豈問張敞所記隂炭既重寒井猶氷特降殊私溫華曲被雖狐白千金織成千種李頒漢被楊降曹氊不足以髣佛洪慈連類聖澤上皇太子玄圃講頌啓梁簡文帝竊以舜韶始唱靈儀自舞陳律才宣風心競蕚輕禽短葉尚識音光沐善歡心寧忘舞抃伏惟殿下體髙玄賾養道春禁牢籠文圃漁獵義河注意龍宫研心寶印雲聚生什之才並命應王之匹探機析理怡然不倦朱華景月詎此忘罷屬素藏晚節玄英初氣霜竹浮隂風梧散葉從容雅論實會神𠂻綱經生多幸屬此休世䟿蹰奉渥得備磐藩而黏蠅未拔迷象不羈寶沒醉衣珠沈勇額得聞勝善寧忘歌詠謹上玄圃園講頌一首文慚綺發思闕雕英徒懷舞蹈之心終愧清風之藻冒昧呈聞追深赧汗謹啓謝賚扇啓梁簡文帝臣綱啓傳詔饒僧明奉宣勑旨垂賚細綾大文畫栁蟬山扇二柄文均析縷香發海檀肅肅清風即令象簟非貴依依散采便覺夏室含霜飲露青蜩應三伏之修景羣飛黃雀送六月之南風蔽日垂隂薰澤慙采浮涼滌暑蘋末愧吹聖人造物之巧俯萃庸薄王府好玩之恩於兹下被頂戴曲私伏增欣躍謹奉啓事謝聞謹啓謝東宫賜裘啓梁簡文帝綱啓蒙賚豹裘一領降斯止謗垂兹信服物華雉毳名髙燕羽綱才慙齊相受白狐之飾德謝漢藩均黑貂之賜地卷朔風庭流花雪故以裾生惠氣袖起陽春荷澤知慙瞻恩興戀不任下情謹啓事謝聞謹啓東宫上掘得慈覺寺鐘啓梁簡文帝竊以白亭舊室絶顯禎祥之氣闕里故堂暫聞鐘石之響猶復存諸良史汙彼篆素豈如杏梁遺飾回成紺殿椒墀昔處仍構寶階啓彛鐘於殊里記靈文於福地雖魏廟出璽魯祠現璧固以推兹孝感恧此禎契將郭舍鄙其開金羊田陋其産玉豈宜季武庭樹愧韓起之譽蜀相宅基慙孝安之碣伏惟覽啓增思撫瑞深悲慟切視奩哀喻封篋謝勑賜第啓梁元帝竊以漢錫五倫實云清吏魏寵衛臻用旌庸直未如靈光輪奐睢陽爽塏北連城闕有似甄侯之舍東望市鄽榮深豫章之圃昔狼望未平冠軍辭宅馬池猶隔雍丘諌邸臣慙霍曹逺志但識君命無違再思庸陋九殞非答上東宫古迹啓梁元帝師宜八分之巧元常三體之妙史籀李斯之篆梁鵠曹喜之書莫不總華桂宫盈滿甲館竊以鸞驚之勢既聞之於索靖鷹跱之巧又顯之於蔡雍是以逰霧重雲傳敬禮之法鳥頡魚頏表揚泉之賦頗好六文多慙三禮尚方大篆既其牢落柱下方書何曽髣佛空慕河間之聚書竟微東平之獻表齊攸尺牘顧巳缺然北海楷𨽻終成難擬謝東宫賜白牙縷管筆啓梁元帝春坊漆管曲降深恩北宫象牙猥蒙霑逮雕鐫精巧似遼東之仙物圖寫竒麗笑蜀郡之儒生故知稽賦非工王銘未善昔伯偕致贈才屬友人葛龔所酬止聞通識豈若逺降鴻慈曲覃庸陋方覺琉璃無當隨珠過侈但有羡卜商無因則削徒懷曹植恆願執鞭謝晉安王賜馬啓梁元帝繹武愧仲都遂蒙大驪之錫儒謝春卿空頒名馬之賚故以取方驎友自匹龍媒不待景公婉如齊畫無勞馬援翻等漢銅豈有滅沒黑龍連翩白馬錢文見重津名取貴相彼騏驥猶深戀主矧伊伏櫪彌結懷恩為妾宏夜姝謝東宫賚合心花叉啓梁元帝未得投壺先應含笑不因鸞鳳自能歌舞夜姝昔住陽臺雖逢四照曽逰澧浦慣識九衢未有仍代爵叉還勝翠羽飾以南金裝兹麗玉修靡夫人本分章華之裏中山孺子獨荷春宫之恩有志當熊無期投閣求為劉瓛立館啓任昉昔在魏中爰及晉始書貴虛玄人悅陶縱瑚璉廢泗上之容樽爼恣林下之適春干秋羽委曠而弗陳西序東膠寂寥而誰仰所以金雞忘曉玉羊失馭神器毁於獯戎寶厯遷于於越豈不悲歟劉瓛澡身浴德修行明經賤圭璧於光隂竟松筠於嵗晚貧不隕穫其心窮不二三其操而困無居止浮寓親逰垣棟傾鑽窐衢墊側有朋自逺無用栖憑皆負笈擔簦櫛風沐露瓛之器學無謝前修輒欲與之周旋開館招屈臣第西偏官有間地北拒晉山南望通邑雖曰人境實少浮喧廣輪裁盈數畝布以施立黌孰薄藝桑麻粗創茨宇瓛字子圭惔六世孫也篤志好學博通訓義為安成王參軍公事免自此不復有宦情聚徒教授貴逰士子莫不下席受業當時以比曹鄭嘗講月令畢謂學生曰江左以來隂陽律數之學廢矣吾今講此曽不得其倣佛學者美其退讓何胤嘗從受經時胤未知名惟瓛與周顒深器之齊武帝中竟陵王子良表為立館未及徙居卒梁武為立碑諡貞簡先生為卞彬謝修卞忠貞墓啓任昉臣彬啓伏見詔書并鄭義泰宣勑當修理臣亡髙祖晉故驃騎大將軍建興忠貞公壼墳塋臣門緒不昌天道所昧忠搆身危孝積家禍名教同悲隱淪惆悵而年世貿遷孤裔淪塞遂使碑表蕪滅丘樹荒毁狐兔成穴童牧悲歌感慨自哀日月纒迫陛下𢎞宣教義非求效於方今壼餘烈不泯固陳力於異世但加等之渥近闕於晉典樵蘇之刑逺流於皇代臣亦何人敢謝斯幸不任悲荷之至謹奉啓以聞彬字士蔚險拔有才而與物多忤仕既不遂乃著蚤蝨蝸蟲蝦蟇等賦又為禽獸決録皆大有指斥謝東宫賚園啓張纘性愛山泉頗樂間曠雖復伏膺堯門情存魏闕至於一丘一壑自謂出處無辨常願卜居幽僻屏避喧塵傍山臨流面郊負郭依林結宇憩桃李之夏隂對鏡開軒採橘柚之秋實而王畿陸海畝號一金涇渭土膏豪傑所競徙居好畤必待使越之裝别館河陽亦資牧荆之富此園左帶平湖修陂千頃右臨長薄清潭百仞前逼逸陌朝夕爽塏之容後望鍾阜表裏煙霞之氣每賸春迎夏華卉競發背秋向冬雲物澄霽窺瞰户牖不異登臨升降階墀巳窮厯覽舟楫所屆纍日不能究其源魚鳥之豐山澤不能喻其美纘字伯緒尚武帝女富陽公主博學多通與元帝為布衣交元帝自比諸葛亮桓溫惟纘許焉河東王譽之隙纘實搆成之後為嶽陽王察所殺性貪婪資賄填積元帝皆收之以粽蜜之屬還其家答皇太子啓何胤胤性愛山泉情篤魚鳥而從鷗未狎入獸相驚兼年齒衰暮荒徑榛梗既無語稼之客寧有論書之賔緘默畎畝栖息丘壑秀木清潭於茲未巳伏惟明睿之德誕縱自天忠孝之規不待因習猶復留神六經降意百氏同仁博古等物簉聞闢承華而延儒雅掃黃闥而列文學嘉美聿宣無思不勸胤無解頥之談屢蒙奬飾之重匪南皮之舊每荷存問之恩銜慈永極罔知攸置胤字子季尚之之孫齊欎林時為中書令雖貴顯常懷止足居會稽若邪山雲門寺後還吳居虎丘山西寺初胤二兄求點並栖遁世謂何氏三髙又以點為大山胤為小山昭明太子欽其德遣舍人何思澄致手令以褒美之故有此答年八十六卒從弟喪上東宫啓劉孝儀亡從弟遵百行無點千里立志同氣三荆之友假寢十起之慈皆體之於自然行之如俯拾自碣宫陪宴釣臺從幸攀附鱗翼三十餘載茫昧與善一旦長辭劍匿光芒璧碎符采躬搖神筆親動妙思雖每想南皮書憶阮瑀行經北館歌悼子侯不足輩此深仁齊兹舊愛謝晉安王賜宜城酒啓劉孝儀嵗暮不聊在隂即慘惟斯二理總萃一時少府鬬猴莫能致笑大夫落雉不足解顔忽值瓶瀉椒芳壺開玉液漢樽莫過殷杯未逢方平醉而遁仙羲和耽而廢職仰憑殊途便申私飲未矚罍恥已觀幘岸傾耳求音不聞霆擊澄神密眂豈覿山髙愈疾銷憂于斯已驗遺榮忽賤即事不欺酩酊之中猶知銘刻謝東宫賜城傍橘啓劉孝儀多置守民晉為厚秩坐入縑素漢譬封君固以俯匹穰橙俯連楚柚寧以魏瓜借清泉而得冷豈如蜀食待飴蜜而成甜重似倒影陽池垂華金堞信可珍若榴於式乾貴蒲萄於别館孝儀名潛孝綽嘗云三筆六詩三即孝儀六謂孝感也孝儀為人寬厚內行篤謝東宫賜淨饌啓劉孝威糜獻牛牧飯出龍宫千品甘露之食百花珍藥之果餅兼髓乳漿苞蔗奈雕盤流其滋旨寶器委其色香足使三世長者羞彼識味一角仙人耻其呪術微物多幸叨奉曲恩性命可捐殊私難答謝賚錦被啓劉孝威色豔蒲桃采踰聨璧鄂君慙繡楚侍羞珠雖復帝賜鶴綾客贈鴛綺髙懸麗藻逺謝鮮明漢老悅其怪文魏馬驚其香氣謝東宫賜宅啓庾肩吾肩吾居異道南才非巷北流寓建春之外寄息靈臺之下豈望地無湫隘里號乘軒巷轉幡旗門容幰蓋况乃交垂五栁若元亮之居夾植雙槐似安仁之縣却瞻鍾阜前枕洛橋池通西舍之流窗映東鄰之棗來歸髙里翻成待封之門夜坐書臺非復通燈之壁才下應王禮加溫阮官成名立無事非恩肩吾字慎之初為晉安王國常侍被命與劉孝威等十人抄撰衆籍號髙齋學士王為太子兼東宫通事舍人簡文即位以為度支尚書侯景矯詔遣諭當陽公大心因逃入東後間道奔江陵仕至中書令卒謝東宫賚米啓庾肩吾滍水鳴蟬香聞七里瓊山合頴租歸十縣某人慙振藻徒降雲間之松職濫更繁空散家承之俸成珠委地事重逢仙逰玉為糧珍踰入楚雖復激水滄流不待監河之説春風掃地方誚文學之篇肩吾又有謝湘東賚米啓云連舟入浦似彥伯之南歸積地為山疑馬援之西至謝東宫賚古迹啓庾肩吾竊以仙巖遺傳入握成塵孔壁藏文隨開已蠧石書乍暗厨畫猶飛豈有迹經四代年踰十紀芝英雲氣之巧未損松鉛鵲反鸞驚之勢不侵蒲竹必使酒肆人來池流色變將損北海之牘還代西河之簡謝賚梨啓庾肩吾睢陽東苑子圍三尺新豐箭谷枝懸六斤未有生因汾水産自桐丘影連鄧橘林交苑柿逺薦中厨爰頒下室事同靈棗有願還年恐似仙桃無因留核謝武陵王賚白綺綾啓庾肩吾圖雲緝鶴鄴市稀逢寫霧傳花叢臺罕遇雖復馬均騁思比巧猶慙虞卿受金方恩未重此扁舟獨反燕路有心載寶言歸銜珠無日謝厯日啓庾肩吾凌渠所奏弦望既符鄧平之言錙銖皆合登臺視朔覩雲物之必書拂管移灰識權衡之有度初開卷始暫謂春留末覽篇終便傷冬及徘徊厚渥比日為年謝東宫賚內人春衣啓庾肩吾階邊細草猶推綟染之光户前桃樹反訝藍花之色遂得裾飛合燕領鬬分鸞試顧採薪皆成留客謝蒙賚朱櫻啓庾肩吾成叢殿側猶連製賦之條結實西園非復粘蟬之樹異合浦之歸來疑藏朱實同秦人之逐彈似得金丸答陶隱居賚术煎啓庾肩吾竊以緑葉抽條生於首峯之側紫花標色出自鄭嵓乏下百邪外禦六府內充山精見書華神在籙木榮火謝盡採擷之難啓旦移申窮淋漉之劑故能競爽雲珠爭竒氷玉自非身疲掌硯役倦攀桃豈可立致還年坐生羽翼臨洮丹井方覺可捐酈縣菊泉無勞復汲庶得遨逰海岸追涓子之塵馳騖霍山共陳生為侣謡俗輕施尚曰難酬出世鴻恩寧知上報肩吾又有謝术煎一小啓云味重金漿芳踰玉液足使芝慙明麗丹愧芙蓉坐致延生伏深銘戴并附於此謝滕王集序啓庾信紫薇懸映如傳闕里之書青鳥遙飛似送層城之璧若夫甘泉宫裏玉樹一叢玄武闕前明珠六寸不得譬此光芒方斯照燭有節有度即是能平八風愈唱愈髙殆欲去天三尺殿下雄才蓋代逸氣橫雲濟北顔淵關西孔子譬其毫翰則風雨爭飛論其文采則魚龍百變蒲桃繞館新開碣石之宫修竹夾池始作睢陽之苑琉璃泛酒鸚鵡承杯鳳穴歌聲鸞林舞曲况復行雲逐雨回雪隨風湖陽之尉既成為喜之因舂陵之侯便是銷憂之地某本乏材用無多述作加以建鄴陽九劣勉儒硎江陵百六幾從士隴至如殘編落簡並入塵埃赤軸青箱多從灰燼比年痾恙彌留光隂視息桑榆已逼蒲栁方衰不無秋氣之悲實有窮途之恨是以精采瞀亂頗同宋玉言辭蹇吃更甚揚雄一吟一咏其可知矣好事者不求知音者不用非有班超之志遂已棄筆未見陸機之文久同燒硯至於凋零之後殘缺所餘又以雜用補袍隨時覆醬聖慈憐愍遂垂存録始知揄揚過差君子失辭比擬縱橫小人迷惑荆玉抵鵲正恐輕用重寶龍淵削玉豈不徒勞神慮匠石回顧朽材變於雕梁孫陽一言奔蹄成於駿馬故知假人延譽重於連城借人羽毛榮於尺玉溟池九萬里無踰此澤之深華山五十仭終愧斯恩之重即日金門細管未動春灰石壁輕雷尚藏冬蟄伏願聖躬與時納豫南陽寶雉幸足觀瞻酈縣菊泉差能延夀伏遲至鄴可期從梁有日同杞子之盟會必欲瞻仰風塵共薛侯而來朝謹當逢迎冠蓋魚腸尺素鳳足數行書此謝辭終知不盡滕王名逌周文帝第十三子少好經史解屬文後為隋文帝所害諡曰聞所著文集頗行於世答趙王啓庾信仰承張幕全韓連營上地澠池置陳解鄧禹之圍函谷開關削王元之印蜂旗朝上刁斗夜鳴彌雄壯士之心足起橫行之志况復才人出娉還得賢夫塞外有夫人之城軍中有女子之氣都尉青旗即時春色將軍大樹已復花開雲氣浮壘流星泛枕細舞長歌橫簫直笛當乎此時青雲之上信不學無術本分泥沈忽逢天造搜揚仄陋今者遂總憲司預聞刋鼎獻嵗刑書既應懸法上春木鐸方須徇人但年髮已秋性靈久竭嘉石肺石無以測量舌端筆端惟知繁擁乖展一月遂涉兩年傾首東瞻山河千里風塵未盡霜露霑衣仰願珍宜以為身寶趙王名招周文帝第七子幼聰頴博涉羣書文學庾信體詞多輕艷隋文輔政招欲圖之事覺陷以反殺之諡曰僣有文集十卷謝趙王賚絲布等啓庾信望外之恩實符大賚非常之錫乃溢生涯曵練且觀無勞白馬之望流泉欲委佇見青鳬之飛楊池掘荷李園移樹陳留下粟有愧深恩櫟陽雨金翻慙曲施靈臺久客從此數炊黍谷長寒於今更暖從雲夢之田不喻此樂得豐城之劍未均斯喜謝趙王賚絲布啓庾信某啓奉教垂賚雜色絲布三十段去冬凝閉今春嚴徑霰似瓊田凌如鹽浦張超之壁未足鄣風袁安之門無人開雪覆鳥毛而不暖燃獸炭而逾寒逺降聖慈曲垂矜賑諭其蠶月殆罄桑車津實秉杼幾空織室遂令新市數錢忽疑敗綵平陵月夜驚聞搗衣妾遇新縑自然心伏妻聞裂帛方當含笑莊周車轍實有涸魚信陵鞭前元非窮鳥仰蒙經濟伏荷深慈謝趙王示新詩啓庾信八體六文足驚毫翰四始六義實動性靈落落詞髙飄飄意逺文異水而湧泉筆非秋而垂露藏之山嵓可使雲霧欎起濟之江浦必當蛟龍繞船首夏清和聖躬怡裕琉璃彤管鵲顧鸞回婉轉緑沈猿驚鴈落下風傾首以日為年犍為舍人實有誠願碧雞主簿無由遂心寂寞荆扉踈蕪蘭徑驂駕來梁未期卜日遣騎到鄴希垂枉道謝趙王賚白羅袍袴啓庾信程據上表空論雉頭王恭入雪虛稱鶴氅未有懸機巧綜變躡竒文鳳不去而恆飛花雖寒而不落披千金之暫暖棄百結之長寒永無黃葛之嗟方見青綾之重對天山之積雪尚得開襟冒廣樂之長風猶當揮汗白龜報主終自無期黃雀謝恩竟知何日謝明帝賜絲布等啓庾信臣某啓奉勑垂賜雜色絲布綿絹三十假銀錢二百文某比年以來殊有闕乏白社之內拂草看氷靈臺之中吹塵視甑懟妻狠妾既嗟且憎瘠子羸孫虛恭實怨王人忽降大賚先臨天帝賜年無踰此樂仙童贈藥未均斯喜張袖而舞玄鶴欲來撫節而歌行雲幾斷所謂舟楫無岸海若為之反風薺麥將枯山靈為之出雨况復全抽素繭雪板疑傾併落青鳬銀山或動是知青牛道士更延將盡之年白鹿真人能生已枯之骨雖復拔山超海負德未勝垂露懸針書恩不盡蓬萊謝恩之雀白玉四環漢水報德之蛇明珠一寸某之觀此寧無愧心直以物受其生於天不謝謝趙王賚米啓庾信某啓奉教垂賚米十石丹烏銜穟既集西周黃雀隨車還飛東市漬而為種不無霜雪之精取以論兵即有山川之勢某陋巷簞瓢櫛風沭雨剝榆皮於秋塞掘蟄燕於寒山仰費國租遂開塵甑非丹竈而流珠異荆臺而炊玉東方朔之捧米既息長飢西門豹之墾田方慙此賚謝趙王賚乾魚啓庾信某啓蒙賚乾魚十畨澧水朝浮光疑朱鱉文鰩夜觸翼似青鸞况復洞庭鮮鮒溫湖美鯽波瀾成雨鱗甲防寒某本吳人常想江湖之味乃其飢也唯資藜藿之餘慈賚渥恩膏腴流竈不勞獅子之亭即勝雷池之長翻驚河伯獨不愛人足笑任公終年垂釣謝滕王賚馬啓庾信某啓奉教垂賚烏騮馬一匹栁谷未開翻逢紫燕臨源猶逺忽見桃花流電爭光浮雲連影張敞畫眉之暇直走章臺王濟飲酒之歡長驅金埒時王褒亦有謝馬啓云漢時樂府偏愛權竒晉世桑門特憐神駿黃金作勒足度西河白玉為鐙方傳南國倘逢漢帝仍駕鼓車若值魏王應驚香氣答豫章王啓崔頥某昨伏奉教書榮貺非恆心靈自失若乃理髙象繫管輅思而不解事富山海郭璞注而未詳至於五色相宣八音繁會鳳鳴不足喻龍章莫之比吳札之論周頌詎盡揄揚郢客之奏陽春誰能赴節伏惟令王殿下稟潤天潢承輝日觀雅道邁於東平文藝髙於北海漢則馬遷蕭望晉則裴楷張華雞樹騰聲鵷池播美望我清塵悠然路絶祖濬燕南贅客河朔惰逰本無意于希顔豈有心於慕藺未嘗聚螢映雪懸頭刺股讀論唯取一篇披莊不過盈尺况復桑榆漸暮藜藿屢空舉燭無成穿楊盡棄但以燕求馬骨薛飬雞鳴謬齒鴻儀虛班驥皂挾太山而超海比報德而非難堙崑崙以為池匹酬恩而反易忽屬周桐錫瑞唐水承家門有將相樹宜桃李真龍將下誰好有名濫吹先逃何須别聽但慈旨抑揚損上益下江海所以稱王丘陵為之不逮曹植儻豫聞髙論則不殞令名楊修若竊在下風亦詎虧淳德無任荷戴之至謹奉啓以聞本傳頥字祖濬此書自稱祖濬蓋以字行也隋唐間人名字多不可定大率如此詳考在王書後上武侍極啓王勃某聞玄螭掩耀光銷赤堇之芒白鶴催輝影滅青胡之寶由是紫氛霄耿指牛漢而忘歸舟水神迷道驪泉而罔悔其有龍文巳逺輕圖剸兕之功魚目濫持自疑靈蛇之色循榮覽分朝聞夕可君侯締華椒閣席寵芝扄粲貂冕於金軒藻龜章於玉署月開鸞鏡懷精鑒以分形霜湛虬鐘藴希聲而待物吞九溟於筆海若控牛涔抗五嶽於詞峯如臨蟻垤馳魂霧谷欣逢紫岫之英驛思霞丘佇接青田之響某北巖曲藝東臯下節攀翰苑而思齊傃文風而立至迹疲千里未陪丹轂之逰葉契三英尚隔黃衣之夢謹憑洪貸輒録舊文輕敢上呈列之如右涓波有託望日谷以馳誠鐘鼓無施伏雷門而假息王勃益州夫子廟碑云帝車南指遁七曜於中階華蓋西臨藏五雲於太甲張燕公讀至此不解訪之一行一行言北斗建午七曜在南方有是之祥無位真人當出華蓋以下卒不可悉蓋其學之奧僻如此雖古人不盡知亦不諱其不知也近有人舉勃文問唐叔達叔達言諸果吾能别之若搗為果單則不能别矣此文中之果單也英雄欺人哉然諸公文實亦有此病上明員外啓王勃側聞金烏縱轡俯圓燧而抽光瑶兔浮輪候方諸而吐液斯則洪纎異數𡨕符造化之津髙下相懸精契陶鈞之表故知聲同義合存長幼於三州理隔氣殊置山川于一靣神交可託風雲於杵臼之間道不虛行涇渭於簮裾之列其有迹申知已投爵里於思齊事迫當仁抱龍泉而願割雖荆山已峻多輕抵鵲之珍而渤澥方春敢進歸鳬之景伏惟丈人珠躔降德銑社抽英河嶽縱其神器煙霞發其符采江東第一家傳正始之音日下無雙譽重名流之首三冬文史先兆迹於青襟百里絃歌即馳芳於墨綬彭澤陶潛之菊勝氣猶存河陽潘嶽之花芳風遂逺榮加從袂上清蘭府之逰寵奪攀輪更掌蓬山之務麟圖緝諡定榮辱於三泉鵷閣裁書考薰蕕於四部既鶴鳴雲路望儷朝端鴻漸星臺俯諧僉議亷平譽號李宣伯之當官雅操繩時山巨源之稱職加以文場武庫發揮廊廟之師瓊樹瑶林寥廓風塵之表一丘一壑同阮籍於西山一嘯一歌列稽康於北面詞條鬱霧遙騰駕日之隂辨鍔橫霜直上衝星之氣鳬鐘蓄韻聞片言而指掌鸞鏡懸心見一善而明目情源九𣲖士流欣滿腹之期德宇千門詞人有庇身之望方當坐談帝席雄視羣公豈徒比迹天府雌伏郎宫而已哉某崇徽啓緒盛德傳家承太子之仙宗析將軍之逺系朱輪在漢列髙士於三台青蓋浮江扈平王於七姓遺風舊烈尚存清白之基祖德家聲代有縱橫之自及金陵東覆玉馬西奔髦頭傑起文儒繼出鳳鳴朝日森梢煙雨之標龍躍雲津盤礴江山之氣雖雄名雅譽隨朔野而揚聲而華冕雕軒比南風而不競陳太丘之積善羔鴈成羣謝車騎之餘芳蘭蓀不替趨庭洽訓共歌朱蕚之篇避席承觀猶守青箱之業嘗謂酣神北阜籍春渚而忘歸動影南櫺坐秋山而長往不意蘭臯獨嘯輕交委鶴之書芝澗行謡坐辱飛龍之使年殊賈誼仰宣室而方同業謝劉繇俯長途而遂恧塞上浮雲之迹空倦吳山隋侯明月之珠終悲暗室豈不知拂衣長謝林泉多倦俗之因安枕有餘廟堂非養髙之所松楹坐月臨黛壑而遐征桂席攀風俯青嵓而自足而欲俯首屈膝逡巡多士之林弔影慙魂骯髒文昌之府徒以牛蹄巳倦臨文壑而驤鱗羊角可逢想髙衢而撫翼參名國士方叨智伯之恩揮迹奉常冀雪公孫之恥識正平於處士雖在孔融期仲容於望外終資許允猶恐先馳拆翮頻驚鶂路之風再舉枯鱗空擊龍門之水丈人借以顔色資以恩波垂雅契於長年敘情交於纍代情加倒屣知步頃之生光禮極升堂覺聲名之有地是用俯抽丹思上瀆清顔鏤殊奬於肝膽銜德音於咳唾懦夫增氣先歌易水之風壯士投心思赴吳宫之火恩崇命淺瞻吕梁而可泛山髙海深涉孟門而何險上兖州刺史啓駱賔王側聞未遇孫陽鹽車無絶塵之迹時逢和氏荆山有連城之珍豈若聽清音於㸑餘則枯桐發響收夜光於玄壁則怪石騰輝在物猶然况於含識者矣伏惟明使君公鳳穴振儀龍門標峻瓊姿嶽立表秀干雲霞煥霜飛瑶貞鏡鑑既而代工天府忠簡帝心擁熊軾而撫百城建隼旟而臨千里坐棠敷惠恩纒去思剖竹垂仁式歌來暮清凝夜燭化警晨烏外朂九農內𢎞五教導之以禮樂齊之以刑書約法遵寬誤示蒲鞭之耻發言唯信結控竹馬之期甘雨隨車雲低輕重之蓋還珠合浦波含逺近之星至如卧理稱難坐嘯匪易披裳問疾垂愛景以字人褰帷廣聽穆薰風以扇物飛霜秋降叶隼擊而防小人零雨春濡飾羔旌而禮君子於是仁風革俗吏不忍欺美譽欎於三髙芳猷騰於萬古若乃清規逺鏡皎月色於靈臺玄鑒虛凝穆松風於智府研幾三篋探賾九流縟綺蕚於詞林綷仙花於筆苑文江翻浪織玉瀲以韜霞學海驚瀾綴珠連於濯錦加以懸榻待士擁篲禮賢汲引忘疲奬提不倦懷經味道之客望範圍以駿奔兼流包略之夫窺義園而遐集求小善於毫芥顧正禮於二龍振幽滯於泥沙許公明於一驥某淹中故俗體列朴厚之宏規稷下遺氓祇陶禮義之餘化頗逰簡素少閲縑緗每蟋蟀凄吟映素雪於書帳莎雞振羽截翠蒲於翰池既而學異懷蛟才非夢鳥價乍齊於南漢芳不重於東山幸屬日月光華雲霞紛郁方結羡魚之網將謡扣角之詞奮短翮於榆枌希髙標之餘拂躍纎鱗於涓滴望鴻澤之微霑所冀顧盻曲流翦推增價則鉛刀起一割之用跛鱉致千里之行是以竊混吹於齊竽濫飛聲於郢唱抱山雞而自恧顧遼豕以多慙輕觸威顔不遑流汗上兖州崔長史啓駱賓王側承鄷城戢耀駭電之輝俄剖沙丘蜿迹籋雲之轡載馳然則激溜侵星佩潛蛟於壯武騰鑣厯塊騁蹀駿於咸陽且喣轍疲鱗側羡鼇潭之躍觸籠短翼迥望鵬程之飛是以齊郊夕唱牛歌掞白石之詞漢境朝趨車候驚拂塵之思伏惟某公騰瀾浴景濬靈𣲖以含珠擢幹梢雲翊淮巖而聳桂崇基疊秀匡霸道於周盟茂緒聯輝贊文場於漢戚偉龍章之秀質騰孔雀於觹年叶鳳彩之英姿辨蟾精於弱歲靈臺宏逺騁霄練於霜鐔丹府幽深絢朝虹於璧渚心波湛漢詠魄曜於黃陂情嶽干天韞風雲於稽巘龍津共濟競欣登御之車蕪室欽賢必攬澄清之轡鬱文條而耀彩藻逸潘花蔚詞峯而衒價光浮衛玉然則昆溪既琢必見山川之精樹羽已懸行嗣雲韶之響是以佐龜隂而演化務肅百城翼麟壤以宣風恩覃千里徽猷克著逾盛德於休徵聲績聿宣軼規模於恭祖佩吕刀而紹美自贊褰帷之逰屈龎驥而流芳將叶順風之問加以側階引彥鑒宋子之微言倒屣迎賔辨王生之雅量故使圓流之下探照乘於長波髙岫之巔剖連城於幽石某斗筲小器蟭蚊末品斜帶嶧梧戢晞陽之厚德旁鄰汶篠慕貫時之貞徑直以容膝一丘曲阜之瓢遽切枕肱五畝成都之壁巳窮擔石厭於糟粳負薪疲於裋褐然而少奉過庭之訓長趨克已之方弋志書林咀風騷於七略耘情義圃偃圖籍於九流灑惠澤於羊陂屢泛文通之麥峻曲岸於鶯谷時遺公叔之冠雖不能縱逸韻於霜臯唳野致九天之響而頗亦蓄餘芬於露薄垂薰有十步之芳而乃恧迹魯鴻悲荆山之抵鵲簉名韓犬歎稽阜之橫梁方今玉琯躔秋金風動籟吳宫歸乙望隂岫以依遲素林反鴈候朝陽而低舉籯金味道之子候纁帛以彈冠屑玉含毫之人望弓旌而翹足竊不揆於庸識輒輕擬於揚庭所冀恩波時流咳唾儻蒙分其斗水濟濡沫之枯鱗惠以餘光照孀居之寒女得使伏櫪駑蹇希騏騮而蹀足竄棘翩翾排鵷鸞而刷羽則捐軀匪吝碎首無詞雖復投報楊金君子以之貽戒效誠魏草小人之所懷恩輕瀆威嚴懼深履尾載塵聽覽迫甚蹈氷上齊州張司馬啓駱賔王某啓昔者薛邑聞歌揖馮歡於彈鋏夷門停駕顧侯嬴於抱關何則志合風雲載笠均乎乘馬情諧道術忘筌貴乎得魚是以挹蘭言於斷金效蓬心於匪石庶清音動聽賞流水於牙絃妙思通神叶成風於郢匠伏惟司馬公疏源白水浸地軸以輪波纂慶黃軒感星精而誕命綴珠華於七耀聨玉葉於五雲至夫神石呈祥靈鈎表貺千年馭鶴振仙駕於帝鄉七葉珥貂襲榮光於戚里因以紛綸國牒昭晰家聲洎乎鹿走周原相秦圖以興霸蛇分沛澤翼漢運以基皇常山王之玉潤金聲博望侯之蘭薰桂馥羽儀百代掩梁竇以霞騫鐘鼎一時罩袁楊而嶽立固得重規逺鏡湛月路以流清茂趾遐鋪架雲門而擢秀公飛英鳳穴藻五色以凝華顯曜驪泉含九重而流潤風情踈朗霜明月湛之姿氣骨端嚴雪白氷清之槩若乃性符神授道擅生知挫三端于情鋒朝九流於學海博聞強記辨晉國之黃能將聖多能識吳門之白馬言泉漱潤驚瀑布以飛瀾文江淡清含濯錦而翻浪欎槐市而增茂穆蘭室以流芳於是翔鱣應符觀光上國飛龍成卦利見大人摶羊角以垂天展驥足而騰景翼二潛邸紹敬祖之清亷光贊外臺陳君回之亮直推公平而折獄磔鼠謝其嚴明擁端慤而行仁化蛇慙其智勇加以清規日舉湛虛照於氷壺玄鑒露凝朗機心於水鏡謙光自牧恭己愛人片善必甄揖虞翻於東箭一言可紀許顧榮以南金但某疾抱支離材均擁腫進不能握蘭分竹綰銀黃於雲臺退不能絶粒茹芝煉金丹於地肺而出沒風塵之內漂淪名利之間知無毛薛之交仕乏金張之援塊然獨居者一紀於茲矣然而日夜相代恐溝壑之非遙貧病交侵思薜蘿之可託尚欲乘幽控寂追夏黃於商山樂道栖真從魯連於滄海豈圖語默易爽心迹難并陟橋之恨愈深攀桂之情徒結是用絶心乾沒耽閲丘墳謁子將於南荆訪康成於北海西逰梁益仰司馬王揚之風東入臨淄慕淳于管晏之智瞻言前古徒欲思齊俯惟當今空勞懷刺不意雲浮礎潤霜落鐘鳴揖郭泰於仙舟有道斯世賞鬷明於撤爼盛德猶存雖雅調清歌誠寡和於郢路而庸音濫吹竊混奏於齊竽輕課撮囊揄揚盛德庶幾金波離畢零陵之石自飛瑶光建寅蕭丘之火暫爇學慙麟角德輕鴻毛愧汗如漿憂心若厲榖山筆麈云漢唐贈答詩不必知其為誰而一假精神意氣非其所與者不足以當之近代之詩必點出姓氏地名官爵以為工妙而不知其反拙矣此論極妙此篇組織張姓故事乃此套之祖也片善必甄以下數聨上李少常啓中復用之其他雷同尚有數處以賔王之才儉於數語乃爾何耶上髙長史述和詩啓李嶠某啓近於録事參軍杜延昌處伏見公秋月遙想洛城十韻之作曲中之妙傳乎郢客之聲天下之珍得自隋侯之掌鳳鳴六吕龍文九光駭屬奇觀相趨動色若乃政理餘隙翺翔多暇臨八水之髙秋企三河之上國衣冠濟濟入青瑣而步丹墀車馬喧喧下銅衢而赴金谷人物仙舟之會風塵俠窟之逰莫不屬想心目託情謡詠九回靈府遙馳雨露之郊千里神畿近接風雲之思雕文將錦繡同美惠氣與芝蘭等馥用迫秦肆懸輕吕氏之金持入周京即貴洛陽之紙足使兩都賔主羞談翰墨二陸兄弟耻論詞賦死者可作賈生為入室之徒來者難誣潘子得扶輪之地某學異通敏才非沉欎刀筆為吏趨馳之歲月巳多黼藻成文雅頌之風流尚缺平原從者終慙入楚之逰闕里門人空積後陳之歎徒以夙承光彩早延提拂曽將薄伎見知思以庸音自效輒忘固陋敢有和歌登卞肆而論寶入夔門而撫節擬託非倫揣摩增靦謹啓謝李相公示手札啓栁宗元某啓六月二十九日衡州刺史吕溫道過永州辱示相公手札省録狂瞽收撫羈縲沐以含𢎞之仁忘其進越之􅓧感深益懼喜極增悲五情交戰不知所措宗元質性庸塞行能無取著書每成於廢疾進德且乏其馨香常願操篲醫門掬溜蘭室良辰不與夙志多違昨者踴躍殘魂奮揚蓄念激以死灰之氣陳其弊帚之詞致之煙霄分絶流盻今則垂露在手清風入懷華衮濫褒於赭衣龍門俯收於坎井藻鏡洞開而秋毫在照文律旁暢而寒谷生輝化幽欎之志若覿清明換兢危之心如承撫薦非常之幸豈獨此生伏以淮海劇九天之遙瀟湘參百越之俗傾心積念長懸星漢之上流形委骨永淪魑魅之羣何以報恩唯當結草無任喜懼感戀之至謹啓謝中書張相公啓劉禹錫某智乏周身動必招侮一坐飛語如衝駭機昨者詔書始下驚懼失次呌閽無路擠壑是虞草木賤軀誠不足惜鳥烏微志實有可哀伏蒙聖慈遽寢前命移蒞善部載形綸言凡在人臣皆感至德凡為人子同荷至仁豈唯鯫生獨受其賜伏以相公心符上德道冠如仁一夫不獲戚見於色密啓未下歎形於言竟回三舍之光能拔九泉之厄袁公之平楚獄不忍錮人晏子之哀越石仍伸知己所以慶垂胤祚言成春秋神理孔昭報應斯必身侔蟬翼何以受恩死輕鴻毛固得其所卑守有限拜謝末由禹錫字夢得初以伾文之黨貶朗州司馬久之召還宰相欲任為南省郎會作玄都觀詩語譏忿出為播州刺史御史中丞裴度言播極逺禹錫有老母恐傷陛下孝治乃易連州又徙夔州入為主客郎中又以詩得罪分司東都度復薦為禮部郎中集賢直學士度罷出為蘇州刺史遷太子賔客分司東都會昌中卒年七十二禹錫得播時在相位者張𢎞靖也謝僕射李相公啓劉禹錫某啓州吏還伏蒙擺落常態手筆具書言及真元中登朝人逮今無十輩又發中書相公一函具道閣下亟言曩逰顧間頗有哀色夫溝中之木與犧象同體追琢不至則坐成枯薪朱而藍之猶足為器茍液樠曲戾不足枉斧斤願為庭燎以照嘉客謹啓骯髒之人乃能作此嫵媚語為同州任侍御史上崔相國啓李商隱憲啓憲質異楚材實同燕石重以羇丱即丁憫凶瞻遺構以闕然不堪多難奉成書而未就無處求生藐是流離屢經寒暑逮於既冠猶恤無家叨承師友之規獲忝簮纓之列此皆相公推孔李之素分念國髙之舊家鎪朴雕頑披聾抉瞶沐膏雨以令植假順風而使飛不然則安得獲驪龍之珠假獬豸之角榮皆過望感豈勝言而猶長望下風徘徊髙義望賀燕以難去撫柄烏而不寧者蓋以相公以伊臯之事業佐大君以楊馬之文章輔昌運一登宣室遂借前籌以有征無戰之方彰明下武以永逸暫勞之勢恢拓中華不舞梯䡴不鳴金鼓復數千里之沃野刷十五聖之包羞彼圍榖而榖人不知入鄭而鄭陴皆哭方兹決勝彼有多慙今百戰聿修九功咸敘萬國佇登封之禮五山傾望幸之祥鰈至鶼來茅歸楉入馳湯驟夏轢漢陵周若憲者雖不能行舞舜戈坐耕堯壤至於獻千載河清之序裁二王助祭之詩歌詠相庭發揮帝載則其志願亦或庶幾伏希孫閣時開邴茵多恕克懋山公之德終全趙氏之孤擁篲瞻門封函即路苑沙宫樹雖吟左輔之風煙良夜慶霄唯望中台之晷度感恩撫巳誓志投誠仰唯輝光終賜埏埴下情無任感激攀倚惶戀之至謝河東公和詩啓李商隱某前因暇日出次西溪既惜斜陽聊裁短什蓋以徘徊勝境顧慕佳辰為芳草以怨王孫借美人以喻君子思將玳瑁為逸少裝書願把珊瑚與徐陵架筆斐然而作曽無足觀不知誰何仰達尊覽果煩屬和彌復驚惶某曽讀隋書見楊越公地處親賢才兼文武每舒錦繡必播管絃當時與之握手言情披襟得侣者惟薛道衡一人而已及觀其唱和乃數百篇力鈞聲同德鄰義比彼若陳葛天氏之舞此必引穆天子之歌彼若言太華三峯此必曰潯陽九𣲖神功古迹皆應物無疲地理人名亦爭承不缺後來酬唱罕繼聲塵嘗以斯風望於哲匠豈知今日屬在所天坐席行衣分為七覆煙花魚鳥置作五衡詎能狎晉之盟實見取鄫之易不以釁鼓惠莫大焉恐懼欣榮投措無地為先輩獻集賢相公啓李商隱某竊觀貞觀朝書伏見文皇帝因夢吹塵方求風后于畋問卜始載磻溪事偉於王圖道光於帝載下惟敷袵上則虛襟纒綿圖緯之前窈窕天人之際崇基立極四足雖斷於神鼇開物成功七竅仍沾於混沌禹羞乘􅞬舜耻彈琴白烏巳見於將雛朱草仍聞於滯穗共工蚩尤之輩與二負同袍豕韋晉耳之徒與七騶共御是以今上貽謀負扆相公餘慶持衡用十一德之資贊七百年之祚古猶今也仁豈逺乎伏惟相公日觀同光天球並價揚鋒露鍔則武庫常開散藻摛華則文星鎮見一言悟主三接承恩季孟伊繇友朋蕭邴漢皇發論十萬常愧於淮隂齊后推誠一二皆歸於仲父百度既巳貞矣九流又復清焉牆東竈北隱淪者咸欲呈材猿飲鳥言僻陋者皆思入貢莊生獻臂楊子拔毛三百篇之詩更無諷刺二百年之史永絶譏嫌斯乃百代可知一言可蔽豈立錐側管可折齒尋環巍乎煥乎盛矣美矣若某者剖心寡竅對面多牆小比焦螟敢矜巢窟微同觸氏寧務戰爭徒以簮紱承家階庭受訓堂中得桂已有前叨幕下開蓮仍當後忝所宜結囊無咎綵服為榮絶方朔之上書罷禰衡之投刺直以措心賢路誓志昌時既慕義無窮思有道則見伏惟相公霧能蔚豹燔可燒龍為百氏之指南作九州之木鐸任安彥國已在於廄中楊子馬卿並歸於門下而猶飢渴未副影響無寧請客者不解襟稠當關者空有皮骨此某所以淮山逺至漢棧斯來望姬旦之吐餐冀張華之倒屣以升堂客衆擁篲人多苟無鬷蔑之言難佐仲宣之陋今輒以嘗所著文若干首上獻伏惟少回巖電微駐台星固無望於討論庶或觀於指趣儻蕭稂可刈菅蒯無遺蒙文宣一字之褒得玄晏三都之序便若神巫去癘司命添年禱祝之誠造次於是門遙閶闔路隔瀛洲於人世存思空移氣序以塵中仰望未見端倪希陪上士之流終預君仙之末祈恩望德乃百斯生干冒威嚴下情無任惶懼感激之至為張周封上楊相公啓李商隱某聞不祥之金大冶所惡自衒之士明時不容斯實格言足為垂訓然或顧逢伯樂但服鹽車聽屬鍾期不調緑綺臯壤搖落老大傷悲同劉勝之寒蟬效子綦之枯木則亦迹歸棄世行闕揚名某價乏琳琅譽輕鄉曲粗霑科第薄涉藝文錐不頴於囊中水竟深於山上淹留蓮幕栖託戎麾插羽佩鞬從相公於關右束書載筆隨校尉於河源自北徂南巳秋復夏心驚於急弦徑矢目斷於髙足要津而又永念敝廬空餘喬木山中桂樹逺愧於幽人日暮柴車莫追於傲吏捋鬚理鬢霜雪呈姿弔影揚音煙霞絶想徒以相公逺敦世故容在恩門存趙氏之孤受梁王之禮竽將濫吹石有參瓊咳唾隨風眄睞成飾追惟疇曩曽是逢迎蜀郡登文翁之堂上國醉曹參之酒吹噓力盡撫愛形顔雖以捧承莫能銜戴况許之髙選光彼宦情以曲臺之任用猶輕憲署之發揮方盛仍期官牒不越嵗時今則節遇白藏候臨玄律燕雖戀主馬亦嘶風郭伋還州尚不欺於童子文侯校獵寧爽約於虞人茍四時之信是孚亦一諾之恩斯及况自元和已後公侯冡嫡卿士子孫與之同時厯然可數莫不翔踰鳥道泳出龍津或並命南臺或迭居青瑣金朱照耀軒蓋追隨某雖忝伊人亦惟華胄比王謝之子弟誠有重輕在嵇吕之交朋夙嘗連接而獨分光鄰女貸潤監河野鶴天麟絶比倫於朝右髯參短簿困擬議於軍前竊聽重言嘗興深歎是以願馳蹇步誓奉光塵倘或厠錯薪之斯翹詠歸荑於自牧少窺上路試睨重霄擊水三千暫隨鵬運澄流十二免使魚勞猶能贊敘燮調謳歌鎔範庶無雅拜以纍於君公不使繁聲見憂於仲子心懷右席夢結邊城寓尺牘而畏逹空函寫丹誠而慚非健筆為崔從事寄尚書彭城公啓李商隱福聞雀辭楊館常懷資篋之恩燕别張巢永結雕梁之戀推誠况物某有類焉始者尚書晞髮丹山騰身紫府曉趨清禁則瓊樹一枝夜直黃闈則金釭二等人寰莫見塵路難逢而某志在諱窮勇於求益輒干皂𨽻自露菲葑寶肆回腸只期和氏醫門投足永念倉公果蒙愍彼顓愚溢為題品勾萌始逹依周囿以揚翹滴瀝才分託靈光而振響遙輕短羽驟化窮鱗每欲陶冶肺肝耕耘筆硯粗雕宫徴以謝陽秋而義有多塗情非一槩辭煩轉野意密彌賖雖塗逭如韓遂之書反覆類葛洪之紙終無髣佛可得端倪去嵗洛陽獲陪良宴頻趨綘帳纍坐青氊泛聞懇拒台階請從藩屏舉郤超之幕畫數阮瑀之軍書懸以嘉招形以善謔何言違阻復賀光隂潼水千波巴山萬嶂接漏天之雨露隔嶓冡之煙霜皓月圓時樹有何依之鵲悲風起處巖無不斷之猿煎嚮義之初心軫懷仁之徑氣竊惟秦鏡當察衛桃一昨伏承擁節浚郊建牙隨岸將求捧幣申好裂裳就塗接枚叟之餘光奉鄒生之末座又伏慮旋登殷夢俄奉周畋徴詔已行拜塵無及徘徊失措欎悒誰聊必也華榻長懸簡書無廢即割任安之席堪哂無圖負田叔之鈴可嗟非據伏惟慎安寢膳勉護興居早秉信圭速調大鼎至於禱祝實倍等倫半粟思貯於神倉一勺願投於靈海道之云逺更開殷浩之函書不盡言重灑楊朱之淚攀戀感激不知所裁伏惟俯賜鑒照為舉人獻韓郎中琮啓李商隱某啓某少承嚴訓早學古文非聖之書未嘗關慮論都之賦頗亦留神徒以不授綵毫未吞瑞鳥馳名江左陸機莫及於材多擅譽鄴中王粲終聞於體弱上下羣士差池纍年頃者輒露踈蕪不思狂簡捧爝火以干日御動已光銷抱布鼓以詣雷門忽然聲寢不謂郎中搜才路廣登客門寬望犬附書冀雞談易特垂題目曲賜丹青旋屬榮嶓從行神州視善同孟陽之覲蜀比孝若之歸齊雖佩恩私竟乖陳謝光隂荏苒誠抱勤拳今此秋期遂有天幸更奉禰衡之刺敢無鬷蔑之言某在京多時自夏有疾失外郡薦名之限俯神臯試士之期物情既集於宗師公選果歸於令季懷材者皆云道泰抱器者自謂時來以卞和為玉人無不收之瓊玖得蹇修為媒氏無不嫁之娉婷是以願託一拳潛布百兩顧方流而有託慮良會之猶賖伏惟郎中與先輩賢弟價重兩劉譽髙二陸比李膺則仙舟對棹方馬融則綘帳雙褰若某者雖陋若左思瘦同沈約無庾信之腰腹乏崔琰之鬚眉然至於感分識歸銜誠議報將酬楊寶則就雀求環欲答孔愈則從龜覔印推其異類不後他人謹復陳新文重干清鑒馬卿室邇孔子牆髙遲面莫由隳肝無所任重道逺方懷驥坂之長鳴一日三秋空詠馬嵬之清什知深可恃言切成煩幽谷未見於鶯喬曲沼空勤於鳬藻仰瞻几閣伏待簡書謹啓為李貽孫上李相公德裕啓李商隱月日從姪某官某謹齋沐裁誠著於啓事跪授僕者干獻于司徒相國叔父閣下某伏逺牆藩亟踰年籥抱徽音於故器雖賞逐時遷竊餘潤於奧雲亦情由類至中阿彌節末路增懷沉吟易失之時悵望難邀之會石崇著引徒願思歸殷浩裁書其如慕義伏惟相公丹青元化冠蓋中州羣生指南命代先覺語姬朝之舊族莊武慙顔敘漢代之名門韋平掩耀歲鄰三紀克佐伍君動著嘉猷行留故事陶冶於無形之外優遊於不宰之中始者主上以代邸承基琅琊續業明發不寐懷清廟之景靈日晏忘餐念蒼生之定命爰徴元老久在寶臣五載于兹六符斯炳頃單于故境獯鬻遺疆屢緣喪荒亟致携二夙沙自縛其主冒頓忍射其親遂去北邉欲事南牧既赫斯而貽怒乃密勿以陳謀管氏將來屢發新柴之井留侯每入便聞借箸之籌全師受成中樞獨運前軍露板方事於羽馳清禁夀觴旋聞於月捷仍其貴種慕我華風或辨姓寫誠推諸右校或釋兵仗義列在周廬潞子離狄而春秋書徐夷朝周而大夏詠其餘麕驚鳥散風去雨還亘絶漠以銷魂委窮沙而喪膽胡琴公主已出於襜襤毳幕天驕行遺其種落向若非薛公料敵先陳三策充國為舉嘗通四夷則何以雪髙廟稱臣之羞全肅祖復京之好此廟戰之功一也惟彼參代實興皇家天濮美名方之尚陋舂陵王氣比此非多而物衆藏姦地寬長孽敢起在行之衆因興逐帥之謀遂使起義堂邊台臣夙駕晉陽宫下逆豎宵奔翻勢將冀於連雞勇鬬尚同於困獸詎知長算巳出奇兵金僕靈鉟靡留於旬朔便輿貫木巳集於都街此廟戰之功二也而潞冦不懲兩豎之凶徒恃三軍之力干我王略據其父封袁熙因纍葉之資衛朔拒大君之詔人將自棄鬼得其誅蛙覺井寬蟻言樹大招延輕險曽微吳國之錢藏匿罪亡又乏江陵之粟所謀者河朔遺事所恃者巖險偷生今則趙魏俱攻燕秦併入奉規於帷幄遵命於指縱亞夫拒吳驚東南而備西北韓信擊魏艤臨晉而渡夏陽百道無飛走之虞一縷見傾危之勢計其反接當不踰時是則陳曲逆之六策翻成屑屑葛武侯之八陳更見區區此廟戰之功三也孤冦行靜萬方率同將蕩海騰區夷山拓宇髙待泥金之禮雄專瘞玉之辭煙閣傳形革車就國盡人臣之極分煥今古之髙名况又奉以嘉聲諧兹國檢傳文賜糗逺針醉飽之徒晏子毳衣橫厲輕肥之俗比周息慮孤介歸仁紹續勳家扶持舊族罔容私謝皆事公言景風至而慶賞先行仲吕叶而賢良必遂豈直杜伯山之令子大邑傳榮陶彭澤之孤孫西曹受署重以心遊書囿思託文林提抱於絶藝之場班楊掃地鞠旅於無前之敵江鮑輿尸故矯枉則黃冶之賦興贊皇有黃冶賦譏人惑於點化之術遊道則知止之篇作詞窮體物律變登髙文星留伏於筆間綵鳳翺翔於夢裏此固談揚絶意報效何階若某徒預宗盟早塵清鑒而行藏遷貿岐路差池今將抽實吐誠推心敘欵緘猶未寫詞巳失煩某爰自弱齡實抱孤操寒郊映雪暑草搜螢雖有謝於天姿或無慙於力學庾持奇字陳庾持好為奇字信未皆通敬禮小文頗常留意大和中敢揚微抱竊獻短章方候明誅忽蒙復命荆州一紙河東百金叨延月旦之評長積竹林之戀竟以事將願背蹇與身期離索每多交攀莫遂武陵被病洛表求醫未及上言先蒙受代肩輿而至杜門以居蓬藋荒涼風霜迅厲今巳稍痊美疹護託休辰殷浩體羸尚能為郡馬卿疾罷猶可言文退無井臼之資進乏交朋之助是以徘徊軒幄託附緘封冀陳蔡之及門庶江黃之列會敢渝孤直仰纍清光東浪驚年西颷結郤矢心佩賜畢命䘖輝道阻且躋書不盡意金楹假蔭望同相賀之禽珠岸回光庶及不枯之草明懸肝膽唯所爐錘干冒尊嚴伏用兢灼謹啓陳明卿云義山代人哀則哀代人諛則諛此語可謂曲肖為賀拔員外上相公啓李商隱某啓某聞被彩飾於無用之姿斯須或可垂休光於不報之地始卒攸難至有馬瘦而尚報輕軒席敝而猶存華幄推仁則極備用無聞雖有切於戀思且自量其涯分嗚呼某者今甚類焉翰柔莫申語苦難聽聊憑箋素用寫肺腸伏惟少霽尊顔猥賜披省某伏思早嵗仰景深知龍尾貽譏敢通交契牛心前啖實愧時才世故推遷年華荏苒葭灰檀火屢變於寒暄靈濟泥涇遂分於清濁羇離管札僶俯絃歌名汙栁營顔慙花縣竟以千金之産三徑無歸初服莫從迷津亟問屬者伏幸相公羹梅調味川楫濟時起塌翼於衝風活枯鱗於亂轍登諸蘭署轄彼藝籖臺閣移文語薛夏而無取東南才子並張率以何能未報前叨旋承後顧版圖被召花幕分榮牧駑駘於皂棧之中刻蚣蝑於樂縣之上勢髙足跌道泰身屯未竭私誠已嬰沉痼况某素無靈氣夙昧攝生乏單豹飬內之功闕王吉實下之效湫底莫適節宣失中然猶深願待年少酬厚德三醫畢訪百藥皆投竟非無妄之災莫見有瘳之候濱於九死敻彼十旬取暖則煩加寒必痢二句全用沈約與徐勉書髮寧支辨帶不成圍謝述心虛方兹未逮田光精竭比此猶強豈可尚占職員但尸俸入久塵物議且速殘骸况相公職統薄違時登衆寡任崇按比務繫孤終職是賔僚豈宜虛曠固不可不私微物曲降深慈憫將盡於桑榆妨得材於杞梓是以推枕興感攝衾占辭願申斂迹之期以贖曠官之咎祇聽裁旨用息兢惶必也舊履流恩遺簮結念恤以孀孤非少婚嫁未終不使衰羸便辭祿仕致乎外地晞以末光未乖念録之仁稍減憂慙之纍亞尹諸府别乘近郊負荷無羞饘糊有繼則猶冀逢十全之藝近一日之生重發門牆再就埏埴是所願也非敢望也詞多力殆感極涕繁避席承言未卜曹參之侍封函抒欵畏遺殷浩之誠瞻望清光實動魂守伏惟特賜優察謹啓為舉人上翰林蕭侍郎啓李商隱某啓某聞師曠之琴不鼓之則無以召玄鶴楊羲之石不用之即無以聘應龍物既有之言亦猶是伏惟侍郎學士絪緼降秀翕闢資華天上比方但有文星粗爾人間議擬未將泰華為然爰自妙齡遂肩名輩當時人物何戢唯效於褚公邇日風流杜乂難方於衛玠加以𢎞成與石郭璞傳毫渙水儻來皆逢藻繪荆峯若至只有璆琳合沓縑緗縱橫筆硯三都作序不勞皇甫士安萬乘為僚只有東方曼倩况從近嵗且有外虞傅介子在樓蘭國中奇功未就班仲叔於玉門關外報命猶賒雖太平之業已隆而震耀之威尚作侍郎又綢繆武帳密勿皇圖九地九天之兵寧因舊學七縱七擒之術固已玄通用視草之工解按劔之怒手為天馬心繪國圖九重之中暫煩前箸萬里之外輒敢衡車位誠在於論思功已參於鎮撫圖書之府鼎鼐之司伊咎懸遺悵之誠夔説貯妨賢之愧載惟後命夫豈踰時抑某又聞之昔管仲經邦賔客有二周公待士吐握皆三邴丞相之車茵寧彈醉客平津侯之賔館不礙布衣並脂粉簡編冠纓圖史後之披卷皆若升堂侍郎美譽滂流髙節彌折擔簦者成市躡履者如雲此乃前賢後賢不殊軌轍往哲來哲非異門牆縱燕有黃金之臺齊為碣石之館料其棟宇必已荒蕪若某者陋若左思醜同王粲鬚眉不及於崔琰腰腹無預於鄭玄若值庭蘭固多慙德如逢巖電不望齊名重以慧劣禰生専非董氏殊顔回之易鑄若宰我之難雕徒欲萬卷咸披且乏五行俱下叨從嵗賦勉致文編户户醬瓿唯聞見辱人人虀臼不肯留題再困於魚登一慙於鴈序然天付直氣家傳義方雖在顓蒙不茍述作廣絶交之論抑有旨焉移太常之書非無為也項者曽干閽侍獲拜堂皇既容納之有加遂希望之滋甚爾後以毛傷崇彈鱗損在鈎拔刺不遷噞喁無暇既乖受教便以經時今孝秀員來風霜巳積秦人屢出自欲焚舟楚卒數奔誰教拔斾是以更持魚目當夜肆以沽諸復挈豚蹄祝天時之未巳義誠多愧志亦可憐儻蒙猶枉鉛華更施丹雘俾其恩地不在他門雖不及采椽備枝梧於大厦亦庶乎梯米增流衍於神倉與夫九九之能猶或萬萬相逺誠深詞切聲急響煩仰郭泰之龜龍望仲尼之日月濡毫伏紙億萬常心干冒尊威伏用戰灼謹啓四六法海卷五
