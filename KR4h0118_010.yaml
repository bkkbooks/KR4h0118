body:
  text: 四六法海卷十明王志堅編虎丘山序顧野王夫少室作鎮以峻極而標竒太華神掌以削成而稱貴若茲山者髙不概雲深無藏影卑非培塿淺異棘林秀壁數尋被杜蘭與苔蘚椿林十仭挂藤葛與懸蘿曲澗潺湲修篁蔭映路若絶而復通石將頽而更綴抑巨麗之名山信大吳之勝壤若乃九功六義之興依永和聲之製志由興作情以詞宣形言諧於韶夏成文暢於鍾律由來尚矣未有登髙能賦而韜斐麗之章入谷忘歸而忽鏗鏘之節故總轡齊鑣競雕蟲於山川雲合霧集爭歌頌於林泉於時風清邃谷景麗修巒蘭佩堪紉胡繩可索林花翻灑乍飄揚於蘭皋山禽囀響時弄聲於喬木班草班荆坐蟠石之上濯纓濯足就滄浪之水傾縹瓷而酌旨酒翦緑葉而賦新詩肅爾若與三徑齊蹤鎗然似共九成偕韻盛矣哉聊述時事寄之翰墨野王字希馮吳人為梁宣城王賔客終於陳黃門侍郎秋日晏季處士宅序王勃若人爭名於朝廷者則冠蓋相趨遁迹於丘園者則林泉見託雖語默非一物我不同而逍遙皆得性之場動息匪自然之地故有季處士者逺辭濠上來遊鏡中披白雲以開筵俯青溪而命酌昔時西北則我地之琳琅今日東南乃他鄉之竹箭又此夜乘槎之客猶對仙家坐菊之賔尚臨清賞既而依稀舊識歡吳鄭之班荆樂莫新交申孔程之傾蓋向時朱夏俄涉素秋金風生而景物清白露下而光陰晚庭前栁葉才聽鳴蟬野外蘆花行看江上數人之內幾度琴樽百年之中少時風月蘭亭有昔時之會竹林無今日之歡大夫不縱志於生平何屈節於名利人之情矣豈曰不然人賦一言各申其志使夫千載之下四海之中後之視今知我咏懷抱於茲日秋日遊蓮池序王勃人間齷齪抱風雲者幾人庶俗紛紜得英竒者何有煙霞召我相望道術之門文酒起豫放浪沉潛之地少留逸客塞雁飛鳴北斗橫而天地秋西金用而風露降幽居少事野性多間登石岸而鋪筵坐沙場而列席琳琅觸目朗月清風之俊人珠玉在傍鸞鳯虬龍之君子汀洲地逺波濤濺日月之輝人野路殊原隰擁神仙之氣平郊樹直曲浦蓮肥隱士泥清仙人水緑越林亭而極望生死都捐出宇宙以長懷心靈若喪悲夫秋者愁也酌濁酒以蕩幽襟志之所之用清文而銷積恨我之懷矣能無情乎上巳浮江晏序王勃吾之生也有極時之過也多緒若夫遭主后之聖明屬天地之貞觀得畎畝之相保以農桑而為業託形宇宙者幸矣况乃偃泊山水遨遊風月樽酒於其外文墨於其間則造化之於我得矣太平之縱我多矣兼以上巳芳節雲開勝地大江浩曠雲山紛糾出重城而振䇿下長浦而方舟林壑清其顧盻風雲蕩其懷抱於時序躔青律運啓朱明輕荑秀而郊戍青落花盡而亭皋晚丹鶯紫蝶候芳晷而騰姿早燕歸鴻俟迅風而弄影巖暄蕙密野淑蘭滋弱荷抽紫疏萍泛緑於是儼松舲於石嶼停桂楫於璇潭指林岸而長懷出河洲而極睇妍粧袨服香驚北渚之風翠幕玄帷彩綴南津之霧若乃尋曲渚歷回溪榜謳齊引漁歌互起飛沙濺石湍流百勢翠嶮丹崕岡巒萬色亦有銀鈎犯浪挂赬翼於文竿瓊轄乘波耀錦鱗於畫網鍾期在聽玄雲白雪之琴阮籍同歸紫桂蒼梧之酌既而遊盤興逺景促時淹野日照晴山煙送晚方披襟朗咏飢斜光於碧岫之前散髮髙吟對明月於青溪之下客懷既暢遊思遄征視泉石而如歸佇雲霞而有自昔周川故事初傳曲路之悲江甸名流始命山陰之筆蓋遵清轍共抒幽襟俾後之視今亦猶今之視昔一言均賦六韻齊疏誰知後來者難輒以先成為次遊山廟寺序王勃吾之有生二十載矣雅猒城闕酷嗜江海常學仙經博涉道記知軒冕可以理隔鸞鳯可以術待而事親多衣食之虞登朝有聲利之迫清識滯於煩城仙骨摧於俗境嗚呼阮籍意疏嵇康體放有自來矣常恐運促風火身非金石遂令林壑交喪煙霞版蕩此僕所以懷泉塗而惴恐臨山河而歎息者也粵以勝友良暇相與遊於玄武西山廟蓋蜀郡三靈峰也山東有道君廟古者相傳以名焉爾其丹壑藂倚玄崖糾合俯臨萬仭平視重玄乘杳冥之絶境屬芬華之暮節玉房跨霄而懸居瓊臺出雲而髙峙亦有野獸羣狎山鶯互轉崇松埒巨柏爭陰積瀨與幽湍合響眇眇焉逸逸焉王孫何以不歸羽人何以長往其玄都紫微之事耶方斂手鐘鼎息肩巖石絶視聽於寰中置形骸於度外不其然乎時預乎斯者濟陰鹿𢎞胤安陽邵令逺耳蓋詩以言志不以韻數裁焉三月上巳袚褉序王勃觀夫天下四方以宇宙為城池人生百年用林泉為窟宅雖朝野殊致出處異途莫不擁冠蓋於煙霞披薜蘿於山水況乎山陰舊地王逸少之池亭水興新交許玄度之風月琴臺寥落猶停隱遁之賔釀渚荒涼尚遏逢迎之客仙舟溶裔若海上之槎來羽蓋參差似遼東之鶴舉或昻騏驥或泛飛鳬俱安名利之場各得逍遙之地而上屬無為之道下棲玄邈之風永淳二年暮春三月遲遲風景出沒媚於郊原片片仙雲逺近生於林薄雜花爭發非止桃蹊羣鳥亂飛有踰鸚谷王孫春草處處爭鮮仲阮芳園家家並翠於是攜旨酒列芳筵先袚禊於長洲却申交於促席良談吐玉長江與斜漢爭流清歌繞梁白雲將紅塵並落他鄉易感增悽恨於茲辰羇客何情更歡娛於此日加以今之視昔已非昔日之歡後之視今亦似今時之會人之情也能不悲乎且題姓字以表襟懷使非會稽竹箭則推我於東南崑阜琳琅亦歸子於西北綿州北亭羣公宴序王勃下官人間獨傲海內少徒志不屈於王侯身不絶於塵俗孤吟五嶽長嘯三山昔往東吳已有梁鴻之志今來西蜀非無張載之懷況乎踐名場攜勝友風月無幾琴酒俄乖半面十年一別千里何少府故人攀桂撫金石而論心韓法曹新餞班荆臨江湖而執手離亭北望煙霞生故國之悲别館南開風雨積他鄉之思於時蒼雲寡色白日無光沙塵起而桂浦昏鳬鴈下而蘆洲晚傍鄰蒼野霜風橘柚之園斜枕碧潭露月芙蓉之水既而登臨惜别驂駕少留季札何人親逢贈縞子荆不慜思挂傾城惆悵北梁攜琴臺而漸間徘徊東道思錦署以行遙嗟乎人事乖矣江山逺矣請命離前之筆為題别後之資五際飛文想羣公之不讓一言可贈知下筆之有神宇文德陽宅秋夜山亭宴序王勃若夫龍津宴喜地切登仙鳯閣玄虛門稱好事亦有登山臨水長想巨源秋風明月每思玄度未有能星馳一介留美迹於芳亭雲委八行抒勞思於彩筆遂令啓瑶緘者攀勝集而長懷披瓊翰者仰髙筵而不暇王子猷之獨興不覺浮舟嵇叔夜之相知欣然命駕琴樽重賞始詣臨卭口腹良遊未辭安邑乃知兩鄉投分林泉可攘袂而遊千里同心煙霞可傳檄而定友人河南宇文嶠清虛君子中山郎餘令風流名士或三秋意契闢林院而開襟或一面新交敘風雲而倒屣彭澤陶潛之菊影泛仙樽河陽潘嶽之花光縣妙理巖巖思璧家藏虹岫之珍渺渺言河各控驪泉之寶偶同金碧暫照詞場巴漢英靈潛光翰院亹亹焉蕭蕭焉信天下之竒託也於時白藏開序青女御律金風髙而林野動秋露下而江山靜琴亭酒榭磊落乘煙竹徑松扉參差向月魚鱗積磴還升蘭桂之峰鴛翼分橋即映芙蓉之水亦有紅蘋緑荇亘渚連翹玉帶瑶華分楹間植池簾夕敞香牽十步之風岫幌宵褰氣襲三危之露縱沖襟於俗表留逸契於人間東山之賞在焉南澗之情不逺夫以中牟馴雉猶嬰觸網之悲單父歌魚罕繼鳴琴之趣俾夫一同詩酒不撓於牽絲千載巖溪無慚於景燭云爾遊冀州韓家園序王勃銅溝水北石鼓山東星辰當畢昴之墟風俗是唐虞之國雖接燕分晉稱天子之舊都而向術當衢有髙人之甲第祥風塞戶瑞氣沖庭芳酒滿而緑水春朗月間而素琴薦家童掃地蕭條仲舉之園長者盈門廓落東平之室梧桐生霧楊栁搖風眺望而林泉有餘奔走而煙霞足用神龍起伏俱調鼎鑊之滋鳴鳯雌雄並入笙竽之奏髙情壯思有抑揚天地之心雄筆竒才有鼓怒風雲之氣南庭興晚東徑陰生石髓折而隱士歸玉山崩而野人醉僉為文在我卜翰苑當仁王羲之之蘭亭五百餘年直至今人之賞石季倫之梓澤二十四友始得吾徒之遊陶陶然落落然則大唐調露之元年獻嵗正月也山亭興序王勃深山大澤龍蛇為得性之場廣漢巨川珠貝是有殊之地豈徒茂林修竹王右軍山陰之蘭亭流水長堤石季倫河陽之梓澤下官天性任真直言淳朴拙容陋質眇小之丈夫蹇步窮途坎壈之君子文史足用不讀非道之書氣調不羈未被可人之目潁川人物有荀家兄弟之風漢代英竒守陳氏門宗之德樂天知命一十九年負笈從師二千餘里有𢎞農公者日下無雙風流第一仁崔知宇照臨明日月之輝廣度沖襟磊落壓乾坤之氣王夷甫之瑶林瓊樹直出風塵嵇叔夜之龍章鳯姿混同人野雄談逸辨吐滿腹之精神達學竒才抱填胸之文籍簮裾見屈輕脫履於西陽山水來遊重橫琴於南澗百年竒表開壯志於髙明千里心期得神交於下走山人對興即是桃花之源隱士相逢不異菖蒲之澗黃精野饌赤石神脂玉案金盤徴石髓於蛟龍之窟山樽野酌求玉液於蓬萊之峰溪橫燕尾巖豎龍頭鍛野老之真珠挂幽人之明鏡山腰半折溜王烈之香膏洞口橫開滴嚴遵之芳乳藤牽赤絮南方之物産可知粉漬青田外域之謡風在即人髙調逺地爽氣清抱玉䇿而登髙出瓊林而更逺漢家二百所之都郭宫殿平看秦氏四十郡之封畿山河坐見班孟堅騁兩京雄筆以為天地之奧區張平子奮一代宏才以為帝王之神麗珠城隱隱闌干象北斗之宫清渭澄澄滉漾即天河之水長松茂柏鑽宇宙而頓風雲大壑橫溪吐江河而懸日月鳯凰神嶽起煙霧而當軒鸚鵡春泉雜風花而滿谷望平原蔭藂薄山情旅曠即滄浪之水清野氣蕭條即崆洞之人智搖頭坐唱頓足起舞風塵灑落直上天池九萬里丘墟雄壯傍吞少華五千仭裁二儀為輿蓋倚八荒為户牖榮者吾不知其榮美者吾不知其美下官以詞降直上振筆札而前驅髙明以翰苑橫開列文章於後殿情興未已即令樽中酒空彩筆未窮須使山中兔盡冒雨尋菊序駱賔王白帝徂秋黃金勝友解塵成契冒雨相邀問涼燠則鴻雁在天敘交遊則芝蘭滿室砌花舒菊還同載酒之園岸葉低松直枕維舟之浦參差逺岫斷雲將野鶴俱飛滴瀝空庭竹響共雨聲相亂抑折巾於書閣行閲飄牟挹雅步於琴臺坐聞流水字中科斗競落文河筆下蛟龍爭投學海珠簾映水風生曳露之濤錦石封泥苔溼印龜之岸泛蘭英於戶牖座接雞談下木葉於中厨池烹野鴈墜白花於溼桂落紫蒂於疏藤雖物序足悲而人風可愛留姓名於金谷不謝季倫混心迹於玉山無慚叔夜揚州看競渡序駱賔王夏日江干駕言臨眺於時桂舟始泛蘭棹初遊鼓吹咽江山綺羅蔽雲日便娟舞袖向渌水以頻低飄揚歌聲聽清風而更逺是以臨波笑臉艷出浦之輕蓮映渚蛾眉麗穿波之半月靚粧舊飾此日增竒絃管相催茲辰特妙能使洛川回雪猶賦陳思巫嶺行雲專稱宋玉凡諸同好請各賦詩有此才情不枉作艷冶文余存此篇亦欲使輕薄子少知自揆耳早秋上陽宫侍宴序宋之問臣聞神器至大非聖無以光臨寶位至尊非神無以長守我金輪聖神皇帝垂敏覺撫鴻勳出軒宫而鎮紫微卷翬衣而襲玄衮釋罘祝網萬族咸寧革故維新五刑不用潤玉律而含元氣輪金渾而順調晷窮荒極逺重譯左言之俗負阻憑危背德殊風之類莫不厥角稽顙以執贄來庭煙火通於萬方車書混於千界慶延八室享配於明祇辟水三雍講論乎道義麟鳯薦祉龜龍奉圖石銘顯瑞於郊畿玉書告祥於宫掖以日繼月紛綸葳蕤竹帛書之而未窮夷夏歌之而不極聖人之具品周矣天子之能事畢矣自千古以下迄於梁隋何功於人比我全德於是寧宴坐展豫遊順四時乘六辨先王洛食上帝河都樞機正於域中雨露均於天下徒觀其離宫别殿彌復道而亘南端髙閣重甍瞰崇墉而連北斗滄州曉氣化為宫闕之形閶闔秋風亂起金銀之樹降雕輿而式宴簪紼凝嚴披鏤檻而升髙山河在目參光有地遊日月於天邊睨逺亡窮見城池於掌上四達分九重之路積樹梢雲雙莖當鐵鎖之橋流珠耿漢霞漿玉醴與湛露而俱傾鳯管龍絲雜商飈而共作三月三日奉使涼宫雨中褉飲序宋之問三月上巳有袚除禊飲者成俗久矣摯虞對而不經束晳言而有禮漢庭故事衣冠就玄霸之橋晉國遺風輜軿耀翠媯之浦興秦宫者我大周之所建也境連伊塞岸隔河都清暑必在於三伏沫寒不踰於十里占星已畢棹仙闕而威百神匪日將成宜聖皇而福四海吾儕參興露寢初忝雲軺違北京之宴樂坐南山之霧雨相與會良友陶暮春席幽林觴曲水是日也雜英初發羣物半榮春逶迤而上山雪嶔崟而藏谷髙人一坐杞梓交陰作者肆筵芝蘭同氣遞襲歌詠不登絃管嵇叔夜之鳴琴偏依緑水郭子期之春酒本出青山論史可聽談玄愈默不覺齊萬品溢九圍愛流波惜遲景顧盻相謂雖非巢許之間左右同聲盍各巖前之助請染翰操紙賦詩言志人探一言俱題四韻之問字延清汾州人武后時召與楊炯分直習藝館與閻朝隱沈佺期劉允濟媚事二張至為奉溺器及敗貶瀧州參軍逃歸洛陽匿張仲之家仲之與王同皎謀殺武三思之問上急變因丐贖罪擢鴻臚主簿遷考功員外郎諂事太平公主及安樂公主權盛復往諧結中宗將用為中書舍人太平發其知貢舉時賕餉狼籍下遷越州長史睿宗立以獪險行惡詔流欽州賜死鍾伯敬詩評云之問躁競人其為詩深靜幽適不獨峻整而已詩文故有絶不似其人者上巳泛舟昆明池宴宗主簿席序宋之問僕不遊於茲十有五載矣心由物感遐矣不忘迹為事牽近而難挹南陽宗雍文通學古器重名髙令君有奉倩象賢丞相生玄成邁德暮春修以文之會上巳邀袚褉之遊乃結搢紳撰清辰殷殷轔轔歊霧驚塵望於昆明之濵觀其大浸川陸博資畿甸鳬鷖發海來往沉浮日月麗天東西出入千年珍館無復豫章四面金堤仍同樹杞是日也摩肩錯轂備朝野之歡娛袪服靚粧匝都城之里閈翠幕星布錦帆霞屬餘瀝下醉於綃人新聲逺䀨於川后縱目遐覽識皇代之承平得意同歸有吾儕之行樂髙明一座桂樹藂生君子肆筵玉山交映束晢以言談得俊張華以史漢先鳴登旨酒而無荒絃清琴而自逸於是涉連榻命孤舟桃花漲而浦紅蘋風搖而浪白逼匡阜兮遵彭蠡邈矣載浮指衡嶽而超洞庭眇焉疑到曲島之光靈乍合神魂密遊中流之萍藻忽開龜魚潛動睎鏤鯨而鼓棹共看燒劫之灰歷牽牛而問津欲取支機之石晴光劃野有象而必形夕陽照山無竒而不見思溢今古心搖草木漢家城闕遺之以雜霸之風秦塞膏腴潤之以太平之色景窮勝踐歸限嚴闉思染翰於上林願揮戈於濛汜主稱未醉唯見馬駐浮雲賔共少留自有魚銜明月宫商待叩羣公之獲助已多序引先題下走之求蒙不逮請授素幅以頌佳遊使一時之興詠遙存千古之姓名常在張燕公嘗論近世文章曰李嶠崔融薛稷宋之問之文如良金美玉無施不可富家謨如孤峰絶岸壁立萬仭濃雲蔚興震雷俱發誠可畏也若施於廊廟駭矣閻朝隱如麗服靚粧燕歌趙舞觀者忘疲若類之風雅則罪人矣又云韓休之文如太羮玄酒有典則薄滋味許景先如豐肌膩理雖穠華可愛而乏風骨張九齡如輕縑素練實濟時用而窘邊幅王翰如瓊杯玉斝雖爛然可珍而多玷缺當時論者軒輊乃爾今以之問等為韓張二公作奴恐二公不受也文字髙下何足為重輕耶春夜令狐正字田子過敝廬序宋之問田二官考室潁陽令狐九間居渭涘徴君太守世業相親洛邑秦京道遊非逺春山采藥揖二子之髙蹤夜月回車入故人之窮巷闢書幌卷琴帷緑竹一叢清風三尺幽吟所托遊仙招隱之詩嘉話伊何丹丘白雲之事榮枯未薦飽我以老氏之言舉白無譁醉豫以胡丘之説池塘潤於時雨衣巾漸於和氣蘭欲芳而逼人林將曙而催鳥嗟乎語默恆理聚散何常請揮翰寫心用旌厥事使嵩髙洞裏記茲夕之當歌太白巖中念今宵之秉燭共編四韻貽諸好事云薛大夫上亭宴集陳子昻夫貧賤之交而不可忘珠玉滿堂而不足貴閉門無事對黃卷以終年髙論不疲逢故人而永夜薛大夫其人也下官昔承顔色早蒙車騎之知晚接恩光不異平津之舊蔡雍書史許以相資張載文章見稱於代爾其華堂别業秀木清泉去朝廷而不遙與江湖而自逺名流不雜既入芙蓉之地君子有鄰還得芝蘭之室披翠微而列坐左對青山俯盤石而開襟右臨澄水斟渌酒弄清絃索皓月而按歌追涼風而解帶談髙趣逸體靜心間神眇眇而臨雲思飄飄而寓物林軒寂寞星漢縱橫思欲乘汗漫而羣遊與真情而合契歡窮興洽樂往悲來悵鸞鶴之不存哀鷞鳩之久渂徘徊永歎慷慨長懷東方明而畢昴升北閣曙而天雲淨悲夫向之所得已失於無何今之所遊復羈於有物詩言志也可得聞乎夏日諸從弟登汝州龍興閣序李白夫槿榮芳園蟬嘯珍木蓋紀乎南火之月也可以處臺榭若髙明吾之友于順此意也遂卜精勝得乎龍興留寶馬於門外步金梯於閣上漸出軒戶遐瞻雲天晴山翠逺而四合暮江碧流而一色屈指鄉路還疑夢中開襟危欄宛若空外嗚呼屈宋長逝無堪與言起豫者誰得我二季當揮爾鳯藻飛乎鸞觴與白雲老兄俱莫負古人也冬夜裴郎中薛侍御宴集序李白二公以大司馬之命領浙河東西十有三州之政相與周爰咨度平均邦賦者三月矣當割而遊刃無間臨機而舍拔則獲由是在簿領之際無江海而間冬十月辛未徴會於此堂宴朋友故舊也賢豪畢萃升降有序縫衣淺帶十有五人聲同故窮達不間意得而鄙吝皆遣肴芳酒濃夜寂琴暢慷慨言志絡繹舉白盱衡扺掌啞啞大笑三爵耳熱萬念如洗不復計名身之親疏憂患之去來也況他纍乎既醉余以箸擊唾壺叩商而歌其詞曰簿領日盈機知君傲煩囂飲和自忘渴況以初筵招道契迹自親誰謂列宿遙何用結同心緑琴復長瓢日月若走馬炎涼催斗杓一年解頥笑幾日如今宵奉君千金夀莫使嵗寒凋是日也禮成於意歡生於同滯憤積慘篲掃湯沃方今滄溟始波世屯未康二公克壯其猷以立事為己任行當自致青雲之上不復與適莽蒼者羣矣吾儕浮沉其間風水俱逝他日或潛淵或唳天一離一合雲動雨散然後知今日樽酒未易再得將子無金玉其音姑偕賦以卒貺建丑月十五日虎丘山夜宴序李白方今內有夔龍皋伊以佐百揆外有方叔召虎以守四方江海之人髙枕無事則琴壺以宴友朋嘯歌以展霞月吾黨之職也我是以有今茲虎丘之會巖巖虎丘奠吾西門崒然如香樓金道自下方而踴躍鎖丹霞白雲於蓮宫之內會之日和氣滿谷陽春逼人巖煙掃除肅若有待余與夫不亂行於鷗鳥者銜流霞之杯而羣嬉乎其中笑向碧潭與松石道舊兕觥既發賔主醉止狂歌送酒坐者皆和互趣所奏雲去日沒梵天月出萬里如練松陰依依狀若留客於斯時也撫雲山為我輩視竹帛如草芥頽然樂極衆慮皆遣於是奮髯屢舞而歡今夕何夕同者八人醉罷偕賦以為此山故事太白文蕭散流麗乃詩之餘然有一種腔調易起人厭如陽春大塊等語殆令人聞之欲吐矣陸務觀亦言其識度甚淺暮春諸公於逍遙谷宴集序王維山有姑射人蓋方外海有蓬瀛地非宇下逍遙谷大都近者王官有之不廢大倫存乎小隱迹崆洞而身拖朱紱朝承明而暮宿青靄故可尚也先天之君俾人在宥歡心格于上帝喜氣降為陽春時則有若太子太師徐國公左丞相始興公少師宜陽公少保崔公特進鄧公吏部尚書武都公禮部尚書杜公賔客王公黻衣方領垂璫珥筆詔有不名命無下拜熙天工者坐而論道掌邦典者官司其方相與察天地之和人神之泰聽於朝則雅頌矣問於野則賡歌矣乃曰猗哉至理之代也吾徒可以酒合宴樂考擊鍾鼓退於彤庭撰辰擇地右班劍驂六騶畫輪載轂羽幢先路以詣夫逍遙谷焉神皋藉其緑草驪山啓於朱户渭之美竹魯之嘉樹雲出其棟水環於室灞陵下連乎菜地新豐半入於家林館層巔楹側徑師古節儉惟新丹堊巖谷先曙羲和不能信其時芳卉後春勾芒不能一其令桃徑窈窕蘅皋超忽驂御延佇於叢薄珮玉升降於蒼翠於是外僕告次獸人獻鮮樽以大罍烹用五鼎木器擁腫即天姿以為飾沼毛蘋蘩在山羞而可薦伶人在位曼姬如轂齊瑟慷慨於座右趙舞徘徊於白雲衮旒松風珠翠煙露日在蒙汜羣山夕嵐猶且濯纓清歌據梧髙詠與松喬為伍是羲皇上人且三代之後而其君帝舜九服之內而其俗華胥上客則冠冕巢由主人則兄弟元凱合是四美同乎一時廢而不書罪在司禮竊思楚傅嘗詣茅堂之居仰謝右軍忽序蘭亭之事蓋不獲命豈曰能賢宴韋庶子宅序顧況昔洛下鄴中蘭亭峴首文雅之盛風流之事蓋一坫耳今席有芳尊庭有嘉禾飲酒賦詩皆大國聖朝羣龍振鷺握蘭佩玉者也在古其有陋乎在今其有榮乎終宴一夕寄懷千載是時也暮春駘蕩孟夏恢台之交耳況字逋翁姑蘇人新舊史俱不為立傳皇甫湜作況集序略具始末他書言多不一或有言其仙去者臘日與諸公龍沙宴集序權德輿清祀嘉平著於三代蓋祭百種以報嗇表一嵗之順成故吾徒亦休浣考勝用文會友龍沙古地大江在下可以縱逺目可以滌煩襟況簪裾成列觴豆備薦酒酣神王舉手拊節盡一日之澤遣百慮如遺二三子唯今日可以酒狂而不書是無勇也德輿字載之天水略陽人官至禮部尚書同中書門下平章事罷為山南節度使卒贈尚書左僕射諡日文同德寺湊禪師院羣公會集序穆員嵗五日杜楊州出鎮東洛羣公禮賔用餞會於此堂以候於戲從公率俗道機變態倦息得於此樂道得於此衆君子同之員亦同之況乃竹深寒庭雪淨禪室境捐世染坐對天涯甘茗代醪清論如樂蓋勞生之少息羣心之一勝會耳惜乎夕鳥集暝客散候人至車馬行各從爾司復返吾患嚮來所聚倐爾成空索過風於前林求往夢於既寤不可及也尚書郎李君曰其可及者詩猶庶乎詩之哉員字與直工為文章杜亞留守東都署佐其府早卒兄弟四人皆和粹世以珍味目之贊少俗然有格為酪質美而多入為酥員為醍醐賞為乳腐有穆公集十卷許孟容為序然唐史藝文志已不載三月三日茶宴序吕溫三月三日上巳禊飲之日也諸子議以茶酌而代焉乃撥花砌愛庭陰清風逐人日色留興卧措青靄坐攀香枝間鶯近席而未飛紅蕊拂衣而不散乃命酌香沫浮素杯殷凝琥珀之色不令人醉微覺清思雖五雲仙漿無復加也座有才子南陽鄒子髙陽許侯與二三子頃為塵外之賞而曷不言詩矣遊李校書花藥園序于邵春吹萬以為物皆有役我智者惟役之不待終而有用故君子盡心於藥焉恐精華之不逮已也崇文館校書郎李公寢門之外大亭南敞大亭之左勝地東豁環岸種藥不知斯池幾十步但覩其縹眇霞錯蔥蘢煙布密葉層映虛根不搖珠點夕露金燃曉光而後花發五色色帶深淺藂生一香香有近逺色若錦繡酷如芝蘭動皆襲人靜則奪目此李公及時之適也至若上苗可食下體兼採子入菰飯華雜蒲葅既甘平而性寒又辛溫而執熱癖除而不為去傳風愈而安知及書此李公谷中之本也吾徒沐公馨香愛我藥石皆可右坐願為佳遊風生白蘋日映丹浦披搖靃霏則花飛鏡中虛涵崢嶸而山在海底入門而未辨金谷問地而不言河陽況春醖已清家園可摘飲盡落景勸無後時憶戴而乘輿自來知鍾而聽絃立應此李公推心之分也禮曰發慮以憲語云從吾所好慮以觀進好無思邪而公智周未兆根據有益上符性命之理下從耳目之玩舉一物而庶美集得不謂之難哉韓康隱名徒盡職者羊叔相遺吾無間然聊對諸人之意用觀賦物之作豫乃僚也敢無述乎于邵字相門京兆萬年人天寶末第進士嘗為巴州刺史嵗飢部獠亂薄城下邵勵兵拒戰且遣使諭曉獠丐降邵儒服出賊見皆拜即引去拜諫議大夫知制誥進禮部侍郎朝有大典册必出其手為三司使治獄失德宗旨又與陸贄不平官屢躓卒然史稱其孝弟有行晚塗益修潔云送吉州杜司户審言序陳子昻嗟夫德則有鄰才不必貴昔有耕於巖石而名動京師詞感帝王乃位卑武騎夫豈不遭昌運哉蓋時命不齊竒偶有數當用賢之世賈誼竄於長沙居好文之朝崔駰放於遼海況大聖提象羣臣守規杜司户炳靈翰林研機策府有重名於天下而獨秀於朝端徐陳應劉不得劘其壘何王沈謝適足靡其旗而載筆下寮三十餘載秉不羈之操物莫同塵合絶唱之音人皆寡和羣公愛禰衡之俊留在京師天子以桓談之非謫居外郡蒼龍閹茂扁舟入吳告别千秋之庭回棹五湖之曲朝廷相送駐旌蓋於城隅之子孤遊渺風帆於天際白雲自出蒼梧漸逺帝臺半隱坐隔丹霄巴山一望魂斷渌水於是邀白日籍青蘋追瀟湘之遊寄洞庭之樂吳歈楚舞右琴左壺將以緩燕客之心慰越人之思杜君乃挾琴起舞抗首髙歌哀皓首而未過恐青春之蹉跎且欲攜幽蘭結芳桂飲石泉以明節詠商山以卒嵗返耕餌术吾將老焉羣公嘉之賦詩以贈凡四十五人具題爵里合紀審言字必簡襄陽人擢進士纍遷洛陽丞恃才傲世坐事貶吉州司戶參軍司馬周季重司戶郭若訥構其罪繫獄將殺之審言子并年十三刺殺季重左右殺并審言免官武后召授著作佐郎神龍初坐交二張流峰州入為國子監主簿修文館直學士卒且死謂宋之問等我在久壓公等今且死大慰但恨不見替人别冀侍御崔司議序陳子昻朝廷歡娛山林幽晦思魏闕魂已九飛飲岷江情復三樂進不忘匡救於國退不慚無聞在林冀侍御崔司議至公至平許我以語默於是矣夫達則以公濟天下窮則以大道理身嗟乎子昻豈敢負古人哉蜀國酒醨無以娛客至於挾清琴登髙山白雲在天清江極目可以散孤憤可以遊太清為一世之逸人寄千里之道友吾欲不謝於崔冀二公矣所恨酒未醉琴方清王事靡盬驛騎遄逺不盡平原十日之飲又謝叔度纍日之歡雲山悠悠歎不及也載想房陸畢子為軒冕之人不知蜀山有雲巴水可涉睽闊良會我心惄然請以此酣寄謝諸子為巴山别引也陳子昻醉詞曰有道君匡國無悶豫在林白雲峨嵋上嵗晚來相尋登薊城西北樓送崔著作入都序陳子昻僕嘗倦遊傷别久矣況登樓逺國銜酒故人憤胡孽之侵邊從王師之出塞元戎按甲方割鮮卑之壘天子賜書且有相君之召而崔侯佩劍即謁承明羣公負戈方絶大漠燕山北望遼海東浮雲臺與碣館天殊亭障共衣冠地隔撫劍向道長謡增歎以身許國我則當仁論道匡君子思報主仲冬寒苦幽朔初平蒼茫天兵之氣冥滅戍雲之色白羽一指可掃丸都赤墀九重行欣宴樂心期我願斯遂君心共有策勳飲至方同廊廟之歡偃霸櫜弓借爾文儒之首薊丘故事可以贈言同賦登薊樓送崔子云爾秋日登洪府滕王閣餞别序王勃豫章故郡洪都新府星分翼軫地接衡廬襟三江而帶五湖控蠻荆而引甌越物華天寶龍光射牛斗之墟人傑地靈徐孺下陳蕃之榻雄州霧列俊采星馳臺隍枕夷夏之交賔主盡東南之美都督閻公之雅望棨戟遙臨宇文新州之懿範襜帷暫駐十旬休假勝友如雲千里逢迎髙朋滿座騰蛟起鳯孟學士之詞宗紫電青霜王將軍之武庫家君作宰路出名區童子何知躬逢勝餞時唯九月序屬三秋潦水盡而寒潭清煙光凝而暮山紫儼驂騑於上路訪風景於崇阿臨帝子之長洲得仙人之舊館層臺聳翠上出重霄飛閣流丹下臨無地鶴汀鳬渚窮島嶼之縈回桂殿蘭宫列岡巒之體勢披繡闥俯雕甍山原曠其盈視川澤紆其駭矚閭閻撲地鐘鳴鼎食之家舸艦彌津青雀黃龍之軸雲消雨霽彩徹區明落霞與孤鶩齊飛秋水共長天一色漁舟唱晚響窮彭蠡之濵鴈陳驚寒聲斷衡陽之浦遙吟甫暢逸興遄飛爽籟發而清風生纎歌凝而白雲遏睢園緑竹氣凌彭澤之樽鄴水朱華光照臨川之筆四美具二難并窮睇盻於中天極娛遊於暇日天髙地逈覺宇宙之無窮興盡悲來識盈虛之有數望長安於日下指吳會於雲間地勢極而南溟深天柱髙而北辰逺關山難越誰悲失路之人萍水相逢盡是他鄉之客懷帝閽而不見奉宣室以何年嗟乎時運不齊命途多舛馮唐易老李廣難封屈賈誼於長沙非無聖主竄梁鴻於海曲豈乏明時所賴君子見機達人知命老當益壯寧移白首之心窮且益堅不墜青雲之志酌貪泉而覺爽處涸轍以猶歡北海雖賒扶搖可接東隅已逝桑榆非晚孟嘗高潔空餘報國之情阮籍猖狂豈效窮途之哭勃三尺微命一介書生無路請纓等終軍之弱冠有懷投筆愛宗慤之長風捨簪笏於百齡奉晨昏於萬里非謝家之寶樹接孟氏之芳鄰他日趨庭叨陪鯉對今茲捧袂喜托龍門楊意不逢撫凌雲而自惜鍾期既遇奏流水以何慚嗚呼勝地不常盛筵難再蘭亭已矣梓澤丘墟臨别贈言幸承恩於偉餞登髙作賦是所望於羣公敢竭鄙懷恭疏短引一言均賦四韻俱成請灑潘江各傾陸海云爾勃省父於交址道出鍾陵都督大宴滕王閣宿命其壻作序以夸客遍請客莫敢當至勃慨然不辭都督遣吏伺其文輒報一再報語益竒乃矍然曰天才也極歡罷楊用修云蕭明與王僧辨書霜戈電戟無非武庫之兵龍甲犀渠皆是雲臺之仗王勃滕王閣序紫電清霜王將軍之武庫正用此事以十四嵗之童子胸中萬卷千載之下宿儒猶不能知其出處豈非間世竒才使勃與韓杜並世對毫恐地上老驥不能追雲中俊鶻後生之嗤點流傳妄哉滕王名元嬰髙祖最少子也初為金州刺史驕縱失度髙宗以書切責之遷洪州都督官屬妻美者紿為妃召逼私之嘗為典籖崔簡妻慢罵以履抵其面血流乃免帝嘗賜諸王綵以元嬰及蔣王貪但下書曰滕叔蔣弟不須賜給麻二車助為錢緡今人讀子安退之記序想見江山之勝而不知閣中帝子之醜乃爾秋日餞别序王勃黯然别之銷魂悲哉秋之為氣人之情也傷如之何極野蒼茫白露涼風之八月窮途蕭索青山白雲之萬里奏鳴琴則離鵾别鶴驚岐路之悲心來勝地則時雨涼風助他鄉之旅思琴書人物冀部關西去馬歸軒雲間日下楊學士天璞自然地靈無對二十八宿稟太微之一星六十四爻受乾坤之兩卦論其器宇滄海添江漢之波序其文章玄圃積煙霞之氣幾神之外猶是卿雲陶鑄之餘尚同稽阮接光儀於促席直覩明月生天響詞辨於中筵但覺清風滿室悠哉天地含靈有喜愠之容丘也東西悵望有别離之恨煙霞直視龍蛇去而泉石空文酒求朋賢俊散而琴歌斷門生餞别如北海之郡前髙士將歸似東都之門外研精麝墨運思龍章希存宿昔之資去啓相思之詠越州李明府宅送蕭三還齊州序王勃嗟乎不遊天下者安知四海之交不涉河梁者豈識别離之恨薜衣松杖琴樽為得意之親臨逺登髙煙霞是賞心之事有梁孝王之下客僕是南河之南孟嘗君之上賔子在北山之北幸屬一人作寰中之主翛然四皓為方外之臣俱遊萬物之間相遇三江之表許玄度之清風朗月時慰相思王逸少之修竹茂林屢陪歡宴加以惠而好我攜手同行或登吳會而聽越吟或下宛委而觀禹穴良談落落金石絲竹之音徽雅智飄飄松柏風雲之氣狀當此時也嘗謂連璧無異鄉之别斷金有好親之契生平於張范之年齊物於惠莊之嵗三光回薄未殫投分之情四序循環詎盡忘言之道豈期我留子往樂去悲來橫咽水而東西緒愁雲於南北況乎泣窮途於白首白首非臨别之秋嗟岐路於他鄉他鄉豈送歸之地蓐收戒序少昊司辰清風起而城闕寒白露下而江山逺徘徊去鶴將别蓋而同飛斷續來鴻共離舟而俱泛古人道别動便經年今我言離會當何日山巨源之風猷令望善佐朝廷嵇叔夜之潦倒粗疏甘從草澤行當山中攀桂往往思仁野外紉蘭時時佩德人非桃李豈得無言子悅簫韶當須振響勉酌傷離之酒具陳感别之辭各賦一言俱題六韻秋晚入洛於畢公宅别道王宴序王勃下官才不曠俗寵不動時充皇王之萬姓預乾坤之一物早師周禮偶愛儒宗晚讀老莊動諧真性進非干物自疏朝市之機退不邀榮誰識王侯之貴散琴樽於北阜喜耕鑿於東陂野老披荷暫辭幽澗山人賣藥忽至神州驚帝室之威靈偉皇居之壯麗朝遊魏闕見軒冕於南宫暮宿靈臺聞絃歌於北里交情獨放已厭人間野性時違少留都下道王以天孫之重分曲阜之新基畢公以帝室之華擁平陽之舊館迹塵鐘鼎思在江湖居榮命於中朝接風期於下走緑縢朱紱且混以蘿裳列榭崇軒坐均於蓬戶賔主由其莫辨語默於是同歸終太王之樂善備將軍之揖客是日也雲繁雨驟氣爽風馳髙秋九月王畿千里髙扃向術似元禮之龍門甲第臨衢有當時之驛騎英王入座牢醴還陳髙士臨筵樵蘇不爨是非雙遣自然天地之間榮賤兩忘何必山林之下玄談清論泉石縱橫雄筆壯詞煙霞照灼既而神馳象外宴洽寰中白露下而南亭虛蒼煙生而北林晚鶢鶋始望不及牲牢麋鹿長懷非忘林藪先生負局倦城市之塵埃遊子橫琴憶汀洲之杜若況乎迹不皆遂時不再來屬宸駕之方旋值羣公之畢從洛城風景此會無期戚里笙竽浮歡易盡仰雲霞而道意捨塵事而論心夏仲御之浮舟願乘春水張季鷹之命駕思動秋風策藜杖而非遙勑柴車之有日青溪數曲幽人長往白雲萬里帝鄉難見安貞抱朴已甘心於下走全忠履道是所望於羣公倘心迹克諧去留咸遂廟堂多暇返身滄海之隅軒冕可辭回首箕山之路尋赤松而見及泛黃菊以相從雖源水桃花時時失路而幽山桂樹往往逢人庶公子之來遊幸王孫之畢至茅君待客自有金壇王烈迎賔還開石架惟恐一丘風月侣山水而忘年三徑蓬蒿待公卿之來日對光陰之易晚惜雲霧之難披羣公葉縣鳬飛入朝廷而不出下走遼川鶴去謝城闕而依然敢抒重襟爰疏短引式命離前之筆希存别後之資凡我故人其辭云爾道王元慶髙祖子髙宗時歷滑州刺史以治績聞數蒙褒賜遷徐沁衛三州刺史事母謹及喪請躬修墳墓不聽薨諡曰孝還冀州别洛下知己序王勃東西南北丘也何從寒暑陰陽時哉不與河陽古樹無復殘花合浦寒煙空驚墜葉王生賣藥入天子之中都夏統乘舟屬羣公之大會風煙匝地車馬如龍鐘鼓沸天美人似玉芳筵交映旁徼豹象之胎華饌重開直報蛟龍之髓季鷹之思吳命駕果為秋風伯鸞之適越登山以求渌水辭故友謝時人登鄂坂而迂回入邙山而北走何年風月三山滄海之春何處風花一曲青溪之路賔鴻逐暖孤飛萬里之中仙鶴隨雲直去千年之後悲夫光陰難再子卿殷勤於少卿風景不殊趙北相望於洛北鴛鴦雅什俱為贈别之資鸚鵡竒杯共盡忘憂之酒袁侍御席餞永昌獨孤少府序宋之問春其暮兮勞志士之幽歎友其行矣結吾徒之逺悲豈不以時物華嵗好事者賞而不足名流才子相歡者懷而不見河南獨孤册風儀松竹詞賦雲泉清義多南史之才選署半北部之尉袁侍御風霜利器金石宏材執憲稱柱下之雄禮士採域中之俊爾乃撰辰開宴考地疏筵落花覆沼懸藤掃砌竹林以清氣娛賔蘭畹以芳心愛客環坐三尺起君子之風祖道百壺酌賢人之酒去留交軫舞詠相喧管召魚樂杯薰鶯醉此時奚怨盛集無何是日增悲韶芳亦盡啼烏送晚遙棲御史之林斑馬嘶歸近送舍人之驛夫登髙動詠贈逺形言豈鄙懷之庶幾乃羣公之事業盍請離唱用貴洛陽之紙焉人採一言各題四韻秋夜送孟贊府兄還都序李白夫士有飾危冠佩長劍揚眉吐語激昻青雲者莫不誇炫意氣托交王侯若告之急難乃十失八九我義兄孟子則不然耶道合而襟期暗親志乖而肝膽楚越鴻騫鳯立不循常流孔明披書每觀於大略少君讀易時作於小文四方賢豪泫然景慕雖長不滿七尺而心雄萬夫至於酒情中酣天機俊發則談笑滿席風雲動人非嵩丘之精何以及此白以弱植早飲香名況親承光輝恩甚華萼他鄉此别誰無恨耶時林風吹霜散下秋草海鴈嘶月孤鶴翔雲驚魂動骨戛瑟涕流抗乎緬邁傷如之何請各賦詩以寵岐路冬夜於隨州紫陽先生餐霞樓送煙子元演隱仙城山序李白吾與霞子元丹煙子元演氣激道合結神仙交殊身同心誓老雲海不可奪也歷考天下周求名山入神農之故鄉得胡公之精宇胡公身揭日月心飛蓬萊起餐霞之孤樓鍊吸景之精氣延我數子髙談混元金書玉訣盡在此矣白乃語及形勝紫陽因大誇其仙城元侯聞之乘興將往别酒寒酌醉青田而少留夢魂曉飛渡緑水以先去吾不凝滯於物與時推移出則以平交王侯遁則以俯視巢許朱紱狎我緑蘿未歸恨不得同棲煙林對坐松月有所感歎然銘契談石乘春當來且抱琴卧花髙枕相待以寵别賦而贈之奉餞十七翁二十四翁尋桃源序李白昔祖龍滅古道威嚴刑煎熬生人若墜大火三墳五典散為寒灰築長城起阿房并諸侯殺豪俊自謂功髙羲皇國可萬世思欲凌雲氣求仙人登封太山風雨暴作雖五松受職草木有知而萬象乖度禮刑將弛則綺皓不得不遁於南山魯連不得不蹈於東海桃源之避世者可謂超升先覺夫指鹿之儔連頸而同死非吾黨之謂乎二翁耽老氏之言繼少卿之作文以述大雅道以通至精卷舒天地之心脫落神仙之境武陵遺迹可得而窺焉問津利往水引漁者花藏仙溪春風不知從來落英何許流出石洞來入晨光盡開有良田名池竹果森列三十六洞别為一天耶今扁舟而行笑謝人世阡陌未改古人依然白雲何時而來歸青山一去而誰往諸公賦桃源以美之送鼂監還日本國序王維舜覲羣后有苗不格禹會諸侯防風後至動干戚之舞興斧鉞之誅乃貢九牧之金始頒五瑞之玉我開元天地大寶聖文神武應道皇帝大道之行先天布化乾元廣運涵育無垠若華為東道之標戴勝為西門之候豈甘心於卭杖非徴貢於苞茅亦猶呼韓來朝舍於蒲萄之館昆彌遣使報以蛟龍之錦犧牲玉帛以將厚意服食器用不寶逺物百神受職五老告期況乎戴髮含齒得不稽顙屈膝海東諸國日本為大服聖人之訓有君子之風正朔本乎夏時衣裳同乎漢制歷嵗方達繼舊好於行人滔天無涯貢方物於天子同儀加等位在王侯之先掌次改觀不居蠻夷之邸我無爾詐爾無我虞彼以好來廢關弛禁上敷文教虛至實歸故人民雜居往來如市朝司馬結髮遊聖負笈辭親問禮於老𥅆學詩於子夏魯偕車馬孔丘遂適於宗周鄭獻縞衣季札始通於上國名成太學官至客卿必齊之薑不歸娶於髙國在楚猶晉亦何獨於由余遊宦三年願以君羮遺母不居一國欲其晝錦還鄉莊舄既顯而思歸關羽報恩而終去於是稽首北闕裏足東轅篋命賜之衣懷敬問之詔金簡玉字傳道經於絶域之人方鼎彞樽致分器於異姓之國琅琊臺上逈望龍門碣石館前敻然鳥逝鯨魚噴浪則萬里倒回鷁首乘雲則八風卻走扶桑若薺鬱島如萍沃白日而簸三山浮蒼天而吞九域黃雀之風動地黑蜃之氣成雲渺不知其所之何相思之可寄嘻去帝鄉之故舊謁本朝之君臣詠七子之詩佩兩國之印恢我王度諭彼蕃臣三寸猶在樂毅辭燕而未老十年在外信陵歸魏而逾尊摩詰集有送祕書鼂監還日本詩云積水不可極安知滄海東九州何處逺萬里若乘風向國惟看日歸帆但信風鼇身映天黑魚眼射波紅獨樹扶桑外主人孤島中别離方異域音信若為通此詩可與序競美并附於此送建州趙使君序權德輿豫嘉趙侯者在京下十餘年祿甚薄而心甚泰操利權燻灼可以頥指變化者趙侯顧不遊其津退然自得鄙夫識之曰斯可以為君子矣今茲以蘭臺郎滿嵗佩二千石印綬受明天子面命牧茲建人為仁由已斯亦不細是邦為東閩劇地故相安平穆公嘗理焉穆公豫之戴侯也故能言之當孝文避狄時巡之際移書四方詞義憤切密疏奔問請以州師赴蹈凡穆公所以彰大名操大政者皆建之為也趙侯於斯時實為從事賔榻虛左得之甚歡凡趙侯所以令聲籍甚四征交辟者由穆公發之也今日幢蓋昔時山川存問遺老凄涼故事至止之日情何可言屬者狀往行於考功易嘉名於博士斯亦士君子盡誠於所奉其可誣耶頃豫忝職西垣殆將十嵗草列郡命過於百數每發緘含毫未嘗不惕然慎重以其四封之內性命所繫故也或歎趙侯官尚屈而地頗逺豫以為不然昔孔門諸生以蒲莒單父著稱況諸侯之貴乎東漢循吏以交址九真報政況建溪之邇乎則趙侯旟軾之間猛鷙飛伏勞徠所及鰥孤樂康陟明善價如建瓴水雖欲勇退如止其可得乎南轅計日祭軷即路白晝美景如歸故鄉行矣趙侯當以書札為念也送韋起居老舅假滿歸嵩陽舊居序權德輿九年正月左史韋公移疾既踰時左曹以聞得請當免遂以角巾野服如東周舊山中朝延搢紳先生之徒車轂擊於通馗觴酒交於竹林執其衣袪惜乎分陰弦晦屢移其歡不厭或發於歌詠以將厚意外孫權德輿序而言曰大凡士之生世有二道焉其出也宣其功緒播其利澤納忠服勞以服天下其處也味道之腴與古為徒休影息迹以間身世不如是者細則牽於利欲大則囿於得喪識真者羞之公之先扶陽始以丞相致仕為西漢盛典逍遙以安車不屈為北朝外臣至是左史又能伸其志以𢎞其世嘉遁德風盛乎一門況吾君用大和理萬物動者靜者各遂其方則陳力以致用潔身以𢎞教其利一也故左史得以聰明為駢枝以名聲為纒繳無耗氣無焚和退然葆真獨與道往鷗鳥不動家人忘貧是行也朵頥者知懼矣出車家林揮手青門擁途而祖者唯恐不及合歡也忘印紱之輕重陳詩也無章句之約束放言無擇造適則笑行觴無算既醉而罷虧成彼是曾不得棲於念慮之中而惠風間雲飄拂左右動用視聽無非大方推是類而廣之則泛清伊陟嵩丘又可知也小生無以為贈謹序其所以然附於編德輿詩云威鳯翔紫氛孤雲出寥天竒彩與幽姿縹眇皆自然嘗聞陶唐氏亦有巢許全以茲聳風俗豈必效羈牽大君遂羣方左史蹈前賢振衣去朝市賜告歸林泉滑和固難久循性得所便有名皆畏途無事乃真筌舊壑窮杳窱新潭漾淪漣巖花落又開山月缺復圓輕策逗蘿徑幅巾凌翠煙機間魚鳥狎體和芝术鮮四皓本避難二疏猶待年況今寰海清復此鬢髮玄顧慚纓上塵未絶區中緣齊竽終自退心寄嵩峰巔韋起居他無可考權公稱為舅又自稱外孫而權母自姓李或其祖母舅也送友人遊蜀序吕溫始吾挹至源之貌若隴底積雪聳寒木於雲溪次吾覽至源之文若驪龍追走弄明月於泉窟末吾聽至源之論若泰山欲雨倒雲氣於滄溟如其貌可以振肅周行如其文可以光潤石渠如其論可以感動宣室而淪蕩江海垂二十年則不知天所以生之之意貞元甲乙嵗以親故勸勉來遊京師時然後言無辨以動衆樂然後笑無歡以接物義然後取無食以寧居慨然悔之決策長往因登紫閣峰而指曰西南青冥色連岷峨吾行何歸山盡則住翌日告别於友人太原王玄運顧謂豫曰髙雲出岫無時雨之會與風悠揚轉逺而散若至源者其猶雲耶盍亦贈之序豫和汝東山記張説兵部尚書同中書門下三品修文館大學士韋公體含真靜思叶幽曠雖翊亮廊廟而緬懷林藪東山之曲有别業焉嵐氣入野榛煙出谷石潭竹岸松齋藥畹虹泉電射雲木虛吟惚恍疑夢間關忘術茲所謂丘壑夔龍衣冠巢許幸溫泉之嵗也皇上聞而賞之乃命掌舍設帟金吾劃次太官載酒奉常抱樂停輿輦於青靄佇翬䄖於紫氛百神朝於谷口千官飲乎池上緹騎環山朱斾焰野縱觀空巷途歌傳壑是日即席拜公逍遙公名其居曰清虛原幽棲谷景移樂極天子賦詩王后帝女宫嬪邦媛歌焉和焉以寵德也加以中宫敦序謂我諸兄引內子於重幄見兒童於行殿家人之禮優棠棣之詩作於是實其筐筥下以昭忠信之獻賁其束帛上以示慈惠之恩朝野歡并君臣義洽夫飛翠華歷茨嶺至道之主也紆紫綬期赤松素履之輔也千載一時難乎此遇故兩曜合舍衆星聚德雅道光華髙風久塞寒谷煦景竅崖潤色猗歟盛事振古未有篆之玄石貽代厥後王建逍遙溪詩云逍遙公在此徘徊帝改溪名起石臺車馬到春常借問子孫因選暫歸來稀疏野樹人移折零落蕉花雨打開無主青山何所直買供官稅不如灰觀此記再觀此詩令人有滄桑之感蘭溪縣靈隱寺東峰新亭記馮宿東陽實會稽西部之郡蘭溪實東陽西鄙之邑嵗在戊寅天官署洪君少卿以為之宰君之始至則用信待物用勤集事信故人洽勤故公濟未期而其政成後三年夏六月余過其邑洪君導余以邑之勝賞於是乎有東峰亭之遊背城之闉半里而近初屆佛剎剎之上方而亭在焉松門蓋空石道如帶足倦纍息然後造夫極焉向之池隍館宇之多旗亭闤闠之喧途道往來之衆簿書鞅掌之繁顧步之餘忽焉如失但山風飀飀嶺雲峩峩飛軒憑虛洞壑在下向背殊狀昏明易色指遙青而點黛者問之則曰某山某巖某林某墅指逺白而曳練者問之則曰某洲某渚某湫某塘髙深互呈心目相競飄若象外意其幻成余既諧其私爰究其本先是邑微登攀遊觀之所洪君曾是挈俸錢二萬經斯營斯因地於山因材於林因工於子來因時於農隙又何易也崇山濬谷佳境勝槩綿世伏匿一朝發朗又何能也君在建中興元之間為江南西道節度曹王所知時方興軍職壓冦境供億倉卒賦平人和王實賴之故御史大夫鄭滑節度盧公羣與君嘗同僚每號之曰精金百鍊良驥千里誠矣然則是邑之理茲亭之勝於君之分不為難能夫播芳塵而鼓餘波者非文莫可遂攬筆為記刋於石而附諸地志焉馮宿字拱之婺州東陽人歷工刑二部侍郎封長樂縣公擢東川節度使卒諡曰懿劉蕡以對策忤時宿與賈餗等為考官畏避不敢聞易州候臺記李德裕昔武王順天應人奄有周室邵公受命作伯宅茲燕土列分冀為幽之都專受脤執燔之命於是建宗廟立城市分器輯其邦家築臺觀乎雲物則候臺之建允或在茲初具版幹陳畚鍤書丈尺糗糧之數度髙平逺近之差奔命子來執用林聚約之閣閣荷鍤而雲陰數重築之登登相杵而雷響四合成之不日鬱兮崇山將中天以懸居豈承露以特立然後分保章以典之命日者以覘之使八風不姦五雲式序人無凶札夭瘥之疾國絶喪荒水旱之沴凡若是者數百年至六國糜沸九州瓜剖昭王能破齊抗趙候雲在朔則二至二分之占五紀五緯之數雖少沒振未大滅裂及秦有華戎漢封郡縣析木空聞於分野甘棠己盡於剪伐則㫝祲之儀掃地都盡廊廡旅乎荆棘階址穴其狐兔自我唐再造區夏大分嶽牧使鎮天子之邦不同諸侯之郡遂及陳迹以作新臺既無占候之事共為宴樂之所雖山節藻棁禮不僣於大夫而刻桷丹楹誠終慚乎君子代為故事人無間言洎我良牧郭公博采舊史發揮新意文物大備懲勸可觀公名明肅字晉容太原郡人也監門將軍之孫御史大夫之子纘戎餘慶克荷明德靈源與天地爭長廣度與江湖比量故能受明主之詔剖太守之符澤從雲遊心入水淨俗變於道禮賢存擁篲之風人歌其德聽訟擬坐棠之化幸三年而政教已成雖一日而牆宇必葺以為先王議事理不忘本君子懷德人惟求舊況候臺易之古臺也壯址仍存昭王燕之賢王也盛德不泯欲觀古人之象至止可以肅肅如享太牢之味登之可以熙熙遂於臺之外壁列劇辛樂毅焉以為道者萬物之奧天地之禪六度之門寂滅之義施之於國則富證之於人則夀況守道者必嚴之於吸風飲露安禪者必釋之於息照冥境乃於臺之內壁圖桑門晏坐焉以為孝者德之本總人百行貞者事之幹為乾四德至天則風雨以時比竹而霜霰不變廬於墓有田氏之子安其室有王章之妻生芝草於大隧之前是加一等詠柏舟在中河之側乃無二事復於其次為繞墳薦鯉焉俾觀者如堵覽之駭目激懦夫烈士之節警貞女孝子之心豈徒壓百雉之崇墉架九鳥之峻堞軒榭窈窕松栁陰映幽室納寒谷之氣炎天下霜畫梁對霽雨之輝晴虹射日夫如是則登之不假贈扇北風其涼視之不待褰幃太山如􅀈豈比夫逐荆臺遂為流遁畫麟閣不有姓名者哉别駕彭城劉公循忠從政以賢方協海沂之詠司馬清河張公瓚食祿以德爰光中外之遊咸秉濟代之材以成考室之美雖二公𢎞化有無窮之令聞終三后協心樹不朽之丕構德裕邑人也實寡聞見拔薤投水德未半於任棠築臺置金禮何多於郭隗敢不傳美以為實録藏於屋壁誠有愧於家書勒於碑版庶無慚於臺記時建崇玄學之嵗秋八月旬有九日其從事參佐等學富今古材堪經濟雖懷坐嘯之功未展摩天之力並勒石於後以克永代絳巖湖記樊珣句容西南二十三里曰赤山天寶中改為絳巖山以文變質也山外周流厥有湖塘舊址考於前志則曰吳人創之梁人通之矣洎金火有變積為習坎灌莽之所我唐麟德嵗邑宰楊嘉延亦綦前服利農為名雖迹於傳聞而事斯茫昧楊氏之後今餘百年實滋菰蒲莫植粳稻剝極則賁俟能而伸大厯十二紀縣大夫兼大理司直太原王公昕能蘇罷人且易弊俗臨湖而歎以欲從人吟使臣之清風酌良牧之髙課將圖永逸匪顧暫勞因察其地形訪以輿誦謀始作則定徒撰工月在休農雲其荷鍤周匝百頃蓄為湖塘置兩斗門用以為節旱暵則決而全注霖潦則瀦而不流收功濟時道甚明逺開田萬頃贍戶九鄉洎成奧區頗無凶嵗魚稻之盛公實為之晉叔敖芍陂能張楚國史起漳水竟富魏邦秦稱鄭國漢歌邵杜皆謂是也每商羊罷舞龍見而雩比屋有憂於銷鑠連阡莫覩於耘耨我則黛波奫淪白鳥飛滅下洞庭之鳬鴈泳中流之鱣鮪橫塘之右構為新亭芬其芰荷樹以杞栁楊楚江嶺憧憧是途行李實獲於蔭庥歌詠或藉於觀覽懿乎哉君子之用心也孰愈崇其島榭侈以林堂此而莫文翰墨奚述宋書謝靈運傳論沈約史臣曰民稟天地之靈含五常之德剛柔迭用喜愠分情夫志動於中則歌詠外發六義所因四始攸繫升降謳謡紛披風什雖虞夏以前遺文不覩稟氣懷靈理無或異然則歌詠所興宜自生民始也周室既衰風流彌著屈平宋玉導清源於前賈誼相如振芳塵於後英辭潤金石髙義薄雲天自茲以降情志愈廣王褒劉向楊班崔蔡之徒異軌同奔遞相師祖雖清辭麗曲時發乎篇而蕪音纍氣固亦多矣若夫平子艷發文以情變絶唱髙蹤久無嗣響至於建安曹氏基命三祖陳王咸蓄盛藻甫乃以情緯物以文被質自漢至魏四百餘年辭人才子文體三變相如工為形似之言二班長於情理之説子建仲宣以氣質為體並標能擅美獨映當時是以一世之士各相慕習原其飈流所始莫不同祖風騷徒以賞好異情故意製相説降及元康潘陸特秀律異班賈體變曹王縟旨星稠繁文綺合綴平臺之逸響采南皮之髙韻遺風餘烈事極江右在晉中興玄風獨扇為學窮於柱下博物止乎七篇馳騁文辭義殫於此自建武暨於義熙歷載將百雖比響聨辭波屬雲委莫不寄言上德託意玄珠遒麗之辭無聞焉耳仲文始革孫許之風叔源大變太乙之氣爰逮宋氏顔謝騰聲靈運之興會標舉延年之體裁明密並方軌前秀垂範後昆若夫數袵論心商𣙜前藻工拙之數如有可言夫五色相宣八音協暢由乎玄黃律吕各適物宜欲使宫羽相變低昻舛節若前有浮聲則後須切響一簡之內音韻盡殊兩句之中輕重悉異妙達此旨始可言文至於先士茂制諷髙歷賞子建函京之作仲宣灞岸之篇子荆零雨之章正長朔風之句並直舉胸情非傍詩史正以音律調韻取髙前式自靈均以來多歷年代雖文體稍精而此祕未覩至於髙言妙句音韻天成皆暗於理合匪由思至張蔡曹王曾無先覺潘陸顔謝去之彌逺世之知音者有以得之此言非謬如曰不然請待來哲約既為此論吳郡陸厥遺書大率謂歷代衆賢似不都暗此處約答曰宫商之聲有五文字之别纍萬以纍萬之繁配五聲之約髙下低昻非思力所學又非止若斯而已十字之文顛倒相配字不過十巧歷已不能盡何況復過於此者乎靈均以來未經用之於懷抱固無從得其髣佛矣若斯之妙而聖人不尚何耶此蓋曲折聲韻之巧無當於訓義非聖哲玄言之所急也自古詞人豈不知宫羽之殊商徴之别而其中參差變動所昧實多鄙意所謂此祕未覩者也若以文章之音韻同管絃之聲曲美惡妍媸不得頓相乖反譬猶子野操曲安得忽有闡緩失調之聲以洛神比陳思他賦有似異手之作故知天機啓則律吕自調六情滯則音律頓舛也士衡雖云煥若縟錦寧有濯色江波其中復有一片是衛文之服此則陸生之言即復不盡者矣韻與不韻復有精粗輪扁不能言之老夫亦不辨盡后妃傳論晉書夫乾坤定位男女流形伉儷之義同歸貴賤之名異等若乃作配皇極齊體紫宸象玉牀之連後星喻金波之合羲璧爰自敻古是謂元妃降及中年乃稱王后四人並列光於帝嚳之名二妃同降著彼有虞之典夏商以上六宫之制其詳靡得而聞焉姬劉以降五翟之規其事可略而言矣周禮天子立一后三夫人九嬪二十七世婦八十一御妻以聽王者內政故婚義曰天子之與后如日之與月陰之與陽由斯而談其所從來逺矣故能母儀天宇助宣王化德均載物比大坤維宗廟歆其薦羞穹壤俟其交泰是以哲王垂憲尤重造舟之禮詩人立言先獎葛覃之訓後燭流景所以裁其宴私房樂希聲是用節其容止履端正本抑斯之謂歟若乃聘納有方防間有禮肅尊儀而修四德體柔範而𢎞六義陰教洽於宫闈淑譽騰於區域則玄雲入户上帝錫母萌之符黃神降徴坤靈贊夀丘之道終能鼎祚惟永胤嗣克昌至若儷極虧間憑天作孽倒裳衣於袵席感朓側於弦望則龍漦結釁宗周鞠為黍苗燕尾挺災隆漢墜其枌社矣自曹劉內主位以色登甄衛之家榮非德舉淫荒挺性蔑西郊之禮容婉孌含辭作南國之竒態詖謁由斯外入穢德於是內宣椒掖播晨牝之風蘭殿絶河睢之響永言彤史大練之範逾微緬視青蒲脫珥之猷替矣晉承其末與世汚隆宣皇創基功𢎞而道屈穆后一善績侔於十亂洎乎太祖始親選良家既而帝掩紈扇躬行請託后採長白實彰妬忌之情賈納短青竟踐覆亡之轍得失遺迹煥在綈緗興滅所由義同畫一故列其本事以為后妃傳云嵇康諸人傳論晉書史臣曰夫學非常道則物靡不通理有忘言則在情斯遣其進也撫俗同塵不居名利其退也餐和履順以保天真若乃一其本源體無為之用分其華葉開寓言之道是以伯陽垂範鳴謙置式欲崇諸已先下於人猶大樂無聲而蹌鸞斯應者也莊生放達其旨而馳辨無窮棄彼榮華則俯輕爵位壞其道術則顧蔑至公舐痔兼車鳴鳶吝腐以茲自口於焉玩物殊異虛舟有同攘臂嵇阮竹林之會劉畢芳樽之友馳騁莊門排登李室若夫儀天布憲百官從軌經禮之外棄而不存是以帝堯縱許由於埃壒之表光武舍子陵於潺湲之瀨松蘿低舉用以優賢巖水澄華茲焉賜隱臣行厥志主有嘉名至於嵇康遺巨源之書阮氏創先生之傳軍咨散髮吏部盜樽豈以世疾名流茲焉自垢臨鍛竈而不回登廣武而長歎則嵇琴絶響阮氣徒存通其旁徑必雕風俗召以效官居然尸素軌躅之外或有可觀者焉咸能符契情靈各敦終始愴神交於晚笛或相思而動駕史臣是以拾其遺事附於篇云辨宗論録一則謝靈運維三問答云由教而信則有日進之功非漸所明則無入照之分夫尊教而推宗者雖不永用當推之時豈可不暫令無耶若訐其暫合猶自賢於不合非漸如何三答暫者假也真者常也假知無常常知無假今豈可以假知之暫而侵常知之真哉今漸合賢於不合誠如來言竊有微證巫臣諫莊王之言物賒於已故理為情先及納夏姬之時已交於物故情居理上情理雲互物已相傾亦中智之率任也若以諫日為悟豈容納時之惑耶且南為聖也北為愚也背北向南非停北之謂向南背北非至南之稱然向南可以至南背北非是停北非是停北故愚可去矣可以至南故悟可得矣晉宋諸公以駢耦談理中多微言如𢎞明集所載以非所急故不盡録存此一臠可以知鼎味矣辨命論劉峻主上嘗與諸名賢言及管輅歎其有竒才而位不達時有在赤墀之下豫聞斯議歸以告余余謂士之窮達無非命也故謹述天旨因言其致云爾臣觀管輅天才英偉圭璋特秀實海內之名傑豈日者卜祝之流乎而官止少府丞年終四十八天之報施何其寡歟然髙才而無貴仕叨餐而居大位自古所歎焉獨公明而己哉故性命之道窮通之數天閼紛綸莫知其辨仲任蔽其源子長闡其惑至於褐冠甕牖必以玄天有期鼎貴髙門則曰唯人所召譊譊讓咋異端俱起蕭逺論其本而不暢其流子玄語其流而未詳其本嘗試言之曰夫通生萬物則謂之道生而無主謂之自然自然者物見其然不知所以然同焉皆得不知所以得鼓動陶鑄而不為功庶類混成而非其力生之無亭毒之心死之豈虔劉之志墜之深淵非其怒升之霄漢非其悅蕩乎大乎萬寶以之化確乎純乎一作而不易化而不易則謂之命命也者自天之命也定於冥兆終然不變鬼神莫能預聖哲不能謀觸山之力無以抗倒日之誠弗能感短則不可緩之於寸陰長則不可急之於箭漏至德未能踰上智所不免是以放勛之世浩浩襄陵天乙之時焦金流石文公􅠶其尾宣尼絶其糧顔回敗其叢蘭冉耕歌其芣苡夷叔斃淑媛之言子輿困臧倉之訴聖賢且猶若此而況庸庸者乎至乃伍員浮尸於江流三閭沉骸於湘渚賈大夫沮志於長沙馮都尉皓髮於郎署君山鴻漸鎩羽儀於髙雲敬通鳯起摧迅翮於風次此豈才不足而行有遺哉近世有沛國劉瓛瓛弟璡并一時秀士也瓛則關西孔子通涉六經循循善誘服膺儒行璡則志烈秋霜心貞崑玉必亭亭髙竦不雜風塵皆育德於衡門並馳聲於天地而宮有微於侍郎位不登於執戟相次殂落宗祀無饗因斯兩賢以言古則昔之玉質金相英髦秀達皆擯斥於當年韞竒才而莫用候草木以共雕與麋鹿而同死膏塗平原骨填川谷湮滅而無聞者豈可勝道哉此則宰衡之與皂𨽻容彭之與殤子倚頓之與黔婁陽文之與敦洽咸得之於自然不假道於才智故曰死生有命富貴在天斯之謂矣然命體周流變化非一或先號而後笑或始吉而終凶或不召自來或因人以濟交錯糾紛回還倚伏非可以一理徴非可以一塗驗而其道微密寂寥惚慌無形可以見無聲可以聞必御物以效靈亦憑人而成象譬天王之冕旒任百官以司職而惑者覩湯武之龍躍謂戡亂在神功聞孔墨之挺生謂英睿擅竒響視彭韓之豹變謂鷙猛致人爵見張桓之朱紱謂明經拾青紫豈知有力者運之而趨乎故言而非命者有六蔽焉爾請陳其梗槩夫靡顔膩理哆噅顣頞形之異也朝秀晨終龜鶴千嵗年之殊也聞言如響智昏菽麥神之辨也固知三者定乎造化榮辱之境獨曰由人是知二五而未識於十其蔽一也龍犀日角帝王之表河目龜文公侯之相撫鏡知其將刑壓紐顯其膺録星虹樞電昭聖德之符夜哭聚雲鬱興王之瑞皆兆發於前期渙汗於後葉若謂驅貔虎奮尺劍入紫微升帝道則未達窈冥之情未測神明之數其蔽二也空桑之里變成洪川歷陽之都化為魚鱉楚師屠漢卒睢河鯁其流秦人坑趙士沸聲如雷震火炎崑嶽礫石與琬琰俱焚嚴霜夜零蕭艾與芝蘭共盡雖遊夏之英才伊顔之殆庶焉能抗之哉其蔽三也或曰明月之珠不能無纇夏后之璜不能無考故亭伯死於縣長相如卒於園令才非不傑也主非不明也而碎結緑之鴻輝殘懸黎之夜色抑尺之量有短哉若然者主父偃公孫𢎞對策不升第歷説而不入牧豖淄原見棄州部設令忽如過隙溘死霜露其為詬恥豈崔馬之流乎及至開東閣列五鼎電照風行聲馳海外寧前愚而後智先非而終是將榮悴有定數天命有至極而謬生妍蚩其蔽四也夫虎嘯風馳龍興雲屬故重華立而元凱升辛受生而飛廉進然則天下善人少惡人多暗主衆明君寡而薰蕕不同器梟鸞不接翼是使渾敦檮杌踵武於雲臺之上仲容庭堅耕耘於巖石之下橫謂廢興在我無係於天其蔽五也彼戎狄者人面獸心晏安鴆毒以誅殺為道德以蒸報為仁義雖大風立於青丘鑿齒奮於華野比於狼戾曾何足喻自金行不競天地版蕩左帶沸脣乘間電發遂覆瀍洛傾五都居先王之桑梓竊名號於中縣與三皇競其氓黎五帝角其區宇種落繁熾充牣神州嗚呼福善禍淫徒虛言耳豈非否泰相傾盈縮遞運而汨之以人其蔽六也然所謂命者死生馬貴賤焉貧富焉治亂焉禍福焉此十者天之所賦也愚智善惡此四者人之所行也夫神非舜禹心異朱均才絓中庸在於所習是以素絲無恆玄黃代起鮑魚芳蘭入而自變故季路學於仲尼厲風霜之節楚穆謀於潘崇成弒逆之禍而商臣之惡盛業光於後嗣仲由之善不能息其結纓斯則邪正由於人吉凶在乎命也或以鬼神害盈皇天輔德故宋公一言法星三徙殷帝自翦千里來雲若使善惡無徴未洽斯義且于公髙門以待封嚴母掃墓以望喪此君子所以自強不息也若使仁而無報奚為修善立名乎斯徑庭之辭也夫聖人之言顯而晦微而婉幽逺而難聞河漢而不測或立教以進庸怠或言命以窮性靈積善餘慶立教也鳯鳥不至言命也今以片言辨其要趣何異乎夕死之類而論春秋之變哉且荆昭德音丹雲不卷周宣祈雨圭璧斯罄于叟種德不逮勛華之髙延年殘獷未甚東陵之酷為善一為惡均而禍福異其流興廢殊其迹蕩蕩上帝豈如是乎詩云風雨如晦雞鳴不已故善人為善焉有息哉夫食稻梁進芻豢衣狐貉襲冰紈觀窈眇之竒舞聽雲和之琴瑟此小人之所急非有求而為也修道德習仁義敦孝悌立忠貞漸禮樂之腴潤蹈先生之盛則此君子之所急非有求而為也然則君子居正體道樂天知命明其無可奈何識其不由智力逝而不召來而不距生而不喜死而不戚瑶臺夏屋不能悅其神土室編蓬未足憂其慮不充屈於富貴不遑遑於所欲豈有史公董相不遇之文乎王聖俞云辨命論自處以仁義而居天以莽蕩彼意謂天道無知吾但自盡耳是猶子目其父曰彼老悖矣共為子職而己而不知其父之末始老悖也廣絶交論劉峻客問主人曰朱公叔絶交論為是乎為非乎主人曰客奚此之問客曰夫草蟲鳴則阜螽躍雕虎嘯而清風起故絪緼相感霧涌雲蒸嚶鳴相召星流電激是以王陽登則貢公喜罕生逝而國子悲且心同琴瑟言鬱郁於蘭茝道協膠漆志婉孌於塤箎聖賢以此鏤金版而鐫盤盂書玉牒而刻鐘鼎若乃匠人輟成風之妙巧伯子息流波之雅引范張款款於下泉尹班陶陶於永夕絡繹縱橫煙霏雨散巧歷所不知心計莫能測而朱益州汨彞敘粵謨訓捶直切絶交遊比黔首以鷹鸇㜶人靈於豺虎蒙有猜焉請辨其惑主人聽然而笑曰客所謂撫絃徽音未達燥溼變響張羅沮澤不覩鴻雁雲飛蓋聖人握金鏡闡風烈龍驤蠖屈從道汙隆日月聨璧贊亹亹之𢎞致雲飛雷薄顯棣華之微旨若五音之變化濟九成之妙曲此朱生得玄珠於赤水謨神睿而為言至夫組織仁義琢磨道德歡其愈樂恤其陵夷寄通靈臺之下遺迹江湖之上風雨急而不輟其音霜雪零而不渝其色斯賢達之素交歷萬古而一遇逮叔世民訛狙詐飈起溪谷不能踰其險鬼神無以究其變競毛羽之輕趨錐刀之末於是素交盡利交興天下蚩蚩鳥驚雷駭然利交同源派流則異較言其略有五術焉若其寵鈞董石權壓梁竇雕刻百工爐錘萬物吐漱興雲雨呼吸下霜露九域聳其風塵四海疊其燻灼靡不望影星奔藉響川騖雞人始唱鶴蓋成陰髙門旦開流水接軫皆願摩頂至踵隳膽抽腸約同要離焚妻子誓徇荆卿湛七族是曰勢交其流一也富埒陶白資巨程羅山擅銅陵家藏金穴出平原而聨騎居里閈而鳴鐘則有窮巷之賔繩樞之子冀宵燭之末光邀潤屋之微澤魚貫鳬躍颯沓鱗萃分鴈鶩之稻粱霑玉斝之餘瀝銜恩遇進款誠援青松以示心指白水而旌信是曰賄交其流二也陸大夫宴喜西都郭有道人倫東國公卿貴其籍甚搢紳羡其登仙加以斂頥蹙頞涕唾流沫騁黃馬之劇談縱碧雞之雄辨敘溫燠則寒谷成暄論嚴苦則春叢零葉飛沈出其顧指崇辱定其一言於是有弱冠王孫綺紈公子道不挂於通人聲未遒於雲閣攀其鱗翼丐其餘論附騏驥之旄端軼歸鴻於碣石是曰談交其流三也陽舒陰慘生民大情憂合歡離品物恆性故魚以泉涸而喣沫鳥因將死而哀鳴同病相憐綴河上之悲曲恐懼實懷昭谷風之盛典斯則斷金由於湫隘刎頸起於苫蓋是以伍員濯溉於宰嚭張王撫翼於陳相是曰窮交其流四也馳騖之倫澆薄之俗無不操權衡秉纖纊衡所以揣其輕重纊所以屬其鼻息若衡不能舉纊不能飛雖顔冉龍翰鳯雛曾史蘭薰雪白舒向金玉淵海卿雲黼黻河漢視若遊塵遇同土梗莫肯費其半菽罕有落其一毛若衡重錙銖纊微彯撇雖共工之搜慝歡兜之掩義南荆之跋扈東陵之巨猾皆為匍匐逶迤折枝舐痔金膏翠羽將其意脂韋便辟導其誠故輪蓋所遊必非夷惠之室苞苴所入實行張霍之家謀而後動毫芒寡忒是曰量交其流五也凡斯五交義同賈粥桓談譬之於闤闠林回諭之於甘醴夫寒暑遞進盛衰相襲或前榮而後悴或始富而終窮或初存而末亡或古約而今泰循環翻覆汛若波瀾此則徇利之情未嘗異變化之道不得一由是觀之張陳所以凶終蕭朱所以隙末斷焉可知也而翟公方規然勒門以針客何所見之晚乎因此五交是生三釁敗德殄義禽獸相若一釁也難固易攜讎訟所聚二釁也名陷叨餐貞介所羞三釁也古人知三釁之為梗懼五交之速尤故王丹威子以檟楚朱穆昌言而示絶有旨哉近世有樂安任昉海內髦傑早綰銀黃夙昭民譽遒文麗藻方駕曹王英特俊邁聨橫許郭類田文之愛客同鄭莊之好賢見一善則盱衡扼腕遇一才則揚眉抵掌雌黃出其脣吻朱紫由其月旦於是冠蓋輻輳衣裳雲合輜軿擊轊坐客恆滿蹈其閫閾若升闕里之堂入其奧隅謂登龍門之阪至於顧盻增其倍價翦拂使其長鳴彯組雲臺者摩肩趨走丹墀者疊迹莫不締恩狎結綢繆想莊惠之清塵庶羊左之徽烈及瞑目東粵歸骸洛浦繐帳猶懸門罕漬酒之彥墳未宿草野絶動輪之賓藐爾諸孤朝不謀夕流離大海之南寄命瘴癘之地自昔把臂之英金蘭之友曾無羊舌下泣之仁寧慕郈成分宅之德鳴呼世路嶮巇一至於此太行孟門豈曰嶄絶是以耿介之士疾其若斯裂裳裹足棄之長騖獨立髙山之頂歡與麋鹿同羣皎皎然絶其氛濁誠恥之也誠畏之也昉不事生産既卒諸子不能自振生平舊交莫有收恤次子西華冬月著葛帔練裙道逢劉孝標泫然矜之曰我當為卿作計乃著此論彭城到溉故與昉為山澤遊見其論抵之地終身恨之按史稱昉有盛名遊其門者昉必推薦裴子野於昉為從中表獨不至昉亦恨焉故不之善觀此則到溉輩固為負心而昉於取士之道亦未盡也神思篇劉協古人云形在江海之上心存魏闕之下神思之謂也文之思也其神逺矣故寂然凝慮思接千載悄焉動容貌通萬里吟詠之間吐納珠玉之聲眉睫之前卷舒風雲之色其思理之致乎故思理為妙神與物遊神居胸臆而志氣統其關鍵物沿耳目而辭令管其樞機樞機方通則物無隱貌關鍵將塞則神有遁心是以陶鈞文思貴在虛靜疏瀹五藏澡雪精神積學以儲寶酌理以富才研閲以窮照馴致以懌辭然後使玄解之宰尋聲律而定墨獨照之匠窺意象而運斤此蓋馭文之首術謀篇之大端夫神思方運萬塗競萌規矩虛位刻鏤無形登山則情滿於山觀海則意溢於海我才之多少將與風雲而並驅矣方其搦翰氣倍辭前暨乎篇成半折心始何則意翻空而易竒言徴實而難巧也是以意授於思言授於意密則無際疏則千里或理在方寸而求之域表或義在咫尺而思隔山河是以秉心養術無務苦慮含章司契不必勞情也人之稟才遲速異分文之制禮大小殊功相如含筆而腐毫楊雄輟翰而驚夢桓談疾感於苦思王充氣竭於思慮張衡研京以十年左思練都以一紀雖有巨文亦思之緩也淮南崇朝而賦騷枚皋應詔而成賦子建援牘如口誦仲宣舉筆似宿構阮瑀據案而制書禰衡當食而草奏雖有短篇亦思之速也若夫駿發之士心總要術敏在慮前應機立斷覃思之人情饒岐路鑒在疑後研慮方定機敏故造次而成功慮疑故愈久而致績難易雖殊並資博練若學淺而空遲才疏而徒速以斯成器未之前聞是以臨篇綴慮必有二患理鬱者苦貧辭溺者傷亂然則博聞為饋貧之糧貫一為拯亂之藥博而能一亦有助乎心力矣若情數詭雜體變遷貿拙辭或孕於巧義庸事或萌於新意視布於麻雖云未費杼軸獻功煥然乃珍至於思表纖旨文外曲致言所不追筆固知止至精而後闡其妙至變而後通其數伊摯不能言鼎輪扁不能語斤其微矣乎黃文節與王觀復書與此相駁而實相發選在委編中可以互觀風骨篇劉協詩總六義風冠其首斯乃化感之本源志氣之符契也是以怊悵述情必始乎風沉吟鋪辭莫先於骨故辭之待骨如體之樹骸情之含風猶形之包氣結言端直則文骨成焉意氣駿爽則文風清焉若豐藻克贍風骨不飛則振采失鮮負聲無力是以綴慮裁篇務盈守氣剛健既實輝光乃新其為文用譬征鳥之使翼也故練於骨者析辭必精深乎風者述情必顯捶朵字堅而難移結響凝而不滯此風骨之力也若瘠義肥辭繁雜失統則無骨之徴也思不環周索莫乏氣則無風之驗也昔潘朂錫魏思摹經典羣才韜筆乃其骨髓峻也相如賦仙氣號凌雲蔚為辭宗乃其風力遒也能鑒斯要可以定文茲術或運無務繁采故魏文稱文以氣為主氣之清濁有體不可力強而致故其論孔融則云體氣髙妙論徐幹則云時有齊氣論劉楨則云時有逸氣公幹亦云孔氏卓卓信含異氣筆墨之性殆不可勝並重氣之旨也夫翬輝翟備色翾諼翥百步肌豐而力沉也鷹隼筍乏采翰飛戾天骨徑而氣猛也文章才力有似於此若風骨乏采則鷙集翰林采乏風骨則雉竄文囿唯藻耀而髙翔固文筆之鳴鳯也若夫鎔鑄經典之範翔集子史之術洞曉情變曲昭文體然後能孚甲新意雕畫竒辭昭體故意新而不亂曉變故辭竒而不黷若骨采未圓風辭未練而跨略舊規馳騖新作雖獲巧意危敗亦多豈空結竒字紕繆而成輕矣周書云辭尚體要弗惟好異蓋防文濫也然文術多門各適所好明者弗授學者弗師於是習華隨侈流遁忘反若能確乎正式使文明以健則風清骨峻篇體光華能研諸慮何逺之有哉楊升菴評左氏論女色曰美而艷美猶骨也艷猶風也文章風骨兼全如女色之美艷兩致矣又云此論發自劉子前無古人徐季海移以評書張彥逺移以評畫同此理也又云引文明以健尤切明即風也健即骨也詩有格調格猶骨也調猶風也情采篇劉協聖賢書辭總稱文章非采而何夫水性虛而淪漪結木體實而花萼振文附質也虎豹無文則鞹同犬羊犀兕有皮而色資丹漆質待文也若乃綜述性靈敷寫器象鏤心鳥迹之中織辭魚網之上其為彪炳縟采名矣故立文之道其理有三一曰形文五色是也二曰聲文五音是也三曰情文五性是也五色雜而成黼黻五音比而成韶夏五情發而為辭章神理之數也孝經垂典喪言不文故知君子嘗言未嘗質也老子疾偽故稱美言不信而五千精妙則非棄美矣莊周云辨雕萬物謂藻飾也韓非云豔采辨説謂綺麗也綺麗以豔説藻飾以辨雕文辭之變於斯極矣研味孝老則知文質附乎性情詳覽莊韓則見華實過乎淫侈若擇源於涇渭之流按轡於邪正之路亦可以馭文采矣夫鉛黛所以飾容而盻倩生於淑姿文采所以飾言而辨麗本於情性故情者文之經辭者理之緯經正而後緯成理定而後辭暢此立文之本源也昔詩人什篇為情而造文辭人賦頌為文而造情何以明其然蓋風雅之興志思蓄憤而吟咏情性以諷其上此為情而造文也諸子之徒心非鬱陶茍馳夸飾鬻聲釣世此為文而造情也故為情者要約而寫真為文者淫麗而煩濫而後之作者採濫忽真逺棄風雅近師辭賦故體情之製日疏逐文之篇愈盛故有志深軒冕而泛咏皋壤心纒幾務而虛述人外真宰弗存翩其反矣夫桃李不言而成蹊有實存也男子樹蘭而不芳無其情也夫以草木之微依情待實況乎文章述志為本言與志反文豈足徴是以聨辭結采將欲明經采濫辭詭則心理愈翳固知翠綸桂餌反所以失魚言隱榮華始謂此也是以衣錦褧衣惡文太章賁象窮白貴乎反本夫能設模以位理擬地以置心心定而後結音理正而後摛藻使文不滅質博不溺心正采耀乎朱藍間色屏於紅紫乃可謂雕琢其章彬彬君子矣升菴評豫嘗戲云美人未嘗不粉黛粉黛未必皆美人竒才未嘗不讀書讀書未必皆竒才又云屈原楚詞有疾而呻吟也東方朔以下擬楚詞強呻吟而無疾痛者也夸飾篇劉協夫形而上者謂之道形而下者謂之器神道難摹精言不能追其極形器易寫壯辭可得喻其真才非短長理自難易耳故自天地以降豫入聲貌文辭所被夸飾恆存雖詩書雅言風格訓世事必宜廣文亦過焉是以言峻則嵩髙極天論狹則河不容舠説多則子孫千億稱少則民靡孑遺襄陵舉滔天之目倒戈立漂杵之論辭雖己甚其義無害也且夫梟音之醜豈有泮林而變好荼味之苦寧以周原而成飴並意深褒讚故義成矯飾大聖所録以垂憲章孟軻所云説詩者不以文害辭不以辭害意也自宋玉景差夸飾始盛相如憑風詭濫愈甚故上林之館奔星與宛虹入軒從禽之盛飛廉與鷦鷯俱獲及楊雄甘泉酌其餘波語瓌竒則假珍於玉樹言峻極則顛墜於鬼神至東都之比目西京之海若驗理則理無不驗窮飾則飾猶未窮矣又子雲校獵鞭宓妃以餉屈原張衡羽獵困玄冥於朔野孌彼洛神既非蝄蜽惟此水怪亦非魑魅而虛用濫形不其疏乎此欲夸其威而其事義暌剌也至如氣貌山海體勢宫殿嵯峨揭業熠耀焜煌之狀光采煒煒而欲然聲貌岌岌其將動矣莫不因夸以成狀沿飾而得竒也於是後進之才奬氣挾聲軒翥而欲奮飛騰躑而羞局步辭入煒燁春藻不能程其豔言在萎絶寒谷未足成其凋談歡則字與笑並論戚則聲共泣偕信可以發藴而飛滯披瞽而駭聾矣然飾窮其要則心聲鋒起夸過其理則名實兩乖若能酌詩書之曠旨翦揚馬之甚泰使夸而有節飾而不誣亦可謂之懿也鷦鷯本賦作焦明物色篇劉協春秋代序陰陽慘舒物色之動心亦搖焉蓋陽氣萌而玄駒步陰律凝而丹鳥羞微蟲猶或入感四時之動物深矣若夫圭璋挺其惠心英華秀其清氣物色相召人誰獲安是以獻嵗發春悅豫之情暢滔滔孟夏鬱陶之心凝天髙氣清陰沈之志逺霰雪無垠矜肅之慮深嵗有其物物有其容情以物遷辭以情發一葉且或迎意蟲聲有足引心況清風與明月同夜白日與春林共朝哉是以詩人感物聨類不窮流連萬象之際沈吟視聽之區寫氣圖貌既隨物以宛轉屬采附聲亦與心而徘徊故灼灼狀桃花之鮮依依盡楊栁之貌杲杲為出日之容瀌瀌擬雨雪之狀喈喈逐黃鳥之聲喓喓學草蟲之韻皎日嘒星一言窮理參差沃若兩字連形並以少總多情貌無遺矣雖復思經千載將何易奪及離騷代興觸類而長物貌難盡故重沓舒狀於是嵯峨之類聚葳蕤之羣積矣及長卿之徒詭勢瓌聲模山範水字必魚貫所謂詩人麗則而約言辭人麗淫而繁句也至如雅詠棠華或黃或白騷述秋蘭緑葉紫莖凡摛表五色貴在時見若青黃屢出則繁而不珍自近代以來文貴則似窺情風景之上鑽貌草木之中吟詠所發志惟深逺體物為妙功在密附故巧言切狀如印之印泥不加雕削而曲寫毫芥故能瞻言而見貌印字而知時也然物有恆姿而思無定檢或率爾造極或精思愈疏且詩騷所標並據要害故後進鋭筆怯於爭鋒莫不因方以借巧即勢以會竒善於適要則雖舊彌新矣是以四序紛回而入興貴間物色雖繁而析辭尚簡使味飄飄而輕舉情曄曄而更新古來辭人異代接武莫不參伍以相變因革以為功物色盡而情有餘者曉會通也若乃山林皋壤實文思之奧府略語則闕詳説則繁然屈平所以能洞監風騷之情者抑亦江山之助乎贊曰山沓水匝樹雜雲合目既往還心亦吐納春日遲遲秋風颯颯情往似贈興來如答協字彥和東管筥人早孤篤志好學家貧不婚娶依沙門僧祐居遂博通經論天監中兼東宫通事舍人兼步兵校尉深被昭明太子禮接初協撰文心雕龍五十篇未為時論所稱欲取定於沈約乃負書候約於車前狀若貨鬻約取讀大重之謂深得文理協為文長於佛理都下寺塔及名僧碑志必請協製文後求出家勑許之名慧地云家訓論文章顔之推夫文章者原出五經詔命策檄生於書者也序述論議生於易者也歌詠賦頌生於詩者也祭祀哀誄生於禮者也書奏針銘生於春秋者也朝廷憲章軍旅誓誥敷顯仁義發明功德牧民建國施用多途至於陶冶性靈從容諷諫入其滋味亦樂事也行有餘力則可習之然而自古文人多陷輕薄屈原露才揚己顯暴君過宋玉體貌容冶見遇俳優東方曼倩滑稽不雅司馬長卿竊資無操王褒過章僮約楊雄德敗美新李陵降辱夷虜劉歆反覆莽世傅毅黨附權門班固盜竊父史趙元叔抗竦過度馮敬通浮華擯壓馬季長佞媚獲誚蔡伯喈同惡受誅吳質詆訶鄉里曹植悖慢犯法杜篤乞假無厭路粹隘狹已甚陳琳實號粗疏繁欽性無檢格劉禎屈強輸作王粲率躁見嫌孔融禰衡誕傲致殞楊修丁廙扇動取斃阮籍無禮敗俗嵇康凌物凶終傅玄忿鬬免官孫楚矜誇凌上陸機犯順履險潘嶽乾沒取危顔延年負氣摧黜謝靈運空疏亂紀王元長凶賊自貽謝玄暉悔慢見及凡此諸人皆其翹秀者不能悉紀大較如此至於帝王亦或未免自昔天子而有才華者惟漢武魏太祖文帝明帝宋孝武帝皆負世議非懿德之君也自子遊子夏荀況孟軻枚乘賈誼蘇武張衡左思之儔有盛名而免過患者時復聞之但其損敗居多耳每嘗思之原其所積文章之體標舉興會發引性靈使人矜伐故忽於持操果於進取今世文士此患彌切一事愜當一句清巧神厲九霄志凌千載自吟自賞不覺更有傍人加以砂礫所傷慘於矛戟諷刺之禍速乎風塵深宜防慮以保元吉此篇為一種無行文人針砭膏肓大有禆益但人品難齊有托之狂簡而不屑修飾者有偏於剛介而動與禍會者如屈宋東方司馬嵇阮孔謝之徒皆賢者也今槩以為輕薄而譏之可謂莨莠不分者矣按之推字介初為梁湘東王參軍飲酒任縱時論少之既為世子方諸掌管記遇侯景陷郢州屢欲殺之遇救得免江陵敗入周為李逺書翰出奔齊文宣悅之以為中書舍人崔季舒等諫之推取急還宅故不連署得免遷黃門侍郎齊亡入周為御史上士隋開皇中太子召為文學尋卒詳之推生平不知於古文士中當屬何等也勞生論慮思道莊子曰大塊勞我以生誠哉斯言也余年五十羸老云至追惟疇昔勤矣厥生乃著茲論因言時云爾罷郡屏居有客造余者少選之頃盱衡而言曰生者天地之大德人者有生之最靈所以作配兩儀稱貴羣品妍蚩愚智之辨天壤懸隔行己立身之異入海登山今吾子生於右地九葉卿族天授俊才萬夫所仰學綜流略慕孔門之遊夏辭窮麗則擬漢日之卿雲行藏有節進退以禮不諂不驕無愠無懌偃仰貴賤之間從容語默之際何其裕也下走所欣羡馬余莞爾而笑曰未之思乎何所言之過也子其清耳請為左右陳之夫人之生也皆未若無生在余之生勞亦勤止紈綺之年伏膺教義規行矩步從善而登巾冠之後濯纓受署韁鎖仁義籠絆朝市失翹陸之本性喪江湖之逺情淪此風波溺於倒躓憂勞總至事非一緒何則地胄髙華既致嫌於管庫才識美茂亦受嫉於愚庸篤學強記聾瞽於焉側目清心河瀉木訥所以疚心豈徒蠱惜春漿鴟吝腐鼠相江都而永歎傅長沙而不歸固亦魯值臧倉楚逢靳尚趙一為之哀歌張升於是慟哭有齊之季不遇休明申脰就鞅屏迹無地段圭張讓金貝是視賈謐郭淮腥臊可饜淫刑以逞禍近池魚耳聽惡來之讒足踐龍逢之血周氏末葉仍值僻王斂笏升階汗流浹背莒客之踵躋焦原匹茲非險齊人之手執馬尾方此未危若乃羊腸句注之道據鞍振策武落雞田之外櫛風沐雨三旬九食不敢稱弊此之為役蓋其小小者耳今泰運肇開四門以穆冕旒司契於上夔龍佐命於下岐伯善卷恥徇幽憂由隨務光悔從木石余年在秋方已迫知命情禮宜退不獲晏安一葉從風無損鄧林之攢植雙鳬退飛不虧渤澥之遊泳耕田鑿井晚息晨興候南山之朝雲攬北堂之明月汜勝九穀之書觀其節制崔實四人之令奉以周旋晨荷蓑笠白屋黃冠之伍夕談穀稼霑體塗足之倫濁酒盈樽髙歌滿席恍兮惚兮天地一指此野人之樂也子或以是羡余乎客曰吾子之事既聞之矣他人有心又請論其梗槩余答曰雲飛泥沉卑髙異等圓行方止動息殊致是以摩霄運海輕罻羅於藪澤五衢四照忽斤斧於山林余晚值昌辰遂其弱尚觀人事之隕穫覩時路之邅危玄冬修夜靜言長想可以纍歎悼心流涕酸鼻人之百年脆促已甚奔駒流電不可為辭顧慕周章數紀之內窮通榮辱事無足道而有識者鮮無識者多褊溢凡近輕險躁薄居家則人面獸心不孝不義出門則諂諛讒佞無愧無恥退身知足忘伯陽之炯戒陳力就列棄周任之格言悠悠逺古斯患已積迄於近代此蠧尤深范卿撝謙之風搢紳不嗣夏書昏墊之罪執政所安朝露未晞小車盈董石之巷夕陽且落皂蓋填閻竇之里皆如脂如韋俯僂匍匐噉惡求媚舐痔自親美言諂笑好其愈樂詐泣佞哀恤其喪紀近通旨酒逺貢文蛇艷姬美女委如脫屣金銑玉華棄同遺迹及鄧通失路一簪之賄無餘梁冀就誅五侯之貴將起向之求官買職晚謁晨趨刺促望塵之舊遊伊優上堂之夜客始則亡魂褫魄若牛兄之遇獸心戰色沮似葉公之見龍俄而抵掌揚眉髙視闊步結侣棄廉公之第攜手哭聖卿之門華轂生塵來如激矢雀羅暫設去等絶絃飴蜜非甘山川未阻千變萬化鬼出神入為此者皆衣冠士族或有藝能不恥不仁不畏不義靡愧友朋莫慙妻子外呈厚貌內藴百心繇是則紆青佩紫牧州典郡冠幘劫人厚自封殖妍歌妙舞列鼎撞鐘耳倦絲桐口飫珍旨雖素論以為非而時宰之不責末俗蚩蚩如此之弊余則違時薄官屏息窮居甚恥驅馳深畏乾沒心若死灰不營勢利家無儋石不費囊錢偶影聨官將數十載駑拙致笑輕生所以告勞也真人御宇斫雕為朴人知榮辱時反雍熙風力上宰內敷文教方邵重臣外揚武節被之大道洽以淳風舉必以才爵無濫授稟斯首鼠不預衣簪阿黨比周掃地俱盡輕薄之儔滅影竄迹礫石變成瑜瑾莨莠化為芝蘭曩之扇俗攪時駭耳穢目今悉不聞不見莫余敢侮易曰聖人作而萬物覩斯之謂乎北史言思道不持操行故宦途淪滯唐張燕公撰碑文稱其更臣三代易官十七再降一免二去職八平除遷擢者四而已又言其臨難無懾在黜無愠休明有賔禮之盛顛覆無淪胥之禍雖其玄孫所請未為實録然如此時代如此歷官如此持論不持操行之目吾亦未之敢信也唐人文字以世為代以民為人以虎為獸以治為理以淵為泉皆避諱故也前人文經其傳寫亦多改就此篇如牛兄之遇獸是已讀者須詳之三國論王勃論曰漢自順桓之間國統屢絶姧回竊位閹宦滿朝士之蹈忠義履冰霜者居顯列則陷犯忤之誅伏閭巷則嬰黨錮之戮當是時也天下之君子掃地將盡雖九伊周十稷契不能振已絶之綱舉土崩之勢明矣嘉平中大黃星見楚宋之分遼東殷馗曰其有真人起於譙沛之間以知曹孟德不為人下事之明驗也先時秦帝東遊亦云金陵當有王者興董扶求出又曰益州有天子氣從茲而言則長江劍閣作吳蜀之限天道人謀有三分之兆其來尚矣然廢興有際崇替遞來每攬其書曷能不臨卷而永懷撫事而伊鬱也嘗試論之曰向令何進納公業之言而不追董卓催汜棄文和之策而不報王允則東京焚如之禍關右亂麻之尸何由而興哉至使乘輿蒙塵於河上天子露宿於曹陽百官飢死於牆壁六宫流離於道路蓋由何公之不明賈詡之言過也於是劉岱喬瑁張超孔胄之徒舉義兵而天下響應英雄者騁其驍悍運其謀能海內囂然於茲大亂矣袁本初據四州之地南向爭衡劉景升擁十萬之師坐觀成敗區區公路欲居列郡之尊瑣瑣伯圭謂保易京之業瓚既窘斃術亦憂終談尚離心琮琦失守其故何哉有大賢而不能用覩長策而不能施便謂力濟九區智周萬物天下可指麾而定宇宙可大呼而致也嗚呼悲夫余觀三國之君咸能推誠樂士忍垢藏疾從善如不及聞諫如轉規其割裂山河鼎足而王宜哉孫仲謀承父兄之餘事委瑜肅之良圖泣周秦之痍請吕蒙之命惜休穆之才不加其罪賢子布之諫而造其門用能南開交趾驅五嶺之卒東界海隅兼百越之衆地方五千里帶甲數十萬若令登不早卒休以永年神器不移於暴酷則彭蠡衡陽未可圖也以先主之寬仁得衆張飛關羽萬人之敵諸葛孔明管樂之儔左提右挈以取天下庶幾有濟矣然而喪師失律敗不旋踵奔波謙瓚之間羈旅袁曹之手豈出於用武將遇非常敵乎初備之南也樊鄧之士其從如雲比到當陽衆十萬餘操以五千之卒及長坂縱兵大擊廓然霧散脫身奔走方欲逺竄用魯肅之謀然殺身夏口於時諸葛適在軍中向令帷幄有謀軍容肅練包左車之計運田單之竒操懸軍數千夜行三百輜重不相繼聲援不相聞可不一戰而擒也坐以十萬之衆而無一矢之備何異驅犬羊之羣餌豺虎之口固知應變將略非武侯所長斯言近矣周瑜方嚴兵取蜀會物故於巴丘若其人尚存恐玉壘銅梁非劉氏有也然備數困敗而意不折終能大啓西土者其惟雅度最優乎武侯既殁劉禪舉而棄之睹譙周之懦詞甘忿憤而忘食聞薑維之立事又慷慨而言喜惜其功垂成而智不濟豈伊時喪抑亦人亡乃知德之不修棧道靈關不足恃也魏武用兵髣佛孫吳臨敵制竒鮮有喪敗故能東擒狡布北走強袁破黃巾於夀張斬眭固於射犬援戈北指踏頓懸顱擁斾南臨劉琮束手振威烈而清中夏挾天子以令諸侯信超然之雄傑矣而弊於褊刻失於猜詐孔融荀彧終罹其災孝先季圭卒不能免愚知操之不懷柔巴蜀砥定東南必然之理也文帝富於春秋光膺禪讓臨朝恭儉博覽墳籍文質彬彬庶幾君子者矣不能恢崇萬代之業利建七百之基骨肉齊於匹夫衡樞委乎他姓逺求珠翠廢禮諒暗之中近抱辛毗取笑婦人之口明帝嗣位繼以奢淫征夫困於兵革人力殫於臺榭髙貴鄉公明決有餘而深沉不足其雄才大略經緯逺圖求之數君並無取焉山陽公之墳土未乾陳留王之賔館已啓天之報施何其速哉故粗而論之式備勸戒俾夫來者有以疾諸者焉史通斷限篇劉知幾夫書之立約其來尚矣如尼父之定虞書也以舜為始而云粵若稽古帝堯丘明之傳魯史也以隱為先而云惠公元妃孟子此皆正其疆里開其首端因有沿革遂相交互事勢當然非為濫軼也過此以往可謂狂簡不知所裁者焉又子曰不在其位不謀其政若漢書之立表志其殆侵官離局者乎考其濫觴所出起乎司馬氏按馬記以史制名班書持漢標目史記者載數千年之事無所不容漢書者紀十二帝之時有限斯極固既分遷之記判其去取紀傳所存惟留漢目表志所録乃盡犧年舉一反三豈其若是膠柱調瑟不亦繆歟但固之踳駁既往不諫而後之作者咸習其途宋史則上括魏朝隋書則仰包梁代求其所書之事得什一於千百一成其例莫之敢移永言其理可為歎息當魏武乘時撥亂電掃羣雄鋒鏑之所交網羅之所及者蓋惟二袁劉吕而己若進鴆行弒燃臍就戮總關王室不涉霸圖而陳夀國志引居傳首夫漢之有董卓猶秦之有趙髙昔車令之誅既不列漢史何太師之斃遂獨刋於魏書乎兼復臧洪陶謙劉虞孫讚生於季末自相吞噬其於曹氏也非唯理異犬牙固亦事同風馬漢典所具而魏册仍編豈非流宕忘歸迷而不悟者也亦有一代之史上下相交若已見他記則無宜重述故子嬰降沛其詳取驗於秦紀伯符死漢其事斷入於吳書沈録金行上羈劉主魏刋水運下列髙王惟蜀與齊各有國史越次而載孰曰攸宜自五胡稱制四海殊宅江左既承正朔斥彼魏胡故氐羌有録索虜成傳魏本出於雜種竊亦自號真君其史黨附本朝思欲凌駕前作遂乃南籠典午北吞諸偽比於羣盜盡入傳中但當有晉元明之時中原秦趙之代元氏膜拜稽首自同臣妾而反列之於傳何厚顔之甚邪又張李諸姓據有涼蜀其於魏也校年則前後不接論地則參商有殊何預魏氏而橫加編載夫尚書者七經之冠冕百氏之襟袖凡學者必先精此書次覽羣籍譬夫行不由徑非所聞焉修國史者若旁採異聞用成博物斯則可矣如班書地理志首遂全寫禹貢一篇降為後書持續前史蓋以水濟水牀上施牀徒有其煩竟無其用豈非惑乎音春秋諸國賦詩見意左氏所載惟録其章名如地理為書論自古風俗至於夏世宜云禹貢已詳何必重述古文益其辭費也若夷狄本係種落所興北貊起自淳維南蠻出於槃瓠髙句麗以鱉橋獲濟吐谷渾因馬鬬徙居諸如此説者求之歷代何書不有而作之者曾不知前撰已著而後修宜輟遂乃百世相傳一字無改蓋駢枝在手不加力於千鈞附贅居身非廣形於七尺為史之體有若於斯茍濫引他事豐其部帙以此稱博異乎吾黨之所聞陸士衡有云雖有愛而必捐善哉斯言可謂達作者之致矣夫能明彼斷限定其折中歷選自古惟蕭子顯近諸然必謂都無其纍則吾未之許也低碁戀子劣文多愛天下事皆然不獨史也史通載文篇劉知幾夫觀乎人文以化成天下觀乎國風以察興亡是知文之為用逺矣大矣若乃宣僖善政其美載於周詩懷襄不道其惡存於楚賦讀者不以吉甫奚斯為諂屈平宋玉為謗者何也蓋不虛美不隱惡故也是則文之將史其流一焉固可以方駕南董俱稱良直矣爰洎中葉文體大變樹理者多以詭妄為本飾辭者務以淫麗為宗譬以女工之有綺縠音樂之有鄭衛蓋語曰不作無益害有益至如史氏所書固當以正為主是以虞帝思理夏后失御尚書載其元首禽荒之歌鄭莊至孝晉獻不明春秋録其大隧狐裘之什其理讜而切其文簡而要足以懲惡勸善觀風察俗者矣若馬卿之子虛上林揚雄之甘泉羽獵班固兩都馬融廣成喻過其體詞沒其義繁華而失實流宕而忘返無裨勸奬有長姧詐而前後史漢皆書諸列傳不其謬乎且漢代詞賦雖云虛矯自餘他文大抵猶實至於魏晉已下則偽繆雷同榷而論之其失有五一曰虛設二曰厚顔三曰假手四曰自戾五曰一槩何者昔大道為公以能而授故堯咨爾舜舜以命禹自曹馬已降其取之也則不然若乃上出禪書下陳讓表其間勸進殷勤敦諭重沓迹實同於莽卓言乃類於虞夏且始自納陛迄於登壇彤弓盧矢新君膺九命之錫白馬侯服舊主蒙三恪之禮徒有其文竟無其事此所謂虛設也古者兩軍為敵二國爭雄自相稱述言無所隱何者國之得喪如日月之食焉非由飾辭矯説所能掩蔽也逮於近古則不然至如曹公歎蜀主之英略曰劉備吾儔周帝美齊宣之強盛云髙歡不死或移都以避其鋒或斫冰以防其渡及其申誥誓降移檄便稱其智昏菽麥識昧玄黃列宅建都若鷦鷯之巢葦臨戎賈勇猶螳螂之拒轍此所謂厚顔也古者國有詔命皆人主所為故漢光武時第五倫為督鑄錢椽見詔書而歎曰此聖主也一見決矣至於近古則不然凡有詔勑皆責成羣下但使朝多文士國富辭人肆其筆端何事不録是以每發璽誥下綸言申惻隱之渥恩敘憂勤之至意其君雖有返道敗德惟頑與暴觀其政令則辛癸不如讀其詔誥則勛華再出此所謂假手也蓋天子無戲言茍言之有失則取尤天下故漢光武謂龎萌可以託六尺之孤及聞其叛也乃謝百官曰諸君得無笑朕乎是知褒貶之言哲王所慎至於近古則不然凡百具僚王公卿士始有褒崇則謂其圭璋特達善無可加旋有貶黜則比斗筲下才罪不容責夫同為一士之行同取一君之言愚智生於倐忽是非變於俄頃帝心不一皇鑒無恆此所謂自戾也夫國有否泰世有汙隆作者形言本無定準故觀猗歟之頌而驗有殷方興覩魚藻之刺而知宗周將殞至於近代則不然夫談主上之聖明則君盡三五述宰相之英偉則臣皆二八國止方隅而言并吞六合福不盈眥而稱感致百靈雖人事屢改而文理無易故善之與惡其説不殊欲令觀者疇為準的此所謂一槩也於是考茲五失以尋文義雖事皆形似而言必憑虛夫鏤冰為璧不可得而用也畫地為餅不可得而食也是以行之於世則上下相蒙傳之於後則示人不信而世之作者復不之察聚彼虛説編而次之創自起居成於國史連章畢録一字無廢非復史書更成文集若乃類選衆作求其穢纍王沉魚豢是其甚焉裴子野何之元抑其次也陳夀干寶頗從簡約猶時載浮訛未盡機要惟王邵撰齊隋二史其所取也文皆詣實理多可信至於悠悠飾詞皆不之取此實得去邪從正之理損華托實之義也蓋山有木工則度之況舉世文章豈無其選但苦作者書之不讀耳至如詩有韋孟諷諫賦有趙一嫉邪篇則賈誼過秦論則班彪王命張華述針於女史張載題銘於劍閣諸葛表主以出師王昶書家以誡子劉向谷永之上疏鼂錯李固之對策荀伯子之彈文山巨源之啓事此皆言成軌則為世龜鏡求諸歷代往往而有茍書之竹帛持以不刋則其文可與三代同風其事可以五經齊列古猶今也何逺近之有哉昔夫子修春秋别是非申黜陟而賊臣逆子懼凡今之為史而載文也茍能撥浮華採真實亦可使夫雕蟲小技者聞義而知徙矣此乃禁淫之隄防持雅之管轄凡為載削者可不務乎史通一書持論多有不當處謂孔子稱昭公為愛憎由已稱顔子為不能忘私謂子長當為皋陶伊尹傳説仲山甫立傳謂蕭何不當稱韓信為賢此等皆可發笑至其摘抉瑕疵令人無可置辨真史家之爭臣也黃山谷以配文心雕龍為學者要書誠哉是言余故各採其勝列於編而雕龍深逺矣四六法海卷十
