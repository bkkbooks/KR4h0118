  text: 欽定四庫全書集部八
  hash: sha256:2ca6b36e125227017052aabb38e83ed63103fdf152cf0be95bdfb58f63de9d79
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0118_WYG_000-1a, image: WYG1394/WYG1394-0293a.png}
body:
  text: 四六法海總集類提要臣等謹案四六法海十二卷明王志堅編志堅有讀史商語已著録秦漢以來自李斯諫逐客書始點綴華詞自鄒陽獄中上梁王書始疊陳故事是駢體之漸萌也符命之作則封襌書典引問對之文則答賓戲客難駸駸乎偶句漸多沿及晉宋格律遂成流逮齊梁體裁大判由質實而趨麗藻莫知其然而然然實皆源出古文承流遞變猶四言之詩至漢而為五言至六朝而有對句至唐而遂為近體面目各别神理不殊其原本風雅則一也厥後輾轉相沿逐其末而忘其本故周武帝病其浮靡隋李諤論其佻巧唐韓愈亦齗齗有古文時文之變降而愈壞一濫于宋人之啓劄再濫于明人之表判剿襲皮毛轉相販鬻或塗飾而掩情或堆砌而傷氣或雕鏤纎巧而傷雅四六遂為作者所詬厲宋姚鉉撰唐文粹至盡黜儷偶宋祁修新書至全刪詔令而明之季年豫章之攻雲間亦以沿溯六朝相詆豈非作四六者不知與古體同源愈趨愈下有以啓議者之口乎志堅此編所録下迄于元而能上溯于魏晉如敕則托始宋武帝册文則托始宋公九錫文表則托始陸機桓溫謝靈運書則托始于魏文帝應㻛應璩陸景薛綜阮籍呂安陸雲習鑿齒序則托始陸機論則托始謝靈運大抵皆變體之初儷語散文相兼而用其齊梁以至唐人亦多敢不甚拘對偶者俾讀者知四六之文運意遣詞與古文不異于兹體深為有功至於每篇之末或箋注其本事或考證其異同或臚列其始末亦皆元元本本語有實徵非明代選本所可及據其凡例雖為舉業而作實則四六之源流正變具于是篇矣未可以書肆刋本忽之也乾隆四十二年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書集部八四六法海目録總集類卷一敕詔册文赦文制手書德音令教䇿問卷二表上卷三表中卷四表下卷五章劄子狀彈事箋啓上卷六啓下卷七書上卷八書下頌移文檄卷八露布牒詩文序卷十宴集序贈別序城山序記史論論卷十一碑文志銘卷十二行狀銘贊七連珠志哀册文弔祭文判雜著四六法海原序魏晉以來始有四六之文然其體猶未純渡江而後日趨繢藻休文出漸以聲韻約束之至蕭氏兄弟徐庾父子而斯道始盛唐文皇以神武定天下在宥三十餘年而文體一遵陳隋蓋時未可變耳永徽中人主優禮詞臣時則有燕許鴻軒崔李豹别而英公一檄竟出自草澤手當時人才何其盛歟至於沿習既久遂成蹊徑文移批答賔主談諧輒用耦語此亦天地間不得不變之勢矣然昌黎文初出即裴晉公亦駭而弗許蓋習尚之漸人也如此河東之為文則異於是壺子時見杜權粳粃猶為堯舜吾師乎吾師乎宋之四六各有源流譜派袁清容自言能一一辨之今此諸集已不能盡致撮其大要藏曲折於排蕩之中者眉山也標精理於簡嚴之內者金陵也是皆唐人所未有其他不出兩公範圍然類能自暢其所欲言低昂絢素各成倫理有足喜者大抵四六與詩相似唐以前作者韻動聲中神流象外自宋而後必求議論之工證據之確所以去古漸遠然矩矱森然差可循習至其末流乃有諢語如優俚語如市媚語如倡祝語如巫或強用硬語或多用助語直用成語而不切疊用冗語而不裁四六至此直是魔罥所當亟為澄汰不留一字者也是編始於乙丑之秋成於丙寅之冬初題曰耦編今年春友人張德仲加以編輯梓行之仍改為法海法取軌持海喻廣大夫欲泛藻海之波而飭詞壇之法則此編亦嚆矢也哉天啓七年暮春日珠塢山農王志堅題四六法海凡例近來書刻全不讎較豈惟不較又從而妄改焉聽然之為聽然捭闔之為押闔操觚家遂沿習不改凡如此類笑端不一又其甚者厭舂容大篇而以意刪之獨不日鶴脛雖長斷之則悲乎是編以文選藝文類聚文苑英華唐文粹宋文鑑文章正宗元文類荆川文編廣續二文選為主而參之以諸家集及正史野史所載凡一切訛謬相仍之書槩不因襲有所訂正間為别白聊自附於諍友云爾知人論世分眀拈出千古讀書要旨吾輩讀前人著作于其生平顛末茫然不知當必有夷猶不自快者至文中用語或有所指如貢甫李代桃僵厚之橫水眀光之句若不知其繇竟作何理會是編于作者略為考究表其梗槩惟一代顯人灼然耳目者不贅及時事與文相關者亦載諸篇末志傳之文與正史野史異者聊出鄙意折衷之自惟􅍁啓多所不詳若夫潤澤以俟君于是編雖自為一書然大抵為舉業而作故入選寧約無濫凡文體題目不甚相遠者但存其尤餘不得不忍情割愛惟是俗學相傳有一種議論謂無用之書不必讀無用之文不必看果爾則腐爛後場之外皆可束髙閣乎不知今人所規摹之程墨皆從古人陶鑄而出熟讀古人書不知有幾許程墨在也夫棄阡陌而守囷倉已為愚矣棄囷倉而守釜甑棄釜甑而守殘杯冷炙不亦愚之愚哉凡吾同志當相與力破此惑文章趨尚大抵時運使然質文損益自相乘除非必後人之勝於前人也韓栁不輕王駱歐蘇不輕楊劉豈惟厚道直是虛心讀詩未有劉長卿一句己呼阮籍為老兵則皇甫氏己痛心而嫉之矣或云文人相輕余謂但恐未是文人耳若是文人見得古人真處方將低回玩味之不暇况敢相輕乎不佞生而少文不敢闌入詞場然于相輕之習深覺其無味是編務在兼收雖經名家掊擊如所謂元無文者不廢摉採惟應酬濫套之文槩置不録真氏正宗于宵人著作多不入選或細書附載以示排抑此一段藝林斧鉞凜然不可干矣不佞謭劣固不敢當此任間嘗思惟古之宵人往往胸有武庫筆有湧泉後之自命為正人者試與筆舌相當不知還有愧否夫桑間埒于二南秦誓嗣乎周典政不必斤斤分别而亦何嘗不分别乎不獨此也法車大智同為紙上之塵竒章贊皇並飽篋中之蠧推此類言之因果自為輪旋是非竟在何處此不佞編集微旨也拈出商之蕭氏文選槩標作者之字真氏正宗則稱號稱諡極為雅馴但年代既遙人數亦雜若用往例則初學之士有杳然不知為何許人者今一槩稱名而考其字號官諡附于篇末惟帝王稍别其稱亦尊尊之體然也騷賦及詩于舉業不甚切用兹槩未入竊自附於闕如之義
