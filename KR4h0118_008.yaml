body:
  text: 四六法海卷八明王志堅編與徐陵薦方圓書周𢎞讓吾荷朝恩得安丘壑身名兩泰夫復奚言但願沐浴堯風遨遊舜日安服飽食以送餘齒然性靈未能灰弭其間復須友生言晤後來英俊並出方為時生林谷之中鮮逢退逸惟趙郡方圓栖遲天目年過強仕不慕時榮文史足用學藝優敏中歲暫遊宛洛蒙弟識異其人方儲之胤衣冠未絶雅奉間逸得性丘林與吾朋遊積有年嵗今復同在巖壑畢志風雲琴按清商詩題空谷比幽貞道缺考槃絶詠賁五履二兩爻無聞方今公旦作輔億兆攸賴激貪懲競儻自圓起弟以摉揚佐世水鏡求賢脫能登此仄陋綸言是屬翹弓逺賁則山谷咸勸足令廉風復振懦夫能立豈不𢎞哉圓若蒙此旌招未必不鑿壞而達於廊廟之用脫不能賁然來思而於退讓之道於斯為貴恐弟未究東川人士聊復起豫今言吾家上宰之貴無以微裨萬一此舉脫復入聽少得不負夙心周𢎞讓白𢎞讓顒之族孫與兄𢎞正弟𢎞直號三周始仕不得志隱句容茅山頻徵不出巳而為侯景中書侍郎人問其故曰吾畏死耳承聖中為國子祭酒入陳天嘉初以白衣領太常光祿大夫答王褒書周𢎞讓甚矣悲哉此之為别也雲飛泥沈金鑠蘭滅玉音不嗣瑶華莫因家兄至自鎬致書於穹谷故人之迹有如對面開題申紙流臉沾膝江南燠熱橘柚冬青渭北沍寒楊榆晚葉土風氣候各集所安餐衛適時寢興多福甚善甚善與弟分袂西陜言反東區雖保周陵還依蔣徑三薑離析二仲不歸麋鹿為曹更多悲緒丹經在握貧病莫諧芝朮可求恆為採掇昔吾壯日及弟富年俱值雍熙並歡衡泌南風雅操清商妙曲絃琴促坐無乏名晨玉瀝金華冀獲難老不虞一旦翻覆波瀾吾巳愒隂弟非茂齒禽尚之契各在天涯永念生平難為胸臆且當視隂數箭排愁破涕人生樂耳憂戚何為豈能遽悲次房逰魂不反遠産骸柩無託但願愛玉骸珍金箱保期頤享黃髮猶冀蒼鷹頳鯉時傳尺素清風朗月俱寄相思子淵子淵長為别矣握管操觚聲淚俱咽與周處士書王褒嗣宗窮途楊朱岐路征蓬長逝流水不歸舒慘殊方炎涼異節木皮春厚桂樹冬榮想攝衛惟宜動靜多豫賢兄入關敬承款曲猶依杜陵之水尚保池陽之田鏟迹幽蹊銷聲穹谷何其愈樂幸甚幸甚弟昔因多疾亟覽九仙之方晚涉世途常懷五嶽之舉同夫關令物色異人譬彼客卿服膺高士上經説道屢聽玄牝之談中藥養神每稟丹砂之説頃年事遒盡容髮衰謝藝其黃矣零落無時還念生涯繁憂總集視陰愒日猶趙孟之徂年負杖行吟同劉琨之積慘河陽北臨空思鞏縣霸陵南望還見長安所冀書生之魂來依舊壤射聲之鬼無恨他鄉白雲在天長離别矣會見之期邈無日矣援筆攬紙龍鍾橫集王褒字子淵規之子從元帝在江陵兵敗帝出降褒與王克等數十人至長安周文帝甚禮之建德以後頗參朝議凡大詔册皆令褒具草北史褒傳云初褒與周𢎞讓相善及讓兄𢎞正自陳來聘帝許褒等通親知音問褒贈𢎞正詩并書今按此書云與弟分袂西陜似𢎞讓與褒同入周者史偶不載耳褒姓名字皆同漢王褒近人刻僮約直書北史一段於後按僮約首句即云蜀郡王子淵此王褒乃琅琊人何可混也答徐陵書李那繁霜應管能響豐山之鐘玄雲觸石又動流泉之奏矧伊物候且或冥符况乃襟期相忘道術楚齊風馬吳會浮雲行李無因音塵不嗣殷御正銜命來歸嘉言纍札江南橘茂薊北桑枯隂慘陽舒行止多福足下稽山竹箭浙水明珠海內風流江南獨步扶風計吏議折祥禽平陵孝亷辨酬文豹况復麗藻星鋪雕文錦縟風雲景物義盡緣情經綸憲章辭殫表奏久以京師紙貴天下家藏調移齊右之音韻改河西之俗豈直楊雲藻翰獨留千金嗣宗文雅惟傳好事僕世傳經術才謝劉歆家有賜書學匪班嗣弱年有意頻愛雕蟲歲月三餘無忘肄業户牖之間時安筆硯嚬眉難巧學步非工恆經牧孺之譏屢被陳思之誚羞逢仲子類居山之鼓琴屢見子將同本初之車服不謂殷侯虛談成價遂同布鼓輕嚮雷門燕石空雕終慙比德楚軍雖拂實愧棲桐豈若邯鄲舉袖惟聞變曲協律飛塵必應不顧是以日南寶貝遙望歸秦合浦文犀更希還漢芳春行獻鶯其鳴矣懸豫章之床置長安之驛厚築墻垣思逢鄭僑之聘工歌周頌佇奏延陵之樂書繒有復道意無伸與徐僕射書尹義尚義尚白漳濱江涘眇若天涯去鴈歸鴻雲飛難寄瞻言鄉國泣珠淚而盈懷寢寐德音仰煙霞而疾首既而暑往寒來愁雲滿塞河氷自結非由漢后之軍草霧恆嚴寧假公超之術霜飄虎渠詎知朔野之寒雪覆龍岑徒憶清江之暖眷言疇昔邈矣遐哉係仰清顔願常豐勝雍容廊廟時宣匡泰之風偃息康莊無廢怡神之道義尚望國窮魂繁憂積歲雖其未殞豈曰生年日者謬忝後車陪遊上國曾觀禮樂見季子之知音經奉侍言嗟鄭僑之博物如軍書愈疾之製碑文妙絶之詞猶貴紙於鄴中尚傳聲於許下逮乎百六之年仍離再三之酷吉凶禮數綿歷歲時嘗膽茹辛備同艱險每冀穹蒼有感大國矜憫以禮言歸馭驛俱反何期毳毛湮淪墜灑漳濵之水逸翮摩霄輕託蓬萊之頂信知有幸無幸見生死之殊倫才與不才驗沈浮之異趣昔秦歸趙璧還得連城晉失楚材直亡其寶自國祚中絶行李不通等避世於桃源同留寓於仙嶺每占牛候馬想金陵之聖人今覩皇華知有熊之建國賔堯仕舜猶是八才緯武經文方儔四貴幸甚幸甚昔楊朱岐路悲始末之長離蘇李河梁歎平生之永别雖復音塵可嗣終隔風雲夢想時通無因覯止依依望楚寸隂有待百年將半輕生若是命也如何今車書同軌行李相繼猥荷文移通賜論及輶軒既以復命義尚未被哀矜竊以晉楚釋囚共成親好今乃拘彼來此不亦難乎夫以匹夫投分猶須坦蕩况兩國二君那宜細計彼若才如廉樂猶恐不習禁兵茍非其人留之何益然三戰三敗卒成強霸之功七縱七擒終仗天威之力由此言之彼此如耳徐元直西蜀之謀士關雲長劉氏之驍將須歸即遣知叛弗追今之與古何其異趣且二國叶和長江共有如首如尾可以同規或二或猜豈名唇齒是以隔河分歃君子知其不終衷甲尋盟春秋貶其行詐伏承聖上欽明英賢佐輔方知解網之氣用表無偏之化若彼之俘虜猶且蒙歸此之南冠何辭不遣如其茍相猜二信不由衷雖篤親鄰義尚何罪不任辛酸之念輕陳萬一之情伏願仁人少存疇昔承間之便希復開言昔張子餘年誠稱吳王之賜微躬邁影實仰含𢎞之澤載筆漣洏罔知所運與徐陵請王琳首書朱瑒竊以朝市遷貿時傳骨鯁之風厯運推移間表忠貞之迹故典午將滅徐廣為晉家遺老當塗巳謝馬孚稱魏室忠臣用能播美前書垂名後世梁故建寧公琳洛濱餘胄沂州舊族立功代邸效績中朝當離亂之辰總藩伯之任爾乃輕躬殉主以身許國實追蹤於往彥信踵武於前修而天厭梁德尚思匡救雖繼包胥之念終遘萇𢎞之眚洎王業光啓鼎祚有歸於是遠迹山東寄命河北雖經旅臣之歎猶懷客卿之禮感兹知己志此捐軀至使身沒九原頭行萬里誠復馬革裹尸遂其平生之志原野暴體全彼人臣之節然身首異處有足悲者封樹靡立良可愴焉瑒早簉末僚預參下席荷公之吐握感君之知遇是用沾巾拭袂痛可識之顔回腸疾首切猶生之面伏惟聖恩博厚明詔爰發赦王經之哭許田橫之葬瑒雖芻賤竊亦有心琳往蒞夀陽頗存遺愛曾遊江左非無舊德比肩東閣之吏繼踵西園之賔願歸元彼境還塋窀穸庶孤墳既築或飛銜土之燕豐碑式樹時留墮淚之民近故舊王維等巳有論牒仰蒙制議不遂所陳昔廉公告逝即肥川而建塋域孫叔云亡仍芍陂而植楸檟由此言之抑有前例不使夀春城下惟傳報葛之人滄洲島上獨有悲田之士昧死陳祈伏待刑憲琳字子珩元帝寵姬兄也事元帝為將元帝忌其得衆出之嶺外魏平江陵琳屯兵長沙傳檄諸方上遊諸將推為盟主陳武帝既篡梁遣兵討之反為所敗乃奉永嘉王莊為梁主齊亦遣兵為之聲援兵敗與莊同入齊齊孝昭令鎮夀陽陳將吳明徹攻之被執百姓泣而從明徹懼為變殺之傳首建康故吏朱瑒致書于陵陵啓陳主許之瑒持首還淮南瘞八公山側尋有揚州人茅智勝等密送喪柩達鄴琳輕財愛士得將士心屢經喪亂雅有忠義之節雖本圖不遂齊人以此重之隋書柳顧言傳晉王好文雅招引才學之士諸葛潁虞世南王胄朱瑒等百餘人以充學士答貞陽侯書裴之橫之橫白足下定國等至枉雅誨具高氏致送之旨即彼行人遠到京城太尉應有成命但江山敻阻未奉朝廷報辭第下國之麟趾先朝所寄藉彼鄰好義深主祀自宜單車入境端委還朝而朱斾啓行戎旌望國江東士子未達高懷僕早預簪裾夙叨眷與弦矢既暌江淮成阻青藜裁封雖斷西鳥之辭白雪在天豈無北風之歎但變故紛紛忠貞宜顯寒松負雪誠愧節者之徒徑草疾風寧忘烈士之槩齊師若反斾淮路退舍淝水彼之敬送止縉紳之徒此之奉迎則軒蓋而巳伏聽朝旨遲申展敬之橫白之橫邃之兄子侯景之亂初𨽻鄱陽王範入援範薨之橫歸元帝從王僧辨破景除吳興太守齊挾貞陽侯攻東關晉安王承制命之橫都督諸軍守蘄城殁于陳贈司空諡忠壯此書侃然直詞想見其人烈丈夫也為梁上黃侯世子與婦書庾信昔仙人導引尚刻三秋神女將梳猶期九日未有龍飛劒匣鶴别琴臺莫不銜怨而心悲聞猿而下淚人非新市何處尋家别異邯鄲那應知路想鏡中看影當不含啼欄外將花居然俱笑分杯帳裏却扇牀前故是不思何時能憶當學海神逐潮風而來往勿如織女待填河而相見一時倩筆遺婦遂有三人豈藉彼雕龍助其射雉不知此事豈可使卿有功耶上高祖請置學書沈不害臣聞立人建國莫尚於尊儒成俗化民必崇於教學故東膠西序事隆乎三代環林璧水業成於兩京自淳源既逺澆風以扇物之感人無窮人之逐物無節是知施設訓範啓導心靈譬彼染藍類諸琢玉然後人倫以正卑高有序忠孝之禮既明君臣之道攸固執禮自塞魯公所以難侮歌樂巳細鄭伯於前知亡干戚舞而有苗至泮宫成而淮夷服長想洙泗之風載懷淹稷之盛有國有家莫不尚巳梁太清季年數載否剝戎狄外侵姦回內奰朝振鼓鼙夕照烽火鴻儒碩學解散甚於坑夷五典九丘湮滅逾於灰燼蓋成均自斯墜業瞽宗於是不修褒成之詞不陳祼享釋菜之禮無稱俎豆頌聲寂寞遂逾一紀後生敦悅不見函丈之儀晚學鑽仰徒深倚席之歎陛下繼厯馭統握籙臨宇道洽寰中威加無外濁流巳清重氛載廓含生熙阜品庶咸亨宜其𢎞振禮樂建立庠序式稽古典行迹儒宮選公卿嗣子皆入於學助教博士朝夕講肄使擔簦負笈鏘鏘接袵方領矩步濟濟成林如切如磋聞詩聞禮一年可以倍功三冬於是足用故能擢秀雄州揚廷觀國入仕登朝資優學以自輔蒞官從政有經業以治身輜駕列廷青紫拾地古者王世子之貴猶與國子齒降及漢儲兹禮不墜暨乎兩晉斯事彌隆蓋所以見師嚴而道尊者也皇太子天縱生知無待審喻猶宜晦迹俯同傳經請業奠爵前師肅若舊典昔闕里之堂草萊自闢舊宅之內絲竹流音前聖遺烈深以相戒况復江表無虞海外有截豈得不開闢大猷恢𢎞至道寧可使玄教儒風弗興聖世盛德大業遂偃堯年臣末學小生詞無足算輕獻瞽言伏追竦汗沈不害字孝和吳興武康人陳天嘉初除衡陽王府記室參軍兼嘉德殿學士自梁季喪亂至是國學未立不害上書請崇建儒宫帝優詔答之太建中為光祿卿通直散騎常侍尚書左丞卒不害博綜經典而家無卷軸每製文操筆立成曾無尋檢汝南周𢎞正曰沈生可謂意聖人乎為王寬與婦義安主書伏知道昔魚嶺逢車芝田息駕雖見妖淫終成揮忽遂使家勝陽臺為歡非夢人慙蕭史相偶成仙輕扇初開欣看笑靨長睂始畫愁對離籹猶聞徙佩顧長廊之未盡尚分行幰冀迥陌之難回廣攝金屏莫令愁擁恆開錦幔速望人歸鏡臺新去應餘落粉熏爐未徙定有餘煙淚滴芳衾錦花長濕愁隨玉軫琴鶴恆驚巳覺錦水丹鱗素書稀逺玉山青鳥仙使難通綵筆試操香箋遂滿行雲可託夢想還勞九重千日詎想倡家單枕一宵便如蕩子當令照影雙來一鸞羞鏡勿使窺忩獨坐嫦娥笑人上隋高祖革文華書李諤臣聞古先哲王之化民也必變其視聽防其嗜欲塞其邪放之心示以淳和之路五教六行為訓民之本詩書禮易為道義之門故能家復孝慈人知禮讓正俗調風莫大於此其有上書獻賦制誄鐫銘皆以褒德序賢明勛證理茍非懲勸義不徒然降及後代風教漸薄魏之三祖更向文詞忽君人之大道好雕蟲之小藝下民從上有同影響爭騁文華遂成風俗江左齊梁其弊彌甚貴賤賢愚惟務吟咏遂復遺理存異尋虛逐微競一韻之竒爭一字之巧連篇纍牘不出月露之形積案盈箱惟是風雲之狀世俗以此相高朝廷據兹取士祿利之路既開愛向之情愈篤于是閭里童昏貴遊總丱未窺六甲先製五言至如羲皇舜禹之典伊傅周孔之説不復關心何曾入耳以傲誕為清虛以緣情為功業指儒素為古拙用詞賦為君子故文筆日繁其政日亂良由棄大聖之軌模構無用以為用也捐本逐末流遍天壤遞相師祖久而逾扇及皇隋受命聖道聿興屏黜輕浮遏止華偽自非懷經抱質志道依仁不得引預縉紳參厠纓冕開皇四年普照天下公私文翰並宜實録其年九月泗州刺史司馬幼之文表華豔付所司治罪自是公卿大臣咸知正路莫不鑽仰墳素棄絶華綺擇先王之令典行大道於兹世如聞外州遠縣仍踵弊風選吏舉人未遵典則宗族稱孝鄉里歸仁學必典謨交不茍合則擯落私門不加收齒其學不稽古逐俗隨時作輕薄之篇章結朋黨而求譽則選充吏職舉送天朝蓋由縣令刺史未行風教猶挾私情不存公道臣既為憲司職當糾察若聞風即劾恐挂網者多請勒有司普加搜訪有如此者具狀送臺諤字士恢趙郡人後周時拜天官都上士諤見隋文帝有帝王志操深自結納及受禪賜爵南和伯性公方明時務遷書侍御史嘗以當官好自矜伐上疏陳其弊上以諤前後所秦頒示天下在職數年以年老出拜通州刺史有惠政諤此文去當時習尚無幾耳起弊維風不應如是與陽休之書祖鴻勳陽生大弟吾比以家貧親老時還故郡在本縣之西界有雕山焉其處間逺水石清麗高巖四匝良田數頃家先有野舍於斯而遭亂荒廢今復經始即石成基憑林起棟蘿生映宇泉流繞階月松風草緣庭綺合日華雲實傍沼星羅簷下流煙共霄氣而舒卷園中桃李雜椿柏而蔥蒨時一褰裳涉澗負杖登峰心悠悠以孤上身飄飄而將逝杳然不復自知在天地間矣若此者久之乃還所住孤坐危石撫琴對水獨詠山阿舉酒望月聽風聲以興思聞鶴唳以動懷企莊生之逍遙慕尚子之清曠首戴萌蒲身衣緼襏出藝粱稻歸奉慈親緩步當車無事為貴斯巳適矣豈必撫塵哉而吾生既繫名聲之韁鎖就良工之剞劂振佩紫臺之上鼓袖丹墀之下采金匱之漏簡訪玉山之遺文敝精神於丘墳盡心力於河漢摛藻期之鞶繡發議必在芬香兹自美耳吾無取焉嘗試論之夫崑峯積玉光澤者前毁瑶山叢桂芳茂者先折是以東都有挂冕之臣南國見捐情之士斯豈惡梁錦好蔬布哉蓋欲保其七尺終其百年耳今弟官位既達聲華巳逺象由齒斃膏用明煎既覽老氏谷神之談應體留侯止足之逸若能翻然清尚解佩捐簪則吾于兹山莊可辦一得把臂入林挂巾垂枝携酒登巘舒席平山道素志論舊款訪丹法語玄書斯亦樂矣何必富貴乎去矣陽子途乖趣别緬尋此旨杳若天漢已矣哉書不盡意鴻勳涿郡范陽人臨淮王彧薦其文學除奉朝請竟不詣謝人怪之曰為國舉才臨淮之務祖鴻勳何謝焉彧聞而喜齊神武嘗徵至并州作晉祠記官至高陽太守在官清素妻子不免飢寒休之字子烈右北平無終人歷齊左光祿大夫正中書監上牛𢎞書王孝籍竊以毒螫噆膚則申旦不寐飢寒切體亦卒歲無聊何則痛苦難安貧窮易感况懷抱之內水火鑠脂膏腠理之間風霜侵骨髓安可齰舌緘脣吞聲飲氣惡呻吟之響忍酸辛之酷哉惟明公尚書動哀矜之色開寬裕之懷咳唾足以濟活枯鱗吹噓可以騰飛窮羽芬以椒蘭之氣暖以布帛之詞許小人之請開大君子之聽雖復山川不逺神明在兹信而有徵言無不履猶恐拯溺遲于援手救縊緩于扶足待越人之舟楫求魯匠之雲梯則必懸于喬樹之枝沒于深泉之底矣夫以一介貧人七年直省課役不免慶賞不沾賣貢禹之田供釋之之費有弱子之纍乏強兄之親加以老母在堂光隂遲暮寒暑違侍關山迢遙齧臂為期前途邈矣倚閭之望朝夕巳勤謝相如之病無官可以免發梅福之狂非仙所能避愁疾甚乎厲鬼人生異夫金石營魂且散恐筮豫無徵齎恨入冥則虛緣恩顧此乃王稽所以致言應侯為之不樂也潛鬢髮之內居睂睫之間子野未曾聞離朱所不見沈淪東觀留滯南史終無薦引永同埋殯三世不移雖由寂寞十年不調實乏知已夫不世出者信聖明之君也不萬一者誠賢良之臣也以夫不世出而逢不萬一此小人所以為明尚書幸也坐人物之源運銓衡之柄反披狐白不好緇衣此小人為明尚書不取也昔荆玉未剖刖卞和之足百里未用碎禽息之首居得言之地有用能之資增日月之明無手足之戚憚而不為孰知其解大官或不稱其能士或未伸其屈一夫竊議語流天下勞不見圖安能無望倘病未及死往還勉念眄窮愁之間矚離憂之詞託志於前修通心於來哲使千載之下哀其不遇追咎執事有玷清塵則不肖之軀死生為纍小人之罪方且未成願少加矜愍留心無忽孝籍平原人開皇中召入祕書助王劭修國史劭不之禮在省數年不免輸稅孝籍不得志奏記于𢎞𢎞亦知其有學業而竟不調後歸鄉里以教授為業終于家牛𢎞字里仁封竒章郡公遺崔頥書隋豫章王暕昔漢氏西京梁王建國平臺東苑慕義如林馬卿辭武騎之官枚乘罷𢎞農之守每覽史傳嘗竊怪之何乃脫略官榮栖遲藩邸以今望古方知雅志彼二子者豈徒然哉足下博聞強記鉤深致逺視漢臣之三篋似涉蒙山對梁相之五車若吞雲夢吾兄欽賢重士敬愛忘疲先築郭隗之宫常置穆生之醴今者重開土宇更誓山河地方七百牢籠曲阜城兼七十苞舉臨淄大啓南陽方開東閣想得奉飛蓋曵長裾籍玳筵躡珠履歌山柱之偃蹇賦池竹之檀欒其崇貴也如彼其風流也如此幸甚幸甚何樂如之高視上京有懷德祖才謝天人多慙子建書不盡言寧俟繁詞北史崔頥傳略云頥字祖濬開皇初為河南豫章二王侍讀更日往來及河南王為晉王轉記室參軍自此去豫章王遺頥書頥答之王入東宫除太子齋帥兼舍人及元德太子薨以疾歸徵起居舍人宇文化及弒帝引為著作佐郎稱疾不起在路發病卒按河南王為晉王巳而入東宫者隋煬帝子元德太子也豫章王者煬帝子齊王暕先封豫章王也品外録以為齊豫章王嶷不惟地分南北亦且時懸四代亟宜正之暕小字阿孩元德大子薨朝野以暕當嗣帝暕頗驕恣帝亦以他事怒求暕過失自是寵衰帝每慮暕生變化及作亂帝顧蕭后曰得非阿孩也化及復令人殺暕暕亦謂出帝意至死竟不知殺者為誰答王績書杜之松辱書知不降顧歎恨何巳僕幸恃故情庶回高躅豈意康成道重不許太守稱官老萊家居羞與諸侯為友延佇不獲如何如何竒迹獨全幸甚幸甚敬想結廬人境植杖山阿林壑地之所豐煙霞性之所適蔭丹桂藉白茅濁酒一杯清琴數弄誠足樂也此真高士何謂狂生僕憑藉國恩濫尸貴部官守有限就學無因延頸下風我勞何極前因行縣實欲祇尋誠恐燉煌孝廉守琴書而不出酒泉太守列鐘鼓而空還所以遲回遂攬轡也僕雖不敏頗識前言道既知尊榮何足恃豈不能正平公之坐敬養亥唐屈文侯之膝恭師子夏雖齊桓德薄五行無疑眭夸故人一來何損蒙借家禮今見披尋微而精簡而備誠經傳之典略閨庭之要訓也其喪禮新義頗有所疑謹用條問具如别帖想荒宴之餘為銓釋也遲更知聞杜之松白之松正觀中為河中刺史答刺史杜之松書王績月日博士陳龕至奉處分借家禮并帙封送闕請領也又承欲相招講禮聞命驚笑不能巳巳豈明公前眷或徒與下走相知不熟也下走意疏體放抑有由焉兼棄俗遺名為日久矣淵明對酒非復禮義能拘叔夜携琴惟以煙霞自適登山臨水邈矣忘歸談虛語玄忽焉終夜僻居南渚時來北山兄弟以俗外相期鄉閭以狂生見待歌去來之作不覺情親詠招隱之詩惟憂句盡帷天席地友月交風新年則柏葉為樽仲秋則菊花盈把羅含宅內自有幽蘭數叢孫綽庭前空對長松一樹高吟朗嘯挈榼携壺直與同志者為群不知老之將至欲令復整理簪屨修束精神揖讓邦君之門低昂刺史之坐逺談糟粕近棄醇醪必不能矣亦將恐芻狗貽夢櫟社見嘲去矣君侯無落吾事王君白吕才東臯子集序云貞觀中京兆杜之松清河崔善繼為本州刺史皆請與君相見君曰奈何悉欲坐召嚴君平竟不見崔杜高君調趣卒不敢屈但歲時贈以美酒鹿脯詩書往來不絶召永嘉山居書朗禪師自到靈溪泰然心意高低峰頂振錫常遊石室巖龕拂巾宴坐青松碧沼明月自生風掃白雲縱目千里名花異果蜂鳥銜來猿嘯長吟逺近皆聽鉏頭當枕細草為氊世上崢嶸競爭人我心地未達方乃如斯倘有寸隂願垂相訪朗禪師住婺州浦陽縣佐溪山此書見永嘉集答書大有妙理以非是編所急故不録上絳州上官司馬書王勃月日龍門百姓某謹再拜奉書于司馬上官公足下蓋聞靈化出於窈冥帝圖寄於寥廓聖人生而萬物覩太階平而四國會故曰有非常之后者必有非常之臣有非常之臣者必有非常之績至今雷奔雨嘯風旋電轉拾青紫於俯仰取公卿於朝夕雲臺迫漢南宫列元宰之圖霜戟羅門北闕據名臣之第嘗見之矣至若時非我與雄略頓於窮途道不吾行高材屈於卑勢孔宣父之英達位未列於陪臣管公明之傑秀名僅終於郡屬有時無主賈生獻流涕之書有志無時孟軻養浩然之氣則亦有焉豈非妙造無端盛衰止乎其域神期有待動靜牽乎所遇向使太公失於周伯則旗亭之屠父韓信屈於蕭何則轅門之餓𨽻又焉得鷹揚豹變吐納風雲者哉故曰知與不知用與不用觀夫得失之際亦窮達之有數乎其有邀時譽忘亷恥徇茍得設向背於朝廷立縱橫於勢利舉三寸之舌屈辱豪門奉咫尺之書逡巡下席皆自謂材足以動俗智足以濟時鐘鼎輝其顧盼冠蓋生其籍甚豈知夫四海君子攘袂而恥之乎五尺微童所以固窮而不為也此蓋莊周有言所以得意而忘象得象而忘言語曰談何容易易稱書不盡言知談之不易而欲言之盡以是思之良可知矣下官者康衢之賤耳嘗聞闕里之言頗挂平輿之目豈不知塵形俗狀遊水鏡而多慙抱鼓援鼙偶雷門而自失而欲刻鵠飾鳬唐突扃餘疑者耶徒以登山泛海庶測高深執炬傳螢希增日月三奔九合下官聞管仲之風千載一時君侯受鮑卿之託是以敢陳其徑庭不然則秋風明月西江留獨往之因桂嶠松巖南山有不群之地矧區區者而重高明之閫閾君侯極天分構振瓊樹而韜霞帶地疏源握珠胎而冠月鱗軒羽殿瑶臺降卿相之榮鵲印蟬簪金社發公侯之始青臯獨唳望鴻漸而翻霞丹穴高鳴對鵷池而矯霧嚴助以賢良待詔未厭承明汲黯以方正拾遺終榮卧理藩維克振既參來暮之歌邦國不空自有康沂之相加以雄材廣度散琬琰於胸懷逸氣遒文運風霜於掌握迫青霄而構舍煙霞之涯涘莫尋振滄渤以流謙江漢之波瀾未測耀靈圭於趙席垂棘知歸辨羣籟於莊軒懸匏自托賓階夕敞清河銷驥贄之虞虛榻晨披心疑禮得龍驅之地方當翊贊宸極羽儀台屏豈徒偃仰州縣勞事藩庭而巳哉借如僕者言不滿于鄉黨聲不出于堂閾東海取樂於簞瓢南山畢志於文史餐花佩葉入蘭室而談玄挹露攀霞坐松扃而嘯逸楊子雲之淡泊心竊幕之嵇叔夜之逍遙真其好也未嘗露才揚巳飾小智以驚愚假勢憑時託中人而樹迹遍遊天下寒心於將相之門獨守太玄側身於名利之境嘗謂奉琴巵於北牖詠詩禮於南陔坐商洛而折雲英臨江湖而採煙液生願畢矣而屬鸞扃停逸頻虛不次之階鶴板徵賢纍發非常之詔天下有道吾豈匏瓜承達人一顧之榮辱公車再辟之禮平津侯之博物終屈奉常賈大夫之才名猶逢絳灌况庸者而可免於此乎君侯要津先據圖海盛於當時下官覆蕢方勤為山始於今日雖陵深谷變終非入室之賔而晝詠宵吟敢預升堂之列夫以幽明不測尺標見天下之心巨細相傾寸管合羲舒之度豈非道存斯貴理在必亨霸略近發于輿歌皇圖不隔于芻議故有榮枯絶等奉推轂而欣然年勢不侔受分庭而罔愧風規可接惟君侯體之今古未殊則下官願矣常恨霜松列澗萬尋無罩月之期露草滋山寸莖有稍雲之望斯則聲實困於兼濟才位難於俱立况乎地勢不足以誇俗容貌不足以動人遑遑藪澤安足以奉高明之咳唾也所冀蠅階賤質附雲足而追飈蚋序輕姿託霜毛而絶海委名勵己蛟鐔申獨斷之能偶迹當仁驪珠鮮暗投之懼天衢可望指鵬程而三休巨壑難遊伏龍門而一息死罪云云與博昌父老書駱賓王某月日駱賓王謹致書于博昌父老等承並無恙甚善甚善雲雨俄别封壤異鄉春渚青山載勞延想秋天白露幾度光隂古人云别易會難不其然也自解携襟袖將十五年交臂存亡略無半在陸處士溘先朝露辟閭公倐掩夜臺故舊門人多遊蒿里耆年宿德但見松丘嗚呼泉壤殊途幽冥永隔人理危促天道奚言感今懷舊不覺涕之無從也况過隙不留藏舟難固追維逝者浮生幾何哀緣物興淚因情感雖蒙莊一指殆先覺于勞生秦佚三號遽忘情于怛化啜其泣矣尚何言哉又聞移縣就安樂故城廨宇邑居咸徙其地里門阡陌徒有其名荒徑三秋蔓草滋于舊館頽墉四望拱木多于故人嗟乎仙鶴歸來遼東之城郭猶是靈烏代謝漢南之陵谷巳非昔吾先君出宰斯邑清芬雖逺遺愛猶存延首城池何心天地雖則山河四望是稱無棣之墟松檟千秋有切維桑之里故每懷宿昔尚想經過于役不遑駕言徒極今西成有望東戶無為野老清談怡然自得田家濁酒樂以忘憂故可洽賞當年相歡卒歲寧復心存舊好追思昔遊所恨跂豫望之徑途密邇佇中衢而空軫巾下澤而莫因風月虛心形留神往山川在目地邇人遐以此懷勞增其歎息情不遺舊書何盡言上吏部裴侍郎書駱賓王四月一日武功縣主簿駱賓王謹再拜奉書裴公執事易曰書不盡言言不盡意然則理存乎象非書無以達其微詞隱乎情非言無以詮其旨僕誠鄙人也頗覽前事每讀古書見高堂九仞曾參負北向之悲積粟萬鍾季路起南遊之歎未嘗不廢書輟卷流涕霑衣何者情蓄于哀事符則感形潛于內迹應斯通是布腹心罄瀝肝膽庶大雅含𢎞之量矜小人悃款之誠惟君侯察焉賓王一藝罕稱十年不調進寡金張之援退無毛薛之遊亦何嘗獻䇿干時高談王霸衒才揚已歷詆公卿不汲汲于榮名不戚戚于卑位蓋養親之故也豈謀身之道哉不圖君侯忽垂過聽禮以弓招之恩任以書記之事擬人則多慙阮瑀入幕則高謝郤超昔聶政荆卿刺客之流也田光豫讓烈士之分也咸以勢利相傾意氣相許尚且捐軀燕趙甘死齊韓今君侯無求于下官見接以國士正當陪麾後殿奉節前驅賈餘勇以求榮效輕生而報施所以逡巡于成命躊躇于從事者徒以夙遭不造幼丁閔凶老母在堂常嬰羸恙糲糗無甘旨之膳松檟闕遷厝之資撫躬存亡何心天地故寢食夢想噬指之戀徒深歲時蒸嘗崩心之痛罔極若僕者固名教中一罪人耳何面目以奉三軍之事乎况屬天倫之喪奄踰七月違膝下之養忽至三年而凶服之制將終哀疚之情未泄興言永慕舉目增傷夫怨于中者哀聲可以應木石感于情者至性可以通神明故徐元直指心以求辭李令伯陳情以窮訴上以棄興王之佐命下以全奉親之篤誠而蜀主不以為非晉君待之逾厚此二者豈貪貧賤惡榮華厭萬乘之交甘匹夫之辱也蓋有不得巳者哉儻有乾沒為心脂韋成性捨慈親之色養許明主以驅馳內忘顧復之私外存傅會之眷薄骨肉厚榮寵茍背恩而自效則君侯何以處之且義士期乎貞夫忠臣出乎孝子既不能推心以奉母亦焉能死節以事人假物議之無嫌實吾斯之未信也流沙一去絶塞千里子愴入塞之魂母切倚閭之望就令歡以卒歲仰南薰之不資而使憂能傷人迫西山而何幾君侯深情錫類道叶天經明恕待人慈心應物儻矜犬馬之微願憫烏鳥之私情寬其負恩遂其終養則窮魂有望老母知歸賓王死罪再拜裴侍郎即行儉嘗以賔王等浮躁衒露斷其不良死何取而欲納之幕中賔王與人書大半望人汲引何不肯就行儉之辟豈萬里從戎非所以寧親而平日干請不過求目前寸祿以為養耶又豈從敬業時母巳天年終耶是皆不可知也此書在駱集又是一體上雍州高長史書李嶠八月十五日三原縣尉趙國李某謹再拜奉書長史明公執事蓋聞諸師曰君子或出或處蓋君子與時消息從道汚隆故其處則閉重玄坐虛白龍盤鳳跱桂郁蘭芬下生川嶽之氣上發星辰之象其出則摛景光吐文質風雲相召日月爭明撫八翼而登泰階提七星而酌元氣夫然故終始亨吉進退利貞某當休明之期推去就之分滄洲密邇未徵嘉遁之爻閶闔洞開不列亨衢之步顧嘗希仕尺寸徇祿斗升胥僕之與鄰奔走之為役婆娑塵垢之中踸踔藩籬之際區區短懷亦云可見矣抑貧賤實須降志顛沛不可違仁是用終夜九回一朝三省懼斯言之或玷將細德之為纍至於有文無害之政得玉喪寶之談服以周旋庶乎聞達然以守其愚直任此拙宦雖入門為無言之侣出谷罕求聲之援生平琴曲惟以下調相哀疇昔朋遊詎有中人見識誠不幾乎幽蘭芬蕙實不愧乎枯木朽株自獲忝微班預聞賤事佩紛綸之雅訓承肅穆之清塵有日矣亦曾越嚴亭趨下風希口吻之芳音候眉宇之陽氣而堂上百里鬷明無撤器之因門下三千毛遂乏處囊之地雖願披心膽進款誠雲漢逾邈風流遂逺夫客果有能不孤彈劒之食士實難盡誰知執矢之工此昔人所以慷慨於神交殷勤於知己者也伏惟君侯日門翔照天池撫翼厨開銘鼎座列歌鐘吐娓娓之言植堂堂之望河陽春樹開四照於詞林洞庭秋水清九流於心鏡若夫標置度量權衡物理蕭公畫䇿不探𢎞逺之規孟子持籌未及精微之數粵若登金閣排玉堂利見九五差蹤二八或奏昌言伏丹墀而心啓乃回天奬憑紫樞而目送南宫祕署出入生光西京神輔指麾成俗固巳羽儀振鷺黼藻群龍某家本燕南居臨趙北負書懷刺方致維桑之禮賁帛翹車幸枉錯薪之駕愷悌之慈允洽敷腴之好不忘洎解褐中林辭農下邑希光東壁猶是貧女舊鄰激水西江非復達人前惠鄙賤之質未改提奬之恩巳别昔時薑桂早得因地而生今兹桃李翻以無言受棄豈非時亨其會命塞其通者乎今餘秩無幾解巾有日便當斂襟初服藏拙後塵何去何從罷龜策之臧否自開自落任天地之榮枯宜其卷舌吞聲滅影削迹不干執事之紀無煩左右之聽徒恨勤誠纍歲而丹慊不通服道彌年而白頭成諺所以低回岐路杼軸蓬心搦翰操觚而不能已者也夫引往納來江海所以深廣損上益下乾坤所以光大是故虛已之求有屈位而申道泛接之愛或開懷而受物若乃崇峻宫垣扃鑰閫奧使屬睇之目隔逾深而照窮仰止之心限彌高而望絶御賔以之失位篲客以之無門將恐慕義之夫思為黃鶴之舉企景之客不作真龍之遊願君侯垂古人之風申國士之分假其白璧之契接以黃金之言不忽當年要之卒歲則重如熊掌府中饒取義之賔輕若鴻毛節下有徇生之士敢薦狂妄惟君擇焉上蕭至忠論史書劉知幾僕自策名仕伍待罪朝列三為史臣再入東觀竟不能勒成國典貽彼後來者靜言思之其不可有五何者古之國史皆出一家未聞藉功於衆惟漢東觀大集群儒然纂述無主條章靡建繇是伯度訝其不實公理以為可焚今史司取士有倍東京人自為荀袁家自為政駿每記一事載一言閣筆相視含毫不斷頭白可期汗青無日一不可也前漢郡國計書先上太史副上丞相後漢公卿所撰先集公府乃上蘭臺故史官載事為廣今史臣編録惟自詢采二史不注起居百家罕通行狀即仲尼猶且管窺况中材豈能博物二不可也史局通籍禁門幽居九重所以杜顔面防請謁也今館中作者如林皆願長喙無聞齚舌一示褒貶曾未絶口而朝野具知孫盛取嫉權門王韶見讐貴族常人之情不能無畏三不可也古者史氏各有指歸故尚書以疏通知逺為主春秋以懲惡勸善為先今史官注記類稟監修或謂尚須直辭或謂宜當隱惡十羊九牧其令難行一國三公適從誰在四不可也夫言監者蓋總領之義耳宜明立科條審定區域庶人思自免書可立成今監者不肯指授修者又不遵奉用使爭學茍且務相推避坐變炎涼徒延歲月五不可也凡此不可其流實多雖威以刺骨之刑朂以懸金之賞終不能得僕所以屢辭載筆之官願罷記言之職者正為此耳當今朝號得人國稱多士蓬山之下良直差肩藝閣之中英竒接武僕既功虧刻鶴筆未獲麟徒殫大官之膳虛索長安之米乞以本職還其舊居多謝簡書請避賢路惟明公哀而許之劉子玄名知幾以字行擢進士第纍遷鳳閣舍人兼修國史時宰相韋巨源紀處訥楊再思宗楚客蕭至忠皆領兼修子玄病長官多意尚不一而至忠數責論次無功乃奏記求罷去河清頌有序鮑照臣聞善談天者必徵象於人工言古者先考績於今鴻犧以降遐哉邈乎鏤山嶽雕篆素昭德垂勛可謂多矣而史編唐堯之功載格于上下樂登文王之操稱於昭于天素狐玄玉聿彰符命朴牛文蚓爰定祥厯魚鳥動色禾雉興讓皆物不盈眥而美溢金石頌聲為之而寢詩人于是不作庸非惑與自我皇宋之承天命也仰符龍木之精俯協河龜之靈君圖帝寶粲爛瑰英固業光曩代事華前德矣聖上天飛踐極迄兹二十四載道化周流玄澤汪濊地平天成上下含熙文同軌通表裏釐福耀德中區黎庶知讓觀英遐表夷貉懷惠秩禮恤勤散露臺之金振民舒國傾巨橋之粟約違迫脅奢去泰甚宴無留飲畋不槃樂物色異人優遊鯁直顯靡失心幽無怨魄精照日月事洞天情故不勞仗斧之使號令不嚴而自肅無辱鳳舉之事靈怪不召而自彰萬里神行飈塵不起農商野廬邊城偃柝冀馬南金填委內府馴象栖爵充羅外苑阿紈纂組之饒衣覆宗國魚鹽杞梓之利傍贍荒遐士民殷富繁溢五陵宫宇宏麗崇冠三川閭閈有盈歌吹無絶朱輪疊轍華冕重肩豈徒世無窮人民獲休息朝呼韓罷酤鐵而已哉是以嘉祥纍仍福應尤盛青丘之狐丹穴之鳥栖阿閣遊禁園金芝九莖木禾六秀銅池發膏畝腴宜以謁薦郊廟和協律吕煙霏霧集不可勝紀然而聖上猶昧旦夙興若有望而未至閎規遠圖如有追而莫及神明之貺推而弗居也是以琬碑鏐檢盛典蕪而不治朝神省方大化抑而未許崇文協律之士藴儛頌於外坐朝陪宴之臣懷揄揚于內三靈佇眷九壤注心既有日矣歲宫乾維月邅蒼陸長河巨濟異源同清澄波萬壑潔瀾千里斯誠曠世偉觀昭啓皇明者也語曰影從表瑞從德此其效焉宣尼稱鳳鳥不至河不出圖傳曰俟河之清人夀幾何皆傷不可見也然則古人所不見者今殫見之矣孟軻曰千載一聖是旦暮也豈不信哉夫四皇六帝樹聲長世大寶也澤浸羣生國富刑清鴻德也制禮裁樂惇風遷俗文教也誅華逋羯束顙絳闕武功也鳴禽躍魚滌穢河渠至祥也大寶鴻德文教武功其崇如此幽明協贊民祇與能厥應如彼惟天為大堯實則之皇哉唐哉疇與為讓抑又聞之勢之所覃者淺則美之所傳者近道之所感者深則慶之所流者逺是以豐功韙命潤色縢策盛德形容藻被歌頌察之上代則奚斯吉甫之徒鳴玉鸞於前視之中古則相如王褒之屬弛金羈于後絶景揚光清埃繼路班固稱漢成之世奏御者千有餘篇文章之盛與三代同風由是言之斯乃臣子舊職國家通義不可輟也臣雖不敏敢不勉乎乃作頌曰窺刋崩石捃逸殘竹巢風寂寥羲埃綿邈巨生大年贍學淵聞鞶繡成景粉繢顓軒徒玩井科未覩天河亘古通今明鮮晦多千齡一見書史登歌旋我皇駕揆景方塗凌周躐殷蹶唐轢虞如彼七緯纍璧重珠高祖撥亂首物定靈更開天地再鑄羣生帝御三傑龍步八坰朔南暨教海北騰聲淪深格高浹遐洞冥讒鼎遷宋玄圭告成大明方徽鴻光中微聖命誰堪皇厯攸歸謀從筮協神與民推黃旗西映紫蓋東輝納瑞螭玉升政衡璣金輪豹飾珠冕龍衣正位北辰垂拱南面天下何思日用罔倦復禮歸仁觀恆通變一物有違戚言毁膳菲躬簡法厚下安宅謙德彌光損道滋益孝崇饗祀勤隆耕籍饘酎秋羊封墐春骼嬰耄兼梁鰥孤重帛體由學染俗以教遷禮導刑清樂鬯風宣分衢讓齒折訟推田野旌伏彥朝賞登賢儒訓優柔武節猋鷙文憲精𢎞戎容犀利樞鈐明審程彠周備吏礪平端民羞幸覬桴鼓凝埃烽驛垂轡銷我長劒歸為農器閩外水鄉鄣表炎國隴首西南渤尾東北赩赩嶺丹渾渾泉黑移琛雲勉轉隼卭僰狼歌薦功鳥談陳德治博化光民阜財盛班白行謡青綺高詠雲表幽和物章明慶麗植雕質蠢行藻性仁草晨莩德宿宵映海無隱飇山有黃落牛羊內首閭户外拓瑞木朋生祥禽輩作薰風蕩閨飴露流閣器範神妙劑調象藥匪直也斯偉慶芳溱注彼四瀆媚此雙川伏靈遙紀閟貺遐年澄波海嶽鏡流蔥山泉室凝澱水府清涓俯瞰夷都降視驪淵朱宫潛耀紫閣隂鮮昔在爽德王風不昌乃溢乃竭或壅或亡潔源濫壑曾是未央先民永慨大道悠長云何其瑞實鍾我皇聞諸師説天竦聽密介焉如響匪逺惟疾矧是皇心妙夫貞一左右天經户牖人術訏謨布簡絲言盈室歲有綿祀清豈崇日一人之慶吹萬稟和靈根方固修源重波副睿二哲帝體皇柯景雲蔚嶽秀星騎羅垂光九野騰響四遐輔居鼎足槃石虎牙世匹周室基永漢家泰階既平洪河既清大夫在上區宇文明樵夫議道漁父濯纓臣照作頌鋪德樹聲照字明逺東海人宋元嘉中河濟俱清照為此頌初照謁臨川王義慶未見知欲貢詩言志人止之照曰大丈夫豈可遂蘊智能使蘭艾不辨于是奏詩王竒之文帝時為中書舍人上好文章自謂莫及照悟其旨為文多鄙言纍句咸謂照才盡是不然也照或作昭唐人為武后避諱故今宜改正馬寶頌并序梁簡文帝皇帝應百姓之心副四海之願復履玉衡還臨億兆天地交泰日月貞明至理惟新隆平方始遐邇一體中外禔福含生欣欣若耘耰之逢夏雨懷情坎坎譬草木之值春風帝王之道超邁開闢睿聖之功殫厯邃古軒羲不足鑿枘堯舜不足憲章至哉大哉無得而稱也五月丁酉朔絲竹會于德陽之堂于時日進內宫星次鶉首仲夏之晷稍極陽城之圭蕤賔之鍾初應潁川之律縉雲旦卷南風晚扇惠氣入帷清隂周宇玉輿雲罕照日充庭羽林中權分階列校簪笏成行貂纓在席昭天之樂金石鏗鏘報地之禮威儀肅省詔以馬寶示群臣太僕效官趣馬掌贊三令五申丞聨事舉八麗四圍給役相趨暉煜金鑣陸離寶勒天地無疆之德永星致逺之功鸞盻善鳴龍儀美稱沸毅權竒之威趨攄抑揚之態足轉驚電眼流含燭霧噴紛霏流沫飄灑數千為夀豈待原蠶之禁萬里一息不藉杜蘅之草王良不能控其銜䇿伯樂不能辨其文機方知總轡崑岑周非吾馭張樂大野夏有慙德豈止沈河用璧獨有緑文之稱盛德在木偏受蒼龍之名至于干將寶劒遙服晉鄭之軍蓮花烏玉騰威大海之際况乎馬寶義實踰之方當夙沙自歸滑橋屈膝款關入塞偃武修文去病無出師之勞充國罷議邊之略五律成珍九河如鏡臣謹按瑞應經彌勒成佛經中阿含經覽愚經並稱第三之馬者三千歲華子云堯漢皆得馬者堯漢皆火德正斗南方乘德而至也豈非聖德汪濊皇風洋溢研機洞元備禮達義是以天不愛道白馬嘶風王澤效祥朱鬛降祉比夫圓蹄方足躑躅在郊風嘯電奔聲遨處囿五彩依樹三雀登巢安髣佛于當今弗擬議于休應百辟卿士咸稱萬歲伊臣不佞結慶雲霄親承詔旨預觀寶瑞手舞足蹈贊揚不足宴禮斯畢退而作頌其辭曰帝廣運德欽明儀郊升道形聲德為軌仁作經璇璣正太階平割五禮和六英開四攝行八政轉輪皇飛行聖愍含識資惠命引蒼生歸法性菩提真般若淨七寶均萬邦寧逖惇史觀陳詩域中大惟聖期聞玄妙復孝慈解流澤隨因時刑巳措績咸熙三農盛九榖滋萬祇悅八神怡律有節厯得天景星曜慶雲連珠為月醴為泉民何幸值皇年乾道應坤馬來度玉關升玉臺鏤錫煥鸞鑣回槃雲轉堞塵開千天駟百龍媒永伏皂掃騊駼秣瑶粟秀芳芻九夷款四表清氓胥樂輿頌興佛經言轉輪聖王處不一大略言此王福德夀命最高惟劫初始出世所謂馬寶者謂一旦能周四天下不知蕭氏之馬能周幾何而遽可謂之寶也大率蕭氏父子以文士之浮夸襲釋典之糟粕以子頌父至再至三皆用佛書為文而不知妄言綺語為佛所訶也悲夫神雀頌并序許善心臣聞觀象則天乾元合其德觀法審地域大表其尊雨施雲行四時所以生殺川流嶽立萬物于是裁成出震乘離之君紀鳸司鳳之后玉錘玉斗而降金版金縢以傳並陶冶性靈含煦動植眇玄珠於赤水寂明鏡乎虛堂莫不景福氤氲嘉貺雥集馳聲南薰越響雲韶粵我皇帝之君臨闡大方抗太極負鳳邸據龍圖不言行焉攝提建指不肅清焉喉鈴啓閉括地復夏截海翦商就望體其尊登咸昌其會綿區浹宇遐至邇安騰實飛聲直暢傍施無體之禮威儀布政之宫無聲之樂綴兆總章之觀上庠養老躬問百年下土字民心為百姓月棲日浴熱坂寒門吹鱗沒羽之荒赤蛇青馬之裔解辮請吏削袵承風豈止呼韓北場俯勒狼居之岫熄慎南境近表不耐之城故使天不愛道地寧吝寶川嶽展異幽顯效靈狎素遊頳團膏潄醴半景青赤孳歷虧盈足足懷仁般般擾義祥祐之來若此升降之化如彼而登封盛典云亭佇白檢之儀致治成功柴燎靡玄圭之告雖奉常定禮武騎草文天子抑而未行推而不有允恭克讓其在斯乎七十二君信蔑如也故神禽顯賁玄應特昭白爵主鐵象之竒赤爵銜丹書之貴班固神爵之頌履武戴文曹植嘉爵之篇棲庭集牖未若于飛武帳來賀文㮰刷彩青蒲將翺赤罽玉几朝御取玩軒楯之間金門旦開兼留翬翟之鑒終古曠世未或前聞福召冥徵得之兹日歲次上章律諧大吕玄枵會節玄英統時至尊未明求衣晨興於含章之殿爰有瑞雀翺翔而下載行載止當扆寧而徐前來集來儀乘軒墀而顧步夫瑞者符也聖主之休徵雀者爵也聖人之大寶謹按考異郵曰軒轅有黃爵赤頭立日傍占云土精之應又禮稽命徵云祭祀合宜則黃爵集昔漢集泰畤之殿魏下文昌之宫一見雍丘之祠三入平東之府並旁觀回矚事陋人微奚足稱矣抑又聞之不刳胎剖卵則鸞鳳馴鳴不漉浸焚原則螭龍盤蜿是知陛下止殺故飛走宅心皇慈好生而浮潛育德臣面奉綸綍垂示休祥預承嘉宴不勝藻躍李虔僻處西土陸機少長東隅微臣慙於往賢逢時盛乎曩代輒竭庸瑣敢獻頌云太素式肇大德資生功玄不器道要無名質文鼎革沿習因成祥圖瑞史赫赫明明天保大定於鑠我君武義乃武文教惟文橫塞宇宙旁凝射汾軒物重造姚風再薰煥發王䇿昭彰帝道御地七神飛天五老山祇吐祕河靈孕寶黑羽升壇青麟伏皂丹烏流火白雉從風棲阿德邵鳴岐祚隆未如神爵近賀王宫五靈何有百福攸同孔圖獻赤荀文表白節節竒音行行瑞迹化玉黼扆銜環陛戟上天之命明神所格綏應在旃伊臣頌焉永緝丹素方流管絃頌歌不足蹈舞無宣臣拜稽首億萬斯年許善心字務本陳禎明中加通直散騎常侍聘隋陳平勑以本官直門下省遷虞部侍郎上神雀頌賜物二百段大業初轉禮部侍郎後從幸江都宇文弒逆以不屈遇害拜南郊頌并序王勃微臣上稽龍繇下閲龜謀觀天地之至道考皇上之大節武宣七德未嘗踰息亂之鄉文招九功未嘗出升平之域並能懸日月而高視駕雷雨而先鳴或皮幣而踐泰階或干戈而躡乾步至於理定創禮功成作樂振長䇿以敘諸侯設靈機而制羣動猶虞階巳泰不能息洞庭之誅夏載克寧不能罷會稽之戮故將體剛柔而立本法震曜而崇威一戎而宇縣平四罪而華夷服然後皇旗大輅詔殊號於圜丘電轉雲回奏玄符于孝理天下黎人知四海之安樂寰中殊域奉三靈之康泰德兼祥風灑道與和氣遊不言而大寶用貞無事而元功有立捨彼代也其誰與哉若夫應運而生繼天而作鼓動千載之下超騰百王之上遂能發軒庭之景曜躡隋運之頽風揖讓而取文明指麾而清幽夏則吾皇唐得之矣高祖以黃旗錫瑞靜雲火之橫氛太宗以赤羽登期補星辰之絶縷授瑶圖於斯邑付璿厯於鈞臺人更三聖道昭千古於是俯臨睿極趨四荒于鳳闕之前端委廟堂調萬國於龍軒之下八鸞徐動頓湯文于後塵九駿長驅佇堯舜于中路邦家之具得矣易簡之業存矣猶有朱蒙戾俗違光蓬艾之間青激遺氓假氣鈞陶之內背熊山而搆虐擁狼潭而稽誅竊瀛海之風波弄乾坤之綱紀漢圖西返惟收五郡之名魏律東窮未出三韓之險姦謀蓄于有漸逆節成于不悔長蚊蚋之雷霆附豺狼之羽翼豈知夫至人無外撫天下以為家真數有歸吊羣方而罪已三門遁甲黃公成不戰之師五壘神兵玄女下先登之䇿肅牙璋而按律輝旄節而分麾降南宫之元老裂西營之毅卒良將首路偏戎竟野軸轤萬里旌旗四合金緗玉匱司空憑首勝之威鶚視龍趨將軍仗萬全之略負鼇丘而峻壁據黿壑而深溝一鼓而亭塞無塵七縱而江山失險伐罪以明而不以衆懷逺人於絶境均惠化於殊鄰登若木以照臨折紅桃以延佇然後分州列鎮對明月以收營返斾旋戈部玄雲而振旅望神都而獻捷仰靈社以書功辛亥謁于昭陵癸丑告于太廟時乘黑帝月旅玄枵大唐有國之五十一年皇帝有天下之一十九載也元惡既殄萬宇清矣元勳既輯萬寶成矣以為周郊上帝裁延肅慎之賔漢禮甘泉未拯朝鮮之亂想玄功而反側奉先旨以遲回思答上靈之心以洽庶黎之望爰考吉日遂靜行宫有司具典乘輿乃出撫玄蚪戴翠鳳鼉鼓按節鯨鐘疏響千乘嶽動萬騎林回星陳而天行雷震而霧合是時未登夫太壇也乃齋帷宫宿帳殿華蓋移影鈎陳從蹕千營夕布亘蒼野而煙凝萬幕霄懸背黃闉而霧列既而屏翳清曉飛廉警旦孫叔奉轡王良聳䇿雲藏星謐宇曠山明旌旗具照簫笳互凝陟名嶽以告成歷神丘而展事國容象物而動朝章視令而肅宸儀有晬虛徐大帝之庭列侍無譁髣佛華胥之國於是襲衮服戒俎豆端瑞班儼華旒樂懸六代禮備三古奠惟蒼璧藉用白茅鳴孤竹之簫管奏空桑之琴瑟感格以誠不以事動植咸歡敬神以道不以華天人合應然後駐聲名於上邑反文物於仙宫因雷雨而作施法雲天而用響風行電舉未寸景而浹九埏野抃途歌不崇朝而晏六合我之玄極建矣我之能事畢矣趨帝寰而振足越皇衢以驤首不其然乎雖睿化無方比神圖而絶唱而小臣不佞撫洪筆而當仁敢作頌曰遼河巨浸碣石危峰城分玄菟塞接黃龍憑遐作梗恃險忘恭人殘鬼哭主暗臣凶有晉不綱戎麾內逐帝隋失御皇輿外騖九縣塵征三靈霧黷長兹下慢逋我天戮五材無隕千齡有聖武創元基文清寶命波恬四海明宣七政息衆以寧綏荒以令飛龍繼迹鳴鳳重光遂均夷夏迭用柔剛戈船泛月劍騎橫霜風驅海石電掃辰陽帝師無戰神兵有伐丞相陪麾司空仗鉞危雲旦起長星夜發萬壘爭屠千城自蹶功超薄代義極兼該殊方底定善陳徐回歸俘獻捷課績分材建侯清廟偃伯靈臺考事龜謨凝清鳳扆仰觀俯察享神作祀道則推天功非在已豐隆旦出招搖夕指神壇嶽立齋館雲深鑾旗曉引葆吹晨吟山明野徹日降天臨鏘鏘盛服肅肅圭簪爼豆畢陳笙鏞間撫玉觴分獻金錞暢矩青帝鳴琴朱靈會舞上和下悅神歆神聚收歡巨野反斾靈躔思周宇宙樂極寰埏德因時立頌以詞宣帝之功也臣何飾焉勃本傳言麟德初數獻頌闕下今所傳者此篇與九成宫乾元殿頌是也九成乾元皆萬餘言窮盡工巧乾元頌序至頌皇后頌太子又隂頌諸王公主冀以媚后后又雅好文詞然于勃漠不動意至鬬雞一檄而黜不旋踵帝后可謂具眼勃可謂枉了做小人矣余于簡文菩提大法勃九成乾元諸頌先嘗録之後乃汰去曰汰簡文為佛法懲妄語也汰王勃為文壇懲無恥也陜州鐵牛頌并序賈至乾象元地勢坤稽謀惟觀察孰見元善利物純隂隲而不仁坤順為牛或剛克以殊用彼見于陜郛者其隂隲歟其剛克歟寓精堅強壯趾慎固內習坎窞外形端倪居于道周敦兮若朴謂為首匪如山之狀謂為角匪如栗之象曾覽古史罔徵其由深不可識孰知其故吾將本自然歸神功豈謀人力役鬼傭哉東臨周畿西盡虢略載厚地而莫聳拒長河而不崩向使非神或微憑子之力則城復隍矣人其魚乎乃詢耆耋聽輿誦僉曰此之鎮其日固久人由是怙恃物由是生資嘗欲掘地及源以觀其徼庀徒執用大臻于兹橫縻林綆匹進雲鍤尋下體之極達純隂之精其于退諸泉而入于穴俾圍木靡拉懸絙絶縋既致乃穽其見如初五丁力拔而不及方舟鎖曳而奚可虎無所措其爪猛焉能噬兵無所容其刃投豈皆虛鏕鏕行人無住蒞下當函關之路望若隨仙俯桃林之墟時得歸獸若以匹敵必于其倫則長蛇繞閬風而周巨鼇負蓬萊而抃可明徴矣且察內以外觀逺以近在端鋩而末固未可量也亦何知不磅礴數州之間日用有迷其力矣夫能利于物帝之念擇善而為臣之忠是以我國家咸秩無文發天使以祀我明牧謀始有作招墨客以頌頌者誦也容也誦令德昭厥容冀穆如清風敢刋之貞石頌曰杳冥精兮混茫氣凝為伏牛載厚地巨靈西掌屹贔屭長河東流泙沸渭堅立不動神之至層城固護人大庇德合無疆其可既昔人無述今之是志至字幼鄰會之子從玄宗幸蜀拜起居舍人知制誥帝傳位至當撰册帝曰昔先天誥命乃父為之詞今兹命册又爾為之可謂繼美矣至頓首嗚咽北山移文孔稚圭鍾山之英草堂之靈馳煙驛路勒移山庭夫以耿介拔俗之標瀟灑出塵之想度白雪以方潔干青雲而直上吾方知之矣若其亭亭物表皎皎霞外芥千金而不盻屣萬乘其如脫聞鳳吹于洛浦值薪歌于延瀨固亦有焉豈期始終參差蒼黃反覆淚翟子之悲慟朱公之哭乍回迹以心染或先貞而後黷何其謬哉嗚呼尚生不存仲氏既往山阿寂寥千載誰賞世有周子雋俗之士既文既博亦玄亦史然而學遁東魯習隱南郭偶吹草堂濫巾北嶽誘我松桂欺我雲壑雖假容于江臯乃纓情于好爵其始至也將欲排巢父拉許由傲百氏蔑王侯風情張日霜氣橫秋或歎幽人長往或怨王孫不遊談空空于釋部核玄玄於道流務光何足比涓子不能儔及其鳴騶入谷鶴書赴隴形馳魄散志變神動爾乃眉軒席次袂聳筵上焚芰製而裂荷衣抗塵容而走俗狀風雲悽其帶憤泉石咽而下愴望林巒而有失顧草木而如喪至其組金章綰墨綬跨屬城之雄冠百里之首張英風于海甸馳妙譽於浙右道帙長殯法筵久埋敲朴喧囂犯其慮牒訴倥􅘓裝其懷琴歌既斷酒賦無續常綢繆于結課每紛綸于折獄籠張趙于往圖架卓魯于前籙希蹤三輔豪馳聲九州牧使其高霞孤映明月獨舉青松落隂白雲誰侣澗户摧絶無與歸石徑荒涼徒延佇至于還飇入幕寫霧出楹蕙帳空兮夜鶴怨山人去兮曉猿驚昔聞投簪逸海岸今見解蘭縛塵纓于是南嶽獻嘲北隴騰笑列壑爭譏攢峰竦誚慨遊子之我欺悲無人以赴弔故其林慙無盡澗愧不歇秋桂遣風春蘿罷月騁西山之逸議馳東臯之素謁今又促裝下邑浪拽上京雖情投于魏闕或假步于山扃豈可使芳杜厚顔薜荔無恥碧嶺再辱丹崖重滓塵遊躅于蕙路汚渌池以洗耳宜扃岫幌掩雲關斂輕霧藏鳴湍截來轅於谷口杜妄轡於郊端於是叢條瞋膽疊穎怒魄或飛柯以折輪乍低枝而掃迹請回俗士駕為君謝逋客初周顯隱于北山後出為山隂令秩滿入京復經此山故德璋代山移文以絶之人生在世出之與處如寒暑晝夜然顧其所挾何如耳豈處之必高于出哉如謝朏何胤以山林為妒媒亦安在其為高隱也自有此文而杜鎬以譏种放王一介以譏王安石漸成濫套矣安石一生仕宦譬如幼女許嫁而責其守節尤理之不通者也移齊文徐陵獲去月二十日移承羯寇平殄同懷慶悅眷言鄰穆深副情佇夫天網之大固無微而不擒神武之師本無征而不克至如戎王傾其部落逆豎道其鄉關非厥英圖殆難戡戮况復洞庭遐曠兵食殷阜西窮版屋北罄氊廬聲冠苻姚勢兼聰勒庸蜀寶馬彌山不窮巴漢樓船陵波無際我之元戎上將協力同心承稟朝謨致行明罰為風為火殪彼蒙衝如霆如雷擊其舟艦羌兵楚賊赴水沈沙棄甲則兩岸同奔橫尸則千里相枕江川盡滿譬睢水之無流原隰窮胡等隂山之長哭于是黑山叛邑諸城洞開白虜連羣投戈請命長沙鵩鳥靡復為妖湘川石燕自然還儛克翦無算縲擒不資欲計軍俘終難巧厯所獲龍駒驥子百千其羣更開苜蓿之園方廣騊駼之廄于是衛霍甘陳虬髭瞋目心馳壟路志飲河源乘勝長驅未知所限豈如桓溫不武棄彼關中殷浩無能長兹羌賊方且西踰酒郡抵我境而置邊亭東略鹽池為齊朝而反侵地此政亦翦妖氛未窮巢窟便聞慶捷愧佩良深為東魏檄梁文杜弼觀夫辰象麗天山嶽鎮地建之以邦國樹之以君長日月於是莫二宇宙所以總一雖五運相推百王革命此道之行孰之能改皇家承統光配彼天義洽幽明化周動植舞干戚於兩階執玉帛於萬國惟彼吳越獨阻聲教而元首懷止戈之心上宰薄兵車之會遂解縶南冠喻以好睦舟車遵􅑴川陸光華亭徼息奔走之勞屯戌無逼卒之變雖嘉謨長算爰自我始而罷兵息民彼獲其利侯景豎子本無事業乃枉道於人間遂乾沒於世上鳴伏於爾朱之門鎮守於普泰之日曾無為主之識詎有挈瓶之智既而投命義旗歸身幕府殊異雍齒有類丁公時逢寬政得免大戮棄其瑕滓收其力用預在行伍參迹驅馳及秦隴逋誅每事經略以河南是空虛之地漢陽非兵戰之衝薄存犄角聊示旗鼓豈資實效寄以遊聲而愚褊有積驕憤遂甚禍心潛搆翻成亂階負恩棄德罔恤天計不義不昵厚而必顛委慈母似脫屣棄寵弟如遺芥龍鍾稚子痛苦成行孌彼諸姬破亡為伍滅伯春之婉轉慕薑兒之爽言不與狼虎同仁而共豺狸等惡及逺託關隴依憑姦異逆主定君臣之分賊臣結兄弟之親解其倒懸仰人鼻息一日無恩終成難養俄而易慮躬擐干戈釁暴惡盈側首無託以金陵逋逃之藪江南流離之地甘辭卑體進贄圖身讒言浮説抑可知矣叛豎投命豈將擇音而偽朝大小幸災忘義主荒於上臣蔽於下逐雀去草曽不是圖竊寶叛邑椒蘭比好人而無禮其能國乎亦既失信不亡何待今帝道休明皇猷允塞故丞相材標國楨道潤時雨內外齊心上下同德摩日則車懸轉舍排山則龍門洞開吞雲夢於胸中運天下於掌內雖有賊臣去國亡卒出境何異一毛之落牛體雙鳬之飛海濵彼既連結姦惡斷絶鄰好追兵保境縱盜侵國蓋物無定方事無常勢或乘利而受害或因得而更失是以吳侵齊境遂致句踐之師趙納韓地終有長平之役矧有鞭撻疲民侵軼徐部築壘擁川捨信邀利此而可忍孰不可懷是以援乘麾殞之將投石拔距之士含怒作色如赴私讎意存涉血義不旋踵攻戰之利實若有神徵兵聚衆依山傍水舉螳螂之斧被結蜣之甲當窮轍以待輪坐積薪而候燎及其鋒刃暫援埃塵旦接便巳亡戟棄戈土崩瓦解貞陽以從子之親為戎首之任非獨力屈道窮亦將無路還蜀兼亦挾子垂翅俱在籠樊將士以昧禍之心為助亂之事皆掬指舟中披甲鼓下同宗異姓纍纍相望曲直既殊強弱不等父出子孤自取其敗違卜愎諫何以辭責誠既往之難迹猶將來之可追景以鄙俚之夫遭風雲之會位登三事邑啓萬家揣身量分久當止足而周章向背離披不巳夫豈徒然意亦可見彼乃示之以利器悔之以慢藏使其勢得容姦令其時堪乘便恐尾大於身踵粗於股倔強不掉狠戾難馴呼之則反速而釁小不懲則叛遲而禍大會應遙望廷尉不肯為臣自據淮南亦欲稱帝彼梁主操行無聞輕險有素工用其短以少為多反覆山淵顛倒冠履射爵論功蕩舟稱力年既老矣耄又及之政荒民流禮崩樂壞履霜有漸堅氷且至必將禍生骨肉難起腹心強弩衝城長戟指闕徒探雀􅀢無救府藏之虛空請熊蹯詎延晷刻之命外崩中潰今實其時鷸蚌相危我乘其弊方使高旗舒斾長轂啓行迅騎追風精甲耀日四七並列百萬為羣風飄雲動星羅海運猶為岸上之虎當作水中之龍以轉石之形為破竹之勢將使錦帆渡江青蓋入洛荆棘生建業之宫麋鹿遊姑蘇之館但恐兵車之所轥轢劒騎之所蹈踐杞梓於焉傾斬竹箭以此摧殘若吳之王孫蜀之公子順時以動見幾而作面縛銜璧肉袒牽羊歸款軍門委命下吏當使焚櫬而出拂席相待必以楚材將為晉用固乃喜得異度實自利獲衡龍即援客卿之族將加驃騎之號斯盡壯士封侯之日丈夫立節之秋冬氷可折時不再來先事預懷有如皎日王侯無種工拙在人凡百君子勉求多福若不改迷坐待淪沒一旦暴骨草莽流血成川猶且不悟噬臍何及故宣往意馳此簡書檄文到彼咸共申省弼字輔玄性好名理長於筆札齊神武引掌機密甚見信待或造次不及書教直付空紙即令宣讀破芒山軍命為露布弼即書絹曾不起草性質直在霸朝多所匡正文襄嘗曰王左右賴此人天下蒙利豈獨吾家也後以忤文宣被殺藝文類聚作魏收梁武末年之事此文若為語讖討侯景檄文梁元帝夫剝極生災乃及龍戰師貞終吉方制豶豕豈不以侵陽蕩薄源之者亂階定龕艱難成之者忠義故羿澆滅於前莽卓誅於後是故使桓文之勳復興於周代溫陶之績彌盛於金行粵若梁興五十餘載平一宇內德惠悠長仁育羣生義征不服左伊右瀍咸皆仰化濁涇清渭靡不向風建翠鳳之旗則六龍驤首擊靈鼉之鼓則百神警肅風牧方邵之賢衛霍辛趙之將羽林黃頭之士虎賁緹騎之夫叱吒則風雲興起鼓動則嵩華倒拔自桐柏以北孤竹以南碣石之前流沙之後延頸舉踵交臂屈膝胡人不敢牧馬秦士不敢彎弓叶和萬邦平章百姓十堯九舜曷足云也賊臣侯景胸奴叛臣鳴鏑餘噍懸瓠空城本非國寶夀春畿要賞不踰月開海陵之倉賑常平之米檄九府之費錫三官之錢冒干貨賄不知紀極敢興逆亂梗我王畿賊臣正德阻兵安忍日者結怨江芊逺適單于簡牘屢彰彭生之魂未弭聚斂無度景卿之誚已及為虎傅翼逺相招致虔劉我生民離散我兄弟我是以董率皋貔躬擐甲胄霜戈照日則晨離奪暉龍騎蔽野則平原掩色信與江水同流氣與寒風俱憤凶醜畏威委命下吏乞活淮肥茍存徐兖渙汗既行絲綸爰被我是以班師凱歸休牛息馬賊猶不悛遂復矢流王屋兵躔象魏總章之觀非復聽訟之堂甘泉之宫永乖避暑之地坐召憲司卧制朝宰矯託天命偽作符書重增賦斂肆意裒剝生者逃竄死者暴尸道路以目庶僚鉗口刑戮失衷爵賞由心老弱波流士女塗炭臧獲之人五宗及賞縉紳之士三族見誅榖粟騰踴自相吞噬惵惵黔首路有銜索之哀蠢蠢黎民家隕常山之泣偃師南望無復儲胥露寒河陽北臨或有穹廬氊帳南山之竹未足言其愆西山之兔不足書其罪外監陳瑩之至伏承先帝登遐宫車晏駕奉諱驚號五內摧裂州寃本毒無地容身景阻飢既甚民且狼顧遂侵軼我彭蠡馮陵我郢邑竊據我江夏掩襲我巴丘我是以義勇爭先忠貞盡力斬馘凶渠不可稱算沙同赤岸水似絳河任約泥首於安南化仁面縛於漢口子仙乞活於鄢郢希榮敗績於柴桑侯景奔竄十鼠爭穴郭默清夷晉熙附義計窮力屈反殺後主畢原酆郇並離禍患凡蔣邢茅皆伏鈇鑕是可忍也孰不可容幕府據有上流實惟分陜投袂荷戈志在畢命昔周依晉鄭漢有虛牟彼惟末屬猶能如此况聨華日月天下不賤為臣為子兼國兼家者哉咸以義旗既建宜須總一共推幕府實用主盟粵以不佞謬董連率遠惟國艱不遑寧處中權後徑龔行天罰提戈蒙險隕越以之天馬千羣長戟百萬驅賁獲之士資智勇之力大楚踰荆山淺原度彭蠡舳艫泛水以掎其南輜軿委輸以衝其北華夷百濮贏糧影從雷震風駭直指建業按劒而叱江水為之倒流抽戈而揮皎日為之退舍方駕長驅百道俱入夷山殄谷充原蔽野挾輈曳牛之侣拔距磔石之夫騎則逐日追風弓則吟猿落鴈捧崑崙而壓卵傾渤海而灌熒如駟馬之載鴻毛若奔牛之觸魯縞以此衆戰誰能禦之脫復蜂蠆若毒獸窮則鬬謂山蓋高則四郊多壘謂地蓋逺則三千弗違如彼怒蛙譬諸鼷鼠豈費萬鈞無勞百溢加以日臨黃道兵起絳宫三門既啓五將咸發舉整整之旗掃亭亭之氣故以臨機密運非賊所解奉義而誅何罪不服今遣使持節大都督征東將軍開府儀同三司江州刺史尚書令長寧縣開國侯王僧辨率衆十萬直掃金陵鳴鼓聒天摐金振地朱旗夕建如赤城之霞起戈船夜動若滄海之奔流計其同惡不盈一旅君子在野小人比周荷校滅耳匪朝伊夕舂長狄之喉繫郅支之頸今司寇明罰鑕鈇所誅止侯景而已黎元何辜一無所問諸君或世樹忠貞身荷寵爵羽儀鼎族書勳王府俯眉猾豎無由自效豈不下慙泉壤上愧皇天失忠與義難以自立想誠南風乃眷西顧因變立功轉禍為福有能縛侯景及送首者封萬户開國公絹布五萬匹有能率動義衆以應官軍保全城邑不為賊用上賞方伯下賞剖符並裂山河以紆青紫昔由余入秦禮同卿佐日磾降漢且珥金貂必有其才何恤無位若執迷不反拒逆王師大軍一臨刑兹罔赦孟諸焚燎芝艾俱盡宣房河決玉石同沈信賞之科有如皎日黜陟之制事均白水檄布逺近咸使聞知太清元年東魏司徒侯景以河南十三州內屬武帝封為河南王二年帝與東魏結和景懼舉兵反臨賀王正德率衆附之進攻都城三年與景為城下之盟時勤王之師畢集元帝時為湘東王次武成未進有勑班師景違盟攻圍益急城陷帝以憂憤崩景悉兵西上帝遣王僧辨先後擒其將任約宋子仙景遁歸弒簡文并害諸王子尋僭大號六年二月王僧辨衆軍討景王馳檄告四方湘東法曹參軍蕭賁讀檄至偃師而望四語曰如體目朝廷非關序賊帝收付廷尉遂以餓終更著懷舊傳謗之為李密移郡縣檄祖君彥大魏永平元年四月二十七日魏公府上國公元帥府左長史邴元真大將軍左司馬楊德方等布告天下人倫衣冠士庶等自元氣肇闢厥初生人樹之帝王以為司牧是以羲農軒頊之後堯舜禹湯之君靡不秖畏上玄愛育黔首乾乾終日翼翼小心馭朽索以同危履薄氷而自懼故一物失所若納隍而愧之一夫有罪遂下車而泣之謙德軫於責躬憂勞切於罪已普天之下率土之濵蟠木距於流沙瀚海窮於丹穴莫不鼓腹擊壤鑿井耕田致之升平驅之仁夀是以愛之若父母敬之若神明固能享國多年祚延長世未有暴虐臨人克終天位者也隋氏往因周末預奉綴衣狐媚而圖聖寶胠篋而取神器及纘戎負扆狼虎其心始曀明兩之暉終干少陽之位先皇大漸侍疾禁中遂為梟獍便行鴆毒於是罪深於莒僕釁酷於商臣天地難容人神嗟憤加以州吁安忍閼伯日尋劒閣所以懷凶晉陽所以興亂甸人為罄淫刑斯逞夫九族既睦唐帝闡其欽明百世本枝文工表其光大况乃隳壞盤石勦滅維城脣亡齒寒寧止虞虢欲其長久其可得乎其罪一也禽獸之行在于聚麀人倫之禮别於內外而蘭陵公主逼幸告終誰謂敤首之賢敤首舜女弟名翻見齊襄之恥逮於先皇嬪御並進銀環諸王子女咸貯金屋牝雞鳴於詰旦雄雉恣其于飛衵服戲陳侯之朝穹廬同冒頓之寢爵賞之出女謁遽成公卿宣淫無復綱紀其罪二也平章百姓一日萬機未曉求衣昃晷忘食是以大禹不重於尺璧光武無隔於反支體此憂勤深慮幽枉而荒湎於酒俾晝作夜式號且呼酣嗜聲伎常居窟室每藉糟丘朝謁罕見其身羣臣希覩其面斷決自爾不行敷奏於是停擁中山千日之飲酩酊無知襄陽三雅之杯留連詎比又廣召良家充選宫掖潛為九市親駕四驢自比商人見要逆旅殷紂之譴為小漢靈之罪更輕內外驚心遐邇失望其罪三也上棟下宇著在易爻茅茨采椽陳諸史籍聖人本意惟避風雨詎待珠玉之華寧須綈錦之麗故璿室崇構商辛以之滅亡阿房崛起秦族以之傾覆而不遵古典不念前車廣立池臺多營宫觀金鋪玉戶青瑣丹墀蔽虧日月隔閡寒暑窮生人之筋力罄天下之資財使鬼尚難為之勞人固其不可其罪四也公田所籍不過十畝人力所供才止三日是以輕徭薄賦不奪農時寧積於人無藏於府而科稅繁猥不知紀極猛火屢燒漏巵難滿頭會箕斂逆折十年之租杼軸其空日損千金之費父母不保其赤子夫妻相棄於匡牀萬邦則城郭空虛千室則煙火斷絶西蜀王孫之室翻同原憲之貧東海糜竺之家俄成鄧通之鬼其罪五也古先哲王卜征巡狩唐虞五載周則一紀本欲親問疾苦觀省方俗乃復廣積薪芻多聚饔餼年年歷覽處處登臨從臣疲弊供頓辛苦而飄風凍雨聊竊比於前驅車轍馬迹遂周行於天下秦皇之心未巳周穆之意難窮宴西母以歌雲浮東海以觀日家苦納秸之勤人阻來蘇之望且夫天子有道守在海外夷不亂華在德非險長城之固戰國所為乃是狙詐之風非關稽古之法而乃追蹤秦代版築更興襲其基墟延袤萬里遂使尸骸蔽野血流成河積怨比於丘山號哭動於天地其罪六也遼水之東朝鮮之地禹貢以為荒服周王棄而不臣示以羈縻達其聲教茍欲愛人非求拓土又強弩末矢理無穿於魯縞衝風餘力詎能動於鴻毛石田得而無堪雞肋食而何用而恃衆怙強窮兵黷武惟在并吞不務長策夫兵猶火也不戢將自焚遂使億兆夷人隻輪莫返夫差喪國實為黃池之盟苻堅滅身良由夀陽之役欲捕鳴蟬於前不知黃雀於後復矢相顧髽弔成行義夫切齒壯士扼腕其罪七也直言啓沃王臣匪躬惟木從繩若金須礪唐堯建鼓思聞獻替之言夏禹懸鞞時聽針規之美而乃愎諫違卜妒賢嫉能直士正人皆由屠戮左僕射齊國公高熲上柱國宋國公賀若弼或文昌上相或細柳功臣暫吐良藥之言翻加屬鏤之賜龍逢無罪便遭夏癸之誅王子何辜濫被商辛之戮遂令君子結舌賢人緘口指白日而為盛射蒼天而敢欺不悟國之將亡不知死之將至其罪八也設官分職貴在銓衡察獄問刑無聞賂鬻而錢神起論銅臭為公梁冀受黃金之蛇孟他薦葡萄之酒遂使彞倫攸斁政以賄成君子在野小人在位積薪居上驗汲黯之言囊錢不如傷趙一之賦其罪九也宣尼有言無信不立用命賞祖義豈食言自獨夫嗣位每歲行幸南北巡狩東西征伐至如浩釁陪蹕東都守固閿鄉野戰鴈門解圍自外征夫不可勝紀既立功勳須酬官爵而志懷翻覆言亦浮詭臨危則勳賞懸授克定則絲綸不行異商鞅之賚金同項王之刓印芳餌之下必有懸魚惜其重賞求其死力走丸逆坂譬此非難凡百驍雄莫不讎忿至於匹夫蕞爾宿諾不虧既在乘輿二三其德其罪十也有一於此未或不亡况四維不張三空總萃無小無大愚夫愚婦共識殷亡咸知夏滅罄南山之竹書罪無窮決東海之波流惡難盡是以窮竒災於上國猰㺄暴於中原三河縱封豕之貪四海被長蛇之毒百姓殲亡殆無遺類十分之計才一而巳蒼生凜凜咸憂杞國之崩赤縣嗷嗷俱愁歷陽之陷且國祚將改必有常期六百喪殷之年三十終姬之數故讖籙皆云隋氏三十六年而滅此則厭德之象已彰代終之兆先見皇天無親惟德是輔况乃欃槍竟天申繻謂之除舊歲星入井甘公以為義興兼以朱雀門燒正陽日食狐鳴鬼哭川竭山崩並是宗廟為墟之妖荆棘旅庭之事夏氏則災釁非多殷人則咎徵更少牽牛入漢方知大亂之期王良䇿馬始驗兵車之會今者順人將革先天不違大誓孟津陳盟景亳三千列國八百諸侯不謀而同辭不召而自至轟轟隱隱如霆如雷雕虎嘯而谷風生應龍驤而景雲起我魏公聰明神武齊聖廣淵備七德而在躬包九功而挺出周太保魏國公之孫上柱國蒲山公之子家傳盛德武王承季歷之基地啓元勳世祖嗣元皇之業篤生白水日角之相更彰載誕丹陵天表之文斯著加以姓符圖緯名協歌謡六合所以歸心三陵于焉改卜文王厄於羑里赤雀方來高祖隱於碭山彤雲自起兵誅不道赤伏至自長安鋒鋭難當黃星出於梁宋九五龍飛之始大人豹變之初歷試諸囏大敵彌勇上柱國司徒東郡公翟讓功宣締搆翼亮經綸伊尹之贊成湯蕭何之輔高帝上柱國總管歷城公孟讓上柱國左武侯大將軍單雄信上柱國右武侯大將軍徐績柱國大將軍左長史邴元真絳國公裴行儼等並運籌千里勇冠三軍繫劒則截蛟斷鼇彎弧則啼猿落鴈韓彭絳灌成沛公之基冦賈吳馮奉蕭王之業復有蒙輪挾輈之士拔距投石之夫冀馬追風吳戈照日魏公屬當期運撫兹億兆躬擐甲胄跋涉山川櫛風沐雨豈辭勞倦遂興西伯之師將問南巢之罪百萬成旅四七為名呼吸則河渭絶流叱吒則嵩華自拔以此攻城何城不克以此擊陳何陳不摧譬猶決滄海而濯殘熒舉昆崘而壓小卵鼓行而西百道俱進以四月二十一日屇於東都而昏朝文武留守段達韋津皇甫無逸等昆吾惡稔蜚廉姦佞尚迷天數敢拒義師驅率醜徒衆有十萬自回洛倉北遂來舉斧於是熊羆角逐貔虎爭先因爾倒戈之心乘我破竹之勢曾未旋踵瓦解氷消坑卒則長平未多積甲則熊耳為小達等助桀為虐嬰城自固梯衝亂舞徒設九拒之謀鼓角潛鳴空憑百樓之險燕巢衛幕魚遊宋池殄滅之期匪朝伊夕然興洛虎牢國家儲積我並先據為日久矣又得回洛復取黎陽天下倉儲盡非隋有四方赴義萬里如雲足食足兵無前無敵裴光祿仁基雄才上略受脤專征遐邇攸憑安危是託乃識機知變遷虞事夏袁謙擒於藍水張須陀獲在滎陽竇慶戰沒於睢陽郭絢授首於河北隋之亡候斷可知也清河公房彥藻近秉戎律略地東南師之所臨風行電擊安陸汝潁隨機蕩定淮安濟陽俄然送款徐圓朗已平魯郡孟海公久破齊隂於是海內英雄咸來響應封民瞻取平原之境郝孝德據黎陽之倉李士雄虎視於長平王德仁鷹揚於上黨滑郡公李景考功郎中房孝基發自臨渝劉興祖起於北朔崔伯駒自潁川起房獻伯以譙郡來各擁數萬之兵俱期牧野之會滄溟之右函谷以東牛酒溢於軍前壺漿迎於道左諸君等並衣冠世胄杞梓良材歆神靈澤之秋裂地封侯之始豹變雀起今也其時鼉鳴龜應見機而作各宜鳩率子弟共建功名耿弇之赴光武蕭宗之奉高帝當以金章紫綬華蓋朱輪富貴以重當年忠貞以傳奕葉豈不盛哉若隋代官人同夫桀犬尚荷王莽之恩仍懷蒯瞶之祿審配死於袁氏不如張郃歸曹范增困於項王未若陳平從漢魏公推以赤心當加好爵擇木而處幸不自疑脫其猛虎猶與舟中敵國夙沙之民共縛其主彭寵之僕自殺其君高官上賞即以相授如暗於成事守迷不返崑岡縱火玉石俱焚爾等噬臍悔將何及黃河帶地明余旦旦之言皎日麗天知我勤勤之志布告天下咸使聞知祖君彥珽之子也容貌短小言辭澀訥而有才學薛道衡嘗薦之隋文帝帝曰是非殺斛律明月人兒耶朕無用之煬帝立尤忌知名士調宿城令負其才常思亂及為密草檄乃深斥主闕密敗世充見之曰汝為賊罵國足未令撲之世充中悔命醫視之郎將王拔柱曰弄筆生有餘罪乃蹙其心即死為李密檄滎陽守郇王慶文魏徵早挹芳猷未諧披展甚為翹佇興寢增勞寒勢轉嚴比得清吉及處危城無乃憂悴自猜狂嗣位多歷歲年剝削黔黎塗毒天下瓊室瑶臺之麗未極驕奢糟丘酒池之荒非為淫亂加以違忠臣之諫從婦人之言殺戮忠良科稅無巳是以蝟毛而起豹變其文共舉義旗同翦凶虐今者屯營鞏洛開發太倉賑恤飢羸咸從充健吳戈電照𨽻首算而無窮冀馬雲屯𢎞羊計而難盡是以八方並湊萬里俱來莫不期入關以亡秦爭渡河而滅紂東窮海岱南洎江淮凡厥遺黎承風慕義唐公起兵晉陽軍臨灞岸三秦父老千里犒師叶義同心共為犄角元寶藏武陽興義即取黎陽燕趙之郊來蘇成詠惟榮陽一郡仍獨守迷爰以宗盟尚疑銜璧敬陳針藥冀愈膏肓夫微子紂之元兄親實為重項伯籍之季父戚乃非疏然猶去朝歌而處周背西楚而歸漢豈不眷戀宗祊留連骨肉但為識寶鼎之將移知神器之先改河決不可壅樹顛不可維所謂玄覽通人明鑒君子者矣而王之先代家住山東本姓郭氏乃非楊族止為宿與隋朝頗有勳舊遂得預沾磐石名在葭莩婁敬之與漢高殊非血胤吕布之於董卓良異天親芝焚蕙歎事不同此又王之昏主心若豺狼讎忿同胞有逾沈閼惟勇及諒咸罄甸師魏文之毒任城漢武之鴆河獻假使宗祧是一疏不間親况乃族類為非有何疑阻王之為臣無所獻納不能曲突徙薪除煩去惑致令四海鼎沸百姓亂麻高壘深溝自固而巳藩屏之寄豈若是乎欲免大責其可得也為王計者莫若舉城從義開門送款識幾知變足為美談乃至子孫長守富貴今王世充屢被摧破偷存漏刻段達守東都窘迫自救無聊世充朝亡彼便夕死又江都荒酣酒色流湎忘歸內外崩離人神怨憤上江米船皆被抄截士卒飢餒半菽不充事切析骸義均煮弩舉烽火於驪山諸侯莫至浮膠船於漢水還日未期近得朱粲啓詞鋭師百萬已破襄陽總帥熊羆沿流東下尅期指日定滅江都分項籍於五侯切王莽於千段王獨守孤城援絶千里餱糧之計僅有月餘弊卒之多才盈數百有何恃賴欲相抗拒求枯魚於市肆即事非遙因歸鴈以運糧竟知何日然城中雄傑王之腹心思殺長吏將為內應只恐禍生匕首釁起蕭牆枉以七尺之形徒償千金之購可為寒心可為酸鼻者也今貔貅百萬馬首欲東惟待王世充破了鼓行東邁梯衝亂舞鼓角潛鳴笑虢叔之死馬悲襄陽之噍類南陽首齮封侯之事杳然東門逐獵臨行之歎何晚深相愛惜裂帛裁書幸可三思自求多福慶隋郇王𢎞之子𢎞為文帝從祖弟武元帝與周文帝在關中𢎞適在鄴因冒郭氏周滅齊𢎞始入關文帝委以腹心既代周封為河間王煬帝初追封郇王子慶嗣慶傾曲善候時變帝猜忌骨肉惟慶得全遷滎陽太守李密反慶拒守密遺慶書慶遂降改姓為郭密破歸東都又為楊氏越王侗不之責也王世充僭號降為郇公復姓郭世充敗歸唐復姓楊仍封郇公然則慶實楊氏密書不過説之降耳而慶反覆於羣雄間倐楊倐郭極為可笑然卒以得全其亦幸也夫代徐敬業傳檄天下文駱賔王偽臨朝武氏者人非和順地實寒微昔充太宗下陳曾以更衣入侍洎乎晚節穢亂春宫密隱先帝之私隂圖後房之嬖入門見嫉蛾眉不肯讓人掩袖工讒狐媚偏能惑主踐元后於翬翟陷吾君於聚麀加以虺蜴為心豺狼成性近狎邪僻殘害忠良殺姊屠兄弒君鴆母人神之所同嫉天地之所不容猶復包藏禍心竊窺神器君之愛子幽之於别宫賊之宗盟委之以重任嗚呼霍子孟之不作朱虛侯之已亡燕啄皇孫知漢祚之將盡龍漦帝后識夏庭之遽衰敬業皇唐舊臣公侯冢胤奉先君之成業荷本朝之舊恩宋微子之興悲良有以也袁君山之流涕豈徒然哉是用氣憤風雲志安社稷因天下之失望順宇宙之推心爰舉義旗誓清妖孽南連百越北盡三河鐵騎成羣玉軸相接海陵紅粟倉儲之積靡窮江浦黃旗匡復之功何遠邊聲動而北風起劒氣衝而南斗平喑嗚則山嶽崩頽叱吒則風雲變色以兹制敵何敵不摧以此圖功何功不克公等或居漢地或叶周親或膺重寄於爪牙或受顧命於宣室言猶在耳忠豈忘心一抔之土未乾六尺之孤安在儻能轉禍為福送往事居共立勤王之功無廢舊君之命凡諸爵賞同指山河若其眷戀窮城徘徊岐路坐昧先機之兆必貽後至之誅請看今日之域中竟是誰家之天下移檄州郡咸使聞知后得此檄讀之但嘻笑至一抔之土未乾六尺之孤安在矍然曰誰為之或以賔王對后曰宰相安得失此人會友人遊山檄失名人有殘縑敗素繪一山一水愛之若寶售之必千金至于目與真景會則略不加喜毋乃貴偽而賤真耶求真之樂今日正在我輩春雪既霽春風亦和或坐釣於鷗邊或行歌於犢外百年瞬息歡樂幾何肴核杯盤隨意所命無以豐約拘也檄書馳告盍勇而前此檄載林昉田間書惜失名氏姑附于此文之有檄與彈事也皆殺機也彈以甘蕉終檄以遊山終殺機之幻者也噫天下事皆幻也可以恍然思矣四六法海卷八
