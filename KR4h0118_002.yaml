body:
  text: 四六法海卷二明王志堅編謝平原內史表陸機陪臣陸機言今月九日魏郡太守遣兼丞張舍賫板詔書印綬假臣為平原內史拜受祇竦不知所裁臣機頓首頓首死罪死罪臣本出自敵國世無先臣宣力之效才非丘園耿介之秀皇澤廣被惠濟無遠擢自羣萃纍蒙榮進入朝九載厯官有六身登三閣宦成兩宫服冕乘軒仰齒貴游振景拔迹顧邈同列施重山嶽義足灰沒遭國顛沛無節可紀雖蒙曠蕩臣獨何顔俯首頓膝憂愧若厲而橫為故齊王同所見枉陷誣臣與衆人共作禪文幽執囹圄當為誅始臣之微誠不負天地倉卒之際慮有逼迫乃與弟雲及散騎侍郎袁瑜中書侍郎馮熊尚書右丞崔基廷尉正顧榮汝隂太守曹武思所以獲免隂蒙避回﨑嶇自列片言隻字不關其間事蹤筆跡皆可推校而一朝翻然更以為罪蕞爾之生尚不足吝區區本懷實有可悲畏逼天威即罪惟謹鉗口結舌不敢上訴所天莫大之釁日經聖聽肝血之誠終不一聞所以臨難慷慨而不能不悢悢者唯此而已重蒙陛下愷悌之宥回霜收電使不隕越復得扶老攜幼生出獄户懷金拖紫退就散輩感恩惟咎五情震悼局天蹐地若無所容不悟日月之明遂垂曲照雲雨之澤播及朽瘁忘臣弱才身無足采哀臣零落罪有可察茍削丹書得夷平民則塵洗天波謗絶衆口臣之始望尚未至是猥辱天命顯授符虎使春枯之條更與秋蘭垂芳陸沈之羽復與翔鴻撫翼雖安國免徒起紆青組張敞亡命坐致朱軒方臣所荷未足為泰豈臣蒙垢含吝所宜忝竊非臣毁宗夷族所能上報喜懼參并悲慚哽結拘守常憲當便道之官不得束身奔走稽顙城闕瞻係天衢馳心輦轂臣不勝屏營延仰謹拜表以聞機字士衡吳郡人抗之子吳亡歸晉趙王倫輔政引為相國參軍倫將篡位以為中書郎倫之誅也齊王冏收機等九人付廷尉成都王頴吳王晏救之得減死機感頴恩遂委身焉頴以機參大將軍軍事表為平原內史此文體之初變者也今讀之猶有漢人風味薦譙元彥表桓溫臣聞大朴既虧則髙尚之標顯道喪時昏則忠貞之義彰故有洗耳投淵以振𤣥邈之風亦有秉心矯跡以敦在三之節是故上代之君莫不崇重斯軌所以篤俗訓民靜一流競伏惟大晉應符御世運無常通時有屯蹇神州丘墟三方圮裂兔罝絶響於中林白駒無聞於空谷斯有識之所悼心大雅之所歎息者也陛下聖德嗣興方恢天緒臣昔奉役有事西土鯨鯢既懸思宣大化訪諸故老搜揚濳逸廉武羅於羿浞之墟想王蠋於亡齊之境竊聞巴西譙秀植操貞固抱德肥遁揚清渭波于時皇極遘道消之會羣黎蹈顛沛之艱中華有顧瞻之哀幽谷無遷喬之望凶命屢招奸威相逼身寄虎吻危同朝露而能抗節玉立誓不降辱杜門絶跡不面僞庭進免龔勝亡身之禍退無薛方詭對之譏雖園綺之棲商洛管寧之默遼海方之於秀殆無以過于今西土以為美談夫旌德禮賢化道之所先崇表殊節聖哲之上務方今六合未康豺豕當路遣黎偷薄義聲弗聞益宜振起道義之徒以敦流遁之敝若秀蒙蒲帛之徴足以鎮靜頽風軌訓囂俗幽遐仰流九服知化矣譙秀字元彥巴西人周之孫性靜不交於俗李雄盜蜀徴秀不應躬耕山藪桓溫平蜀後薦之時以秀篤老故不徴遣使勑所在四時存問年九十餘卒乞恤録王濬後表桓溫臣聞崇德賞功為政之所先興滅繼絶百王之所務故德參時雍則奕世承祀功烈一代則永錫祚𦙍案故撫軍王濬厯職內外任兼文武料敵制勝眀勇獨斷義存社稷之利不顧専輒之罪荷戈長騖席捲萬里僭號之吳面縳象魏今皇澤被於九州𤣥風洽於區外襄陽之封廢而莫續恩寵之號墜於近嗣遐邇酸懷臣竊悼之濬今有二孫年出六十室如懸罄糊口江濵四節蒸嘗菜羮不給昔漢髙定業求樂毅之嗣世祖旌賢建葛亮之𦙍夫效忠異代立功異國尚通天下之善使不泯棄况濬建元勳於當年著嘉慶於身後靈基託根於南垂皇祚中興於江左舊物克彰神器重耀豈不由伊人之功力也哉誠宜加恩少垂矜憫追録舊勳纂錫茅土則聖朝之恩宣暢於上忠臣之志不墜於地矣濬有二孫過江不見齒録安西將軍桓溫鎮江陵表言云云卒不見省謝封康樂公表謝靈運昔强氐暴虐恃僭厯紀既噬五都志吞六合遂陷沒西河傾覆南漢凌藉紀郢跨越淮泗于時䇿畫惟疑地險已謝咸懼君臣同泯有生無餘亡祖奉國威靈董符崇重盡心所事剋黜禍亂功參盤鼎胙土南服逮至臣身值遭泰路日月改暉榮落代運輸稅唐化生幸無己不悟天道下濟鴻鈞曲成乃眷遐績式是興徴分虎鈿龜復顯茅土鳴玉拖紱班景元勳澤洽往德恩覃來𦙍永惟先蹤逺感崩結豈臣虺弱所當祗承臣聞至公無私甄善則一皇恩逺被殊代可侔是以信陵之賢簡在髙祖之心望諸之道復獲隆漢之封觀史歎古欽兹盛美豈謂榮渥近霑微躬傾宗殞元心識其會酬恩答厚罔知所由靈運𤣥之孫宋初襲封康樂公此表通篇皆不忘晉是其微意薦周續之表劉栁恢耀和肆必在兼城之寶翼亮崇本宜紓髙世之逸是以渭濵佐周聖德廣運商洛匡漢英業乃昌伏惟陛下道邁振古應天繼期游外暢於冥內體逺形于應近雖汾陽之舉輟駕於時艱眀揚之㫖潛感于窮谷矣竊見周續之清真貞素思學鉤深弱冠獨往心無近事性之所遣榮華與饑寒俱落情之所慕巖澤與琴書共逺加以仁心內發義懷外亮留愛崑山誠著桃李若升之宰府必鼎味斯和濯纓儒官亦王猷遐緝臧文不知失在降賢言偃得人功由升士願照其丹欵不以人廢言續之字道祖雁門廣武人其先過江居豫章十二通五經五緯號曰十經既而入廬山事逺公時與劉遺民陶淵眀號潯陽三隱江州刺史劉栁薦之宋武帝辟太尉掾不就帝即位召之為開館集生徒乘輿幸焉晚以病移鍾山卒栁湛之父也刺史廣州薦從事朱萬嗣表陸徽陵雪褒頴貞柯必振尊風賞流清原斯挹是以衣囊揮譽於西京折轅延髙於東帝伏見朱萬嗣理業冲夷秉操純白行稱私庭能著官政雖氏非世祿宦無通資而隨牒南服位極僚首九綜州綱三端府職頻掌蕃機屢績符守年暨知命廉尚愈髙氷心與貪流爭激霜情與晚節彌茂厯宰金山家無寶鏤之飾連組珠海室靡璫珥之珍確然守志不求聞達實足以澄革汙吏洗鏡貪氓臣謬忝司牧任専萬里雖情祇慎擢才闕豪露敢罄愚陋舉其所知如得提名禮闈抗迹朝省摶嶺表之清風負水宇之潔望則恩融一臣而施光萬物敢緣天澤雲行時德雨施每甄外州榮加逺國是以獻其瞽言希垂聽覽徽字休猷吳郡吳人宋文帝元嘉十五年除廣州刺史加督清名亞王鎮之二十三年為益州刺史亦加督恤隱有方威惠兼著蜀土安之卒于官家無餘財文帝痛惜之諡曰簡讓婚表虞通之伏承詔㫖當以臨海公主降嬪榮出望表恩加典外顧審輶蔽伏用憂惶臣寒門悴族人凡質陋閭閻有對本隔天姻如臣素流家貧業寡年近將冠皆已有室荆叉布裙足得成禮每不自解無偶迄兹媒訪莫尋素族弗問自惟門慶屢降公主天恩所覃庸及醜末懷憂抱惕慮不獲免徴命所當果膺兹舉雖門忝宗榮於臣非幸仰緣聖貸冒陳愚實自晉氏以來配尚王姬者雖纍經美胄亟有名才至如王敦懾氣桓溫斂威真長佯愚以求免子敬炙足以違禍王偃無仲都之質而裸雪於北階何瑀闕龍工之姿而投軀於深井謝莊殆自害於矇叟殷冲幾不免於强鉏彼數人者非無才意而勢屈於崇貴事隔于聞覽吞悲茹氣無所逃訴制勒甚於僕𨽻防間過於婢妾行求出入人理之常當待賔客朋從之義而今掃轍息駕無窺門之期廢筵抽席絶接對之理非惟交友離異乃亦兄弟疏濶第令受酒肉之賜制以動靜監子待錢帛之私節其言笑姆妳爭媚相勸以嚴尼媪競前相諂以急第令必凡庸下才監子皆葭萌愚豎議舉止則未間是非聽言語則謬於虛實姆妳敢恃耆舊唯贊妬忌尼媪自唱多知務檢口舌其間又有應答問訊卜筮師母乃至殘餘飲食詰辨與誰衣被故弊必責頭領又出入之宜繁省難衷或進不獲前或入不聽出不入則嫌於欲踈求出則疑有别意召必以三晡為期遣必以日出為限夕不見晚魄朝不識曙星至於夜步月而弄琴晝拱袂而披卷一生之內與此長乖又聲影裁聞則少婢奔迸裾袂向席則醜老叢來左右整刷以疑寵見嫌賔客未冠以少容致斥禮有别媵象有貫魚本無嫚嫡之嫌豈有輕婦之誚今義絶傍私䖍恭正匹而每事必言無儀適設辭輒云輕易我又竊聞諸主聚集唯論夫族緩不足為急者法急則可為緩者師更相扇誘本其恆意不可貸借固實嘗辭或云野敗去或云人笑我雖曰家事有甚王憲發口所言恆同科律王藻雖復彊狠頗經學陟戲笑之事遂為寃魂禇曖憂憤用致夭絶傷理害義難以具聞夫螽斯之德實致克昌専妬之言有妨繁衍是以尚主之門往往絶嗣駙馬之身通離釁咎以臣凡弱何以克堪必將毁族淪門豈伊身責前後嬰此其人雖衆然皆患彰遐邇事隔天朝故吞言咽理無敢論訴臣幸屬聖明矜照由道𢎞物以典處親以公臣之鄙懷可得自盡如臣門分世荷殊榮足守前基便預提拂清官顯位或由才升一叨婚戚咸成恩假是以仰冒非宜披露丹實非唯止陳一已規全身願實乃廣申諸門受患之切伏願天慈照察特賜蠲停使燕雀微羣得保叢蔚蠢物憐生自己彌篤若恩詔難降披請不申便當刋膚削髮投山竄海南史云宋眀帝疾前代公主之妬適江斆當尚孝武女乃使人為斆作表讓婚帝以此表示諸主以諷切之今按藝文類聚作虞通之此篇頗為一種俗調作俑姑存以備一體至于役僧一書滿紙齊飯酸餡氣大非雅士所賞也謝除宫僚表孔稚圭皇太子霞褰青殿日晃春宫駕紫谷之英振洛笙之響自非氣上白雲韻同明月何以延芳芝苑插羽瓊條竇嬰戚貴于西京陸曄風嘉于東國伊人之美方曰可舉孔稚圭南史作孔圭字德璋會稽山隂人好文詠飲酒與外兄張融情趣相得又與王思逺何㸃㸃弟𦙍並欵交不樂世務門庭之內草萊不翦中有蛙鳴或問之答曰以此當兩部鼓吹永元元年為太子詹事代蕭侍中敦勸表江淹臣公言即日侍中臣惠基給事黃門侍郎臣王僧珍至朱蓋乘雲𤣥軒肅霧墜髙天之㫖集微臣之軀神爽矍然斂影無地臣缺長血心未啓素槩辭從意空言隨事盡不能降陛下一時之恩借俄頃之照遂枉近侍貂簪軾庭臣自亮無庸何以集此退咎慊誠悲枉垂光進戒朝訓虧兹盛序感慮躑躅榮結夢寐臣檢古少例巡今逾疑豈有妄叨天功虛竊上賞近謬國華坐取隆貴人見其過外惜皇猷內畏私眚昔西京鼎秩漢世權家丹墀網户擊鍾連騎何嘗不以驕滿貽戾謙冲要福者哉臣不能遵煙洲而謝岐伯迎雲山而揖許由激昂榮華之間沈潛印組之內光飾既超寵臨亦逺江左以來罕見其倫今位冠朝端通侯萬户結象弭於前衡奏金管於後陳都野宗其榮盛視聽敬其炎貴臣一旦居之誰以為不忝者乎而陛下猶崇以異禮者是增臣之戾也况復肅延華勸實深窘迫伏願俯矜單志賜遂前情則世寢橫議臣蒙緩責淹字文通初在建平王府被黜為吳興令齊髙帝輔政聞其才召之時沈攸之作亂淹為言公有五勝彼有五敗帝悅補記室參軍髙帝諸章表皆淹製也齊眀輔政淹為御史中丞遷祕書監兼衛尉梁武至新林微服來奔天監元年為散騎常侍左衛將軍臨沮縣伯謂子弟曰吾功名既立欲歸身草萊耳以疾遷金紫光祿大夫醴陵侯卒諡曰憲為栁世隆讓封公表沈約臣聞懸旌玉塞二師尚黜其功伐鼓炎州伏波猶懼其賞徒以兼委之施或難固辭抽心之情必無雙奪是故俯容青閣願還慈於裂壤竊步丹墀希收寵於開賦昔竄命窮雉難迫勢孤沈板未難負户非切及顧溫凊之館懼結尊慈之懷纍葉喁喁舉門惴惴臣事逼君親理非外奬實賴朝謨謹肅宰略遐震奔鯨外剿臣何力焉幸得扶老攜幼重出幽堵還軸歸驂再踐鄉路豈可資國眚以邀其功因家勷而饗其報遂使甘霜受電之心有同於飾請皎日大河之志匪殊於貌謁世隆元景之弟子以破沈攸之功封貞陽縣侯齊髙帝踐祚進爵為公約字休文吳興武康人初武帝在西邸與約遊舊建康平引為驃騎司馬禪代之事約首發之帝即位約久處端揆有志台司而帝終不用嘗夢齊和帝斷其舌乃呼道士奏赤章于天稱事不由已帝聞數譴責之約懼而卒有司請諡文帝曰懷情不盡曰隱故改為隱嘗撰四聲譜自謂入神之作帝雅不好而詩家至今遵用之為齊眀帝讓宣城郡公第一表任昉臣鸞言被臺召以臣為侍中中書監驃騎大將軍開府儀同三司揚州刺史録尚書事封宣城郡開國公食邑三千户加兵五千人臣本庸才智力淺短太祖髙皇帝篤猶子之愛降家人之慈世祖武皇帝情等布衣寄深同氣武皇大漸實奉話言雖自見之眀庸近所蔽愚夫一至偏識量己實不忍自固于綴衣之辰拒違于玉几之側遂荷顧託導揚末命雖嗣君棄常獲罪宣德王室不造職臣之由何者親則東牟任惟博陸徒懷子孟社稷之對何救昌邑爭臣之譏四海之議于何逃責且陵土未乾訓誓在耳家國之事一至于斯非臣之尤誰任其咎將何以肅拜髙寢䖍奉武園悼心失圖泣血待旦寧容復徼榮于家恥宴安于國危驃騎上將之元勳神州儀刑之列嶽尚書古稱司會中書實管王言且虛飾寵章委成禦侮臣知不愜物誰謂宜但命輕鴻毛責重山嶽存沒同歸毁譽一貫辭一官不減身纍增一職已黷朝經便當自同體國不為飾讓至于功均一匡賞同千室光宅近甸奄有全邦隕越為期不敢聞命亦願曲留降鑒即垂順許巨平之懇誠彌固永昌之丹慊獲申乃知君臣之道綽有餘裕茍曰易昭敢守難奪故可庶心𢎞議酌已親物者矣不勝荷懼屏營之至延興元年七月鸞奉新安王昭即位遂有此授十月丁酉進爵為王辛亥廢帝為海陵王宣城王即位初昉具此草帝惡其詞斥甚愠終建武中昉位不過列校王伯厚有言作文忌切題切題則有嫌昉字彥升樂安博昌人尤長為筆才思無窮當時王公表奏無不請焉起草即成不加點竄昉為人至孝祿奉所收四方餉遺皆頒之親戚即日便盡守新安卒于官無以為斂遺言不許以新安一物還都為范尚書讓吏部侯封第一表任昉臣雲言被尚書召以臣為散騎常侍吏部尚書封霄城縣開國侯食邑千户奉命震驚心顔無措臣雲頓首頓首死罪死罪臣素門凡流翰翮無取進謝中庸退慙狂狷固嘗鑽厲求學而一經不治篆刻為文而三冬靡就負書燕魏空殫菽粟躡屩齊楚徒知貧賤既而分虎出守以囊被見嗤持斧作牧以薏苡興謗赭衣為虜見獄吏之尊除名為民知井臼之逸百年上夀既曰徒然如其誠說亦已過半亂離斯瘼欲以安歸閉門荒郊再離寒暑兼以東臯數畝控帶朝夕關外一區悵望鍾阜雖室無趙女而門多好事祿微賜金而歡同娛老折芰燔枯此焉自足陛下應期萬世接統千祀三千景附八百不謀臣釁等離心功慙同德泥首在顔輿棺未毁締構草昧敢叨天功獄訟謳歌示同民志而隆器大名一朝總集顧已及躬何以臻此政當以接閈白水列宅舊豐忘捨講之尤存諸公之費俯拾青紫豈待明經臣雲頓首頓首死罪死罪夫銓衡之重關諸隆替逺惟則哲在帝猶難漢魏以降達識繼軌雅俗所歸唯稱許郭拔十得五尚曰比肩其餘得失未聞偶察童幼天機暫發顧無足算在魏則毛玠公方居晉則山濤識量以臣况之一何遼落齊季陵遲官方淆亂鴻都不綱西園成市金章有盈笥之談華貂深不足之歎草創惟始義存改作恭己南面責成斯在豈宜妄加寵私以乏王事附蟬之飾空成寵章求之公私授受交失近世侯者功緒參差或足食關中或成軍河內或制勝帷幄或門人加親或與時抑揚或隱若敵國或䇿定禁中或功成野戰或盛德如卓茂或師道如桓榮或四姓侍祠已無足紀五侯外戚且非舊章而臣之所附唯在恩澤既義異疇庸實榮乖儒者雖小人貪幸豈獨無心臣本自諸生家承素業門無富貴易農而仕乃祖𤣥平道風秀世爰在中興儀刑多士位裁元凱任止牧伯髙祖少連夙秉髙尚所富者義所乏者時薄宦東朝謝病下邑先志不忘愚臣是庶且去嵗冬初國學之老博士耳今兹首夏將亞冢司雖千秋之一月九遷荀爽之十旬逺至方之微臣未為速達臣雖無識唯利是視至于虧名損實為國為身知其不可不敢妄冒陛下不棄菅蒯愛同絲麻儻平生之言猶在聽覽宿心素志無復二辭矜臣所乞特回寵命則彞章載穆微物知免臣今在假不容詣省不任荷懼之至雲字彥龍南鄉舞隂人初與梁武帝俱在竟陵王子良西邸情好歡甚帝時己有徴應雲盡心推事帝兵至都張稷遣雲銜命至石頭遂參謀議既即位因有此除雲嘗為廣州刺史為豪族談儼所訴徴下獄赦免所謂赭衣為伍者也為范始興作求立太宰碑表任昉臣雲言原夫存樹風猷沒著徽烈既絶故老之口必資不刋之書而藏諸名山則陵谷遷貿府之延閣則青編落簡然則配天之迹存乎泗水之上素王之道紀于沂川之側由是崇師之義擬迹于西河尊主之情致之于堯禹故精廬妄啓必窮鐫勒之盛君長一城亦盡刋刻之美况乎甄陶周召孕育伊顔故太宰竟陵文宣王臣某與存與亡則義形社稷嚴天配命則周公其人體國端朝出藩入守進思必告之道退無茍利之専五教以倫百揆時序若夫一言一行盛德之風琴書藝業述作之茂道非兼濟事止樂善亦無得而稱焉人之云亡忽移嵗序鴟梟東徙松檟成行六府臣僚三藩士女人蓄油素家懷鉛筆瞻彼景山徒然望慕昔晉氏初禁立碑魏舒之亡亦從班列而阮略既泯故首冒嚴科為之者竟免刑戮置之者反蒙嘉歎至于道被如仁功參微管本宜在常均之外故太宰淵丞相嶷親賢並軌即為成規乞依二公前例賜許刋立寧容使長想九原樵蘇罔識其禁駐驆長陵輶軒不知所適臣閭里孤賤才無可甄值齊網之𢎞弛賔客之禁䇿名委質忽焉二紀慮先犬馬厚恩不答而敝帷毁蓋未蓐螻蟻珠襦玉匣遽飾幽泉陛下𢎞奬名教不隔微物使臣得駿奔南浦長號北陵既曲逢前施實仰覬後澤儻驗杜預山頂之言庶存馬駿必拜之感臨表悲懼言不自宣建武中雲上此表事竟不行為蕭揚州作薦士表任昉臣聞求賢暫勞垂拱永逸方之疏壤取類導川伏惟陛下道德旒纊信充符璽六飛同塵五讓髙世白駒空谷振鷺在庭猶懼隱鱗卜祝藏器屠保物色關下委裘河上非取製于一狐諒求味于兼采而五聲倦響九工是詢寢議廟堂借聽輿皂臣位任隆重義兼家邦實欲使名實不違徼幸路絶勢門上品猶當格以清談英俊下僚不可限以位貌竊見祕書丞王暕七葉重光海內冠冕神清氣茂允迪中和叔寶理遣之談彥輔名教之樂故以暉映先達領袖後進居無塵雜家有賜書辭賦清新屬言𤣥遠室邇人曠物踈道親養素丘園台階虛位庠序公朝萬夫傾望豈徒荀令可想李公不亡而已哉前侯官令王僧孺理尚棲約思致恬敏既筆耕為養亦傭書成學至乃集螢映雪編蒲緝栁先言往行人物雅俗甘泉遺儀南宫故事畫地成圖抵掌可述豈直鼮鼠有必對之辨竹書無落簡之謬暕坐鎮雅俗𢎞益已多僧孺訪對不休質疑斯在並東序之祕寶瑚璉之茂器誠言以人廢而才實世資臨表悚戰猶懼未允齊明帝詔求異士始安王遙光有此奏暕儉之子僧孺肅之八世孫祖父皆大僚蓋六朝論人大抵重門望也其後僧孺為郡參選持廉秉公獨以一眚被廢暕不能留心寒素頗不稱薦詞云為皇太子求一日一朝表任昉臣聞內豎告安姬昌怡色鳴雞戒旦周發冠履或以凉燠之後晨昏異宜膳羞之和鼎飪殊節一辰三朝稱情猶簡終日承顔在理斯愜且長夀之對撫循無已馳道未窮顧懷不輟豈直下動天性固亦上結慈衷自頃半旬乃朝遂為通制事踰信次義乖晨省一日萬幾不敢三塵御省每旦改宿特乞一至寢門解官表陶𢎞景臣聞堯風冲天潁陽振飲河之談漢德括地商隂峻餐芝之氣臣棲遲早日簮帶久年仕豈留榮學非待祿恆思懸纓象闕孤耕壟下席月澗門橫琴雲際始奉中恩得遂丘壑今便滅影桂庭神交松友一出東關故鄉就望眷言興念臨波瀉淚臣舟棹已􅉨無緣躬詣不任攀戀之誠謹奉表以聞𢎞景字通明丹陵秣陵人父為妾所害𢎞景終身不娶齊髙帝引為諸王侍讀家貧求宰縣不遂永眀十年脫朝服掛神武門上表辭祿詔許之止于句曲山號華陽隱居謂門人曰吾見朱門廣厦雖識其華樂而無欲往之心望髙巖瞰大澤知此難立止自恆欲就之且永明中求祿得輒差舛若不爾豈得為今日之事豈惟身有仙相亦緣勢使之梁武手勑招之畫兩牛一放水草之間一著金籠頭有人執繩以杖驅之年八十五卒淵明之去官畏見督郵也逸少之去官恥為王述下也貞白之去官求宰縣不得也然皆無礙其為髙也後人于此必盡諱之而别尋一好題目人臣著尋題目三字于胸中則上不顧君父下不顧朋友昧心蒙面之事無不為矣此仕宦之最惡套也謝徴補謝朏何𦙍表梁武帝夫窮則獨善達以兼濟雖出處之道其揆不同用捨惟時賢哲是蹈前新除侍中太子少傅朏前新除散騎常侍太子詹事都亭侯𦙍羽儀世胄徽猷冠冕道業德聲康濟雅俗昔居朝列素無宦情賔客簡通公卿罕預簮紱未褫而風塵擺落且文宗儒肆互居其長清規雅裁兼擅其美並達照深識預睹亂萌見庸質之如初知貽厥之無寄拂衣東山眇絶塵軌雖解組昌運實避昏時家膺鼎食而甘兹橡艾世襲青紫而安此懸鶉自澆風肇扇用南成俗淳流素軌餘烈頗存誰其激貪功歸有道康俗振民朝野一致雖在江海而勳同魏闕今泰運甫開賤貧為恥況乎久藴瑚璉暫厭承明而可得求志海隅永追松子臣負荷殊重參贊萬幾實賴羣才共成棟幹思挹清源取鏡止水愚欲屈居僚首朝夕咨諏庶足以翼宣寡薄式是王度永元中朏𦙍並徴不就東昏皆命迫遣髙祖平京邑霸府初開表請補軍咨祭酒並不至上昭明太子集别傳等表梁簡文帝若夫正少陽之位主承祧之則口實為美唯稱啓誦自兹厥後罕或聞焉昭明太子稟仁聖之姿縱生知之量孝敬兼極溫恭在躬明月西流幼有文章之敏羽籥東序長備元良之德非假二疏寧勞四皓虎賁恧其經學智囊慙其調護豈止博望延賔夀春能賦問疑棗據書戒憑陵而已哉玉折何追星頽靡續地尊虢嗣外陽之術無徴位比周儲緱山之駕不反臣以不肖妄作明離出入銅龍瞻仰故實思所以揄揚盛軌宣記德音謹撰昭明太子别傳文集請備之延閣藏諸廣內永彰茂實式表洪徽昭明太子名統字德施以武帝平建鄴之年生讀書數行並下過目皆憶賦詩屬思便成無所㸃易時俗稍奢太子欲以已率下身衣浣衣食不兼肉自加元服帝使省萬幾明于庶事天下稱仁卒時年三十三按梁武諸子昭明最賢其後人自瑀至遘八葉宰相名德相望與唐相終始天之報施可謂不爽矣薦鮑幾表梁元帝臣聞思皇多士仄陋所以明敡疇咨熙載髦俊所以並作斯固殷殿初基拾龍淵之寶虞祠始構獻鳯管之玉旌蒲出魯賁帛歸齊頌聲既興盛業斯在伏惟陛下則天緯地乘正馭才沙汰八風澄明六合叶龜登夢之客日賁於丘園韋轂投釣之臣相望於魏闕故以物無遺寶矣振鷺有充庭之謳白駒罕空谷之詠洋洋濟濟無得而稱者焉臣誠愧知才識職非選舉竊以進賢上賞蔽賢顯戮敢緣斯義用舉所知伏見鮑幾門庭雍睦立身貞退博涉文史頗間刀筆忠公抗直出宰廉平雅志𢎞深安貧専靜解巾入仕三十餘年自遊臣府一紀于兹前宰東邑實有二魯之風近處南臺欲尊兩鮑之則伏揆天嚴已當簡在脫蒙顯居良局登以清貫將齊毛玠古人之服實同吳隱酌水之廉昔丁隈牧州陳顧翟之好禮徐靖為郡薦袁渙之篤學桓範驅傳先舉管寧朱則剖符亦稱董直臣才非往哲識愧前修輕塵聽覽伏待斧鉞唐藝文志有鮑幾集八卷蕭氏父子之文可謂盛矣然其立國抑何不振之甚也當時裴子野作雕蟲論淵乎有深識焉惜其觸時忌而不盡言也余未及録姑存其名于此為韋雍州致仕表王僧孺一旦攀附遂無涯限排雲矯漢飛捧待翼陸離蟬組照灼幡旗受脤推轂執圭奉酎變狹室於髙門改小冠於侯服况復還周紐其六印歸齊列其五鼎常懼輪輕載積基薄墉髙器覆危傾人指鬼瞰老與年并疾隨衰及途遙齒截漏迫鐘鳴髙舂之景一斜不周之風忽至菌蟪夕隂倐駛無幾槿蕣朝采飄零已及仰朱闕而掩涕俯濠谷而自悲豈復式瞻拱默仰接鐘鼓儻帷蓋未親東嶽稍駐擊壤鼓腹其賜猶多韋睿字懷文京兆杜陵人梁武起兵睿有佐命功及即位封都梁子屢以功進為侯天監十四年為雍州刺史十五年表致仕優詔不許普通元年卒諡曰嚴睿素羸每戰未嘗乘馬以板輿自載所向克捷北人號為韋虎武帝鋭意釋氏天下從風而化睿自以位居大臣不欲與衆俯仰所行略如他日賀平鄴都表庾信臣聞泰山梁甫以來即有七十二代龍圖龜書之後又已三十餘年雖復制法樹同禮殊樂異至於文離武落剡木弦弧席捲天下之心包含八荒之志其揆一矣伏惟陛下握天樞秉地軸駕馭風雲驅馳龍虎沈雄內斷不勞謀於力牧天䇿勇决無待問於容成是以威風所振烈火之遇鴻毛旗鼓所臨衝風之卷秋葉竊聞伊洛戎夷幽并僭僞抱圖載籍已歸丞相之府銜玉繫綬並詣中軍之營百年逋誅遂窮巢窟三代敵怨俄然掃蕩昔周王鮪水之師尚勞再駕軒轅上谷之戰猶須九伐未有一朝指麾獨决神慮平定㝢內光宅天下二十八宿止餘吳越一星千二百國裁漏麟洲小水若夫咸康之年四方始定建武之代諸侯並朝不得同年而語矣雖復八風並唱未足頌其英聲六樂俱陳無以歌其神武坐釣臺而誓衆姒啓繼夏禹之功入南郊而問罪姬發成周文之志此無改之道大孝也歟當今鹿臺已散離宫已遣兵藏武庫馬入華山立眀堂之制奏大武之樂盛矣哉上天降休未之有也政須東南一尉立於比景之南西北一候置於交河之北然後命東后詔蒼冥衢壇琬碑銀繩瓊檢告厥成功差無慚德臣忝竊榮幸蒞政東藩不獲躬到闕庭預觀大慶不勝鳬藻踊躍之至周武帝建德六年帝至鄴遂平齊禽齊主及其太子于青州齊諸行臺州鎮悉降凡得州五十五郡一百六十二縣三百八十五庾信字子山父肩吾為梁太子中庶子東海徐摛為右衛率摛子陵及信並為抄撰學士出入禁闥恩禮莫比文並綺艷世號徐庾體元帝中聘于西魏屬大軍南討遂留長安纍遷驃騎大將軍開府儀同三司進爵義城縣侯眀帝武帝並好文學特蒙恩禮滕趙諸王周旋欵至有若布衣信雖位通顯常作鄉關之思乃為哀江南賦以致意賀新樂表周武帝庾信臣聞天地順動則雷出為豫聖人成功則風行有節故六德在咸池之宫山谷可調八風入承雲之奏人神不雜我太祖文皇帝體國經野設官分職變魏作周移風正雅衣裳而朝萬國圭璧而會諸侯至如經綸圖籍校讐煙燼樂正無缺章秩宗無廢典豈但商頌十篇得諸太師之室虞書五禮取於恭王之宫伏惟皇帝以下武嗣興中陽繼業運日月之明動淵泉之慮律厯著微無煩於太史隂陽晷度躬定於天官故得參考八音研精六代封晉魏為二王序殷周為三恪雖復朱干玉戚尚識典刑素韍纁裳猶因雄據未若山雲特起八卦成形鳯凰于飛九州觀德改金奏於八列合天元於六舞聲含擊石更入登歌調起初鐘還參玉管足以感天地而通神明康帝德而光𤣥象昔者齊居𤣥扈為曲在於雲門師度盟津習舞歸於山立遂乃包括三名克諧一代作者之謂聖天之所啓乎豈惟路鼓靈鼗空桑孤竹廣矣大矣輪焉奐焉是知零陵孝廉空傳玉管始平太守虛稱銅尺臣等並預鈞天同觀張樂軒墀𢎞敞欄檻眺聽崇牙業業猛簴趪趪翠鳯揚旌靈鼉樹鼓杳冥雲霧蕩薄丘陵醴泉與甘露同飛赤雁與斑麟俱下聘魯請觀理當見其盛德適齊忘味定是知其盡美昔淵魚聽曲尚得聳鱗櫪馬聞絃猶能仰秣臣等誠愧知音敢忘悅豫若使詳其音律是所邈然但能記其鏗鏘於兹為幸不勝慶悅之誠謹詣朝堂奉表以聞齊王進白兔表庾信臣聞輿圖欲逺則玉虎晨鳴轍迹方開則銀麞入貢伏惟陛下明明在上翼翼居尊德動天關威移地軸是以風煙照燭毛羽禎祥史不絶書府無虛日臣受服元戎用綏邊鄙轅門所屇始次熊山前茅慮無乃獲白兔光鮮越雉色麗秦狐月德符徴金精表瑞呈祥輿頌效異披圖尊敬之迹既明應事之機斯兆臣之龔行實從陕略瑞以素質彌雄西氣庶重承廟算方事申威掩代偃齊分韓裂趙不任鳬藻踊躍之情齊王憲周文帝子也通敏有度量為帝所器蜀平欲授之以幼未果明帝始遣之時年十八有善政蜀人立碑頌德後進齊王屢典征伐齊人憚其勇略宣帝即位忌而殺之諡曰煬時人知其寃酷齊王進蒼烏表庾信臣聞飛南陽之雉尚闡霸圖下建章之鵠猶調和氣况乃虞廷告瑞姬社呈祥咸髙識哺之心實貴能知之性伏惟皇帝陛下德教百姓孝行四海攝提從紀天下文明是以東海輸禽乍改黔質西山度羽或變蒼精臣去月三十日行到陕州堂內見一蒼烏林薄回翔循環不去駐乘木之精轉司風之翼即召儀同某等同時觀見斯實禮敬所覃孝慈之感理宜歸瑞祕圖書祥帝冊用光至德取效升平無令赤鳯留止偏為瘞玉之歌𤣥鶴徘徊獨擅銜珠之舞齊王進赤雀表庾信臣聞南陽雉飛尚論秦霸建章鵠下猶明漢德當今天不愛寶地必呈祥自應長樂觀符文昌啓瑞伏惟皇帝欽明文思惟以劬勞成務厯象日月允釐百工海水無波天星不動去四月十三日秦州清水郡伯陽縣文谷林在家獲一赤雀光同朱鳯色類丹烏降火飛精似入公車之府流金成製若上凌雲之臺謹按赤雀銜書止於酆户周之受命興乎此祥即事所觀同符合契實可圖形瑞譜書頌儒林事足成臺名堪紀號豈直雲中太守見赤心之奉主蓬萊童子知白環之報恩臣等預觀休徴情迫恆慶不任鳬藻之至為閻大將軍乞致仕表庾信臣聞禮云大夫七十致仕於朝傳家於子膳則二珍衣稱時制臣自出身奉國四十餘年遭遇風雲從微至著太祖文皇帝扶危濟難奄有關河臣實無堪中涓從事自洛食風塵河梁旗鼓華隂有白馬之兵河曲有黃沙之陳臣雖用命不能竒䇿功薄賞厚因人成事恩澤年表常以愧心仰逢周朝以揖讓登庸謳歌受命主貴臣遷頻煩榮寵三槐以鑄鼎象物知其神姦五等以桓圭飾瑞守其宫室臣以何德兼而有之况復水土之職王梁以應䜟受徴兵戈之王韓信以登壇獨拜語其連類臣又何人當今四海未寧三方鼎峙陛下勞心之日羣公展效之秋而臣甲子既多耄年又及無參賔客之事謬達諸侯之班尸祿素餐久紊彛典負乘致寇徒煩有司加以寒暑乖違節宣失序風水交侵菁華已竭雖復廉頗强飯馬援據鞍求欲報恩何能為役榮啓期之樂適足自貽燭之武之言無能為也特乞解所居官言從初服事符骸骨之請非謀几杖之賜若臣北陵移病東臯歸老山河茅社一反司勳公侯圭璧還封典瑞則朝無冒位之人臣免妨賢之責虞氏養老敢希東序之榮周朝如荼豈望西郊之禮但瞻仰天威方違咫尺徘徊城闕私增悽戀不任知止之情云云閻慶河隂人世為將家纍官大將軍進爵太安郡公晉公護母慶之姑也護擅朝而慶未嘗阿附及護誅武帝以此重之建德二年致仕周宣帝隋文帝皆令皇子問疾極一時尊榮之典焉為晉陽公進玉律稱尺斗升表庾信臣聞三才既立君臣之道已陳六位時成禮樂之功斯正故以叶和日月測度隂陽悅豫兆人儀刑萬國者也伏惟皇帝應籙馭天披圖受命據太陽而懸象履文昌而建極白環表讓德之符𤣥圭告成功之瑞太階既平升中可習必當水建千年山稱萬嵗伏見勑㫖刋正音律平章厯象奏黃鐘而歌大吕變孤竹而舞雲門莫不遠取踈通聲從安樂四分既明三微且定是以聞鐘於洛浦即辨聲乖聽鐸於邯鄲先知響韻二分二至行於司厯之官九變九成被於中和之職足以動天地感鬼神被風俗平寒暑豈直吟嘯溪谷回翔鸞鳯而已哉是知零陵廟前徒尋舜管始平城下空論周尺臣聞上製其禮下習其儀君定其法臣行其事謹遣玉律一具并玉稱尺斗升合等始得成功至於分粟纍黍量絲數籥實以仰稟聖規參詳神思所冀節移隂管無勞河內之灰氣動陽鐘不待金門之竹而琬琰事輕般倕慮淺不足展乎成均增輝度量賫器奉表以聞勸進元帝表徐陵封唐有聖還承帝嚳之家居代維賢終纂髙皇之祚無為稱於華舄至治表於垂衣而撥亂反正非聞前古至如金行重作源出東管炎運猶昌枝分南頓豈得掩顯姓於軒轅非才子於顓頊莫不因時多難俱繼神宗者也伏惟陛下出震等於勛華鳴謙同於旦奭握褒秉鉞將在御天玉媵珠衡先彰元后神祗所合非惟太室之祥圖牒斯歸何止堯門之瑞若夫大孝聖人之心中庸君子之德固以作訓生民貽風多士一日二日研覽萬幾允文允武包羅羣藝擬兹三大賔是四門厯試諸難咸熙庶績斯無間而稱也自無妄為象鍾禍上京梟獍䖍劉宗社蕩墜嶙頭鐵額興暴皇年封狶修蛇行災中國靈心所宅下武其興望紫極而行號瞻丹陵而殞慟家寃將報天賜黃鳥之旗國害宜誅神奉𤣥狐之録尅李軼於河津征陶謙於海岱滕公擁樹雄氣方嚴張繡交兵風神彌勇忠誠貫於日月孝義感於氷霜如雷如霆非貔非虎前驅效命元惡斯殲既挂膽於西州方燃臍於東市蚩尤三塜寧謂嚴誅王莽千剸非云明罰青羌赤狄同界狼豺胡服夷言咸為京觀邦畿濟濟還見隆平宗祀愔愔方承多福自氤氲渾沌之世驪連栗陸之君卦起龍圖文因鳥跡雲師火帝非無戰陳之風堯誓湯征咸用干戈之道星躔東井時破崤潼雷震南陽初平尋邑未有援三靈之已墜救四海之羣飛赫赫明明龔行天罰如當今之盛者也於是卿雲似蓋晨映姚鄉甘露如珠朝垂原寢芝房感德咸出銅池蓂莢伺辰無勞銀箭重以東漸𤣥莵西踰白狼髙栁生風扶桑銜日莫不編名屬國歸貢鴻臚荒服來賓遐邇同慶其文昭武穆跗萼也如彼天平地成功業也如此久應旁求掌故詢詔天官斟酌繁昌經營髙邑宗王啓霸非勞武德之侯清蹕無虞何事長安之邸揚龍旗以饗帝御鳯扆以承天厯數在躬疇咨為讓某官等至鄴伏承聖㫖謙冲為而不宰或云洛陽未復函谷無泥旋駕金陵方膺天眷愚謂大庭少昊非有定居漢祖殷宗皆無恆宅登封岱嶽且署明堂巡狩荆州時行司𨽻何必西瞻虎踞乃建王宫南望牛頭方稱天闕抑又聞之𤣥圭既錫蒼玉無陳乃棫朴之愆期非包茅之不貢雲和之瑟久廢甘泉孤竹之管無聞方澤豈不懼歟伏願陛下因百姓之心振萬邦之命豈可逡巡固讓方示石户之農髙謝為君徒𢎞箕山之客未知上德之不德惟見聖人之不仁率土翹瞻蒼生何望昔蘇季張儀違鄉負俗尚復招三方以事趙請六國以尊秦况臣等預奉皇華親承朝命圭璋特達通聘河陽貂珥雍容尋盟泳永旱水加牢貶館隨世汙隆瞻望鄉關誠均休戚但輕生不造命與時乖等一介之行人同三危之逺擯承間內殿事絶耿弇之因封奏邊城私等劉琨之哭侯景之亂元帝擁重兵居上流坐視不救且盡除弟姪之礙手者幸父兄顛沛以為稱帝地史謂不急莽卓之誅先行兄弟之戮此真千古罪人也當時梁之臣子舍元帝無可戴故勸進歸焉沈炯表中用吳楚管蔡大是曲筆孝穆此篇大可味元帝時戀江陵不肯詣建業此表大庭以下特為之解代王僧辨勸進梁元帝表沈炯紫宸曠位赤縣無主百靈聳動萬國回皇雖醉醒相扶同歸景亳式歌且誦總赴唐郊猶懼陛下俯首澘然讓德不嗣傳車在道方慎宋昌之謀法駕已陳尚杜耿純之勸嶽牧翹首天民纍息臣聞星回日薄擊雷鞭電者之謂天嶽立川流吐霧蒸雲者之謂地苞天地之混成洞隂陽之不測而以裁成萬物者其在聖人乎故云天地之大德曰生聖人之大寶曰位黃屋廟堂之下本非獲已而居明鏡四衢之樽蓋由應物取訓伏惟陛下稽古文思英雄特達比以周旦則文王之子方之放勛則帝摯之季千年旦暮可不在斯庭闕湮亡鍾鼎淪覆嗣膺景厯非陛下而誰豈可便赤眉更立盆子隗囂託置髙廟陛下方復從容髙讓用執謙光展其矯行僞書誣罔正朔見機而作斷可識矣匪疑何卜無待蓍龜日者公卿失馭禍躔霄極侯景憑陵姦臣互起率戎伐潁無處不然勸明誅晉側足皆爾刁斗夜鳴烽火相照中朝人士相顧銜悲凉州義徒東望隕涕惵惵黔首將欲安歸陛下英略緯天沈明內斷橫劒泣血枕戈嘗膽農山圯下之䇿金匱玉鼎之謀莫不定算扆帷决勝千里擊靈鼉之鼓而建翠華之旗驅六州之兵而總九伯之伐四方雖虞一戰以霸斬其鯨鯢既章大戮荷校滅耳莫匪姦回史不絶書府無虛月自洞庭安波彭蠡底定文昭武穆芳若椒蘭敵國降城和如親戚九服同謀百道俱進國恥家怨計期就雪社稷不墜繄在聖明今也何時而申帝啓之避凶危若此方陳泰伯之辭國有具臣誰敢奉詔天下者髙祖之天下陛下者萬國之歡心萬國豈可無君髙祖豈可廢祀即日五星夜聚八風通吹雲烟紛郁日月光華百官象物而動軍政不戒而備飛艫巨艦竟水浮川鐵馬銀鞍陵山跨谷英傑接踵忠勇相顧湛宗族以酬恩焚妻子以報主莫不覆楯銜威提斧擊衆風飛電耀志滅凶醜所待陛下昭告后土䖍奉上帝廣發明詔師出以名五行夕返六軍曉進便當盡司寇之威窮蚩尤之伐執石趙而求璽斬姚秦而取鐘修掃塋陵奉返宗廟陛下豈得不仰存國計俯從民請漢宣嗣位之後即遣蒲類之軍光武登極臨竟始有長安之捷由此言之不無前准臣等或世受朝恩或身荷重遇同休等戚自國刑家茍有腹心敢以死奪不任慺慺之誠謹奉表以聞代王僧辨又奉勸進表沈炯衆軍以今月戊子總集建康賊景鳥伏獸窮頻擊頻挫姦竭詐盡深溝自固臣等分勒武旅百道同趣突騎短兵犀函鐵楯結隊千羣持㦸百萬止紂七步圍項三重轟然大潰羣凶四滅京師少長俱稱萬嵗長安酒食於此價髙九縣雲開六合清朗矧伊黔首誰不載躍伏惟陛下咀痛茹哀嬰忍憤酷自紫庭絳闕胡塵四起壖垣好畤冀馬雲屯泣血治兵嘗膽誓衆而吳楚一家方與七國俱反管蔡流言又以三監作亂西凉義衆阻强秦而不通并州遺民跨飛狐而見泯豺狼當路非止一人鯨鯢不梟倐焉五載英武克振怨恥並雪永尋霜露如何可言臣等輒依故實奉修社廟使者持節分告塋陵嗣后升遐龍輴未殯承華掩曜梓宫莫測並即隨由備辦禮具凶荒四海同哀六軍袒哭聖情孝友理當感慟日者百司嶽牧祈仰宸鑒以錫圭之功既歸有道當璧之禮允屬聖明而優詔兼冲窅然凝邈飛龍可躋而乾爻在四帝閽已叩而閶闔未開謳歌再馳是用翹首所以越人固執熏丹穴以求君周民樂推踰岐山而事主漢王不即位無以貴功臣光武不止戈豈謂紹宗廟黃帝遊於襄城尚訪治民之道放勛入於姑射猶使樽俎有歸伊此儻來豈聖人所欲帝王所應不獲已而然伏讀璽書尋諷制㫖顧懷勿外未奉慈衷陛下日角龍顔之姿表於狥齊之日彤雲素氣之瑞基於應物之初博覽則大哉無所與名深言則曄乎昭章之觀忠為令德孝實動天加以英威茂略雄圖武算指麾則丹浦不戰顧盼則版泉自蕩地維絶而重紐天柱傾而更植鑿河津於孟門百川復啓補穹儀以五石萬物再生縱陛下拂袗衣而游廣成登弇山而去東土羣臣安得仰訴兆庶何所歸仁况郊祀配天罍篚禮曠齊宫清廟匏竹不陳仰望鑾輿匪朝伊夕瞻言法駕載渴且饑豈可久稽衆議有曠彞則舊郊既復函雒已平髙奴櫟陽宫館雖毀濁河清渭佳氣猶存臯門有伉甘泉四敞土圭測景仙人承露斯蓋九州之赤縣六合之樞機博士捧圖書而稍還太常定禮儀而已列豈得不揚清駕而赴名都具玉鑾而遊正寢昔東周既遷鎬京遂其不復長安一亂郟洛永以為居夏后以萬國朝諸侯文王以六州匡天下跡基百里劒杖三尺以殘楚之地抗拒九戎一旅之師剪滅三叛坦然大定御輦來歸解五牛於冀州秣六馬於譙郡緬求前古其可得歟對揚天命何所讓德有理存焉敢重所奏侯景之亂炯為景將宋子仙所得及子仙敗王僧辨購之酬所獲錢十萬自是羽檄軍書皆出於炯及簡文遇害四方嶽牧上表勸進僧辨令炯製表當時莫有逮者經通天臺奏漢武帝表沈炯臣聞橋山雖掩鼎湖之竈可祠有魯遂荒大庭之跡無泯伏惟陛下降德猗蘭纂靈豐谷漢道既登神仙可望射之罘於海浦禮日觀而稱功橫中流於汾河指柏梁而髙宴何其甚樂豈不然歟既而運屬上仙道窮晏駕甲帳珠簾一朝零落茂陵玉碗宛出人間凌雲故基共原田而膴膴别風餘趾帶陵阜而茫茫羈旅縲臣能不落淚昔承眀既厭嚴助東歸駟馬可乘長卿西反恭聞故實竊有愚心黍稷非馨敢望徼福但雀臺之弔空愴魏君雍丘之祠未光夏后瞻仰煙霞伏增悽戀三輔黃圖曰武帝元封二年作甘泉通天臺去地百餘丈以候天神元鳯間自毁炯字初明荆州陷為西魏所虜以母老在東恆思歸國恐以文見留有所作輒祕不傳嘗獨行經漢武通天臺為表奏之陳已思歸之意其夜夢有宫禁之所兵衛甚嚴便以情事陳訴聞有人言甚不惜放卿還幾時可至少日果與王克等並獲東歸庾信王褒惜而不遣戲作䱉表韋琳臣䱉言伏見除書以臣為粽一作糝熬將軍油蒸校尉臛州刺史脯臘如故者肅承將命含灰屏息憑籠臨鼎載兢載惕臣聞髙沙老嫗非有意於綺羅白鮪女兒豈留心於珠翠一無此四句臣美愧夏鱣味慚冬鯉常恐鮐服之誚每懼鱉巖之譏是以潄流湖底枕石泥中不意髙賞殊私曲蒙鈞拔遂得起升綺席忝預玉盤爰厠玳筵猥煩象箸澤覃紫䐟恩加黃腹方當鳴薑動桂紆蘇佩檔輕瓢才動則樞槊如雲濃汁暫停則蘭膏成列婉轉緑虀之中逍遙朱唇之內銜恩噬澤九殞弗辭不任屏榮之至謹到銅鎗門奉表以聞詔答云省表具知卿池沼搢紳陂池俊乂穿蒲入荇肥滑有聞允堪兹選無勞謝也後梁韋琳天保中為舍人涉獵有才藻善劇談嘗為䱉表以譏刺時人為陳六宫謝表江總鶴籥晨啓雀叉曉映恭承盛典肅荷徽章步動雲袿香飄霧縠愧纒艷粉無情拂鏡愁縈巧黛息意臨窗妾聞漢水贈珠人間絶世洛川拾翠仙處無雙或有風流行雨窈窕初日聲髙一笑價起兩環乃可桂殿迎春蘭房侍寵借班姬之扇未掩驚羞假蔡琰之文寧披悚戴總字總持陳宣帝時為太子詹事總性溫裕工詩溺於浮靡及為宫端與太子為長夜之飲養良娣陳氏為女太子亟微行遊總家宣帝缺怒免之後又厯侍中左右尚書後主即位厯吏部尚書僕射尚書令不持政務日與後主遊晏後庭多為艷詩與陳暄孔範等當時謂之狎客以至於亡入隋拜上開府開皇十四年卒其為自序云太建之時權移羣小諂嫉作威屢被摧黜識者譏其言跡之乖西河王謝太尉表溫子升臣聞拂羽决起力謝摩天䇿蹇載馳功微送日將短翮難以陵髙駑乘無由致逺雖復建旟出郡未追楚趙之風捧壺入侍徒踵金張之迹及天祚明德運啓興王六遂始遷九鼎初定於焉承乏有用當官草靡從風未遑克讓常恐執轡輕輪操刀傷錦子升字鵬舉仕東魏為散騎常侍梁使寫其文傳於江外武帝稱之曰曹植陸機復生此土恨我詞人數窮百六傅標使吐谷渾見其國主牀頭書數卷乃子升文也齊文襄引為大將軍咨議荀濟之亂文襄疑其知謀乃餓諸獄死子升外恬靜而內深險事故之際好與其間故及於禍代為百官賀甘露表盧思道河榮洛變授社於勛華𤣥玉素鱗降靈於湯武其間微禽弱草改狀移形夜宿朝雲星光動色皆以照臨下土發揮帝載千祀一致隔代同符伏惟陛下上總天維傍握河紀持欽翼之小心纂升平之大業萬靈翹首應三古以西巡兩儀貞觀乘六氣而東指卿雲既出還聞百辟之歌河清可俟實得萬人之歡而上𤣥乃顧神物荐委飛甘灑潤玉散珠連昔魏明仙掌竟無靈液漢武金盤空望雲表豈若神漿可挹流味九户之前天酒自零凝照三階之下斯實曠代祥符前王罕遇休矣美矣皇哉唐哉臣等並徼昌運俱沐𤣥造驟聞祕社亟覩冥貺振鱗撫翼空馳魚鳥之心瘞玉編金方待云亭之后思道字子行年十六中山劉松為人作碑銘思道讀之多所不解感激讀書後復為文示松松亦不甚解歎曰學之有益豈徒然哉然不持操行由是宦途淪滯齊文宣崩文士各作挽詩魏收楊休之得一二首思道得八首人稱八米盧郎蓋以稻喻之言十稻之中得八米也勸封禪表上官儀臣某等言臣聞乾元惟大播四序而無言坤儀蓋厚寧萬象而得一至於號均三大體覆載以曲成聖表千齡順剛柔以藏用是以可久可大永固皇王之緒貞觀貞明獨照陶鈞之上故可登封泰嶽類帝以尊天降禪肅然禋宗以厚地伏惟陛下膺圖紹籙儀天纂鏡受昭華而光寶位正璣衡而握金符銷伏鼇而綴上𤣥剪應龍而清下瀆於是靈臺偃伯暢轂埋輪刑政肅清削秋荼之繁蕪雅頌先烈激圓海之漪瀾就月幽覃則燭龍開景薰風逺暢則蟠木增華沒羽浮金之章昭載筆於仙室韋韝卉袵之首襲長纓於蘭錡九疇式序七德攸宣發神化於丹青敷禮義之粉澤既而睿德潜通至誠冥召禎圖載啓神物發揮雙觡呈班馴擾於君囿九芝獻彩燭耀於帝池太史摽祥鏡流千里卿雲表貺凝華五色江茅鄗黍嵗時麟萃東鰈西鶼日月波屬鴻符巨慶疇可詳言誠乃岱郊佇遂云埛望蹕臣某等中謝永言遐載緬鏡前徽王迹之所葳蕤帝圖之所凝逺龍官結繩之后鳥紀垂衣之君治定功成俱備升中之禮塵清海晏咸申謁款之誠異世同符千載一揆諒以增髙益厚式酬靈眷陛下德光宙始文煥震初席蘿而因萬物典裒而濟下元鎔範生靈張四維於地絡締褠函夏建八柱於𤣥樞宏規絶迹功無與二駕三五而遙集超八九而騰驤加以琁厯啓徴躔南至於朔旦金鼓問罪削左袵於交河固可恭柴燎之展采穆靈壇之禋敬焉得狥小節於冲挹忘至公之鴻典絶三神之歡拒萬方之志雖復翹心天路未留三舍之感延佇帝閽逾邈九霄之望伏惟陛下紆瑶池之渺轡屈姑射之凝神酌令典於中樽遵時邁於嬴里採公卿之嘉議覽搢紳之讜辭逸記重甄頽章再紐詔雨師以先路命風伯以清塵六飛案軌九旗齊列榮光承幰非煙翼衡輯瑞而嘉肆覲瘞玉而恭儲祉方使日觀增華仙閭改飾神光霄映若流照於春陵雲色盡開似凝暉於豐谷表咸池於翠㞯萬嵗叶其殷薦席藁秸於紫壇八神歆其明祀籠千古之偉觀孕七百之丕業臣等命與時偕濯景昌運優游渠閣之內怊悵南風之絃棲息蓬山之阿弋釣先皇之道至於朝猷國紀頗踐奧隅陛下推而不居竊所未喻鬱云梁之典缺懷庭之儀沮神主之欲漏貪天之議伏願杲其日出照傾陽之心油然作雲降離畢之澤庶使飛英騰茂祕玉檢而遐傳手舞足蹈扈翠華於喬嶽儀字游韶太宗每屬文遣儀視藁髙宗時進西臺侍郎同東西臺三品武后得志遂牽制帝帝不能堪欲廢之召儀與議使草詔左右告后后自申訴帝曰上官儀教我許敬宗希后㫖搆儀與梁王忠謀大逆下獄死孫女為中宗昭容追贈儀中書令楚國公皇太子請修書表崔融臣聞昔者明王學以化人成俗古之君子文以緯地經天雖有閬風之髙嶽弗登弗知其峻也雖有浴日之巨溟弗涉弗知其廣也伏惟天皇域中居大天下化成百官以理萬人以察日行中道而淑清嵗起攝提而位序光薰萬物豈直芝珥蓂􅟏澤加四海寧惟夀麻孤竹地成形而天成象其道彌光河出圖而洛出書其徴可驗環林璧沼金門石室墳典積於丘山筆墨盈於泉海聖朝多士自可包三代之文臣顧不才何足奉三皇之教皇慈渥洽帝奬優隆擢公望為太師徴子房為少傅所冀習與智長化與心成嘗辛苦於嵗餘終未階於日就臣聞學者殖也問以辨之積必有成勤則不匱以周公之上聖日讀百篇以孔父之多能韋編三絶臣雖不敏竊所庶幾然以列代遺章先王舊典康成興業才覽卷於八千士安覃思願加年於纍百豈不以學而時習博則難精者乎今欲搴其蕭稂撮其樞要可以出忠入孝可以益國利人極賢聖之大猷盡今昔之能事商𣙜百氏勒成一家庶有代於針規長不違於左右又近代書鈔實繁部帙至如華林園遍略修文殿御覽夀光書苑長洲玉鏡及國家以來新撰藝文類聚文思博要等並包括𢎞逺卒難詳悉亦望錯綜羣書刪成一部藝官賓館亦既天皇立之矣端士正人亦既天皇致之矣伏乞俯從微願特降鴻私許臣撰緝遂臣誠請當宫學士如少仍望通取京官謹當開桂樹之山鑿芙蓉之水引甘泉之詞賦總望園之賔客下藝閣而長謡臨梓厨而髙會一遊蘭芷佇變蓬麻區區之誠敢希矜允豈使肅城門內唯傳魏國之名崇政殿中獨紀晉朝之事而已無任誠懇之至謹遣某官某奉表陳請以聞融字安成齊州全節人中宗為太子典東朝章疏張易之兄弟誅坐附㑹貶召授國子司業與修武后實録封清河縣子融為文華婉當時無輩朝廷大筆多委之撰武后哀冊最髙麗絶筆而死杜審言為融所奬引為服緦麻為百官賀雨請復膳表崔融臣等聞太平之代天地合而流津至德之時隂陽和而布澤所以三農滋殖百物阜安伏惟天冊金輪聖神皇帝陛下寶命絪緼𤣥期肸蠁包混元而建極宅造化而開階德教布濩仁聲洋溢增髙益厚已修中嶽之儀順時班令更緝正陽之禮近以少愆甘澍親發至誠懷宋景之一言採殷湯之六事德音才降靈心允協捧瑶緘而風起迎寶字而星流雲不崇朝覆三千之藥草雨必以夜通百億之江河遍髙下而同霑在公私而並及陳留雨穀譬此非多櫟陽雨金方斯未重邦國延有年之慶黎元罷望歲之憂臣等中賀伏願陛下凝神保和頤情養夀復鮮庖之舊膳進鶴頂之常羞使芝英有駐液之期萐蒲知送涼之地則光天之下率土之濵孰不欣戴孰不幸甚微臣等幸逢休運預沐恩波混虞獸而同歡比齊禽而纍忭無任悚荷之至謹詣朝堂奉表稱賀為皇太子賀甘露表崔融臣聞五材並用天地合而凝津四序遞來隂陽和而灑潤望之成雪若墜崑崙之山嘗之則甘似降軒轅之國伏惟天皇部元氣平太階正圭表於都畿考銅櫩於宫室薦河圖而升洛範日載祥編過竹苑而憩芝臺宵零瑞液爾其塗塗被物滴滴流膏承以玉杯凌漢宫而擅美獻之瓊爵掩魏殿而稱珍可以致靈仙之寄可以延帝王之夀孝經援神契未足敘其和平春秋運斗樞不能議其清濁臣濫膺國本多慙人望仰宸遊而不及倍戀恆情聞帝澤而先驚慶深常位無任喜抃之至皇太子賀芝草表髙宗崔融臣某言伏承某月日芝草生於乾元殿瑞命天來符祥日至煌煌三秀分芰井而攢柯曄曄九光間梅梁而吐葉晉都宫閣何必靈芝之臺洛邑山川居然密芝之地伏惟天皇天臨海內帝有城中兼漢制而宅兩亰用堯心而加百姓神精下降洽至道於丘陵靈液旁霑被深仁於草木觀其如蓋如閣如日如星得五方之氣象合四時之景色仙人在上則車馬疑飛神龍居下則風雲不去謂蓬瀛之海列即崑閬之山開魏皇之雙幹莫儔漢帝之九莖為劣可以薦郊廟可以觴公卿臣謬踐儲闈秖膺守國不獲親承左右日覽休徴雖玉屑延齡在神仙而可致而刀圭入膳視朝夕以猶賒是用心馳仁夀之前慶集肅成之下無任抃躍之至皇太子賀嘉麥表崔融伏見雍州司馬徐慶稱所部有嘉麥一莖六穗纖芒濯露疑因黑壤之宜香稼搖風若吐黃金之色豈非靈心昭應睿德感通降之自天何必來牟之詠嘗之於廟先符孟夏之時凡在含生相趨動色臣謬當居守肅奉宗祧一穗兩岐徒說張君之詠十畝千石方輕汜氏之書仰天意而增歡顧人心而載躍無任喜抃之至代家奉御賀明堂成表崔融臣某言臣聞昭昭上天五座列降神之府赫赫中國几筵開布政之宫自軒皇肇制帝堯嗣作厯虞夏而惟新在殷周而克壯斯在尊祖配帝從時統天節寒暑而吹律順隂陽以班令降及有漢頗採前章雖年惟屢豐而日不暇給過此以往寂寥無聲伏惟天冊金輪聖神皇帝陛下興復舊邦光啓新邑萬物覩而聖人作百寶用而神靈滋逺肅邇安功成道洽泥金刻玉紀修中嶽之儀乘鸞駕龍更葺正陽之禮乾䇿坤䇿具稟宸聰左個右個親承睿式朴略淹中莫能言其制度﨑嶇汶上疇克效其規模土事不文木事不鏤九柱自立豈藉琅琊之飛二石潛開寧煩穀城之採版築星奔而化造斧斤風動而神助聖有通於上帝産無費於中人由是日抱紅輝雲叢紫靄霜毛下翥電翼羣飛夕見神光似對莊嚴之國晝聞仙響疑過數樂之天匪日而成衝霄特起仰浮圓笠俯鎮方輿金鸑鷟而將飛玉驪龍而若動三辰引曜相望於復道之間六氣氤氲旁魄於重檐之半可以發大教陳盛容會百神朝萬國比二儀而永固齊四序而偕行允所謂穆穆皇皇巍巍蕩蕩者矣微臣攀光日用荷䕃天休仰之不逮雖謝於鵾翔成輒相歡竊同於燕賀手舞足蹈倍百恆情無任悚躍之至謹奉表稱賀以聞太宗髙宗之世屢欲立明堂諸儒議其制度不決而止及太后稱制獨與北門學士議其制不問諸儒垂拱四年二月毁乾元殿以其地作明堂以僧懷義為之使凡役數萬人十二月成懷義以功拜左威衛大將軍梁國公進九成宫頌表王勃帝機無朕道洽則時雍靈化不言功成則頌顯伏惟陛下體元纂極模神建墜棟梁一氣庭階六合松軒夜警杳冥姑射之心茅殿晨凝寥廓峒山之駕臣霑風太上庇影華胥仰衢室而無階候襄城而有地雖望卑平叔空勒景福之詞而文謝子雲願竭甘泉之思謹憑天造輒上九成宫頌二十四章攀紫墀而絶望叫丹闕而纍息勃字子安文中子之孫麟德初對策髙第未及冠授朝散郎數獻頌闕下沛王召署府修撰是時諸王鬬雞勃戲為文檄英王雞髙宗怒曰是且交構斥之勃既廢客劒南聞虢州多藥草求補參軍荷才陵藉為僚吏共嫉官奴曹達抵罪匿勃所懼泄輒殺之當死會赦除名父福畤坐勃故左遷交址令勃往省度海溺水痵而卒為齊州父老請陪封禪表駱賔王臣聞元天列象紫宫通北極之尊大帝凝圖𤣥猷暢東巡之禮是知道隆光澤既輯玉於雲臺績劭禋宗必塗金於日觀伏惟陛下乘乾握紀纂三統之重光御籙登樞應千齡之纍洽故得河浮五老啓赤文於帝期海薦四神奉丹書於王㑹瑞開三脊祥洽五靈既而緝總章之舊文紹辟雍之故事非煙翼軫移玉輦於梁隂若月承輪祕金繩於岱巘臣等質均芻狗隂謝桑榆幸屬堯鏡多暉昭餘光於連石軒圖廣運追盛禮於樅金然而鄒魯舊邦臨淄遺俗俱穆二周之化咸稱一變之風境接青疇俯瞰獲麟之野仙開翠屺斜連辨馬之峰豈可使稷下遺氓頓隔陪封之禮淹中故老獨奏告成之儀是用就日披丹御璧輪之三舍望雲抒素叫天閽於九重儻允微誠許陪大禮則夢敻餘息仰仙闕以相歡就木殘魂游岱宗而載躍賔王義烏人七歲能賦詩初為道王府屬嘗使自言所能賔王不答裴行儉為洮河總管表掌書奏不應調長安主簿武后時數上疏言事除臨海丞遂從徐敬業起兵敬業敗被殺或言賔王為僧以遁近有人發得賓王墓者乃知賓王實不死且未嘗為僧也事詳湧幢小品中為陳御史進奉和秋景觀競渡詩表陳子昻天文爰降品彚咸亨金簡潜開珍圖斯見臣聞白雲興詠漢游汾水之祠黃竹申歌周舞瑶池之駕然而志崇逺轍事或勞人故文思之化未光太清之道猶闕伏惟陛下流虹齊聖感月含神𤣥德茂於皇階文明照於天下用能提玉斗把璿衡百神景從三靈叶贊青雲出洛爰開肇命之符赤甲縈河終御興王之寶非窮神之至德者其孰能格於是既而黃幄務閒紫極幾暇洞庭張樂思接軫於軒遊媯水披圖想同參於堯輦然而逺而勞物未若近而安人動而勤已豈比靜而神泰於是徙金蹕鳴玉鸞清禁林御池殿肅波臣而戒事命舟子為水嬉彩鷁蓮歌乍起吳江之引青龍桂楫時謳越女之風鳥逝虯驚沸珠潭而競逐雪飛電集橫玉浦而流光信可以娛樂性靈發揮文物皇猷允洽白日俄輝於是奏薰風於管絃詠嚴雲於林籞帝歌爰作天藻遐彰黼帳帷宫燦文房之繡綵祥煙瑞景霏翰苑之榮光信探賾於𤣥苞得斯文於紫極太平允矣元首康哉方欲朝明堂之宫輯羣后之瑞尊榮顯籙光啓聖圖封玉嵩丘以接千年之統泥金少室攸增萬嵗之規卓哉煌煌聖君之表也微臣曲學蓬户竊位蘭臺未聞驄馬之謡非有雕龍之思鞠躬霜署謬覩於天章逖聽鈞臺厠聞於帝樂天文尊貴不逺於下臣帝保殊崇曲宣於近侍竊以為君唱臣和固不隔於尊卑宫變商從方允諧於金石輒用齊心扣寂假翰求詞將以攀日月之末光繼螢爝之微照子昻字伯玉梓州射洪人以富家子尚氣決弋博自如十八入鄉校感悔修飾舉進士垂拱中勸武后興明堂太學后既改號周子昻上周受命頌后雖召見問政事奏聞輒罷以右拾遺父喪廬墓為縣令段簡所殺沈亞之云武三思使之也然新舊史皆不明著其事為王方慶讓鳯閣侍郎表李嶠恩寵光臨奬詞踰分䖍荷明命營魂失守臣某中謝臣學非儒墨術異商韓文乏斧藻藝慚刀筆屬乾坤貞觀日月光輝飛龍在天而庶物咸覩仙兔離畢而羣萌皆潤遂得封殖樗散謬齒於翹薪剪拂駑駘濫陪於逸驥驟荷私遇頻階榮擢入參丹閣出擁彤騶爰自海邦遂升河輦佩若若之綬騖轔轔之轂叨恩竊幸空變星霜尸祿妨官曽微報效宜受素餐之責翻成黃閣之榮夕拜瑣闈朝陪禁省敢希任光淑睿之美每憂王歆謬誤之失而天慈逾渥聖澤無涯爰回斗極之暉更寵掖垣之授下神畿而入仙禁未變葭灰自鸞渚而游鳯池僅凋蓂葉荀侯之十旬纍命未可為儔車公之一月九遷曽無足比既超倫而邁等實負愧而承羞臣亦何人敢叨非據况樞祕之重絲綸是職言參𤣥化步入紫微臣蒲栁既秋桑榆漸迫耄期云及衰疾徂侵以日昃之歌當夜行之罪招愆叢謗非為身謀敗駕傾餗將貽國負蓋力周於用則輕重咸宜任過其才則巨細同躓伏願察臣知止之分矜臣自量之情杲然出日回三舍之光油然作雲垂九霄之澤曲收過謬改命才賢則維鵜之譏不起於輿誦振鸞之詠復聞於朝端嶠字巨山贊皇人武后時為鳯閣舍人文冊大號令多主為之二張敗坐貶神龍中為中書令封趙國公嶠在中宗朝密請相王諸子不宜處京師𤣥宗即位獲其表欲誅之張說救得免貶别駕卒嶠少為文與王勃楊炯接中與崔融蘇味道齊名後諸人沒而為文章宿老學者取法焉王綝字方慶其先自丹陵徙雍咸陽武后時為廣州都督清嚴為天下第一遷鳯閣侍郎同平章事后嘗就求羲之書方慶并獻十一世祖導等書凡二十八人詔崔融為序號寶章集復賜方慶卒諡曰貞方慶博學尤精三禮李德裕嘗稱方慶為相時子為眉州司士參軍后曰君在相位何子之逺對曰廬陵是陛下愛子今尚在逺臣之子庸敢相近以比倉唐悟文侯事嗟乎君子哉為百僚賀雪表李嶠臣聞至道光被而冲和感發𤣥化沈潛而祥物昭應伏惟陛下合德天地齊光日月陶正氣之氤氲降元符之肸蠁用能經緯六合驅馭百靈垂旒法宫而品物清宴揆景中土而風雨休若三元肇革九陽初動撞黃鐘而布氣順𤣥冥而率職層隂候律豐澤順時薈蔚方興起泰山之膚寸參差薦委自平地而盈尺銅街皓其如素金隄紛其遂滿縈樓棲檻疑璧臺之九重落絮飄花似芳林之二月豈惟洛神呈象來舞帝宫故亦海騎相趨下朝仙闕東臯欣而望嵗南史慶而書祥萬寶登秋居然可詠雙銅叶唱即事非遙自非睿感通微乾心輔德降神靈之滋液發兆庶之歡慶臣等恭承𤣥造沐浴太和欣聖澤之滂沛對天休而踴躍在神都留守請車駕還洛表李嶠臣嶠等言臣聞天下皆春而燕谷有析暄之律日中並照而彭澤有隨陽之禽豈非承光飲和仰德蒙庇深於戀者其往若不親渴於求者其來如不足所以圭表既宅關河馳願思之誠鑾和未巡襄鄧切謳歌之慕帝車北指震駕西臨槐檀方厯於四時菁莪猶掩乎八水耆老延頸簪裾企望戴天有分徒嗟京兆之遙捧日無階竊恨長安之逺臣等伏以載祀七百卜年非豐鎬之地時乘九五啓聖由瀍洛之鄉所以受龍圖龜書所以朝雨師河伯叶祥符於讖籙採謀議於人鬼萬靈幽贊百物阜昌是曰天地之心實興帝王之祚方使四夷為守西賔屈無外之談六合為家東土壯居中之業况復圜丘方澤神祇之兆域以安復廟重檐昭穆之尊卑既敘定社而立稷建邦而設都是萬年長王之郊誠億載不遷之宇寧可久曠中壤即安偏據詠山河於漢舊訪宫室於秦餘五載時巡曽無告至之禮四方述職仍有不均之患臣等庸愚竊所未達今三秋告稔萬寶已成隂陽所和稼穡偏茂却連澤潞斜帶荆揚萬庾同殷千箱並阜禾萌九穗未曰休徴穀石五錢詎名豐穰加以舟車並輳水陸交衝物産尤多觀聽胥悅衆庶有來蘇之冀神靈翹望幸之心伏願陛下俯察氓謡仰祗天意因銅雀之稔嵗命玉鸞之仙軫涓時擇日屯萬騎而出函秦省俗觀風撫四方而還鞏洛逍遙乎九阿之阻容與乎八表之路回輿駐蹕觀日月之圃場闢纊凝旒問百年之疾苦然後歸輅禮乎九廟明堂衆星拱列長居辰極之尊萬㝢駿驅載詠朝宗之府光輝將日月齊殷德澤與江河並潤致乾坤之景福盡億兆之歡心凡在人祗孰不欣幸臣等限以所守不獲親詣闕庭無任區區之誠謹附洛州奏事使陳請以聞武后光宅元年改東都為神都四六與詩相似皆著不得議論宋人長於議論故此二事皆遜唐人唐人非全不議論也但其議論有鏡花水月之致耳如此篇一起亦是議論還可聲色臭味求否讓鸞臺侍郎表李嶠仰荷聖澤退揆愚衷周章失圖怵惕惟厲中謝臣聞疇德而授則尸曠之譏絶推恩而舉則緝熙之道廢臣志狹量淺業空理疏揆才異言行之科入仕非廉髙之選邀屬時幸纍叨榮級石渠麟閣司典籍之林金門鳯池參廟堂之議以小才而居大任用近智而恢逺略緣鶴之鼎既失於鹽梅濡鵜之才實慚於紱冕甘待素餐之責忽承非次之恩夫以瑣闥崇嚴玉堂祕近職參持蓋位亞掌壺子雲以善屬文詞始應夕拜李真以妙通經術方陪旦講臣之愚陋實畏友朋豈足以奉帷幄之昌言聨名賢之逸軌且短才不齒未減雙鳬之數豐秩妄加必喪羣龍之績陛下經緯品物搜揚管庫方使道風德範逺出帝先豈令敗政妨官近自臣始伏願俯收人望顧惜朝班特回寵光改命賢俊則百揆寅亮長無鼎覆之憂三階底平自有棟隆之吉唐自武德以後官名更改不一如一門下省或稱東臺或稱鸞臺或稱黃門其侍中或稱左相或稱納言一中書省或稱西臺或稱鳯閣或稱紫微省其中書令或稱右相或稱內史或稱紫薇令為水潦災異陳情表武后李嶠臣嶠言臣聞眀主程才先求於稱職忠臣效用必務於量已然後庶官無廢百度以康若使假鳯登朝真龍不馭將緣鶴之鼎方憂於折足和鸞之駕必誡於傾輈豈徒鐘鼓生妖蠻夷起笑而己臣瓶筲賤器駑蹇輕姿同鼯鼠之五伎不成異飛鴻之六翮兼備遭逢幸會纍叨階級陛下降非常之澤垂不次之恩升之冢司握九流之銓管委以樞近參萬幾之損益傳說作舟之命徒奉針規仲山補袞之談曽微答效致令衡鏡失序紀綱不張官僚日增府庫歲減謬職之謗或譏於畫虎續貂敗官之尤有議於喧盧吠鵲下生朝野之蠧上悖隂陽之和水潦為災慮深於昏墊黎氓失稔憂在於溝壑軫皇情於南面墜國庾於西城虧燮理之則失平分之度推其咎戾實在微臣昔者堯逢阻饑而四嶽咨訪漢遇災異而三公䇿免舉遺才而求俊乂退不肖而清庶官厥有由來著於古昔臣緝熙莫效尸曠無成以擁腫之凡材抱支離之痼疾久懷致寇之祿猶帶妨官之綬靦目而視不遑自安是用啓處慚惶寢興誡惕思解鵜鶘之服願辭鵷鷺之行庶得保愚公之廬避賢者之路以寧衆口之囂謗以答三靈之譴咎則物情朝序誰不謂宜昔干木辭第恆思衛生營平寢瘵不忘憂國當今兵戎未靖費務方多人庶空虛官僚茍且不可不深為防慮妙思政術臣銜恩佩德念舊慚榮雖智效無聞自甘於罷黜而庸短所見猶樂於輪畫幸當明主不諱之朝敢效愚臣無隱之節倘蒙赦其猖直收其固陋乃冀有益纎芥效添山海為納言姚璹等謝勑賜飛白書表李嶠臣璹等言今月十一日侍宴蒙恩作飛白書題臣等名字垂賜跪承寶貺仰戴瓊文如披七曜之圖似發五神之檢九霄靈澤與垂露而同霑千載嘉祥共回鸞而並集冠六文而首出掩八體而孤騫渺乎若遊霧之拂春林靄乎似輕雲之上秋漢頡皇之始模蟲篆未足多竒劉后之嘗學史書孰云能擬固已工踰懸帳妙盡刻符鍾繇竭力而難比伯英絶筋而不逮則知乃神乃聖包衆智而同歸多藝多才總羣方而兼善諒天機之獨運豈凡識之能窺臣等才埒瓶筲任叨衡石器滿之誡每切於愚心棟隆之吉實慚於眀代而大慈曲奬聖造不遺厚祿尊官既殫恩而極寵良辰美景又申歡而接宴慶方行而已及澤未溥而先加殊恩與骨肉等深縟禮共衣冠相絶今復親陪睿賞特流宸翰嬴氏之魂遊天上未比超升闞生之名在月中詎方遐邈昔者韓稜深博肇蒙於署劒田鳯名流僅聞於題柱未有芝英草聖近縟於綵箋合璧連珠俯光於掌握在臣叨忝獨冠古今方且示彼記言傳諸貽訓表一人之殊寵留百代之榮觀手舞足蹈徒申踴躍之心摩頂至踵豈答生成之施璹思廉之孫武后時擢夏官侍郎坐從弟叛貶桂州長史璹取山川草樹名有武字者以為上應國姓裒類以聞后悅拜天官侍郎厯遷至地冬二官尚書為李景諶讓天官尚書表李嶠寵命載臨震悸交集鞠躬自靦屏營無措中謝臣聞俊乂在官百揆所以時叙名器妄假九流於是咸曠事關隆替義難忝越臣才疏行缺學淺智空十舍無千里之資一經乏三冬之教徒以遭逢昌運始因藉時幸雨露之曲成遇山川之廣納遂得差肩冕笏比跡流品出入臺省周旋階闥鏘金鳴玉坐榮枯朽擊水摶風顧慙腹背自忝司衡鏡亟易星輝雖智力己窮而清通未效朱紫多紊涇渭莫辨宜其抵罪觸罔稍清官謗翻乃假寵增服更垂天奬是用荷恩內訟以榮為憂且夫八座位隆五曹望重典南宫之喉舌象北斗之樞機式資藻鑑奚綜賓實自非孝先亮直彥輔公忠山濤之簡靜篤素顧談之心精體密何以對揚天哲厭塞人望顧斯政本實總國彝豈臣庸愚所堪尸忝伏願回光寢照返汗收恩察臣由衷之請矜臣陳力之議則朝端允穆天下至公四始輟在梁之譏六爻無負乘之纍矣無任慙懼之至謹詣朝堂奉表以聞李景諶嘗以鳯閣舍人證裴炎反旋同鳯閣鸞臺平章事謝臘日賜臘脂口脂表李嶠伏以安寧戒序嘉平在節白日臨於陽谷繁霜入於露寒蘅枺始停桂筵豐暇青牛帳裏未輟爐香朱鳥窗前新調鉛粉因三冬之吉慶造六宫之脂澤糅之以辛夷甲煎然之以桂火蘭蘇氣溢象奩香衝翠握光金屋之仙鄉賜瑶房之帝嬪南國容華之人從來未識西京妖冶之妾何時可見臣等叨膺天恩修總留臺雖天動星回暫違於侍從而雲行雨施更延於恩渥猥承郵驛曲賜絲綸分八子之膏腴及三臣之瑣賤竊窺明鏡己覺衣冠之不任旋顧粧奩遂成箕帚之多幸身輕塵露佩德空深貺等三山殞身何答吳曽漫録云景龍文館記三年臘日帝苑中召近臣自北門入於內殿賜食加口脂盛以翠碧鏤牙筒子美臘日詩云口脂面藥隨恩澤翠管銀罌下九霄王建宫詞云月冷天寒近臘時玉街金瓦雪漓漓浴堂門外抄名入公主人家謝口脂皆言臘日賜口脂也起處全用徐孝穆為王及善讓內史第二表李嶠臣及善言臣叨荷殊私冒陳至懇而惕慮昏於凡識深誠蔽於短辭丹槩罔通紫泥徒渥秪奉還答周惶失措中謝臣才疏行缺運偶時來榮匪德遷官由恩達法河象嶽升臺厯府行參八命坐陟九霄彤軒皂騶非振鷺之飾青組丹紱是濡鵜之譏施重丘山效微涓滴妨賢自久速謗滋深頃因齒髮之衰得蒙骸骨之賜西河退老非玩經書東海歸閒空求藥餌方養支離之疾翻成愷悌之恩曲降絲綸重收簪履徴榮槁木責焰寒灰將使䇿蹇磨鉛入總樞祕牽羸引憊參典鈞石仰抃恩渥顧探心摧桑榆且晏蒲栁先秋方與絳縣老人論其甲子淄川艾耋比其容貌將何以對敡金扆趨奉玉墀當鳯沼之便蕃望龍闈之親切况寅亮至極經綸帝道功參濟巨義等作霖隆替是因具瞻斯在永言授受豈當容易是用深鑒陳力載懷天造每憂折鼎乞保懸車且今百度惟貞九流式序鵷鴻齊列俊乂在官可使畫虎承羞豐貂竊幸謬中孚之好爵辱大雅之能官伏願深惟至公俯收曲澤矜此疲劣改命才賢則器滿之凶不纍於愚叟棟隆之吉永光於聖代及善洛州邯鄲人以父死事襲邢國公髙宗時厯春官尚書秦州都督致仕武后延問朝政及善陳治亂所宜后悅拜內史廬陵王之還密贊其謀二張怙寵每侍宴無人臣禮及善數裁抑之后不悅遂乞骸骨改文昌左相卒年八十二諡曰貞為臨川王讓千牛將軍表李嶠臣學藝無稱才行兼闕幸延兹䕃遂厯通班花蕚同榮依上林而發彩鶺鴒交集仰大厦而相歡恩比丘山效微塵露叨榮席寵荷愧承羞臣某夙奉皇眀已忝銜珠之秩兄某近承天澤又當執金之位弟兄齊列伯仲分曹咸典禁戎比參宸衛匪惟官崇祿厚思滿盈而增憂固亦秉勢操權顧章程而自惕况臣素抱愚拙更纒疴恙牽羸引憊竊位妨賢內懷尸素之慚外負朝廷之謗豈可以多塵聖化久纍能官伏乞收迹丹墀歸骸素里庇堯雲之光彩浴舜海之波瀾栁蔚桃濃聽南鄰之鐘磬茅舒桂滿陪北闕之簪纓餐厚渥而忘饑樂太平而愈疾則涵養之德瞻大造而斯𢎞靦冒之譏在微臣而知免輒陳固陋輕黷威嚴授紙彈毫驚魂悚惕為公主辭家人畜産官給料表李嶠妾聞賢相防微格盈門之車騎通人酌損忌滿堂之金玉尚子平之讀易富不如貧孔宣尼之立言奢也寧儉永言故實此為明鑒妾等並承靈坤載荷䕃中樞或天妹申慈忝扶桑之瑞蕚或王姬藉寵竊穠李之竒秀開沁水之園苑賜常山之湯沐榜懸金字分衢離巽之宫路夾銀河並列星辰之位通祕籍於龍廷之內枉仙輿於鳯樓之下殊私曲奬以日而繫年縟禮崇徽夸今而邁昔兼復别隆朝㫖猥存家務輿臺供𨽻之衣食棧廄豢牢之秣養並回中府俱出大農聚終嵗之儲但憑絲紱供闔門之費不煩機杼仰祗鴻澤退省微躬生以地髙徒竊雲霄之幸寵非德進曽微纖芥之勞何義而虛受渥恩何功而謬延賞賜是用每積慚悚常憂顛沛敢忘周公逸豫之誡深念老氏止足之言乞留聖慈俯鑒愚懇使榮無過腆滿不至溢國邑田租之常料既已豐殷馬牛陪𨽻之雜供並希停減庶得無耗府實稍清朝謗長轂逺馭不逢於致寇之人髙門洞開無怯於害盈之鬼代公主讓起新宅表李嶠臣妾言伏承聖慈以妾居處褊狹欲開拓宅北更起新第恭聞睿㫖不勝慙惕陛下骨肉之愛天至而溟深敦敘之風日隆而月厚乃復推心連蕚結念同胞方欲廣沁水之庭除增常山之版築雖殊恩曲奬惠澤實浸於肌膚而妨公害私謗訕恐盈於道路况臣妾承靈天妹藉寵王姬輿服亞於椒宫土田方於茅社甲第之當衢向市並列三區别廬之帶水連山將盈萬畝深埒則可乘騏驥髙樓則唯待鳯凰常憂瞰室之易災實懼滿堂之難守寧可更求輪奐别構崇深擾閭里之氓黎傾國家之府藏且鬼神所福常矜於缺隅賢聖垂針必誡於豐屋孫叔辭良沃之土晏嬰求湫隘之居妾雖愚蒙頗聞訓典實願歸師老氏以止足自防仰慕周公將逸豫為戒但希安分於容膝非敢攀榮於潤身且坊為要衝地當貴里畝賃二三十貫居人四五百家奪其近市之門閭生其破家之怨讟雖下人之不語豈愚妾之能安又妾之平生每存捨施屈身濟物心所願為益己害人情豈能處今麥苗雖盛穀價未豐家少糧儲人多菜色但可勸耕耘之業未宜興土木之功伏乞俯察愚誠傍詢衆望體東作之尤加知西第之非急收兹霈澤惠彼黎蒸則天下蒼生孰不欣幸無任悾款屏營之至謹遣某官詣朝堂奉表陳情以聞即此二表想見太平主輩濫恩當此昏亂之時而國用饒裕如此此非有他術只是無漏巵故耳讓右丞相表張說恩命自天戰局無地中謝臣少長儒門懇鑿墳史才非髙格官不因人徒以命偶龍興位偕鴻漸五入西掖七踐南宫中間拙延謫放直招玷缺傷矢之禽聞弦虛墜賜環之客聽歌先泣此則魂為危感氣由懼奪安可重收廢器再辱端揆何以師長禮闈正持憲府當今典章革故風教鼎新野無四隱朝有三傑具瞻之地願擇時髦臣幸沐遺簪墮履之恩好生養老之德朝遊簡牘暮對圖書受賜無涯循榮過分豈更干處士之橫議招胸奴之遙哂艾溼自瘡負乘致寇雖則愚情懷戀靦冒求寵亦望聖慈限恕令度餘年願停今授長守舊史罄陳肝膽非敢飾讓張說字道濟𤣥宗在東宫說為侍讀時太平公主不利於太子說所與密謀祕計甚衆又勸睿宗命太子監國以塞讒口篇中所謂命偶龍興云云也𤣥宗朝起仆出入不常嘗為姚崇所短謫嶽州為宇文融所誣被鞫所謂拙延謫放云云也進鬬羊表張說臣聞勇士冠雞武夫戴鶡推情舉類獲此鬭羊逺生越巂蓄情剛決敵不避强戰不顧死雖為微物志不可挫伏惟陛下選良家於六郡求猛士於四成鳥無遁林獸不藏伎如蒙效竒靈囿角力天場却鼓怒以作氣前躑躅以奮擊趹若奔雲之交觸碎如轉石之相叩裂骨賭勝濺血爭雄敢毅見而衝冠鷙狠聞而擊節冀將少助眀主市駿骨揖怒蛙之意也若使羊能言必將曰苦鬬不解立有死者所賴至仁無殘量力取勸焉臣緣損足未堪履地謹遣男駙馬都尉垍謹詣金闕門陳進輕冒宸嚴伏深戰越說為相時𤣥宗欲事吐蕃說密請講和以休息鄣塞帝曰朕待王君㚟計之說出曰君㚟好兵以求利彼入吾言不用矣後君㚟破吐蕃於青海西說䇿其且敗因上鬬羊表帝識其意賜綵千匹後瓜州失守君㚟死焉謝賜香藥面脂表張九齡臣某言某至宣勑㫖賜臣裛衣香面脂及小通中散等藥捧日月之光寒移雪海沐雲雨之澤春入花門雕奩忽開珠囊暫解蘭薰異氣玉潤凝脂藥自天來不假淮王之術香宜風度如傳荀令之衣臣才謝中人位參上將疆場效淺山嶽恩深唯因受遇之多轉覺輕生之速張公字子夀韶州曲江人中書令貶荆州長史久之封始興縣伯卒諡文獻三月三日為百官謝賜宴表宋璟伏以漢崇元已齊曰上遊咸聞執蘭以盛禊飲洛水之會囂呼不足紀也永和之遊僻陋不足追也臣等生逢多幸遇㑹聖明賜與榮渥逾溢涯分詢於史䇲超軼古今中謝伏惟皇帝陛下屈己愛人布和施恩慶賞所及萬國歡心財成之道與天悠久爰以令節錫宴公亭翠帟文茵俱來天上嘉肴清酤亦自大官欣歡之聲浹於億兆銜感之至形於頌歌而天心霈然宸章煥發曲蒙賜示捧讀兢懼涵泳五音光輝二雅流於箎磬永播無窮豈臣庸愚詎能思度今狂虜衰息年穀屢登俗被湛恩人歸夀域宴遊髙會適助時康况上宰冢卿修簪長劒前後羅列小大相從所以序聖朝之多士為百代之風流臣等叨榮無任懇迫報效何日進退知慚不勝欣忭之至璟邢州南和人纍封廣平郡公尚書右丞相卒諡文貞廣平公文僅此篇尚存近有僞作梅花賦刻文致中不可不辨然亦不足辨也四六法海卷二
