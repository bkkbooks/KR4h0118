body:
  text: 四六法海卷十二明王志堅編齊司空栁世隆行狀沈約公稟靈華嶽幼挺圭璋清襟素履發乎齠丱及長風質洞逺儀止祥華動容合矩吐言被律時沈攸之狼據陜西氣陵物上而太祖登庸作宰天歷在躬攸之播封豕之情總全荆之力兕甲十萬鐵馬千羣水陸長騖志窺皇邑公抗威川涘勇略紛紜顯晦有方出沒無緒攸之乃反斾亘圍親受矢石增櫓乘埤嚴衝駕雉雲輣俯闞地穴斜通半藏晚食負户晨汲公乃綏衆以武應敵以竒靈峰電曜威策雲舉事切三版之危氣損九天之就殘寇外老逆黨內摧焚舟委甲掬指宵遁公風標秀徹器範𢎞潤茂乎辭彩雅善鼓琴摛純蔡之髙芬纂鐘稽之妙曲雖嬰拂世務而素業無改臨姑蘇而想八桂登衡山而望九疑七紆邦組三臨蕩甸五職瑞扇一司百揆固可以齊衡八凱方駕五臣栁世隆傳事迹尚多休文為狀寥寥數語古人紀事體約乃爾淩煙樓銘宋臨川王建鮑照臣聞憑􅀈薦響唱微效長垂波鑒景功少致深是以氷臺築乎魏邑鳳閣起於漢京皆所以贊生通志感悅幽情者也伏見所製凌煙樓棲置崇回延瞰平寂即秀神臯因基地勢東臨吳甸西眺楚關奔江永㵼鱗嶺相葺重樹窮天通原盡目悲積陳古賞絶舊年誠可以暉曠髙明藻撤逺心矣夫識緣感傾事待言彰匪言匪述綿世罔傳敢作銘曰巖巖崇樓藐藐層隅階基天削户牖雲區瞰江列楹望景延除積清風露合綵煙塗俯窺淮海俯眺荆吳我王結駕藻思神居宜此萬春修靈所扶梁安寺剎下銘劉孝儀阿閣峞蘿洞房窈窱似靈光之金扇類景福之銀鋪垂琬琰之文璫飾琅玕之仙寶神童戾止亟連翩於威鳳薩埵來遊屢徘徊於紺馬有識之所虔仰無著之所招提觀慧樓而下拜望天街而興善辭曰塵沙無始造色無先飛蛾不息縈蠶自纒篋蛇未斷藤鼠方緣苦流長泛愛火恆燃髻珠孰曉懷寶詎宣挺兹靈覺時惟天仙真籍表聖化乳稱權寶剎千道髙蟠四懸鳳樓含月龍臺吐煙紫山翠羽紅水青蓮雪宫月殿晨暉夜圓宵長梵響風逺鐘傳仙衣有拂靈剎無邊新刻漏銘陸倕夫自天觀象昏旦之刻未分治歷明時盈縮之度無準挈壺命氏逺哉義用揆景測辰徼宮戒井守以水火分兹日夜而司歷亡官疇人廢業孟陬殄滅攝提無紀衛宏載傳呼之節較而未詳霍融敘分至之差詳而不密陸機之賦虛握靈珠孫綽之銘空擅昆玉𢎞度遺篇承天垂旨布在方策無彰器用譬彼春華同夫海棗寧可以軌物字民作範垂訓者乎且今之官漏出自會稽積水違方導流乖則六日無辨五夜不分嵗躔面茂月次姑洗皇帝有天下之五載也樂遷夏諺禮變商俗業類補天功均柱地河海夷晏風雲律呂坐朝晏罷每旦晨興屬傳漏之音聽雞人之響以為星火謬中金水為用時乖啓閉箭異錙銖爰命日官草創新器於是俯察旁羅登臺升庫則于地四參以天一建武遺蠧咸和餘舛金䇶方圓之制飛流吐納之規變律改經一皆懲革天監六年太嵗丁亥朔十六日壬寅漏成進御以考辰正晷測表候陰不謬圭撮無乖黍纍又可以較運算之暌合辨分天之邪正察四氣之盈虛課六歷之疏密永世貽則傳之無窮赫矣煥乎無德而稱也昔嘉量微物盤盂小器猶其昭德記功載在銘典况入神之制與造化合符成物之能與坤元等契勳倍楹席事百巾機寧可使多謝曽氷有陋昆吾金字不傳銀書未勒者哉乃詔小臣為其銘曰一暑一寒有明有晦神道無迹天工罕代乃置挈壺是惟熙載氣均衡石晷正權概世道交喪禮術銷亡遽遷水火爭倒衣裳擊刁舛次聚木乖方爰究爰度時惟我皇方壺外次圓流內襲洪殺殊等髙卑異級靈虬承注陰蟲吐吸倐往忽來鬼出神入微若抽繭逝如激電耳不輟音眼無留盻銅史司刻金徒抱箭履薄非兢臨深罔戰授受靡愆登降弗爽唯精唯一可法可象月不遁來日無藏往分以符契至猶影響合昏暮卷蓂莢晨生尚辨天意猶測地情况我神造通幽洞靈配皇等極為世作程倕字佐公吳郡吳人讀書一遍必誦于口嘗借人漢書失五行志四卷暗寫還之略無遺脫任昉為御史中丞預其宴者殷藝劉溉劉苞劉孺劉顯劉孝綽及倕號曰龍門之遊雖貴公子孫不得而預也梁武帝雅愛其才勑撰刻漏銘其文甚美遷太子中書舍人又詔為石闕銘勑褒美之賜絹三十匹纍遷太常卿石闕銘陸倕昔在舜格文祖禹至神宗周變商俗湯黜夏政雖革命殊乎因襲揖讓異于干戈而晷緯冥合天人啓惎克明俊德大庇生民其揆一也在齊之季昏虐君臨蔑侮五行怠棄三正刑酷然炭暴踰膏柱民怨神怒衆叛親離蹐地無歸瞻烏靡託於是我皇帝拯之乃操斗極把鉤陳翼百神禔萬福龍飛黑水虎步西河雷動風驅天行地止命旅致屯雲之應登壇有降火之祥龜筮協從人祗響附穿胸露頂之豪箕坐椎髻之長莫不援旗請奮執鋭爭先夏首憑固庸岷負阻協彼離心抗兹同德帝赫斯怒秣馬訓兵嚴鼓未通凶渠泥首𢎞舸連軸巨檻接艫鐵馬千羣朱旗萬里折簡而禽廬九傳檄以下湘羅兵不血刃士無遺鏃樊鄧威懷巴黔底定於是流湯之黨握炭之徒守似籓籬戰同枯朽革車近次師營商牧華夷士女冠蓋相望扶老攜幼一旦雲集壺漿塞野簞食盈塗似夏民之附成湯殷士之窺周武安老懷少伐罪弔民農不遷業市無易賈八方入計四隩奉圖羽檄交馳軍書狎至一日二日非止萬機而尊嚴之度不愆于即旅淵默之容無改于行陳計如投水思若轉規䇿定帷幄謀成几案曽未浹辰獨夫授首乃焚其綺席棄彼寶衣歸璇臺之珠反諸侯之玉指麾而四海隆平下車而天下大定拯兹塗炭救此橫流功均天地明並日月于是仰協三靈俯從億兆受昭華之玉納龍敘之圖類帝禋宗光有神器升中以祀羣望攝袂而朝諸夏布教都畿班政方外謀協上䇿刑從中典南服緩耳西羈反舌劒騎窮廬之國同川共穴之人莫不屈膝交臂厥角稽顙鑿空萬里攘地千都幕南罷鄣河西無警於是治定功成邇安逺肅忘兹鹿駭息此狼顧乃正六樂治五禮改章程創法律置博士之職而著録之生若雲開集雅之館而款關之學如市興建庠序啓設郊丘一介之才必記無文之典咸秩於是天下學士靡然向風人識廉隅家知禮讓教臻侍子化洽期門區宇乂安方面靜息役休務簡嵗阜民和歷代規模前王典故莫不芟夷翦截允執厥中以為象闕之制其來巳逺春秋設舊章之教經禮垂布憲之文戴記顯遊觀之言周史書樹闕之夢北荒明月西極流精海嶽黃金河庭紫貝蒼龍玄武之制銅雀鐵鳳之工或以聽窮省寃或以布治懸法或以表正王居或以光崇帝里晉氏浸弱宋歷威夷禮經舊典寂寥無記鴻規盛烈湮沒罕稱乃假天闕於牛頭託逺圖於博望有欺耳目無補憲章乃命審曲之官選明中之士陳圭直臬瞻星揆地興復表門草創華闕於是嵗次天紀月旅太簇皇帝御天下之七載也構兹盛則興此崇麗方且趨以表敬觀而知法物覩雙碣之容人識百重之典作範垂訓赫矣壯乎爰命下臣式銘盤石其辭曰惟帝建國正位辨方周營洛涘漢啓岐梁居因業盛文以化光爰有象闕是惟舊章青蓋南洎黃旗東指懸法無聞藏書弗紀大人造物龍德休否建此百常興兹雙起偉哉偃蹇壯矣巍巍旁映重疊上連翠微布教方顯浹日初輝懸書有附委篋知歸鬱崫重軒穹隆反宇形聳飛棟勢超浮柱色法上圓制模下矩周望原隰俯臨煙雨前賓四會却背九房北通二轍南湊五方暑來寒往地久天長神哉華觀永配無疆團扇銘庾肩吾武王玄覽造扇于前班生贍博白綺仍傳裁筠比霧裂素輕蟬片月內掩重規外圓炎隆火正石鑠沙煎清逾蘋末瑩等寒泉恩深難恃愛極則遷秋風颯至篋笥長捐勒銘華扇敢薦夏筵思舊銘庾信嵗在攝提星居鶉首梁故觀寧侯蕭永卒嗚呼哀哉人之戚也既非金石所移士之悲也寧有春秋之異髙臺已傾稷下有聞琴之泣壯士一去燕南有擊築之悲項羽之晨起帳中李陵之徘徊岐路韓王孫之質趙楚公子之留秦無假窮秋于時悲矣况復魚飛武庫預有棄甲之徵鳥伏翟泉先見橫流之兆星紀吳亡庚辰楚滅紀侯大去鄅子無歸原隰載馳轘轅長别甲裳失矣艅皇棄焉河傾酸棗杞梓與樗櫟俱流海淺蓬萊魚鱉與蛟龍共盡焚香復道詎斂遊魂載酒屬車寧消愁氣芝蘭蕭艾之秋形殊而共瘁羽毛鱗介之怨聲異而俱哀所謂天乎乃曰蒼蒼之氣所謂地乎其實摶摶之土怨之徒也何能感焉雕殘殺翮無所假於風飇零落春枯不足煩於霜露幕府初開賢俊翹首為羈終嵗門人謝焉至於東首告辭西陵長往山陽車馬望别郊門潁川賓客遙悲惣路稽叔夜之山庭尚多楊栁王子猷之舊徑唯餘竹林王孫葬地方為長樂之宫烈士埋魂即是將軍之墓昔嘗歡宴風月留連追憶平生宛然心目及乎垂翅秦川關河羈旅降乎悲谷之景實有憂生之情美酒酌焉猶憶建業之水鳴琴在操終思華亭之鶴重為此别嗚呼哀哉麟亡星落月死珠傷瓶罄罍恥芝焚蕙歎所望鍾沈德水聲出風雲劒沒豐城氣存牛斗澘然思舊乃作銘云風雲上慘舟壑潛移駸駸霜露君子先危紀侯大去懷王不返玉樹長埋風流遂逺荀伯舊縣慶封餘邑萬里歸魂修門詎入墳橫武庫山枕盧龍思歸道逺返葬無從徒留送鴈空靡長松平陵之東無復梧桐松聲蕭瑟長起秋風疇昔隆貴提攜語默託情嵇阮風雲相得有酒如澠終溫且克朝陽落鳳大野傷麟佳城鬱鬱流寓於秦山陽相送唯餘故人孀機嫠緯獨鶴孤鸞閨深夜靜風髙月寒生平巳矣懷舊何期匣中絃絶鄰人笛悲昔為幕府今成繐帷秦州天水郡麥積崖佛龕銘庾信麥積崖者乃隴底之名山河西之靈嶽髙峰尋雲深谷無量方之鷲島迹遁三禪譬彼鶴鳴虛飛六甲鳥道乍窮羊腸或斷雲如鵬翼忽巳垂天樹若桂華翻能拂日是以飛錫遙來英杯逺至疏山鑿洞鬱為淨土拜燈王於石室乃假馭風禮花首於山龕方資控鶴大都督李允信者籍於宿植深悟法門乃於壁之南崖梯雲鑿道奉為亡父造七佛龕似刻浮檀如攻水玉從容滿月照曜青蓮影現須彌香聞忉利如斯塵野還開説法之堂猶彼香山更對安居之剎昔者如來追福有報恩之經菩薩去家有思親之供敢緣斯義乃作銘曰鎮地鬱盤基乾峻極石關十上銅梁九息百仞崖橫千尋松直陰兔假道陽烏回翼載疏山穿龕架嶺糾紛星漢回旋光影壁纍經文龕重佛影雕輪月殿刻鏡花堂橫鐫石壁暗鑿山梁雷乘法鼓樹積天香嗽泉珉谷吹塵石牀集靈真館藏仙册府芝洞秋房檀林春乳氷谷銀沙山樓石柱異嶺共雲同峰别雨冀城餘俗河西舊風水聲幽咽山勢崆洞法雲常住慧日無窮方欲芥盡不變天宫終南山義谷銘并序庾信周保定二年嵗次壬午七月巳巳朔大冡宰晉國公命鑿石開谷下南山之材維公匡濟彞倫𢎞敷庶績燮理餘暇披閲山經以為終南惇物日月虧蔽杶幹栝柏椅桐梓漆年代藴積於何不有乃謀山澤之官兼列衡虞之匠東出藍田則控灞乘滻西連子午則據涇浮渭泒别八溪流分九谷銅梁四柱石闕雙聳青綺春門溝渠交映緑槐秋市舟楫相通蓄之則為屯雲泄之則為行雨青牛文梓白鶴貞松運以冥工崇斯雲屋千櫨抗殿龍首干雲萬傾疏苖蟬鳴再熟川后讓德山靈景從豈如運石甘泉才通櫟陽之殿穿渠榖水直繞金墉之城將事未勞為功實重國富人殷方傳千載因功立事敢勒山阿銘曰寥廓上浮崢嶸下鎮立壁千丈峰橫萬仞桂月危懸風泉虛韻乘輿嶺阪舉鍤雲根八溪分注九谷通源北涵銅井南浮石門橫㵼大河銀繩百堵膠葛九成徘徊千柱桂棟凌波梅梁垂雨疏川奠谷落實摧柯事均刋木功侔鑿河藥師如來繡像讚并序呂溫藥師如來像者余妻蘭陵蕭氏之所繡也貞元二十年余奉德宗皇帝之命西使吐蕃辭髙堂而出萬死介單車而馳不測國故遽至戎情猜閉坎險一遇星霜再周夫人盥饋之餘膏鉛不御日亂蓬首坐銷蕣華異域無期良時日晚始怨冬釭之久而紅芳巳闌方苦夏景之長而碧樹將落書委塵篋迹淪苔階漸昧音容孰知存沒黷龜不告因夢難徵觸慮成端沿情多緒黃昏望絶見偶語而生疑清旭意新聞疾行而誤喜循環何極刻舟靡尋浩隔理求窅非計得如聞東方有金界極樂藥師大雄散琉璃之寶光照河沙之國土能度羣品出諸幽厄一念必應萬感皆通是用濬發慧根妙求真相斷鳴機躬織之素染懿筐手績之絲盡瘁莊嚴彰施綵繡纒苦心於香縷注精意於針鋒指下而露洗青蓮思盡而雲開白日然後練時潔室華設珍供夕炬傳照晨爐續煙齊獻至誠泣敷懇願遂得慈舟密濟覺路潛引當道場發念之日是荒裔來歸之辰幽贊冥符一何昭焯乃知織回文之錦無補離憂登望歸之臺空為廢日與夫心諧妙理手結勝因進則有濟度之功退不離清淨為本從長擇善豈同日而言哉余感其志效爰用贊敘雖在妻子亦無愧詞藏諸閨門永以傳信讚曰地萬里兮天一極往無由兮來不得解脫願兮慈悲力五色繡兮黃金飾澄氛昏兮圓相開湛水月兮蓮花臺慈眼眷兮獷心回死别離兮生歸來海為田兮劫為灰身念念兮無窮哉貞元末溫以侍御史副張薦使吐蕃會順宗立薦卒於虜虜以中國有喪留溫不遣溫故與王叔文善時叔文用事與遊者皆貴顯溫在絶域不得遷元和元年乃還宗元等皆坐叔文貶溫獨免七啓曹植昔枚乘作七發傅毅作七激張衡作七辨崔駰作七依辭各美麗豫有慕之焉遂作七啓并命王粲作焉玄微子隱居大荒之庭飛遁離俗澄神定靈輕祿傲貴與物無營耽虛好靜羡此永生獨馳思乎天雲之際無物象而能傾於是鏡機子聞而將往説焉駕超野之駟乘追風之輿經迥漠出幽墟入乎泱漭之野遂屆玄微子之所居其居也左激水右髙岑背洞壑對芳林冠皮辨被文裘出山岫之潛穴倚峻崖而嬉遊志飄飄焉嶤嶤焉以若狹六合而隘九州若將飛而未逝若舉翼而中流于是鏡機子攀葛藟而登距嵒而立順風而稱曰豫聞君子不遁俗而遺名智士不背世而滅勳今吾子棄道藝之華遺仁義之英耗精神乎虛廓廢人事之紀經譬若畫形于無象造響于無聲未之思乎何所規之不通也玄微子俯而應之曰嘻有是言乎夫太極之初混沌未分萬物紛錯與道俱隆蓋有形必朽有迹必窮茫茫元氣誰知其終名穢我身位纍我躬竊慕古人之所志仰老莊之逺風假靈龜以托喻寧掉尾于塗中鏡機子曰夫辨言之艷能使窮澤生流枯木發榮庶感靈而激神况近在乎人情僕將為君子説遊觀之至娛演聲色之妖靡論變化之至妙敷道德之𢎞麗願聞之乎玄微子曰吾子整身倦世探隱拯沈不逺遐路幸見光臨將敬滌耳以聽玉音鏡機子曰芳菰精稗霜蓄露葵玄熊素膚肥豢膿肌蟬翼之割剖纎析微纍如疊縠離若散雪輕隨飛風刃不轉切山鵽斥鷃珠翠之珍搴芳蓮之巢龜膾西海之飛鱗臛江東之潛鼉臇漢南之鳴鶉糅以芳酸甘和既醇玄冥適鹹蓐收調辛紫蘭丹椒施和必節滋味既殊遺芳射越乃有春清縹酒康狄所營應化則變感氣而成彈徵則苦發扣宫則甘生于是盛以翠樽酌以雕觴浮蟻鼎沸酷烈馨香可以和神可以娛腸此肴饌之妙也子能從我而食之乎玄微子曰子甘藜藿未暇此食也鏡機子曰步光之劒華藻繁縟飾以文犀雕以翠緑綴以驪龍之珠錯以荆山之玉陸斷犀象未足稱雋隨波截鴻水不漸刃九旒之冕散曜垂文華組之纓從風紛紜佩則結緑懸黎寶之妙微符采照爛流景揚輝黼黻之服紗縠之裳金華之舄動趾遺光繁飾參差微鮮若霜緄佩綢繆或雕或錯薰以幽若流芳肆布雍容間步周旋馳耀南威為之解顔西施為之巧笑此容飾之妙也子能從我而服之乎玄微子曰豫好毛褐未暇此服也鏡機子曰馳騁足用蕩思遊獵可以娛情僕將為吾子駕雲龍之飛駟節玉輅之繁纓垂宛虹之長緌抗招搖之華旍插忘歸之矢秉繁弱之弓忽躡景而輕鶩逸奔驥而超遺風于是磎填谷塞榛藪平夷緣山置罝彌野張罘下無漏迹上無逸飛鳥集獸屯然後會圍獠徒雲布武騎霧散丹旗耀野戈殳晧旰曳文狐掩狡兔捎鷫鷞拂振鷺當軌見藉值足遇踐飛軒電逝獸隨輪轉翼不暇張足不及騰動觸飛鋒舉挂輕罾搜林索險探薄窮阻騰山赴壑風厲猋舉機不虛發中必飲羽于是人稠網密地逼勢脅哮闞之獸張牙奮鬛志在觸突猛氣不懾乃使北宫東郭之儔生抽豹尾分裂貙肩形不抗手骨不隱拳批熊碎掌拉虎摧斑野無毛類林無羽羣積獸如陵飛翮成雲于是駴鐘鳴鼓收旌弛斾頓綱縱網羆獠回邁駿騄齊驤揚鑾飛沫俯倚金較仰撫翠蓋雍容暇豫娛志方外此羽獵之妙也子能從我而觀之乎玄微子曰豫性樂恬靜未暇比觀也鏡機子曰間宫顯敞雲屋晧旰崇景山之髙塞迎清風而立觀彤軒紫柱文榱華梁綺井含葩金墀玉廂溫房則冬服絺綌清室則中夏含霜華閣緑雲飛陛凌虛俯眺流星仰觀八隅升龍攀而不逮眇天際而髙居繁巧神怪變名異形班輸無所措其斧斤離婁為之失睛麗草交植殊品詭類緑葉朱榮熙天曜日素水盈沼叢木成林飛翮凌髙鱗甲隱深于是逍遙暇豫忽若忘歸乃使任子垂釣魏氏發機芳餌沈水輕繳弋飛落翳雲之翔鳥援九淵之靈龜然後採菱花曜水蘋弄蛛蚌戲鮫人諷漢廣之所詠覿遊女於水濱耀神景於中沚被輕縠之纎羅道芳烈而靜步抗皓首而清歌歌曰望雲際兮有好仇天路長兮往無由佩蘭蕙兮為誰修嬿婉絶兮我心愁此宫館之妙也子能從我而居之乎玄微子曰豫耽嵓穴未暇此居也鏡機子曰既遊觀中原逍遙間宫情放志蕩淫樂未終亦將有才人妙妓遺世越俗揚北里之流聲紹陽阿之妙曲爾乃御文軒臨洞庭琴瑟交揮左篪右笙鐘鼓俱振簫管齊鳴然後姣人乃被文縠之華袿振輕綺之飄颻戴金搖之熠耀揚翠羽之雙翹揮流芳耀飛文歷盤鼓煥繽紛長裾隨風悲歌入雲蹻捷若飛蹈虛逺跖陵躍超驤蜿蟬揮霍翔爾鴻翥濈然鳬沒縱輕體以迅赴景追形而不逮飛聲激塵依威厲響才捷若神形難為象于是為歡未泄白日西頽散樂變飾微步中閨玄睂弛兮鉛花落收亂髮兮拂蘭澤形媠服兮揚幽若紅顔宜笑睇盻流光時與吾子攜手同行踐飛除即間房花燭爛幄幕張動朱唇發清商揚羅袂振華裳九秋之夕為歡未央此聲色之妙也子能從我而遊之乎玄微子曰豫願清虛未暇及此遊也鏡機子曰豫聞君子樂奮節以顯義烈士甘危軀以成仁是以雄俊之徒交黨結倫重氣輕命感分遺身故田光伏劒于北燕公叔畢命于西秦果毅輕斷虎步谷風威懾萬乘華夏稱雄詞未及終而玄微子曰善鏡機子曰此乃俠之徒耳未足稱妙也若夫田文無忌之儔乃上古之俊公子也皆飛仁揚義騰躍道藝遊心無方抗志雲際陵轢諸侯驅馳當世揮袂則九野生風慷慨則氣成虹霓吾子若當此之時能從我而友之乎玄微子曰豫亮願焉然方于大道有纍如何鏡機子曰世有聖宰翼帝霸世同亮乾坤等曜日月玄化參神與靈合氣惠澤播于黎苗威靈振乎無外超隆平于殷周踵羲皇而齊泰顯朝惟清王道遐均民望如草我澤如春河濱無洗耳之士喬嶽無巢居之民是以俊乂來仕觀國之光舉不遺材進各異方讚典禮于辟雍講文德于明堂正流俗之華説綜孔氏之舊章散樂移風國富民康神應體臻屢獲嘉祥故甘露紛而晨降景星宵而舒光觀遊龍于神淵聆鳴鳳于髙岡此霸道之至隆而雍熙之盛際然主上猶尚以沈恩之未廣懼聲教之未厲采英竒于仄陋宣皇明于嵓穴此寧子商歌之秋而呂望所以投綸而逝也吾子為太和之民不欲仕陶唐之世乎于是玄微子攘袂而興曰偉哉言乎近者吾子所述華淫欲以厲我秪攪豫心至聞天下穆清明君蒞國覽盈虛之正義知頑素之迷惑令豫廓爾身輕若飛願反初服從子而歸王聖俞云枚乘七發以要言妙道去病寄趣自不凡也曹植七啓以其父操秉鈞而為招隱士則其趣浸下矣繇枚而上之幾于莊列之寓言繇曹而下之即俳優雜劇不逺矣曹之措語有工絶無匹者而本趣髙下不侔容齋隨筆云原頭火燒淨兀兀野雉畏鷹出復沒將軍欲以巧伏人盤馬彎弓惜不發地形漸窄觀者多雉驚弓滿徑箭加衝人決起百餘尺紅翎白鏃隨傾斜將軍仰笑軍吏賀五色離披馬前墮此韓昌黎雉帶箭詩余讀曹子建七啓云人稠網密地逼勢脅乃知韓公用意所來處七召昭明太子假是先生負兹徑逞狀羣飛之喪侶似獨行之迷徑神忽忽而若忘意衝衝而不定鑒丹緑其無主聞鐘鼓以失聽至乃冬霰積庭空靡人聲春花滿野地無行者圜堵常閉曲突無煙同生芻之暫有共死灰之一燃篤論公子聞而崛起雖道術之可忘亦切磋之所恥命徒御以絡繹將有事于巖中車煜爚而流水馬泮渙以追風乃踰汗漫入蒙蘢至深潭之澳溟有洞室之穹崇居隱磷而出沒望嶔岑而下上竹距石以斜通水韻松以含響地不寒而蕭瑟日無雲而曭朗于是整容投刺屣履排門揚睂就席舉袂而言曰若五秀稟其生靈六情通其愛惡憎共集於鄙老嗜同歸於美樂今足下羣鳥獸以為娛處貧賤而不怍欲擯實於孤介乃貽譏乎隕穫至乃喀喀死于道邊瞀瞀填于溝壑削松筆以畫虎鼓鉛刀而刻鵠身既勞而不見事何感而莫懲欲模名于帶索豈知命于泥繩何異走長衢以避影煎流水以求氷今欲道足下以衛生之祕術怡神之妙道譬之愈疫于寒植同起尸于仙草寧願聞乎先生曰有為之生巳逼無益之慮常勞若見明于礙滯幸求救于肓膏公子曰千門始搆百常洞啓激洛開渠疏山抗陛延袤水陸曠望東西下臨江海上屬雲霓百丈杳冥以飛跨九層鬱律以階梯步三休而更回塗中宿而方迷雕牆屈曲以交牙網户周流以重積既陰岑而影響亦呌嘯而回易沙板金鋪紫柱玉舄煒煌熻赩硱磳搏敞圖雲霧之蔽虧狀神仙之來往璧璫自耀珠綴恆響蜉蝣動而晝喧熠耀飛而夜朗既臨下以寥沈亦憑高而泱漭聞疾雷於階陛弄奔星於帷幌亘以曲堂周以洞房北負連闥南注長廊綺疏交映鏤檻相望燕飛蓮井日照杏梁陽鳥騫其將動雲鳳矯而欲翔若乃後沼開源延石崇壤擬崑閬之㠨􅔍比滄溟之瀇漾其中則有桂宮柏寢吳臺柘館復道耿介而連雲阿閣穹隆而仰漢望虬欄之映水見丹鶴之出岸豔草竒色臺樹珍名長生靈壽男華女貞河栁垂葉山榴發英玩竒花之春滿摘甘實于夏成此實宫苑之壯麗豈能從我而為榮先生曰多言反道辨口傷實懼貽弊於蔀家且自安乎容膝公子曰銅瓶玉井金釡桂薪六榖九鼎百葉千珍熊踏虎掌雞跖猩脣𩻛魚雨味玄犀五肉拾卵鳳巢剖胎豹腹三臠甘口七葅愜目蒸餅十字湯官五熟海椒魯豉河鹽蜀薑劑水火而調和糅蘇蔱以芬芳崖脯追復而不盡瀆魚稍割其無傷黿羮流啜蚳醬先嘗鱠溫湖之美蚶切丙穴之嘉魴落俎霞散逐刃飛揚輕同曳繭白似飛霜蔗有盈丈之名桃表兼金之實杏積魏國之貢菱為巨野所出衡曲黃梨汶垂蒼栗隴西白榛湘南朱橘荔枝沙棠蒲萄石蜜瓜稱素腕之美棗有細腰之質並抗吻以除煩亦咀牙而消疾於是三雅陳席百味開印玉機星稀蘭英縹潤既夷志於坎壈亦懷忘於鄙吝此蓋滋旨之極珍豈能從豫而共進先生曰不貴偷食寧甘醇酒既深悟於腐腸豈自迷於爽口公子曰秦氏獨立燕姝絶世如短如長不穠不細信耳目之妖冶乃古今之佳麗妍姿豔逸淑性間華效施顰於宋里經墮馬於梁家折纎腰以微步呈皓腕乎輕紗臨池正領拂鏡看花觀堵墻以颯沓傾城國以喧譁墨欲歸而抽軫惠將返而回車至乃鄭衛繁聲抑揚絶調足使風雲變動性靈召感擊哀響則春臺之人悵焉而雪泣起歡情則崩城之婦嫣然而微笑嶰谷調鳳之竹龍門獨鵠之柯緑珠絳樹宋子韓娥青春婉娩上客經過開洞房以命賞召才人而合宴舉輕幔以徐來隔珠簾而可見牀披珍象簟展羅薦聽促柱之方調聞簧聲之始囀步想象以頓足腕蹣連而拂面托斜視於遺簪寄含情而舉扇俄而夕鳥東返落日西懸綺霞映水蛾月升天解鴛鴦之繡被拂距􅀢之長氊燭羽幃而動爛薰蕙帳而微煙願橫施以自昵脫斜領於君前此乃聲色之妖蕩將不從我而留連先生曰淫聲非篤論之旨麗色本余情所棄伐國不問仁人此言從何而至公子曰嵗晚農休時間務隙山火巳燎野霜初白聊效殺於秋冬乃從禽於草澤蜀地五丁齊國二子氣動山漂汗揮雨起渥窪流赬蘭池照血躡飛影於未形赴奔星於欲滅革車隱隱轂騎闐闐鼓譟喧而振地蒸徒駭而括天割玉之刀飲石之箭罝羅布其一目罟網周及三面犬號驤螭鷹名奔電暫離巳合忽隱仍見赴迥超危衝林跋援草隨足起山從眼轉跨躡罔澗電舉陵阪鳥不及飛獸不遑伏既前轥而後赴亦左排而右蹴跖實駭而自救騰虛亂而相撲視灑血之丹地見飛毛之暗目傍窮劫剞勢極搜求文皮坐裂膬尾生抽手羈鐵頂足披銅頭象折牙而陵遽貊拉齒而夷由擒髙樓之度索走大樹之神牛雁聞弦而跕墮猿抱木而啾啁笑楚王之雲夢恥漢帝之中流此武材之矯猛豈能從我而畋遊先生曰馳騁傷仁好殺非勇幸廣內之豐樂何禽荒之足重公子曰踆鳥始照宫槐遽而欲舒顧兔才滿庭英紛而就落譬光影於飛浮比生靈於栖託擾擾摩肩轔轔方駕立怵迫於毁譽獨殷勤於用舍嗟向有而今無歎後榮而稱謝清歌雅舞暫同於夢寐廣厦髙堂俄成於幻化若夫洗精服食慕道遊仙尋玉塵於萬里守金竈於千年三尸可度九轉難傳飛騰水陸咀嚼靈玄若乃壁上真辭枕中祕要彈壓神鬼吐納靈妙既變醜以成妍亦反老而為少虬駕夭矯而出沒霓裳颯沓而容與接鵠馭於後乘追鳳簫於前侶雨散漫以霑服雲霏微而襲宇瞰芝闕以窈窕見玉臺之相拒蓋排煙而漸滅旌拖風而未舉值解佩於江濱逢弄珠於漢渚薄遊玄圃弭節太華列神童於羽帳侍玉女於仙車澗採兮危實苑拔兮回花聽弱水之晨浪望昆山之夕霞窮北辰而比壽指中嶽以為家此神仙之恍惚豈從我而觸邪先生曰捕影之言莫測繫風之論難盡未嘗留意於死生豈稍論於椿菌公子曰洙泗遺文鄒魯餘烈其道未逺其風不絶方領圓冠金口木舌談章句之逺旨搆紛綸之雅説陳五禮明六詩貫穿微妙辨析毫釐既待問以重席亦覃思而下幃醖藉愷悌和樂緝熙生徒肅肅賓友師師並接袵以聞道俱援手而受辭心絶內戰事無外欲橫經者比肩擁帚者繼足醜申韓之法令陋桓文之風俗六郡湊其衣冠五陵窮其軌躅信斯文其若水實斯人之如玉若夫珠璣産於蚌蛤圭璧出於山淵未有玉不瑩而為寶人無學而稱賢蓋持身之管籥進德之舟船響如鐘而待叩明似鏡而常懸此見重於經術寧降志於吾賢先生曰誠此言之甚美比斯道之為曠恥見嘲於腐儒豈求珍於席上公子曰我大梁之啓基方邃古而無匹先天定始比殷周而餘裕揖讓受終考唐虞而不失道德有序憲章咸秩六府孔修百司盡畢搜求儒雅招拾遺逸旰食思治雖聞之於昔談昧旦臨朝乃見之乎兹日蕩蕩薰風泱泱大興道含𢎞而廣被澤汪濊而傍闡採輿人之片言納匹夫之小善事在微而畢照然無幽而不顯若夫下車布德伐罪弔民風無偃稼雨不破塵覩勝殘於期月見成俗於浹辰含羣生兮如海養萬類其猶春鄉無豖食之祿野靡狼顧之民樵者目金而知恥耕夫讓畔以成仁何大庭之足競豈栗陸之能鄰璧水道庠序之風石渠啓圭璋之盛竒士輻輳而騁足異人間出而效命大小之獄無寃民翾飛之動無天性故能睦之以九世齊之以七政坦坦恢恢巍巍赫赫政德洽於霜風教義窮於足迹望雲氣而款關候海水而重譯所謂府不輟貢史無虛帛天瑞磊珂而相尋地符氛氲而不少收六穗於征賦玩九莖於池沼三足應感而來儀一角知時而自擾映景星於初月聆鳳音於將曉若乃亭毒不疵合天地而並施陶鈞日月與造化而齊功故非言辭之可具盡筆札之所能窮懷真獨往之夫奔走而從事滅迹藏名之士顛倒而向風二漢有同於兒戲魏晉無礙於胸中言未畢先生攝衣而起曰子前所説似玉巵之無當徒費辭而難領譬由背日而視秋毫却行而求鄢郢一聞皇王之盛則豁然神悟而理攄志無時而可卷邦有道而宜舒敢以殘智請從後車演連珠二十二首陸機臣聞任重於力才盡則困用廣其器應博則凶是以物勝權而衡殆形過鏡則照窮故明主程才以效業貞臣底力而辭豐臣聞世之所遺未為非寶主之所珍不必適治是以俊乂之藪希蒙翹車之招金碧之巖必辱鳳舉之使臣聞靈輝朝覯稱物納照時風夕灑程形賦音是以至道之行萬類取足於世大化既洽百姓無匱於心臣聞鑒之積也無厚而照有重淵之深目之察也有畔而眂周天壤之際何則應事以精不以形造物以神不以器是以萬邦凱樂非悅鐘鼓之娛天下歸仁非感玉帛之惠臣聞積實雖微必動於物崇虛雖廣不能移心是以都人冶容不悅西施之影乘馬班如不輟泰山之陰臣聞智周通塞不為時窮才經夷險不為世屈是以陵飈之羽不求反風曜夜之目不思倒日臣聞利眼臨雲不能垂照朗璞蒙垢不能吐輝是以明哲之君時有蔽壅之纍俊乂之臣屢抱後時之悲臣聞覽影偶質不能解獨指迹慕逺無救於遲是以循虛器者非應物之具玩空言者非致治之機臣聞鑽燧吐火以續暘谷之晷揮翮生風而繼飛亷之功是以物有微而毗著事有瑣而助洪臣聞春風朝煦蕭艾蒙其溫秋霜宵墜芝蕙被其涼是故威以齊物為肅德以普濟為𢎞臣聞出乎身者非假物所隆牽乎時者非克巳所朂是以利盡萬物不能睿童昏之心德表生民不能救棲遑之辱臣聞傾耳求音視優聽苦澄心徇物形逸神勞是以天殊其數雖同方不能分其戚理塞其通則並質不能共其休臣聞遁世之士非受匏瓜之性幽居之女非無懷春之情是以名勝欲故偶影之操矜窮愈達故凌霄之節厲臣聞飛轡西頓則離朱與矇瞍收察懸景東秀則夜光與碔玞匿耀是以才換世則俱困功偶時而並劭臣聞示應於近逺有可察託驗於顯微或可包是以寸管下傃天地不能以氣欺尺表逆立日月不能以形逃臣聞絃有常音故曲終則改鏡無畜影故觸形則照是以虛巳應物必究千變之容挾情適事不觀萬殊之妙臣聞放身而居體逸則安肆口而食屬厭則充是以王鮪登俎不假吞波之魚蘭膏停室不思銜燭之龍臣聞達之所服貴有或遺窮之所接賤而必尋是以江漢之君悲其墜屨少原之婦哭其亡簪臣聞觸非其類雖疾弗應感以其方雖微則順是以商飈漂山不興盈尺之雲谷氣乘條必降彌天之潤故暗於治者唱繁而和寡審乎物者力約而功峻臣聞煙出於火非火之和情生於性非性之適故火壯則煙微性克則情約是以殷墟有感物之悲周京無佇立之迹臣聞適物之技俯仰異用應事之器通塞易任是以鳥棲雲而繳飛魚藏淵而網沈賁鼓密而含響朗笛疏而吐音臣聞虐暑薰天不減堅氷之寒涸陰凝地無纍陵火之熱是以吞縱之強不能反蹈海之志漂櫓之威不能降西山之節臣聞理之所開力所常達數之所塞威有必窮是以烈火流金不能焚景沈寒凝海不能結風臣聞足於性者天損不能入貞於期者時纍不能淫是以迅風陵雨不謬晨禽之察徑陰殺節不凋寒木之心為人作連珠二首劉孝儀妾聞洛妃髙髻不資於草澤玄妻長髮無藉於金鈿故雲名由於自美蟬稱得於天然是以梁妻獨其妖豔衛姬專其可憐妾聞芳性染情雖欲忘而不歇薰芬動慮事逾久而更思是以津亭掩馥秪結秦婦之恨爵臺餘妬追生魏妾之悲擬連珠二十四首庾信蓋聞邯鄲巳危徒思馬服薊城去矣空用荆軻是以竹杖扶危不能正武擔之石蘆灰縮水不能救宣房之河蓋聞穴蟻衝泉未知逺慮玄禽巢幕何能支久是以大厦既焚不可灑之以淚長河一決不可障之以手蓋聞謀猷是習權變須長時增齊竈或卧燕牆是以井陘之兵如鴻毛之遇火長平之卒若秋草之中霜蓋聞彼黍離離大夫有喪亂之感麥秀漸漸君子有去國之悲是以建章低昻不得猶瞻灞岸德陽淪沒非復能臨偃師蓋聞市朝遷貿山川悠逺是以狐兔所處由來建始之宫荆棘參天昔日長洲之苑蓋聞天方薦瘥喪亂𢎞多空思説劒徒聞枕戈是以劉琨之英略莫知自免祖逖之慷慨裁能渡河蓋聞穀林長逺蒼梧不從惟桐惟葛無樹無封是以隋珠日月無益驪山之火雀臺絃管空望西陵之松蓋聞死别長城生離函谷遼東寡婦之悲代郡孀妻之哭是以流慟所感還崩杞梁之城灑淚所沾終變湘陵之竹蓋聞三世用兵既非貽厥陰謀纍葉必以凶終是以李郡尉之風霜上蘭山而箭盡陸平原之意氣登河橋而路窮蓋聞營魂不反磷火宵飛時遭獵夜之兵或斃空亭之鬼是以射聲營之風雨時有寃魂廣莫郡之陰寒偏多夜哭蓋聞江黃戎馬之徼鄢郢風飈之格乍有去而不歸或無期而逺客是以章華之下必有思子之臺雲夢之傍應多望夫之石蓋聞無怨生離恩情中絶空思出水之蓮無復回風之雪是以樓中對酒而緑珠前去帳裏悲歌而虞姬永别蓋聞嚴霜之零無所不肅長林之斃無所不標是以楚塹既填遊魚無託吳宫巳火歸燕何巢蓋聞性靈屈折鬱抑不揚乍感無情或傷非類是以嗟怨之水特結憤泉感哀之雲偏含愁氣蓋聞遷移白羽流徙房陵離家拆里悽恨撫膺是以吳起之去西河澘然出涕荆軻之别燕市悲不自勝蓋聞廉將軍之客館翟廷尉之髙門盈虛倐忽貴賤何論是以平生故人灌夫不去門下賓客任安獨存蓋聞執圭事楚博士留秦晉陽思歸之客臨淄羈旅之臣是以親友會同不妨懷撫悽愴山河離異不妨風月關人蓋聞五十之年壯情久歇憂能傷人故其衰矣是以譬之交讓實半死而言生如彼梧桐雖殘生而猶死蓋聞秋之為氣惆悵自憐耿恭之悲疏勒班超之念酒泉是以韓非客秦避讒無路信陵在趙思歸有年蓋聞居蘭處庖在其所習白羽素絲隨其所染是以金性雖質處劒即凶水德雖平經風即險蓋聞豫章七年斃於豐草芳蘭九畹淪於幽谷是以欲求其真晉陽有自埋之蒿若賞其聲吳亭有巳枯之竹蓋聞卷葹不死誰必有心甘蕉自長故知無節是以螺蚌得路恐異驪淵雀鼠同歸應非丹穴蓋聞北邙之髙魏君不能削穀洛之鬬周王不能改是以愚公何德遂荷鍤而移山精衛何禽欲銜石而塞海蓋聞磨礪脣吻脂膏齒牙臨風扇毒向影吹沙是以敬而逺之豺有五子吁可畏也鬼有一車連珠二首吳均蓋聞豔麗居身而以蛾睂入妬貞華照物而以絶等見猜是以班姬辭寵非無妖冶之色揚子寂寞豈乏炫曜之才蓋聞義夫投節不必識君烈士赴危豈期要利是以墨子縈帶不蒙肉食之謀申胥泣血非有執圭之位東陽金華山栖志劉峻夫鳥居山上層巢木末魚潛淵下窟穴泥沙豈好異哉蓋性自然也故有忽白璧而樂垂綸負玉鼎而要卿相行藏紛糾顯晦蹐駁無異火炎水流圓動方息斯則廟堂之與江海蓬户之與金閨並然其所然悅其所悅烏足毛羽瘡痏於其間哉豫生自原野善畏難狎心駭雲臺朱屋望絶髙蓋青組且霑濡霧露彌願間逸每思濯青瀨息椒丘寤寐永懷其來尚矣蚓專噬壤民欲天從爰洎二毛得居巖穴所居東陽郡金華山東陽實會稽西部是生竹箭山川秀麗臯澤坱鬱若其羣峰疊起則接漢連霞喬木布濩則春青冬緑回溪映流則十仞洞底膚寸雲合必千里雨散信卓犖爽塏神居奧宅是以帝鴻遊斯鑄鼎雨師寄此乘煙故澗勒赤松之名山貽縉雲之號近代江治中奮迅泥滓主徵士髙拔風塵龍盤鳳栖咸萃兹地良由碧湍素石可致幽人者哉金華山古馬鞍山也藴靈藏聖列名仙牒左元放稱此山云可免洪水五兵可合神丹九轉金華之首有紫巖山山色紅紫因此為稱靡迤陂陀下屬深渚巑岏嶾嶙上虧日月登自山麓漸髙漸峻壟路迫隘魚貫而升路側有絶澗閘閜庨豁俯窺木杪焦原石邑匪獨危懸至山將半便有廣澤大川臯陸隱賑豫之葺字實在斯焉所居三面皆回山周繞有象郛郭前則平野蕭條目極通望東西帶二澗四時飛流泉清瀾微霔滴瀝生響回波跳沫洶涌成音並漕瀆通引交渠綺錯懸溜㵼於軒甍激湍回於階砌供帳無綆汲盥漱息瓶盆楓櫨椅櫪之樹梓柏桂樟之木分形異色千族萬種結朱實包緑裹杌白蒂抽紫莖橚矗苯䔿捎風鳴籟垂條櫩户布葉房櫳中谷澗濱華蕊攢列至於青春緩謝萍生泉動則有都梁含馥懷香送芬長樂負霜宜男泫露芙蕖紅花照水皋蘇縹葉從風憑軒永眺蠲憂忘疾丘阿陵曲衆藥灌叢地髓抗莖山筋抽節金鹽重於素璧玉豉貴於明珠可以養性消疴還年駐色不藉崔文黃散勿用負局紫丸翺翺羣鳳風胎雨鷇緑翼紅毛素纓翠鬛肅肅毛羽關關好音皆馴狎園池旅食雞鶩若乃䲰日伺晨響類鐘鼓鳴蚿侯曙聲像琴瑟玄猿薄霧清囀飛㹳乘煙咏吟嘈囋嘹亮悅心娛耳諒所以跨躡管籥韜軼笙簧宅東起招提寺背巖面壑層軒引景邃宇臨崖博敞間虛納祥生白左瞻右睇仁智所居故碩德名僧振錫雲萃調心七覺詆訶五塵郁列戒香浴滋定水至於薰爐夜爇法鼓旦聞豫則跕屣摳衣躬行頂禮詢道哲人欽和至教每聞此河紛梗彼岸永寂熙熙然若登春臺而出宇宙唯善是樂豈伊徒言寺東南有道觀亭亭崖側下望雲雨蕙樓菌榭隱映林篁飛觀列軒􅌑瓏煙霧日止却粒之氓嵗集神仙之客餌星髓吸流霞將乃雲衣霓裳乘龍馭鶴觀下有石井聳跱中澗雕琢刻削頗類人工躍流􅀈㵼漭涌泱咽電擊雷吼駭目驚魂寺觀之前皆植修竹檀欒蕭瑟被陵緣阜外則良田區畛通接山泉膏液鬱潤肥腴鄭白決漳莫之能擬致紅粟流溢鳬雁充厭春鱉旨膳碧雞冬菌味珍霜鵽縠巾取於丘嶺裋褐出自中園寒蔣逼側於池湖菅蒯駢填於原隰養給之資生生所用無不阜實蕃籬充牣崖巘嵗始年季農隙時間濁醪初䍤醥清新熟則田家野老提壺共至班荆林下陳樽置酌酒酣耳熱屢舞喧呶晟論箱庾髙談榖稼嗢噱謳歌舉杯相抗人生樂耳此歡豈訾若夫蠶而衣耕而食日出而作日入而息晚食當肉無事為貴不求於世不忤於物莫辨榮辱匪知毁譽浩蕩天地之間心無怵惕之警豈與稽生齒劒楊子墜閣較其優劣者哉唐憲宗章武皇帝哀册文令狐楚維元和十五年嵗次庚子正月甲戍朔二十七日庚子移殯於大內太極殿之西階粵五月十五日庚申遷座於景陵禮也玉衡南指金波西落皓雪集其麻衣素雲褰其綃幕栁宫龍動竹池魚躍兆庶雨泣於浩穰萬靈風號於寥廓哀子嗣皇帝仰攀雕輦殷奠瓊筵哀無容以觸地痛不返而終天仙杖徐進宸儀永隔降睿旨於鸞臺揚聖功於鳳册其詞曰配天惟唐伊祁同光應道為帝玄元之系聖人有作孝子善繼顯赫十朝總齊四裔執其大象司彼左契武烈誕敷文明下濟出潛離隱或躍未融親則盤石封殊剪桐承祧黃屋主鬯清宫禮樂盡在謳歌荐至軒皇倦勤傳付神器太母侍養親臨寶位怡聲下色先意承志家令敢言天子屏貴明明出震業業承乾其仁如山其智如泉理析堅白學探幽玄揮毫霧動掞藻霞鮮所持者儉所寶者賢刑靡不省賞無不延冕旒迎日圭璧祈年涕謁宗廟臣朝昊天天縱神聖日躋孝敬鴻名再加寶歷一定窮人屢賑名士交聘獸愛觸邪草憐指佞梯航修貢鱗羽遂性河色呈符山聲告慶編書辨謗創殿思政甘節必稱苦言終聽稜威之逺德政之盛霜雪憲章雷風號令夏臺齒劒上黨納穽趙際宅心鄴中聽命誰能去兵王者有征玉壘霧廓金陵鏡清狐鳴上蔡蟻聚東平伏鑕就戮回戈受烹始以上殺歸於好生恢恢不識蕩蕩難名信及隱微道存溥博走馬斯却昆蟲咸若調其玉燭徇以木鐸混同車書逺頒正朔範金合土大興太學清蹕鳴鑾將登髙嶽四維既張五刃巳藏蠻夷戎羌敢不來王天下清淨朝廷樂康會冠劒以髙宴戲魚龍於廣場有嚴有翼無怠無荒俗皆臻於壽域人自為於羲皇日出入兮安窮極雲飛揚兮無處所瑞方瞻乎鳳來災忽聞於鸛語謂百年之可卜嗟九齡之不與當凝流而下臨奄脫屣以輕舉萬姓哀其考喪千官懷其后撫封人猶祝於南山帝子巳號於北渚嗚呼哀哉被靈衣兮如在委仙佩兮若休建環海以靜寐謝鼎湖而逺遊桂華朗兮髙殿寂梧葉暗兮深宮愁驚同軌之遽至咽長川而不流嗚呼哀哉威儀肅設文物前列酌玉斚以宵奠駕金根而曉發出朱雀之正門背青鸞之迥闕逶迤原野蒼茫日月去復去兮降堯階悲莫悲兮臨禹穴嗚呼哀哉地開蒼谷天作豐山江海自流於泉下城郭取象於人間髙封馬鬛永祕龍顔鱗有逆兮曽觸髯欲升兮尚攀朝百靈兮肅肅遺八駿以間間陵植柏兮未拱閣生苔兮巳斑嚴日宫而深閉藹雲幄以空還與衆感於萬井結宸悲於九關嗚呼哀哉神行無方乾健不息物皆被於聖澤人自迷於帝力巍乎髙代之行至矣動天之德後玄壤以長存冠蒼穹以罔極嗚呼哀哉弔莊周文嵇含帝壻王𢎞逺華池豐屋廣延賢彥圖莊生垂綸之象記先達辭聘之事畫真人於刻桷之室載退士於進趣之堂可謂託非其所可弔不可讃也其辭曰邁矣莊周天縱特放大塊授其生自然資其量器虛神清窮玄極曠人偽俗季真風既散野無訟屈之聲朝有爭寵之歎上下相陵長幼失貫於是借玄虛以助溺引道德以自奬户詠恬曠之辭家畫老莊之象今王生沈淪名利身尚帝女連耀三光有出無處池非巖石之溜宅非茅茨之宇馳屈産於皇衢畫兹象其焉取嗟乎先生高迹何局生處巖岫之居死寄雕楹之屋託非其所沒有餘辱悼大道之湮晦遂含悲而吐曲含字君道蕃之子也舉秀才除郎中時𢎞農王粹以貴公子尚主圖莊周於室集朝士使含為讚含援筆為弔文文不加點粹有愧色後以亂奔劉𢎞於襄陽𢎞卒或欲留含領荆州含性剛躁素與司馬郭勱有隙勱疑其害巳夜掩殺之支道林曰君自見其朱門貧道如遊蓬户稽含此文似未見到此然在當時實正論也借玄虛以助溺一語可謂切中膏盲祭雜墳文任孝恭惟爾冥然往代求圓石而無名邈矣遐年討方磚而不記封樹遭殄誰别羽商之家墳壠傾回終迷庚癸之向近創此伽藍實須泥丸命彼碩人置兹屯邑不謂綸繩所用遂毁牛亭之基鍬鍤所侵爰傷馬鬛之勢重使翠幕臨風佳城見日昔靈沼枯骨周王改以衣冠廣武橫尸漢主加其轊櫝輒勒彼山虞覆頽隍於舊趾命兹匠者修反壤於故林還蟻結之文依似坊之勢幸得宜陽大道無變無移京兆長阡勿回勿徙庶幽魂遊止踐昔徑而不疑塗車往還瞻舊轍而猶在孝恭臨淮人梁中書通事舍人專掌公家筆翰明佛理持戒甚篤而性頗自伐後為侯景所殺世有興復古剎而壞人先墓者請讀此文祭夫徐悱文劉令􅈺維梁大同五年新婦謹薦少牢於徐府君之靈曰惟君德爰禮智才兼文雅學比山成辨同河㵼明經擢秀光朝振野調逸許中聲髙洛下含潘度陸超終邁賈二儀既肇判合始分簡賢依德乃𨽻夫君外治徒奉內佐無聞幸移蓬性頗習蘭薰式傳琴瑟相酬典墳輔仁難驗神情易促雹碎春紅霜雕夏緑躬奉正衾親觀啓足一見無期百身何贖嗚呼哀哉生死雖殊情親猶一敢遵先好手調薑橘素俎空乾奠觴徒溢昔奉齊睂異於今日從軍暫别且思樓中薄遊未反尚比飛蓬如當此訣永痛無窮百年何幾泉穴方同梁書徐悱字敬業東海剡人幼聰敏能屬文為晉安內史卒喪還建業妻劉令􅈺為祭文詞甚悽愴父勉欲造哀文既覩此作於是閣筆令􅈺孝綽之第三妹也孝綽三妹並有才學令􅈺文尤清拔無限才情出之以簡淡當是幽間貞靜之婦是編上下千餘年婦人與此者一人而巳祭長安楊郎中文李商隱年月日謹以云云之奠祭於宗尹郎中之靈昔莊南華之言物故則曰如巨室之偃歸人陶真白之語玄機則曰雖頑仙不如才鬼邈矣髙論皭然深旨有感斯文屬在之子黃河九曲泰華三峰陽亭之右隂晉之東泱漭佳氣肸蠁孤風生民之秀惟子之宗既懼四知亦畏三惑昔佐赤符實毗皇極坦蕩王道昭宣帝則丹青不朽琬琰是刻狀日具東侔辰在北子之伯仲不沗前人粉飾賢路抑揚薦紳雲間日下國華席珍排龍掩陸突鶴摧旬卓爾風標朗然流品妍若春輝烈如冬凜燕石知愧齊竽自審咸指路以光銷盡登門而聲寢難售者價重難知者聲清披沙揀金由是不愧鳥散花落於今有情劉儒十行孫𢎞三道直路猶絃蠧政如掃筆海驚波詞園鞠草文場不寫於中心册苑空留於祕寶晉千里國漢第一功建幢油碧啓幕蓮紅賓髙主擇韻合人同固不能加減陳掾亦可以喜怒桓公衣蕭含香省蘭臺柏赤管朝操青縑夜襞佐計相則生聚有經贊地官則孤終叶籍於惟荔蒲言念金昆毁冠禠帶雪泣星奔宅裏之荆枝半謝嶺頭之梅蕚空繁陟岡望兄詩客之情何極歸縣見姊騷人之恨猶存乃擢戎曹遂荒京令將換清切以扶明聖不知者壽難言者命未謁季良之醫巳革曽參之病嗚呼平生世路半臂交期孫金盧米百賦千詩桂林崑嶠一片一枝終以浮沈因兼險夷對臯壤之搖落成老大之傷悲尚冀他年或陶良夜酒筵琴席燈闈月榭俱開愁别之襟並息分岐之駕短景未果良辰不借竟鬱結於深衷倐淹淪於大化况南康解榻早降清光會稽繼組昨辱餘芳情分逾極銜哀更長三十年之間難追往事五十里之外正恨殊鄉地闊山深川寒樹古杳杳玄夜荒荒宿莽生金認石埋玉恨土寄奠緘詞呼風涕雨噫戲噫戲宗尹之魂來否祭全義縣伏波廟文李商隱年月日觀察處置使兼御史中丞鄭亞謹遣全義縣令韋必復以酒牢之奠昭賽於漢伏波將軍新息侯馬公越城舊疆漢將遺廟一泒湘水萬重楚山比潁川袁氏之臺悲同異日方汝水周公之渡感極當時嗚呼昔也投隙建功因時立志隗將軍坐談西北棄去無歸梁伯孫自降王姬雖來不起以若畫之睂宇開聚米之山川扶風里中詎守錢而為虜德陽殿下寧相馬以推工悵望關西超馳隴首事嫂冠帶誡姪書成龍伯髙之故人其言有所公孫述之刺客相待何輕鳶跕啓行蠻溪請往銅留鑄柱草誓裹尸男兒巳立邊功壯士猶羞病死灕湘之滸祠宇依然豈獨文宣之陵不生刺草更若武侯之壠仍有深松向我來思停車展敬一尊有奠五馬忘歸及申望嵗之祈又辱有秋之澤雲興柱礎電繞墻藩何煩玉女之投壺方聞天笑不待樵人之取箭巳見風回敢忘黍稷之馨用報京坻之賜屬以時非行縣不獲躬詣靈壇詞托煙波意傳天壤既謝三時之澤兼論千載之交勿負至誠以孤玄契賽古欖神文李商隱某月日賽於古欖之神惟神爰因碩果遂啓靈祠瓜美邵平且傳舊志李標朱仲亦茂前經昨日瘴暑為災油雲不起式存心禱慮作神羞神能感氣蜧泉傳祥鸛垤使宋生抒賦始悅於雄風高氏讀書忽驚於暴雨化太甚旱為大有年將見助於歡康敢忘懷於昭賽此義山在鄭滎陽桂州幕中作也杜牧之亦有池州祭木瓜神文中云禱神之際甘雨隨至稿然凶嵗化為豐年可見當時長吏留心民事猶有遍走羣望遺意為裴懿無私祭薛郎中文李商隱伏惟靈佐商宣業朝薛傳規門崢層搆堂嶪崇基玉生藍岫芝産銅池梧髙駐鳳蓮馥停龜有美令人載稱清邵訓在詩書樂惟名教王謝標格曹劉才調清如濯熱之風明若觀朝之燎靈臺委鑒虛空融和秋水望闊春臺上多鄉孰掉鞅文林勵戈研橫河漢紙落煙波澤宮貍首棘場楊葉箭去星慙弓回月怯兩書上第五辟名公馬卿賦雪陳琳愈風平臺竹苑淮山桂叢營分細栁幕染芙蓉顯備臺僚榮徙憲秩冠峩鐵徑衣明繡密霜下端簡風生落筆夜庭烏回天秋隼疾帝念允職任於諫垣依違絶想從容敢言攀檻而空留迹在削藁而不見書存女史護衣大官供食伏奏多可分曹著績帳暖錦麗闈明粉白既題柱以如田亦償金而類直漢榮出牧晉議州兵亷袴歌送劉錢贈行濟南之誅巨猾揚州之試諸生虎去江靜珠來岸明神豈好謙天寧秩禮蠧華國之名品喪士林之模楷使為善者奪氣求仁者解體巳不駐於卿雲竟何窺於洑濟長洲樹古茂苑山春橘稅既集茶征是親鷁渡霅而去逺鵠下亭而唳頻翟虜氛興殷楹夢起帳入飛鵩牀驚鬬蟻鄭玄知數阮瞻無鬼終日膏肓傅於骨髓嗚呼哀哉丹霄萬里建木千尋坦坦清路瞳瞳翠陰三襲臺回九重禁深中懸流扆下集華簪無非東箭盡是南金或扶傾作棟或望旱為霖顯允明公宜膺百福夜暗神昧天長景促青女變霜羲和納旭悄隋掌以銷璣慨周間之喪騄永惟清族本富才人有弟則陸無兄不荀原鴒奕奕沼雁馴馴珩竒動楚璧貴傾秦永矣彼蒼胡然人事但續椿壽徒髙鶴位摧壓光價掩淪聲味潁不濁而殄灌宗淮未絶而傾王氏某甲因承中外獲奉恩知通孔李道德之舊兼盧劉姻戚之私鑄顔有契全趙為期靜龍門之風水剷羊腸之嶮巇空欲銘恩何酬樹德庇孤根於髙援許加姻於弱植將歡宋子俄放湘南綬黃楚徼鬚白昭潭歸止未卜棄豫是甘許靖之悲方極王粲之憂不堪猶如重言將敦故約王無改行金不如諾朂大義於幽沈軫遐心於漂泊使者尚在凶書巳來雁足空遠魚腸不回淚和峽雨哭振巴雷孰澆枯鮒誰爇寒灰今則言去郴江當移灃浦稍脫疑網猶罹罪罟念深慟以無期豈沈寃之可吐嗚呼哀哉執紼路阻佳城望賖凌空乏翼上漢無槎或期他日或及中華認楊公之石馬撫周苞之辟邪况良冶規存遺經業在臧孫有後魏萬必大敢期陋質終托餘光韋平之貂續無望秦晉之婚姻豈忘絮酒無幾生芻是將辭多失次涕數無行翼桂旌之不逺降蘭珮之餘芳嗚呼哀哉尚饗但續椿壽徒髙鶴位即所謂使君輩存令此人死也一經爐錘醖藉多少陶徵士誄并序顔延之夫璿玉致美不為池隍之寶桂椒信芳而非園林之實豈期深而好逺哉蓋云殊性而已故無足而至者物之藉也隨踵而立者人之薄也若乃巢髙之抗行夷皓之竣節故巳父老堯禹錙銖周漢而綿世浸逺光靈不屬至使菁華隱沒芳流歇絶不其惜乎雖今之作者人自為量而首路同塵輟塗殊軌者多矣豈所以昭末景泛餘波有晉徵士尋陽陶淵明南嶽之幽居者也弱不好弄長實素心學非稱師文取指達在衆不失其寡處言逾見其默少而貧病居無僕妾井臼不任藜菽不給母老子幼就養勤匱逺惟田生致親之誼追悟毛子捧檄之懷初辭州府三命後為彭澤令道不偶物棄官從好遂乃解體世紛結志區外定迹深棲於是乎逺灌畦鬻蔬為供魚菽之祭織絇衢緯蕭以充糧粒之費心好異書性樂酒德簡棄煩促就成省曠殆所謂國爵屏貴家人忘貧者歟有詔徵著作郎稱疾不到春秋若干元嘉四年月日卒於尋陽縣之某里近識悲悼逺士傷情冥默福應嗚呼淑貞夫實以誄華名由諡髙茍允德義貴賤何算焉若其寬樂令終之美好廉克巳之操有合諡典無愆前志故詢諸友好宜諡曰靖節徵士其詞曰物尚特生人固介立豈伊時遘曷亦世及嗟乎若士望古遙集韜此洪族蔑彼名級睦親之行至自非敦然諾之信重於布言亷深簡潔貞夷粹溫和而能峻博而不煩依世尚同詭詞則異有一於此兩非默置豈若夫子因心違事畏榮好古薄身厚志世霸虛禮州壤推風孝惟義養道必懷邦人之秉彞不隘不恭爵同下士祿等上農度量難鈞進退可限長卿棄官稚賓自免子之悟之何悟之辨賦詩歸來髙蹈獨善亦既超曠無適非心汲流舊巘葺宇家林晨煙暮靄春煦秋陰陳書輟卷置酒絃琴居備勤儉躬兼貧病人否其憂子然其命隱約就間遷延辭聘非直也明是惟道性糾纒幹流冥漠報施孰云與仁實疑明智謂天蓋高胡愆斯義履信曷憑思順何置年在身中疢維痁疾視死如歸臨終若吉藥劑弗嘗禱祠非恤傃幽告終懷和長畢嗚呼哀哉敬述靖節式尊遺占存不願豐沒無求贍省訃却賻輕哀薄斂遭壤以穿旋葬而窆嗚呼哀哉深心追往逺情逐化自爾介居及我多暇伊好之洽接閻鄰舍宵盤晝憩非車非駕念昔宴私舉觴相誨獨正者危至方則閡哲人卷舒布在前載取鑒不逺吾規子佩爾實愀然中言而發違衆速尤忤風先蹶身才非實榮聲有歇睿音永矣誰針余闕嗚呼哀哉仁焉而終智焉而斃黔婁既沒展禽亦逝其在先生同塵住世旌此靖節加彼康惠嗚呼哀哉李善注何法盛晉中興書云延之為始安郡道經尋陽常飲淵明舍自晨達昏及淵明卒延之為誄極其思致恩賜綾錦出關判安息國莫賀逺來入朝頻蒙賜綾錦等還將自隨關司以物皆違樣不放過對劉穆之某就日輸琛占風削袵既踰蔥嶺便集藁街頻承湛露之恩幾荷油雲之施至若綾開翥鶴映淮浦以成文錦縟翔鴛艷江波而濯色近九重之厚錫充萬里之輕齎關司以寄重咽喉任先襟帶物皆違樣既生非馬之疑事乃出蕃須計雞鳴之失既緣恩賜有異當途勘責不虛固難留滯唐人以書判取士今英華所存判式蓋當時之制如此唐以前不聞有此英華諸判亦不載唐以前一人此劉穆之疑姓名偶同耳御史推屬吏判張鷟棲烏之府地凜冽而風生避馬之臺氣威稜而霜動懲姧嫉惡實藉嚴明肅政彈非誠宜允别某位參持斧職在埋輪履暴勝之清徽乘葛豐之雅烈冠施鐵柱貴戚傷心花發繡衣姧豪斂手近辭端右逺屆衡陽聫翩紫蓋之峰迢遞蒼梧之野但御史推核受委非輕有罪必刑無幽不察神羊竦角必觸邪人隼鷙驚飛先驅惡鳥推鍾建之罪特奉繇言舉張泰之辜無虧格式正當直指豈是輒干準犯量科宜從解退鷟字文成員半千稱其文詞猶青銅錢萬選萬中時號青錢學士證聖中為御史開元初以訕短時政貶嶺南鷟儻蕩無檢為文浮艷然大行一時新羅日本使至必出珍寶購其文有朝野僉載一書至今尚傳極猥鄙無非譏議人處孫薦曽孫又新唐書有傳家僮視天判甲於庭中作小樓令家僮更直於上視天乙告違法甲云專心候業不伏對員俶聖人體道雖旁行而不流君子為儒亦博覽而多識甲誠不敏嘗窺祕文傳妙術於青猿得精符於翠鳳管公明之好事不寐每踰於夜分劉子敬之多能觀星或至於明發固當率由古道仰止先賢既非日御之官當晦風占之迹况門庭之內賓友相趨乃别搆青樓迥披丹檻當牖異紅籹之女寓宿乃蒼頭之僕董舒災異主人猶且致尤雕語怪神秦帝尚令下獄既私庭竊候罪巳良多公憲正詞刑其無捨但以考陳生之國志嘗有其人徵葛公之蜀科未聞斯罪古今異政夫何足疑待更細推方從公議李泌傳云開元十六年悉召能言佛道孔子者相答難有員俶者九嵗升座詞辨注射帝曰半千孫固當然因問童子豈有類若者俶奏臣舅子李泌帝即馳召之藝文志有員俶太玄幽贊十卷歷主失度判歷主失秒忽之度對王泠然律呂之本今古攸尚周行殷歷孔子於是興嗟漢襲秦正劉歆以之條奏莫不考於經傳稽之氣象惟彼歷生稱明算法理須銅壺曉唱則聽雞鳴玉斗夜回方看蟻轉何得輕於秒忽失以毫釐禆竈多言豈知大道羲和廢職幾亂人時遂令太史罷占疇人廢業陸佐公之漏刻莫見新成張子平之渾儀但聞虛設既失推蓂之典何逃置棘之刑泠然嘗有上張燕公二書勸其用蘇許公及薦吳太玄靳能又王丘傳云開元初為吏部奬用孫逖張鏡微張晉明王泠然皆一時茂秀字詁判甲書字詁所由計功不及日請科罪不伏訴云紙類不同對張巡甲楷法有聞頗齊刀筆之吏象形自業偏在寫書之官不能殺竹惟青臨池盡墨當年有立應巳盈裾計日不移無慙尺牘今乃字詁是事日課有違左氏門庭雖多筆硯稚川史籍不滿巾廂曽莫負於五車徒見司於雙管以是會意雖則麾肱不能中程何為當理今之簿訴將俟片言欲遲單父之書須辨洛陽之紙然則類之大小猶或可問刑之出入於是乎在劉賓客嘉話録載公謝加金吾表云想峨睂之碧峰豫遊西蜀追緑耳於玄圃保壽南山逆賊祿山迷逆天地殺戮黎獻羶臊闕庭臣被圍七旬親經百戰主辱臣死當臣致命之時惡稔罪盈是賊滅亡之日惜不得其全篇姑存之於此許逺亦有祭文云太乙先鋒蚩尤後殿蒼龍持弓白虎捧箭盜瓜判常州申稱錢客每以種瓜為業遂被伶人洪崖盜食其瓜並盡為客所擒遂作術化出滿田是瓜客乃放之崖去後了復無瓜客詣縣告崖是妖賊對錢客家鄰白社業在青門米實蔥花光浮五色藍皮密理美至三搖長懷洗玉之珍方有致金之望洪崖行乖夔足道契狼心不能李徑遺冠翻乃瓜田躡履徇兹猿臂因採掇而全空眷彼龍蹄隨指揮而忽見寧勞宋灌自含氷谷之文不假曽鋤俄結火山之實錢既迷於術化洪乃集彼回邪於是釋此妖人將殊盜者初觀帶母似逐仙來後察空苗疑因夢失幻人為幻幻巳去而無瓜迷者知迷迷既袪而有誤論妖疑切誨盜情深雖陳莠口之詞莫辨訛言之實洪崖不在丹筆何施客告未曉真虛崖實未知州縣更宜尋問方可裁量署書題閣判得甲代以署書為業因題閣而變華髮自後而絶鄉黨以墜業擯逐遂云甲訴無犯不伏對張巡幹蠱馳聲惕勵終吉振人為義何難之有顛沛於是克荷良存甲絶翰深規代濟其美精逾史籕得方伏之宏模績洞張芝改圓池之波態晉廷稱妙即擅一臺越市推珍還標五字諒無殞於前構偶垂裕於後昆孰謂象賢旋聞鮮克屬以功開揆日翥偃蹇之雕甍號起凌雲結瞳朧之畫閣式題飛榜方呈鵲反之書坐陟雲梯遂變武賁之髮菱花鏡裏月復青顔薤葉風前俄隳素業垂堂取誡誠欲謹身良冶遽捐其如棄訓撫韋家之宿事徒想欽承語王氏之門風深違祖述永言丘首難忘懷土之心浩意家聲宜復懸針之藝還墳判劉亨稱元是并州人因隋季而遷長安今請還就墳陵長不許去對失名頃者江濱鹿走道喪隋風晉水龍興祚開唐運干戈忽起自下都而入上都雞犬亂馳辭舊國而入新國劉亨爾日正喜攀龍忽念此時旋悲去鶴顧惟舊浦偶咽水而分聲還念故鄉共行雲而動色秋林葉下遽失維桑春圃花飛俄傷故梓以為生金翠石黃絹仍存挂劒青松貞枝尚鬱四時節物供薦無由萬里蕭條歸寧莫遂氷狐夜聽首丘之戀不窮翔鳥晨驚懷土之悲寧輟披肝上請思切來歸零淚下霑悲深去國雖越吟楚奏幽顯頗殊而移尊就卑禮律通許宜依所請庶叶平反冀南國之禽罷思閩越東平之樹不靡咸陽草書狀索靖聖皇御世隨時之宜倉頡既王書契是為科斗鳥篆類物象形睿哲變通意巧兹生損之𨽻草以崇簡易百官畢修事業並麗蓋草書之為狀也婉若銀鉤漂若驚鸞舒翼未發若舉復安蟲蛇虬蟉或往或還類阿那以羸形歘奮釁而桓桓及其逸遊盻嚮乍正乍邪騏驥暴怒逼其轡海水窊隆揚其波芝草蒲陶還相繼棠棣融融載其華玄熊對距於山嶽飛燕相追而差池舉而察之又似乎和風吹林偃草扇樹枝條順氣轉相比附窈嬈廉苦隨體散布紛擾擾以猗靡中持疑而猶豫玄螭狡獸嬉其間騰猿飛鼺相奔趣凌魚奮尾蛟龍反據投空自竄張説牙距或若登髙望其類或若既往而中顧或若俶儻而不羣或若自檢於常度於是多才之英篤藝之彥役心精微耽此文憲守道兼權觸類生變離析八體靡形不判去繁存微大象未亂上理開元下周謹案騁辭放手雨行水散髙音翰厲溢越流漫忽班班而成章信竒妙之煥爛體磊落而壯麗姿光潤以粲粲命杜度運其指使伯英回其腕著絶勢於紈素垂百世之殊觀靖字幼安該博經史兼通內緯與衛瓘俱以草書知名趙王倫篡位靖應三王義舉遷後將軍太安末河間王顒舉兵向洛拜遊擊將軍與賊戰被傷卒靖有逺識嘗指洛陽宫銅駝歎曰會見汝在荆棘中行見姑臧城南石地曰此後當起宮殿其言皆驗然卒以兵死言志蕭大圜拂衣褰裳無吞舟之漏網挂冠懸節慮我志之未從儻獲展禽之免有美慈明之進如蒙北叟之放實勝濟南之徵其故何哉夫閭閻者有優遊之美朝廷者有簪佩之纍蓋由來久矣留侯追蹤於松子陶朱成術於辛文良有以焉况乎智不逸羣行不髙物而欲辛苦一生何其僻也豈如知足知止蕭然無纍北山之北棄絶人間南山之南超踰世網面修原而帶流水倚郊甸而枕平皋築蝸舍於叢林構環堵於幽薄近瞻煙霧逺睇風雲藉纎草以蔭長松結幽蘭而援芳桂仰翔禽於百仞俯泳鱗於千潯果園在後開窗以臨花卉蔬圃居前坐簷而看灌甽二頃以供饘粥十畝以給絲麻侍兒五三可充紝織家僮數四足代耕耘沽酪牧羊協潘生之志畜雞種黍應莊叟之言穫菽尋汜氏之書露葵徵尹君之録烹羔豚而介春酒迎伏臘而候嵗時披良書探至賾歌纂纂唱烏烏可以娛神可以散慮有朋自逺揚榷古今田畯相過劇談稼穡斯亦足矣樂不可支永保性命何畏憂責豈若蹙足入絆申脰就羈遊帝王之門趨宰衡之勢不知飄塵之少選寧覺年祀之斯須萬物營營靡存其意天道昧昧安可問哉嗟乎人生若浮雲朝露寧俟長繩繫景實不願之執燭夜遊驚其迅邁百年何幾擎跽曲拳四時如流俯睂躡足出處無成語默奚當非直丘明所恥抑亦宣尼恥之大圜字仁顯簡文帝第二十子也侯景弒簡文大圜潛遁獲免景平王僧辨遣詣江陵大圜懼禍屏絶人事恆以讀書為事元帝甚稱之于謹軍至乃以大圜副其兄大封充使請和其實質也至軍信宿而元帝降周文以禮待之保定二年封始寧公俄為麟趾殿學士武帝集四十卷簡文集九十卷並止一本時在祕閣大圜得見乃手寫之一年而畢大圜心樂間放嘗著論云云隋開皇初卒此篇與樂志論相類如此則夫人而能樂之但恐世間少此地行仙耳四六法海卷十二
